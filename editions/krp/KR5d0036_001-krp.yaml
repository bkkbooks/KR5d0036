  text: 眞誥卷之一
  hash: sha256:74ce034881e10a1e7afd62e9ce8c48d2dbe049342c0e9b575d66c9f93467d189
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_HFL_001-001a, image: hfl/0637/0637-008.png}
body:
  text: 金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造運象篇第一愕緑華詩神嶽排霄起飛峯鬱千尋寥籠靈谷虚瓊林蔚蕭森此一字被墨濃黵不復可識正中抽一脚出下似是羊字其人名權生標美秀弱冠流清音棲情莊慧津超形象魏林揚彩朱門中内有邁俗心我與夫子族源冑同淵池宏宗分上業於今各異枝蘭金因好著三益方覺彌靜尋欣斯會雅綜彌齡祀誰云幽鑒難得之方寸裏翹想籠樊外俱爲山巖士無令騰虚翰中隨驚風起遷化雖由人蕃羊未易擬所期豈朝華歲暮於吾子愕緑華者自云是南山人不知是何山也女子年可二十上下青衣顔色絶整以升平三年十一月十日夜降剪缺此兩字即應是羊權字自此徃來一月之中輒六過來耳云本姓又剪除此一字應是愕字贈此一字本是權字後人黵作此字詩一篇并致火澣布手巾一枚金玉條脫各一枚條脫乃太而異精好神女語此本是草作權字後人黵作見字而乙上之君愼勿泄我泄我則彼此獲罪訪問此人云是九嶷山中得道女羅郁也宿命時曾爲師母毒殺乳婦玄州以先罪未滅故今謫降於臭濁以償其過與此權亦草作故似前體而不被黵耳尸解藥今在湘東山本懸此中一寸此女已九百歲矣尋此應是降羊權權字道輿忱之少子後爲晋簡文黄門郎即羊欣祖故欣亦修道服食也此乃爲楊君所書者當以其同姓亦可楊權相問因答其事而疏說之耳按升平三年是己未歲在乙丑前六年衆眞並未降事右三條楊君草書於紙上南嶽夫人與弟子言書識如左弟子即楊君自稱也此衆眞似是集洞宫時所以司命最在端當爲主人故也夫人向楊說次第位號如此非降楊時也東嶽上眞卿司命君東宫九微眞人金闕上相青童大君蓬萊右仙公賈寳安鄭人自此後皆是稱諸眞人之字非其人名也氏族亦見世道書傳中也清虚小有天王王子登案青童高尊乃可不敢稱諱字此青虚是南嶽之師尚稱字獨不顯茅司命字亦爲難詳也桐柏眞人右弼王領五嶽司侍帝晨王子喬青蓋眞人侍帝晨郭世幹衛人戎山眞人太極右仙公范伯華幽人少室眞人北臺郎劉千壽沛人嶓冢眞人左禁郎王道寧常山人大梁眞人魏顯仁長樂人岷山眞人隂友宗陸渾眞人太極監西郭幼度九嶷山侯張上貴楚人岱宗神侯領羅酆右禁司鮑元節東海人華山仙伯秦叔隱馮翊人葛衍眞人周季通陽洛眞人領西歸傅淳于太玄西域人潜山眞伯趙祖陽涿郡人勾曲眞人定録右禁郎茅季偉鬱絶眞人裴玄人白水仙都朱交甫三官保命司茅思和太和眞人山世遠右二十三眞人坐西起南向東行此於禮乃是南向以西方爲上而後女眞東向則應起南今反北者當是以側近高眞故也太和靈嬪上眞左夫人北海六微玄清夫人北漢七靈右夫人太極中華右夫人紫微左宫王夫人滄浪雲林右英夫人案右英是紫微姊今反在後當位業有升降耳上眞司命南岳夫人此即魏夫人也自說故不稱姓八靈道母西嶽蔣夫人案有數號者並以多爲高西王母稱九靈則八靈宜在七靈前而今返在後者亦所未詳又受讀黄庭事云北嶽蔣夫人與今不同上眞東宫衛夫人方丈臺昭靈李夫人紫清上宫九華安妃朱陵北絶臺上嬪管妃北嶽上眞山夫人西漢夫人長陵杜夫人右十五女眞東向坐北起南行說此事時雖不記月日不知在何年既是衆眞名位故出以居前後衆眞位號前云以爲高者猶今世之徽號也六月二十一日夜定録問云許長史欲云何尋道登答懃修眞誠之意定録又言昔有趙叔臺王世卿亦言篤學而竟不如人意遂爲北明公府所引此是乙丑年六月也自此前唯有六月十五日定録授是答長史書論茅山中事此前又已有一授不記何月日並在第四卷中自餘無有先此者北明公府酆都宫中官屬也昔扉廓天津採華赤丘是時聲穎靈袂蒙塵華此即應是說初降華僑事字少倚人發焕秀山高說延霄自謂玄響所振無徃不豁既濯以靈波實望與物榮菴既未能暢業駢羅遊岫逐逸然後知悟言之際應玄至少於是佛音弗駕而旋偃靜葛臺夫玄刃無親流鑒遁眞若以雲壁一徃想齊獨邁俯自啓灑動應潜逸始乃吾等並有欣慨耳徃見況意相知篤末書云伏覽聖記事跡淵妙金策素著青録玄定遂跨塵俗逍遥紫陽何蕭蕭之清遠眇眇之眞貴哉若能者矣請借來喻又云得道之階錯厲精神靖躬信宿洗誠求矜如斯而言道已邇也然夤夜之間宜篤經營乃後得手結天維足浮靈綱心遊太空目擊洞房不待久日也若五情愆波三魂越𠫤於是三眞舞劒黄闕捷關耳可不力之可不力之六月二十二日夜鷄鳴喻書此紫陽㫖也右二條有長史寫清靈眞人說寳神經云云抄此修行事出在第三卷中不復兩載紫微夫人喻書如左云云事亦在第三卷興寧三年歲在乙丑六月二十三日夜喻書此其夕先共道諸人多有耳目不聦明者欲啓乞此法即夜有降者即乃見喻也此楊君自記也長史年出六十耳目欲衰故有咨請楊不欲指斥託云諸人又告云道士有耳重者云云事亦在第三卷右一條清靈眞人言眞人告云櫛頭理髮欲得過多事亦在第三卷右一條紫微夫人言其夜初降者適入户未坐自言今夕波聲如雷弟子請問其故答云向見東海中大波耳弟子者楊君自稱也右南嶽夫人言又告云汝憎血否答曰實憎之云血在路上若汝憎之當那得行又答曰當避之耳又云避之佳故不如目不見乃佳右南嶽夫人言自此後諸眞共語耳又云寳神經是裴清靈錦囊中書侍者常所帶者也裴昔從紫微夫人授此書也吾亦有俱如此寫西宫中定本問西宫所在答云是玄圃北壇西瑶之上臺也天眞珍文盡藏於此中右南嶽夫人言裴眞人又言此書與隱書同輩事要而即可得用也一名七玄隱書右二十三日授訖此南嶽夫人見告云紫微左夫人王諱清娥字愈意阿母第二十女也鎮羽野玄壟山主教當得成眞人者右一條先此一夕所授此一條即是二十二日夜與紫陽所喻同夕當復大應有事後云聲氣下亦是此夕楊後又追億此一事更黵在二十二日例中故云先此一夕也右從清靈來凡十二條有長史寫六月二十四日夜紫微王夫人來降因下地請問眞靈既身降於塵濁之人而手足猶未嘗自有所書故當是卑高迹邈未可見乎敢諮於此願誨蒙昧夫人因令復坐即見授今書此以答曰此楊君自述事也例多如此夫沈景虚玄無塗可尋言發空中無物可縱流浪乘忽化遁不滯者也此二行皆浮沈㝠淪儵遷灼寂是故放蕩無津遂任鼓風柂存乎虚舟而行耳故實中之空空中之有有中之無象矣至於書迹之示則揮形紙札文理昺注麤好外著玄翰挺焕而範質用顯默藻斯坦形傳塵濁苟騫露有骸之物而得與世進退上玷逸眞之詠下虧有隔之禁亦我等所不行靈法所不許也今請陳爲書之本始也造文之既肇矣乃是五色初萌文章畫定之時秀人民之交别隂陽之分則有三元八會羣方飛天之書又有八龍雲篆眀光之章也其後逮二皇之世演八會之文爲龍鳳之章拘省雲篆之迹以爲順形梵書分破二道壤眞從易配别本支乃爲六十四種之書也遂播之于三十六天十方上下也各各取其篇類異而用之音典雖均蔚跡隔異矣校而論之八會之書是書之至眞建文章之祖也雲篆明光是其根宗所起有書而始也今三元八會之書皇上太極高眞清仙之所用也雲篆明光之章今所見神靈符書之字是也爾乃見華季之世生造亂眞共作巧末趣徑下書皆流尸濁文淫僻之字舍本效假是囂穢死迹耳夫眞仙之人曷爲棄本領之文迹手畫淫亂之下字耶夫得爲眞人者事事皆盡得眞也奚獨於凡末之麤術淫浮之弊作而當守之而不改玩之而不遷乎夫人在世先有能書善爲事者得眞仙之日外書之變亦忽然隨身而自反矣眞事皆邇者不復廢今已得之濁書方又受學於上文而後重知眞書者也鬼道亦然但書字有小乖違耳且以靈筆眞手初不敢下交於肉人雖時當有得道之人而身未超世者亦故不敢下手陳書墨以顯示於字迹也至乃符文神藻所求所佩者自復始來而作耳所以爾者世人固不能了其端緒又使吾等不有隱諱耳㝠中自相參解矣内外自相關矣又四極眀科高上禁重亦自不聽我等復爲世間常書也我既下手子固不解亦將何趣兩爲煩濫耶此亦當闇其可否殆不足嫌想少暢豁於胷懷盡不自書之流分矣上眞司命南嶽夫人授今書如左若夫仰擲雲輪緫轡太空手維霄綱足陟玉庭身升帝闕披寳歙青上論九玄之逸度下紀萬椿之大生遂竦景電肅千霞焕明眞言玄浪高談玉清激朱脣之流微運日氣之零零爰乃吐烽却煙彈金奏瓊鸞音蒨粲鳳唱嘉聲耳若但應景下旋迴靈塵埃參輦弊宇敖彿朝巿來成眞才訓我弟子則玉振落響琳鐘内抑周目五濁契闊愆室神勞臭腥填鼻歛氣遂閉蘭音於中華之元退案金聲之劣劣而發耳夫神者言微於邇萬里必接竒韻雖觸鑒無滯故眞理之既分聞遐則道高邈璞不肆瑩而致有卑微之聦也今子乃有心覺之至將致嫌似之思外觀流俗之對内有遲疑之悟乎不運事宜亦已邁也望所營者道研咏者妙耳道妙既得高下之音必坦然矣此非所謀吾子加之至慮散蕩斯念宜愼之耳右三條有楊書六月二十四日夜南嶽夫人見授令書此先是二十二日夕有在别室共論講道紫微南嶽二夫人聲氣語音殊下不解其趣今故授書此以答所共講者之疑心也初來見授時色氣猶不平授畢可爾弟子唯覺色有不平都無他可道此一條亦是楊君自記論南嶽夫人其夕語弟子言我明日當詣王屋山清虚宫令汝知之所至也其夕又言海東桐柏山西頭適崩二百許丈紫微王夫人云世人之思慮何得事事眞審耶可不事有答其心也南嶽夫人言戲之耳欲建堅之也瑩實之也興寧三年歲在乙丑六月二十五日夜此是安妃降事之端記録别爲一卷故更起年歲號首也紫微王夫人見降又與一神女俱來神女着雲錦䙱上丹下青文彩光鮮腰中有緑繡帶帶繫十餘小鈴鈴青色黄色更相參差左帶玉佩佩亦如世間佩但幾小耳衣服儵儵有光照朗室内如日中映視雲母形也雲髮鬃此應是鬒字鬒黑髮貌也鬢整頓絶倫作髻乃在頂中又垂餘髮至腰許指着金環白珠約臂視之年可十三四許左右又有兩侍女其一侍女着朱衣帶青章囊手中又持一錦囊囊長尺一二寸許以盛書書當有十許卷也以白玉檢檢囊口見刻檢上字云玉清神虎内眞紫元丹章其一侍女着青衣捧白箱以絳帶束絡之白箱似象牙箱形也二侍女年可堪十七八許整飾非常神女及侍者顔容瑩朗鮮徹如玉五香馥芬如燒香嬰氣者也香嬰者嬰香也出外國初來入户在紫微夫人後行夫人既入户之始仍見告曰今日有貴客來相諧論好也於是某即起立夫人曰可不須起但當共坐自相向作禮耳夫人坐南向某其夕先坐承床下西向神女因見就同床坐東向各以左手作禮作禮畢紫微夫人曰此是太虚上眞元君金臺李夫人之少女也太虚元君昔遣詣龜山學上清道道成受太上書署爲紫清上宫九華眞妃者也於是賜姓安名鬱嬪字靈簫紫微夫人又問某世上曾見有此人不某答曰靈尊高秀無以爲喻夫人因大笑於爾如何某不復答紫清眞妃坐良乆都不言妃手中先握三枚棗色如乾棗而形長大内無核亦不作棗味有似於梨味耳妃先以一枚見與次以一枚與紫微夫人自留一枚語令各食之食之畢少久許時眞妃問某年幾是何月生某登答言三十六庚寅歲九月生也眞妃又曰君師南眞夫人司命秉權道高妙備實良德之宗也聞君德音甚久不圖今日得叙因縁歡願於㝠運之會依然有松蘿之纏矣某乃稱名答曰沈湎下俗塵染其質高卑雲邈無縁禀敬猥虧靈降欣踴罔極唯蒙啓訓以袪其闇濟某元元宿夜所願也眞妃曰君今語不得有謙飾謙飾之辭殊非事宜又良久眞妃見告曰欲作一紙文相贈便因君以筆運我鄙意當可爾乎某答奉命即襞紙染筆登口見授作詩如左詩曰雲闕堅空上瓊臺聳鬱羅紫宫乘緑景靈觀藹嵳峩琅軒朱房内上德焕絳霞俯漱雲瓶津仰掇碧柰花濯足玉天池鼓枻牽牛河遂策景雲駕落龍轡玄阿振衣塵滓際褰裳步濁波願爲山澤結剛柔順以和相携雙清内上眞道不邪紫微會良謀唱納享福多某書訖取視之乃曰今以相贈以宣丹心勿云云也若意中有不相解者自有微訪耳紫微夫人曰我復因爾作一紙文以相曉者以示善事耳某又襞紙染筆夫人見授詩云二象内外泮玄氣果中分㝠會不待駕所其貴得眞南嶽鑄明金眇觀傾笈𢁥良德飛霞照遂感靈霄人乘飈儔衾寢齊牢携絳雲悟歎天人際數中自有縁上道誠不邪塵泮非所聞同目咸恒象高唱爲爾因書訖紫微夫人取視視畢曰以此贈爾今曰於我爲因縁之主唱意之謀客矣紫微夫人又曰明日南岳夫人當還我當與妃共迎之於雲陶間明日不還者乃復數日事又良久紫微夫人曰我去矣明日當復與眞妃俱來詣爾也覺下牀而失所在也眞妃少留在後而言曰㝠情未攄意氣未忘想君俱咏之耳明目當復來乃取某手而執之而自下牀未出户之間忽然不見六月二十六日夕衆眞來䟽如左紫微王夫人紫清上宫九華眞妃上眞司命南嶽夫人某師凡此前後云某者皆楊君自隱名也紫陽眞人茅中君清靈眞人茅小君又有一人年甚少整頓非常建芙蓉冠著朱衣以白珠綴衣縫帶劒都未曾見此人來多論金庭山中事與衆眞共言又有不可得解者揖敬紫微紫清南眞三女眞餘人共言平耳云是桐柏山眞人王子喬也都不與某語又前後初有眞人來見降者時皆自不即與某共語耳各坐良久紫清眞妃曰欲復煩明君之手筆書一事以散意忘言可乎某又襞紙待授眞妃乃徐徐微言而授曰我是元君之少女太虚李夫人愛子也昔初學眞於龜臺受玉章於高上荷虎録於紫皇秉瓊鉞於天帝受書於上眞之妃以遊行玉清也常數自手扉九羅足躡玄房霄形靈虚仰歠日根入宴七闕出轡雲輪攝三辰而俱升散景霞以飛軒也非不能採擇上室訪搜紫童求王宫之良儔偶高靈而爲雙接玄引竒友于帝郎矣直是我推機任會應度歷數俯景塵沫參龍下邁招冥求之雄追得匹之黨耳自因宿命相與乃有墨會定名素契玉郷齊理二慶携鴈而行匏爵分味醮衾結裳顧儔中饋内藏眞方也推此而徃已定分冥簡青書上元是故善鄙之心亦已齊矣對景之好亦已域矣得願而遊歡兼昔㫖豈不冥乎自然此復是二象大宗内外之配職耳實非所以變無反淡凝情虚刃靈刀七累遺任太素保眞啓玉單景八空之謂也秀寂高清鬱輿流霄使鳳歌雲路龍吟虎嘷天皇雙景遠升辰樓飛星擲光日月映軀口吐㝠煙眼激電光上寢瓊房流行玉清手掣景雲足陟金庭若自此之時在得道之頃爲當固盡内外理同金石情纏雙好齊心幃幙耳爲必抱衾均牢有輕中之接塵穢七神悲魂任魄乎蓋是妾求氏族於明君耳非有邪也今可謂得志懷眞情已如一方當相與結駟玉虚偶行此玄同掇絳實於玉圃併採丹華於閬園分飲於紫川之水齊濯於碧河之濱紫華毛帔日冕蓉冠逍遥上清俱朝三元八景出落鳳扉雲關仰漱金髓咏歌玉玄浮空寢晏高會太晨四鈞朗唱香母奏煙齊首偶觀携帶交裙不亦樂乎不亦得志乎明君其順運隨會妾必無辭且亦自不得背實反冥苟任胷懷矣授畢復自取視而言曰今以此書相詣庶豁其滯疑耳言畢乃笑良久紫微夫人曰眞妃之辭盡矣論好之縁著矣爾亦不得復有所容也玄運冥分使之然耳南岳夫人見授書曰㝠期數感玄運相適應分來聘新搆因縁此携眞之善事也蓋示有偶對之名定内外之職而已不必苟循世中之弊穢而行淫濁之下迹矣偶靈妃以接景聘貴眞之少女於爾親交亦大有進業之益得而無傷絶之慮耳千神於是可使試觀不得復陳矣眞旌必可尅徃雲軿必可俱駕也吾徃曾因紫微夫人爲汝構及此意今遂如願益使我欣欣愼復疑矧於心胷矣我昨見金臺李夫人於清虚中言爾尚有疑正之心色氣小有謂應作悢悢字汝違此舉誤人不小眞妃有神虎内眞丹青玉文非爾所有者輩良才求寫故當不爲隱耳今日相携何但文章而已將必乘景王霄乎若有未悟者宜微訪可否眞妃見夫人書言乃笑而言携手雙臺娱歎良會景軿同機於此齊乎眞誥卷之一
