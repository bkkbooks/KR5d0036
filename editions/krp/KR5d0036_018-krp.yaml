  text: 眞誥卷之十八定八
  hash: sha256:66cc27f5be2016edbcf7f16edec14d5e8d5568216a1473b9d7a758a2b1b2bebd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_HFL_018-001a, image: hfl/0640/0640-070.png}
body:
  text: 金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造握眞輔第二三月十九日夜夢小掾來在此靜中坐良久自說小茅山三會水處極可看戲向從四平山中來路上見叔父持火炬滿手欲以作變先生可向阿郎道如此鬼火使人口噤不得語此物乃化爲風先生知之不小掾又曰方山大有侯叔草異佳葉乃大昨乃大取近乃失去布複栻欲就先生乞此衣掾兩庶生叔並早亡不知此當是誰者方山即四平山所謂遊處方源常與龍伯高等爲旅也既採南燭又乞複栻則在洞中者猶須衣食故云杜廣平亦伐薪貿糧而況今洞上之士乎斯眞豈復不知斷穀特是不應爲之耳小掾又曰今葬處不吉斷墓脉多所云云右十九日夕所夢此則前書所六以白者如此則掾亦還葬舊墓雖曰虚塚猶須吉地右與長史書今所見眞手者訖此前少一行又闕失上兩字情兼無以喻懷尋省來告粗承同之僕尋徃相見近矣比者翹注良不可言給事安和即長史也以十九日南州二十二日當還功曹已入昨相見慰懷功曹掾庶長兄小名揆者也方爾悠悠未卒歸也將琴絃之隂德乎聊當一笑琴絃事出彭素經房中之術也此即日無他公明日當復南州與大司馬别大司馬剋二十六發也第七似不從征公是簡文爲司徒也大司馬是恒温也鎮在姑熟應北伐慕容第七似是掾叔小名嗣伯者爲尚書郎于時是太和四年己巳歲三月中書也乃遠送米將供洞齋之備耶若君遠研玄鏡澄聲上音在深林之中遐人事之跡使此物之來卒無縁也於今逢耳誠理盡備矣洞齋即大洞齋法今有眞書小訣如此則掾是備行上品七卷耳想所寫已了校當令熟秋冬之間其經當復示也不知是何經明年掾便遁化也故服不春草生此物易尋想數詣玄水之處逍遥也僕此月必徃叙其不久南燭冬乃不彫春時色味彌好既呼爲則是掾合服石和者所以定録云次服飯兼穀無違但一劑干𣏌其事不同耳即不知玄水在何處也亦不煩屬李李疾病未攝事承田己爲勞意敕語陳暉如此必有秋望也此誠小小不暫勞君意者則事去矣給事云南州還當并急四月半間欲至東山想無差錯矣比更告茶一簿直注行下云茶一簿未正可解當爲寄與掾也茶則是茗掾患淡飲所須兼亦以少寐也一日不見君常恐鄙恡之心已生矣君未復能屑屑中出於風塵之間耶右八條楊書並是在都送還山與掾失上紙此書師與弟子灼然作君僕用古體也承給事體氣如故且甚延悚念侍省遑懼辭正爾燒香入靜具啓夜當根陳情事使盡丹苦之理動靜别白尋更承問此少上紙似在縣下答虎牙道長史病事糊連給事前後書上啓神母因書小掾并呈前後答神母云小掾截留給事書唯餘此見還此亦是虎牙是掾去後事也神母應是南眞夫人右楊君在此所寫外書及自記夢事并與答長史兩掾諸書疏及有存録者記此又别有紀事酬答眞人書己在前篇中長史書暮卧先存斗星在所卧席上暮卧存星之時皆先隂呪星名然後存耳祝畢乃存星安卧其中也然後宻叩齒祝九星之精右二條長史抄修洞房事見斧云酉年學戌年當歸戌年道炁當行天下云從戌年當受法此一條是掾去後所記掾記是庚午年去此戌年即應癸酉甲戌年受法者是就其眞人受經二奔之道十一年成眞故定録云復十六年乃覩我於東華者也經云主諸關鏡聦明始此黄庭經中語九月十七日已一百九十過已上並是朱畫朱書九月二十六日夜始此前後間中細字注者皆眞手也自别復一紙既有兩九月便是一年中事其間亦恐多有零落不存已上並是朱畫朱書右此是長史自讀黄庭遍數也朱墨雜畫者是因修用時遇得筆便題記之耳云長谷出日等亦是經中語當是讀至此句忽有事應起故䟽誌處也大洞眞玄張鍊三魂出惡夢祝太上高精三帝丹靈出善夢祝此二條事本經並應出大丹中今以抄出别已在第五篇中太都天録顯於玄宫出紫文仙相左目童子出五神經仙者心學出二十四神經也先閉炁二十四息出紫文玄闕事行之十八年亦是玄闕事大帝玄書玄闕符事徒行事而不知神名還精而不知服此符亦玄闕事魄唯得飲佪水月精出紫文拘魂祝云吾是天目出飛步經祝三啄齒太元上玄夢冢墓祝今在第三篇魄唯聽飲月黄日丹紫文制魄祝沐浴祝太上高眞出九眞經傳祝制虫丸出蘇君傳季道思和似是記憶二茅君字疑作道字是誤耳玉簡青録高閣刻石出空常祝語石精玉馬照知鬼形亦是空常祝語苞山下有石室銀户方圓百里崑崙山下有黄水名曰日月水飲者得仙此二條未知何出未見其事告王君使傳知眞者告青童使傳成眞者夫知眞者謂知眞而得眞成眞者謂勤求而獲眞者耳出消魔經序凡此者當皆是略記其㫖自以備忘耳正月四日二月八日三月十一日四月十六日五月二十日六月二十四日七月二十八日八月十九日九月十六日十月十三日十一月十日十二月七日右老子拔白日此是太清外術事似長史自抄用正月庚申二月辛酉三月庚戌四月癸亥五月壬子六月癸丑七月甲寅八月乙卯九月甲辰十月丁巳十一月丙午十二月丁未右上帝煞害日不可請乞百事無宜此諸日皆是隨月支干衝破凶日也可以類求之亦恐非眞受雖百事無宜而常所脩行或值諸吉恐不可闕也所謂靜室者一曰茅屋二曰方溜室三曰環堵制屋之法用四柱三桁二梁取同種材屋東西首長一丈九尺成中一丈二尺二頭各餘三尺後溜餘三尺五寸前南溜餘三尺棟去地九尺六寸二邊桁去地七尺二寸東南開户高六尺五寸廣二尺四寸用材爲户扇務令茂宻無使有隙南面開牖名曰通光長一尺七寸高一尺五寸在室中坐令平眉中有板床高一尺二寸長九尺六寸廣六尺五寸薦席隨時寒暑又隨月建周旋轉首壁墻泥令一尺厚好摩治之此法在名山大澤無人之野不宜人間入室春秋四時皆有法然此蓋本道相承道家之一事耳不足爲異也粗要知是以及道機作靜室法與此異恐是别有告受者而不知審的今存想入室亦可依之或云應有經也以正月十五日尚書省中直乞夢非常皆靈仙眞像多所道其子孫慶以閏月二日夕又夢仙靈共會吾請乞佳應又見有缺失一字非常好以月半中忽見九老先生乘軺引從詣吾相見欣然云連在宣城四十日始還問吾消息云今至蕪湖二十三日當還還當省吾得見之欣然此是作餘姚還爲尚書郎時也以閏月四日夕夢綵物如旛形皆舒著席上或如畫或如錦繡文字焕炳如言可解而不可解愈舒愈更竒異云是楊舍人物時亦不見楊君也意言當寫取云須能畫人整頓所未常見當有十許旛太和八年閏十月而楊君年二十三簡文始爲司徒恐未爲舍人亦恐是後年諸閏耳十一月十二日夢棺器露有水十二月十八日左右夢以鐵釵刺玄武此玄武恐是所言墓之玄武也非所存龜蛇者也二十一日夢見天子天子當年十六七許在殿上此應康帝時不知是何年重復夢見在一處懸嶮自放落下岐危遥見劉升遠與語從此當迴還迴還道難得一細以手巾穿之見吾城扶助吾遂得迴旋右六條並長史自記夢事十月九日詭上厨五人㫖南山治此長史自記事㫖應作㫖謂指誓雷平宅淨金也牙詣夫人詭當用雙金環汝無吾當具交以謝恩也厚若有金貫便以奉夫人云以謝吏兵華功曹至意宻語新脫婦字令知宻之宻之若無便可以二雙金環奉跪勿𠫤勿𠫤若欲得體上所寳玩者爲好華功曹似是華僑而後又云楊意㫖恐是非也厚似是虎牙婦也吾近日䟽與汝說二君應有詭其夕即有誥云吾二人吏兵若無功詭後小子不復爲人使楊意㫖中謂可用釵小君即言釵所以導違開通自可用也新婦有金釵即可用可停貫也先詣夫人次詣二靈汝疇量之汝索鐶如一日䟽新婦銀釵亦可用良無便當用鐶吾停汝辭須詭當詭辭繼其下也不復别作此書即涉前事也得佳清閑云敕汝修内經是保命汝不答漠漠不當爾然此非常意皆發自㝠妙當作本末答當奉行此意口又無言爲不可也内經或應是黄庭不爾即應是洞房中法爾陶休以二百紙與汝吾留百枚檢陶譜長史婦親屬不見名休者斧白米已當向盡汝餉之此是供染爲青飰者遷告去汝當小不佳防之遷是易遷夫人也右此七條並長史與虎牙書右許長史在世抄記紀中事目及夢并與兒書有存録者訖此其與眞靈書已别在前卷中先生自寄神炁投景東林沐浴閑丘乖我同心每東瞻滄海歎逝之迅西眄雲涯哀興内發髣髴故郷鬱何壘壘將欲身返歸塗但矯足自抑耳於是靜心一思逸憑靈虚登巖崎嶇引領仰玄㝠志扉上遊雲竦眞始覺形非我質遂亡軀遂神矣浪心飈外世路永絶足樂幽林外難一塞建志不倦精誠無廢遂遇明師見受竒術清講新妙玉音洞審吐納平顔鍊魂保骨沖氣夷泯無復内外也此則王世龍等所受服玉液諸法也但恨吾遭良師之太晚也反滯性之不早矣吾得道之狀艱辛情事定録眞君已當說之矣崇賴成覆救濟之功天地不能渝也謂應作踰字此則是定録所說被試事也聞弟遠造上法上清諸道也偶眞重幽雲林降也心觀靈元謝過法也炁陶太素五神事也登七闕之巍峩飛天堽也味三辰以積遷日月五星虚落霄表精郎九玄此道高邈非是吾徒所得聞也亦由下挺禀淺未由望也然高行者常戒在危殆得趣者常險乎將失禍福之明於斯而用矣道親於勤神歸精感丹心待眞招之須臾若念慮百端狹以營道雖騁百年亦無冀也三官急難吾昔聞之在前重論排遣諸試難事得爲爾前通也七考之福既以播之於後子何功業當復延及長史父子也因運乘易不亦速耶幾成而敗自己而作試校千端因邪而生耳想善加苦心勞形勤諸功德萬物云云亦何益哉斧子蕭蕭其可羡也各不自悟當造此事斧獨何人享其高乎歎獨絶超邈也師友之結得失所宗託景希眞在於此舉也吾方棲神岫室蔭形深林采汧谷之幽芝掇丹草以成眞矣成眞之辭小爲夸激昔約道成當還詭信雖未都通徹粗有髣髴亦欲暫偃洞野看望墳塋不期而徃冀暫見弟因縁簡略臨書增懷映謝從曾祖本名映改名遠遊此十字榮弟注右一條先生被試後因事長史于時應已在蓋竹山定録云辰年當暫出還人食詭則此應是丙寅丁卯年中書也掾泰和元年八月服六甲符此靈飛六甲法别有經泰和二年太歲在丁卯正月行迴元道此是謝過法别有經泰和二年二月中行空常此飛步别法泰和二年四月服青牙此青牙始生法世未見經泰和二年七月行日月在心泥丸之道右五條共一片紙記存日月在泥丸法泰和二年六月行前云七月而此云六月字當有舛誤者此即服日月芒法泰和三年五月行奔二景道此則儀璘之法雖已有抄事未見大經又二條又别一片紙朱書不與前事相連也二月三日夜脫失兩字應似是名夢鄭白夫人道之交有内宻而外疏者鄭之區區今即是也當與嶒姑俱來鄭者鄧芝母也與易遷夫人周旋故夢於掾以結芝㝠津嶒姑未測是誰交夢亦應是二三年二月中也四月二十七日夜半夢見一女子著上下青綾衣與吾相見自稱云我是王眉壽之小妹也相見時似如在山林之間云明日可暫出西門外有犢車白牛皮巾裹僕御頭者是我車也後别相詣於貴解因口喻作詩如别乘炁涉渌津採藥中山巔披心焕靈想蕭蕩無悟言願與盛德遊驂駟騁因縁榮塵何足尋疾激君清玄苟能攝妙觀吐納可長年王眉壽之小妹即中侯夫人也掾既未接眞故假夢以通㫖而有榮塵之句又恐非掾矣泰和元年六月五日夕夢忽聞天上有金石鍾鼓之音仍仰看見彩雲如虹氣狀爽爽彌漫天上從東直西趣意中謂是女靈行或呼爲元君忽復如從路上行欻然已過玉斧又將主簿追望唯見輦輿後從朱衣人皆迴還見禮路邊有一人白衣似卜師因見語云君體羸不堪事可專修所行勿雜他事若不專君當得病君不見信者自當得夢此人自稱姓縢主簿即兄虎牙也七月向末玉斧夢身體飛揚豁然入一屋下累床南向坐自謂是合日揚光顛迴五辰之道此語出消魔經太上之辭焉見一人在東面立手舒卷書看見如畫圖像山岳狀下輒有書說亦與執書人語良久八月三日夕夢忽有一人弊衣長形容從一小兒來如徇簫簫作嘯㫖謂如今徇嘯賣物人也坐與玉斧語乃說上道事斧仍驚愕更危坐須臾將進内户大論上道顧小兒莫令人見我外鼓斧問樂耶謂鈞天廣樂上清之曲也云不來欲得可取之爾君自當得鈞樂因問鈞樂幾人答曰十人一鈞大法乃至於萬不知道至十萬仍覺復眠又夢見卷書見玉斧書先舒惟見後是王君事似四輔傳盡共在上多論王君學道時見語學道歷年事自可須二三年間邪意甚敬此人未得拜便覺末見主簿亦在坐泰和元年八月三十日夕夢得一帙有四小卷書云是神母書或云是傳皆以青細布爲秩秩兩頭紅色書皆是素時先生亦在間又爲玉斧書此傳上篇於户外壁辟方素上其字似符或如獸像帙布亦不正似布謹記先生即楊君也泰和三年三月二十五日夕玉斧夢行見天上白雲彌滿纏合甚下而不高仰望雲間時有空處狀如山穴東行數步覺東北有大道便順道行得一深室或如石室白炁從室中出又似水鬱勃來冠玉斧身時急坐亦不恐向炁忽散見室裏有牀席器物殊整潔意中自謂是靈人所住止處仍向室拜叩頭訖請乞室内有一穴玉斧復從此前進穴内甚急小不得前意復更欲進忽見一人在室外語玉斧未可進尋當得前乃向此人再拜揖而退又見送至道上說玉斧應受書之言極殷勤委曲當勤存南眞夫人使三人送玉斧令通板橋初出又見犢車中有二露頭年少與向人言笑未至所住便覺欣願靈悟如夢之告謹以記之右七條並掾自䟽記夢事于時區區之心亦與隱居今日何異三月八日拜䟽玉斧言鄭恨還奉敕尊猶患飲痛不除違遠竦息隂臑願今餐食無恙即日此蒙恩牙近至此便西願早至謹及啓䟽玉斧再拜玉斧言尊欲得六甲符似在句容牙處斧都不以書來山中願就牙器中料謹啓此六甲符非靈飛也當是在右玄録也玉斧言承近三日會流盃尊亦作詩後信願寄還謹啓塩茗即至願賜檳榔斧常須食謹啓恒須茗及檳榔亦是多痰飲意故云可數沐浴濯水疾之瘕也此書體重小異今世呼父爲尊於理乃好昔時儀多如此也四月十七日拜䟽玉斧言漸熱不審尊體動靜何如願飲漸覺除違遠燋竦急假願行出即日此蒙恩謹及啓䟽玉斧再拜玉斧言有檳榔願賜今暫倩徐沈出至便反謹啓四月十八日拜䟽玉斧言昨徐沈啓願即至漸熱不審尊體康和飲漸覺除違遠戀竦牙如常揆時得出斧粗蒙恩謹及馮令史啓䟽玉斧再拜揆是庶長兄也四月二十一日拜䟽玉斧言隂熱不審尊體動靜何如飲覺蒙恩陳輝來尊今日當至斧近齋唯尊來餘人難相見願道路安穩小史在户内使不欲經遠或淹謹及陳輝啓䟽玉斧再拜此亦明眞齋惟在斷外人避淹而已小史當是其名而猶進小兒於室内使者貴勝人自不能躬親猥碎也玉斧言揆牙亦得暫還此安穩謹啓四月二十三日拜䟽玉斧言奉敕昨夜至慰馳竦熱願尊體餐食無恙未得侍見戀慕旦陳滕啓疏願已至謹及啓䟽玉斧再拜玉斧言楊舍人弟病委頓爲懸耿想行當佳謹啓前楊書云老母今此云弟唯兩事顯耳其餘親族皆莫之聞四月二十八日拜䟽玉斧言昨奉敕慰竦息隂炁願尊體無恙飲覺除違燋竦謹及啓䟽玉斧再拜玉斧言錢即與田主此間都無復宻付二升餘華新婦欲得少許願分之亦長在中謹啓山家貧儉亦殊爲契闊華新婦即牙妻也五月四日拜疏玉斧言節至增感思濕熱不審尊體動靜何如飲猶未除違遠竦灼服散微得飲水猶是得益願彼大小無恙尊五日當下願必果謹遣扶南啓䟽玉斧再拜玉斧言陳鹿至尊賜脯及蒸葱即至帝都已還束甚得失四字謹啓從二十三日來凡三書長史並似在縣下家中時也玉斧言承舍人下恐過句容未進此湛家穀猶未熟今遣朱生出參願尊即令生反得穀願爲都作米此無可舂者若至便當就合恐藥草燥得米下船乃可採草謹啓玉斧言此間釜小可正一斛不與甑相宜又上稻應得釜用都有大釜容二斛已上者願與諸藥俱致無見可否足借斧當於懸下少一行十許字謹啓此求米及大釜皆是作飯所須也云穀未熟當在九月中此一書長史在都下右八條掾在山與答父書于時長史在都及縣下也右此並掾在世間所記事及書有存録者訖此又有與眞靈辭具在前篇眞誥卷之十八
