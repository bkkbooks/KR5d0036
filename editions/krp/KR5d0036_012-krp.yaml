body:
  text: 金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造稽神樞第二昔累得書見意深照㫖趣先書以年行西吴衰頽待老中夜慨歎莫與酬諮夫誠感有在亦得之無晩也次書告有年之志疇昔之好恒願眞人禀受要訣仰接容景親奉徽音夫勤未上徹精未廣釐眞要之騁未可豫及也後漢書云吾發自玄授金闕素名跨邁世迹超登清虚何玄標之渺邈竒洞之淵遠哉欲克己洗心沐浴芳流若能斯者今其時矣末書云厠聞要㫖當修五靈自謂西造閬圃東遊玄洲不爲邈絶求矜而誘之引而致之是爲言貫于心良可啓矣恭佼音效五靈亦復至耳然道浮外迹未關内眞是以雲車靈轅相適猶遐昔曾軫華僑依此而言則知華僑先亦蒙眞降矣蓋應會敖世事有出嘿涂不必靜苟有分無志申公所病遇至不爲覆水始惋是以古唁有云逢時不邁山客抃粲者矣夫學道者固不宜恃其質分必當保任於清全矣於焉騁逸松期回輪紫清靈觀四響玄音合唱玉振雲奏不謀而和可謂祕道藏珍眞暉之上挺也子建志有年今因以反子昔㫖耳此一書似是裴君言且楊書此亦不與後玄帝相連恐非中君答也又長史此四書本今並不存矣玄帝者昔軒轅子昌意娶蜀山之女生高陽德號顓頊顓頊父居弱水之郷頊身陶七河之津是爲玄帝也仗萬靈以信順監衆神以導物役御百氣名致雷電於是乘結元之輦北巡幽陵南至交趾西濟流沙東至蟠木動靜之類小大之神日月所照莫不屬焉四行天下周旋八外諸有洞臺之山隂宫之丘皆移安息之石封而填之鑄羽山之銅爲寳鼎各獻以一於洞山神峯不獨句曲一山而已此所謂玄帝也此後并中君答前所諮問四條事復以闕上紙也說顓頊與五符語正同五符唯無理鼎一事耳鮑靚靚及妹并是其七世祖李湛張慮本杜陵北郷人也在渭橋爲客舍積行隂德好道希生故令福逮於靚等使易世變練改氏更生合爲兄弟耳根冑雖異德蔭者同故當同生氏族也今並作地下主者在洞宫中靚所受學本自薄淺質又撓滯故不得多也欲知之其事如此亦如子七世祖父許肇字子阿者有賑死之仁拯飢之德故今雲蔭流後隂功垂澤是以今得有好尚仙眞之心者亦有由而然也物皆有因會非徒爾而得之者矣此書時先生誡事未授所以論及子阿功蔭也鮑亦通神而敦尚房中之事故云撓滯後用隂君太玄隂生符爲太清尸解之法當是主者之最高品矣縁運事乃如此相關今人之善惡豈曰徒然問葛玄玄善於變幻而拙於用身今正得不死而已非僊人也初在長山近入蓋竹亦能乘虎使鬼無所不至但幾於未得受職耳亦恒與謝稚堅黄子陽郭聲子相隨葛玄字孝先是抱朴從祖即鄭思遠之師也少入山得仙時人咸莫測所在傳言東海中仙人寄書呼爲仙公故抱朴亦同然之長史所以有問今答如此便是地仙耳靈寳所云太極左仙公於斯妄乎左慈今在小括山常行來數在此下尋更受職也慈顔色甚少正得鑪火九華之益左慈字元放李仲甫弟子即葛玄之師也魏武父子招集諸方士慈亦同在中建安末渡江尋山仍得入洞又乞丹砂合九華丹九華丹是太清中經法小括即小括蒼山在永嘉橋谿之北凡此諸人術解甚多而仙弟猶下者并是不聞三品高業故也許先生所以興歎句曲有五門有心立志清齋三月登尋此門皆可即得得可入但人自不能齋尋之耳來問欲知宫室所作闊狹多少男女主領人數當更相示來疏亦復泰盡邪勤自當見亦何事爾亦何事爾又當先呈啓司命司命令答道宫室之委曲者吾乃敢言之耳此自是司命之别宫吾人亦不得爲洞臺之正主也按後所論諸官僚人物當是已爲啓司命乃具得受說之耳右定録後書答長史所問訖此從玄帝來凡五條並楊書東卿司命監太山之衆眞緫括吴越之萬神可謂道淵德高折衝羣靈者也賈玄道李叔升言城生傅道流徃並受東卿君之要也玄道河東人周威王之末年生叔升涿郡人漢元帝時生道流北地人漢靈帝殿中將軍也城生吴人後漢劉聖公時爲武當郡尉也受學至勤并得眞道今在太山支子小陽山中此所謂地眞者也諸來作試者非一津而徃矣或亦因人犯者此最難了也於斯之際可不愼乎此四人隸司命主察試學道者所以長史有書與賈賈即呈司命司命亦答之並以在上卷此諸人名位小不顯外書周威王即應是六國時威烈王也于時雖未立河東郡而即地已有其名矣漢官無正殿中將軍或應中郎將也此紫陽眞人六月二十日受右一條有掾寫七月十五日夜茅中君受書與許卿即長史也後當爲上清左卿玄感凝會精期遠範標神映挺雙理自分必能鵬飛辰阿雲扇靈元高振玉宇携轡秀眞可謂邈乎其竒落絶之視也於是洞隂之宫内臺下觀風無羽琅之鼓草無瓊金之流嚮雖渟光正明動回五象固乞屈之夾觀小天之浮景耳何足絓卿司之至念紆蘭眞以盼汜邪然鑒無不應圓想必通所以興詠事外迹亦並帀苟誠之所企吾無隱也想善建重離之明以期於必詣之會皓清明朗賢亦俱學而得耳不令我等有蹙頞下風矣弘之而已此是受前書後一月日復受此猶論答欲見洞宫事所以有後說也善建重離之明如似指魏傳青録文而長史名字不相應既已稱俯玄仰白在瓊刃前則此别當有義況也右一條楊書定録官寮有左右理中監準今長史司馬職又有北河司命主水官考此職常領九宫禁保侯禁保侯職主領應爲種民者今洞宫自二君以下便次此三職爲大矣左理中監準大府長史昔用韓崇以居之崇字長季吴郡毗陵人也少好道林屋仙人王瑋玄會授之以流珠丹一法崇奉而修之大有驗瑋玄語之子行此道亦可以岀身仕宦無妨仙舉也崇遂仕稍至宛陵令行仁以爲政用道以撫民虎狼深避蝗不集界遷汝南太守拔書佐袁安安後位至司徒時人通以崇有識物之鑒也隂皇后葬京師近郡二千石妻當會園陵而崇獨居清素妻忿崇哭泣詔問其故太常馮奚答曰汝南太守韓崇清苦遠尚味道忘形身享重官而妻自紡績政化仁簡視民如傷深達竒博有君子之鑒斯則昏夕之夜光陛下之子産也妻不通寒儉之節哭怨無衣將足以顯崇明德耳上竒之加崇俸禄秩中二千石後孝明皇帝巡狩汝南上治崇府崇使妻出住孤獨老嫗家上聞歎曰韓崇所謂百鍊不銷也賜縑五十匹崇在郡積十四年政化洽著舉天下最年七十四瑋玄乃授以隱解法得去入大霍山受瑋玄遁化泥丸紫户術以度世今在洞中爲左理中監漢書所載事迹亦略同而置辭小異耳袁安字邵平初爲縣功曹被舉歷仕遂至三公和帝時卒即袁紹高祖也晋世又有馮奚亦爲大常名位同耳韓既隱解必是託尸今晋陵上有韓冢崔巍高大從來相呼爲韓冢疑如桃君或即是此虚壙而世呼爲孫策將韓當冢也云王瑋玄是楚莊王時侍郎受術於玉君若是春秋時楚莊王者疑侍郎之官不似古職而漢楚王又無莊謚右理中監準職如司馬今有劉翊字子翔者居之翊本潁川人少好道德而家世大富常周窮困爲事好行隂德宻惠陳留張季札當弔師喪車敗牛困翊於汝南界逢之與語不示名字即推車牛與乘之恤死救窮非一人矣後都長安翊舉計掾到都帝嘉其心拜郎中遷陳留太守出長安五百里中斂死恤窮損己分人行達陽平遂遇馬皇先生告翊曰子仁感天地隂德神鬼太上將嘉子之用情矣使我來携汝以長生之道吾仙官也爾乃能隨我去不翊於是叩頭自搏少好長生幸遇神仙乞願侍給馬皇先生因將翊入桐柏山中授以隱地八術服五星之華法今度名東華來在洞中爲定録右理中監漢書云翊字子相潁隂人家世豐富常能周施而不以爲惠曾行於汝南界中有陳留張季札遠赴師喪遇寒冰車敗頓滯道路翊見而謂曰君愼終赴義行宜速達即下車與之不告姓名策馬而去季札意其子相也後故到潁隂還所假乘翊閉門辭行不與相見常守志卧疾不屈聘命河南種䄶臨郡引爲功曹後黄巾賊起翊救給乏絶資其食者數百人郷族死亡則爲殯斂鰥寡則助其妻娶獻帝遷都西京舉上計掾爾時道路寇阻翊夜行晝伏乃到長安上嘉其忠勤拜議郎遷陳留太守翊又散珍寳唯餘車馬自載東歸出關數百里見士大夫病亡道次仍又以馬易棺脫衣斂之又逢故知饑困於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視没不救非志士也遂俱餓死此說大同小異故備載之論翊字子翔於字例相得而翊義亦是相相作息亮切音二者未詳孰正馬皇出列仙傳黄帝時馬師也定録府有典柄執法郎是淳于斟字叔顯主試有道者斟會稽上虞人漢桓帝時作徐州縣令靈帝時大將軍辟掾少好道明術數服食胡麻黄精餌後入吴烏目山中隱居遇仙人慧車子授以虹景丹經修行得道今在洞中爲典柄執法郎易參同契云桓帝時上虞淳于叔通受術於青州徐從事仰觀乾象以處灾異數有效驗以知術故郡舉方士遷洛陽巿長如此亦爲小異吴無烏目山婁及吴興並有天目山或即是也慧車子無别顯出十二月一日夜定録君所道此即同是丑年所受云北河司命頃闕無人昔以桃俊兼之耳俊似錢唐人少爲郡幹佐未負笈到太學受業明經術灾異晩爲交阯太守漢末棄世入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也幼平教俊服九精鍊氣輔星在心之術俊修之道成今在洞中兼北河司命主水官之考罰此位雖隸定録其實受事於東華宫中節度桃俊字翁仲者也漢書無此事今冢在錢唐臨平墳壇歷然苗裔猶存郷近時聞鼙角之響故人不敢侵毁之皆知呼爲桃司命冢錢唐杜徵士事京産先與隱居共有詩詠以贊述斯德别在集中幼平亦無所顯出張激子當爲太極仙侯激子者河内張奉者也字公先少時名激子耳此人亦少發名字太傳袁隗歎其高操妻以女女服飾奢麗奉不顧眥無異路人婦改服乃後成室家也後棄世入剡山遇山圖公子山圖公子周哀王時大夫仙人者也授激子九雲水强梁鍊桂法激子修此得道今在東華宫行爲太極所署也或領九宫尚書與北河侯對職治水考北河司命或爲禁保侯亦併共業故也北河司命亦治在洞天之中與張激子對局魏書云張範字公儀河内修武人祖歆漢司徒父延太尉袁隗欲以女妻範範辭不受性恬靜樂道徵命不就後爲議郎參丞相魏武軍事甚見敬重好賑救窮乏家無餘財以建安十七年卒弟承字公先亦知名以方正拜議郎諫議大夫趙郡太守後隨魏武西征至長安病亡此說名字翻覆大異承與奉乃相類而非袁壻若是範又其字不同詳按事迹恐多是兄也魏書王修傳又云修徃來南陽多止張奉舍奉舉家病修營拯之按張範兄弟乃嘗避地徃揚州投袁術又非劉表不應在南陽二三爲疑也山圖公子出列仙傳中候夫人所道尋洞中事皆二君所說如此兩條獨是中候夫人者當本是東華中職寮故也我聞易遷中人竇民言云北河司命禁保侯似有所擬想當審爾竇氏即瓊英也似有所擬者當是長史故中君受云北河司命方驗也恐受業高後定不復爲此職然主領種民事亦相符保命府多女官司三官官屬有七人四女三男明晨侍郎七人如今世上御史中丞之職並隸東華方諸宫保命君緫關之耳明晨侍郎周爰支者漢河南尹周暢伯持之女也暢汝南安成人好行隂德功在不覺曾作河南尹遭大旱收葬洛陽城旁客死骸骨萬餘人爲立義冢祭祀之應時大雨豐收所行多是此輩太上處以暢有隂行令爰支從南宫受化得仙今在洞中爰支亦少好道服伏苓三十年從遇石長生教之以化遁化遁上尸解也暢即周嘉從弟也性仁慈和篤某帝時爲河南尹永初二年夏旱久禱無應因收葬萬餘人應時大雨位至光禄勳明晨侍郎張桃枝者漢司隸校尉朱㝢季陵母也沛人㝢徃與陳蕃俱誅㝢母行隂德久聞在易遷始得爲侍郎耳朱㝢沛人桓靈時八俊後同黨人之例李膺杜宻俱下獄死非陳蕃同時明晨侍郎夏馥字子治陳留人也少好道服术餌和雲母後入吴山從赤須先生受鍊魂法又遇桐柏眞人授之以黄水雲漿法得道今在洞中馥少時被公府辟召懸辟書著桑樹乃去其用懷高邁如此後漢及高士傳並云陳留圉人少爲書生桓帝時舉直言不就性質直不同時黨爲閹人所疾陷於黨錮之限避難乃翦鬚髮變形逃林慮山中爲人治作後還家杜門不出不與人相見黨禁未解而亡赤須子出列僊傳桐柏即右弼王餘數人不能一二道之例皆取平貞正直體隱神清即侍郎之才不限男女也前云有七人今唯說二女一男右保命君所道此當是接中候告後乃言之童初府上帥用劉文饒文饒者弘農劉寬也少好道曾舉漢方正稍遷南陽太守視民如子怒不形顔口無疾言行隂德拯寒困萬民悦而附之如父母焉後爲司徒太尉上賜酒伏地睡詔問故乃答曰臣任重責大恒憂心如醉旦使奴至巿買菜奴盜用錢飲酒晏乃還卧於閣内又不得菜既醒乃罵之爲死狗罵畢即束帶來人恐奴從後自殺所以慮之不覺忽然睡耳願見哀恕寬用心仁愛觸類如此矣年七十三一旦遇青谷先生降之於寢室授其杖解法將去入太華山行九息服氣及授以鑪火丹方修之道成今在洞中作童初府帥上侯主始學道者後漢書云劉寬字文饒弘農華隂人父名崎順帝時爲司徒寬爲人謹厚常行有人失牛乃就寬車中認之寬無言解駕牛與之步歸頃有誌者得牛而送還慚懼寬乃謝遣之桓帝延熹八年爲南陽太守恒用蒲鞭靈帝嘉平五年爲太尉嘗於御坐被酒睡伏帝問太尉醉邪寬仰答臣不敢醉但任重責大憂心如醉耳嘗有客來詣寬寬遣奴市酒迂久大醉而還客罵爲畜産寬須臾遣人視奴疑恐自殺語左右曰此是人而罵爲畜産爲辱孰甚故吾懼其死耳後封逮郷侯六百户中平二年亡年六十六贈車騎將軍時進謚曰昭討侯子松嗣按此說復爲同異故詳載之青谷先生無别顯出凡此諸引教仙人恐皆是下教限不爾則不應得輒然華陽中事當更示爾正月二十三日東宫上人來看洞中時或有龜山賔共集高會眞仙之日寧可暫登伏龍之郷以禮拜於靈岫邪可示許侯令知之此亦應是中君仍前十二月一日言也東宫上人即青童君龜山賔即西王母上卷亦有此告今登伏龍以望山禮拜便異乎陟嶺非必以近易爲言恐當宜然也昔有一人好道而不知求道之方唯朝夕拜跪向一枯樹輒云乞長生如此二十八年不倦枯木一旦忽然生華華又有汁甜如蜜有人教令食之遂取此華及汁並食之食訖即仙矣如是用心精誠之至也枯木尚能生紫華濯甘津況三秀之靈阿五芝所播植而不能數恭山岫洗拔滓穢者良可悲也世人所以儳此一字非眞每不得如意者亦如子所不得如意耳豈異邪昔有劉少翁曾數入太華山中拜禮向山如此二十年遂忽一旦得見西嶽丈人授其仙道禁山符有西嶽君西嶽公不知是此丈人邪昔有一人數旦旦詣河邊拜河水如此十年河侯河伯遂與相見與其白璧十雙教授水行不溺法此人見在中嶽得道河侯河伯故當是兩神邪左慈初來亦勤心數拜禮靈山五年許乃得深進内外東西宫耳前云三月便得進與此大殊恐以深進爲異也學道當如山世遠去人事如清虚眞人步深幽當如周紫陽何有不得道邪世遠傳未出其捨家尋學事在讖書即尹公度弟子已得爲太和山眞人清虚王君紫陽周君各自有傳建志當令勤研神令虚所爲所作當令宻青童戒南眞亦云學道唯須勤宻勤即晝夜而勿怠宻則非我而不知今中君復說此實爲至諭可謂一言以蔽之右定録君所道使䟽此一條又有楊書夫望林者豈不想易遷之若人羡彼子之濯景邪可謂瞻之在前忽焉在後長史妻既已在易遷爲長史今眺望林嶺豈無羡想之懷昔自謂勝之今翻在後蓋以勸激長史之辭也右南嶽夫人言張姜子西州人張濟妹也濟後漢末西凉州人爲董卓將後攻穰城被射死即張繡從叔也其妹不顯外書不知出適末李惠姑齊人夏侯玄婦也玄魏末人與李豐俱爲晋文王所誅不知婦亡在玄之前後李豐乃是馮翊人非齊人不知此是李誰之女施淑女山陽人施績女也施績吴興人孫皓時爲驃騎將軍守西陵令云山陽恐女或出適取夫家郡不爾則乖鄭天生鄧芝母也鄧芝字伯苗南陽新野人在蜀爲劉禪車騎將軍後行見蝯抱子行引弓射殺因感念而亡母不知鄭誰之女此數女子昔世有仁行令問並得在洞中洞中有易遷館含眞臺皆宫名也計今在易遷館東厢中此館中都有八十三人又有恊辰夫人者九宫之女也太上徃遣來教此等法皆以保命授書恊辰夫人主教領之也夫人漢司空黄瓊女黄景華也韓終授其岷山丹服得仙黄瓊江夏人字世英漢順帝時司空司徒太尉年七十九亡父名香章和帝時爲尚書令救活千餘人瓊子琬司徒太尉爲李權所殺夫人亦不知出適末今此諸人或稱女或稱婦或稱母蓋各取名達者而言之非必因附其功福所及也含眞臺是女人已得道者隸太元東宫中近有二百人前云八十三人止是易遷耳含眞既爲貴勝當須遷轉乃得進入也此二宫盡女子之宫也又有童初蕭閑堂二宫以處男子之學也其男女名氏又出後並是略稱標勝者也計與數人共止最於鄧伯苗母相親愛餘亦厚耳伯苗母即鄭夫人也設牀待靈誠孝子之長想也計亦已爲其兒作惠益也計前與爾杯布殆相與爲贈當徃洞室之際耳仙官有禁不得道實故假以他惠也此亦意之至也其亦欲設牀寢令精氣之徃有所棲者也可宻諸其兒道如此此令告掾也其事皆有指趣不容顯注之從定録官寮來凡三十一條並有掾寫注之一卷相隨眞誥卷之十二
