front:
  text: 眞誥卷之二十定十
  hash: sha256:38c4dd84f531b4df55987b6340410c393852731fb94990a195be0dd829cc194b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_HFL_020-001a, image: hfl/0640/0640-135.png}
body:
  text: 金闕右卿司命蓬萊都水盬梁國師貞白眞人華陽隱居陶弘景造翼眞檢第二孔璪賤時杜居士京産將諸經書徃剡南墅大墟住始與顧歡戚景玄朱僧摽等數人共相料視顧先已寫在樓間經粗識眞書於是分别選出凡有經傳四五卷眞㖟七八篇今猶在杜家其經三眞並眞㖟已還封昭臺宋大明末有戴法興兄延興作剡縣亦好道及吴興天目山諸玄秀並頗得寫杜經樓從弟道濟及法眞鍾興女傅光並得寫樓鍾間經亦互相通涉雖各摹符而殊多麤略唯加意潤色滑澤取好了無復規矩鋒勢寫經又多浮謬至庚午歲隱居入東陽道諸晩學者漸效爲精山隂潘文盛錢塘杜高士義興蔣弘素句容許靈眞並是能者時人今知摹二王法書而永不悟摹眞經經正起隱居手爾亦不必皆須郭填但一筆就畫勢力殆不異眞至於符無大小故宜皆應郭填也泰始四年終於剡移還始寧岹山馬智晚爲衆僧所說改事佛法悉以道經數十卷送與鍾皆是何公先爲其父寫者亦有王靈期雜經唯四五篇并眞㖟六七篇是眞手不關樓所得者其經二卷此眞㖟等悉已還封昭臺鍾亡後所餘亡應在兄女及戚景玄處昔有陳雷者東陽人是許長史門附謹敬有心長史常使典看經書頗加訓授其亦换有所寫兼得長史自步七元星圖長史去後因還東陽義熙十三年與東陽太守任城魏欣之兄子二人共合丹丹成三人前後服服皆有神異託迹暫死化遁而去雷有孫名某號爲長樂今居永康横江橋北菁山道士樊仙亦頗就得所寫經書但步圖猶在其處今所服用即是其本自此前凡諸經書在處者其篇數並别有目録若止零牒一兩篇者今復顯題卷目如後楊書靈寳五符一卷本在句容葛粲間泰始某年葛以示陸先生陸既敷述眞文赤書人鳥五符等教授施行已廣不欲復顯出竒迹因以絹物與葛請取甚加隱閉顧公聞而苦求一看遂不令見唯以傳東陽孫遊嶽及女弟子梅令文陸亡亦隨還廬山徐叔摽後將出徐亡乃在陸瓌文間已還封昭臺楊書王君傳一卷本在句容葛永眞間中又在王文清家後屬茅山道士葛景仙已還封昭臺掾書飛步經一卷本在句容嚴虬家大明七年饑荒少糧其里王文清以錢食與嚴求得之因在王家已還封昭臺掾書西嶽公禁山符楊書中黄制虎豹符凡二短卷本上虞吴曇拔所得許丞一瓠𤬛雜道書吴以此二卷與褚先生伯玉伯玉居南霍遊行諸山恒帶自隨褚亡留在弟子朱僧摽間後褚弟五弟之孫名仲儼又就朱取之已還封昭臺吴曇拔者上虞且靡人頗有才致初爲道士許丞以一瓠𤬛書皆三君小小要用雜訣以與之其後事佛出家悉分散乞人都盡後又罷佛還俗遂留宕而終諸書訣並未測所在掾書太素五神二十四神并迴元隱道經一卷及八素隂陽歌一卷並東陽章靈民先出都遇得之章于時未識眞書唯言是道家常經而已歸東陽以示顧顧不即向道仍留之分迴元爲二卷章後既知方就求得今在章間其二景歌一卷章已與孫公已還封昭臺章云于時又有曲素金眞金華等數卷魚爛穿壞既未悟其眞手不知㩉録惟寫取文字而已經本悉埋藏之也掾書所佩列紀黄素書一短卷本許丞以與弟子蘇道會道會以授上虞何法仁法仁以傳朱僧摽僧摽以奉鍾法師樓居士見而求取今猶應在樓間掾抄魏傳中黄庭經并復眞授數紙先在剡山王惠朗間王亡後今應是其女弟子及同學章靈民處永興有一姓解家者昔亦經供養許郎又得小小雜書後菁山女道士樊妙羅因縁得其楊書酆宫事一卷樊亡在其女弟子沈偶間沈又以與四明山孔緫已還封昭臺解家所餘今絶蹤迹又聞山隂及錢塘數家皆有古經恐脫雜眞書從來遂未獲尋撿想好學挺分之子可殷勤求之脫有所得見使一覩則瓊礫辨矣又魏夫人小息還爲會稽時携夫人中箱法衣并有經書自隨供養後仍留山隂于今尚在未獲尋求之眞冑世譜此是今日伸述故可稱眞胄謹按許長史六世祖名光字少張即司徒許敬之第五子也靈帝時兄訓及訓子相並儻附閹人貴盛光懼患及以中平二年乙丑歲來渡江居丹陽之句容縣都郷吉楊里後值吴初事爲光禄勳今許光禄墓是也則肇時猶居汝南平輿顧云句容子阿謬矣眞誥云長史七世祖肇字子阿有振惠之功今檢譜七世祖名敬字鴻卿後漢安帝時爲光禄順帝永建元年拜司徒名字與眞誥不同未詳所以舛異安帝永初二年三年大饑斗米二千文人相食若所救活四百八人必應在此時也應邵漢官儀載崔瑗表云許敬年且百歲猶居相位如此非唯隂德遠流後胤交目陽功著世所以年永身安位至台鼎子訓孫相並爲三公光來過江奕世丕承遂至神仙蜀司徒許靖字文休是長史六世族祖漢徵士許劭字子將是五世族祖吴丞相許晏字孝然四世族祖并同承十一世祖光武時許交州後交相子名聖卿許姓本出炎帝時姜氏至周武王封許叔於許今豫州許昌也至周敬王十五年爲鄭所滅徙居山陽昌邑因國爲姓至交州乃移於汝南平與也敬父名旉公府掾敬第五子名光字少張尚書郎鉅鹿太守少府卿過江值吴初爲光禄勳妻戴氏同葬今句容安成里墓爲剏造之始縣人傳呼云許光禄墓今墳碑顯然並甲向光第二子名闕字季優有才學吴尚書郎長水校尉妻戴氏同葬墓次闕第三子名休字文烈優遊道素高尚其氣州辟别駕不就前妻晋陵華氏後妻同縣葛氏侍中葛相女同葬墓次休長子名尚字元甫有才學令聞吴鳳凰三年爲中書郎年五十亡妻同郡陶氏即荆州刺史陶濬女同葬墓次尚第二子名副字仲先庶生即長史之父也淳和美懿州郡所稱爲晋元帝安東叅軍又征北叅軍帶下邳太守後爲寧朔將軍與孔坦討沈充封西城縣侯出爲剡令有風化與謝弈兄弟周旋值蘇峻亂又携親族徃剡事平還拜奉車都尉年七十七亡前妻晋陵華氏名轉御吏中丞華琦妹也後妻應氏名來子竟陵太守應彦徽女同葬縣北大墓也副有八男第一奮一名守字孝方庶生有文武才望出繼叔父朝爲何次道叅軍後爲所後弟夷吾所譛康帝誅之年三十六妻王氏墓葬縣北大墓有曾孫薈之位至三府第二炤字行明正生承嫡襲封通濟有當世局度亦爲何次道叅軍南臺侍御史淮陵太守年七十一亡妻游氏别葬縣東合留村第三群字太和正生明爽有才幹爲虞譚叅軍年四十四亡妻歷陽邵氏同葬縣北大墓第四邁即先生也第五某即長史也并同正生别記在後第六茂玄庶生早亡母姓陳也第七礭字義玄小名嗣伯庶生母姓朱也出後伯父捷梗槩有大度好學出爲桓温揚州從事謝安衛軍叅軍隨謝玄討符堅有功封都郷侯尚書蒼部駕部郎正員郎通直常侍後患風不能言隆安二年亡年七十妻宣城紀氏同葬縣北大墓第八靈寳庶生早亡母亦姓陳副有四女長女名姜正生早亡第二女名娥皇正生出適同郡建康令黄演第三女名修容庶生母姓張出適安固令晋陵弘升第四女名暉容與礭同生出適同郡紀詮也副弟名朝字楊先勇猛以氣俠聞歷爲襄陽新野南陽潯陽太守後與甘卓謀討王敦事覺卓死朝自裁年五十三還葬縣北大墓妻葛悌女抱扑姊也初養奮後自生夷吾高子并又亡無後先生名邁字叔玄小名映清虚懷道遐棲世外故自改名遠遊與王右軍父子周旋子猷乃修在三之敬按手書授六甲隂陽符云永昌元年年二十三歲則是永康元年庚申歲生也而譜云永和四年秋絶迹於臨安西山年四十八此則永寧元年辛酉生爲少一年今以自記爲正絶迹時年四十九矣娶吴郡孫宏字彦達女即驃騎秀之孫既離好無子歸宗先生得道事迹在第二卷中定録所喻被試事已具載焉長史名謐字思玄一名穆正生少知名儒雅清素博學有才章簡文皇帝久垂俗表之顧與時賢多所儔結少仕郡主簿功曹史王導蔡謨臨川辟從事不赴選補太學博士出爲餘姚令入爲尚書郎郡中正護軍長史給事中散騎常侍雖外混俗務而内修眞學宻授教記遵行上道挺分所得乃爲上清眞人爵登侯伯位編卿司治仙佐治助聖牧民按泰和二年丁卯歲司命所告云丙子年當去時年七十二此則永興二年乙丑生太元元年去也而譜云孝武寧康元年去世年七十一此爲泰安二年癸亥生爲多二年今以眞爲正顧云寧康元年七十二又非也妻同郡陶威女名科斗興寧中亡即入易遷宫受學同葬縣西北二里舊墓長史三男一女長男名甽小名揆庶生郡公曹妻劉氏少子名鳳遊郡主簿鳳遊子道伏字明之明之少子靜泰字元寳爲海平縣令久居會稽禹井山頗遵承家法傳受經書皆摹寫而已靜泰妻同郡葛氏唯有一子名靈眞戊午生今猶在會稽亦敦尚道業善能符書自長史後唯有此六世孫一人而已中男名聯字元暉少名虎牙正生敦厚信向郡主簿功曹謝安爲護軍又引爲功曹除永康令衛尉丞晋康太守不之官又爲輔國司馬安帝元興三年於家去世年六十八則成帝咸康三年丁酉歲生也顧云咸和三年生亦大謬妻晋陵華琦孫名子容同葬江乘界新安里中子赤孫字玄眞篤實和隱郡主簿功曹年七十四亡有四子及孫並早亡今無後也小男名翽字道翔小名玉斧正生幼有珪璋摽挺長史器異之郡舉上計掾主簿並不赴清秀瑩潔糠粃塵務居雷平山下修業勤精恒願早遊洞室不欲火停人世遂詣北洞告終即居方隅山洞方原館中常去來四平方臺故眞誥云幽人在世時心常樂居焉又楊君與長史書亦云不審方隅山中幽人爲己設坐於易遷户中未亡後十六年當度徃東華受書爲上清仙公上相帝晨譜云年三十而不記去歲按二録泰和二年丁卯時年二十七則是咸寧七年辛卯生也顧云咸和六年生又云司徒辟掾皆爲非實自泰和三年已後無復蹤迹依譜年三十即是庚午年去世又眞誥云從張鎮南之夜解而未審張解之法耆老傳云掾乃在北洞北石壇上燒香禮拜因伏而不起明旦視形如生此壇今猶存歷然則是故求隱化早絶世塵也事别在第二卷中妻建康令黄演女即姑娥皇之子名敬儀生黄民乃遣還家後離絶又出適宛陵令戴耆之長史一女名素薰庶生出適越騎校尉晋陵華瑛子名廣掾子黄民字玄文升平五年辛酉生時掾年二十一仕郡主薄察孝廉司農丞南蠻叅軍臨沮令宋元嘉六年亡年六十九妻西陽令葛萬安女葛安是抱朴子第二兄孫也黄民長子榮第一名預之宋元嘉十二年亡不知年幾有女名道育隆安元年丁酉生宋孝建元元年甲午歲於剡任埭山亡世謂之許大娘卧尸石壙不殯常有若香之氣黄民小子名慶宋泰始五年己酉歲亦於剡任埭山亡不知年幾有女名神兒一名瓊輝元嘉六年己巳生齊永明四年丙寅歲亡世謂許小娘東關道士多有識者右所承長史後如此今唯有揆玄孫靈眞而已楊君名羲成帝咸和五年庚寅歲九月生本似是吴人來居句容眞降時猶有母及弟君爲人潔白美姿容善言笑工書畫少好學讀書該涉經史性淵懿沉厚幼有通靈之鑒與先生長史年並懸殊而早結神明之交長史薦之相王用爲公府舍人自隨簡文登極後不復見有迹出顧云是簡文師或云博士楊乃小簡文十歲皆恐非實也按眞誥云應以太元十一年丙戌去又云苦不奈風火可修劒解之道作告終之術如此恐以早逝不必丙戌也得眞職任略如九華所言當輔佐東華爲司命之任董司吴越神靈人鬼一皆關攝之楊先以永和五年己酉歲受中黄制虎豹符六年庚戌又就魏夫人長子劉璞受靈寳五符時年二十一興寧三年乙丑歲衆眞降㖟年三十六眞降之所無正定處或在京都或在家舍或在山館山舘猶是雷平山許長史廨楊恒數來就掾非自山居也右楊君事大略如此須傳出更記按眞誥中有云鳳巢高木素衣衫然者配況長史名也曾參出田云云者離合長史字也許仙侯許卿者得眞位也給事常侍者在世官也有云許朝者即長史叔南陽也有云寅獸白齒者是虎牙也亦直云寅獸者亦云寅客亦云許虎許牙也許主簿者牙位也華新婦者牙妻也似云名厚即所謂許厚華侯華書吏者牙婦弟也有云瓊刃者譬訓掾小名也即青録所載若鋒者矣企望人飛云云者即離合掾官名也有云許㹠子似是揆小名也有云易遷夫人及斗者即掾母陶科也有云勿憂嗣伯之詭者即長史弟小名也有云來子雖善於爾者即長史後母也有云當奈張者何者即長史父妾也有云黄娥者即長史娥掾婦母也出適黄家故曰黄娥本名娥皇有云演小子耳者即娥皇婿黄演也有云赤孫者即虎牙兒也登升者三人先生長史掾也度世者五人虎牙黄民榮弟大娘小娘尋虎牙云遂得不死過度壬辰必是度世之限其餘無迹顯出黄民傳奉經業道育亡有異微恐或預例其二人亦可更在後世子孫若必以七世爲限則靈眞之子寔鍾斯慶長史婦陶威女雖入易遷恐此自承陶家福耳不必關許氏五人之數也有云李東者許家常所使祭酒先生亦師之家在曲阿東受天師吉陽治左領神祭酒華僑者晋陵冠族世事俗禱僑初頗通神鬼常夢共同饗醊每爾輒靜寐不覺醒則醉吐狼藉俗神恒使其舉才用人前後十數若有稽違便坐之爲譴僑忿患遂入道於鬼事得息漸漸眞仙來游始亦止是夢積年乃夜半形見裴清靈周紫陽至皆使通傳㫖意於長史而僑性輕躁多漏說㝠㫖被責仍以楊君代之僑後爲江城縣令家因居焉今江乘諸華皆其苗裔也華與許氏有婚親故長史書與裴君殷勤相請也若如前篇中有保命所告則僑被罪也今世中周紫陽傳即是僑所造故與眞誥爲相連也眞誥卷之二十
