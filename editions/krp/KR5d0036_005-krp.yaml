front:
  text: 眞誥卷之五安五
  hash: sha256:9ec47ccfc69c2fec18d8727270dc39f2d20b3e69250d68e537dd6890e0d67c6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_HFL_005-001a, image: hfl/0637/0637-158.png}
body:
  text: 金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造甄命授第一道授此有長史掾各寫一本題目如此不知當是道家舊書爲降楊時說其事㫖悉與眞經相符疑應是裴君所授所以爾者按說寳神經云道日此後云我之所師南岳赤松子又房中之事惟裴君少時受行耳眞誥中有吾昔常恨此賴解之早耳此語亦似是清靈言故也君曰道者混然是生元炁元炁成然後有太極太極則天地之父母道之奥也故道有大歸是爲素眞故非道無以成眞非眞無以成道道不成其素安可見乎是以爲大歸也見而謂之妙成而謂之道用而謂之性性與道之體體好至道道使之然也此說人體自然與道炁合所以天命謂性率性謂道修道謂教今以道教使性成眞則同於道矣君曰太上者道之子孫審道之本洞道之根是以爲上清眞人爲老君之師此即謂太上高聖玉晨大道君也爲太極左眞人中央黄老君之師君曰老君者太上之弟子也年七歲而知長生之要是以爲太極眞人君曰太極有四眞人老君處其左佩神虎之符帶流金之鈴執紫毛之節巾金精之巾行則扶華晨蓋乘三素之雲此二條事出九眞中經即是論中央黄老君也黄老爲太虚眞人南岳赤君之師裴既師赤君所以崇其本始而陳其德位也君曰道有八素眞經太上之隱書也在世君曰道有九眞中經老君之祕言也在世君曰道有太清上經變化七十四方君曰道有除六天之文三天正法在世君曰道有黄氣陽精藏天隱月君曰道有三元布經道眞之圖君曰道有黄素神方四十四訣君曰道有黄書赤長生之要長史書本杜家剪除此一行君曰道有赤丹金精石景水母君曰道有青要紫書金根衆文君曰道有玉清眞訣三九素語君曰道有石精金光藏景録形在世君曰道有丹景道精隱地八術君曰道有白簡素籙得道之名君曰道有紫度炎光夜照神燭君曰此皆道之經也杜家黵易此字爲經方世多有者然亦是祕道之事矣天師取其名而布其化事㫖大略猶同但每增廣其法耳此所云黄書赤界三一經涓子所說黄赤内眞者非今世中天師所演也君曰仙道有飛步七元天綱之經在世君曰仙道有七變神法七轉之經君曰仙道有大洞眞經三十九篇在世君曰仙道有大丹隱書八禀十决君曰仙道有天關三圖七星移度君曰仙道有九丹變化胎精中記君曰仙道有九赤班符封山墜海君曰仙道有金液神丹太極隱芝君曰仙道有五行祕符呼魂召魄君曰仙道有曲素决辭以招六天之鬼在世君曰仙道有黄水月華服之化而爲月君曰仙道有徊水玉精服之化而爲日君曰仙道有鐶剛樹子服之化而爲雲君曰仙道有水陽青映服之化而爲石君曰仙道有赤樹白子服之化而爲玉君曰仙道有絳樹青實服之化爲黄金君曰仙道有琅玕華丹服之化爲飛龍右此十七條在靈書紫文中並琅玕丹之所變化也君曰仙道有九轉神丹服之化爲白鵠右在茅司命傳中君曰仙道有天皇象符以合元炁亦在紫文中君曰仙道有白羽紫蓋以遊五岳君曰仙道有三皇内文以召天地神靈右世中雖有而非眞本君曰仙道有玉珮金鐺以登太極君曰仙道有神虎之符以威六天君曰仙道有流金之鈴以攝鬼神君曰仙道有素奏丹符以召六甲君曰仙道有金眞玉光以映天下君曰仙道有八景之輿以遊行上清君曰仙道有飛行之羽以超虚躡空君曰仙道有紫繡毛帔丹青飛裙君曰仙道有白羽黑翮以翔八方君曰仙道有翠羽華衣金鈴青帶君曰仙道有曲晨飛蓋御之體自飛在劒經中君曰仙道有三十七種色之節以給仙人君曰仙道之妙皆有方也能盡此道便爲九宫眞人不但登仙而已然道之多方各備則可知矣此蓋能爲盡一條之道便得九宫眞人若各各備具則爲太極眞人矣君曰今子既至心學道當以道授子耳然學者皆有師我之所師南岳松子松子爲太虚眞人左仙公谷希子爲右仙公昔太上以德教老子以得道松子以道授於我以得仙我之得道於松子今子欲學道彼必試子試而不過是我之恥也今既語子以得道之方又悟汝以試觀之法於此試而不過者亦子之愚也夫欲試之人皆意之所不悟情之所不及者而爲之子愼之哉君曰仙道十二試皆過而授此經此十二事大試也皆太極眞人臨見之可不愼哉君曰昔中山劉偉道學仙在嶓冢山積十二年仙人試之以石重十萬斤一白髮懸之使偉道卧其下偉道顔無變色心安體悦卧在其下積十二年仙人數試之無所不至已皆悟之遂賜其神丹而白日昇天此應是漢時人君曰昔青烏公者身受明師之教審仙妙之理至於入華隂山中學道積四百七十一歲十二試之有三不過後服金汋而升太極太極道君以爲試三不過但仙人而已不得爲眞人況俗意哉青烏公似是彭祖弟子也君曰大洞之道至精至妙是無英守素眞人之經其讀之者無不乘雲駕龍昔中央黄老君隱祕此經世不知之也子若知之祕而勿傳又昔周君兄弟三人并少而好道在於常山中積九十七年精思無所不感忽然見老公頭首皓白三人知是大神乃叩頭流血涕淚交連悲喜自摶就之請道公乃出素書七卷以與誦之兄弟三人俱精讀之奄有一白鹿在山邊二弟放書觀之周君讀之不廢二弟還周君多其弟七過其二弟内意或云仙人化作白鹿呼周視之周君不應周君誦之萬過二弟誦得九千七百三十三過周君翻然飛仙二弟取書誦之石室忽有石爆成火燒去書二人遂不得仙今猶在常山中陸行五嶽也子愼之哉君曰昔在庄伯微漢時人也少時好長生道常以日入時正西北向閉目握固想見崑崙積二十一年後服食入中山學道猶存此法當復十許年後閉目乃奄見崑崙存之不止遂見仙人授以金汋之方遂以得道猶是精感道應使之然也非此術之妙也君曰眞人隱其道妙而露其醜形或衣敗身悴狀如癡人人欲學道作此試人卒不可識也不識則爲試不過汝恒當愼此也昔漢初有四五小兒路上畫地戲一兒歌曰著青裙入天門揖金母拜木公到復是隱言也時人莫知之唯張子房知之乃徃拜之此乃東王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖王母君曰昔有傳先生者其少好道入焦山石室中積七年而太極老君詣之與之木鑽使穿一石盤厚五尺許云穿此盤便當得道其人乃晝夜穿之積四十七年鑽盡石穿遂得神丹乃升太清爲南嶽眞人此有志之士也子其識之若有此試愼勿言不能也君曰昔有黄觀子者亦少好道家奉佛道朝朝朝拜叩頭求乞長生如此積四十九年後遂服食入焦山太極眞人百四十事試之皆過遂服金丹而詠大洞眞經今補仙官爲太極左仙卿有至志者也非佛所能致是其中寸定矣此說與傅含眞奉佛事亦同君曰昔毛伯道劉道恭謝稚堅張兆期皆後漢時人也學道在王屋山中積四十餘年共合神丹毛伯道先服之而死道恭服之又死謝稚堅張兆期見之如此不敢服之并捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百歲今猶在山中遊行五嶽此人知神丹之得道而不悟試在其中故但陸仙耳無復登天冀也謝稚堅有三處出一云與葛玄相隨一云在鹿迹洞中一即是此未詳爲是一人當同姓名耳君曰晋初有眞人郭聲子在洛巿中作卜師時劉石張臧四姓並欲學道常自歎云不遇明師明師出而已不覺皆爲試不過皆無所得也常當愼此有異不覺便爲試不過也人有學道之心天網踈而不失皆並試人汝深思此意愼之也君曰昔閭成子少好長生好學道四十餘年後入荆山中積七十餘歲爲荆山山神所試成子謂是眞人拜而求道而爲大蛇所噬殆至於死賴悟之速而存太上想七星以却之因而得免後復爲邪鬼所惑失其左目遂不得道而絶山中子當愼此之試恒存於師也猶是成子用志不專頗有邪心故也君曰黄子陽者魏人也少知長生之妙學道在博落山中九十餘年但食桃皮飲石中黄水後逢司馬季主季主以導仙八方與之遂以度世此六國時魏非漢後魏世也君曰有劉奉林者是周時人學道在嵩高山積四百年三合神丹爲邪物所敗乃行徙入委羽之山能閉炁三日不息於今千餘年矣猶未升仙猶是試多不過道數未足故也此人但服黄蓮以得不死耳不能有所役使也君曰昔高丘子殷人也亦好道入六景山積五百二十餘歲但讀黄素道經服餌术後合鴻丹以得陸仙遊行五嶽二百餘年後得金液以升太清也今爲中嶽眞人此說與劒經序亦略同君曰爲道當令三關恒調是根精固骨之道也三關者口爲心關足爲地關手爲人關謂之三關三關調則五藏安五藏安則舉身無病昔趙叔期學道在王屋山中時時出民間聞有能卜者在巿閭中叔期徃見之因語叔期曰欲入天門調三關存朱衣正崑崙叔期知是神人因拜叩頭就請要訣因以一卷書與之是胎精中記拜受此書入山誦之後合神丹而升天此皆前事之徵者汝當識此言三關事與黄庭同並有說而無法君曰當存五神於體五神者謂兩手兩足頭是也頭想恒青兩手恒赤兩足恒白者則去仙近矣昔徐季道學道在鵠鳴山中亦時時出民間忽見一人着皮袴練褶拄桃枝杖逢季道季道不覺之數數非一季道乃悟而拜謝之因語季道曰欲學道者當巾天青咏大曆𨀅雙白徊二赤此五神之事也其語隱也大曆三皇文是也此即太素五神事也别有經法君曰欲使心正常以日出三丈錯手着兩肩上以日當心心中間暖則心正矣常能行之佳昔有姜伯眞者學在猛山中行道採藥奄值仙人仙人使平倚日中其影偏仙人曰子知仙道之貴而篤志學之而不知心不正之爲失因教之如此後遂得道定録目許先生云姜伯眞之徒不知即此姜不君曰常以夜半時去枕平卧握固放體氣調而微者身神具矣如有不具便速起燒香平坐閉目握固兩膝上心存體神使兩目中有白炁如鷄子大在目前則復故也五日一行之此即二十四神中事也君曰食草木之藥不知房中之法及行炁導引服藥無益也終不得道若至志感靈所存必至者亦不須草藥之益也若但知行房中導引行炁不知神丹之法亦不得仙也若得金汋神丹不須其他術也立便仙矣若得大洞眞經者復不須金丹之道也讀之萬過畢便仙也房中之術導引行氣世自有經不復一二說之此謂徒服藥存修而交接之事不絶亦不得長生非言都不爲者若都不爲止服藥皆能得仙經曰得道者皆隱穀虫之法而見三尸之術夫穀虫死則三尸枯三尸枯自然落矣殺穀虫自有别方得者祕之此即蘇傳中初神丸方也其餘雜法皆不及此也君曰人生有骨録必有篤志道使之然若如青光先生谷希子南岳松子長里先生墨羽之徒皆爲太極眞人所友或爲太上天帝所念者興雲駕龍以迎之故不學道而仙自來也過此以下皆須篤志也案此諸人學道皆有事迹並經辛懃而云不學自得其義未了墨羽應是墨翟亦或是木羽也君曰然則學道者有九患皆人之大病若審患病則仙不遠也患人有志無時有時無友有友無志有志不遇其師遇師不覺覺師不懃懃不守道或志不固固不能久皆人之九患也人少而好道守固一心水火不能懼其心榮華不能惑其志修眞抱素久則遇師不患無也如此則不須友而成亦不須感而動也此學仙之廣要言也汝當思此君曰夫喜怒損志哀慼損性榮華惑德隂陽竭精皆學道之大忌仙法之所疾也雖還精胎息僅而補之内虚已徹猶非本眞莫若知而不爲爲而不散此仙之要道生之本業也君曰欲得延年當洗面精心日出二丈正面向之口吐死炁鼻噏日精須鼻得嚏便止是爲炁通亦以補精復胎長生之方也君曰食愼勿使多多則生病飽愼使卧卧則心蕩心蕩多失性食多生病生病則藥不行欲學道者愼此未服食時也君曰式䂓之法使人目明久而徹視常以甲子之旬取東流清水合眞丹以洗目日向清明平旦二七過常行之佳此事一出二十四神中彼謂之拂童而用庚午日中時也君曰欲爲道者目想日月耳響師聲口恒吐死氣取生炁體象五星行恒如跚空心存思長生愼笑節語常思其形要道也君曰七五之法常當存之五者在身七者在經君曰世有下土惡强之鬼多作婦女以惑試人若有此者便閉炁思天關之中衡輔之星具身神正顔色定志意熟視其規中珠子濁不明者則鬼試也知鬼試則思七星在面前亦可在頭上以却之若規中方明者仙道人也悟者便拜之不悟爲試不過若遇邪而謂眞人亦是不過之例也子愼之焉邪正相亂此最試之難者君曰飲食不可卒斷但當漸減之耳十日令減一升則半年便斷矣斷穀自有方世多有者不復重說之世人之食桃檔以補身不知桃皮之勝也桃皮別自有方君曰斷穀入山當煑食白石昔白石子者以石爲糧故世號曰白石生此至人也今爲東府左仙卿煑白石自有方也白石之方白石生所造也又善太素傳所謂白石有精是爲白石生也此方在世君曰太素傳者道書也學此應奉太上老君上清皇人此皓然虚映景中之道非仙之尊也老子所謂谷神是也君曰王屋山仙之别天所謂陽臺是也諸始得道者皆諧陽臺陽臺是清虚之宫也欲入山者此山難尚也下生鮑濟之水水中有石精得而服之可長生此山在河内泌水縣即濟水所出之源也君曰大洞者神州是也神州别有三山三山有七宫七宫有七變朝化爲金日中化爲銀暮化爲銅夜化爲光或化爲山或化爲水或化爲石謂之七變七變有七經七經有二十一玉童隨此書故曰大洞眞經讀之萬過便仙此仙道之至經也君曰閬野者閬風之府是也崑崙上有九府是爲九宫太極爲太宫也諸仙人俱是九宫之官謂應作僚字耳至於眞人乃九宫之公卿大夫仙官有上下各有次秩仙有左右府而有左右公左右卿左右大夫左右御史也明大洞爲仙卿服金丹爲大夫服衆芝爲御史若得太極隱芝服之便爲左右仙公及眞人矣君曰有尸解乃過者乃有數種并是仙之數也尸解之仙不得御華蓋乘飛龍登太極遊九宫也此謂自然得尸解爲地下主者之類耳非云託化遯變之例也君曰陽丹九轉世人皆有此術不復說之此謂房中之事耳陽丹或應作隂丹君曰在人間學生唯當服藥子不斷穀則大洞未可得聞斷穀之法世自有方君曰吾欲說仙之妙論道之變化子必祕之愼識吾言也當謂後二條事君曰昔有郭崇子者殷時人也彭眞人之弟子嘗兄弟四人俱行爲惡人所擊傷其左臂三弟大怒欲取治之崇子曰無用笑而各去此人後仕宦而崇子譽致之數數非一此人乃徃謝之而猶譽不止其人曰我惡人也不可以受君子之施乃自殺後崇子得道太極眞人以爲有殺人之過不得爲眞人此蓋爲善之過尚招其弊況爲惡乎今時事亦多有類此者故以爲戒范零子少好仙道如此積年後遇司馬季主季主將入常山中積七年入石室東北解有石此作之葉反音即是大瓮也或可是石牖季主出行則語之曰愼勿開此如此數數非一零子忽發視下見其家父母大小近而不遠乃悲思季主來還乃遣之歸後復取之復使守一銅櫃又使勿發零子復發之如前見其家季主遣之遂不得道此事乃入不可思議之境然每當依此觸類愼之積功滿千雖有過故得仙功滿三百而過不足相補者子仙功滿二百者孫仙子無過又無功德藉先人功德便得仙所謂先人餘慶其無志多過者可得富貴仙不可冀也此一條功過之標格也可不勉乎右道授卷訖此右一卷有長史書又掾書眞誥卷之五
