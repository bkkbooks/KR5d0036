  text: 重刋道藏輯要
  hash: sha256:972c3c5029b24a17e27f2b03a7e86d4422a7e71d4455eb70dca445dd908b9848
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_YP-C_20ziji-02-0001a, image: JY237/20ziji-02-0001a.png}
body:
  text: 眞誥貞白眞人華陽隱居陶弘景著協昌期第一經曰行事時北向執隱書而爲之者謂始學眞妙未涉微遠不解星位之首向不識玄斗之指建故當北向執書以漸求之耳若旣解書意識星轉之隨時自宜隨斗所指按而存步如此則無有常向不爲皆向北也夫一切北向自爲始學者耳恐此將可以意通觸類不足復問邪此答長史諮飛步經中北向執書意也太上眞人步五星之道以致五星降室閇氣上綱當先呼五星星夫人名字畢乃越綱蹈星謂始上綱便頓住呼名字呼名字畢乃越綱蹈星耳若每至星上得復重心呼所至星處之名字益其佳也若其煩重難常但可案舊而行耳昔鬱沙公北里子長陵老人皆案此法而得升天不以煩難爲辭也所謂治生者矣商販之汲汲豈憚險難哉所期唯錢貨而已耳若使求道者常如賈販之用心亦有何不得仙耶但惜初學者皆言專心盡懃至而後漸懈縱有亦似車之將故而百節緩落又似負重之牛造遠足蹇夫學者之所患而爲得者之所笑皆如此輩事耳苟能心研內鏡者是爲感發乎神將有靈人發子之蒙㩦辰景之輿矣此答諮步五星法也經圖唯言隨綱往還又有一法云越綱蹈星今卽是訣此事也奬戒之言實爲切至五星圖布常向南也以太白位在西歲星位在東案而施之所以爾者五星隱伏縱橫無常不如北斗列象恒在故一以定位於五方不得隨星之所在也此答諮施安五星圖也經中無旨訣所以宜問三八景二十四神以次念之亦可一時頓存三八亦可平旦存上景日中存中景夜半存下景在人意爲之也若外身幽巖屏絶人事內念神關攝眞納氣將可平旦頓存三八景二時又各重存一景益當佳也但人間多事此煩難常行耳事不得常爲益自薄西城王君桐栢上眞皆案此道也案苞玄玉籙白簡青經云不存二十四神不知三八景名字者不得爲太平民亦不得爲後聖之臣此答諮二十四神經中修存之意亦是祕訣右此四訣事今有長史所寫本不知此因楊諮何眞若非東卿則紫微南眞也太上眞人撰所施行祕要長史寫本有題如此此猶是眾眞授說經中所可修用還童反白諸要事令長史施行之耳非成事一卷經也太素丹景經曰一面之上常欲得兩手摩拭之使熱高下隨形皆使極匝令人面有光澤皺班不生行之五年色如少女所謂山川通氣常盈不没先當摩切兩掌令熱然後以拭兩目畢又順手摩髮而謂應作如字理櫛之狀兩臂亦更互以手摩之使髮不白脈不浮外右一條出丹景經中卷此經未出世是下眞品目大洞眞經精景案摩篇曰卧起當平炁正坐先叉兩手乃度以掩項後因仰面視上舉項使項與兩手爭爲之三四止使人精和血通風氣不入能久行之不死不病畢又屈動身體申手四極反張側掣宣搖百關爲之各三此當口訣此運動應有次第法用故須口訣益亦熊經鳥伸之術也卧起先以手巾若厚帛拭項中四面及耳後使圓匝熱温温然也順髮摩項若理櫛之無數也良久摩兩手以治面目久行之使人目明而邪氣不干形體不垢𦡸此應作膩字生穢也都畢乃咽液二十過以導內液右一條出大洞精景經上卷亦未出世非三品目消魔上靈經曰若體中不甯當反舌塞喉漱漏咽液亦無數須臾不甯之痾自卽除也當時亦當覺體中寬軟也右一條出消魔上靈叙中亦未出世非三品目應是智惠七卷中事右前三條不顯誰之所授消魔經上篇曰耳欲得數按抑其左右亦令無數令人聰徹所謂營治城郭名書皇籍又曰鼻亦欲得按其左右唯令數令人炁平所謂灌溉中嶽名書帝籙右此二條法方丈臺昭靈李夫人出用此云消魔上篇亦應同是前限太上籙渟發華經上案摩法常以生氣時咽液二七過畢按體所痛處向王而祝曰左玄右玄三神合眞左黃右黃六華相當風氣惡疫伏匿四方玉液流澤上下宣通内遣水火外辟不祥長生飛仙身常體强畢又咽液二七過常如此則無疾又當急按所痛處二十一過右一條滄浪雲林宫右英王夫人所出籙渟經亦未出世非三品目丹字紫書三五順行經曰坐常欲閉目內視存見五藏腸胃久行之自得分明了了也此經中眞品目石景赤字經曰常能以手掩口鼻臨目微炁久許時手中生液追以摩面目常行之使人體香此經非三品目紫度炎光內視中方曰常欲閉目而卧安身微氣使如卧狀令傍人不覺也乃內視遠聽四方令我耳目注萬里之外久行之亦自見萬里之外事精心爲之乃見百里之外事也又耳中亦恒聞金玉之音絲竹之聲此妙法也四方者總其言耳當先起一方而內注視聽初爲之實無彷彿久久誠自入妙此經下眞品目太上天關三經曰常欲以手按目近鼻之兩眥閉炁爲之炁通轍止吐而復始恒行之眼能洞觀此經下眞品目云天關三圖疑闕圖字右四條玄師所敕用玄師卽南眞夫人此四經並未出世清靈眞人說寶神經長史寫本亦題如此此指是前一事之目耳其後並眾眞雜說標題有前後之異猶是眞誥之例今人皆別呼實神經寶神經豈得下教耶此唯是一片鈔耳耶夫注心道眞玄想靈人冥冥者亦具監其意也若外難未披假詠兼存實復未能迴西榆之年還發玄童矣苟躭玄篤也志之懃也縱令牙彫面皺頂生素華者我道能變之爲嬰在須臾之間耳但問志之何如爾老少之學無所在也吾往卽其人也說此諸事皆是令告長史也求道要先令目清耳聰爲事主也且耳目是尋眞之梯級綜靈之門戸得失繫之而立存亡須之而辦也今鈔徑相示可施用也此謂寶神經中要徑之事故云鈔徑道曰常以手按兩眉後小穴中三九過又以手心及指摩兩目權上以手旋耳行三十過唯令數無時節也畢輒以手逆乘額上三九過從眉中始上行入髮際中口傍咽液多少無數也如此常行目自清明一年可夜書亦可於人中密爲之勿語其狀眉後小穴中爲上元六合之府主化生眼暉和瑩精光長珠徹童保鍊目神是眞人坐起之上道一名曰眞人常居內經眞諺曰子欲夜書當修常居矣眞人所以能旁觀四達使八霞照朗者實常居之數明也目下權上是決明保室歸嬰至道以手旋耳行者採明映之術也旋於是理開血散皺兆不生目華玄照和精神盈矣夫人之將老鮮不先始於耳目也又老形之兆亦發始於目際之左右也以手乘額上內存赤子日月雙明上元歡喜三九始眉數畢乃止此謂手朝三元固腦堅髮之道也頭四面以兩手乘之順髮就結唯令多也於是頭血流散風濕不凝都畢以手按目四眥二九過覺令見光分明是檢眼神之道久爲之得見百靈凡修行此道及卷中諸雜事並甚有節度悉以別撰在登眞隱訣中今不可備皆注釋懃而行之使手不離面乃佳以成眞人猶不廢也欲行此道皆盟金爲誓金之多少在人盡誠而設耳不徒爾苟行而已眞官曰欲聞起居金爲盟書謂非其人而不傳授也此道出太上寶神經中此經初不下傳於世也當來爲眞人者時有得者反白之要事盡於此盟信旣定無科謂受此宜用金鐶二雙紫微夫人喻書如左紫微是承裴君說寶神經畢仍復更接論寶神事如此則裴所說亦同此夕夜卧覺常更叩齒九通咽液九過畢以手按鼻之邊左右上下數十過微咒曰太上四明九門發精耳目玄徹通眞達靈天中玄臺流炁調平驕女雲儀眼童英明華聰晃朗百度眇清保和上元徘徊九城五藏植根耳目自生天臺鬱素柱梁不傾七魄澡鍊三魂安甯赤子携景輒與我并有敢掩我耳目太上當摧以流鈴萬凶消滅所願必成日月守門心藏五星眞皇所祝羣響敬聽卧覺輒按祝如此勿失一卧也眞道雖成如我輩故常行之也但不復卧自坐爲之耳此太上寶神經中祝辭上道也令人耳目聰明强識豁朗鼻中調平不垂津洟四響八徹面有童顏制魂錄魄卻辟千魔七孔分流色如素華眞人起居之妙道也所以名起居者常行之故也畢又咽液九過摩拭面目令少熱以爲常每欲數也興甯三年歲在乙丑六月二十三日夜喻書此其夕先共道諸人多有耳目不聰明者欲啓乞此法卽夜有降者卽仍見喻也此楊君自記也長史年出六十耳目欲損故故諮請楊不欲指斥託云諸人耳又告云道士耳重者行黃赤炁失節度也不可不愼此蓋指戒長史也右一條清靈言櫛頭理髮欲得多過通流血氣散風濕也數易櫛更番用之也亦可不須解髮也右一條紫微夫人言太極綠經曰理髮欲向王地旣櫛髮之始而微祝曰泥丸玄華保精長存左爲隱月右爲日根六合清鍊百神受恩祝畢咽液三過能常行之髮不落而日生常數易櫛櫛之取多而不使痛亦可令侍者櫛取多也於是血液不滯髮根常堅右一條安九華所告令施用此二條皆駐白止落之事亦是令答示長史也紫微夫人喻曰披華蓋之側延和天眞入山澗之谷填天山之源則虛靈可見萬鬼滅身所謂仰和天眞俯按山源也華蓋一名華庭也天眞是兩眉之間眉之角也山源是鼻下人中之本側在鼻下小入谷中也華庭在兩眉之下是徹視之津梁天眞是引靈之上房旦中暮恒咽液三九過急以手三九陰按之以爲常令致靈徹視杜遏萬邪之道也一日三過行耳紫微夫人言人有卒病垂死者世中凡醫唯知針人中不知針山源谷中此太謬也本注從此注起是楊接長史書也按而祝曰開通天庭使我長生徹視萬里魂魄返嬰滅鬼卻魔來致千靈上升太上與日合并得補眞人列象玄名楚莊公時此卽春秋時楚莊王也市長宋來子恒洒掃一市久時有一乞食公入市經日乞恒歌曰天庭發雙華山源彰陰邪清晨按天馬來詣太眞家眞人無那隱又以滅百魔恒歌此乞食一市人無解歌者獨來子忽悟疑是仙人然故未解其歌耳乃遂師此乞食公棄官追逐積十三年此公遂授以中仙之道來子今在中嶽乞食公者西嶽眞人馮延壽也周宣王時史官也手爲天馬鼻下爲山源六月二十七日夜喻書此楊接書訖此雲林王夫人曰仙眞之道以耳目爲主淫色則目闇廣憂則耳閉此二病從中來而外奔也非復有他矣今令人聰明益易耳但不爲之者行之難欲得上通徹映旁觀鬼神當洗心絶念放棄流淫所謂嚴其始矣夜卧先急閉目東向以手大指後掌各左右按拭目就耳門使兩掌俱交會於項中三九過存目中當有紫青絳三色氣出目前此是內按三素雲以灌合童子也陰祝曰眼童三雲兩目眞君英明注精開通清神太玄雲儀靈驕翩翩保利雙闕啓徹九門百節應響朝液泥丸身升玉宮列爲上眞凡四十八字祝畢咽液五十過畢乃開目以爲常坐起可行之不必夜也要以生炁時一年許耳目便精明久爲之徹視千里羅映神靈聽於絶響者也此亦眞仙之高道不但明目開耳而已夫欲學道者皆當不欲令人知見所聞每事盡爾太上宮中歌曰手把八雲氣英明守二童太眞握明鏡鑒合日月鋒雲儀拂高闕開括泥丸宮萬響入百關驕女坐玄房愈行愈鮮盛英靈自爾通此歌正言耳目之經也我滄浪方丈仙人常寶而爲也此道出太上四明玉經中傳行以青金爲誓然後乃施行耳右此並是右英夫人受令告長史也又用盟信兼有青帛令亦宜依准立格乃得受傳耳謂青可二十尺金鐶二雙此四明玉經三品元目也閉炁拜靜百鬼畏憚功曹可見與語謂久行之耳七月二日南嶽夫人喻燒香時勿反顧忤眞炁致邪應也入靜戸先前使人通達上聞臨食上勿道死事洗澡時常存六丁令人所向如願理髮欲向王地旣櫛髮之初而微呪曰泥丸玄華保精長存右爲隱月左爲日根六合清鍊百神受恩祝畢咽液三過此一條猶是安妃所說無異但不知何者前後耳按以日月推此則是後也右四條南嶽夫人喻正一平經曰閉氣拜靜使百鬼畏憚功曹使者龍虎君可見與語謂能精心久行之耳泰清家有正一平炁今此悉載拜靜眾事必應是泰清經恐脫炁字也又曰燒香時勿反顧反顧則忤眞炁使致邪應也又曰入靜戸先前右足著前後進左足令與右足齊畢乃趍行如故使人陳啓通達上聞又曰臨食上勿道死事勿露食物來眾邪炁又曰數澡洗每至甲子當沐不爾當以幾月旦使人通靈浴不患數患人不能耳蕩鍊尸臭而眞炁來入右玄師所敕使施用右六條與前所說大同小異者是受旨是略記今更詳記寫此并益後二條以示長史也右十條並長史寫服仙藥常向本命服畢勿道死喪凶事犯胎傷神徒服無益東卿司命君此一條本在受明堂玄眞法後右一條楊書太上九變十化易新經曰若履淹穢及諸不靜處當洗澡浴與解形以除之其法用竹葉十兩桃皮削取白四兩以清水一斛二斗於釜中煑之令一沸出適寒温以浴形卽萬淹消除也旣以除淹又辟濕痺瘡癢之疾且竹虛素而內白桃卽卻邪而折穢故用此二物以消形中之滓濁也天人下遊旣反未曾不用此水以自蕩也至於世間符水祝漱外舍之近術皆莫比於此方也若浴者益佳但不用此水以沐耳鍊尸之素漿正宜以浴耳眞奇祕也下眞品目有九化十變疑此目是例言也紫微王夫人所敕用右一條長史寫受洞訣施行太丹隱書存三元洞房者常月月朝太素三元君以正月九日二月八日三月七日四月六日五月五日六月四日七月三日八月二日九月一日十月十日十一月十一日十二月十二日夜於寢靜之室北向六再拜訖稽首跪曰謹啓太上大道高虛玉晨太素紫宫八靈三元君中央黃老無英白元太帝五老高眞上仙太極皇精三皇君大洞三景弟子某謹以吉日之夜天關九開之間上聞太上玉皇眞君乞得長生世上壽無億年時乘黃晨緣蓋龍轅上詣紫庭役使萬神侍衛四明畢勿令人知也此一條掾寫右四朝太素三元君法以吉日夜半時太上大道玉晨君常以正月四日二月八日三月十五日四月八日五月九日六月六日七月七日八月八日九月九日十月五日十一月三日十二月十二日登玉霄琳房四眄天下有志節遠遊之心者子至其日平旦日出時北向再拜亦可於靜中也自陳本懷所願畢因咽液三十六過長史寫東海青童君常以丁卯日登方諸東華臺四望子以此日常可向日再拜日出行之可因此以服日精又掾寫右紫虛元君所出右此三事并上學隱朝之法其經并不顯世故南眞出之亦是令長史遵用也右三條有長史掾共書同在一紙上常以二月二日三月三日八月八日九月九日十月十日夜於寢室存思洞中訣事而獨處不眠者吉也其夕衛經玉童玉女將太極典禁眞人來於空中而察子也是其夜常燒香精苦有如所待者也坐卧存思或讀書念眞在意爲之唯不可以其夕施他事非求道之方耳若兼愼於其日益善匪唯守夜矣受洞訣之始常當修此好以爲意也數遇惡夢者一曰魄妖二曰心試三曰尸賊厭消之方也若夢覺以手躡人中二七過琢齒二七遍微祝曰大洞眞玄張鍊三魂第一魂速守七魄第二魂速守泥丸第三魂受心節度速啓太上三元君向遇不祥之夢是七魄遊尸來協萬邪之源急召桃康護命上告帝君五老九眞皆守體門黃閣神師紫戸將軍把鉞搖鈴消滅惡津反凶成吉生死無緣畢若又卧必獲吉應而造爲惡夢之氣則受閉於三關之下也三年之後唯神感旨應乃有夢也夢皆如見將來之明審也略無復惡占不祥之想矣長史作惡字皆酉下心其義與西下心亦同但謂西方金炁之心剛惡也若夜遇善夢吉應好夢而心中自以爲佳則吉感也卧覺當摩目二七叩齒二七遍而微呪曰太上高精三帝丹靈絳宫明徹吉感告情三元柔魄天皇授經所向諧合飛仙上清常與玉眞俱會紫庭畢此太洞祕訣以傳於始涉津流者矣右此三事亦是洞房太丹家事眞經亦未顯世今世中經乃粗有其事皆增損不同右三條有長史寫已上符本朱畫明堂內經開心辟妄符王君撰用開日旦向王朱書再拜服之祝曰五神開心徹聽絶音三魂攝精盡守丹心使我勿妄五藏遠尋拜畢祝祝畢乃服服畢咽液五過叩齒五通勿令人見兩妄字謂皆應作忘若不用開日以月旦月十五日二十七日一月三服一年便驗祕術也右符及此三條有長史掾寫兩本掾朱書東卿司命曰先師王君昔見授太上明堂玄眞上經清齋休粮存日月在口中晝存日夜存月令大如環日赤色有紫光九芒月黃色有白光十芒存咽服光芒之液常密行之無數若不修存之時令日月還住面明堂中日居左月居右令二景與目童合炁相通也此道以攝運生精理和魂神六丁奉侍天兵衛護此上眞道也太上玄眞經先盟而後行行之然後可聞玉佩金璫之道耳季偉昔長齋三年始誠竭單思乃能得之於是神光映身然後受書耳此玄眞之道要而不煩吾常寶祕藏之囊肘故以相示有愼密者也明堂玄眞自有經經亦少耳大都口訣正如此而行之偉昔亦不得經但按此而行始乃得經耳爾欲得可就偉取玉佩隱書非偉所見耳夜行及冥卧心中恐者存日月還入明堂中須臾百邪自滅山居恒爾此爲佳右此是說玄眞經存之法其大經在茅傳中右三條楊書太虛眞人南嶽赤君內法曰以月五日夜半時存日象在心中日從口入也使照一心之內與日共光相合會畢當覺心暖霞暉映驗良久乃祝曰大明育精內鍊丹心光暉合映神眞來尋畢咽液九過到十五日二十五日二十九日復作如上使人開明聰察百關鮮徹面有玉光體有金澤行之十五年太一遣寶車來迎上登太霄行之務欲數不必此數日作也右一條出太上消魔經中此經亦未出世右一條長史寫東華眞人服日月之象上法男服日象女服月象日一不廢使人聰明朗徹五藏生華魂魄制鍊六府安和長生不死之道此兩字是摹眞本朱書右書日月象法亦可圓書日也右一條楊書右此二法不審是何眞所受漢孝明皇帝夢見神人身長丈六項生圓光飛在殿前欣然悅之遍問朝廷通人傅毅對曰臣聞天竺國有得道者號曰佛傳聞能飛行身有白光殆其神乎帝乃悟卽遣使者張騫羽林郎秦景博士王遵等十四人之大月氏國採寫佛經四十二章祕蘭臺石室第十四卽時起洛陽城西門外道北立佛寺又於南宫清涼臺作佛形像及鬼子母圖帝感非常先造壽陵亦於殿上作佛象是時國豐民安遠夷慕化願爲臣妾佛像來中國始自明帝時耳此說粗與外書同而長安中似久已有佛裴君卽是其事且佛法乃與天竺罽賔而月氏無有與此爲異今旣欲說小方諸奉佛故先宜叙此也按張騫非前漢者或姓名同耳傅毅字仲武見漢書秦景王遵等不顯此寺名白馬寺明帝乃葬顯節陵此云壽陵者漢諸帝在位時皆預造壽陵猶今世人作壽冢非陵名也外書記亦云遣侍中張堪或云郎中張愔並往天竺寫致經象并沙門來至又恐今此說未必是眞受猶可楊君疏舊語耳但眞經誥中自亟有論及佛事也方諸正四方故謂之方諸一面長一千三百里四面合五千二百里上高九千丈有長明太山夜月高邱各周迴四百里小小山川如此間耳但草木多茂蔚而華實多蒨粲饒不死草甘泉水所在有之飲食者不死青君宫在東華山上方二百里中盡天仙上眞宫室也金玉瓊瑤雜爲棟宇又有玄寒山山上別爲外宫宫室周二百里中方諸東西面又各有小方諸去大方諸三千里小方諸亦方面各三百里周迴一千二百里亦各別有青君宫室又特多中仙人及靈鳥靈獸輩大方諸對會稽之東南小看去會稽岸七萬里東北看則有湯谷建木鄉又去方諸六萬里方諸是乙地湯谷是甲地則自寅至辰十萬里方五隅七言之邪角十四萬里故去會稽七萬里也大方諸之西小方諸上多有奉佛道者有浮圖以金玉鏤之或有高百丈者數十曾謂應作層字樓也其上人盡孝順而不死是食不死草所致也皆服五星精讀夏歸藏經用之以飛行按夏曰連山殷曰歸藏與此不同依如三弟子雖奉佛道不作比邱形服世人謂在眞菩薩家耳大方諸之東小方諸上多奇靈寶物有白玉酒金漿汧青君畜積天寶之器物盡在於此亦多有仙人食不死草飲此酒漿身作金玉色澤常多吹九靈簫以自娛樂能吹簫者聞四十里簫有三十孔竹長二三尺九簫同唱百獸抃舞鳳凰數十來至和簫聲大方諸宫青君常治處也其上人皆天眞高仙太極公卿諸司命所在也有服日月芒法雖已得道爲眞猶故服之霍山赤城亦爲司命之府唯太元眞人南岳夫人在焉李仲甫在西方韓眾在南方餘三十一司命皆在東華青童爲太司命總統故也楊君亦云東軫執事不知當在第幾住耳直存心中有象大如錢在心中赤色又存日有九芒從心中上出喉至齒間而芒此字儳非眞徊還胃中如此良久臨目存此字儳非眞見心胃中分明乃吐氣嗽液三十九過止一日三爲之行之一年疾病除五年身有光彩十八年必得道行日中無影辟百鬼千惡災氣恒存日在心月在泥丸中夜服月華如服日法存月十芒白色從腦中下入喉芒亦不出齒間而迴入胃右此方諸眞人法出大智慧經上中篇常能用之保見太平此卽應是消魔智慧七篇之限也右南極夫人所告行此日在心月在泥丸之道謂省易可得旨行無中廢絶者也除身三尸百疾千惡鍊魂制魄之道也日月常照形中則鬼無藏形青君今故行之吾則其人也今以告子子脫可密示有心者耳行此道亦不妨行寶書所服日月法也兼行益善善也仙人一日一夕行千事初不覺勞明懃道之至生不可失矣寶書日月卽謂紫文所用者右西城王君告此並告楊君令以示諸許也爲道當如射箭箭直往不顧乃能得造堋的操志入山唯往勿疑乃獲至眞玄清告按南極西城玄清二高眞未當有餘降受唯戒及詩各一條耳不審此當是何時所喻右八條並楊書行此四道按玉玄上法一年便驚視聽自可懃之舉之無疑中君此事失前紙不知是何法也太極眞人云讀道德經五千文萬遍則雲駕來迎萬遍畢未去者一月二讀之耳須雲駕至而去右二條某書山世遠受孟先生法暮卧先讀黃庭內景經一過乃眠使人魂魄自制鍊恒行此二十一年亦仙矣是爲合萬過夕得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道也此一十一年夕一過不得萬遍一恐應爲七或爲八字不爾夕則二三過耳存五星當謹按八素以王星爲始存以生氣時若不王星先出者故宜不先存王也至於視星入室任意耳唯以懃感爲上耳亦不必須都見星然後速通也視之亦審耳清靈君告存思要法當覺目睹五星於方面並乘芒而下行我然後依王星下而存王星但吞咽一芒畢又當鎮星下又存鎮星良久總五星各一芒使俱入口而咽之如鎮星星過數也此一事異法經中無此說若頓存五星自當依常法不心存對星下也依此言則後是單修法也六月一日夜青靈眞人言右四條楊書青當爲清也日中五帝字曰日魂珠景昭韜綠映迴霞赤童玄炎飈象凡十六字此是金闕聖君採服飛根之道昔受之於太微天帝君一名赤丹金精石景水母玉胞之經右英云珠圓會暉韜綠凝日霞煥明赤童秉靈玄炎散光飈象鬱清此日之勢也神之威也此說按紫文曰日魂事義旨不正可領右二條厶書扶晨始暉生紫雲映玄阿煥洞圓光蔚晃朗濯耀羅眇眇靈景元森灑空清華九天館玉賔金房煙霄歌右大洞眞經中篇今鈔數行今洞經亦有此四句外國呼日爲濯耀羅方諸眞人呼日爲圓羅曜夢見此濯耀羅者日之應也紫雲中人者胎宫神也玄眞之道矣日德廕澤長生之象紫雲罔晨魂魄安也身康神甯從此始矣辭四通已呈意氣安和此楊君自與長史書語耳右英疏大洞眞經言以釋夢濯耀羅之義也如别此亦自語也長史夢事不顯右四條楊書
