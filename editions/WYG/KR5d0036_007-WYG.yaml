body:
  text: 眞誥卷七梁陶𢎞景撰甄命授第三體已此一字後人儳益標髙運味𤣥咀眞呼引景曜凝静六神煥領八明委順靈根寳鍊三度養液和魂假使衝風繁激將不能伐我之正性也絶飈勃藹焉能廻己之清淳耶爾乃空沖自吟虚心待神營攝百絶栖澄至真當使憂累靡干於𤣥宅哀念莫擾於絳津也淡泊眇觀顧景共歡於是至樂自鎗零聞於兩耳雲璈虛彈乎空軒也口挹香風眼接三雲俯仰四運日得成真視盼所涯皆已合神矣夫真人之得真每從是而獲耳不真而強真亦於此而顛蹷也復使愆痾填籍憂哀塞抱經營常累憑惜外道和適羣聽求心俗老忽發哀音之兮此作奚胡音猶今小兒啼不止謂為咳呱也長悼死沒以悲逝必精滅神離三魂隕炁邪運空間魄告魍魎乗我虚陣造遘百祟何可握生道以奔於死房陶靈風而踐於尸室擲已吉象投之凶乎已聞髙勝而故由豫屢覩明科而釋疑遂羅洿上章使臭染𨼆書四極擊鼓三官尋誓信云何而忘太初於焉而遊神虎奮爪毒龍効牙八方誠曠遏謂應作曷字處而逃身謝之後方悟清僚之可羡言者之不虚矣且哀聲亂真干忤正炁明君胡不常處福鄉於此振衣而歸室乎正月十一日夜安妃告此一條是寅年正月九華告楊君相譏誚之事故南真後復有所論也楊書真人歸心於一正道炁標任於永信心歸則正神和信順則利貞兆此自然之感對初無假於兩際也夫惑生是非嫌遘疑似潜滯於中抱閒心裏外握察觀之炁内有緼結之哂遺初覺於建始乖𤣥梯而密猜者有如此徒我見其敗未見其立矣蓋有懐而懼者豈獨一人哉二月三十日夜南嶽夫人告許長史可以示同炁而堕惑者此是授長史今説喻楊君勿疑九華之事也楊書故望洪濤之暨天則知其不起乎洿池之中矣覩𤣥翰之汪濊則知其不出乎章句之徒也紫㣲言衆藻集而龍章成羣聲㑹而雲韶諧辛酸偹則嘉味和耳中候夫人答此二辭乃出抱朴子外篇博喻中後復有此例當是衆真借取以譬而用之猶如所稱周易毛詩中語耳彼人何如梁伯鸞乎中候言彼人當是指長史也梁氏徳狹也此子蕭條氣逺甚矣夫垂䕃萬畆者必出峻極之嶺滔天振岑者必發板桐之源洪哉積隂徳之賢有似邠人也紫㣲答邠即豳國以比周太王也自䕃以下至板桐之源亦是博喻中語唯改襄陵作振岑彼愈北而聰明愈閉右英言聰者貴於理道音於千載之外而得興亡之迹矣逸驎逍遥於太荒之表故無羈絡之憂靈羽振翅於𤣥圃之峰以遺羅絙之患何其識吉凶哉保命仙人答此復是博喻兩篇合為今語而改機穽作羈絡靈鶻作靈羽罩羅作羅絙耳尋飛絶影之足而不能騁逸於吕梁淩波泳淵之屬而不得陟峻攀危彼子誠可才異也安能内攝哉輔機者欲仁人也徳欲茂矣繁林蘙薈則羽族雲萃𤣥淵浩汗則鱗羣競赴若其宅心者衆將何事於近紫㣲言右八條楊書又有掾寫有道者皆當深研靈奥栖心事外但思味勤篤糟粕餘物亦足自了耳桐柏真人言夫清淨未若東山養真未若幽林栖形景而虚上逺風塵之網纒於是榮辱之羅何足以羈至士耶右二條楊書夫金玉山積猶非我也胠箧之擔往矣猶非已也榮冕之盛陳矣猶非貴也采艶之芬華矣猶非真也能消而蕩之則滛之心亡也鄙滯之門閉矣尚真之覺漸也千謂應作阡字陌之情見矣如其不爾四者皆成内賊之害外為驩兠之患不去之不散無所復營措於其間矣亦無事趣當爾也戒長史也此三字本朱書亦應是右英夫人言也為道者實有勤苦斯人也可謂必得之矣右二條長史掾書夫學道者當得專道注真情無散念撥奢侈保沖白寂然如密有所覩熙然如潜有所得專專似臨深谷戰戰如履於氷炭始得道之門耳猶未得道之室也所謂為難者學道也所謂為易者學道也寂𤣥沈味保和天真注神栖靈躭研六府惜精閉牝無視無聽此道之易也即是不能行此者所以為難許侯研之哉斧子瑩之哉右右英所道令䟽彼君勤其事者有獲福者多也墮謂應作隳字之者禍敗積矣范帥言不知道誰應是鬼帥范疆矣右二條有掾書昔因華氏累白書敬靈道髙邈音饗冥絶仰瞻九霄注心罔墜矜逮不遺特䝉酬告雲華斐暢玉音粲發誘導恂恂啓悟丹至披覽欣欣五情恱懌某志好有年未獲厶厶缺失二字别本作尅遂恭黨幽晦始覩天日靈真厶此缺失一字别本作㣲字疑非請訓誨交湊尅已補過思釋鄙滯夙興勤惕悟寐自厲庶幾積誠卒獲㣲感𤣥運既㑹奉覲有期忽疑長此一字良為厶厶缺失二字别本作延仰生染迷俗沈溺塵昧不達上真謂道盡此決欲習性以静之損厶缺失一字四字朱書以寳之非為色欲厶缺失一字多而患在難厶缺失一字至於水火之戒氷炭之喻朗然照豁敬承清䂓務損之又損之厶謂應是以字至於死灰也歎覺悟之不早恨知機之將晚用火之言其㫖頗㣲思之觸𩔖良追愧悚昔憑頼華氏每輙奬勸願其有成得見陶冶而躭味華競蹈道不篤恒欲與共清閒使意盡言苦而已趣向不同密言難遇然喁喁之懐要欲獻其丹欵矣不審故可復有冀不此二書長史答先因通華僑意似酬前書而又言用火之言此授今闕右二條厶書茅小君去五月中失日有言云華僑漏泄天文妄說虚無乃今華家父子被考於水官華僑之失道由華騎之佞亂破壊其志念華團華西姑者三官因之以試觀試遂不過僑於是得有死罪故名簡早削奪尋輸頭皮於水官也可宻尋彼家有此人名不是誰者此前並是酬問華氏事不知是子年丑年耳許朝者暴殺新野郡功曹張煥之又枉煞求龍馬此人皆看尋際㑹比告訴水官水官逼許斗使還其丘墳伺察家門當衰之子欲以塞對觧逼示彼訟者耳是斗亡月亡日其應至矣君自受命當能治滅萬鬼羅制千神且欲視君之用手耳欲令無他者宜以此日詣斗墓叱攝煥等制敕左官使更求考代震滅爭源也可勿宣此當言我假威於君矣不知君宜往試攝滅之耳滅鬼之迹事中蹔應爾六月十六日夜小君授書此此令楊君為長史家攝遏冡訟也許朝先為南陽郡故得殺新野人而此三人事不出周魴誥先生中當是四十三條限也斗為仙品而猶被水官之逼者是䘮服中殃氣尚相關渉故也紙三百酬鬼帥王延近報錄書以杵宗㑹有功油三斗酬鬼帥傅晃近與功曹使者令勢威照鬼形使不得暴青絹三十尺酬鬼帥范疆近執載百惡滅訟散禍有功銀叉三枚酬鬼帥深衛近防䕶疾者招魂安神使冢訟不行有殊功右四條詭以六月十三日小茅君假作玉斧之形以夢告於虎牙使令夫婦明輸此四種詭以酬四帥之禽鬼者何以不復憶此可餘問餘問謂令與同勿怱怱耳非使此四鬼帥本亦道家之祭酒也得下觧法受書為鬼帥耳既有酬詭後長為已用心也所以夢假於玉斧之形者虎牙魂魄未得通接仙真故也玉斧清淨藻潔乆齋濯魄心近於仙故假象以通夢也通夢而猶不悟可謂信之不篤或悟而忘其詭可謂篤而不思夫詭誓者悉皆受命宻交慎不可令人知外書云我聞有命不可以示人乎毛詩揚之水篇云我聞有命不可以告人當謂此也六月三十日夜小君授書宻宻示之真司科云有用力於百鬼騁帥御於天威者宜湏此詭地下主者解下道之文官地下鬼帥觧下道之武官文觧一百四十年一進武觧二百八十年一進武觧一觧之下者也夫心動於事慾兼味於清正華目以隨世而畏死以希仙者皆多作武觧也此武觧之目世中諸人多有相𩔖宜服五飲丸去水注之氣可急合不但治疾而已亦以住白而有氣色也六月二十三日夜南嶽夫人告長史素患淡飲比來疾動故有此告五飲丸即是世中者耳精合五飲丸當大得力且可自静息乎范安逺所言語許長史無所憂不煩此詭可還之右保命君語許侯勿憂嗣伯之詭且還之右右英夫人語小君曰我二人吏兵恐宜詭謝獻以體上之宻寳不爾小子後不肯復為爾用力也許厚之徒也許子所頼在其弟許牙所頼在其父佳事不可忘也惡事不可忘也又為寳宻闗達機宻銀亦為次寳也其今多情彌精耳後勿復數爾勞損其神右小茅君㖟所言許賤者戴石子之女也為讐家薛世等所殺又世殺賤抱小兒阿寜賤今在水官與兒相随骸骨流漂亦訟在三官求對考今生人也寜見殺時頭先患瘡瘡流面目檢譜不見戴賤當是婦人不顯名七月二日夜小君授書其夕長史亦得此夢字也真書多如此死生之機得失之㑹蓋更切耳何不逺存𤣥味躭虚標流乎求之近應應愈賖也此亦入失之路耳想體尚髙韻不細求之於毫末矣七月二十六日夜紫㣲夫人授作令與許長史右從小茅君來凡十八條楊書七月二十七日禺中許主簿華侯當入静中爾時無復所有為防未然耳近不得以疾篤告者我慎法之故且世人知未病之困必泄三官之禁則累加漏身増瘵絶疾今何乃用憂之甚耶名身誰親蓋宜思之縱令以小代大如父何如大小俱來於母何如衰自己身訟自家人耳三官自有成事憂惋亦無所解自非齊達於内外者將不得不懼悸今月六日是赤孫絶日先處事耳今雖停放無所復畏然四帥逆己關之於都禁至日為能遣尸殺使者看望之雖弗復慮矣至日父母將入静中静中疾發亦無苦也我其日亦當視汝右三事小茅君説右三條厶書八月六日父母將赤子入静燒香北向陳乞於二君爾時自當有所見所見萬無所苦也其日中時當有前日碧衣介華袴人來在静前立徘徊者小君也可就請乞也八月六日中當有一人著平上幘多髭鬚長長爾著紫皮袴褶將黄娥來此人是鬼帥王延也延自為人作益為將娥見人耳娥其日或當被縛華書吏其日當内井上助主人耳日中當來湏去也故宜力上諷注冢訟章於却氣毒之來往也三過如此考者匿矣夫散翳布考皆因人之不陳疾者懼焉則精胎内戰是故疚痾流發非唯一身而已今所以令上章者亦以遏虎牙之盈縮耳范中候所道如此范中候名邈即是撰南真傳者許厚當謝詭南真夫人吏兵告大章如此右小君以小代大復請何為當啓太上停之何如右小君牙亦爾耶勿怱怱演小子耳許牙何豫乎焉敢復相追爾娥與厚有水火之書吾近承南真命推縛盡執也小鬼頭不制服豈足憂亦許長史用心之所尅也右小君許厚自是其丈人所責責亦至也責不以家事往來之賓經意意亦當得之也云何每爾此自家長之教忌不豫我也重謝斗當必釋耳范帥頃者以其不詭乃欲不復豫事我不聽之今無為也詭當一湏疾愈送斗恒渇而飲不可飲食多困故而不可食子婦不經心亦不可不令知死丈人之責耶故宜以家事為勤為爾不已或能致之於丈人宇下受教耶八月二十夜小君授書此使示斧右十條楊書許長史所使人盜他家狗六頭於長史竈下蒸煑共食之長史何以不檢校使臭腥之氣薫染肴飯既食而歩上道亦已犯真人之星也有一白犬俗家以許禱土地鬼神云何令人盜烹之土地神言許長史教之使爾不言小人盜自爾也宻尋之爾在宇下而不覺方有此此亦足以為一病宜慎八月六日夜茅小君授以與許長史亦宜有辭詣南嶽夫人乞疾病得愈之意又宜辭詣保命定錄二君辭㫖當令如南嶽夫人疾者自當告乞於𤣥師不爾不差易遷昨來道此别省此二字題紙背右四條楊書男生許玉斧辭玉斧以尸濁肉人受聖愍濟㧞每賜敕誡實恩隆子孫常仰銜靈澤永頼天廕玉斧以駑鈍頑下質性難訓雖夙夜自厲患於愆失此夕夢悟尋思此意皆玉斧罪責慙懼屏營無地自厝靈道髙虚肉人未達真法唯執心守敬脩行寳祕而已或恐靈㫖髙逺誡喻幾㣲玉斧頑闇不能該悟如此之罪日月臻積違法犯誡亦當千萬神母仁宥輙復原赦故今日憂惶深重肝膽破碎唯晳謂應作析字骨思愆無補往過連陳啓煩多希請非所兼以愧怖玉斧歸誠乞誓以今日更始當洗濯心誠盟於天地静守形骸軌承訓誨乞原父穆兄虎牙小大罪考玉斧不修乞身自受責原赦大小若神母遂見哀愍許玉斧思愆補過舉家端筆受恩是永覩三光受命更生謹辭此與是虎牙病時掾與南真辭也掾自書本虎牙慎不可復履淹及見人之新淹者三元驚喪多喜殺人八月二十四日南真告學道者常不能慎事尚自致百痾歸咎於神靈當風卧濕反責他於失覆皆癡人也安可以告𤣥妙哉保命告牙右二條有掾書湏自吟曰朝華煥晨井九蓋傾青雲前此珪璋庸不識萬流椿觧落儵歘頃寅客何必人或云是誠誠則能改右英晚而言曰見形之子守分業於儒墨栖沈之客歩𤣥辭而詠虚彼人自可晚曉耳許伯兄弟復有心乎恐皮耳試復一悟忌其㣲路耳九月二十八日茅保命告可成與不極此舉定錄君説此違内負心三魂失真真既錯散魄乗其間夫為道者當使内外鏡徹宫商相應靈感於中神降於外信不虚也映昔亦如此諸人陶其心今已消也夫湏人陶而改者故下通耳所以懃懃期不令在此近亦粗具右小君言世事非所期時運何足聞有道自當見中路莫不煩吾欲因楊問便自知乃作此右清靈言有間於邪而邪炁為之踊也非病也右安九華語念不宜多多則正散正散而求不病猶開門以捍猛敵右紫㣲語治自當差無苦保命君言何以至喪家保命君言欲服符飲水使即愈不欲者當與定錄君語尋自差保命君語多有所道甚云云覲當乙二第七無慮也此一行楊君與長史書語耳戲言獪耳許長史勿笑此落廓不束髙下失常定之勿疑若不加意勿單用此慎示人慎示人一句保命告長史右十四條厶書衰年體羸多為風寒所乗當深頤養晏此無事上味𤣥元栖守絳津體寂至達心研内觀屏彼萬累蕩濯他念乃始近其門戸耳若憂累多端人事未省雖復憩靈空洞存心淡泊纒綿亦弗能達也漁陽田豫曰人以老馳車輪者譬猶鐘鳴漏盡而夜行不休是罪人也以此喻老嗜好行來屑屑與年少為黨耳若今能誓不復行者則立愈矣如其不爾則疹與年階可與心共議耶田豫字國讓漁陽雍奴人有幹畧為并州刺史遷衛尉年老求遜位與司馬宣王書曰年過七十而以居位譬猶鐘鳴漏盡而夜行不休是罪人也年八十二亡引此語以動長史令去官也藥四丸日服一行來宜詳前後已累言之矣右三條楊書夢惡者明旦當啓太上一以正魂魄二以折除不祥奉道之家當精治静舍右二條厶書禮年七十懸車懸車者以年薄虞淵如日之昃體氣就損神候方落不可復勞形軀於風塵役方寸於外物矣許長史既至此時始可𨼆逸耶還親華陽之館修乎黄老之業北河之命方旌遷擢之華亦顯豈不快哉今此疾方愈也不足憂也雖爾慎接於紛紛之務經緯人事之寒熱矣於今乃未可動脚動脚人當言爾畏鬼北河之命即易遷所聞竇氏之言似有所疑者也此年六月憂長史不佳非重疾也今年許家鬼注小起雖爾無可苦保命及范中候已為申陳之右帥晨許肇亦深以為意無所憂也去留之㑹死生之事三官祕禁不宜外示今所以道此者蓋以謂應作彼字人已聞至道於心也且可官身未宜去位可去可罷方更相示也右夜荀中候言此故書以示人家有疾病死喪衰厄光怪夢悟錢財滅耗可以禳厭唯應分解冢訟墓注為急不能解釋禍方未已右保命答許長史真誥卷七
