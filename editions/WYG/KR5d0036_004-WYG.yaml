  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_WYG_004-1a, image: WYG1059/WYG1059-0345a.png}
body:
  text: 眞誥卷四梁陶𢎞景撰運象篇第四仙道寂寂尋之亦使人不勸也況復求之於無涯耶假令東山忽有石髓磐結紫芝映林夜光煥燭燕胎曜峯靈津肆顯衆眞羅吟人人往者皆得掇𤣥華而揖玉對天仙以散想也將必相與把臂太虚駕絡慶雲矣未審子當力赴此二日暫遊山澤不將故以官私自切不獲一果耶今之所以為懈難者葢闇推於有無之間耳以無期我我亦無也空中有眞子不覩之不可謂罕彷彿矣所望在於不褰裳耳二日可不果何時能屈駕看金陵乎十一月二十九日夜定錄君告許侯豈能割目前之近滯慕難成之逺功耶若故棲情丘林憑託京畿者觀金陵以偶想將任意於吾子勿謂我無方從無以鑒矣心單則試不眄神苦則教不生賢者之舉可不察耶保命君告右二條楊書斯告實至言矣奉十一月二十九日告得道者以其能排却衆累直面而進於是百度自浄衆務雲散該其優者不足為勞披于艱者可以表心正月中必有龜山客來東山至時渠此應作詎字可不一力赴乎奉覽高命欣然無量始入此月公私艱掇未獲從心命使此本是今蹔字後人改作命使到京往反計日還便沐浴躬詣朝拜不失此月若吉日未過願垂告敕又告賢者之舉復宜詳之昔未受上道之前有欲索側人意有稱説堪陶奬者受隱書之後此計都冥也此下有兩字被黵又齊行翦去後似復更有語此論賢者之舉似仍是前書上紙而復酬十一月二十九日告此告今不存前十一月二十九日告語不同又云正月龜山客來事如此復酬後定錄告亦可是右英書中兼有此語耳記不具存難用顯證右二篇長史自書本令懃者懃其事躭其𤣥㣲耳愼者亦觸𩔖而作也學道之難不可書矣有恥鄙之心者於道亦遼乎灌秉然後可貴耳賢者之舉自更始爾今且當内忘右紫㣲夫人道此言此是紫㣲見長史答右英道賢者之舉事故復酬此語也長史婦亡後更欲納妾而修七元家事最是所禁故屢有及之手筆何其落落盧醫之喻復有韋絃之功解凍爐門其㫖乃佳當實心在此濟矣定錄告此事中君見長史答右英書復賞讃之也心已至也不復須詣山也每空懐以向眞單誠以汎道者雖欲不教其可得乎瞻赴山澤乃更餘事耳要都無懐者實使人悒然今可停也十二月一日夜定録告許侯尋此語復似酬到京不得來事事相闗涉不可領正月二十七日將不能蹔詣欲營宅處耶龜山眞人似當其日來未眞至齋者自可無彷彿且欲令彼見我乎正月十四日保命告案此告極似前所疑事所以翻覆難解也從此正月起至後並是入丙寅年中事右五條有楊書轡景登霄晨遊宴滄浪宫綵雲繞丹霞靈藹散八空上眞吟瓊室高仙歌琳房九鳯唱朱籟虚節錯羽鐘交頸金庭内結我冥中朋俱挹玉醴津儵歘已嬰童云何當路蹲愆痾隨日崇二月九日夜雲林作晨遊太素宫控軿觀玉河夕宴鬱絶宇朝採圓景華彈璈北寒臺七靈暉紫霞濟濟高仙舉紛紛塵中羅盤桓囂藹内愆累不當多二月十六日右英作𤣥清眇眇觀落景出東渟願得絶塵友蕭蕭罕世營吟此再三右三篇有楊書靈人隱𤣥峯眞人韜雲采𤣥唱非無期妙應自有待豈謂虚空寂至韻故常在攜襟登羽宫同宴廣寒裏借問朋人誰所存唯玉子卓雲虚之駿抗翮於空同之上斯人矣豈不長揖南面永謝千乗乎紫㣲詩及詠此駕風騁雲軿晨登太渟丘絳津連岑振清波鼓浚流步空觀九緯八剛皆已遊蹔宴三金秀來觀建志儔懃懈不相淹是以積百憂二月三十日夜右英作褰裳濟緑河遂見扶桑公高㑹太林墟寢宴𤣥華宫信道茍淳篤何不栖東峯紫㣲夫人歌此陵波越滄浪忽然造金山四顧終日遊罕我雲中人右英吟此控景始暉津飛飈登上清雲臺鬱峩峩閶闔秀玉城晨風鼓丹霞朱煙灑金庭綠蘂粲𤣥峯紫華巖下生慶雲纒丹爐練玉飛八瓊晏眄廣寒宫萬椿愈童嬰龍旂啓靈電虎旗徵朱兵高眞迴九曜洞觀均潛明誰能步幽道尋我無窮齡紫㣲夫人作紫闕搆虚上𤣥館衝絶飈琳琅敷靈囿華生結瓊瑤騁軿滄浪津八風激雲韶披羽扇北翳握節鳴金簫鳯籟和千鍾西童歌晨朝心豁虚無外神襟何朗寥儛太空嶺六氣運重幽我塗豈能尋使爾不終彫右英夫人作翳藹紫㣲館鬱臺散景飈鸞唱華蓋間鳯鈞導龍軺八狼攜絳旌素虎吹角簫雲勃寫靈宫來適塵中囂解轡佳人寢同炁自相招尋宗須臾頃萬齡乃一朝椿期㑹足衰刼往豈足遼眞眞乃相目莫令心徂虚刀揮至空鄙滯五神愁右紫㣲作朝啓東晨暉飛軿越滄淵山波振青涯八風扇𤣥煙迴眄易遷房有懐眞感人三金可遊盤東岑宜永甄紛紛當塗中孰能步生津飄颻八霞嶺徘徊飛晨蓋紫軿騰太空曬眄九虚外玉簫激景雲靈煙絶幽藹高仙宴太眞清唱無涯際去來山岳庭何事有待邁四月十四日紫㣲夫人作𤣥波振滄濤洪津鼓萬流駕景眄六虚思與佳人遊妙唱不我對清音與誰投雲中騁瓊輪何為塵中趍右同夕右英夫人吟歌此曲松柏生𤣥嶺鬱為寒林桀蘩葩盛嚴氷未肯懼白雪亂世幽重岫廵生道常潔飛此逸轡輪投彼遐人轍公侯可去來何為不能絶右右英作神玉曜靈津七元煥神扉靈遷方寸裏一躍登太㣲妙音乘和唱高㑹亦有機齊此天人眄恊彼晨景飛總轡六合外寧有傾與危四月二十三日夜紫㣲夫人作𤣥感妙象外和聲自相招靈雲鬱紫晨蘭風扇綠軺上眞宴瓊臺邈為地仙標所期貴逺邁故能秀頴翹翫彼八素翰道成初不遼人事胡可豫使爾形氣銷四月二十七日夜南嶽夫人作右十二篇有楊書又雜掾寫清淨願東山蔭景栖靈穴愔愔閒庭虚翳薈青林密圓曜映南軒朱鳯扇幽室拱袂閒房内相期啓妙術寥朗逺想𤣥蕭條神心逸閏月三日夜右英作示許長史案晉厯丙寅年閏四月也右有楊書又掾寫縱心空同津總轡䇿朱軿佳人來何遲道徳何時成吟此道有心許斧子言當採五芝芝草不必得汝亦不能來汝來當可得芝草與汝食此兩得及來並戲作吳音右英吟此右二篇有楊書八塗㑹無宗乗運觀囂羅化浮塵中際解衿有道家騁煙忽未傾攜真造靈阿虚景盤瓊軒𤣥鈞作鳯歌適路無軌滯神音儛雲波齊徳秀玉京何用世間多授書畢又吟良久而復授令書此詩似不與書上相連也坦夷觀天真去累縱衆情體寂廢機駟崇有則攝生焉得齊物子委運任所經右中候夫人作薄宴塵飈領代謝緣還歸奚識靈劫期顧眄令人悲紫㣲夫人作右三篇有掾書林振須類感雲蔚待龍吟𤣥數自相求觸節皆有音飛軿出西華總轡忽來尋八遐非無娯同詠理自欽悼此四羅内百憂常在心俱遊北寒臺神風開爾襟六月二十三日夜南極夫人作登軿發東華扇歘儛太𤣥飛轡騰九萬八落亦已均蹔眄山水際窈窕靈岳間同風自齊氣道合理亦親龍芝永遐齡内觀攝天眞東岑謂應作岑字可長淨何為物所纒六月二十三日夜中候夫人作右二篇有楊書又掾寫五月十二日中君喻書此九字題卷外從此後並似是丁卯年中授書此事皆論三許挺分也阿映遂能絶志山林懃心道味淨神注精研澄虚鏡𤣥渟獨宴孑栖偶眞乃翁道逺之疇匹姜伯眞之徒也服炁挹液卒獲其益亦至事也昔又入在臨海赤山中赤山一名燒山遇良友王世龍趙道𤣥傅太初者此數子始以晉建興元年渡江入東山中學道耳並與相見數人之業皆勝於映矣映遂師世龍授解束之道修反行之法服玉液朝腦精二三年中面有光華還顔反少極為成道但恨其所稟不饒不得高品之通耳於是司命敕吾舉之使奏聞上宫移名東方諸署為地仙時三官都禁左郎遣典柄侯周魴主非使者嚴白虎來於赤山中即欲執之以去且詰其罪狀吾時禁牙謂應作訝字又乃馳啓司命司命即遣中侯李遵握火鈴而來呵攝之於是魴及白虎乃走去耳李遵未來之時映懼怖失膽亦喪氣矣亦賴龔幼節李開林助映為答對亦幾至敗也自無此二人及其師王世龍亦早惡矣魴誥謂應作詰字之亦有實映答對亦可可三官出丹簡罪簿各執一通而問映云夫欲學道慕生上𨽻眞人𤣥心栖邈恭誠高靈者當得世功相及禍惡不遘陰德流根仁心上逮乃可步眞索仙度名青府耳云何父手殺謝弓且亂逆三光又許朝斬李玘之頭以代蔡扶之級又走斬射潘綦等支解鈴下曹表等水沈湯雲之尸火燒徐昻之骸絞殺桓整刳割振噲酷害虐暴刑攬謂應作濫字四十有三張皇訟寃事在天帝禍戾山積善功無一又汝本屬事帛家之道血食生民逋愆宿責列在三官而越幸網脱奉𨽻眞氣父子一家各事師主同生乖戾不共祭酒罪咎之大陰考方加有如此積罪亦無仙者當可得欺太上之曹使汝得名刋不死之紫録耶汝其無對者有司必執也映自强長嘯振褐撫髪爾乃整氣扉口叱咤而答曰大道不親唯善是與天地無心隨德乃矜是以坂泉流血無違龍髯之舉三苖丹野逐謂應作涿字鹿絳草豈妨大聖靈化髙通上達耶吾七世父許子阿者積仁著徳陰和鳥獸遇凶荒之年人民飢饉加之疫癘百遺一口阿乃施散家財拯其衆庶親營方藥懃勞外舍臨人之喪如失其親救人之患如己之疾己死之命懸於阿手窮垂之身撫之如子度脱凶年賴阿而全者四百八人仁德不隊謂應作墜字後當鍾我等是以功書上帝德刊靈閣使我祖根流宗澤廕光後緒故使垂條結華生而好仙應得度世者五人登升者三人錄名太上䇿簡青宫豈是爾輩所可豫乎言畢魴等豁然而笑遵至而去矣此意雖復是世龍之助吾亦壯其辭也於是即得度名東宫當為仙之中者然其身中自宿有陰罪未了處巳日就補復解謝太上行當受書署者也蓋爾不復受考於三官已定名於不死之録矣今已移在竹葉山中或名此山為蓋竹山山之東面兩隴西上其中有石井橋橋之北小道直入其間有六叢杉樹樹之左右三百步有小石深室室前有流泉水映與三人共止其中此辰年當自蹔出還人食詭亦欲蹔還鄉里山之近處令其家兄弟見之者也臨時自當令其弟知之所在乃又寄謝令弟子懃之若欲至竹葉山索映亦即得相見竹葉山東上石橋橋之北小道甚徑易勿從南山上山南道絶險竹葉山中仙人陳仲林許道居尹林子趙叔道此四人並以漢末來入此山叔道已得為下眞人仲林大試適過行復去此是竹葉山中舊仙人也其王世龍趙道𤣥傅太初許映或名逺遊適來四年耳右從五月十二日至此並楊書受㫖本納納長者蔚蔚内明撥于昔累非復故形變扇澡鍊得道之情和挹神心仰秀雲靈傾觀晨景德音蘭馨方及十載季瑋謂應作偉字舉名毎事勗焉勿復不精太和二年歲在丁卯十二月十七日夜太元眞人司命君告穆到丙子年為十年矣時當七十二也到亥子年神化變鍊子年始餘十年蕭條斧子和心凝靜道炁雖妙乗之亦整澄形丹空擢標霄領其神以暉其光將頴實侍辰謂應作晨字之高舉谷子之羅此古鼎字可謂秀落衆望縈渟之仙才又當懃進德修業淡然虚眄十二月十七日夜太元眞人司命君告玉斧祖司徒府辟掾不赴隱在本縣茅山五年此十六字榮弟後所注其公府辟似妄也淵奇體道解幽達精虚中受物柔德順貞慈寛博採聞道必行逍遙飛步啓誠坦平䇿龍上造浮煙三清實眞仙之領帥友長里之先生必當封牧種邑守伯仙京傅佐上德列書絳名右説道許長史所得限分爾時䕶軍長史此六字亦榮弟所注瑋灼清暉潛光翳眞二景落鋒飛霞流纒於焉玉子採此雙辰遂開上道允得妙門儀璘洞煥玉標𤣥金登名五宫懸書七元寔迭域之併羅為上清之卿君是子内和感虚託眞情專之所致亦南人雲軫之必駕三元景輦之攜遊也此云迭域即谷希子也與前司命所答谷子之羅鼎事同右説道許玉斧所得之分此前後二右字下説字出長史書云右清靈眞人説云云而楊君書無此四字當是于時楊向長史口道是裴君也此是道成懃至受書之時初所舉定目之名也亦得道齎詣之分限矣恃而替者得來必無從矣當共寘此右五條有楊書長史寫兩本保命告云許子遂能委形冥化從張鎮南之夜解也所以養魂太陰藏魄于地四靈守精五老保藏復十六年殆覩我於東華矣既適潛暢莫覺不眞許子即是掾也按張係師為鎮南將軍建安二十一年亡葬鄴東後四十四年至魏甘露四年遇水棺開見尸如生出著牀上因舉麈尾覆面大笑咤又亡仍更殯葬其外書事迹畧如此未審夜解當用何法依如許掾似非劎杖也右英告曰自古及今死生有津顯黙異㑹藏往滅智與世同之者皆得道之行也若夫瓊丹一御九華三飛雲液晨酣流黃徘徊仰咽金漿咀嚼玉㽔者立便控景登空𤣥升太㣲也自世事乖𤣥斯業未就便當蹔履太陰潛生冥鄉外身棄質養胎虚宅陶氣絶籥受精𤣥漠故改容於三陰之館童顔於九錬之户然後知神仙為竒死而不亡去來之事理之深也南人告云得道去世或顯或隱託體遺迹道之隱也或有再酣瓊精而叩棺一服刀圭而尸爛鹿皮公吞玉華而流蟲出户仇季子咽金液而臭聞百里黃帝火九鼎於荆山尚有橋領之墓季主服雲散以潛升猶頭足異處墨秋咽虹丹以投水甯生服石腦而赴火務光翦韭以入清泠之淵栢成納氣而腸胃三腐諸如此比不可勝記㣲乎得道趣舍之迹無常矣南人即南眞人夫也此諸仙人出諸傳記而事迹有參差不同者保命又云既適潛暢莫覺不眞如此之指非眞尸也右四條有長史書人死必視其形如生人皆尸解也視足不青皮不皺者亦尸解也要目光不毁無異生人亦尸解也頭髪盡脱而失形骨者皆尸解也白日尸解自是仙非尸解之例也右一條甲手書寫若其人蹔死適太陰權過三官者内既灰爛血沈脉散者而猶五藏自生白骨如玉七魄營侍三魂守宅三元權息太神内或三十年二十年或十年三年隨意而出當生之時即更收血育肉生津成液復質成形乃勝於昔未死之容也眞人錬形於太陰易貌於三官者此之謂也天帝曰太陰鍊身形勝服九轉丹形容端且嚴面色似靈雲上登太極闕受書為眞人趙成子死後五六年後人晚山行見此死尸在石室中肉朽骨在又見腹中五藏自生如故液血纒裹於内紫包結絡於外夫得道之士暫遊於太陰者太乙守尸三魂營骨七魄衛肉胎靈録氣右三條是長史抄寫九眞經後服五石腴事其用他藥得尸解非是用靈丸之化者皆不得反故鄉三官執之也有死而更生者有頭斷已死乃從一旁出者有未斂而失尸骸者有人形猶在而無復骨者有衣在形去者有髪脱而失形者白日去謂之上尸解夜半去謂之下尸解向曉向暮之際而謂之地下主者也右一條是掾抄寫劎經後論尸解事眞誥卷四
