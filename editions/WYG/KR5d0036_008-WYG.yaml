  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_WYG_008-1a, image: WYG1059/WYG1059-0380c.png}
body:
  text: 真誥卷八梁陶𢎞景撰甄命授第四遊精罔象誠不可信然多勞多事多念多端所以損神䘮真擾競三闗遂當以此害明徳也故令許君之徒含景内魄若抑四者研虚注靈則仙可冀定錄告除治爾牀席左右令潔静理䕶衣被者使有常人常燒香使泠然不雜也南嶽上真當數看出内便料理起居可使草及木𤓰耳手自先有風患是以今風氣之本至耳多云針灸佳益使人無憂此易遷令告長史也草及木𤓰當是理衣下人名耳可迎黄民來出民奴既欲來又云其月末左右當小小疾患迎來在此則疾患除也當部分䕶静屋以為急并欲得一室可棲息處今年欲取草當為民奴留之草今年自有本命厄非欲取也令其乞符自保而帶之卧牀後孤有懸風可安北下一彰謂應作障字亦可以牀著近北壁下勿使虚懸晨夕當心存拜静心存行道也身既有疾不能拜起故令心存不替斧有霍亂疾勿使冷食此兒常不大宜住此今自無他耳右易遷一夕再來四更中獨來道此先初來又與保命俱此似在縣下所授今掾還山使黄民歸家也易遷即掾母七後得入易遷宫因呼為號前所呼亦皆是也斧學道如穿井井愈深而去土愈難運出自當披其心正其行乃得見泉源耳有人説中候言如此可令知之李中候名遵即撰茅三君傳者人學道譬如萬里行比造所在寒暑善惡草木水土無不經見也亦試在其中也頃數聞人道此始乃悟之耳彼君念想殊多渠謂應作詎字能成逺志不平昔時常多所恨始悟人難作而善不可失云學道者除禍責此審爾當懃右易遷夫人所道山嶽氣擾則強禽號於林川瀆結滯則龍虬慘於澤此自然象也故豪盛㣲覺將𩔖獸告其駭浪𤣥數纎兆而號咷徴乎治亂矣斯蓋山川之盈縮非人事之吉凶若墳附丘山誠與汧岫等波茍舎理乖則吹萬之用不同也非静順無以要謙非虚棲無以冥㑹是故死生之幾吉人不復豫茍思之無邪不為禍害五月十四日右英夫人答孔辭後人黵作謝安字孔氏孔黙也云似是孔嚴兄弟長史父先為嚴從兄坦前都督是討沈充時既有因緣故得此也虎頃大號墓下事自未得和神静形俯頤幽精者疾源或與年而積耶若未能用交賖之途者將奚促促於藥定録仙人答孔求乞藥方想早𦵏兄今注煙速消雖不辦妨於生者要欲得柩物時寜三泉使凶氣泯静也小兒疾方行當示五月十七日夜保命仙君所言答厶一字被剪除疑猶是孔字所問疾患者右從禮年來凡十九條並有掾書遵懃心香火有情向藥故有言消摩之愈疾謂其將聞斯而請命耶仙真並呼藥為消摩故稱消摩經也誦之亦能消疾也應南趍而北騁既心口違矣夫捐薺以茹荼哂九成而悦北鄙者捐薺至此亦是抱朴博喻中語我知其無識和音之聽鑒也當永為吉人爰及母奴然所起是學而不思浚井不渫蓋肉人之小疵耳無乃此也今事結水禁猶有可申若許長史能於静中若救之者則一門全矣亦是師主祭酒之宜請而為徳惠乎五月二十日夜右英作與長史劉遵祖善譚説殷浩向庾亮稱之後一㑹譚論殊不合遂名之為羊叔子鶴於是失名劉遵心故為修耳何不令其母服大逺志丸七月七日夜紫㣲夫人告即啓可得疏方不良乆答言世間自有可尋索宻用保命君問紫㣲曰此方用牛黄銀屑者非若是者小為難合此即今大鎮心丸也先以水銀磨銀屑使消故為難合紫㣲答但頷頭右三條楊書陸納兄弟清真淳一有姜伯子之風知欲有逺志欣然其祖父有隂徳當慶流七世知陸茍子自誓乞苦齋一年欲授經卿自此二字後人儳非真更量之劉遵乃有好心早自知保命答許長史陸納兄名始並有徳行祖名英仕呉丹陽郡太守苟子當是人小名不詳是誰納為尚書令太元二十年亡虞昭為其兄子此二字後人黵易作先人字本猶可識事文書牽連身被攝繫方未已殆欲無理頼其在世粗有功徳且其家福徳強章聞累疊皆被上御事已散尋追遣之其病雖篤無所憂許侯為之甚至宻相示保命答許長史庾道季身處陽官貴勢不能順天用法憒憒慢信心形不同自少及長善功無一積惡不改其罪目已定今臨命方欲修徳以自濟免徒費千金之用不亦晚乎保命答許長史庾和字道季亮第二子也㓜有才辭文義升平中為丹陽尹表除諸侯六十餘事太和初為領軍如此行迹不似為惡是聞戒修善故得申遂郗囘父無辜戮人數百口取其財寳殃考深重惋謂應作怨字主恒訟訴天曹早已申對囘法應滅門但其修徳既重一身免脱子孫豈得全耶囘當保其天年但仙道之事去之逺矣大元真人答許長史郗囘父鑒清儉有志行不應殺掠如此或是初過江時擺併所致不爾則在涼時殺賊有濫也鑒年七十餘乃終即得為鄷宫職右從陸納來四條有甲手書平凝夷質淵通妙靈神造重絶棲真攝生太𤣥植簡太素刋名金庭内曜玉華外瑩朱軒四駕嘯命衆精騁龍𤣥州飛雲浮冥必能上友逸臺之公下監御于太清矣八月十七日夜紫㣲王夫人授令因許長史示郗希遐逺曜冥響凝𤣥蕭浪上韻躭夢遯真仰飛霄霧俯散靈根飛歩四覺内觀七緣者則必有丹書秀簡帝房之錄𤣥聲八振棲身五嶽於是灌胎朝元吐納六液從容三道誨此景福上可以䇿軒空洞下可以反華變黒矣若形羈榮羅鼓輪華園乗波適物鳴簮風塵外有謀道之名内有百憂來臻者適足勞天年以騁思終歸骸於三官耳齋之不專徒悟而無益可謂意不盡言乎蓋行真炁當吐三納四乗七吞九今吸之不足躡之失序神漏泝源精亡胎擾雖休糧日挹而莫知道與年䘮矣欲階此渡也其未接乎夫索長生者多津尋靈塗者千百何必用氷爐以盛火趣償責於三官耶右中君言因許長史示郗紫㣲夫人云郗若得道乃當為太清監也若能聞要道而勤者當至此格若不専篤而守迷行外舎道法者則都失也紫㣲前語與太元殊乖而如此所云當是迷不能勤乎要道司命顯其終迹故也情不餘念者道乃來耳郗囘猶未足以論至道耶小君郗綜婦丁淑英者有救窮之隂徳又遇趙阜之厄而不言内慈自中𤣥感皇人故令福逮於囘使好仙也綜墓在東平淑英今為朱陵嬪數遊三上司命亦令聽政焉此二人當是囘之曽祖也外書不顯郗瞿與薛春華至垂心於門宗初不以生人為事然訟者多但不能咸制之耳每見諌考訴者甚懃至也時節宜祠之耶此二人郗家之福鬼外書亦無此二人不知是何親郗雄與閻屈女不相當負石之役于今未了喜擊犯門宗心常殺絶此二人是郗家之禍鬼郗厶黵除此名不可識與殷武姬被考以燒殺朱奢李賤以致災也其無後亦求代逮又與髙豐相扇甚助馬頭之訟石公未便可得佳恐不止耳亦何趣欺其婦耶省來懃懃試為掩正之亦無此諸人右保命答許長史小君説言郗鑒今在三官為劉季姜所訟争三徳事周馬頭在水官訟其壻引理甚苦郗朗伊香之二人今為牙女子竒求此范帥昨受江羅辭郗相今為大曹吏所逮其婦邢嬰桃受事未了方索代人於此家此自是旁聽小君之言語耳不令書之為自疏識以示耳此二十二字是楊君自記與長史髙齡反化晚而祭酒弱道氣不交靈助無主是以羣邪纒𤣥急行其禍奚不宗生生乎於我助之有緣其婦言亦急家事當湏了之非他得豫今六天之横縱而太平之㣲薄靈不足以助順適足以招羣奸所以神光披越而邪乗正任矣髙齡之無徳乆矣鬼訟之紛錯積矣許長史黄氏黵作掾字將欲理之耶若翻然奉張諱道者我當與其一符使服之如此必愈而豁此豁字也矣不然往詣水官所謂嗚呼哀哉張諱即天師名也楊不欲顯疏也邪氣入體鬼填次其將廻惑於邪正必不能奉正一於平氣耶如此吾治疾之方殆不可得正一平氣即天師祭酒之化也彼往其子亦去何一身之永逝乎八月十九日夜保命君宻語許長史冢訟尤甚恐亦未已齡曽鑿敗古人碑銘之文以自顯焉隂賊於鬼神弊謂應作蔽字善以自標訴者誠多事以此為首先八月二十四日夜保命告欲取謝奉補期門郎而今已有兼人北帝故權停之耳近差王允之兼行得代奉若服术酒可未便恭命也髙耆亦可服术其家冢訟亦為紛紛术遏鬼炁故必無他耳范中候言此謝奉字𢎞道㑹稽人仕至呉郡丹陽尹吏部尚書王允之敦同堂弟王舒子有智幹為西南中郎將江州遷衛將軍㑹稽封番禺侯年四十亡諡忠侯髙耆即謂齡也期門即酆都中官而記中不見此職惟有修門耳從平凝來凡十四條有掾寫夫觀物適任内順明靈託性命於髙真委形氣於神攝者亦尅疆以永遐廻秋齡以保真今徳匠既凝神仗信澄心宻静圓順廣敬固天祐焉然𦙍嗣不多或時彫落將猶靈闗失緯潜機未鎮耳當今五氣滋曜常朗文昌之房三星結華每煥璇衡之内是以𤣥潤胎萌遂其流根矣我按九合内志文曰竹者為北機上精受氣於𤣥軒之宿也所以圓虚内鮮重隂含素亦皆植根敷實結繁衆多矣公試可種竹於内北宇之外使美者遊其下焉爾乃天感機神大致繼嗣孕既保全誕亦夀考㣲著之興常守利貞此𤣥人之秘䂓行之者甚驗六月二十三日中候夫人告公孝武壬戌生此應是辛酉年而後又云上相座動後以臨登極乃是後午未年此為大懸靈草廕𤣥方仰感旋曜精洗洗似草作言邉應詵詵字即毛詩螽斯羽詵詵兮宜爾子孫之義也繁茂萌重徳必克昌紫㣲夫人作福和者當有二子盛徳命世福和似是李夫人賤時小名也今晉書名俊容二子即孝武并弟道子也同夜中候告右三條楊書又掾寫徳匠既凝𤣥範自天安危之事未宜問也公傾注甚至所以未相酬者豫事難論耳頃天氣激逸隂景屢變太白觧體於二辰之中愆勃於紫房之下王者惡焉天子有憂上相座動今聊作䜟宻以相示右此及䜟有掾寫在掾自記修事後共紙尋真綜文令難解耳今拘連相取又别疏出之其授之時維當道其辤楊君後自更錯義皆是説晉代之事並有明徵也相欺豈妙道要吾知之天袐能有術金之萬尋師疾逆除惡子自之制夷遂平世天命乘驅寶奇龍者篡可悲真間世復思宜神熈逆歴有數在茲基無不無兵隆誰定帝紜室來之皇慎地先卒兒必虧金紛異五亂徳天火數失期座當變見逺凶匠制規三由匠足不慮憂危撥保封寸莫其測源劉知向有明施者三五瑞天之代隆換迭相運推精氣神妙二參儀慎凡傳人賢精氣神妙參二儀慎傳凡人賢者施封天制地無不宜子能寶袐天知之吾道要妙豈相期自有奇神先兵規火寸三五天瑞之隆代迭換運相推明匠保徳慎無思驅惡除逆疾尋思萬金之術龍之熈隆數卒三失由兒莫測其源劉向知有凶撥亂皇復基乘天命世遂平夷制逆者誰必定期匠不足慮憂逺危五世之間真可悲篡歴有數帝座虧當見變異紛紛來金室在兹枕麝香一具於頸間辟水注之來絶惡夢矣常存三關佳也右英告公凡云公者皆簡文帝為相王時也右一條楊書五字朱書太元真人告許長史此後非真説我嘗見南陽樂子長淳朴之人不師不受順天任命亦不知修生之方行不犯惡徳合自然雖不得延年度世死登福堂練神受氣名賓帝錄遂得補修門郎位亞仙次緣天資有分亦由先世積徳流慶所陶若使其粗知有攝生之理兼得太上一言之訣如此求道無往不舉矣夫人所以不盡年夀中多夭遏涉世者或遭刀兵之難致榮祿不終祚𦙍不長志道之人雖有一生之心鑽求匪懈徒復遭遇真文躭𤣥精微慕尚者衆得升騰者稀經非不妙靈豈無感愚愚相隨安知修真之本營神養性鎮守之法世人積小以來形中傷犯者多帝一不治百神驚散考試萬端所謂荒城之内荆棘生焉無妙術以自導修道以求仙貪榮慕貴多垂成而敗皆由䘮真犯氣愚瞽㒺昧豈識此機耶致奪年滅筭萬事不成以此求生去生逺矣虚自苦耳太上有𤣥機之道煥落七神枕中之要此道㣲乎妙哉初不傳於下挺愚俗之人有此道者帝一治於𤣥宫萬神守備與天同心按訣謹而修之登山越海萬試不干修仙升度所欲從心斯豈虚言耶卿父子𤣥機世理妙接真故可縈淳之仙才而為衆真所稱非吾獨所稱舉故當與卿同編仙録無復理外之嫌亦已諮啓卿故令知乃心受用金龍玉魚此不可闕所以爾者詣太上前昭靈亦當粗具近所寫神虎符意嫌不精可更書為善卿前所道相王事頃郗囘亦知有好心但所得少耳自當保其天年也見謝所作傳未易功乃能序述聖迹賞觧作竒此是天發其心昨亦已見司命君大以為佳冥中自當報之有緣其子孫若知醮靈岳祈天真降應必也豈虚言哉謝家一門唐承之世繁林蔚然甚可欣也安石先對所鍾如何具如近不足宣真人西城王君答許侯右四條别一手書陸修静後於東陽所得不與諸迹同辭事偽陋不𩔖真㫖疑是後人所作樂子長非受五符者唐承即列紀所云四十六丁亥之期真誥卷八
