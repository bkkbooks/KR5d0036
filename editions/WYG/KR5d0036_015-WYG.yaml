body:
  text: 眞誥卷十五梁陶𢎞景撰闡幽微第一羅酆山在北方癸地此癸地未必以六合為言當是於中國指向也則當正對幽州遼東之北北海之中不知去岸幾萬里耳山髙二千六百里周迴三萬里其山下有洞天在山之周迴一萬五千里其上其下並有鬼神宫室山上有六宫洞中有六宫輒周迴千里是為六天鬼神之宫也周迴一萬五千五百為宫周迴一千里者三百二十五所今此六宫止得六所爾其餘空尚三百一十九所計不容頓耳恐所言或有舛漏處也山上為外宫洞中為内宫制度等耳此山既非人跡所及故山上可以得立宫不知山復有幾洞門也第一宫名為紂絶陰天宫以次東行以周迴論之洞中直東西有三千七百五十里今一宫周迴二里是徑二百五十里六宫若併列合居千五百里耳其兩邊各餘二十餘里南北有殊逺悉悉當為藩屏故也不爾莫測所以也第二宫名為泰煞諒事宗天宫第三宫名為明晨耐犯武城天宫第四宫名為恬昭罪氣天宫第五宫名為宗靈七非天宫第六宫名為敢司連宛屢天宫凡此六天宫亦皆應有義旨乃粗可領解自不容輕說凡六天宫是為鬼神六天之治也洞中六天宫亦同名相像如一也此即應是北酆鬼王決斷罪人住處其神即應是經呼為閻羅王所住處也其王即今北大帝也但不知五道大神當是何者爾凡生生之𩔖其死莫不𨽻之至於地獄所在盡有不盡一處泰山河海亦各有焉此山外宫當是曹局職司主領文簿洞中内宫是住止及考謫之處也今書家說有人死而復生者並云初北向行詣宫府考署或如城闕檢課文書恐此皆是至山上外宫中爾如胡母班往泰山府君處亦不覺入洞中恐鬼神恍惚不使知見實事耳世人有知酆都六天宫門名則百鬼不敢為害欲卧時常北向祝之三遍微其音也前云宫名今云門名是為門亦因宫為名宫直是虚號門則有榜題百鬼皆見而人今亦知之故所以畏伏也祝曰吾是太上弟子下綂六天六天之宫是吾所部不但所部乃太上之所主吾知六天之宫名故得長生敢有犯者太上當斬汝形此云下綂六天者不為六天所綂也不但吾自所部領乃太上令吾主之故復以為威猶如郡縣官爵有臺除非白版之例也第一宫名紂絶陰天宫以次東行第二宫名此二字楊君書際紙下如此掾寫不熟詳乃作七字今世中諸本皆作第七此誤爾宫唯有六豈容是有七此呪復說以次東行四字者是欲令鬼輩訝吾知其次第位例也從此以次訖六宫止乃啄齒六下乃卧辟諸鬼邪之氣此一遍呪訖六啄齒畢又呪如此三過乃卧耳此法已重抄在第三篇修事中耳人初死皆先詣紂絶陰天宫中受事或有先詣名山及泰山江河者不必便徑先詣第一天要受事之日罪考吉凶之日當來詣此第一天宫耳此宫是北帝所治故後悉應關由猶如今州縣之獄初雖各有執𨽻終應送臺定其刑書泰煞諒事宗天宫諸煞鬼是第二天也卒死暴亡又經於此此宫當得專主收煞也其卒死暴亡恐文書未正或姓名相同者所以先來檢問之也賢人聖人去世先經明晨第三天宫受事後云四明公各治一宫不知此泰煞明晨兩宫當是何公所居暴亡及賢聖雖先暫經亦猶應詣紂絶為正也禍福吉凶續命罪害由恬昭第四天宫鬼官北斗君治此中鬼官之北斗是復籍先身之功罪乎然武以至忠而亡必復入仙品矣韓太華者韓安國之妹也漢二帥將軍李廣利之婦也利宿世有功德利今亦在南宫受化廣利為漢武名將伐大宛時所殺戮殊不少以先世功德遂能消之韓氏字安國家福逮不應關李相扶夫妻既同條恐人脫致疑是以復標别言之亦或由因結致此也劉春龍者漢宗正劉奉先之女奉先漢某帝時為宗正李奚子者李忠之祖母也忠晉初東平太守忠祖父田舍人耳而多行陰德常大雪寒凍而不覆積稻常露穀於園庭恒恐鳥雀饑死其用心如此李忠不顯晉書如此說則妻復似是縁夫之功而夫身反不見有所果亦難可詳言王進賢王衍女也事詳在後郭叔香者王脩母王脩字叔治北海人為魏武郎中令年七歲喪母母以社日亡不知是郭誰女也其童初府有王少道范叔勝李伯山皆童初府之標者少道漢時人王遯兒也漢時山陽太守范叔勝北地人也魏文帝黄門郎李伯山李冲父也冲漢時為白馬令行陰德或積世有道中行所鍾此二府仙人皆一進再進得入此項梁城作酆宫誦曰紂絶標帝晨諒事遘重阿炎如霄中煙勃若景曜華武陽帶神鋒恬昭吞青河閶闔臨丹井雲門鬱嵳峩七非通奇葢連宛亦敷魔六天横北道此是鬼神家誦有二萬言今略道六天之宫名抄出之耳夜中亦可微讀之亦云辟鬼邪前第三宫名武城今云武陽或當是有兩名也蘇韶傳云鬼之聖者有項梁城賢者有吳季子但不知項是何世人也或恐是項羽之叔項梁而不應聖於季子也酆都稻名重思其米如石榴子粒異大色味如菱亦以上獻仙官後又有叙重思事既是異日所說兩出自非嫌石榴子即世之安石榴也炎慶甲者古之炎帝也今為北太帝君天下鬼神之主也炎帝神農氏造耕稼嘗百藥其聖功不減軒轅顓頊無應為鬼帝又黄帝所伐大庭氏稱炎帝恐當是此非神農也又外書云神農牛首今佛家作地獄中主煞者亦牛首復致疑焉四明公升擢既有年限太帝位秩亦應加崇極此雖已三千餘年或恐如世中帝王不轉而公輔屢遷也武王發今為鬼官北斗君文王之子周武王也姓姬名發伐殷紂而為天子即位二年崩禮云年九十三竹書云年四十五按後云四明公並得昇仙階而不道北斗君既仰𨽻玉晨亦應預同遷品耳夏啓為東明公領斗君師禹之子也姓姒竹書云即位三十九年亡年七十八自崩滅後至今己卯歲凡二千四百二十五年按司命說格在位二千四百年得上補九宫如此則宋元徽四年去矣文王為西明公領北帝師文王名昌禮云年九十七亡此父子並得稱聖德而不免官鬼雖為煞戮之過亦當是不學仙道故也邵公奭為南明公邵公名奭文王庶子食采於邵封於燕國按周公邵公大公俱佐命尅紂公在不而周公有聖德仙鬼之中並无顯出太公執旄秉鉞威罸最深乃載出列仙邵公恩流甘棠翻為鬼職亦復難了皆當各縁其根本故也酆都唯有六宫而周文王父子頓處其三明周德之崇深矣吳季札為北明公吳王夀夢之少子闔閭之叔父太伯之後也亦姬姓讓國居乎延陵今季子廟是也雖有仁賢之德乃亞乎先聖亦有殊例尋此諸公前後參差當是道時代謝用人也自夏啓已來二千餘年方得遷改乃十倍於地下主者之數明仙家品例故為貴妙四明公復有賔友四人然此四公後並當升仙階也四明主領四方鬼賔友四人其事在後又按後定録告云邵奭為東明公行上補九宫右保此乃仙階之證而與前不同且啓尚未去邵理不得仙恐脫耳誤云邵耳既云東明公則應猶是啓也其疑事别在後也西明郎十六人主天下房廟鬼之血食此郎亦應是𨽻西明公房廟血食是受命居職者非謂精邪假附也周顗為鬼官司命帥今以鄧岳程遐二人代以其多事故也周顗字伯仁汝南安城人仕晉過江位至尚書僕射元帝永昌元年王敦南下遣收於石頭南門被害年五十四追贈光禄開府諡康侯鄧岳字伯山陳郡人討郭默有功咸寧初為平南將軍廣州刺史於州病亡辛𤣥子後云鄧岳為謝幼輿司馬此當是已遷也程遐代郡人為石勒謀臣妹為勒妻官至右僕射開府代郡公勒死為石虎所煞也西明都禁郎賈誼昔為治馬融事不當被黜守泰山泰山君近請為司馬已被可賈誼前漢文帝時為梁孝王傅憂憤嘔血而死後云荀顗為泰山君用曹洪為司馬今當代曹也馬融字季長扶風人也博學有才理鄭𤣥之師也仕後漢為南郡太守未嘗按劍殺人忤梁冀被徙朔方於路自刺不死後赦還拜議郎延夀九年病亡年八十九融别傳復小異此耳南門亭長今用周撫代郗鑒一門有二亭長輒有四修門郎一天門凡八修門郎也門郎為天門亭長下官此是北帝門也後漢云主南北門籥則一宫有二天門也蘇韶傳云修門郎有八人乃言顔淵卜商今見居職恐此不然周撫字道和潯陽柴桑人周魴子也先為王敦將東下伐都事敗與鄧岳俱走西陽蠻中敦被殺赫出又為將討蘇峻後伐蜀平李勢封建成公為鎮西將軍益州刺史乃三十許年興寧三年病亡贈征西將軍諡襄公郄鑒字道㣲髙平人即愔父也永昌元年率諸流民來渡江東後討平王敦封髙平公又為車騎大將軍兖州刺史鎮廣陵復鎮徐州蘇峻平拜司空改封南昌公猶鎮京兆城咸康五年病亡年七十一也贈太宰諡文成公也北斗君天門亭長今是臧洪臧洪代隗囂又一人是王波新補此亦正是南門爾其餘四明公四宫門亦應大有並不顯出臧洪字子源廣陵射陽人慷慨有節義漢末洪舉義兵誅董卓後為青州及東郡太守背𡊮紹紹攻圍食盡被擒乃害之隗囂字季孟天水人有才德為物所附前漢末據隴西自稱王建武元年光武伐之憤逼得病兼餓遂亡王波渤海人也晉尚書令史有才能投石虎為中書監被殺紀瞻本為撫河將軍司馬今為北天修門郎代田録瞻與虞潭更直一日守天門北天猶應是北帝門也紀瞻字思逺丹陽句容人初仕吳為中郎將吳平還洛舉秀才稍遷為㑹稽太守遷侍中尚書僕射驃騎將軍泰寧三年病亡年七十二贈開府諡穆侯田録魏武帝時為程昱叅軍後為河間太守反叛為閻柔所破爾虞潭字思奥㑹稽餘姚人即虞翻孫也位至衞將軍右光禄開府武昌侯咸康八年病亡年七十贈光禄諡孝烈侯也魏釗領廬山侯釗字君思㑹稽人仕晉成穆之世司徒左長史丹陽尹至左民尚書平夀侯永和七年病亡矣顧和從遼東戍還有事已散北帝當用為執葢郎范明遷補典柄侯顧和字君孝吳郡人少孤有志操仕晉為吏部侍郎御史中丞吏部尙書領軍尚書僕射尚書令永和七年病亡年六十四贈侍中司徒謚穆公外書不顯范明唯前漢有范明友恐非是此人又誥試許先生者稱典柄侯周魴主非吏者嚴白虎尋典柄侯猶應是典柄呼之脫到爾周魴字子魚吳郡陽羡人周處父也仕吳為鄱陽太守甚有威惠嚴白虎者吳郡人也以孫䇿時入山聚衆䇿討之乃散奔餘杭死弟名輿亦勇健䇿偽與㑹乃㦸刺殺之爾殷浩侍帝晨與何晏對此有八人事在後殷浩字淵源陳留長平人康帝建元初為揚州刺史永和六年進中軍將軍都督五州北伐姚襄敗還為桓温所廢徙東陽永和十二年以憂亡善能譚論故與何晏對也晏字平叔何進孫善言𤣥理位至侍中尚書黨曹爽為司馬宣王所誅溫太眞為監海開國伯治東海近取杜預為長史位比大將軍長史溫嶠字太眞太原祁人仕晉為江左平南將軍江州刺史討平蘇峻位至驃騎將軍開府封始安公咸和四年病亡年四十二贈大將軍諡中武公杜預字元凱京兆杜陵人博識多智注春秋仕晉起家尚書郎位至都督荆州鎮襄陽伐吳有功封當陽侯太康五年還洛於鄧縣病亡年六十三塟洛陽贈征南大將軍諡成侯何次道始從北帝内禁御史得還朱火宫受化以其多施惠之功故也後辛𤣥子亦云如此次道名充廬江潜人位至尚書令驃騎將軍除揚州刺史録尚書輔正世業奉佛多施惠立功德每為善事以永和二年正月戊寅病亡年五十五贈司空謚文穆公按如此㫖鬼職雜位非四明公而猶得受化朱宫升居仙品者此當是深功厚德之所致也魏武帝為北君太傅北君則北斗君周武王也四明各有賔友恐北斗君不置此職當以太傅准之魏武帝曹操沛國譙人英雄撥亂匡定天下封魏王加九錫獻帝建安二十五年正月病亡年六十六此年十月魏文仍受禪追贈太祖武皇帝也其餘多不能復一二葢鬼神之事不足示於世也荀公言也荀公即是荀中侯既𨽻司命統諸鬼官故究知之但論事參差前後遞互如似隨問隨答非自然叙述事也世人多不信幽𡨕鬼神故戒勿宣示若致疑謗益漏失爾右此前一段所說不記何年月以後王逸少事檢之則猶應是乙丑年也人卧牀當令髙髙則地氣不及鬼吹不干鬼氣之侵人常依地而逆上鬼者陰物多因藉以宣其氣或附人畜或依器物或託飲食然後得肆其凶毒耳昔有人病在地卧於病中乃見鬼於壁穿下以手為管而吹之此即是鬼吹之事也人卧室宇當令潔盛潔盛則受靈炁不盛則受故炁故炁之亂人室宇者所為不成所作不立一身亦耳當洗沐澡潔不爾无冀矣故炁皆謂鬼神塵濁不正之炁此等皆承人為惡既靈助無主道豈可議也勿道學道道學道鬼犯人事亦不立使人病是體未真故也真誥亟多此戒云一言一事泄乃減算豈但疾病而已所謂仙者心實學何趣說之群魔伺察有如影響也山世逺受孟先生法暮卧先讀黄庭内景經一過乃瞑使人魂魄自制練但行此道二十一年亦仙矣是為合萬過也得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道也此四條並是可承用事已别抄在第三篇中孟先生即應是京兆孟君及屬用鄭承者前篇有西嶽蔣夫人今又云北岳未審有兩人為是誤也夜行常琢齒琢齒亦無正限數也煞鬼邪鬼常畏琢齒聲是故不得犯人也若兼之以漱液祝說亦善叩齒即神存故鬼邪不得干今修上道者日夜既恒有此事所以並得長生爾昔鮑助者濟北人也助既卑㣲外書不顯都不學道亦不知法術年四十餘忽得面風氣口目不正炁入口而兩齒上下恒相切拍甚有聲響如此晝夜不止得夀年百二十七歲後乃遇寒過大氷墮長夀河中死耳北帝中間亦比遣煞鬼及日遊地殃使取之而此數煞鬼終不敢近助鬼官問其故天煞答云此人乃多方術以制於我常行叩齒鳴打天鼔以警身中諸神神不敢散鬼氣不得入是以无有縁趣得煞之耳以此論之若助不行氷渡河亦可出千歲壽不啻也當是遇大寒凍步行氷上口噤不能復叩齒是故鬼因溺著河中耳患風病而齒自叩動者猶尚辟死却煞鬼矣何患道士眞叩齒鳴天鼓具身神仙方云常吞液叩齒使人反少以此而言人命便无定限一切皆是天遏耳若修道精勤如鮑助啄齒何容不得永年正患有時懈替則為鬼所襲同於溺河之斃也凡諸鬼亦是不能靈智乃以風病為多術豈勝謬邪酆都山上樹木水澤如世間但稻米粒幾大味如菱其餘四穀不爾但名稻為重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈炁交被嘉穀應時四節既享祝人以祀神禾鬱乎浩京巨穗横我𤣥臺爰有明祥帝者以熙此之謂矣此更說酆都中事仍復及重思耳說祝人有祠者不容有烝嘗之義當即是前所云獻奉仙官故也又鬼年限足應受餘生亦復死便有祠事矣杜瓊字伯瑜蜀人也博學有才思注韓詩兼明數術逆記魏當代漢仕劉禪時為鴻臚太常延熙十三年亡年八十餘耳侍帝晨有八人徐庶龎德爰愉李廣王嘉何晏解結殷浩並如世之侍中李廣漢武驍騎將軍征匈奴時被吏譴憤慨自刎而死王嘉蜀郡人平帝時為郎中至王莽乃棄官還鄉不肯臣公述伏劍而死徐庶字元直潁川人薦諸葛亮於劉備後魏武虜其母乃歸魏仕至中丞明帝太和中病亡龎德字令明南安人隨張鎮南降魏武拜立義將軍屯樊城為關羽所害諡杜侯迎喪葬鄴身首如生爰愉字世都濮陽人有才辨多術藝事晉武辟司徒魏舒府位至侍中中書令監解結字稚連濟南人係弟也一仕晉黄門侍郎中丞荆豫州刺史尚書趙王倫時為孫秀所害也何殷二人以注在前前所說唯道二人今當是更請問乃悉具顯之四明公及北斗君並有侍帝晨五人其向者八人是北大帝官𨽻耳選用亦同侍帝晨之號仙官亦有俱是侍中位也此言選用並同不知止取名位當品才識兼論功德此諸人才位永不相𩔖恐幽途所詮别當有以耳又有中郎直事四人如世之尚書也戴淵公孫度劉封郭嘉今見在職封者是𤣥德之養子此職應是太帝領僚如今散曹尚書耳戴淵字若愚廣陵人也仕晉厯位至䕶軍尚書僕射驃騎將軍與周顗俱為王敦所害贈光禄諡簡侯公孫度字叔濟遼東人淵之祖也初為遼東太守建安中遂僣號稱王建天子羽儀傳國子康至孫淵被司馬宣王所煞劉封本羅侯㓂氏子劉備未有兒養為息性剛猛有氣力武藝後建節度賜死此異族為嗣亦是仍得襲姓也郭嘉者字奉孝潁川陽翟人魏武謀臣為軍謀祭酒病亡年三十八諡真侯也𤣥德今為北河侯與韓遂對統今屬仙官仙官又有北河司命禁保侯亦司三官中事乃𨽻東華官保命君領之此則是北河侯必是相統屬矣劉備字𤣥德涿郡人初起義兵後遂據蜀稱尊號三年病亡年六十三諡昭烈皇帝尋于時同為三國之主魏武孫䇿今位任皆髙劉此職雖小而𨽻仙官其優劣或可得相匹也韓遂字文紂某某人漢末阻兵構亂西土建安二十五年魏武伐之奔金城之内為其將趜演等所害遂乃驍雄而未免㓂難乃得與劉備對仕殊為不𩔖兼𨽻仙官益復超顯也又有大禁晨二人如今尚書令漢光武及孫文臺二人居之光武劉秀字文叔髙祖八代孫起兵討王莽赤眉平定天下即位三十三年病亡年六十三孫堅字文臺吳郡人䇿父也𡊮術表為破虜將軍豫州刺史討董卓後伐劉表初平二年為表將軍黄祖部下人所射亡年三十七堅雖忠烈而位㣲今與天子同職亦似韓遂之匹𤣥德也又有中禁晨如今之中書令監有二人顔懷楊彪二人居之懷字思季彪字文先者顔懷字思季未得此人楊彪字文先𢎞農人漢司空楊修父也值董卓悖亂扶濟獻帝東西危苦備經三司至魏文黄初六年乃亡年八十四許長史父今為彈方侯彈方侯有二人各司南北許長史為南彈方侯劉贊為司馬鮑勛為北彈方侯韋遵為司馬亦各主南北門籥許領威南兵千人鮑勛領威北兵千人大都備門主收執而已如今世有羽林監威南威北兵如道家天丁力士甲卒之例也二禁晨及南北彈方侯亦應並是北帝官屬也受此語時未必不呼許名恐是楊自不疏之耳北帝呪所謂威南威北即謂此兵當是驍勇者也許氏事具在别篇劉贊字正明㑹稽長山人少為郡吏好讀兵書慷慨有大志擊黄巾賊傷足一脚屈遂自割筋得伸後為左䕶軍與孫峻征淮南未至病困為魏將蔣班所逼被害年七十三鮑勛字叔業鮑宣九世孫即鮑信子也清白有髙節漢建安中為中庶子黄門郎魏文帝御史中丞數諫諍忤旨左遷治書執法後被誅韋遵字公藝吳人即韋昭之孫也博學有文才善書仕晉成穆之世為尚書左民郎中書黄門侍郎代王逸少為臨川郡守以母憂亡年六十四也孫䇿為東明公賔友孫堅長子字伯符漢末嗣父領衆先制江東乃欲定中國拜討逆將軍封吳侯臨過江輕獵為仇客所射瘡發而亡年二十六弟權代任後追諡長沙桓王䇿初從東出煞道士于吉後照鏡見之驚忿呌故瘡潰而死尋項羽之英傑逾於孫逺矣俱是不得王而獨不顯出乃歴世相傳云為吳興十山王常居郡㕔上故太守不敢上上者輒死亦别為立廟呼為霸王也眞誥卷十五
