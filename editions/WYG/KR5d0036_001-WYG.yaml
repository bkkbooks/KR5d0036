body:
  text: 眞誥卷一梁陶𢎞景撰運象篇第一萼緑華詩神嶽排霄起飛峯鬱千尋寥籠靈谷虚瓊林蔚蕭森丨此一字被墨濃黵不復可識正中抽一脚出下似是羊字其人名權生標美秀弱冠流清音棲情㽵慧津超形象魏林揚彩朱門中内有邁俗心我與夫子族源胄同淵池宏宗分上業於今各異枝蘭金因好著三益方覺彌靜尋欣斯㑹雅綜彌齡祀誰云幽鑒難得之方寸裏翹想籠樊外俱為山巖士無令騰虚翰中隨驚風起遷化雖由人蕃羊未易擬所期豈朝華歲暮於吾子萼緑華者自云是南山人不知是何山也女子年可二十上下青衣顔色絶整以升平三年十一月十日夜降厶厶翦缺此兩字即應是羊權字自此往來一月之中輒六過來耳云本姓厶又翦除此一字應是楊字贈此此一字本是權字後人黵作此字詩一篇并致火澣布手巾一枚金玉條脫各一枚條脫乃太而異精好神女語見此本是草作權字後人黵作見字而乙上之君慎勿泄我泄我則彼此獲罪訪問此人云是九嶷山中得道女羅郁也宿命時曾為師母毒殺乳婦𤣥州以先罪未滅故今謫降於濁以償其過與權此權亦草作故似前體而不黵耳尸解藥今在湘東山本懸此中一寸此女已九百歲矣尋此應是降羊權權字道輿忱之少子後為晉簡文黄門郎即羊欣祖故欣亦修道服食也此乃為楊君所書者當以其同姓亦可楊權相問因答其事而疏説之耳按升平三年是己未歲在乙丑前六年衆真並未降事右三條楊君草書於紙上南嶽夫人與弟子言書識如左弟子即楊君自稱也此衆眞似是集洞宫時所以司命最在端當為主人故也夫人向楊説次第位號如此非降楊時也東嶽上眞卿司命君東宫九㣲眞人金闕上相青童大君蓬萊右仙公賈寳安鄭人自此後皆是稱諸眞人之字非其人名也氏族亦見世道書傳中也清虚小有天王王子登按青童高尊乃可不敢稱諱字此清虚是南嶽之師尚稱字獨不顯茅司命字亦為難詳也桐柏眞人右弼王領五嶽司侍帝晨王子喬青蓋眞人侍帝晨郭世幹衛人戎山眞人太極右仙公范伯華幽人少室眞人北臺郎劉千夀沛人嶓冡眞人左禁郎王道寧常山人大梁眞人魏顯仁長樂人岷山眞人陰友宗陸渾眞人太極監西郭幼度九嶷山侯張上貴楚人岱宗神侯領羅酆右禁司鮑元節東海人華山仙伯秦叔隱馮翊人葛衍眞人周季通陽洛眞人領西歸傳淳于太𤣥西域人潛山眞伯趙祖陽涿郡人勾曲眞人定録右禁郎茅季偉鬱絶眞人裴𤣥人白水仙都朱交甫三官保命司茅思和太和眞人山世逺右二十三眞人坐西起南向東行此於禮乃是南向以西方為上而後女眞東向則應起南今反北者當是以側近高眞故也太和靈嬪上眞左夫人北海六㣲𤣥清夫人北漢七靈右夫人太極中華右夫人紫微左宫王夫人滄浪雲林右英夫人按右英是紫㣲姊今反在後當位業有升降耳上眞司命南嶽夫人此即魏夫人也自説故不稱姓八靈道母西嶽蔣夫人按有數號者並以多為高西王母稱九靈則八靈宜在七靈前而今反在後者亦所未詳又受讀黃庭事云北嶽蔣夫人與今不同上眞東宫衛夫人方丈臺昭靈李夫人紫清上宫九華安妃朱陵北絶臺上嬪管妃北嶽上眞山夫人西漢夫人長陵杜夫人右十五女眞東向坐北起南行説此事時雖不記月日不知在何年既是衆眞名位故出以居前按衆眞位號前云以為高者猶今世之徽號也六月二十一日夜定録問云許長史欲云何尋道登答懃修眞誠之意定録又言昔有趙叔臺王世卿亦言篤學而竟不如人意遂為北明公府所引此是乙丑年六月也自此前唯有六月十五日定録授是答長史書論茅山中事此前又已有一授不記何月日並在第四卷中自餘無有先此者北明公府酆都宫中官屬也昔扉廓天津採華赤丘是時聲穎靈袂蒙塵華喬此即應是説初降華僑事字少倚人發煥秀山高説延霄自謂𤣥響所振無往不豁既濯以靈波實望與物榮菴既未能暢業駢羅遊岫逐逸然後知悟言之際應𤣥至少於是佛音弗駕而旋偃靜葛臺夫𤣥刃無親流鑒遁眞若以雲壁一往想齊獨邁俯自啓灑動應潛逸始乃吾等並有欣慨耳往見況意相知篤末書云伏覽聖記事跡淵妙金䇿素著青録𤣥定遂跨塵俗逍遥紫陽何蕭蕭之清逺眇眇之眞貴哉若能者矣請借來喻又云得道之階錯厲精神靖躬信宿洗誠求矜如斯而言道已邇也然夤夜之間宜篤經營乃後得手結天維足浮靈網心遊太空目擊洞房不待久日也若五情愆波三魂越於是三眞舞劎黃闕揵關耳可不力之可不力之六月二十二日夜雞鳴喻書此紫陽㫖也右二條有長史寫清靈眞人説寳神經云云抄此修行事出在第三卷中不復兩載紫㣲夫人喻書如左云云事亦在第三卷興寧三年歲在乙丑六月二十三日夜喻書此其夕先共道諸人多有耳目不聰明者欲啓乞此法即夜有降者即乃見喻也此楊君自記也長史年出六十耳目欲衰故有咨請楊不欲指斥託云諸人又告云道士有耳重者云云事亦在第三卷右一條清靈眞人言眞人告云櫛頭理髪欲得過多事亦在第三卷右一條紫㣲夫人言其夜初降者適入户未坐自言今夕波聲如雷弟子請問其故答云向見東海中大波耳弟子者楊君自稱也右南嶽夫人言又告云汝憎血否答曰實憎之云血在路上若汝憎之當那得行又答曰當避之耳又云避之佳故不如目不見乃佳右南嶽夫人言自此後諸眞共語耳又云寳神經是裴清靈錦嚢中書侍者常所帶者也裴昔從紫㣲夫人授此書也吾亦有俱如此寫西宫中定本問西宫所在答云是𤣥圃北壇西瑤之上臺也天眞珍文盡藏於此中右南嶽夫人言裴眞人又言此書與隱書同輩事要而即可得用也一名七𤣥隱書右二十三日授訖此南嶽夫人見告云紫㣲左夫人王諱清娥字愈意阿母第二十女也鎭羽野𤣥壟山主教當得成眞人者右一條先此一夕所授此一條即是二十二日夜與紫陽所喻同夕當復大應有事後云聲氣下亦是此夕楊後又追憶此一事更疏在二十二日例中故云先此一夕也右從清靈來凡十二條有長史寫六月二十四日夜紫㣲王夫人來降因下地請問眞靈既身降於塵濁之人而手足猶未嘗自有所書故當是卑高迹邈未可見乎敢諮於此願誨蒙昧夫人因令復坐即見授令書此以答曰此楊君自述事也例多如此夫汎景虚𤣥無塗可尋言發空中無物可縱流浪乗忽化遁不滯者也此二行皆浮沈冥淪儵遷灼寂是故放蕩無津遂任鼓風柁存乎虚舟而行耳故實中之空空中之有有中之無象矣至於書迹之示則揮形紙札文理昺注麤好外著𤣥翰挺煥而範質用顯黙藻斯坦形傳塵濁茍騫露有骸之物而得與世進退上玷逸眞之詠下虧有隔之禁亦我等所不行靈法所不許也今請陳為書之本始也造文之既肇矣乃是五色初萌文章畫定之時秀人民之交别陰陽之分則有三元八㑹羣方飛天之書又有八龍雲明光之章也其後逮二皇之世演八㑹之文為龍鳯之章拘省雲篆之迹以為順形梵書分破二道壊眞從易配别本支乃為六十四種之書也遂播之於三十六天十方上下也各各取其篇𩔖異而用之音典雖均蔚跡隔異矣校而論之八㑹之書是書之至眞建文章之祖也雲篆明光是其根宗所起有書而始也今三元八㑹之書皇上太極高眞清仙之所用也雲篆明光之章今所見神靈符書之字是也爾乃見華季之世生造亂眞共作巧末徑下書皆流尸濁文淫僻之字舍本效假是囂穢死迹耳夫眞仙之人曷為棄本領之文迹手畫淫亂之下字耶夫得為眞人者事事皆盡得眞也奚獨於凡末之麤術淫浮之弊作而當守之而不改玩之而不遷乎夫人在世先有能書善為事者得眞仙之日外書之變亦忽然隨身而自反矣眞事皆邇者不復廢今已得之濁書方又受學於上文而後重知眞書者也鬼道亦然但書字有小乖違耳且以靈筆眞手初不敢下交於肉人雖時當有得道之人而身未超世者亦故不敢下手陳書墨以顯示於字迹也至乃符文神藻所求所佩者自復始來而作耳所以爾者世人固不能了其端緒又使吾等不有隱諱耳冥中自相參解矣内外自相關矣又四極明科高上禁重亦自不聽我等復為世間常書也我既下手子固不解亦將何趣兩為煩濫耶此亦當闇其可否殆不足嫌想少暢豁於胷懐盡不自書之流分矣上眞司命南嶽夫人授令書如左若夫仰擲雲輪總轡太空手維霄網足陟玉庭身升帝闕披寳歙青上論九𤣥之逸度下紀萬椿之大生遂竦景電肅千霞煥明眞言𤣥浪高譚玉清激朱脣之流徽運日氣之零零爰乃吐烽却煙彈金奏瓊鸞音蒨粲鳯唱嘉聲耳若但應景下旋靈塵埃參輦弊宇敖拂朝市來成眞才訓我弟子則玉振落響琳鐘内抑周目五濁契濶愆室神勞臭腥塡鼻斂氣遂閉蘭音於中華之元退案金聲之劣劣而發耳夫神者言㣲於邇萬里必接竒韻雖觸鑒無滯故眞理之既分聞遐則道高邈璞不肆瑩而致有卑㣲之聰也今子乃有心覺之至將致嫌似之思外觀流俗之對内有遲疑之悟乎不運事宜亦已邁也望所營者道研咏者妙耳道妙既得高下之音必坦然矣此非所謀吾子加之至慮散蕩斯念宜愼之耳右三條有楊書六月二十四日夜南嶽夫人見授令書此先是二十二日夕有在别室共論講道紫㣲南嶽二夫人聲氣語音殊下不解其趣今故授書此以答所共講者之疑心也初來見授時色氣猶不平授畢可爾弟子唯覺色有不平都無他可道此一條亦是楊君自記論南嶽夫人其夕語弟子言我明日當詣王屋山清虚宫令汝知之所至也其夕又言海東桐栢山西頭適崩二百許丈紫㣲王夫人云世人之思慮何得事事眞審耶可不事有答其心也南嶽夫人言戲之耳欲建豎之也瑩實之也興寧三年歲在乙丑六月二十五日夜此是安妃降事之端記録别為一卷故更起年歲號首也紫微王夫人見降又與一神女俱來神女著雲錦䙱上丹下青文彩光鮮腰中有緑繡帶帶係十餘小鈴鈴青色黃色更相參差左帶玉佩佩亦如世間佩但幾小耳衣服儵儵有光照朗室内如日中映視雲母形也雲髮鬃此應是鬒字鬒黒髪貌也整頓絶倫作髻乃在頂中又垂餘髪至腰許指著金環白珠約臂視之年可十三四許左右又有兩侍女其一侍女著朱衣帶青章囊手中又持一錦囊囊長尺一二寸許以盛書書當有十許卷也以白玉檢檢囊口見刻檢上字云玉清神虎内眞紫元丹章其一侍女著青衣捧白箱以絳帶束絡之白箱似象牙箱形也二侍女年可堪十七八許整飾非常神女及侍者顔容瑩朗鮮徹如玉五香馥芬如燒香嬰氣者也香嬰者嬰香也出外國初來入户在紫㣲夫人後行夫人既入户之始仍見告曰今日有貴客來相詣論好也於是某即起立夫人曰可不須起但當共坐自相向作禮耳夫人坐南向某其夕先坐承牀下西向神女因見就同牀坐東向各以左手作禮作禮畢紫㣲夫人曰此是太虚上眞元君金臺李夫人之少女也太虚元君昔遣詣龜山學上清道道成受太上書署為紫清上宫九華眞妃者也於是賜姓安名鬱嬪字靈簫紫㣲夫人又問某世上曾見有此人不某答曰靈尊高秀無以為喻夫人因大笑於爾如何某不復答紫清眞妃坐良久都不言妃手中先握三枚棗色如乾棗而形長大内無核亦不作棗味有似於梨味耳妃先以一枚見與次以一枚與紫㣲夫人自畱一枚語令各食之食之畢少久許時眞妃問某年幾是何月生某登答言三十六庚寅歲九月生也眞妃又曰君師南眞夫人司命秉權道高妙備實良徳之宗也聞君德音甚久不圖今日得叙因緣歡願於冥運之㑹依然有松蘿之纒矣某乃稱名答曰沈湎下俗塵染其質高卑雲邈無緣稟敬猥虧靈降欣踊罔極唯蒙啓訓以袪其闇濟某元元宿夜所願也眞妃曰君今語不得有謙飾謙飾之辭殊非事宜又良久眞妃見告曰欲作一紙文相贈便因君以筆運我鄙意當可爾乎某答奉命即襞紙染筆登口見授作詩如左詩曰雲闕竪空上瓊臺聳鬱羅紫宫乗緑景靈觀藹嵯峨琅軒朱房内上德煥絳霞俯潄雲瓶津仰掇碧柰花濯足玉天池鼓枻牽牛河遂䇿景雲駕落龍轡𤣥阿振衣塵滓際褰裳步濁波願為山澤結剛柔順以和相攜雙清内上眞道不邪紫㣲㑹良謀唱納享福多某書訖取視之乃曰今以相贈以宣丹心勿云云也若意中有不相解者自有㣲訪耳紫㣲夫人曰我復因爾作一紙文以相曉者以示善事耳某又襞紙染筆夫人見授詩云二象内外泮𤣥氣果中分冥㑹不待駕所其貴得真南嶽鑄明金眇觀傾笈良徳飛霞照遂感靈霄人乘飆儔衾寢齊牢攜絳雲悟歎天人際數中自有緣上道誠不邪塵滓非所聞同目咸恒象高唱為爾因書訖紫㣲夫人取視視畢曰以此贈爾今日於我為因緣之主唱意之謀客矣紫㣲夫人又曰明日南嶽夫人當還我當與妃共迎之於雲陶間明日不還者乃復數日事又良久紫㣲夫人曰我去矣明日當復與眞妃俱來詣爾也覺下牀而失所在也眞妃少畱在後而言曰冥情未攄意氣未忘想君俱咏之耳明日當復來乃取某手而執之而自下牀未出户之間忽然不見六月二十六日夕衆眞來疏如左紫㣲王夫人紫清上宫九華眞妃上眞司命南嶽夫人某師凡此前後云某者皆楊君自隱名也紫陽眞人茅中君清靈眞人茅小君又有一人年甚少整頓非常建芙蓉冠著朱衣以白珠綴衣縫帶劒都未曾見此人來多論金庭山中事與衆眞共言又有不可得解者揖敬紫㣲紫清南眞三女眞餘人共言平耳云是桐柏山眞人王子喬也都不與某語又前後初有眞人來見降者時皆自不即與某共語耳各坐良久紫清眞妃曰欲復煩明君之手筆書一事以散意忘言可乎某又襞紙待授眞妃乃徐徐㣲言而授曰我是元君之少女太虚李夫人愛子也昔初學眞於龜臺受玉章於高上荷虎録於紫皇秉瓊鉞於天帝受書於上眞之妃以遊行玉清也常數自手扉九羅足躡𤣥房霄形靈虚仰歠日根入宴七闕出轡雲輪攝三辰而俱升散景霞以飛軒也非不能採擇上室訪捜紫童求王宫之良儔偶高靈而為雙接𤣥引竒友干帝郎矣直是我推機任㑹應度厯數俯景塵沫參龍下邁招冥求之雄追得匹之黨耳自因宿命相與乃有墨㑹定名素契玉鄉齊理二慶攜鴈而行匏爵分味醮衾結裳顧儔中饋内藏眞方也推此而往已定分冥簡青書上元是故善鄙之心亦已齊矣對景之好亦已域矣得願而遊歡兼昔㫖豈不冥乎自然此復是二象大宗内外之配職耳實非所以變無反澹凝情虚刃靈刀七累遺任太素保眞啓玉單景八空之謂也秀寂高清鬱輿流霄使鳯歌雲路龍吟虎嘷天皇雙景逺升辰樓飛星擲光日月映軀口吐冥煙眼激電光上寢瓊房流行玉清手掣景雲足陟金庭若自此之時在得道之頃為當固盡内外理同金石情纒雙好齊心幃幙耳為必抱衾均牢有輕中之接塵穢七神悲魂任魄乎蓋是妾求氏族於明君耳非有邪也今可謂得志懷眞情已如一方當相與結駟玉虚偶行此𤣥同掇綘實於玉圃併採丹華於閬園分飲於紫川之水齊濯於碧河之濱紫華毛帔日冕蓉冠逍遙上清俱朝三元八景出落鳯扉雲關仰潄金髓咏歌玉𤣥浮空寢晏高㑹太晨四鈞朗唱香母奏煙齊首偶觀攜帶交裙不亦樂乎不亦得志乎明君其順運隨㑹妾必無辭且亦自不得背實反冥茍任胷懐矣授畢復自取視而言曰今以此書相詣庶豁其滯疑耳言畢乃笑良久紫㣲夫人曰眞妃之辭盡矣論好之緣著矣爾亦不得復有所容也𤣥運冥分使之然耳南嶽夫人見授書曰冥期數感𤣥運相適應分來聘新搆因緣此攜眞之善事也蓋示有偶對之名定内外之職而已不必茍循世中之弊穢而行淫濁之下迹矣偶靈妃以接景聘貴眞之少女於爾親交亦大有進業之益得而無傷絶之慮耳千神於是可使試觀不得復陳矣眞旌必可尅往雲軿必可俱駕也吾往曾因紫㣲夫人為汝構及此意今遂如願益使我欣欣愼勿復疑矧於心胷矣我昨見金臺李夫人於清虚中言爾尚有疑正之心色氣小有眼眼謂應作悢悢字汝違此舉誤人不小眞妃有神虎内眞丹青玉文非爾所有者輩良才求寫故當不為隱耳今日相攜何但文章而已將必乗景玉霄乎若有未悟者宜㣲訪可否眞妃見夫人書言乃笑而言攜手雙臺娯歎良㑹景軿同機於此齊乎眞誥巻一
