body:
  text: 真誥卷十九梁陶𢎞景撰翼真檢第一真誥叙錄真誥運題象第一此卷並立辭表意發詠暢㫖論冥數感對自相儔㑹分為四卷真誥甄命授第二此巻並詮導行學誡厲愆怠兼曉諭分挺炳發禍福分為四卷真誥協昌期第三此卷並修行條領服御節度以會用為宜隨事顯法真誥稽神樞第四此巻並區貫山水宣叙洞宅測真仙位業領理所闕分為四巻真誥闡幽微第五此巻並鬼神官府官司氏族明形識不滅善惡無遺分為二卷真誥握真輔第六此卷是三君在世自所記錄及書疏往來非真誥之例分為二巻真誥翼真檢第七此巻是標明真緒證質𤣥原悉𨼆居所述非真誥之例分為二卷右真誥一蘊其十六卷是真人所誥四巻是在世記述仰尋道經上清上品事極高真之業佛經妙法蓮華理㑹一乘之致仙書莊子内篇義窮𤣥任之境此三道足以包括萬象體具幽明而並各二十卷者當是璇璣七政以齊八方故也隱居所製登真𨼆訣亦為七貫今述此真誥復成七日五七之數物理備矣夫真人之㫖不同世目謹仰範緯候取其義𩔖以三言為題所以莊篇亦如此者蓋長桑公子之微言故也俗儒觀之未解所以真誥者真人口㖟之誥也猶如佛經皆言佛説而顧𤣥平謂為真迹當言真人之手書迹也亦可言真人之所行事迹也若以手書為言真人不得為隸字若以事迹為目則此迹不在真人爾且書此之時未得稱真既於義無㫖故不宜為號南嶽夫人傳載青籙文云嵗在甲子朔日辛亥先農饗旦甲寅羽水起安啓年經乃始傳得道之子當修玉文謹推按晉厯哀帝興寧二年太嵗甲子正月一日辛亥朔厯忌可祀先農四日甲寅羽水正月中炁羽即雨也起者興也安者寧也故迂隱其稱耳如此則興寧二年正月南真已降授楊君諸經也今檢真授中有年月最先者惟三年乙丑嵗六月二十一日定錄所問從此月日相次稍有降事又按中候夫人告云令種竹比宇以致繼嗣又云福和者當有二子盛徳命世尋此是簡文為相王時以無兒祈請於是李夫人生孝武及會稽王福和應是李夫人私名也于時猶在卑賤孝武崩時年三十五則是壬戌年生又在甲子前二嵗如此衆真降楊已久矣又定錄以乙丑年六月喻書與長史云曾得往年三月八日書此亦應是癸亥甲子年中也又按萼綠華以升平三年降即是乙未嵗又在甲子前五年此降雖非楊君楊君已知見而記之也又按乙丑嵗安妃謂楊君曰復二十二年明君將乘雲駕龍北朝上清則應以太元十一年丙戌去世如此二十許載辭事不少今之所存畧有數年尋檢首尾百不遺一又按衆真未降楊之前已令華僑通傳音意於長史華既漏妄被黜故復使楊令授而華時文迹都不出世又按二許雖𤣥挺高秀而質撓世迹故未得接真今所授之事多是為許立辭悉楊授㫖疏以示許爾唯安妃數條是楊自所記錄今人見題目云某日某月某君㖟許長史及掾某皆謂是二許親承音㫖殊不然也今有二許書者並是别寫楊所示者耳又按掾自記云泰和三年行某道二錄是二年受自三年後無復有疏長史正書既不工所繕寫蓋少今一事乃有兩三本皆是二許重寫悉無異同然楊諸書記都無重本明知唯在掾間者于今頗存而楊間自有杳然莫測自楊去後六七年中長史間迹亦悉不顯又按今所詮綜年月唯乙丑嵗事最多其丙寅丁夘各數條而已且第一卷猶可領畧次第其餘卷日月前後參差不盡得序又按凡所注日月某受多不書年今正率其先後以為次第事有斷絶亦不必皆得又本無年月及不注某受者並不可知依先闕之又按真授説餘人好惡者皆是長史因楊請問故各有所答並密在許間于時其人未必悉知又按併衿接景陽安亦灼然顯説凡所興有待無待諸詩及辭喻諷㫖皆是雲林應降嬪僊侯事義並亦表著而南真自是訓授之師紫微則下教之匠並不闗儔結之例但中侯昭靈亦似别有所在旣事未一時故不正的的耳其餘男真或陪從所引或職司所任至如二君最為領據之主今人讀此辭事若不悟斯理者永不領其㫖故畧標大意宜共密之又按二許應修經業既未得接真無由見經故南真先以授楊然後使傳傳則成師所以長史與右英書云南真哀矜去春使經師見授洞房云云而二許以世典為隔未崇禮敬楊亦不敢自處旣違真科故告云受經則師乃恥之耶然則南真是𤣥中之師故楊及長史皆謂為𤣥師又云疾者當啓告於𤣥師不爾不差而長史與右英及衆真書亦稱惶恐言者此同於師儀爾實非師也又按楊書中有草行多儳黵者皆是受㫖時書既怱遽貴畧後更追憶前語隨復增損之也有謹正好書者是更復重起以示長史耳又按三君手書今旣不摹則混寫無由分别故各注條下若有未見真手不知是何君書者注云某書又有四五異手書未辨為同時使寫為後人更寫旣無姓名不證真偽今並撰錄注其條下以甲乙丙丁各甄别之又按書字中有異手增損儳改多是許丞及丞子所為或招引名稱或取會當時並多浮妄而顧皆不能辨從而取之今旣非摹書恐漸致亂或並隨字注銘若是真手自治不復顯别又按三君手迹楊君書最工不今不古能大能細大較雖祖効郄法筆力規矩並於二王而名不顯者當以地微兼為二王所抑故也掾書乃是學楊而字體勁利偏善寫經畫符與楊相似鬱勃鋒勢殆非人功所逮長史章草乃能而正書古拙符又不巧故不寫經也隱居昔見張道恩善别法書歎其神識今覩三君跡一字一畫便望影懸了自思非智藝所及特天假此監令有以顯悟爾又按三君手書作字有異今世者有龜龍虛華顯服寫辭闕闗之例三君同爾其楊飛掾飛楊我掾我楊靈長史靈掾靈楊真長史真楊師掾師楊惡長史惡此其自相為異者又鬼魔字皆作摩淨潔皆作盛潔盛貯皆作請貯凡大畧如此亦不可備記恐後人以世手傳寫必隨世改動故標示其例令相承謹爾按此諸同異悉已具載在登真隱訣中又按三君書字有不得體者於理乃應治易要宜全其本跡不可從實闇改則澆流散亂不復固真今並各朱郭疑字而注其下又按三君多書荆州白牋嵗月積久或首尾零落或魚爛缺失前人糊㩉不能悉相連補並先抄取書字因毁除碎敗所缺之處非復真手雖他人充題事由先言今並從實綴錄不復分析又按三君書有全卷者唯道授二許寫酆都宮記是楊及掾書並有首尾完具事亦相𩔖其餘或五紙三紙一紙一片悉後人糊連相隨非本家次比今並挑拔取其年月事𩔖相貫不復依如先卷又按衆真辭㫖皆有義趣或詩或戒互相酬配而顧所撰真迹枝分𩔖别各為部卷致語用乖越不復可領今並還依本事并日月紙墨相承貫者以為詮次又按起居寶神及明堂夢祝述叙諸法十有餘條乃多是抄經而無正首尾猶如日芒日象𤣥白服霧之屬而顧獨不撰用致令遺逸今並詮錄各從其例又按有未見真本復不測有無流傳所記舛駁不𩔖者未敢便頓省除皆且注所疑之意各於條下又按所載洞宮及諸山仙人氏族並欲以外書詳注出其根宗恐大致顯泄仰忤冥軌唯有異同疑昩者畧標言之其酆宮鬼官乃可隨宜顯説又按此書所起以真降為先然後衆事繼述真降之顯在乎九華而顧撰最致末巻又先生事迹未近真階尚不宜預在此部而顧遂載王右軍父子書傳並於事為非今以安記第一省除許傳别充外書神仙之例唯先生成仙之後與弟書一篇留在下卷又長史書即是問華陽事華陽事仍是答長史書强分為兩部於事相失今依㫖還為貫次又顧所記二許年月殊自違僻今謹依真㖟檢求又以許家譜參校注名異同在此卷後又按三君書迹有非疏真㖟或寫世間典籍兼自記夢事及相聞尺牘皆不宜雜在真誥品中既寶重筆墨今並撰録共為第六一卷顧所遺者復有數條亦依例載上又真誥中凡有紫書大字者皆隱居别抄取三君手書經中雜事各相配𩔖共為證明諸經旣非聊爾可見便於例致隔今同出在此則易得尋究又此六篇中有朱書細字者悉隱居所注以為誌别其墨書細字猶是本文真經始末伏尋上清真經出世之源始於晉哀帝興寧二年太嵗甲子紫虛元君上真司命南嶽魏夫人下降授弟子瑯瑘王司徒公府舍人楊某使作隸字寫出以傳䕶軍長史句容許某并弟三息上計掾某某二許又更起寫修行得道凡三君手書今見在世者經傳大小十餘篇多掾寫真㖟四十餘卷多楊書瑯瑘王即簡文帝在東府為相王時也長史掾立宅在小茅後雷平山西北掾於宅治寫修用以泰和五年隱化長史以泰元元年又去掾子黃民時年十七乃收集所寫經符秘籙歴嵗于時亦有數卷散出在諸親通間今句容所得者是也元興三年京畿紛亂黃民乃奉經入剡長史父昔為剡縣令甚有徳惠長史大兄亦又在剡居是故投憩焉為東闡馬朗家所供養朗一名溫公朗同堂弟名罕共相周給時人咸知許先生得道又祖父亦有名稱多加宗敬錢塘杜道鞠即居士京產之父道業富盛數相招致于時諸人並未知尋閲經法止稟奉而已至義熙中魯國孔黙崇信道教為晉安太守罷職還至錢塘聞有許郎先人得道經書具存乃往詣許許不與相見孔膝行稽顙積有旬月兼獻奉殷勤用情甚至許不獲已始乃傳之孔令令晉安郡吏王興繕寫興善有心尚又能書畫故以委之孔還都唯寶錄而已竟未修用元嘉中復為廣州刺史及亡後其子熙先休先才學敏贍竊取看覽見大洞真經説云誦之萬遍則能得仙大致譏誚殊謂不然以為仙道必須丹藥鍊形乃可超舉豈有空積聲詠以致羽服兼有諸道人助毁其法或謂不宜蓄此因一時焚蕩無復孑遺此當是㝠意不欲使流傳於外世故也後熙光等復與范同謀被誅也王興先為孔寫輒復私繕一通後將還東修學始濟浙江便遇風淪漂唯有黃庭一篇得存興乃自加切責仍住剡山稍就讀誦山靈即火燒其屋又於露壇研詠俄頃驟雨紙墨霑壞遍數遂不得畢興深知罪譴杜絶人倫唯書厯日貿糧以續炁命其子道泰為晉安船官督資產豐富數來拜獻兼以二奴奉給興一無留納而終乎剡山於是孔王所寫真經二本前後皆滅遂不行世此當是興先不師受妄竊寫用所致如此也復有王靈期者才思綺拔志規敷道見葛巢甫造構靈寶風教大行深所忿嫉於是詣許丞求受上經丞不相允王凍露霜雪幾至性命許感其誠到遂復授之王得經欣躍退還尋究知至法不可宣行要言難以顯泄乃竊加損益盛其藻麗依王魏諸傳題目張開造制以備其錄并增重詭信崇貴其道凡五十餘篇趨競之徒聞其豐愽互來宗稟傳寫既廣枝葉繁雜新舊渾淆未易甄别自非己見真經實難證辨其㸃綴手本頗有漏出即今猶存又朱先生僧標學増禇公伯玉語云天下才情人故自絶羣吾與王靈期同船發都至頓破崗埭竟便已作得兩卷上經實自可訝自靈期已前上經己往往舛雜𢎞農楊洗和隆安四年庚子嵗於海陵再遇隱盟上經二十餘篇有數卷非真其云尋經已來一十二年此則楊君去後便以動作故靈寶經中得取以相證非都是靈期造製但所造製者自多耳今世中相傳流布京師及江東數郡畧無人不有但江外尚未多爾此當是道法應宣而真妙不可廣布故令王造行此意也王既獨擅新奇舉世崇奉遂託云真授非復先本許見卷袠華廣詭信豐厚門徒殷盛金帛充積亦復莫測其然乃鄙閉自有之書而更就王求寫於是合迹俱宣同聲相讚故致許王齊轡真偽比蹤承流向風千里而至後又有莱買者亦從許受得此十數卷頗兼真本分張傳受其迹不復具存莱買善行下道之教於上經不甚流傳也馬朗既見許所傳王經卷目增多復欲更受營理詭信克日當度忽夢見有一玉椀從天來下墜地破碎覺而發疑云此經當在天為寶下地不復堪用於是便停論馬朗雖不修學而寶奉精至夢既不凡解之又善亦應是得道人元嘉六年許丞欲移歸錢塘乃封其先真經一㕑子且付馬朗淨室之中語朗云此經並是先靈之迹唯須我自來取縱有書信慎勿與之乃分持經傳及雜書十數卷自隨來至杜家停數月疾患慮恐不差遣人取經朗既惜書兼執先㫖近親受教敕豈敢輕付遂不與信我而許便過世所齎者因留杜間即今世上諸經書悉是也許丞長子榮弟迎喪還鄉服闋後上剡就馬求經馬善料理不與其經許旣慚戢不復苦索仍停剡住因又以靈期之經教授唱言並寫真本又皆注經後云某年某月某真人授許遠遊于時世人多知先生服食入山得道而不究長史父子事迹故也人亦初無疑悟者經涉數年中唯就馬得兩三卷真經頗亦宣泄今王惠朗諸人所得者是也元嘉十二年仍於剡亡因葬白山榮弟在剡大縱淫侈都不以經學為意所以何公在馬家快得尋寫馬朗馬罕敬事經寶有過君父恒使有心奴子二人一名白首一名平頭常侍直香火洒掃拂拭每有神光靈炁見於室宇朗妻頗能通見云數有青衣玉女空中去來狀如飛鳥馬家遂致富盛資產巨萬年老命終朗子洪洪弟真罕子智等猶共遵向末年事佛乃弛廢之爾此當是經運應出所致也山陰何道敬志向專素頗工書畫少遊剡山為馬家所供侍經書法事皆以委之見此符跡炳煥異於世文以元嘉十一年稍就摹寫馬罕旣在别宅兼令何為起數篇所以二錄合本仍留罕間何後多換取真書出還剡東墅青壇山住乃記説真經之事可有兩三紙但何性鄙滯不能精修高業後多致散失猶餘數卷今在其女弟子始豐後堂山張玉景間何常以彭素為事質又野朴顧居士聞其得經故往詣尋詣正遇見荷鋤外還顧謂是奴僕因問何公在否何答不知於是還裏永不相見顧留停累日請苦備至遂不接之時人咸以何鄙恥不除而失知人之會也何旣分將經去又泄説其意馬朗忿恨乃洋銅灌㕑籥約敕家人不得復開大明七年三吳饑饉剡縣得熟樓居士惠明者先以在剡乃復攜女師鹽官鍾義山眷屬數人就食此境樓既善於章符五行宿命亦皆開解馬洪又復宗事出入堂靜備覩經㕑先已見何所記意甚貪樂而有鐍嚴固觀覽無方景和元年乃出都令嘉興殳季真啟敕封取景和旣猖狂樓謂上經不可出世乃料簡取真經真傳及雜㖟十餘篇乃留置鍾間唯以豁落符及真㖟二十許小篇并何公所摹二錄等將至都殳即以呈景和於華林暫開仍以付後堂道士秦始初殳乃啟將出私解陸修靜南下立崇虛館又取在館陸亡隨還廬山徐叔標後將下都及徐亡仍在陸兄子瓌文間此中有三君所書真受後人糊連裝㯓分為二十四篇建元三年敕董仲民往廬山營功徳董欲求神異徐因分楊書一篇為雨篇與董還上高帝高帝以付五經典書戴慶戴慶出外仍將自隨徐因亡後弟子李果之又取一篇及豁以去所餘惟二十一篇悉以還封昭臺也樓從都還仍住剡就鍾求先所留真經鍾不以還之乃就起寫久久方得數篇旣與馬洪為恨移歸東陽長山馬後遂來潛取而誤得他經樓中時似復有所零落今猶應一兩篇在其二巻已還封昭臺真誥巻十九
