body:
  text: 眞誥卷十三梁陶𢎞景撰稽神樞第三地下主者復有三等鬼帥之號復有三等並是世有功德積行所鍾或身求長生步道所及或子弟善行庸播祖禰或諷明洞𤣥化流昆祖洞𤣥即大洞𤣥經讀之萬遍七祖已下並得錬質南宫受化胎仙非今世所稱洞𤣥靈寶經也夫求之者非一而獲之者多途矣要由世積陰行然後皆此廣生矣鬼帥武解主者文解俱仙之始也度名東華簡刋上帝不𨽻酆宮不受制三官之府也又别云心勤於事欲兼味於清正華目以隨世畏死而希仙者亦多作文武解主者其一等地下主者散在外舍閒停無業不受九宮教制不聞練化之業雖俱在洞天而是主者之下者此自按四明法一百四十年依格得一進耳一進始得步仙階給仙人之使令也依劒經主者大有品秩遷轉年限賒促懸殊此等數之目異於品名反以多為貴如此階秩矣其二等地下主者便徑得行仙階級仙人百四十年進補管禁位管禁之位如世間散吏者也此格即地下主者之中條也李東等今在第一等中李東曲阿人乃領户為祭酒今猶有其章本亦承用鮑南海法東才乃凡劣而心行清直故得為最下主者使是許家常所使永昌元年先生年二十三就其受六甲陰陽行厨符既相關悉聊復及之耳其第三等地下主者之髙者便得出入仙人之堂寢遊行神州之鄉出館易遷童初二府入晏東華上臺受學化形濯景易氣十二年氣攝神魂十五年神束藏魄三十年棺中骨還附神氣四十年平復如生人還遊人間五十年位補仙官六十年得遊廣寒百年得入昆盈之宫此即主者之上者仙人之從容矣張姜子等先在第二等中亦始得入易遷耳鬼帥之位次亦如此矣主者之位亦不限男女按此年限得棺中之骨便得出生世中亦往往有此改變隱適難己意量殆入不可思議之境耳易遷童初二宫是男女之堂館也其中間静東海青童君一年再遊校此諸宮觀見羣輩也一年再遊似依傳中曰而前書云正月二十三日東宫上人來便是不必復有定期也趙素臺在易遷宫中已四百年不肯徙自謂天下無復樂於此處也趙素臺是趙熙女漢時為幽州刺史有濟窮人於河中救王惠等於族誅行陰德數十事故其身得詣朱陵兒子今並得在洞天中也熙恒出入在定録府素臺數微服遊行道巷盼山澤以自足矣趙熙漢書不顯㣲服遊行蓋謂在洞天中耳不應乃出世中也易遷中有髙業而蕭條者有竇瓊英韓太華劉春龍王進賢李奚子郭叔香此數人並天姿鬱秀澄上𦕈邈才及擬勝儀觀駭衆此則主者之髙者仙官之可才其次及得張善子輩鄧伯苗母有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨為業以活死為事故祚及於英身矣竇武字游平竇融𤣥孫峙則應是融祖也武亦恒以財物散施天下貧乏靈帝時為大將軍與陳蕃俱被誅其母産武時并産一蛇蛇出即走上南山至母死無何而來哀泣良久又去亦所以為異但未解俱承七世之慶兄戮而妹當仙非道家之北斗也鬼官别有北斗君以司生殺爾按孫皓敗將張悌軍人柳榮病死已三日且忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晚悌戰死如此即應是第四宫也今第五第六宮不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宫中總主諸六天宮餘四天宮其四明公各在其中治雖云各治一宮又不顯各在何宮宫既並列復不得依位作四方言之尋其公次第髙下則第二宫名為西明公治第三宫東明公治第四宮北斗君治及次南次北也二天宮立一官六天凡立為三官三官如今刑名之職主諸考謫常以眞仙司命兼以總御之也並統仙府共司生死之任也大斷制皆由仙官道家常呼三官者是此也而消魔經云岱宗又有左火官右水官及女官亦名三官並主考罰今三茅君通掌之大君為都統保命為司察矣所以𨽻仙官者以為天下人不盡皆死其中應得眞仙則非北帝所詮或有雖死而神化反質者如此皆在眞仙家簡録故司命之職應而統之也鬼官北斗君乃是道家七辰北斗之考官此鬼一官又𨽻九星之精上屬北晨玉君府耳天上北斗有所司察故鬼官亦置此職以精象相應統領既關璇璣是以仰𨽻太上之曹也未必盡徑來也别更一二宻可示爾同氣令知斗處幽閒之泰也道業可不勗哉此三人外書並不顯後漢有李雲亦為白馬令以直言忤㫖死令示同氣者謂以告長史掾也七月二十四日夜保命君吿按前受長史司馬諸人雖定録所告而應是初說洞中事是丑年十一月今此說雜人乃宜繼後反為七月復不應是寅年進退極難詳從地下主者來凡十四條並有掾冩共一卷也含眞臺洞天中皆有非獨此也此一臺偏屬太元府𨽻司命耳其中有女真二人總之其一女眞是張微子漢昭帝時將作大匠張慶女也㣲子好道因得尸解法而來入此亦先在易遷中微子常服霧氣自云霧氣是山澤水火之華精金石之盈氣也久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期文期青童之妹也微子曾精思於寢靜誠心感靈故文期降之授以服霧之道也服霧之道授微子微子亦時以教諸學在含真易遷中者我昔嘗得此方乃佳可施用者也服霧法常以平旦於寢静之中坐卧任己先閉目内視髣髴如見五臟畢因口呼出氣二十四過臨目為之使目見五色之氣相繞纒在靣上鬱然因又口内此五色氣五十過畢咽唾六十過畢乃㣲呪曰太霞發暉靈霧四遷結氣宛屈五色洞天神烟合啓金石華真藹鬱紫空鍊形保全出景藏幽五靈化分合明扇虚時乘六雲和攝我身上昇九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州𤣥都多有得此術者爾可行此法邪久行之常乘雲霧而遊此服霧法已别抄用事在第三篇中今猶疑存此與本文相隨也其一女眞是傅禮和禮和是漢桓帝外甥侍中傅建女也北地人其家奉佛精進女常旦夕灑掃佛前勤勤祝誓心願仙化神靈監其此心亦得來此久處易遷今始得為含真臺主也常服五星氣以得道禮和善歌歌則鳥獸飛聚而聽聲焉右定録君言張傳二人外書不顯或應各在家譜中右一條有楊書又掾冩王衍為晉武帝尚書令其女字進賢為愍懷太子妃洛陽亂劉曜石勒畧進賢渡孟津河於河中欲妻之進賢罵曰我皇太子婦司徒公之女而胡羌小子敢欲干我乎言畢即投河中其侍婢名六出復言曰大既有之小亦宜然復投河中時遇嵩髙女真韓西華出遊而愍之撫接二人遂獲内救外示死形體實宻濟便將入嵩髙山今在華陽宮洞内易遷之中六出時年二十二三許體貌亦整善有心節本姓田漁陽人魏故浚儀令田諷之孫諷曾有陰德之行以及於六出耳晉書云王衍長女名景風貌美賈后為弟謐娶之少女名惠風以配愍懷太子恨之如此則不甚美也永嘉五年六月王彌劉曜石勒破洛賊欲逼妃妃拔刀曰我太尉公之女皇太子之妃有死而已終不為逆虜所辱遂見害家人收葬於城西南洛水之北追謚曰貞定妃與此說小異范幼沖遼西人也受胎化易形今來在此恒服三氣三氣之法存青氣白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止為之十年身中自有三色之氣遂得神仙此髙元君太素内景法旦旦為之臨目施行視日亦佳其法雖鮮其事甚騐許侯可為之此法亦以重抄書在第三篇修有事耳范監者即其人也昔得為童初監今在華陽中又别云曾為漢尚書郎善解地理以冡宅為意此亦在第三篇右三條並楊書河内李整昔受守一法并洞房得道初在洛陽山近來入華陽中又主諸考祟民間之事整往為常道鄉公傅受道入山時已年六十不知李作何位亦應是監職常道鄉公魏元帝本封也罡山東北有穴通大句曲南之方山之南穴姜伯眞數在此山上取石腦石腦在方山北穴下繁陽子昔亦取服此罡山猶是大横山故後云掾恒與方山五人往來但不知有路通洞天中不爾繁陽子即鹿迹洞中何苗也此北竚山中亦有此物未詳竚山在何處今句曲北鹿迹山西有名竚角山似當是其處也石腦故如石但小斑色而輭耳所在有之服此時時使人發熱又使人不渴李整昔未入山時得風痺疾久久乃愈耳此人先多房内事殆不同今者疾之輕薄也石腦今大茅東亦有形狀圓小如曾青而質色似鍾乳牀下乃皎白時有黒斑而虚輭服之乃熱為治亦似鍾乳也羅江大霍有洞臺中有五色隱芝此則南真及司命所任之處也華陽洞亦有五種夜光芝此則司命所請以植句曲内外者也良常山有熒火芝此物在地如熒火狀其實似草而非也大如豆形紫華夜視有光得食一枚心中一孔明食七枚七孔明可夜書計得食四十七枚夀萬年從來未聞有見之者當是無至心尋求耳包山中有白芝又有隱泉之水正紫色此即林屋山也在吳太湖中耳華陽雷平山有田公泉水飲之除腹中三蟲與隱泉水同味云是玉砂之流津也用以衣不用灰以此為異矣此水今從地涌出狀如沸水味異美取垢衣便自得淨即所呼為柳谷汧者在長史宅東南一里許也昔髙辛時有仙人展上公者於伏龍地植李彌滿其地展先生今為九宮内右司保其常向人說昔在華陽下食白李味異美憶之未久而忽已三千年矣諸厯檢課謂堯元年戊戌至齊之己卯歲二千八百三年髙辛即堯父說此語時又應在晉世而已云三千年即是堯至今不啻二千八百年外厯容或不定如此丁亥之數不將已過乎汲冢紀年正二千六百四十三年彌復大懸也後有郭四朝又於其處種五果又此地可種柰所謂福鄉之柰以除災厲秦時有道士周太賓及巴陵侯姜叔茂者來往句曲山下又種五果并五辛菜叔茂以秦孝王時封侯今名此地為姜巴者是矣以其因叔茂而名地焉地號今亦存有大路從小茅後通延陵即呼為姜巴路也但秦孝公時未并楚置郡巴陵縣始晉初不知那有巴陵之封恐是巴蜀之巴故也此二人並已得仙今在蓬萊為左卿今南鄭諸姜則叔茂之後茂曾作書與太極官僚云昔學道於鬼谷道成於少室養翮於華陽待舉於逸域時乘飆輪宴我句曲悟言永歎代謝之速物存人亡我勞如何太賔亦有才藝善鼔琴昔教糜長生孫廣田廣田即孫登也獨絃能彈而成八音眞奇事也孫登即嵇康所謂長嘯者亦云見彈一絃之琴斯言非虚矣叔茂種五辛菜常賣以市丹砂而用之今山間猶有韭薤即其遺種邪今呼為韭山在大茅西甚多大韭又餘處亦有蒜薤耳非山姜巴一處也今舍前有塘乃郭四朝所造也髙其牆岸蓋水得深但歴代久逺塘牆頽下耳今舍語似是論長史宅宅前今乃有塘近西為堤牆即是遏柳汧水而去郭千甚遠郭千在北洞西北今有大陂塘四朝先應住此未解舍前之意恐長史於彼復立田業又有説在後四朝常乘小船游戲其中每叩船而歌曰清池帶靈岫長林鬱青蔥𤣥鳥藏幽野悟言出從容鼔檝乘神波稽首希晨風未獲解脫期逍遥丘林中晨風謂上清玉晨之風非毛詩所謂鴥彼晨風之鳥也浪神九垓外研道遂金眞戢此靈鳯羽藏我華龍鱗髙舉方寸物萬吹皆垢塵顧哀朝生惠孰盡汝車輪女寵不弊席男愛不盡輪朝生蜉蝣也以喻人之在世易致消歇耳遊空落飛飆靈步無形方圓景煥明霞九鳯唱朝陽暉翮扇天津菴藹慶雲翔遂造太微宇挹此金棃漿逍遥𤣥垓表不存亦不亡𤣥垓九垓皆八極之外九霞之頂名也飛登木星亦名𤣥朗東陽之垓故若士語盧敖云吾與汗漫期於九垓之上矣駕歘舞神霄披霞帶九日髙皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闔幽冥戸靈變𤣥迹滅四朝為玉臺埶蓋郎故云髙皇齊龍輪定録言右十二條掾寫共一篇四朝燕國人也兄弟四人並得道四朝是長兄也眞法其司三官者六百年無違坐超遷之四朝職滿上補九宮左仙公領玉臺執蓋郎中間久闕無人後以思和代四朝也山下居民今猶呼一平澤地為郭千者是四朝之姓尚存於民口也四朝往曾使人種植於此地也年年四朝每行皆過詣此山以造思和遊㸔原阜此是茅傳中言也按如此說郭千止是種植處非居止也住處則長史宅果應是矣今塘牆既頹決水不復甚停人皆以為田耳然其地汗濶小壅猶自城池可得汎舟而歌但無人能追蹤逺世可歎如何後云此四朝年年行過遊㸔是上補去後猶復憶羡舊居所以數宴良常眷盼朋好張𤣥賔者定襄人也魏武帝時曾舉茂才歸鄉里事師西河薊公服术餌兼行洞房白元之事後遇眞人樊子明於少室授以遯變隱景之道昔在天柱山中今來華陽内為理禁伯理禁伯主諸水雨官也此人善能論空無乃談士常執本無理云無者大有之宅小有所以生焉積小有以養小無見大有以本大無有有亦無無焉無無亦有有焉所以我目都不見物物亦不見無寄有以成無寄無以得無於是無則無宅也太空亦宅無矣我未生時天下皆無無也其所論端據如此桐柏諸靈亦不能折也自云昔曾詣蓬萊宋晨生晨生者蓬萊左公也與其論無粗得人意過此已去尚未能本有安能本無邪與餘人論空無天下中皆無人焉其髙氣秉理如此東卿君紫微𤣥清亦莫得而千也理禁伯官亦保命之監國也此論空無之理乃殊得無宗而𤣥𤣥固難可曲覈矣眞人之才義亦是甚有優劣東卿桐柏紫㣲𤣥清蓋相推並言談之英辯者故舉此為標也按左傳稱君之世子從曰撫軍守曰監國監國之任則是副貳疑此監國或因作監司也趙威伯者東郡人也少學邯鄲張先生先生得道之人耳晚在中嶽授玉佩金鐺經於范丘林丘林乃是漢樓船將軍衞行道婦也學道得仙遂授行挹日月之道又服九靈明鏡華遂得仙昔亦來在華陽内為保命丞河圖云吳楚得有得見太平者其常語人云此語不虚此騐不及如此諸學者何可不彌加勤勵也其存明鏡非世間常法也受范丘林口訣云善嘯嘯如百鳥雜鳴或如風激衆林或如伐鼓之音時在天市壇上奮然北向長嘯呼風須㬰雲翔其上衝氣動林或㝠霧飆合或零雨其濛矣保命有四丞此一人主為暴雨水及領五芝金玉草若欲致洪雨者將可辭詣之也又理禁伯亦主雨水若請雨宜併為辭也其一丞是咸陽樂長治東卿司命君鄉里人也為小君所舉用漢桓帝中書郎晚從中嶽李先生受道行七元法得仙相去二百餘年猶蒙卿邽之澤也一人是孟君入室弟子鄭雉正者孟君所屬用孟君京兆人或呼為孟先生不知何名位其一人是西山唐房此則神仙傳所載是蜀人奉事李八百者也樂長治主災害鄭雉正主考注唐公房主生死趙威伯主仙籍并記學道者并暴雨水靈芝草洞宫官寮司察吳越非民在任不過此四丞也其下則有四師事在第三篇中定録道此右此有掾冩依紙墨亦言前篇而中間有此失缺此行後又割恐别復有事並遺落深可恨惜耳杜契者字廣平京兆杜陵人建安之初來渡江東依孫筞入㑹稽嘗從之後為孫權作立信校尉黄武二年漸學道遇介琰先生授之以𤣥白術隱居大茅山之東面也守𤣥白者能隱形亦數見身出此市里契與徐宗度晏賢生合三人俱在茅山之中時得入洞耳或自採伐貨易衣糧於虛曲而人自不知之耳猶琰者即白羊公弟子也今在建安方山中也琰即禁山符云為孫權所殺化形而去往建安方山尋白羊公杜必當於此時受道也契音薛即與舜同契字四畫契三畫分毫有異也徐宗度晉陵人作孫皓左典軍吕悌司馬受風谷先生氣禁道故得契俱晏賢生是歩陟外甥即宗度之弟子也契弟子二人一人孫賁孫女寒華也少時宻與契通情後學道受介琰法又以法受寒華寒華初去時先叛入建安依邵武長張毅毅即契通親故得免脫事平乃歸茅山耳寒華行𤣥白法而有少容今嘗俱處也𤣥白道忌房室自契受道不得行此吳豫章大守孫賁之子也山陰王孫奚之子寒華也尋此二人乃因奔淫無應入道而用志能自抑斷如此此宜其階也賁是權同堂兄有子四人各名鄰安熙績而無奚或是小名又無奚或為王者也其弟一子是陳世京世京孫休時侍郎少好道數入佛寺中與契鄉里故晚又授法契初將寒華入建安之時時亦同舉實賴世京濟其宻計焉此數子今處茅山之外非常在洞中之客也亦時得入耳亦數至長史舍屋間遊戲然多在大茅之間建安初至孫休即位六十二年杜初從孫䇿不減年二十左右則逃時已年八十許矣不容此爾世京今服术澤㵼寒華無所服茅山通無石室則必應起廬舍既有服餌便須藥具兼猶資衣糧不容都為隱黙但于時林芿幽阻無人尋迹耳守𤣥白之道常旦旦坐卧任意存泥丸中有黒氣存心中有白氣臍中有黄氣三氣俱仙如雲以覆身上因變成火火又繞身身通洞徹内外如此旦行之至日向中乃止於是服氣百二十過都畢道止如此使人長生不死辟却萬害所謂知白守黒求死不得知黑守白萬邪消却尤食六畜肉及五辛之菜當别寢静思尤忌房室房室即死此道與守一相似但如為徑要以減之耳忌房室甚於守一守一之忌在於節之耳初存氣出如小豆漸大衝天三氣纒煙繞身共同成一混沌忽生火在三煙之内又合景以錬一身一身之裏五臟照徹此亦要道也此數人並已三百餘年正𤣥白之力也並是不死之學者未及於仙道𤣥白事已重抄出在第三篇修用中計杜於建安初可年二十許至晉興寧三年始一百九十歲諸人又晚學而此云並三百餘年恐長三字亦强可是二耳若欲守𤣥白者當與其經經亦少許耳自可兼行以除萬邪却千害行之三十年匿身隱形日行五百里一名此道為胎精中景𤣥白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起别寢邪此一誥是論𤣥白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙㪍鬱八道騰五嶽何必秀名山亦足淩矯手攝洞阜棲心濳中興吐納胎精炁𤣥白誰能勝右杜廣平恒喜歌吟此今疏相示右定録君道此此亦應同十四夜告從杜來九條並有掾寫共一篇峩峩岑山幽巖嶺芳卓卓先生乘和來翔散髪頽穎躬耕陵堽三餐自足不期裹糧玉迹東映鳯響西彰公侯招之淩風振裳處不矜嘿出不希揚被褐容與杖策頡頏此一篇有異手書乃接前詩後而後又仍接以蕭寂華門事既眞書止說前一篇已自右畢則此詩非復是杜所作而不知其義是誰近所標静舍地此金鄉之至室若非許長史父子豈得居之後世當有赤子賢者乃得居此鄉爾子孫事祕之不可輕泄按此所標即應是後云長史所營屋宅處也金陵之地乃廣則此為最勝之地非真仙不得居故唯長史掾可居耳赤子賢者莫測為誰或是姓赤或是大人或將來英賢應運者乃當復得居之既方是後世子孫時事則非今所宜預言兼以此地福重不欲宣廣使人濫住致有犯穢故也許長史今所營屋宅對東面有小山名雷平山周時有雷氏養龍來在此山後有姜叔茂田翁亦居焉其山北有柳汧水或名曰田公泉以其人曾居此山取此水故也雷平山在小茅北基址相連田公泉今具存左右甚多水柳樹故名柳汧此泉即前所云衣不用灰者長史宅自湮毁之後無人的知處至宋初長沙景王檀太妃供養道士姓陳為立道士廨於雷平西北即是今北廨也後又有句容山其王文清後為此廨主見傳記知許昔於此立宅因博訪耆宿至大明七年有述虚老公徐偶云其先祖伏事許長史相傳識此宅只在今廨前烏桕樹處應是似猶有齋堂前并存于時草萊蕪没王即芟除尋覔果得磚井上已欲滿仍掘治更加甓累今有好水水色小白或是所云似鳯門外水味也於是審知是故宅從來空廢無敢居者既云金鄉至室便為伏龍之膏矣其西北即有長岡連亘呼為長隱者也雷平山之東北有山俗人呼為大横山其實名鬱岡山也名山記云所謂岡山者也下有泉水昔李明於此下合神丹而升𤣥洲水邊今猶有處所此山正東面有古時越翳王冢本墓字後人黵作冢此山今連延甚長後云古人合丹猶應是此李明但言在方隅則疑其小近南水邊不復見有基迹或漸蕪没故也越翳王是句踐四世孫初不肯立逃入菁山穴越人薫出之後於吳徙還㑹稽以周宣王十一年為孫諸咎所殺越人又殺諸咎不知那得逺來葬此或當有神異處故也今尋視未見指的墳冢而如有兆域處者右定録君言右三條有掾寫華陽中玉碣文在童初府西向一云四面其文曰解帶被褐尋生理活養存三亦洞我玉文領理八老二十四眞不眠内視微氣綿綿把録太素𤣥之又𤣥神道在今子來乃臻易遷云鄧夫人語之解此則得仙此仙之要言易遷不解此許侯可解注之易遷則長史妻也鄧夫人即鄧芝母也此碣文乃粗可領解皆上道中事但下挺者無由究知之故令長史解釋亦或試以戲之耳右一條有某書隱居今所安經昭靈臺前欲立小石碣子刻書華陽頌十五篇皆讚述此山洞内外事庶以標誠靈府永垂逺世而未辦作石今且載其文於此曰河篇徵往冊孔記昭昔名三宿麗天序兩金標地英右樞域宅無乃生有在有則還空靈構不待匠虚形自成功右質象總神列三府分途交五便陰暉迎夜晳晨精望曉懸右形位南峯秀𤣥鼎北嶺横秦璧表裏玉沙津周回隱輪迹右標貫左帶柳汧水右浚陽谷川土懷北邙色井洌鳯門泉右區别郭干峙流岸姜巴亘逺蹤廟貌或時饗别宅乃恒恭右迹號吳居非知地越家詎隱遷樹蓋徒低蔭石竈未嘗煙右𩔖附果林鬱餘㮏蔬圃蔓遺辛熒芝可燭夜田泉常澣塵右物軌降轡龜山客解駕青華童寢宴含眞館髙㑹蕭閒宫右遊集清歌翔羽集長嘯歸雲翻孑絃有逸調空談無與論右才英標舍雷平下立静連石陰上道已沖念飛華當軫心右學禀方嵎遊瓊刃華陽棲隱居重離儻或似七元乃扶胥右挺契號期行當滿亥數未終丁迨乃承唐世將賓來聖庭右機萌濟神既有在去留從所宜靈迹何顯晦冥途自相知右業運刋石𤣥窻上顯誠曲階門動静顧矜録不負保舉恩右誠期右此十五首下各兩字是其一篇中意篇中字字皆有義旨後之人自以篇中事求之眞誥卷十三
