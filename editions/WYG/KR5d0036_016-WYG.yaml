body:
  text: 眞誥卷十六梁陶𢎞景撰闡幽微第二漢高祖為南明公賔友劉邦字季沛郡豐人起自布衣伐秦平項創漢之基即位十二年病亾年六十二晉宣帝為西明公賔友司馬懿字仲達河内人也魏世為大將軍太傅嘉平三年病亾年七十二贈相國諡宣文侯晉武受禪追諡髙祖宣皇帝荀彧為北明公賔友荀彧字文若潁川人漢武末為尚書令有風儀識鍳初為魏武謀臣欲以安漢社稷被疑懼服藥自盡年五十諡敬侯追贈太尉荀之列在賔友亦如延陵之匹四明位雖非亞而德望賢矣其中宿運先世有陰德惠救者乃時有徑補仙官或入南宫受化不拘職位也在世之罪福多少乃為稱量處分耳大都行陰德多恤窮厄例皆速詣南宫為仙在世行陰功宻德好道信仙者既有淺深輕重故其受報亦不得皆同有即身地仙不死者有託形尸解去者有既終得入洞宫受學者有先詣朱火宫煉形者有先為地下主者乃進品者有先經鬼官乃遷化者有身不得去功及子孫令學道乃拔度者諸如此例髙下數十品不可以一槩求之庾元規為北太帝中衞大將軍取郭長翔為長史以華歆為司馬此所謂軍公者也領鬼兵數千人辛𤣥子所說與此大異恐是受有前後或能幾被迴換故耳庾亮字元規潁川人咸和中為征西將軍江荆豫三州刺史鎮武昌咸康六年於鎮病亾年五十二贈太尉諡文康公未病時乃獨見陶侃乘輿來讓之於此得病而亾郭翻字長翔武昌人少有髙志庾欲引為上佐不肯就亾後與其兒靈語云庾公作撫東大將軍治在東海之東統十萬兵取吾為司馬間者本欲取謝仁祖選官以為資望未足蔣大侯先取為都尉是以拘逼王長豫為長史委以軍事甚有髙稱又云王丞相為尚書令大用事決萬機按如此語即𤣥子所說如復似應在前今以郭為長史當是後更轉任但謝仁祖在世為僕射鎮西將軍乃言資望未足殊為難辨王丞相即王導長豫是導之元子早亾華歆字子魚平原人為豫章太守同孫䇿䇿亾從魏武帝歴顯位為司徒太尉封博平侯太和五年亾年七十五諡敬侯孔文舉為後中衞大將軍以張繡為司馬唐固為長史孔融字文舉魯人孔子二十代孫漢末名士為北海太守後為曹公所害張繡武威人濟從子也漢末因亂起兵後降魏武為破羗將軍從征烏丸未至柳城亾諡定侯唐固字子正丹陽句容人修身謹行博學儒術注國語公羊穀梁傳孫權黄武四年為尚書僕射年七十餘病亾耳陶侃為西河侯亦領兵數千近求滕含自代猶未許侃以徐寧為長史寧坐收北闕叛將不擒免官當以蔡謨代寧陶侃字士行先自丹陽人遷居鄱陽後徙廬江而屬潯陽柴桑晉世累經征討大有功位至侍中太尉都督八州荆江二州刺史長沙公咸和四年還長沙亾於樊谿年七十六贈大司馬諡桓公庾亮代之而郭長翔靈語云陶公正有罪謫未得叙用又别記云陶公亾後少時遣先奮死傳教與其兒相傳云公謝郎連與庾公相言語天上事始判故令郎知于時庾猶存後三四年亡滕含字子並南陽西鄂人永和中為平南將軍廣州刺史於州病亾諡戴侯陶以其自代資位復是奇懸徐寧字安期東海剡人羡之祖也初桓彛舉與庾亮為䕶軍功曹稱為海岱清士後仕至正員吏部郎冠軍江州順陽簡侯羨之年少時嘗來形見自稱我是汝祖戒其禍福後並如言蔡謨字道明陳留考城人克子也位至揚州刺史又授司徒不受永和十二年病亾年七十六贈司空諡文穆公尋此不擒叛將亦是鬼鬼不能相制由如人也人皆非自然威攝仙真猶尚握節持鈴以勒此輩而况其問𩔖乎四鎮皆領鬼兵萬人中官領兵不過數千四鎮有泰山君盧龍公東越大將軍南巴侯四官各領萬人四鎮非正是四方今此處並在中國迴還不過數千里耳他方復應大有所以後言數百處也何曾為南巴侯何曾字潁考陳郡陽夏人何䕫子也性豪侈而博學孝悌初仕魏世稍遷尚書征北將軍司徒封朗陵侯晉太尉太保太宰朗陵公太始四年十年八十餘諡曰元公曹仁為盧龍公曹仁字子孝魏武從弟雄勇冠世善弓馬數從征伐有功位至車騎將軍都督荆揚益州諸軍事大將軍封陳侯黄初四年病亾年五十六諡曰忠侯也劉陶為東越大將軍漢魏晉凡有三劉陶後漢者字子奇潁川人也靈帝侍中尚書令後繫獄閉炁而死魏世者字季冶淮南人劉曄之子也才辨而无行曹爽用為選部郎後出平原太守景王誅之晉初者字正輿沛國人永嘉中為揚州刺史此三人不知何者是東越大將軍以意言之多是正輿耳荀顗為太山君荀顗字景倩彧第四子也博學有詞理佐命晉世起家為黄門郎遷尚書僕射司空太尉太傅太始十年亾年七十諡曰康公蘇韶傳云劉孔才為太山公欲反北帝已誅滅之孔才即劉劭也又梅頥為豫章太守夢被召作太山府君克日便亾不知此二位與君復各是異職否耳又云有太山令領一萬兵鎮處亦有數百處也領數千兵鎮處亦有數百處更相統𨽻耳皆有長史司馬王文度鎮廣陵忽見卒來召作平北將軍徐兖二州刺史王云我今已作此官卒云此是天上職耳須叟去尋迎至而亾夫天地間事理乃不可限以胷臆而尋之此幽顯中都是有三部皆相關𩔖也上則仙中則人下則鬼人善者得為仙仙之謫者更為人人惡者更為鬼鬼福者復為人鬼法人人法仙循瓊往來觸𩔖相同正是隱顯小小之隔耳達者監之便无復所關荀顗取顧衆為太山將軍用曹洪為司馬桓範為長史顧衆字長始吳郡人顧愷孫顧祕子也仕晉丹陽尹領軍尚書僕射永和二年亾年七十三追贈特進諡靖伯曹洪字子亷魏武從弟家大富而儉恡數征伐為驃騎將軍封樂成侯太和六年病亾桓範字元則沛國人有才學籌䇿仕魏世位至大司農黨曹爽被誅也王逸少有事繫禁中已五年云事已散即王右軍也受時不欲呼楊君名所以道其字耳逸少即王廙兄曠之子有風炁善書後為㑹稽太守永和十一年去郡告靈不復仕先與許先生周旋頗亦慕道至昇平五年辛酉歲亾年五十九今乙丑年説云五年則亾後被繫被繫之事檢迹未見其咎恐以懟憾告靈為謫耳蔣濟為南山伯領二千兵蔣濟字子通楚國平阿人仕漢魏厯位至太尉從宣王誅曹爽其年亾諡景侯為領軍時有其婦夢亾兒為太山五伯來迎太廟西孫阿為太山令求囑阿乞轉在好處濟即為仍之阿亦即亾後又夢云已蒙轉録事凡如此例鬼官職位雖略因生時貴賤而大有舛駁皆由德業之優劣功過之輕重更品其階叙不復得全依其本基耳王廙為部鬼將軍廙字世將瑯琊人修齡父也多才藝攻書善屬文解音聲位至平南將軍荆州刺史年四十七病亾贈驃騎諡康侯也此有職位者粗相識耳其無位者不可一二盡知之如此散者無限數也此皆後段所說似猶是荀中候所以止道或不稱姓而顗復云姓恐以分别周顗也所說人多是近世當由代謝參差兼易憶識者矣三代乃逺而兩漢魏晉實有一段才名人如劉向董仲舒揚雄張衡蔡邕鄭𤣥王弼阮嵇之儔並不應空散數術有如管郭亦無標迹故當多不𨽻三官頗得預於仙官驅任矣前論帝王中亦不均魏文晉武受命之主而不顯反言魏武晉宣孫權應與劉備同亦不載道䇿此並當啓國之基功髙樂推故也其繼體守文之君都無所出矣右以前後兩過受事皆是楊君受旨書多儳治又掾更寫兩本悉無異並各成一卷相隨始末訖此耳許肇今為東明公右帥晨帥晨之任如世間中書監許肇字子阿即長史七代祖師徒敬也雖有賑救之功而非陰德故未蒙受化既福流後葉方使上拔然後為九宮之仙耳此帥晨之官四明亦並應有之邵奭為東明公云行上補九宫右保公前云邵為南明公今乃是東若非名號之誤則東南之差既尋當遷擢則必應是啓中君脫爾云邵耳亦可是有甘棠之德故不限其年月耳右七月十六日夜定録君所告此二條别受不關酆記部辛𤣥子自叙幷詩此下翦除半行去不知當是何字也𤣥子字延期隴西定谷人漢明帝時諌議大夫上洛雲中趙國三郡太守辛隱之子辛隱字某某檢外書未得此位業按諸辛舊關隴豪族前漢有辛慶忌後漢有辛繕並髙直之士辛毗是其七世孫則隱是毗之八世祖但一百四五十年中而已八世嫌其太促耳𤣥子少好道遵奉法戒至心苦行日中菜食錬形守精不遘外物州府辟聘一無降就遊山林棄世風塵志願憑子晉於緱岑侣陵陽於步𤣥故改名為𤣥子而自字延期矣不圖先世之多愆殃流子孫眚刋於帝簡運沈逮於後昆享年不永遂没命於長梁之津西王母見我苦行酆都北帝愍我道心告勑司命傳檄三官攝取形骸還魂復眞使我頥胎位為靈神於今二百餘年矣溺水致命事同王衍之女恐即此形骸皆不復得生並是反質胎神耳雖有道心而無道業故不得便居仙品也近得度名南宫定䇿朱陵藏精待時方列為仙而大帝今且見差領東海侯代庾生又見選補禁元中郎將為吳越鬼神之司王事靡盬斯亦勞矣若夫冠晨佩青蕭條羽袂鳴録仙階轉軿瓊室者雖實素心而卒日也恨未便得與𤣥眞併羅同晏琨墉察鈞韶之遺音掇靈芝乎幽峰振翠衣於九霄儛𤣥翮於十方耳方當攝御羣鬼領理是非處衆穢之中間聲交於邪魔之紛紜事與道德為闊眼與盱眞為踈孰比熙寂於𤣥境逍遥於太初哉夫同聲偕合物亦𩔖分相聞邈矣係景委積是以名書上清丹録𤣥殖有道之氣與靈合德託體髙輝故來相從今贈詩三篇以叙推情之至也其辭曰楊君既為吳越司命董綂鬼神𤣥子職𨽻方應相關故先造以陳情也尋鬼書既異不應是自運筆亦當口受䟽之耳疇昔入㝠鄉順駕應靈招神隨空無散炁與慶雲消形非明玉質𤣥匠安能彫蹀足吟幽唱仰首翫鳴條林室有逸歡絶此軒外交遺景附圓曜嘉音何寥寥此篇叙事迹之本志也寂通寄興感𤣥炁攝動音髙輪雖參差萬仞故來尋蕭蕭研道子合神契靈衿委順浪世化心標窈窕林同期理外逰相與静東岑此篇申情寄之來縁也命駕廣酆阿逸跡超𡨕鄉空中自有物有中亦無常悟言有无際相與㑹濠梁目擊𤣥解了鬼神理自忘此篇論人鬼之幽致也𤣥子云魏時辛毗字佐治是七世之孫也漢建武一年從隴西徙居潁川陽翟縣毗仕魏世使持節大將軍司馬宣王軍帥衞尉封侯毗子名敞為河内太守太常卿所說並與魏書同也𤣥子云庾生者晉庾太尉也北帝往用為撫東將軍後又轉為東海侯今又用為酆䑓侍帝晨右禁監近取馮懷為司馬侍帝晨如今世侍中右禁監如世右衞將軍而甚重如說與前大異當是後遷侍中領衞便是勝中懷將軍也帝晨無司馬此是右禁之職耳馮衞字祖思長樂人晉成帝時為太常散騎常侍卒追贈金紫光禄階也左禁監是謝幼輿以鄧岳為司馬此則准左衞將軍也幼輿名鯤即謝安伯謝尚之父也為王敦長史豫章郡太守年五十三病亾贈太常諡康侯鄧岳已在前而云代周顗為司馬帥耳郄南昌公先為北帝南朱陽大門靈關侯後又轉為髙明司直昔坐與劉慶孫爭免官今始當復職也髙明司直如世尚書僕射前云郄為南門亭長亭長恐即靈關之職既以周撫代故得轉司直而郭長翔靈語亦云郄公甚屈為天門亭長舊選常用州征二千石未有三公作也如此所以得速遷劉慶孫名輿中山人劉越石之兄也才識辯贍為東海王越長史永嘉中病指疽而亾年四十七贈驃騎將軍諡眞侯也何次道今在南宫承華臺中已得受書行至南嶽中此人在世施惠之功甚多故早得返形前荀公說何始得還朱火今言已受書則𤣥子所受後成在後耳周伯仁近見用為西明公中都䕶中都䕶如世太傅之官也坐選鄧攸不平左降為中䕶中䕶准少傅周本司命帥當得程遐代而遷此官也鄧攸字伯道平陽襄陵人仕晉為太子洗馬吏部郎河東太守為石勒所没後得還江東為吳郡太守吏部尚書自咸和元年病亾贈光禄攸從胡叛還時乃棄其已兒自携亾弟之子來渡江遂自無兒絶後嗣謝安歎曰天道無知令鄧伯道無兒右辛𤣥子所言說㝠中事亦多矣今粗書其麤者耳不復一二具說此記雖𤣥子所受而雜有楊君之辭也楊書不存今有掾冩本耳此紙後又被剪缺恐事亦未必盡夫至忠至孝之人既終皆受書為地下主者一百四十年乃得受下仙之教授以大道從此漸進得補仙官一百四十年聽一試進也此地下主者亦即是洞中所記李更等者非别鬼官復為主者也一百四十年一進便入第二等給仙人使乃得稍受道教耳至孝者能感激鬼神使百鳥山獸巡其墳埏也至忠者能公犯直心精貫白日或剖藏煞身以激其君者也比干今在戎山李善今在少室有得此變錬者甚多舉此二人為標耳比干剖心可為至忠至於孝子感靈者亦復不少而今止舉李善殊似不𩔖當李善之地乃可涉忠而非孝迹也恐以其能存李元後𦙍使獲繼嗣因此以成其孝功所乃論耳若程嬰公孫杵臼亦應在孝品矣李善字次孫本南陽淯陽李元家奴漢建武中元家相繼死盡而巨富唯遺一孤兒名續祖尚在孩抱諸奴復共欲煞之而分其財善乃宻負續祖逃瑕丘山中哺養乳乃為生湩至十歲餘出告縣令鍾離意意於是表薦悉收其羣奴煞之而立續祖為家光武拜善為太子舍人後遷日南九江太守其事迹正是如此而鍾離傳所說少復有異耳夫有上聖之德既終皆受三官書為地下主者一千年乃轉補三官之五帝或為東西南北明公以治鬼神復一千四百年乃得遊行太清為九宮之中仙也以年限言之是聖德更不及忠孝也計此終後凡二千四百年乃得入仙階益知前應是夏啓非召公明矣季子亾後至晉興寧始八百八十計未滿千歲不知那已為明公酆都中所記都无頓說五帝者恐此如北帝之例復有五所以後言英雄者為五帝上相而北帝有秦皇矣又蘇韶傳云揚雄張衡等為五帝揚張既非上聖爵位亦卑不應得與炎帝為儔復當或有小五帝不論耳揚張之事亦或不然也夫有蕭邈之才有絶衆之望養其浩然不營榮貴者既終受三官書為善爽之鬼四百年乃得為地下主者從此以進以三百年為一階此事是髙士逸民之品也從主者以去是入仙階不復為鬼官耳夫有至貞至亷之才者既終受書為三官清鬼二百八十年乃得為地下主者從此以漸得進補仙官以二百八十年為一階耳此格復是小勝髙士而年數倍於忠孝故知忠孝貞亷為行之最耳夫至亷者不食非己之食不衣非己之布帛王陽有似也此目應以夷齊為標髙士中亦多此例而今乃舉王陽當年淳德自然非故為皎潔者也王陽先漢人也夫至貞者紛華不能散其正炁萬乘不能激其名操也男言之務光之行有似矣女言之宋金漂女是也貞者非止不淫於色亦是淡乎榮利也務光辭湯讓而負石投河宋女恐是子胥所逢浣沙於漂水之陽者後既投金以報之故謂之金漂漂字或應作溧字耳先世有功在三官流逮後嗣或易世錬化改氏更生者此七世陰德根葉相及也既終當遺脚一骨以歸三官餘骨隨身而遷也男留左女留右皆受書為地下主者二百八十年乃得進受地仙之道矣臨終之日視其形如生人之肉脫死之時尸不雖直足指不青手足不皺者謂之先有德行自然得尸解者也此是先世有陰功宻德不拘於迹者既非己身所辦故以一骨酬副三官也此骨恐是質形之骨非人行之骨既被遺落當復重生之耳火都論仙鬼中諸人在世有刳腹刎頸支體分裂死者永自不關後形其神先以離出故今形可得而斃傷殘初不斷神矣而世或有見鬼身不全者蓋是尸魄託骸者耳非其大神本經之主也尸解之說復有多條已抄記在第三篇中耳右此五條皆積行獲仙不學而得但為階級之難造道用年歲耳要自得度名方諸不復承受三官之號令矣此雖五條而有七事事中復有輕重非至志者亦不辦得此例也今預在學道之品㣲㣲小業便可與之比肩況乃眞妙者乎由是言之可不自督耳諸有英雄之才彌羅四海誅暴整亂拓平九州建號帝王臣妾四海者既終受書於三官四輔或為五帝上相或為四明公賓友以助治百鬼綜理死生者此等自奉屬於三官永無進仙之冀坐煞伐積酷害生死多故也酆宫中諸人職皆是矣疑荀彧一人清秀整潔非跋扈虚害唯以謀謨智䇿佐魏武耳乃得為賔友與漢髙等比位恐當别有旨趣凡在世有才識藝解為一時所稱者既没並即隨才受其職位不必執其在生之小罪先充諸考謫也若過為非理是所不論若悠悠冗散不辯異人者罪無大小悉當安之秦始皇今為北帝上相劉季今為南明公賓友有其人甚多略示其標的耳此是舉建號帝王者之宗耳北帝之有上相亦當如四明之有賓友也齊桓公今為三官都禁郎主生死之簡録晉文公今為水官司命其楚嚴公趙簡子之徒數百人今猶散息於三官府未見任也此等名位自是三官之寮耳无豫眞仙家事矣五霸亦一時之雄齊桓晉文處職並要楚嚴公即莊王也簡子雖非霸限亦擅命專制所夢天帝使射熊之事必是北帝之府矣劒經序稱燕昭亦得仙燕昭六國時英主遂不墮於三官乃知鍊丹獨往亦為殊拔也從論忠孝已來至此並出掾寫劒經中東卿司命所說即是鬼神事謹抄出繼此以相證發自三代以來賢聖及英雄者為仙鬼中不見殷湯周公孔子闔閭勾踐春秋時諸卿相大夫及伍子胥孫武白起王翦下至韓信項羽輩或入仙品而仙家不顯之如桀紂王莽董卓等凶虐過甚恐不得補職僚也而異域有冒頓蹋頓石虎石勒諸驍傑亦都不預及言之耳眞誥卷十六
