  text: 眞誥卷之二安二
  hash: sha256:4bdcf69713f8d95a39e270119c95b0422ca7287d71476eacaa42a359261cad6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0036_HFL_002-001a, image: hfl/0637/0637-044.png}
body:
  text: 金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造運象篇第二清虚眞人授書曰黄赤之道混氣之法是張陵受教施化爲種子之一術耳非眞人之事也吾數見行此而絶種未見種此而得生矣百萬之中莫不盡被考罰者矣千萬之中誤有一人得之得之遠至於不死耳張陵承此以教世人耳陵之變舉亦不行此矣爾愼言濁生之下道壤眞霄之正氣也思懷淫慾存心色觀而以兼行上道者適足明三官考罰耳所謂抱玉赴火以金棺葬狗也色觀謂之黄赤上道謂之隱書人之難曉乃至於此紫微夫人授書曰夫黄書赤界雖長生之祕要實得生之下術也非上宫天眞流軿晏景之夫所得言也此道在長養分生而已非上道也有懷於淫氣兼以行乎隱書者適足握水官之筆鳴三官之鼓耳玄挺亦不可得恃解謝亦不可得賴也要而言之貞則靈降專則神使矣夫眞人之偶景者所貴存乎匹偶相愛在於二景雖名之爲夫婦不行夫婦之迹也是用虚名以示視聽耳苟有黄赤存於胷中眞人亦不可得見靈人亦不可得接徒劬勞於執事亦有勞於三官矣鷄鳴時南岳夫人授晝曰雞既鳴矣論好之縁篤也紫陽眞人授書曰太虚遠逸高卑同接體賢之義著之於㝠運耳愼心係於黄赤之疑也茅中君授書曰玄摽觸景俯和塵藹玉振愆房清風逸邁可不勗之也言畢諸眞人去眞妃少留在後曰又煩明君爲一辭也而授書曰忘懷蘭素暉心齊契方當數親虔清宇德與流景合宜歡會理髮領秀伏度明君高尚靈映縱滯忘鄙耳言畢持手而下牀未至户之間忽失所在六月二十六日夜降八眞人紫微左夫人一紫清上宫九華眞妃二上眞司命南岳夫人三紫陽眞人四清靈眞人五茅中君六茅小君七又有一人甚少整頓建芙蓉冠朱衣帶劒未曾見也意疑是桐柏山眞人王子喬多論金庭山中事言多有不可解者恭敬紫微上眞九華妃也皆禮揖稱下官此條重出而小異者前所書是楊君自記九華降事隱之不出從此後是更疏說長史事以示長史故此一片兩本也上眞云昨與叔申詣清虚宫校爲仙眞得失之事耳近頓除落四十七人都復上三人耳并復視爾輩之名簡如今佳耳許某乃得在伯札中許某即長史名也楊君䟽呈故不載名耳吾初不悟其如此益好也其洗心懃邁宗注理盡心丹意竭如履水火若久如此者眞人亦不得迯矣仙道亦不得隱矣但當杜絶其淫色之念吾等亦即可得見可䟽示之此南嶽夫人言此即是前二十四日所道明日當詣王屋山事也中君曰伯舉在於下官耳大老子將復可念江東未見有如此而懃道者然勿恃伯而忘道也虚妄者德之病華衒者身之災滯者失之首恥者體之籥遣此四難然後始可以問道耳於是靈軫鳴轅日有彷彿也有淫愆之心勿以行上眞之道也昨見清虚宫正落除此輩人名而方又被考罰以度付三官推之可不愼乎右南嶽夫人言許長史愼臨尸弔喪年内耳示許仙侯如此小君言言畢大笑𠫤心既忘得亦不同鄙恥不除生籍不書許長史雖已蹔除當復曾除而復除之此清靈言東卿司命甚知許長史之慈肅小有天王昨問此人今何在修何道東卿答曰是我郷里士也郷里者謂句容與茅山同境耳非言本咸陽人也内明眞正外混世業乃良才也今修上眞道也此語乃稱人意略有伯形也此南岳夫人言右從六月二十四日來凡二十四條並有楊書蕭邈眞才内鏡外和曾參出田丹心同丹素糸三遷來庇方頭此四句是離合作思玄字即長史之字也録名太極金書東州蹇裳七度躭凝洞樓内累既消魂魄亦柔守之不倦積之勿休五難既遣封伯作侯七度飛步事也洞樓洞房事也右紫微王夫人所喻令示許長史右一條有長史寫紫微夫人喻曰披華蓋之側云云此事出在第三卷中六月二十七日夜喻書此右一條有楊書積精所感萬物盡應妙誠未匝則形華不盡形華不盡則洞房之中難即分明也吾昔受此法常向西北存之耳西北存如小爲易見可明示如此西北爲天地之爽内照之玄門也六月二十七日紫陽所喻此二十七日衆眞復降其事亦應甚多並不出右一條有長史寫二君各有六僮裴君從者持青髦之節一僮帶繡囊周君從者持黄髦之節無囊右二條是甲手書六月二十九日九華眞妃授書曰景應雙粲雲會玄落龍秀五空採瓊閬臺長歌靈幙焕啓玉扉眇矣遺事與世長辭霞軫絳波電赴紫栖共携清響之外同遊雲岫廣崖豈不善乎豈不樂哉日者霞之實霞者日之精君唯聞服日實之法未見知餐霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉妾有磨鏡之石决牖之術即能徹洞萬靈眇察絶響可乎面者神之庭髮者腦之華心悲則面燋腦減則髮素所以精元内喪丹津損竭也妾有童面之經還白之法可乎精者體之神明者身之寳勞多則精散營竟則明消所以老隨氣落耄已及之妾有益精之道延明之經可乎此四道乃上清内書立驗之眞章也方欲獻示以補助君之明照耳授畢取以見與某口答唯唯乞請之也六月二十九日夜桐柏眞人同來降復諭授令某書曰夫八朗四極靈峰遼遐竒言吐穎瓊音餐振晨飛陵清玄氣赴霄體邁玉虚心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此人者必能旋騰玄漢周灑眞庭矣三元可得而見絳名可得而立耳如其心併愆浪目擊色袂動與罔罟共啓靜興爭競之分者此乃適仙路邈求生日闊也子其愼之某書畢取視乃以見與此前是桐柏辭也既同一夕安妃授竟桐柏次㖟故云復授耳卒看如似猶是安妃故顯注之六月三十日夜九華眞妃與紫微王夫人南嶽夫人同降眞妃坐良久乃命侍女發檢囊之中出二卷書以見付今寫之題如左上清玉霞紫映内觀隱書上清還晨歸童日暉中玄經右二卷名目此題本應是三元八會之書楊君既究識眞字令作隸字顯出之耳七月一日夜紫微王夫人南嶽夫人九華眞妃紫陽桐柏清虚三眞人茅二君同降良久某乃自陳於衆靈求安身之術欲知貴賤之分年命之會多少定限於是眞妃乃笑良久見授書此曰明君夷質虚閑祕搆玉朗蘭淵高流清響金宫可謂能珍寳藏竒幽眞内焕摽拂靈篇乘數順生素德神園丹録玉清興煙拔景冥鼓遐聲也必三事大夫侍晨帝躬高佐四輔承制聖君理生斷死賞罰鬼神攝命千靈封山召雲主察隂陽之和氣而加爲吴越鬼神之君也妾將挺命凝觀憑華而生靈飛九天虚音飈房因運四覺玄梯同象紫名太上清文八景神映西暉德明内隸乃受書乘氣得爲眞妃之任矣又當助君緫括三霍綜御萬神對命北帝制敕酆山又應相與携袂靈房乘煙七元嘉會希林内攄因縁也是故君姓於楊我得爲安妾自發玄下造君自受書於西宫從北策景乘軿東轅握髦秉鉞專制東蕃三官奉曶河山啓源天丁獻武四甲衛輪當此之時實明君之至貴眞仙之盛觀也三官中常有諺謡云楊安大君董眞命神正我等之謂耳蓋聖皇之方駕於今有二十八年也復二十二年明君將乘龍駕雲白日昇天先詣上清西宫北朝玉皇三元然後乃得東軫執事矣此自是君玉朗紫微金音虚領爲太極所旌乃玄德上挺不復用懃學劬勞陟足山川矣若爲精勗之者當小神清瑩鮮耳亦不甚今日不勞之舉也世俗縈網貴賤之間涉塵塗之役在得失之津信非眞人所得經營乃自坦乎艱泰之用任乎遇否之頃耳見明君之逸誠欣然也覩明君之否誠慼顔也此二感發於顔色之上也復未足以致遠悲抱長慼矣至於内冥偶景併首玄好輕輪塵藹參形世室妾豈以愆累浮卑少時之滯而虧辱於當眞之定質耶夫隂陽有對否泰反用二象既羅得失錯綜此皆徃來之徑陌耳今人居風塵之休盛者乃多罪之下鬼趣死之考質也夫處無用於囂塗乃得眞之挺樸任凡庸以内觀乃靈仙之根始也蓋富貴淫麗是破骨之斧鋸有似載罪之舟車耳榮華矜世爭競徼時適足以誨愆要辱爲伐命之兵非佳事也是故古之高人覽罪咎之難豫知富貴之不可享矣遂肥遯長林栖景名山咀嚼和氣漱濯清川欲遠此惡迹自求多福超豁絙聘保全至素者也君亦奚足汲汲於人間之貴賤投身於榮辱之肆哉且方交兵日會三災向臻神風駈除臭氣參天明金生穢於泥瀆寳玉投糞以招塵褰衣振血濁精虧眞玄通遠逸是其時也君若其不耐風火之煙欲抱眞形於幽林者可且尋解劒之道作告終之術乎自盡出嘿之會隱顯之迹臨時分處有任於明君矣㝠數上感有命而交靈書玉臺眞契合景是以言單於辭心訖於筆妾豈獨歎於一人乎蓋示名分之判例也書訖取以與某復曰君省此當少愈不右從六月二十九日來凡十四條並楊君自記書東卿大君昨四更初來見降侍從七人入户一人執紫旄節一人執華幡一名十絶靈幡一人帶緑章囊三人捧牙箱一人握流金鈴乃年少於二弟二弟昨並倚立東卿命坐乃坐耳良久言語委曲先昨神女來降意本疑是王母女昨又來定是也南眞說云是阿母第十三女王媚蘭字申林治滄浪山受書爲雲林夫人此兩事並是七月五日夜略記後更復委曲重數在後如此則右英夫人始以七月三日四日頻夕降也右二條有楊自記乙丑歲𣈆興寧三年七月四日夜司命東卿君來降侍從七人入户其一人執紫旄之節其一人執華旛一名十絶靈幡一人帶緑章囊其三人捧白牙箱箱中似書也其一人握流金鈴侍人並朱衣司命君形甚少於二弟著青錦繡裙紫毛帔巾芙蓉冠二弟並同來倚立命坐乃坐耳言語良久七月六日夜司命君又降良久喻書曰若必範玄秉象清淨罕時遂拔羣幽藻戢翼高栖感味上契淵渟岳峙蕭寥玉篇翫寳神生遺放俗戀調彈清靈澄景虚中五道發明色絶化浪慾與淡并空同冥衢無視無聽爾乃遠齊妙眞重起玄覺眀德内圓靈摽外足矣終能策雲軿以赴霄書司命之丹録耳若精散萬念爲生不固炁隨塵波心不眞合適足勞身神於林謂應作岨字實有誤於來學也其道微而易尋其道艱而難得乎亦令示許長史此二條又有長史寫許長史欲山居宗道者貴無邪栖眞者安恬愉至寂非弘順之主惔然非教授之匠故當因煩以領旡耳意云爾不代謝奚必四時氣如呼吸千齡如寄趙子可憂不信而末疑其心亦已醯矣司命君與南岳夫人言爲道者常淵淡以獨處每栖神以遊閑安飲啄以自足無謂應作祈字眄於籠樊哀樂所以長去夭閼何由而臻者乎禀志各有所宅資性咸有其韻豈可履逐物之邪蹤矯我之正業乎何不肆天摽之極縱適求眞之内娱從幽淨以熙心綏所託以栖意處東山以晦跡握玄筌於妙領保隨珠以含照遣五難於胷次耶此三條亦似是東卿言七月十五日夜紫微王夫人授書曰懃精者味玄之靈摽也凝安者拘眞之寢衾矣子懃澡丹心競赴高嶺可謂務道之柄懃甚至也然道柔眞虚守淡交物安靜任栖神乃啓焕耳要而言之躁疾非盡理矣違之者亦取勞乎與許玉斧七月十五日夜清靈眞人授詩企望人飛若感若成威不内接驕女遠屏三四縱横以入帝庭歷紀建號得爲太齡亦必秀映四司元卿翻然縱羽遂登上清此離合掾大名名翽字也與許玉斧此夕又有中君授書與許卿答欲知洞天中之事今載在第四卷中鳳巢高木素衣衫然此八字是作長史小名穆字也履順思眞凝心虚玄仍取此思字玄字即成長史字也五公石腴彼體所便急宜服之可以少顔三八令明次行玄眞解駕偃息可誦洞篇瓊刃應數此瓊刃字即是掾小名玉斧也與外傳青録義同故云應數精心高栖隱嘿沉閑正氣不虧术散除疾是爾所宜次服䭀飯兼穀勿違益髓除患肌膚充肥然後登山詠洞講微寅獸白齒此四字即是云虎牙也亦能見機遂得不死過度壬辰偃息盛木玩執周書此八字即是作楊字也太極植簡金名西華學服可否自應靈符理異契同神洞相求定録中候告道藥事是定録言也此並離合譬喻四人姓名各詮所宜修行服御事尋辭意皆相貫次不知云何得兩人共說寓言必可用不用是無情焉得駕欻迹尋此空中靈微音良有㫖當用愼勿輕事事應神機保爾見太平右右英吟此茅定録言良箴也可記之仙才不用心煩曲故能得也保命言八月中彼人必東秀蹔看燒香必也保命臨去言右從乙丑歲來凡十五條並有楊書欽想風流託心靡景愧以愆昧鄙𠫤素彰思自策勵沐浴陶冶濟否之階幸垂眷逮耳許玄惶恐再拜長史大名謐字思玄今此直云玄其意未允諧賈先生此是長史聞楊宣周紫陽說賈玄道等主知試校事故有此書賈即以呈司命司命後所答云賈生近以此書來者也周君說事在第四卷中也右一條是長史自書本也太元眞人以此書見與因授令書如左若夫能眇邈於當世則所重唯身也罕營外難者則無死地矣是以古之學者握玄筌以藏領匿穎鏡於紛務凝神乎山巖之庭頤眞於逸谷之津於是散髮高岫經緯我生暉暉景曜採吸五靈遊躡九道登元濯形投思絶空人事無營閉存三氣研諸妙精故能迴日薄之年反爲童嬰耳苟事累沙會交軒塞路但所守之不能勗也何試校之能停耶物物相要觸類興患天人之眄豈時漏哉所司賞於修業所試在於不日新矣賈生近以此書來託向亹亹可謂有情然無逝我梁有似逆詐耳七月十六日此一條又有掾書省所諮有心哉子望對山嶺增懷遠想欣然禀向常見此意夫爲道者精則可矣有情不懃則無所能爲也懃而不專亦不能有成也要當令𠫤心消豁此後人黵作穢字不可復識疾開散此亦似東卿告長史爾何以不數看東山鬱望三秀徘徊蓽宇目擊林水平彼人徃殆無所復益耳凡云三秀者皆謂三茅山之峯山頂爲秀故呼三秀也右南嶽夫人與弟子言夫言者性命之全敗也信者得失之關楗也張良三期可謂篤道而明心矣右南嶽夫八與弟子言性甚寬仁而所聞急而應物速者更違㫖耳火棗事未宜問也論火棗事在後右九華眞妃言右從太元來凡五條並楊書轡景落滄浪騰躍清海津絳煙亂太陽羽蓋傾九天雲輿浮空洞儵忽風波間來尋冥中友相携侍帝晨王子恊明德齊首招玉賢下眄八阿宫上寢希林顛漱此紫瓊腴方知穢塗辛佳人將安在懃之乃得親七月十八日夕雲林右英王夫人授詩此詩與長史兼及掾事高興希林虚遐遊無員方蕭條象數外有無自冥同亹亹德韻和飄飄步太空盤桓任波浪振鈴散風中内映七道觀可以得兼忘何必反覆酬待此世文通玄心自宜悟嘿耳必高蹤七月二十六日夕紫微夫人喻作令與許長史絳闕扉廣霄披丹登景房紫旗振雲霞羽晨撫八風停蓋濯碧谿採秀月支峰咀嚼三靈華吐吸九神芒椿數無絶紀恊日積童蒙携袂明眞館仰期旡上皇北鈞唱羽人玉玄粲賢衆云河波浪宇得失爲我鍾引領囂庭内開心擬穢衝習適榮辱域罕躡希林宫一靜安足苦試去視滄浪右右英夫人所喻右從轡景來三篇並有長史寫弱喪洞瀁篤靈未盡倚伏異因雲梯未抗雖有懷於進趣猶未淵於至理矣君才實天工以清瀾凝浪於高韻志栖神乎太玄期紫庭而步空矣有心洞於飛滯柔翰蔚乎冥契也動合規矩等圓殊方靜和眞味吐納興音可謂縱誕德挺良爲欽然矣然穢思不豁鄙𠫤内固淫念不漸靈池未澄將未得相與論内外之期汎二景之交耳夫失機者貴在能改相釋有情今無妨矣雖蹔弭羣聽故克和也前塗謂應作攸字邈此比非一漏緒多端當恒戰宻苟情有愆散得隨事失悟言微矣將何以遏之將何以遣之右七月二十六日夜雲林右英王夫人喻書見與勿答右一條有長史寫世珍芬馥交道宗玄霄會振衣尋冥疇迴軒風塵際良德映靈暉穎根粲華蔚宻言多儻福沖淨尚眞貴咸恒當象順携手同衾帶何爲人事間日焉生患害七月二十八日夕右英王夫人授書此詩以與許長史後十二月長史答書云咸恒之喻即是酬此詩也咸恒義出周易右一篇有長史寫清響散空神風灑林身超冥衢志詠靈音仁侯其人也欲以裴眞人本末示郄者可矣其必克諧不善誘之心亦内彰也裴亦何人哉郄即愔也小名方回裴眞人本末即是清靈傳也有謝過及七經之士故令示之八月七日夕右英王夫人授書令與許長史右一條楊書又有長史寫守眞一篤者一年使頭不白秃髮更生夫内接兒孫以家業自羈外綜王事朋友之交耳目廣用聲氣雜役此亦道不專也行事亦無益矣夫眞才例多隱逸栖身林嶺之中遠人間而抱淡則必孾顔而玄鬢也玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未眞正穢念盈懷恐此物輩不肯來也苟眞誠未一道亦無私也亦不當試問火棗交梨之樹已生君心中也心中猶有荆棘相雜是以二樹不見不審可剪荆棘出此樹單生其實幾好也雖云問也其欲希之近也當爲君問主領者三年更相問以即日始丑年此二字長史後益上八月七日夜雲林右英王夫人口授答許長史凝心虚形内觀洞房抱玄念神專守眞一者則頭髮不白秃者更軫字亦應是琴未有以百思纏胷寒熱破神營此官務當此風塵口言吉凶之會身凡作扉字者皆是排音非扉扇之扉也得失之門衆憂若是萬慮若此雖有眞心固爲不篤抱道不行握寳不用而自然望頭不白者亦希聞也玉醴金漿交生神梨方丈火棗玄光靈芝我當與山中許道士不以與人間許長史也八月七日夜紫微王夫人授答許長史右六條有掾寫擬駕東岑人停景招隱靜仁德乘波來俱會三秀嶺靈芝信可食使爾無終永噏眞獻金漿不待百丈井八月十六日夕清靈眞人授右一篇有長史寫虚和可守雄蕭蕭可守雌夫蕭蕭者單景獨徃也君絳宫中謂應作詎字能仰飛空同上上雲玄之涯不道易聞而患不眞書易得而患不行若專如此大天之中盡眞仙比肩也我亦無咎於不能爲者心不定而欲書將欲沽之哉意不徃而求眞似欲衒之也願告八月十七日夜右英王夫人授書此與許長史似答心求守雌之眞一也肇祖植德華條翁即謂七世祖許肇也隊字應作墜頓足懸車無早晩也但心堅注眞微宻靈機則可矣至於高逸長嶺寢㝠林澤縱時事之難鄙遣九親而味神實美舉也心苟不專愆念填胷雖躡閬山以遊步造圓壟以朝冥然亦必敗也若必空空我自當相告有可動之時也今且未可議耶八月十七日夜保命仙君小茅口授與許長史含仁守慈發拔幽憂單心慈誘栖神靈鏡者許長史其人也所恨在於應物速招眞急耳夫浩挺虚映乃可守雌已求故當能守之守之蓋易恐亦宜無不可耶八月十八日夜紫微王夫人授示許長史右四條有楊書穆奉被音告頻煩備至仰銜恩潤光華彌焕披覽欣慶感荷罔極穆沉滯流俗豈忘拔迹輒已誓之中心思爲階漸考室東山栖景林壑此志必也此舉决也方當憑庇靈宗諮禀神規若此之心揆亦鑒之眞一之雌其道玄遠妙出祕領穆愆穢未蕩俗累未拔胷心滓濁精誠膚淺未敢預聞南眞哀矜去春使經師授以方諸洞房步綱之道八素九眞以漸修行不敢謂應作怠字懈九眞至須幽靜人事雜錯患在未專耳昔人學道尋師索友彌積年載經歷山岳無所不至契闊險試備嘗勞苦然後授以要訣穆德薄罪厚端坐愆室横爲衆眞所見採録鑒戒繼至啓悟非一古人有言非知之難其行之難夫人垂恩所賜自可徐徐此須字長史自儳移東山然後親授道之來也不計遲速恩之隆也何限早晚命使願告敢不上答謹白此長史答前右英論雌一事者掾爲書之既被儳更寫故此本得存焉眞誥卷之二
