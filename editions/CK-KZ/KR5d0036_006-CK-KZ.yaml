body:
  text: 甄命授第二服术敘紫微夫人此有掾書兩本雖曰朮敘其實多原大略極論似乎不自書意也紫微才豐情綺動言富逸牽引始末恒超理外其後所譬深明黃赤之致矣夫晨齊浩元洞冥幽始八炁靡渾靈關未理者則獨坦觀於空漠任天適以虛峙於是淳音微唱和風合起二明鑒暉霄翳無待也擁萌肇於未剖塞萬源於機上含生反眞觸類藏初爰可矧萬歲以爲天願嬰札而長和耳何事體造靈神之冥鄉心研殊方之假外哉自形無得眞之具器無任眞之用者誠宜步天元之妙攝推萬精以極妙尋九緯以挺生覩晨景之逈照仰觀煙氣則靈雲纏虛俯眄六律則八風扇威太無發洞冥之嘯圓曜有映空之暉於是紫霞靄秀波激岳頽浮煙籠象淸景遁飛五行殺害四節交擲金土相親水火結隙林卉停偃百川開塞洪電縱橫而呴沸雷震東西而折裂天屯見矣化爲陽九之災地否閡矣乃爲百六之會亢悔載窮於乾極覩羣龍玃示流血乎坤野爾乃吉凶互衝眾示災咎履坦道者將幽人貞吉居肥遯者亦無往不利冒嶮巇也行必輿尸涉於東北則喪朋而悔至苟大川之不利明坎井之沉零矣此皆人失其眞物乖我和遊竟萬端神鬼用謀容使天地無常以百姓爲心於是太上眞人愍萬流之鼓動開冥津以悟賢遂爾導達百變攝生理具居福德者常全處危害者彫折御六氣者定夀服靈芝者神逸奇方上術演於淸虛之奧金簡玉札撰於委羽之臺窈窕神唱眞暉合離歌其章則控晨太微用其道則揚輪九陔軒蓋於流霞之陣眷眄於文昌之台或爐轉丹砂之幽精粉鍊金碧之紫漿琅玕鬱勃以流華八瓊雲煥而飛揚絳液迴波龍胎隱鳴虎沫鳳腦雲琅玉霜太極月醴三環靈剛若以刀圭奏矣神羽翼張乃披空同之上文煒燁元始之室瓊音琅書發乎三玄之宮寶紱紆三元之贈蘂珮發丹林之房上帝獻紫軿之重躍太眞錫流金之火鈴神童啓轅九鳳齊鳴天籟駭虛晨鍾零鏗竦身抑旄八景浮空龍輿虎旂遊扇八方上造常陽之絶杪下寢倒景之蘭堂月妃參駟日華照容靈姬抱衾香煙溢窗顧眄而圓羅邁矣何九萬之足稱哉然後知高仙之道蓋上尋靈之涂微妙服御之致合神吉凶之用頓顯也自非無英公子黃老玉書大洞眞經三十九章豁落七元太上隱玄者莫有羣偶於此術矣復有體神精思寶鍊明堂朝適六靈使五藏生華守閉元關内存九眞三氣運液而灌溉丹田亦其次也夫丹誠而蔬禴者亦奚用東鄰之太牢哉乃可加以五雲水桂朮根黃精南燭陽草東石空靑松柏脂實巨勝茯苓並養生之具將可以長年矣吾又俱察草木之勝負有速益於已者並未及朮勢之多驗乎旦頃以來殺氣蔽天惡煙弭景邪魔橫起百疾雜臻或風寒關結或流腫種痾不期而禍凑意外而病生者比日而來集也夫朮氣則式遏鬼津吐煙則鎭折邪節强内攝魂益血生腦逐惡致眞守精衞命餐其餌則靈柔四敷榮輸輕盈服其丸散則百病瘳除五藏含液所以長遠視久而更明也古人名之爲山精之赤山薑之精太上導仙銘曰子欲長生當服山精子欲輕翔當服山薑此之謂也我非謂諸物皆當減朮爲益也且朮氣之用是今時所要末世多疾宜當服御耳夫道雖内足猶畏外事之禍形有外充者亦或中崩之弊張單偏致殆可鑒乎朮亦可以長生永夀二可以卻萬魔之枉疾我見山林隱逸得服此道千年八百比肩於五岳矣人多書煩不能服一二記示之耳今撰服朮數方以悟密尙若必信用庶無橫暴之災旣及太平則四炁含融天緯荐生災煙消滅五毒匿形二辰恒察萬物自成於是時任子所運而御亦無復夭傾也今所言朮欲令有心取服遏此災痾耳又頃者末學互相擾競多用混成及黃書赤界之法此誠有生和合二象匹對之眞要也若以道交接解脫網羅推會六合行諸節氣卻灾消患結精寶胎上使腦神不虧下令三田充溢進退得度而禍除經緯相應而常康敵人執轡而不失六軍長驅而全反者乃有其益亦非仙家之盛事也嗚呼危哉此雖相生之術俱度之法然有似騁冰車而涉乎炎州泛火舟以浪於溺津矣自非眞正亦失者萬萬或違戾天文譖害嫉妬靈根鬱塞否泰用隔犯誓愆明得罪三官或搆怨連禍王師傷敗或坑降殺服流血膏野或馬力以竭而求之不已若遂深入北塞而不御者亦必絕命於匈奴之刀劍乎將身死於外而家誅於内也可不愼哉可不愼哉我見諸如此等少有獲益徒有求生之妄作常歎息於生生矣豈若守丹眞於絳宮朝元神於泥丸保津液而不虧閉幽術於命門餌靈朮以頤生漱華泉於淸川研玄妙之祕訣誦太上之隱篇於是高栖於峯岫並金石而論年耶諸侯安得而友帝王不得而臣也遠風塵之五濁常淸淨以期眞優哉悠哉聊樂我云案此後應有朮方相連而二本並無乃別有掾書二方似卽是此法今撰取在第三卷中右一條有掾書兩本一黃牋一碧牋方諸靑童見告曰人爲道亦苦不爲道亦苦惟人自生至老自老至病護身至死其苦無量心惱積罪生死不絕其苦難說況多不終其天年之老哉爲道亦苦者淸淨存其眞守玄思其靈尋師轗軻履試數百勤心不墮用志堅審亦苦之至也視諸侯之位如過客視金玉之寶如磚石視紈綺如弊帛者始可謂能問道耳方諸靑童君曰人之爲道能拔愛欲之根者譬如掇懸珠一一掇之會有盡時稍去外惡會有盡時盡則得道矣又近喻牛負重行泥中疲極不敢左右顧趣欲離泥以蘇息道士視情慾甚於彼泥中直心念道可免眾苦亦得道矣謹案上相都無降受事唯有此二告及歌詩一首恐未必是楊君親所瞻奉受記也西城王君告曰夫人離三惡道得爲人難也旣得爲人去女爲男難也旣得爲男六情四體完具難也六情旣具得生中國難也旣處中國值有道父母國君難也旣得值有道之君生學道之家有慈仁善心難也善心旣發信道德長生者難也旣信道德長生值太平壬辰之運爲難也可不勗哉三惡道者生不得作人得作鳥獸虫畜之三惡也太上問道人曰人命在幾日間或對曰在數日之間太上曰子未能爲道或對曰人命在飯食之間太上曰子去矣未謂爲道或對曰在呼吸之間太上曰善哉可謂爲道者矣吾昔聞此言今以告子子善學道庶可免此呼吸弟子雖去吾教謂應作校字皆猶差懸也千萬里心存吾戒必得道矣研玉經寶書必得仙也處吾左側者意在邪行終不得道也人之爲道讀道經行道事者譬若食蜜遍口皆甜六腑皆美而有餘味能行如此者得道矣上宰亦無降楊事有此及服日月芒事耳太虛眞人南岳赤君告曰人有眾惡而不自悔頓止其心罪來歸已如川歸海日成深廣耳有惡知非悔過從善罪滅善積亦得道也夫人遇我以禍者當以福往是故福德之氣恒生於此害氣重殃還在於彼此學道之行也又告曰惡人害賢猶仰天而唾唾不洿天還洿己刑凡刑字皆應作形逆風揚塵塵不洿彼還灌其身道不可毁禍必滅己太虛眞人曰飯凡人百不如飯一善人飯善人千不如飯一學道者寒栖山林者益當以爲意赤君亦無復别授事紫元夫人告曰天下有五難貧窮惠施難也豪富學道難也制命不死難也得見洞經難也生值壬辰後聖世難也我昔問太上何緣得識宿命太上答曰道德無形知之無益要當守志行道譬如磨鏡垢去明存卽自見形斷六情守空淨亦見道之眞亦知宿命矣又曰念道行道信道遂得信根其福無量也紫微夫人告曰爲道者譬彼持火入冥室中其冥卽滅而明獨存學道存正愚癡卽滅而正常存也財色之於己也譬彼小兒貪刀刃之蜜其甜不足以美口亦卽有截舌之患玄淸夫人告曰夫人係於妻子寶宅之患甚於牢獄桎梏牢獄桎梏會有原赦而妻子情慾雖有虎口之禍有此一異手寫本無此十九字恐是脫漏已猶甘心投焉其罪無赦情累於人也猶執炬火逆風行也愚者不釋炬火必燒手貪慾恚怒愚癡之毒又闕此十五字於辭有不應爾貪嗔癡所謂三毒處人身中不早以道除斯禍者必有危殆愚癡者火燒手之謂也爲道者猶木在水尋流而行亦不左觸岸亦不右觸岸不爲人所取不爲鬼神所遮又不腐敗吾保其入海矣人爲道不爲穢慾所惑不爲眾邪所誑精進不疑吾保其得道矣南極夫人曰人從愛生憂憂生則有畏無愛卽無憂無憂則無畏昔有一人夜誦經甚悲悲至意感忽有懷歸之哀太上眞人忽作凡人徑往問之子嘗彈琴耶答曰在家時嘗彈之眞人曰絃緩何如答曰不鳴不悲又問絃急何如答曰聲絕而傷悲又問緩急得中如何答曰眾音和合八音妙奏矣眞人曰學道亦然執心調適亦如彈琴道可得矣愛慾之大者莫大於色其罪無外其事無赦賴其有一若復有二普天之民莫能爲道者也夫學道者行陰德莫大於施惠解救志莫大於守身奉道其福甚大其生甚固矣有人惡我者我不納惡惡自歸已將禍而歸身中猶景謂應作影字響之隨形聲矣右眾靈教戒所言按此三男眞二女眞並高眞之尊貴者降集甚希恐此是諸降者敘說其事猶如秋分日瑤臺四君吟耳非必親受楊君也三見易遷再云可待要乃起東山屋舍且可離護之耳問其故未見答問眾靈云我或爾耶未詳此意欲識之此一條楊君自記是論長史事數遊心山澤託景仙眞者靈氣將愍子之遠樂山神將欣子之向化是故百疾不能干百邪不得犯屢燒香左右者令人魂魄正而恆聞芳風之氣久久乃覺之耳覺之則入道入道則得仙得仙則成眞從前卷有待歌詩十篇接戒來至此凡八紙並更手界紙書後截半行書字卽是楊書淨覩天地行此前當並有楊續書後人更寫別續之耳所以前脫三十四字楊所書今未知何事淨覩天地念飛仙淨覩山川念飛仙淨覩萬物念覆載慈心常執心如此得道也人生者如幻化耳寄寓天地間少許時耳若攝氣營神苦辛注眞將得道久道成則同與天地共寓在太無中矣若洞虛體無則與太無共寄寓在寂寂中矣能洞寂者則視之不見聽之不聞死生之根易解久長之年易尋尋之可得解之可久夫可久於其道者養生也常可與久遊者納氣也氣全則生存然後能養至養至則合眞然後能久登生氣之二域望養全之寂寂視萬物玄黃盡假寄耳豈可不懃之哉氣全則辟鬼邪養全則辟百害入軍不逢甲兵山行不觸虎兕此之謂矣學道之心常如憶朝食未有不得之者也惜氣常如惜面目未有不全者也然面目亦有毁壞者猶氣亦有喪失要人之所惜常在於面目慮有犯穢次及四肢耳若使惜氣常爲一身之先急吾少見其枯悴矣案此所云氣蓋是房中精氣之氣非呼吸之氣人隨俗要求華名譬若燒香眾人皆聞其芳然不知薰以自燔燔盡則氣滅名立則身絕是故高人哂而遠之遂爲淸淨生之爲物譬日月天地此四象正與生生爲對失生則四象亦滅非四象之滅生滅之也若使常生則四象常存非四象之常存我能常生故也常生亦能生於無景何四象之足計哉災遘禍生形壞氣亡起何等事耶似由多言而不守一多端而期苟免耳是以玄巢頽枝以墜落百勝喪於一敗矣惜乎通仙之才安可爲堅子致弊也竪子致弊蓋爲膏肓之患不除借取晉景公之夢不爾則是別有小兒事也南嶽夫人所言鴻鷺對南旅以遐扇揚翮在於十百之野彼鳥自謂足矣然鷃鳩歎其眇邈大鵬哂鴻舉之指謂應作咫字尺耳苟安其安而是非自足故三鳥不相與議焉何譏之乎紫微言右八條並楊書古之至人獨秉靈一之符玄覽委順之化明坦途而合變捫冥樞以齊物故自然之表則存之而不論域領之内則論之而不議矣昔玄風泯絕埃氣彌氛弘猶淪喪澆僞滋起馳驟之徒替眞於崖分之外躁兢之羣饕利於形名之肆擅智生流蕩之患希求致矜伐之累乖常適於所適離至當於非當矣名身孰親道家良鍼謂應作箴字履淹者守一之至戒良可歎息六月八日夜保命告許長史知以無涯傷性心以欲惡蕩眞豈若守根淨沖栖研三神所以彌貫萬物而玄同鏡寂泯然與泥丸爲一而内外均福也可示虎牙南嶽夫人言促催進散不可令河上有事散似是朮散河上水官也保命言不修道德及學道無成則肇功之徒不相逮也自頃未見有日進之人矣學志故自少也七世之德本鍾於學者若不學則非復所賴故以爲戒徒攝上道而不懃者故下鬼耳下鬼謂下解主者鬼師耳不必是酆官之鬼也經中亦云如此在官無事夷眞内鍊紛錯不穢其聰明爭兢不交於胸心者此道士之在官也秀玄栖摽者雖山河崩潰而不眄志道存眞者雖寒熱飢渴猶不護此一往之至也精散八虛魂遊萬涂或因風以投間或挾魍以結痾將一切撥之而勿耳矣昔之道非今道也靈覺苟殊百隟其如予何章聞之亦足以檢撲矣右九條並楊書夫眞者都無情慾之感男女之想也若丹白存於胸中則眞感不應靈女上尊不降矣縱有得者不過在於主者耳陰氣之接永不可以修至道也吾昔常恨此賴改之速耳所以眞道不可對求要言不可偶聽也有匹則不眞外併則眞假眞假之迹斷可見也此一條應是裴君言某書哭者亦趣死之音哀者乃朽骨之大患恐吾子未悟之相爲憂耳極哀者則淫氣相及來子雖善於耳爾曹當柰張者何定錄君所戒右一條楊書後被割不盡穆惶恐言逢遇玄運得聞宗告每事將順啓悟胸心仁廕纏綿仰感罔極至於始終之分天然定理樂生惡亡人情常感哭泣之哀奔臨之制内以敘情外以順禮賢庶所守莫之虧也穆内雖修道外故俗徒未能披褐山栖帶索獨往不得不敘順情禮允帖内外一旦違之旣恩情未忍亦懼傷之者至矣夫人之言宛而附情弘道長教可謂遠矣輒當奉遵告敕使哀不至傷哭不過慟栖道任適不敢有違謹白此是答右英書本今闕所授事非謂前中君所告趣死之音者而亦應相關涉也右一條掾爲書
