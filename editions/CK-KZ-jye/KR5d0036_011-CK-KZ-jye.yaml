body:
  text: 金陵者洞虛之膏腴句曲之地胏也履之者萬萬知之者無一保命君㖟作此言按㖟此應在乙丑年六月已前甲子嵗中事始論此山受福之端也其地肥良故曰膏腴水至則浮故曰地胏厯世遊踐莫有知其處者句曲山源曲而有所容故號爲句容里過江一百五十里訪索卽得凡此後紫書大字者並茅三君傳所記也傳旣以寶祕見之者稀今謹抄取說山事共相證顯按山形宛曲東西邅迴故曰句曲從山嶺分界西及北屬句容東及南屬延陵句容旣立爲縣故其里不復存昔時應在述墟左右耳今山去石頭江水步道一百五六十六里江水之東金陵之左右間小澤澤東有句曲之山是也此葢呼秣陵之金陵非地胏之金陵矣小澤卽謂今赤山湖也從江水直對望山東西左右正自如此也此山洞虛內觀內有靈府洞庭四開穴岫長連古人謂爲金壇之虛臺天后之便闕淸虛之東窗林屋之隔沓眾洞相通陰路所適七塗九源四方交達眞洞仙館也此論洞天中諸所通達天后者林屋洞中之眞君位在太湖苞山下龍威丈人所入得靈寶五符處也淸虛是王屋洞天名言華陽與比並相貫通也山形似已故以句曲爲名焉今登中茅玄嶺前後望諸峰壟盤紆曲轉以大茅爲首東行北轉又折西行北轉又折東北行至大橫反覆南北狀如左書已字之形金陵者兵水不能加災癘所不犯河圖中要元篇第四十四卷云句金之壇其間有陵兵病不往洪波不登正此之福地也爾心悟焉是汝之幸復識此悟從誰所感發耶此河圖者舜禹所受及洛書之屬今猶有四十餘卷存此語亦是示長史言相感悟乃從楊君宣說吾之所啓發矣句曲山其間有金陵之地地方三十七八頃是金陵之地胏也土良而井水甜美居其地必得度世見太平河圖內元經曰乃地胏土良水淸句曲之山金壇之陵可以度世上昇曲城又河書中篇曰句金之山其間有陵兵病不往洪波不登此之謂也後所稱河圖卽是前要元篇語雖山壇字異其理猶同此蓋指論金陵地胏一片地能如此耳其餘處未必有所免辟耳金陵古名之爲伏龍之地河圖逆察故書記運會之時方來之定名耳至於金陵之號已二百餘年矣尋金陵之號起自楚時至秦皇過江厭氣乃改爲秣陵漢來縣舊治小丹陽今猶呼爲故治也晉太康三年割淮水之南屬之義熙九年移治闕場元熙元年徙還今處此是江東之金陵耳傳所言二百餘年者是吳孫權使人採金屯居伏龍山因名金陵自然響會所以歎河圖之逆兆也句曲山秦時名爲句金之壇以洞天內有金壇百丈因以致名也外又有積金山亦因積金爲壇號矣周時名其源澤爲曲水之穴按山形曲折後人合爲句曲之山漢有三茅君來治其上時父老又轉名茅君之山三君往曾各乘一白鵠各集山之三處時人互有見者是以發於歌謠乃復因鵠集之處分句曲之山爲大茅君中茅君小茅君三山焉總而言之盡是句曲之一山耳無異名也三茅山隱山連相屬皆句曲山一名耳時人因事而諭今故有枝條數十作別名舊不爾也今以在南最高者爲大茅山中央有三峰連岑鼎立以近後最高者爲中茅山近北一岑孤峰上有聚石者爲小茅山大茅中茅間名長阿東出通延陵句曲阿西出通句容湖就以爲連石積金山馬嶺相帶狀如埭形其中茅小茅間名小阿東西出亦如此有一小馬嶺相連自小茅山後去便有雷平燕口方嵎大橫良常諸山靡迆相屬垂至破罡瀆自大茅南復有韮山竹吳山方山從此疊障達于吳興諸山至於羅浮窮於南海也山生黃金漢靈帝時詔勑郡縣採句曲之金以充武庫逮孫權時又遣宿衞人採金常輸官兵帥百家遂屯居伏龍之地因改爲金陵之墟名也河圖已得之於昔可謂絶妙今大茅山南猶有數深坑大坎相傳呼之爲金井當是孫權時所鑿掘也今此山近東諸處碎石往往皆有金砂云兵帥仍屯居伏龍今則無復有唯小近西有述墟昔乃名术墟今是良民述墟前十數里大茅有吳墟村以號而言乃欲相似而復不關金陵長史宅西北近長隱小岡下乃時有故破瓦器焦赤土甚多疑是人居處旣經耕墾基域不復存而了無井亦恐如長史井堙沒耳又小茅大橫不見採金處大茅金井若是復不應頓如此遠居二三疑昧金陵之土似北邙及北谷關土堅實而宜禾穀掘其間作井正似長安鳳門外井水味是淸源幽瀾洞泉遠沽耳水色白都不學道居其土飲其水亦令人壽考也是金津潤液之所溉耶子其祕之吾有傳紀具載其事行當相示定錄君受作密令爾許侯北邙山在洛陽北數里北谷關卽孟津關也土色黃黑而肥腴鳳門卽長安北門也今所擬金陵地並無土種植及住止鑿井者乃是無知察亦爲眞靈愛護不使輕得居焉吾有傳紀者卽是三茅傳也按長史甲子年書云未見傳記則㖟此書時或在癸亥年中也傳中亦稱良土甘美居之度世故因此而顯言也地處少少耳隱略十餘頃許高而平者六七頃也旣知其要覩其形勢便朗朗也故不曲示耳保命君告按傳中云金陵之地方三十七八頃恐是其大垠所至至於實錄正當十餘頃耳高平者是可住處也會登其地依說觀望自可領略粗知其處若爲仙眞度世及種民者無患不自然得至苟其非分徒携手築室必當諸方不立趣使移去耳悠悠凡猥勿承此强欲居之金陵之左右汧谷溪源陵之左有山也右有源汧名柳谷陵之西有源汧名陽谷名山內經福地誌曰伏龍之地在柳谷之西金壇之右可以高棲正金陵之福地也按今呼爲柳谷汧者其源出小茅後田公泉而西南流至述墟首入大汧陽谷汧者今無復其名而長隱山岡後有小汧西流南折亦會述墟首又父老云陽谷汧源乃出中茅前大茅後數川注合爲一汧出山直西行北轉亦會大汧論兩汧相交之內卽是此地大略東西不得極正故兼以左右爲言但今之所云二谷不知卽是昔號不雖有耆相承傳譯漸失兼汧源迥異不必可指的爲據也上古名此山爲崗山孔子福地記云崗山之間有伏龍之鄉可以避水辟病長生本所以名爲崗者亦金壇之質也是以百代百易非復本名良可歎也按今小茅東北一長大山名大橫山云本名鬱崗山山卽在今所謂伏龍之東世又呼伏龍地爲死蛇崗亦粗有彷彿又見其長而高益呼爲長隱隱音於覲切其言可隱障也此崗山雖多細石亦可居耳近東南取長史宅至雷平間甚有可住處義興蔣員蒭等今並立田舍於崗下近去長史宅四五里越桐栢之金庭吳句曲之金陵養眞之福境成神之靈墟也五倍堯水東海傾人盡病死武安兵其如予何由我帶近洞臺之幽門恃此而彷佯耳古弻王王眞人㖟令密示許侯此卽桐柏帝晨所說言吳越之境唯此兩金最爲福地者也武安者秦將白起擊趙於長平一日坑殺四十萬人古來兵傷莫復酷此故別引之爲喻斯葢所謂兵病不往洪波不登矣旣帶近洞天神眞限衞故能令三災不干右前來至此五條楊書大天之內有地中之洞天三十六所其第八是句曲山之洞週迴一百五十里名曰金壇華陽之天傳中所載至第十天并及酆都五岳八海神仙遠方夷狄之洞旣非此限并不獲疏出洞墟四郭上下皆石也上平處在土下正當十三四里而出上地耳此當是至太山頂爲言也東西四十五里南北三十五里正方平其內虛空之處一百七十丈下處一百丈下墌猶有原阜壠偃上蓋正平也向云高處計一百七十丈下處計一百丈則是中央高四邊漸下今云上葢正平是言其質平無凹凸處耳非直去如板也亦可是登隴阜之上則於天爲下耳其內有陰暉夜光日精之根照此空內明並日月矣陰暉主夜日精主晝形如日月之圓飛在玄空之中按諸洞天日月皆各有此名亦小小不同蓋猶是大天日月分精照之旣云晝夜便有出沒亦當與今日月同其明晦今大天崖畔了不得窮此小天邊際殆可捫覩日月出入則應有限當是忽然起滅不由孔穴但未知其形若大小耳句曲之洞宫有五門南兩便門東西便門北大便門凡合五便門也今山南大洞卽是南面之西便門東門似在栢枝隴中北良常洞卽是北大便門而東西並不顯中君告云東便門在中茅東小茅阿口從此入至洞天最近而外口甚小又以石塞之事具在後則西便門亦當如此正應在今所呼作石墳處也栢枝乃有兩三洞口恐眞門外亦不開此三門精齋尋之自可見爾今南便門外雖大開而內已被塞當緣穢炁多故也北大洞猶有鬼神去來而眞仙人出入都不由五門皆欻爾無間設此門者爲示是山洞體製或外人應入故耳虛空之內皆有石階曲出以承門口令得往來上下也人卒行出入者都不覺是洞天之中故自謂是外之道路也日月之光旣自不異草木水澤又與外無別飛鳥交橫風雲蓊鬱亦不知所以疑之矣所謂洞天神宮靈妙無方不可得而議不可得而罔也世人採藥往往誤入諸洞中皆如此不便疑異之而未聞得入華陽中如左元放之徒是所不論然得入者雖出亦恐不肯復說之耳句曲洞天東通林屋北通岱宗西通峩嵋南通羅浮皆大道也其間有小徑雜路阡陌抄會非一處也漢建安之中左元放聞傳者云江東有此神山故度江尋之遂齋戒三月乃登山乃得其門入洞虛造陰宮三君亦授以神芝三種元放周旋洞宮之內經年宮室結構方圓整肅甚惋懼也不圖天下復有如此之異乎神靈往來相推校生死如地上之官家矣今按地域方面則林屋在東南羅浮在西南惟岱宗峨嵋得正耳直道亦當六千里此路至穎川間便應徑通王屋淸虛天也元放當是爲魏武所逼後仍來後眞㖟乃云淸齋五年然後乃得深進內外宮耳三種芝恐是下品者也良常北垂洞宮口直山領南行二百步有秦始皇埋藏白璧兩雙入地七尺上有小磐石在嶺上以覆塪處李斯刻書璧其文曰始皇聖德章平山河巡狩蒼川勒銘素璧若掘卽可得始皇所履山川皆祀以玉璧不但句曲而已從此後墨書皆定錄眞君㖟以告長史掾寫本前紙所失恐非起端語尋埋璧時在三茅得道之前而後乃具見如此明眞人無所隔蔽矣按傳所稱卽是登山時但云一雙爲異或應二字雙璧之書亦如禹山所刻作篆跡也今尋檢其處亦可見石蓋亦殊自不小也茅山北垂洞口一山名良常山本亦句曲相連都一名耳始皇三十七年十月癸丑始皇出遊十一月行至雲夢祠虞舜於九疑浮江下觀藉柯度梅渚過丹陽至錢塘臨浙江水波惡乃至西百二十里從峽中度上會稽祭夏禹望于南海而立石刻頌秦德於會稽山李斯請書而還過諸山川遂登句曲此垂山埋白璧一雙於是會羣官饗從駕始皇歎曰巡狩之樂莫過於山海自今已往良爲常也爾乃群臣並稱壽喚曰良爲常矣又鳴大鼓擊大鐘萬聲齊唱洞駭山澤讚樂吉兆大小咸善乃改句曲北垂曰良常之山也良常之意從此而名檢外書始皇三十七年正月出遊雲夢丹陽浙江上會稽祭夏禹望南海刻石紀功還過吳渡江來並北海至瑯琊至平原得病七月丙寅崩於沙邺九月葬驪山如此之時皆未有瀆卽是從延陵步道上取句容江來路仍過停饗設耳非必故詣句曲所以止住山北邊下處遂不進前嶺且於時亦未驗此山之靈奇祀璧之意者爲通是望山設所以中君云所履山川皆祀以玉璧也夫號從主人名由地表小君以漢成帝時㖟紫書云治于良常北洞葢內因此成稱也又檢始皇崩不發喪令車載鮑魚以亂炁此應夏月中如外書所說相似今依傳言乃是三十六年十月建亥之月爲秦正月爲出遊是至雲夢耳不爾則是三十八年秋崩也未作秦曆不能得定癸丑是何月中比別更詳正之王莽地皇三年七月戊申此七月二十四日也遣使者章邕賫黃金百鎰銅鍾五枚贈之於句曲三仙君王莽制金爲貨名鎰形如錢無孔重一兩直錢一千百鎰則百兩也光武建武七年三月丁巳此三月二十四日也遣使者吳倫賫金五十斤獻之於三君今並埋在小茅山上獨高處塪上有聚石入地三四尺也此則今小茅山積石上最高處是也此二事不顯眞㖟中漢明帝永平二年詔勅郡縣修守丹陽句曲眞人之廟按三君初得道乘白鵠在山頭時諸村邑人互見兼祈禱靈驗因共立廟於山東號曰白鵠廟每饗祀之時或聞言語或見白鵠在帳中或聞伎樂聲於是競各供侍此廟今猶在山東平阿村中有女子姓尹爲祝逮山西諸村各各造廟大茅西爲吳墟廟中茅後山上爲述墟廟並嵗事鼓舞同乎血祀蓋已爲西明所司非復眞仙僚屬矣中茅山玄嶺獨高處司命君埋西胡玉門丹砂六千斤於此山深二丈許埳上四面有小盤石鎭其上其山左右當泉水下流水皆小赤色飲之益人此山下左右亦有小平處可堪靜舍左元放時就司命乞丹砂得十二斤耳今此嶺前後甚多大石而山上左右無正流水東南近下有一長澗西南近下亦有小水度嶺南隱居住處近山上有湧泉冬夏無窮而水色不甚覺赤耳平處可住東西唯當近澗左右爲好左氏乞丹砂當是入洞時所請以合爐火九華丹右楊書大茅山中茅山相連長阿中有連石古時名爲積金山此山中甚多金物其處宜人住可索有水處爲屋室靜舍乃佳此數處亦任意耳快可合丹以修上道中茅之前大茅之後下麓長澗東西亦出山外對館此卽隱居今所住東面一橫壟也此壟純絶石石形甚瓌奇多穿穴側傍盤紆下深乃有無底處屢投脆物在中間玲玲之響久之此云多金物亦當是久來眞仙所投也西南有大石璧聳而坼開內有洞入數丈漸峽小不復容人乃飈飈有風外數步便有一湧泉冬夏淸流卽下解所資近外澗口又有一湧泉水勢乃駛上者冬温而夏冷今正對邏前小近下復有一穴湧泉特奇大水大旱未嘗增減色小白而甘美柔弱灌注無窮但恨在山西自不得東流耳亦別開決作東流用之又渡此嶺東南有一石穴水東流極好其處隱障甚可合丹卽後所云菌山之前也正患去徑路近車聲人響殆欲相聞今若斷此路不復聽車聲人行便是第一處方當思爲其宜茅山住止惟有隱居今所住及南洞口長史宅處乃極好所恨逈曠且此一山通無虺蝮毒螫時有靑蛇都不犯物虎亦甚少自古來未聞害人山居不問道俗皆少温病山德寬容不到險阻但恨無靑林冬夏常鬱如東間諸山耳自隱居往來氣養成秀於形望大好山出好术并雜藥絶宜松柏而本無人裁植不容自生今亦分布嵗種之耳茅山天市壇四面皆有寶金白玉各八九千斤去壇左右二丈許入地九尺耳昔東海靑童君曾乘獨飈飛輪之車通按行有洞天之山曾來於此山上矣其山左右有泉水皆金玉之津氣可索其有小安處爲靜舍乃佳若飲此水甚便益人精可合丹天市之壇石正當洞天之中央玄窗之上者也此石是安息國天市山石也所以名之爲天市盤石也玄帝時召四海神使運此盤石於洞天之上耳非但句曲而已仙人市壇之下洞宫之中央窗上也句曲山腹內虛空謂之洞臺仙府也玄帝時召四海神使運安息國天市山寶玉璞石以塡洞天之中央玄窗之上也東海靑童君曾乘獨飈飛輪之車通按行有洞臺之山皆埋寶金白玉各八九千斤於市石左右四面以鎭陰宫之嶺諸有洞天皆爾不但句曲而已邑人呼天市盤石爲仙人市壇是其欲少有彷彿而不了了也靑童飈輪之迹今故分明句曲之山諸記說今悉分明唯天市壇石未知的何所在以論迹而言隱量正應大茅山左右而踐行不見其異處或恐爲土木蕪沒所不論耳按保命趙承每登壇長嘯風雲立至此則不應在小處長見雲氣出入恒先起大茅北陰此或當高而陰故也夫眞人常御九龍左驂名飈右服名欻旣履山頂故指乘其右驂今大茅嶺上向東行有路傍山平治狀如人功足通軌轍相傳皆呼此爲飈輪迹乃無埋沒石壇旣未顯金寶亦難測所埋又疑洞天中央玄窗之上不應乃近南門復恐在中茅間邑人耆老亦不復知仙人市壇處自隱居來此山七八年尙未得窮厯踐行而况悠悠之徒令其究竟之耶所以來得遍履者患於無良侶可同登陟之艱獨行又覺踽踽是以遂爾淹稽常所耻恨比日方負杖孤遊庶當委曲所聞所見耳中茅山東有小穴穴口纔如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口餘小穿如盃大使山靈守衞之此盤石亦時開發耳謂之陰宮之阿門子勤齋戒尋之得從此入易於良常洞口其中多沙路曲僻經水處不大便易又道路遠不如小阿穴口直下三四里便徑至陰宮東玄掖門入此穴口二百步便朗然如晝日此卽洞天東門也隱量乃可知處自未敢輕索入耳前傳云洞宮出土上計十三四里許今此云三四里便至掖門者是近山下已薄而門勢又未平計入門復應向下數里乃得至宮耳入口便明者此爲內光出照不必關外日者也大茅山亦有小穴在南面相似如一謂之南便門亦以石塡穴口但精齋向心於司命又常以二日登山延迎請祝自然得見吾也誠之至矣陰宮何足不觀乎左慈復何人耶此卽南面之東便門應在柏枝礲石穴中此礲小穴甚多難卒分別必須精感得開乃可議入云二日者謂十二月二日依傳說年有兩日恐三月十八日諠譁雜鬧非專請之宜故也左慈以成仙人質見易於俗所以三月淸齋便得入洞長史雖挺分高邈而形識猶昧豈可相比此語是欲相奬勵耳長史後答亦作此意仰酬之也三月十八日十二月二日東卿司命君是其日上要總眞王君太虛眞人東海靑童合會於句曲之山游看洞室好道者欲求神仙宜預齋戒待此日登山請乞篤志心誠者三君自卽見之抽引令前授以要道以入洞門辟兵水之災見太平聖君按中君書云常以二日登山延迎請祝卽請十二月二日不見道三月十八日者屢有正月中耳今臘月二日多寒雪遠近略無來者唯三月十八日輙公私雲集車有數百乘人將四五千道俗男女狀如都市之眾看人唯共登山作靈寶唱讚事訖便散豈復有深誠宻契願覩神眞者乎縱時有至誠一兩人復患此諠穢終不能得專心自達如此抽引乞恩無因得果矣唯隱居所住中巖禁斷淸年得無遊雜旣去洞隔嶺人自不知至於此也良常山西南垂有可住處是司命往時別宅處也亦可合丹司命初過江立宅於此以自蕩滌質對神鬼今按垂之爲言如是邊際此正應在長史宅後大橫之西今父老相傳言如是邊際此正應在長史宅後大橫之西今父老相傳乃言大茅之西北平地棠梨樹間名下薄處言是司命君故宅耕墾至肥良多見磚瓦故物似經住止處亦驗烈不可穢犯君此審是則宜言中茅之西不應遠舉良常大都眞人語自不正的遇所引處便言耳昔時山下遠近諸處長林榛艻遮天蔽日無處不可隱密卽今斫伐耕稼四通九達山中亦皆顯露時移事異不復可准乃言未久如此正復五六十年來漸劇耳良常東南又有可住處其間當有累石如竈形竈間或有寄生樹樹如曲蓋形此處至好但恨淺耳雖爾自足此處今亦存但無復有寄生曲樹耳亦帶北洞流水其左右並近大路所以言淺卽今凋迥無復可往也洞口西北有一地地小危不安要自足立外靜舍也今此中以去多荒蕪漸近村埭並不足復居昔時言去縣小近往來爲易又近洞口所以屢及之耳外靜舍當以俟游賔從憩止非自往修行之所益知是欲相近之意也須居士所撰本此中向近所摽精舍地一篇今視掾書者不以相次乃別出在長史所營宅前耳此後長史答書道西北地危仍次菌山不酬金鄉至室語明知本别㖟之也句曲之山有名菌山此山至佳亦有金乃可往採入土不過一二尺耳吾昔臨去時曾埋金於此欲服金者可往取但當不中以營私累耳今人不復識呼菌山者尋此山形當如菌孤立亦或是囷蒼之囷形如囷也按大茅後長阿積金東凹地有一山子獨秀如博山爐且又近積金山恐此或當是卽今多石及樹木但金之所在指一兩處亦難尋索唯啓乞垂賜所不論耳意欲營轉鍊之事亦指此山前臨長澗東流水至幽隱有形勢若基搆有期當更宣述耳大茅山有玄帝時銅鼎古鼎字鼎可容四五斛許偃刻甚精好在山獨高處入土八尺許上有盤石掩鼎上玄帝時命東海神使埋藏於此此亦當是移安息石時所埋也今最高處乃多石每吉日遠近道士咸登上燒香禮拜无復草木累石爲小壇昔經有小瓦屋爲風所倒尋古來帝王並重鼎器者以其兩鉉法日月三足法三才能烹飪熟成萬物兼自能輕重神變隱顯故也中君後答云鑄羽山之銅以作之諸有洞天之山皆爾大茅山下亦有泉水其下可立靜舍近水口處乃佳當小危不安耳今近南大洞口有好流水而多石小出下便平比世有來居之者唯宋初有女道士徐漂女爲廣州刺史陸徽所供養在洞口前住積年亡女弟子姓宋爲人高潔物莫能干年老而亡仍葬山南宋女弟子姓潘又襲住于今尙在元徽中有數男人復來其前而居至齊初乃勅句容人王文淸仍此立館號爲崇元開置堂宇廂廊殊爲方副常有七八道士皆資俸力自二十許年遠近男女互來依約周流數里廨舍十餘坊而學上道者甚寡不過修靈寶齋及章符而已近有一女人來洞口住勤於灑掃自稱洞吏頗作巫師占卜多雜浮假此例亦處處有之大茅東西亦有澗水有晉末得道者任敦住處合藥竈墌猶存今有薛彪數人居之又有朱法永近小山上快矚眺而乏水良常山對穴口東視小山之嶺其上有埋銅數千斤以盤石塡其上漢時其山下有屈氏家大富財有巨億埋銅器於此于今在也亦有錢錢在西北小山上向也今此山具存无知其錢銅處縱有彷彿亦不識尋視此山明地高下墽澗不似經墟村住處恐嵗代久遠勢迹乖異故也曾得往年三月一日八月八日二書此乙丑所受則長史往年書是甲子年中按答云直置書於述墟朱家靜中則非因華僑楊君送之也三月一日書云今當墾赤石田日爲往來之階亦竟不就事也復云豈可遐弃坐觀存沒哉此道自決求眞之精誠也心不在我不可責人使必成之也赤石田今中茅西十許里有大塘食澗水久廢不修隱居今更築治爲田十餘頃長史昔意欲避形迹因作田之階得數處望靈山而遇旱塘壞竟不果所以此書譏之耳都不齋而有書云齋戒也此亦有答明辭奏不可輕妄動靜必皆聞徹矣八月八日書云謹操身詣大茅之端乞特見採錄使目接温顏耳聆玉音此語爲求道之甚急也得近書具至心可勤道奬志也司命君自在東宫又書不應總合德有輕重之故也司命常住大霍之赤城此間唯有府曹耳具位有高卑故不宜共作辭啓二君雖同居華陽而官府各異不得同紙凡書奏不如口啓於此可具鑒其儀格耳吾等已自相知之厚薄書疏亦甚爲班班欲停之如何此是長史輕脫置書於他家靜中而去恐方將人到又致漏泄眞靈愼密故有此語欲戒試其心事耳長史後答此言亦殆爲巧便此書疏愼示俗人脫有見者掘壞靈山爾之罪大也恐俗人貪狡之徒知此金寶處堪能鑿掘則事由宣泄此罪眞爲不輕非但爾時教戒亦傳貽無窮將來諸子咸共祕之右定錄中君答長史前書說句曲山事訖此長史前書無本出今唯有後答亦隨條奉酬次第如左右從前良常來凡二十一條並有掾寫昔年十餘嵗時述虛此乃應是墟字錯悮而由來皆作墟字卽今之山西村名也閑耆㝛有見語茅山上故昔有仙人乃有市處早已徙去後見包公問動靜此君見答今故在此山非爲徙去此山洞庭之西門通太湖苞山中所以仙人在中住也唯說中仙君一人字不言有兄弟三人不分別長少不道司命君尊遠別治東宮未見傳記乃知高卑有差降班次有等級耳輒敬承誨命於此而改此長史又更答書云今有所起草存故得撰錄而前紙斷失亦非起端語也包公是鮑靚句容人悉呼作包也答書時已是蒙示傳記是乙丑年初矣告小阿口直下三四里便徑至陰宮東玄掖門入此穴口二百步便朗然如晝日不審此洞天之別光爲引太陽之光以映穴中耶此洞天中官府曠大云宮室數百間屋官屬正二仙君兄弟復有他仙官男女凡有幾許人爲直是石室亦有金堂玉房耶宫室與洞庭苞山相不包公及妹朱氏昔在世曾得入此宫不二人爲未得登舉作地下主者耶治在何處愚昧冒啓懼有干忤包公及妹事前中君書無有當復是別㖟今更重問并洞中事定錄又答有後也市山之盤石市名之存由於此也今之孜孜志慕於道無心金玉尊靈所置唯助令彌密耳豈有掘犯理耶此故爲未之照察也山左右泉水金玉津液其地亦可立靜舍合丹輙當以爲意此上答天市泉水可住事而竟無所立也不審玄帝是何世耶後生蒙蒙多所不及願告顓臾水王故號玄帝外書亦爾長史脫致疑問耳此條復有答在後告中茅山東有小穴陰宮之阿門入道差易後當以漸齋修而尋求之靈宗垂念便以爲造金門而登玉房也但存遲速之間不敢悒遲有如此教示而不速求游闢一何可恨所以眾靈每勤勤引勸告大茅山亦有小穴在南面相似如一謂之南便門欣見啟悟喜禀德音精誠注向沐浴自新旣聞吉日至時密造區區之誠靈實鑒照此道南面之東門與小阿東門相似者告左慈復何人也此見奬朂之言恩念下逮益令欣慕傳上亦載此事告良常西南垂有可住處是司命君往時別宅亦可合丹穆自見傳記鄙心竊志欲尋司命君往昔之舊宇高棲之所托患未能審知耳今輙當隱量求處臨時告悟傳上亦載此事基陛湮沒難可必審故更乞告示也告良常東南又有可住處累石如竈寄生樹如曲蓋爲誌往當尋其所告洞口西北有一地地小危不安可立外靜舍愚意本自欲立內外靜舍輙當疇量在宜亦不聞立此外靜事而今有一累石壇厯然相傳乃言掾於此壇化遯也每往拜視輒感嘆纏心告菌山至佳司命臨去埋金於此欲服金者可取且竊有合金液意今未敢議此若山居積年修學日進後而事可得密者臨時啓質中君書云吾昔臨去埋金不道司命長史此答誤耳告大茅山有玄帝時銅鼎在山獨高處入土八尺許此帝王之所器疏示後生益增禀厲承下亦可以立靜舍感備告悟告昔屈氏埋銅及錢此通非所擬向也聞此遠事世代變易能不悲歎昔初拜八月八日書已操身至述虛此猶是前村徐汎家尋家信見報云得應言未可登山便承此而歸直致此書於朱家靜中耳愚心鄙近亦以肉人穢濁精誠不懇無能上達不悟已暢高聽得蒙省察辭與事違悚息而已長史玄挺動靜聞徹屑辭所向便已關奏蒙報或是得楊君所傳者徐汎家今猶存後所云徐偶卽應是況後所以知井宅處亦云其祖曾爲長史門生也昔占赤石田利近山下爲往來之階此乃丹誠尋遇天旱佃不收塘壞穆尋見用出此事力未展非爲息懷今方居山下故當修懇以此去洞口遠故不欲安耳此田旣在大茅中茅之西去大山近瞻仰禮拜乃佳而言去洞口遠當是道去北洞口遠耳此田雖食澗水旱時微少塘又難立不知後當遂墾之不今塘尙決補築當用數百夫則可溉田十許頃隱居館中門人亦於此隨水播植常願修復此塘以追遠跡兼爲百姓之惠也告書疏班班欲停之如何凡書疏之興所以運達意旨旣蒙眷逮親奉覲對司命君二仙靈顔則天啓其願沐浴聖恩豈復煩書疏耶所謂得魚而忘筌也此蓋不欲停之辭故引以回見於理極好不審左公今何在又有葛孝亦言得道今在何處肉人喁喁爲欲知之葛旣鄕人所以及問此條亦右答在後右長史答書訖此並是自起本多黵治用白牋次第如此嵗乙丑此一行本題紙背
