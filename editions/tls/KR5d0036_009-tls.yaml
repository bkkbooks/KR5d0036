body:
  text: 卷八甄命授第四游精罔象誠不可信然多勞多事多念多端所以損神喪真擾競三關遂當以此害明德也故令許君之徒含景內魄若抑四者研虛注靈則仙可冀定錄告除治爾床席左右令潔靜理護衣被者使有常人常燒香使泠然不雜也南嶽上真當數看出內便料理起居可使草及木瓜耳手自先有風患是以今風氣之本至耳多云針灸佳益使人無憂此易遷令告長史也草及木瓜當是理衣下人名也可迎黃民來出民奴既欲來又云其月末左右當小小疾患迎來在此則疾患除也當部分護靜屋以為急并欲得一室可棲息處今年欲取草當為民奴留之草今年自有本命厄非欲取也令其乞符自保而帶之臥床後孤有懸風可安北面下一彰謂應作障字亦可以床著近北壁下勿使虛懸晨夕當心存拜靜心存行道也身既有疾不能拜起故令心存不替斧有霍亂疾勿使冷食此兒常不大宜住此今自無他耳右易遷一夕再來四更中獨來道此先初來又與保命俱此似在縣下所授今掾還山使黃民歸家也易遷即掾母七後得入易遷宮因呼為號前所呼亦皆是也斧學道如穿井井愈深而去土愈難運出自當披其心正其行乃得見泉源耳有人說中候言如此可令知之李中候名遵即撰茅三君傳者人學道譬如萬里行比造所在寒暑善惡草木水土無不經見也亦試在其中也頃數聞人道此始乃悟之耳彼君念想殊多渠謂應作詎字能成遠志不平昔時常多所恨始悟人難作而善不可失云學道者除禍責此審爾當勤右易遷夫人所道山嶽氣擾則強禽號于林川瀆結滯則龍虯慘于澤此自然象也故豪盛微覺將類獸告其駭浪玄數纖兆而號啕徵乎治亂矣斯蓋山川之盈縮非人事之吉凶若墳附丘山誠與汧岫等波苟趣舍理乖則吹萬之用不同也非靜順無以要謙非虛棲無以冥會是故死生之幾吉人不復豫苟思之無邪不為禍害五月十四日右英夫人答孔辭後人作謝安字孔氏孔默也云似是孔嚴兄弟長史父先為嚴從兄坦前鋒都督是討沈充時既有因緣故得此也虎頃大號墓下事自未得和神靜形俯頤幽精者疾源或與年而積耶若未能用交賒之途者將奚促促於藥定錄仙人答孔求乞藥方想早葬兄今注煙速消雖不辦妨于生者要欲得柩物時寧三泉使凶氣泯靜也小兒疾方行當示五月十七日夜保命仙君所言答厶一字被剪除疑猶是孔字所問疾患者右從禮年來凡十九條並有掾書遵勤心香火有情向藥故有言消磨之愈疾謂其將聞斯而請命耶仙真並呼藥為消摩故稱消摩經也誦之亦能消疾也應南趨而北騁既心口違矣夫捐薺以茹荼哂九成而悅北鄙者捐薺至此亦是抱朴博喻中語我知其無識和音之聽鑒也當永為吉人爰及母奴然所起是學而不思浚井不渫蓋肉人之小疵耳無乃此也今事結水禁猶有可申若許長史能於靜中若救之者則一門全矣亦是師主祭酒之宜請而為德惠乎五月二十日夜右英作與長史劉遵祖善譚說殷浩向亮稱之後一會談論殊不合遂名之為羊叔子鶴于是失名劉遵心故為修耳何不令其母服大遠志丸七月七日夜紫微夫人告即啟可得疏方不良久答言世間自有可尋索密用保命君問紫微曰此方用牛黃銀屑者非若是者小為難合此即今大鎮心丸也先以水銀摩銀屑使消故為難合紫微答但頷頭右三條楊書陸納兄弟清真淳一有姜伯子之風知欲有遠志欣然其祖父有陰德當慶流七世知陸苟子自誓乞苦齋一年欲受經卿自此二字後人褷益非真更量之劉遵乃有好心早自知保命答許長史陸納兄名始並有德行祖名英仕吳丹陽郡太守苟子當是人小名不詳是誰納為尚書令太元二十年亡虞昭為其兄子此二字後人枿易作先人字本猶可識事文書牽連身被攝繫方未已殆欲無理賴其在世粗有功德且其家福德強章聞累疊皆被上御事已散尋蒙追遣之其病雖篤無所憂許侯為之甚至密相示保命答許長史庾道季身處陽官貴勢不能順天用法憒憒慢信心形不同自少及長善功無一積惡不改其罪目已定今臨命方欲修德以自濟免徒費千金之用不亦晚乎保命答許長史庾和字道季亮第二子也幼有才辭文義升平中為丹陽尹表除諸侯六十餘事太和初為領軍如此行跡不似為惡恐是聞戒修善故得申遂郗回父無辜戮人數百口取其財寶殃考深重惋謂應作怨字主恆訟訴天曹早已申對回法應滅門但其修德既重一身免脫子孫豈得全耶回當保其天年但仙道之事去之遠矣太元真人答許長史郗回父鑒清儉有志行不應殺掠如此或是初過江時擺併所致不爾則在京時殺賊有濫也鑒年七十餘乃終即得為酆宮職右從陸納來四條有甲手寫平凝夷質淵通妙靈神造重絕棲真攝生太玄植簡太素刊名金庭內曜玉華外瑩朱軒四駕嘯命眾精騁龍玄州飛雲浮冥必能上友逸臺之公下監御于太清矣八月十七日夜紫微王夫人授令因許長史示郗希遐遠曜冥響凝玄蕭浪上韻耽夢遁真仰飛霄霧俯散靈根飛步四覺內觀七緣者則必有丹書秀簡帝房之錄玄聲八振棲身五嶽于是灌胎朝元吐納六液從容三道誨此景福上可以策軒空洞下可以反華變黑矣若形羈榮羅鼓輪華園乘波適物鳴簪風塵外有謀道之名內有百憂來臻者適足勞天年以騁思終歸骸於三官耳齋之不專徒悟而無益可謂意不盡言乎蓋行真炁當吐三納四乘七吞九今吸之不足躡之失序神漏溯源精亡胎擾雖休糧日挹而莫知道與年喪矣欲階此渡也其未接乎夫索長生者多津尋靈途者千百何必用冰爐以盛火趣償責于三官耶右中君言因許長史示郗紫微夫人云郗若得道乃當為太清監也若能聞要道而勤者當至此格若不專篤而守迷行外舍道法者則都失也紫微前語與太元殊乖而如此所云當是迷不能勤乎要道司命顯其終迹故也情不餘念者道乃來耳郗回猶未足以論至道耶小君郗綜婦丁淑英者有救窮之陰德又遇趙阜之厄而不言內慈自中玄感皇人故令福逮于回使好仙也綜墓在東平淑英今為朱陵嬪數遊三上司命亦令聽政焉此二人當是回之曾祖也外書不顯郗瞿與薛春華至垂心于門宗初不以生人為事然訟者多但不能咸制之耳每見諫考訴者甚勤至也時節宜祠之耶此二人郗家之福鬼外書亦無此二人不知是何親郗雄與閻屈女不相當負石之役于今未了喜擊犯門宗心常殺絕此二人是郗家之禍鬼郗厶枿除此名不可識與殷武姬被考以燒殺朱奢李賤以致災也其無後亦求代逮又與高豐相扇甚助馬頭之訟石公未便可得佳恐不止耳亦何趣欺其婦耶省來勤勤試為掩正之亦無此諸人右保命答許長史小君說言郗鑒今在三官為劉季姜所訟爭三德事周馬頭在水官訟其婿引理甚苦郗朗伊香之二人今為牙女子奇求此范帥昨受江羅辭郗相今為大曹吏所逮其婦形嬰桃受事未了方索代人於此家此自是旁聽小君之言語耳不令書之為自疏識以示耳此二十二字是楊君自記與長史高齡反化晚而祭酒弱道氣不交靈助無主是以群邪纏玄急行其禍奚不宗生生乎於我助之有緣其婦言亦急家事當須了之非他得豫今六天之橫縱而太平之微薄靈不足以助順適足以招群奸所以神光披越而邪乘正任矣高齡之無德久矣鬼訟之紛錯積矣許長史黃氏枿作掾字將欲理之耶若翻然奉張諱道者我當與其一符使服之如此必愈而害兮此豁字也矣不然往詣水官所謂嗚呼哀哉張諱即天師名也楊不欲顯疏也邪氣入體鬼填胸次其將迴惑于邪正必不能奉正一於平氣耶如此吾治疾之方殆不可得正一平氣即天師祭酒之化也彼往其子亦去何一身之永逝乎八月十九日夜保命君密語許長史冢訟尤甚恐亦未已齡曾鑿敗古人碑銘之文以自顯焉陰賊于鬼神弊謂應作蔽字善以自摽訴者誠多事以此為首先八月二十四日夜保命告欲取謝奉補期門郎而今已有兼人北帝故權停之耳近差王允之兼行得代奉若服朮酒可未便恭命也高耆亦可服朮其家蒙訟亦為紛紛朮遏鬼炁故必無他耳范中候言此謝奉字弘道會稽人仕至吳郡丹陽尹吏部尚書王允之敦同堂弟王舒子有智幹為河南中郎將江州遷衛將軍會稽封番禺侯年四十亡諡中侯高耆即謂齡也期門即酆都中官而記中不見此職惟有修門耳從平凝來凡十四條有掾寫夫觀物適任內順明靈託性命於高真委形氣于神攝者亦克疆以永遐迴秋齡以保真今德匠既凝神杖信澄心密靜圓順廣敬固天祐焉然胤嗣不多或時彫落將猶靈關失緯潛機未鎮耳當今五氣滋曜常朗文昌之房三星結華每煥璇衡之內是以玄潤胎萌遂其流根矣我案九合內志文曰竹者為北機上精受氣于玄軒之宿也所以圓虛內鮮重陰含素亦皆植根敷實結繁眾多矣公試可種竹于內北宇之外使美者遊其下焉爾乃天感機神大致繼嗣孕既保全誕亦壽考微著之興常守利貞此玄人之秘規行之者甚驗六月二十三日中候夫人告公孝武壬戌生此應是辛酉年而後又云上相座動後以臨登極乃是後午未年此為大懸靈草蔭玄方仰感旋曜精洗洗似草作言邊應詵詵字即毛詩螽斯羽詵詵兮宜爾子孫之義也繁茂萌重德必克昌紫微夫人作福和者當有二子盛德命世福和似是李夫人賤時小名也今晉書名俊容二子即孝武並弟道子也同夜中候告右三條楊書又掾寫德匠既凝玄範自天安危之事未宜問也公傾注甚至所以未相酬者豫事難論耳頃天氣激逸陰景屢變太白解體于二辰之中愆勃于紫房之下王者惡焉天子有憂上相座動今聊作讖密以相示右此及讖有掾寫在掾自記修事後共紙尋真綜回文令難解耳今拘連相取又別疏出之其授之時維當道其辭楊君後自更錯義皆是說晉代之事並有明徵也相欺豈妙道要吾知之天秘能有術金之萬尋師疾逆除惡子自之制夷遂平世天命乘驅寶奇龍者篡可悲真間世復思宜神熙逆歷有數在茲基無不無兵隆誰定帝紜室來之皇慎地先卒兒必虧金紛異五亂德天火數失期座當變見遠凶匠制規三由匠足不慮憂危撥保封寸莫其測源劉知向有明施者三五瑞天之代隆換迭相運推精氣神妙二參儀慎凡傳人賢精氣神妙參二儀慎傳凡人賢者施封天制地無不宜子能寶秘天知之吾道要妙豈相期自有奇神先兵規火寸三五天瑞之隆代迭換運相推明匠保德慎無思驅惡除逆疾尋思萬金之術龍之熙隆數卒三失由兒莫測其源劉向知有凶撥亂皇復基乘天命世遂平夷制逆者誰必定期匠不足慮憂遠危五世之間真可悲篡歷有數帝座虧當見變異紛紛來金室在茲枕麝香一具於頸間辟水注之來絕惡夢矣常存三關佳也右英告公凡云公者皆簡文帝為相王時也右一條楊書五字朱書太元真人告許長史此後非真說我嘗見南陽樂子長淳朴之人不師不受順天任命亦不知修生之方行不犯惡德合自然雖不得延年度世死登福堂練神受氣名賓帝錄遂得補修門郎位亞仙次緣天資有分亦由先世積德流慶所陶若使其粗知有攝生之理兼得太上一言之訣如此求道無往不舉矣夫人所以不盡年壽中多夭遏涉世者或遭刀兵之難致榮祿不終祚胤不長志道之人雖有一生之心鑽求匪懈徒復遭遇真文耽玄精微慕尚者眾得升騰者稀經非不妙靈豈無感愚愚相隨安知修真之本營神養性鎮守之法世人積小以來形中傷犯者多帝一不治百神驚散考試萬端所謂荒城之內荊棘生焉無妙術以自導修道以求仙貪榮慕貴多垂成而敗皆由喪真犯氣愚瞽罔昧豈識此機耶致奪年滅笄萬事不成以此求生去生遠矣虛自苦耳太上有玄機之道煥落七神枕中之要此道微乎妙哉初不傳于下挺愚俗之人有此道者帝一治于玄宮萬神守備與天同心案訣謹而修之登山越海萬試不干修仙升度所欲從心斯豈虛言耶卿父子玄機邈世理妙接真故可榮神之仙才而為眾真所稱非吾獨所稱舉故當與卿同編仙錄無復理外之嫌亦已諮啟卿故令知乃心受用金龍玉魚此不可闕所以爾者詣太上前昭靈亦當粗具近所寫神虎符意嫌不精可更書為善卿前所道相王事頃面郗回亦知有好心但所得少耳自當保其天年也見謝所作傳未易功乃能序述聖迹賞解作奇此是天發其心昨亦已見司命君大以為佳冥中自當報之有緣其子孫若知醮靈岳祈天真降應必也豈虛言哉謝家一門唐承之世繁林蔚然甚可欣也安石先對所鍾如何具如近面不足宣真人西城王君答許侯右四條別一手書陸修靜後于東陽所得不與諸跡同辭事偽陋不類真旨疑是後人所作樂子長非受五符者唐承即列紀所云四十六丁亥之期
