body:
  text: 卷十協昌期第二微誠因理感積精洞幽真斐斐乘雲綵靈像憑紫煙眇眇濯圓羅佛佛駕飛輪玄翰啟蒙昧顧景恩自新長史既開啟告賦詩一篇本注之此即酬釋夢之旨也長史自書凡真書及古書作拚掞字皆作徬佛字此則是掞也此字已下至也字並朱書范幼沖遼西人也受胎化易形今來在此恆服三氣三氣之法存青炁白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止為之十年身中自有三色氣遂得神仙此高元君太素內景法旦旦為之臨目施行視日益佳其法鮮而其事甚驗許侯可為之矣範即是華陽中監也事在第四卷右一條楊書東海東華玉妃淳文期授含真臺女真張微子服霧之法常以平旦于寢靜之中坐臥任己先閉目內視仿佛使如見五藏畢因口呼出氣二十四過臨目為之使目見五色之氣相纏繞在面上鬱然因入口內此五色氣五十過畢咽液六十過畢乃微咒曰太霞發暉靈霧四遷結氣琬屈五色洞天神煙含啟金石華真藹鬱紫空煉形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者久行之常乘雲務而遊也右一條楊書又掾寫守玄白之道常旦旦坐臥任意存泥丸中有黑氣存心中有白氣存臍中有黃氣三氣俱生如雲氣覆身因變成火火又繞身身通洞徹內外如一旦行至向中乃止于是服氣一百二十都畢道正如此使人長生不死辟卻萬害尤禁六畜肉五辛之味當別寢處靜思尤忌房室房室即死初存出氣如小豆漸大衝天三炁纏煙繞身共同成一混忽生火在三煙之內又合景以煉一身一身之裏五藏照徹此亦要道也右二條有掾寫並右三事在論華陽第四卷中今又重鈔可修事出此耳其本文猶在彼卷太極真人敕酆臺北帝使告三此三字被後人枿不可複識官制神滅鬼靈符盛以重紫之囊係之頭上入穢淹脕也此九字又被青枿乃不可都識而非今所書字衛符有三天直使者二人凶鬼萬邪有乾佩符者即死此下複有十字亦被枿不可複識男女各佩一已別題之小君今書此符相與佩之在玉馬經上一名北帝書七元符中有一符無題相傳言是此符而玉馬經世未嘗見不敢為定一雄黃二雌黃三鉛黃右三黃華先投朱砂一熟研之于器中次投雄黃熟研之次投雌黃熟研之次投鉛黃合研之良久成也以膠清合研之言一者以意為之一分之品量多少也此是諭作三黃色以畫符法真符多用此右三條楊書合藥當令精不精者不自咎反責方之不驗若是人可謂咎乎可使鈔方合耳可用昌蒲五兩所以用十兩末知道門戶之人耳可用茱萸根皮二兩紫雲芝英三兩此用君口訣此是論合初神丸事其方在蘇傳中即周紫陽所撰故受此訣是告長史也右一條厶書成治朮一斛清水潔洗令盛訖乃細搗為屑以清水二斛合煮令爛以絹囊盛絞取汁置銅器中湯上蒸之內白蜜一斗大乾棗去核熟細搗令皮肉和會取一斗又內術蜜之中絞令相得如餔狀日食如彈丸三四枚一時百病除二時萬害不傷三時面有光澤四時耳目聰明三年顏如女子神仙不死又法成朮一斛水盛洗洗乃乾干乃細搗為屑大棗四斗去核乃搗令和合清酒五斗會于銅器中煎攪使成餌狀日服如李子三丸百病不能傷而面如童子而耐寒凍又法朮散五斤伏苓煮三沸搗取散五斤右二物合和更搗三千杵盛以密器旦服五合百災百毒百疫不能犯面童而壯健久服能飛越峰谷耳聰目明矣此三方有掾寫似是紫微夫人所授繼朮敘後者煉麻腴法清水三斛麻腴一斛薤白二斤合三物會煎之以木蓋蓋上勿令腴煙散出取一斛止內酒中服之亦可單服此一方有長史寫乃別出四蕊丹方中而世之方本又加蔥白二斤太極真人遺帶散白粉服一刀圭當暴心痛如刺三日欲飲飲既足一斛氣乃絕絕即是死也既斂失尸所在但餘衣在耳是為白日解帶之仙若知藥名者不復心痛但飲足一斛仍絕也既絕已自覺所遺尸者在地也臨時自有玉女玉童以青皞輿共來載之也欲停者當心痛三日節與飲耳其方亦可舉家用雲霞衣九兩是其首此一條不知出何處事即應是白翳散也世未見方右一條厶書齋者不宜雜不齋者而相混並未體正道後宜改之上道之高神虎經是也自非傳授者皆不得令其見所寫之紙也此又一未體矣南真云寫神虎文不精則萬物不為己用心將徒勞耳得紙更留心謹寫燒香先者寫上書當恆燒香文之左右亦初不能令專使煙清恆也精誠務在匪懈求道唯取于不倦耳此又近於替乎夫得道者常恨于不早聞受失道者常恨於不精勤何謂精耶專篤其事也何謂勤耶恭繕其業也既加之以檢慎守之以取感者則去真近矣爾其營之勿忘也此前五條並似止告楊君受書則師乃恥之耶真心既有不盡獲考者非一人子往師蘇林守一當先齋受戒能得此度世幾未可量也九華真妃言守五斗內一是真一之上也皆地真人法也上黨王真京兆孟君司馬季主皆先按于此道而始矣魯女生邯鄲張君今皆在中嶽及華山正守此一亦可得漸階上道而進復為不難也五斗內一涓子內法昔所授于峨嵋臺中本其外守一玄一之屬莫有逮其蹤者也小君言五斗真一即今蘇傳中分至日所存用者是也中君曰良勤不休吾當與其流珠真此亦中真之上道也流珠亦九宮家事其經未出世此前五條並似令告牙也又云性躁暴者一身之賊病求道之堅梯也遂之者真去改之者道來每事觸類皆當柔遲而盡精潔之理如此幾乎道者也此語似令告掾小茅君云丹砂雄黃雌黃家家皆有之至於無一人合藥者也皆如傳國璽印父傳子子傳孫耳好道而不專疲志而不固華名鍾于胸心榮味交于外視萬萬皆是也適足疲我三官之司矣此語似鸑告牙可令許斧數沐浴濯其水疾之氣也消其積考之瘕也亦致真之階右紫陽真人言沐浴不數魄之性也違魄返真是練其濁穢自亡矣右紫微夫人言上道法衣巾不假人不同器皿者車服床寢不共之也所以遏穢垢之津路防其邪風之往來耳此甚易行而更以為難所為信道不篤欲飛反沉者也心遘何必言哉其自當知所為此三條以令告長史右南岳夫人語右十六條並楊書又雜掾寫人臥床當令高高則地氣不及鬼吹不干鬼炁之侵人常依地而逆上耳高謂三尺已上也人臥室宇當令潔盛盛則受靈氣不盛則受故氣故氣之亂人室宇者所為不成所作不立一身亦爾當數洗沐澡潔不爾無冀盛字是水爭義中國本無水爭字故作盛也諸經中通如此勿道學道道學道鬼犯人亦不立使人病是體未真故青童亦云一言一事泄減一如此可不慎之此三條本在酆宮記中楊書又掾書大洞真經高上內章遏邪大祝上法曰每當經危險之路鬼廟之間意中諸有疑難之處心將有微忌敕所經履者乃當先反舌內向咽液三過畢以左手第二第三指躡兩鼻孔下人中之本鼻中隔孔之內際也三十六過即手急按勿舉指計數也鼻中隔之際名曰山源山源者一名鬼井一名神池一名邪根一名魂臺也躡畢因叩齒七通畢又進手心以掩鼻于是臨目乃微祝曰朱鳥淩天神威內張山源四鎮鬼井逃亡神池吐氣邪根伏藏魂臺四明瓊房零琅玉真巍峨坐鎮明堂手暉紫霞頭建神光執詠洞經三十九章中有辟邪龍虎截岳斬堽猛獸奔牛銜刀吞鑲揭山攫天神雀毒龍六領吐火啖鬼之王電豬雷父掣星流橫梟磕駁灼逆風橫行天禽羅陳皆在我傍吐火萬丈以除不祥群精啟道封落山鄉千神百靈併手叩顙澤尉捧燈為我燒香所在所經萬神奉迎畢又叩齒三通乃開目除去左手手按山源則鬼神閉門手薄神池則邪根散分手臨魂臺則玉真守關于是感激靈根天獸來衛千精震伏莫干我炁此自然之理使忽爾而然也鼻下山源是一身之武津真邪之通府不真者所以生邪氣為真者所以遏萬邪在我運攝之耳故吉凶兆焉明堂中亦一身之文池死生之形宅存其神可以眇乎內觀廢其道所以致乎朽爛故由我御順其術而死生悔焉右一條出大洞真經高上首章此一條不審誰受有長史寫此經亦未出世也夜行常當琢齒亦無正限數也煞鬼邪鬼常畏琢齒聲是故不得犯人也若兼以漱液祝說益善世人有知酆都六天宮門名則百鬼不敢為害欲臥時常先向北祝之三過微其音也祝曰吾是太上弟子下統六天六天之宮是吾所部不但所部乃太上之所主吾知六天門名是故長生敢有犯者太上斬汝形第一宮名紂絕陰天宮以次東行第二宮名泰煞諒事宗天宮第三宮名明晨耐犯武城天宮第四宮名恬照罪炁天宮第五宮名宗靈七非天宮第六宮名敢司連宛屢天宮止乃琢齒六下乃臥辟諸鬼邪之氣如此凡三過也此二法出酆都記今鈔相隨北帝煞鬼之法先叩齒三十六下乃祝曰天蓬天蓬九元煞童五丁都司高刁北公七政八靈太上浩凶長顱巨獸手把帝鍾素梟三晨嚴駕夔龍威劍神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼橫身飲風蒼舌綠齒四目老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衛我九重辟尸千里去卻不祥敢有小鬼欲來見狀攫天大斧斬鬼五形炎帝裂血北斗燃骨四明破骸天猷滅類神刀一下萬鬼自潰畢四言輒一琢齒以為節也若冥夜白日得祝為恆祝也鬼有三被此祝者眼精目爛而身即死矣此上神祝皆斬鬼之司名北帝秘其道若世人得此法恆能行之便不死之道也男女大小皆可行之此所謂北帝之神祝煞鬼之良法鬼三被此法皆自死矣常亦畏聞此言矣因病行此立愈叩齒當臨目存見五藏厶此中一字楊本穿壞不可識掾亦仍闕無具五神自然存也酆都中秘此祝法今密及之耳不可泄非有道者共秘之乎右五條楊書又掾寫楊書北帝祝是口受時書極多饞黵改易風病之所生生於丘墳陰濕三泉壅滯是故地官以水氣相激多作風痺風痺之重者舉體不授輕者半身成失手足也若常夢在東北及西北經接故居或見靈床處所者正欲與塚相接耳墓之東北為征絕命西北為九戹此皆冢訟之凶地若見亡者於其間益其驗也若每遇此夢者臥覺當正向上三琢齒而祝之曰太元上玄九都紫天理魂護命高素真人我佩上法受教太玄長生久視神飛體仙塚墓永安鬼訟塞姦魂魄和悅惡氣不煙遊魅罔象敢干我神北帝呵制收氣入淵得籙上皇謹奏玉晨如此者再祝祝又三叩齒則不復夢冢墓及家死鬼也此北帝祕祝也有心好事者皆可行之若經常得惡夢不祥者皆可按此法于是鬼氣滅也邪鬼散形也此應令以受長史也但許姓羽音今云東北征絕命是為不同又九戹之名墓書無法手臂不授者沉風毒氣在脈中結附痺骨使之然耳宜針灸針灸則愈又宜按北帝曲折之祝若行之百過疾亦消除也先以一手徐徐按摩臂良久畢乃臨目內視咽液三過叩齒三通正心微祝曰太上四玄五華六庭三魂七魄天關地精神符榮衛天胎上明四肢百神九節萬靈受錄玉晨刊書玉城玉女侍身玉童護命永齊二景飛仙上清長與日月年俱後傾超騰昇仙得整太平流風結屙注鬼五飛魍魎冢氣陰氣相徊陵我四肢干我盛衰太上天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰收摧如有干試乾明上威畢此亦以告長史也長史極多惡夢恆有塚注又患飲癖及兩手不理故每授諸法並針灸在後若弟子有心者按摩疾處皆用此法但不復令臨目內視咽液啄齒耳昔唐覽者居林慮山中為鬼所擊舉身不授似如綿囊有道人教按摩此法皆即除也此北帝曲折之法諸疾有曲折者用此法皆佳不但風痺不授而已也唐覽無別所出不知何世人也酆都北帝有此數法亦參于高仙家用也又有曲折經藏著西明公處周文王為酆都西明公也鄭子真則康成之孫也今在陽濯山昔初學時正患兩腳不授積年其晚用針灸兼行曲折祝法百日都除鄭玄唯有一兒為賊所害有遺腹子名小同耳既不入山又複不病腳此子真又非穀口者進退乖異莫辯質據唐覽今在華山得虹丹法合服得不死前來至此並應是保命告十三過針三過灸無不愈左手勝右手也少陽左肘手脈內纏故宜十三過鍼乃得理內脈入少陽也灸氣得溫浮上臂血得風痺故宜三過灸乃得補定流津使筋屬不滯也灸手幽關及風弦并五津凡三處急要也當待佳日我自別相示也保不使爾失此手也右中候夫人言手幽關風絃五津凡三處偃側圖及諸灸經並無此穴名夫風考之行也皆因衰氣之間隙耳體有虧縮故病來侵之也若今差愈誠能省周旋之役者必風屙除也今當為攝制冢注之氣爾既小佳亦可上塚訟章我當為關奏之也於是注氣絕矣昔鄧雲山停當得道頓兩手不授吾使人語之令灸風徊曲津兩處耳六七日間便得作五禽按摩也若鍼力訖當語所灸處又心存行道亦與身行之無異也昔趙公成兩腳曳不能起旦夕常心存拜太上如此三十年太上真人賜公成流明檀桓散一劑即能起行後遂得道今在鵠鳴山下夫存拜及心行道之時皆燒香左右如欲行事狀也此謂內研太玄心行靈業棲息三宮偃逸神府者矣右保命言風徊曲津兩處灸經亦無此穴塚訟章不見有異本鄧雲山趙公成並無別顯出也夜臥覺存日象在疾手中握之使日光赤芒從臂中逆至肘腋間良久日芒忽變成火燒臂使臂內外通匝洞徹良久畢乃陰祝曰四明上元日月氣分流光煥曜灌液凝魂神光散景蕩穢煉煙洞徹風氣百邪燔然使得長生四肢完全注害考鬼收付北辰畢存思良久放身自忘右保命說此云案消魔上秘祝法此經未出世若猶是智慧七卷限者未審小君亦安得見之右八條並掾書寫昨具以墓事請問荀侯荀侯云極陰積冱久經墳塋遂使地官激注塚靈沉滯風邪之興恆繼此而作然衝氣欲散作考漸歇鎮塞之宜未為急也不如通婦墓之井以潤乎易遷之途救渴惠乎路人陰惠流于四衢植棠棣于龍川散松楊以固標此其所利耶荀侯即應是荀中侯也此即長史婦亡後所告范幼沖漢時尚書郎厶缺失一字解地理乃以冢宅為意魏末得來在此童初中其言云我今墓有青龍秉氣上玄辟非玄武延軀虎嘯八垂殆神仙之丘窟煉形之所歸乃上吉冢也其言如此此猶是前所服三氣之範監也四靈雖同墓法而形相莫辯又以朱鳥為上玄亦所未詳也積善憇德慈心在物兼修長存之方洞守形中之寶者雖有此墓為以示始終之觀耳至于神全得會熙鏡玄開亦何時永為朽物不復生出耶此墓之人斯可謂應運矣此並論長史婦所葬墓事辛玄子所言辛玄子事在第五卷中右三條楊書青龍秉氣上玄闢非玄武延軀虎嘯八垂夫欲建吉塚之法去塊後正取九步九尺名曰上玄辟非華蓋宮王氣神趙子都冢墓百忌害氣之神盡來屬之能制五土之精轉禍為福侯王之塚招搖欲隱起九尺以石方圓三尺題其文埋之土三尺也世間愚人徒復千條萬章誰能明吉凶四相哉辟非之下塚墓由此而成亦由此而敗非神非聖難可明也必能審此術子孫無復冢墓之患能知墳墓之法千禁萬忌一皆厭之必反凶為吉能得此法永為吉冢不足宣也此一紙異手書青紙依如此法亦為可解其九步九尺而不云十步三尺者是九尺入冢裏正取中心為數也但闢非應是朱鳥而云塚後若徵家甲向朱鳥在西南羽家庾向朱鳥在東北所不論耳員三天題其文曰天帝告土下塚中王氣五方諸神趙公明等某國公侯甲乙年如千歲生值清真之氣死歸神宮翳身冥鄉潛寧沖虛辟斥諸禁忌不得妄為害氣當令子孫昌熾文詠九功武備七德世世貴王與天地無窮一如土下九天律令員三天猶是方員方員之法六邊皆等如印形也趙公明今千二百官儀乃以為溫鬼之名九功十德事出左傳夫施用此法慎不可令人知若云冢墓王相刑害諸不足者一以填文厭之無不厭伏反凶為吉祇行下被割餘一字如此當是此字後行又被剪語則未盡也從員三天來別一紙復是異人跡不與前同而俱書青紙色理亦小殊疑此並寫非真前范監既有此言恐後人因以造法耳上清真人馮延壽口訣前云是楚市乞人西岳真人馮延壽西嶽之號自不妨上清之目也此後凡十四事雖未見真書類其事旨不乖真法故別撰錄附於卷末夫學生之道當先治病不使體有虛邪及血少腦減津液穢滯也不先治病雖服食行炁無益于身昔有道士王仲甫者少乃有意好事神仙恆吸引二景鳷霞之法四十餘年都不覺益其子亦服之足一十八年白日升天後南嶽真人忽降仲甫而教之云子所以不得升度者以子身有大病腦宮虧減筋液不注靈津未溢雖復接景鳷霞故未為身益仲甫遂因服藥治病兼修其事又一十八年亦白日升天今在玄州受書為中嶽真人領九玄之司于今在也此說殊切事要仲甫父子無餘別顯也夫學生之夫必夷心養神服食治病使腦宮填滿玄精不傾然後可以存神服霞呼吸二景耳若數行交接漏泄施寫者則氣穢神亡精靈枯竭雖復玄挺玉籙金書太極者將亦不可解于非生乎在昔先師常誡於斯事云學生之人一接則傾一年之藥勢二接則傾二年之藥勢過三以往則所傾之藥都亡于身矣是以真仙之士常慎於此以為生生之大忌此事彌會眾經之旨夫學道唯欲默然養神閉氣使極吐氣使微又不得言語大呼喚令人神氣勞損如此以學皆非養生也凡存神光行真仙之事者又不得以衣服借人亦不服非己之物諸是巾褐履屐之具皆使鮮盛三魂七魄或棲其中亦為五神之炁忌污沾故也又八節之日皆當齋盛謀諸善事以營于道之方也慎不可以其日忿爭喜怒及行威刑皆天人大忌為重罪也右三條亦與經事相符凡研味至道及讀誦神經者十言二十言中輒當一二過舐唇咽液百言五十言中輒兩三過叩齒以會神靈充和血氣使靈液凝滿帝一欣宅所謂沖氣不勞啟血不泄也此別一法經中未見其事也學生之法不可泣淚及多唾泄此皆為損液漏津使喉腦大竭是以真人道士常吐納咽味以和六液凡甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席及言語面會當清齋不寢警備其日遣諸可欲凡五卯之日常當齋入室東向心拜存神念炁期感神明亦適意所陳恆如此者玉女降侍此三條與經語亦互相同者也常以本命之日向其方面叩齒三通心存再拜而微咒曰太一鎮生三炁合真室胎上景母玄父元生我五藏攝我精神下灌玉液上朝泥丸夕煉七魄朝和三魂右命玉華左嘯金晨命我神仙役靈使神常保利津飛行十天祝畢又心拜四方叩齒三通咽液三過此名為太上祝生隱朝胎元之道常能行之令魂魄保守長生神仙未見此經法凡入室燒香皆當對席心拜叩齒陰祝隨意所陳唯使精專必獲靈感此亦朝靜之例也凡人常存思識己之形極使仿佛對在我前使面上恆有日月之光洞照一形使日在左月在右去面前令九寸存畢乃琢齒三通微祝曰元胎上真雙景二玄右抱七魄左拘三魂令我神明與形常存祝畢又叩齒三七過咽液七過此名為帝君煉形拘魂制魄之道使人精明神仙長生不死若不得祝者亦可單存之耳道授乃有識形而未見此祝法又學道之士當先檢制魂魄消滅尸鬼常以月晦朔之日庚申甲寅之日當清齋入室沐浴塵埃正席而坐得不眠者益善以真朱筆點左目眥下以雄黃筆點右鼻下令小半入谷裏也點畢先叩齒三通微祝曰上景飛纏朱黃散煙炁攝虛邪尸穢沉泯和魂煉魄合體大神令我不死萬壽永全聰明徹視長享利津祝畢又琢齒三通咽液三過並右手第二指躡右鼻孔下左手第二指躡左目下各七過當盡陰案之勿舉手也於是都畢按此二處是七魄游尸之門戶鉞精賊邪之津梁矣故受朱黃之精塞尸鬼之路引二景之薰遏淫亂之炁也此太極上法常能行之則魂魄和柔尸穢散絕長生神仙通炁徹視行之三年色念都泯矣此頗似太靈真人法可兼修用之凡上清叩齒咽液法皆各有方先後有次不得亂雜使真靈混錯也夫叩齒以命神咽炁以和真納和因六液以運入制神須鳴鼓而行列矣凡存修上法禮祝之時皆先叩齒上下相叩勿左右也一呼一吸令得三叩為善須禮祝畢更又叩齒乃得咽諸炁液耳此名為呼神和真以求升仙者也吾屢見偽俗之人或誤定經文先後雜亂無有次緒用以為益良可悲也此亦同五神經中意旨右本卷訖此養性禁忌口訣復有此諸條亦未見真書而似是二許抄事皆仙人條用小訣有助于施行故並撰錄黃仙君口訣服食藥物不欲食蒜及石榴子豬肝犬頭肉至忌都絕為上道士自不可食豬犬肉而交房中令藥力不行又計食一斤損笄百日子其慎之此彭祖弟子撰傳者青牛道士口訣暮臥存日在額上月在臍上辟千鬼萬邪致玉女來降萬禍伏走秘驗即封君達也出神仙傳五岳序沈羲口訣服神藥勿向北方大忌亥子日不可唾亡精失氣減損年命藥勢如土沈出神仙傳呂恭口訣入山之日未至山百步先卻行百步反足乃登山山精不犯人眾邪伏走百毒藏匿呂出神仙傳欒巴口訣行經山及諸靈廟祠間存口中有真人字赤靈丈人侍以玉女二人一女名華正一女名攝精丈人著赤羅袍玉女二人上下黃衣所存畢乃叱吒曰廟中鬼神速來使百邪詣赤靈丈人受斬死眾精卻千里此是三天前軀使者捕鬼之法即欒豫章也出劍經神仙傳虎豹符及後漢書東海小童口訣道士求仙勿與女子交一交而傾一年之藥力若無所服而行房內減笄三十年此上相青童君之別號也東陵聖母口訣學道慎勿言有多為山神百精所試夜臥閉目存眼童子在泥丸中令內視身神長生升天劉京亦用此術出神仙傳今為海神之宗劉京渝漢末人出飛步經後女仙程偉妻口訣服食勿食血物食血物使不得去三尸乾肉可耳程偉為漢期門郎其婦知房事見葛洪內篇也鳳綱口訣道士有疾閉目內視心使生火以燒身身盡存之使精如仿佛疾病即愈是痛處存其火祕驗出神仙傳能釀百草花以起死者陳安世口訣道士結頭理髮及飲食施履屐枕褥勿令非道士者見其理髮干其飲食動其履屐用其枕褥彼俗尸魄形中之鬼來侵我神也所以道士棲山林而幽身者皆欲遠茲囂穢絕放人間之業是恐外物凡百犯其性命也祕之陳出神仙傳李少君口訣道士求仙不欲見死人尸損神壞氣之極人君師父親愛不得已而臨之耳所以道士去世不事王侯是無君也塊然獨存是無友也唯父母師主不得不臨喪致感極之哀不吝性命之傷耳苟以此故而傷是以無傷之也吾其秘之故口傳焉漢武臣出神仙傳女仙人劉綱妻口訣求仙者勿與女子三月九日六月二日九月六日十二月三日是其日當入室不可見女子六尸亂則藏血擾潰飛越三魂失守神彫氣逝積以致死所以忌此日者非但塞遏淫泆而已將以安女宮女宮在申男宮在寅寅申相刑刑殺相加是日男女三尸出于目珠瞳之中女尸招男男尸招女禍害往來喪神虧正雖人不自覺而形露已損由三尸戰於眼中流血於泥丸也子至其日雖至寵之女子親愛之令婦固不可相對我先師但修此道而仙矣複不及至親無心者矣子其慎之矣綱妻出神仙傳又虎豹符中凡此雜事皆與真經相符並可按而施用也
