body:
  text: 卷十四稽神樞第四大茅山之西南有四平山俗中所謂方山者也其下有洞室名曰方臺洞有兩口見於山外也與華陽通號為別宇幽館矣得道者處焉此山去大茅山可二十許里西南六七里有一洞口見外近時有人入見一青蛇在洞中因與呼為青龍洞山近上及北面西面亦並有洞穴同不知何者是此兩口耳山上又有泉水冬夏不竭山平所以號為四平及方山也甚多南燭今積金山東此樹皆能高大館中諸道士所資為藥也其中先止者有張祖常劉平阿呂子華蔡天生龍伯高並處于方臺矣張祖常者彭城人也吳時從北來得入此室祖常託形墮車而死故隱身幽館而修守一之業師事上黨鮑察者漢司徒鮑宣五世孫也察受道於王君鮑宣漢司隸校尉為王莽所害宣子永永子昱昱子某劉平阿者無名姓名姓不示人也漢末為九江平阿長故以為號行醫術有功德救人疾病如己之病行遇仙人周正時授以隱存之道託形履帽而來居此室常服日月晨炁顏色如玉似年三十許人二君何容不知其本名既示不欲復說之耳戴孟之本族乃亦已陳之在後矣呂子華者山陽人也陰君弟子已服虹丹之液而未讀內經來從東卿受太霄隱書而誦之常以幽隱方臺為樂不願造于仙位也蔡天生者上谷人也小為嘯父賣雜香於野外以自業贍情性仁篤口不言惡道逢河伯少女從天生市香天生知是異人再拜上一簷香少女感之乃教其朝天帝玉皇之法遂以獲仙託形舄杖隱存方臺少女今猶往來之也天生師之龍伯高者後漢時人漢伏波將軍馬援戒其兄子稱此人之佳可法即其人也伯高後從仙人刁道林受服胎炁之法又常服青飢方託形醉亡隱處方臺師定錄君也伯高名述京兆人漢建武中為山都長擢至零陵太守馬援征南日遺兄子嚴書曰龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之效伯高不得猶為謹沄之士謂刻鵠不成尚類鶩者也雷平山之東北良常山之東南其間有燕口山三小山相隅故也一名曰方偶山下古人曾合九鼎丹於此問也幽人在此時心樂居焉今常遊此方隅山下亦有洞室名曰方源館亦有二口常見外也常有此五人為旅其山即是大橫西南別有二墩壟相聚今人不複有乎其名者前云李明合丹即是此矣幽人者掾去世後不欲顯名故號為幽人此是未受事且停洞館修業也山今亦有兩小口五人為旅即向之四平山者既去來相通故時共游處也所以楊君夢掾云向從四平山來也右六條是手新寫應是保命君所告也鹿迹山中有絕洞絕洞者纔有一二畝空地無所通達故為絕洞洞室四面皆有青白石亦以自然光明如泬舊作綍字如此張形下正平自有石床石塌曲夾長短障隔分別有如刻成亦整盛也東北有小口才劣容人入入二三百步乃得洞室初入口甚急愈入愈寬大也口外南面有三積石積石下有汧索即可得也亦或以一小石掩穴口穴口大小俱如華陽三便門便門亦用小石塞其口自非清齋久潔索不可得鹿跡洞子亦爾不受穢氣故也此山今屬南徐州界正對茅山北望見之亦有道士住鹿跡在石上故仍以為名洞口處乃可知而甚嚴潔亦無人敢觸冒者此云如華陽三便門則南洞北洞本大開餘東西及東南皆是塞矣鹿跡華山中及洞主有謝稚堅王伯遼繁陽子號名耳是漢越騎校尉何苗叔達也進之同母弟少好道曾居河東繁山之南服食故自號為繁陽子中君答長史問葛玄云在蓋竹山恆與謝稚堅相隨今稚堅乃在此不知為去來往還為當兩人同姓名也後漢書云何苗是何進異母弟為車騎將軍黨附閹勢進被害時苗於朱雀闕下與進將吳匡戰死被斬董卓又破棺出尸支解之既非故為兵解去不知那遂得來居此其母亦被刑苗既非進同生官位複異具苗而字達於義不類恐別是一弟不必是名苗戰死者耳又有馮良馮良南陽冠軍軍人少作縣吏年三十為尉從佐迎督郵自恥無志因毀車煞牛裂敗衣幘遂去從師受詩傳禮易復學道術占候家中謂已死十五年乃還整修志節抗操嚴恪州郡禮辟不就詔特徵賢良高第半道委之還家時三公爭讓位於良遂不降就年六十七乃棄世東渡入山今在鹿跡洞中後漢安帝時人也漢書所載事亦略同又有郎宗者字仲綏北海安丘人少仕宦為吳縣令學精道術占候風炁後一旦有暴風經窗間占知京師大火燒大夏門遣人往參果爾諸公聞之以博士徵宗宗恥以占事就夜解印綬負笈遁去居華山下服胡麻丸得道今在洞中後漢書載郎宗事云理京房易善星算風角六日七分能望氣占候吉凶常賣卜自奉安帝徵對策為諸儒表後拜吳令時卒有暴風宗占知京師當有大火記識日月遣人參候果如其言諸公聞而表上以博士徵之宗恥以占驗見知徵書到夜懸印綬於縣庭而遁去遂終身不仕子顗字稚元傳父業研精學徒常數百人順帝陽嘉二年徵詣闕上書十一事拜郎中還家後為同縣孫禮所害其餘其王叔明鮑元治尹蓋婦之徒復二十餘人並在北山不能復一二記之也此數人是絕洞諸山之主耳此絕洞仙人亦思得學道者欲與之共處於洞室困時無其人耳此洞既無所通達正是地仙棲處必非三十六天之限也道喪由簪良可哀矣寓家辱人哉簪者謂人貪仕宦衣冠坐此不得務道家室本寄寓耳此洞中乃是永宅為戀戀不去實足辱敗人矣此亦諷誘於長史耳右保命君告右三條楊書范帥云三官有獄官不名廷尉名大理李豐今為大理都餘一守缺以擬王附子不以與許虎也守職如今獄之三官也李豐字安國改字宣國馮翊人李義子本寒微有才志遂事魏為尚書僕射尉與夏侯玄謀廢晉景王事泄召來令人以刀環撞腰煞之大理當為大理即古之獄官前漢洎魏時廷尉亦名大理此職是仙官也王附子是王厶之小名許虎即虎牙也鮑靚因吾屬長史鼠子輩既爾可語郡守令得反映亦屬吾其家比衰欲非可奈何可寫存之耶鼠子恐是鮑靚小名鮑為南海郡仍解化兒輩未得歸都所以屬之鮑即許先生之師也右二條有楊書武當山道士戴孟者乃姓燕名濟字仲微漢明帝末時人也夫為養生者皆隱其名字藏其所生之時故易姓為戴託官於武帝耳而此人少好道德不仕於世矣少孤養母母喪行服葬服闋遂入華陽山服術食大黃及黃精種雲母雄黃丹砂芝草受法于清靈真人即裴冀州之弟子也得不死之道裴真人授其玉佩金鐺經並石精金光符遂能輕身健行周旋名山日行七百里多所經涉猶未得成仙人也戴乃授行玉佩金鐺而止不死而已未得神仙於理為小難詳後又云玄真亦其鈔要行之者神仙不死又與本經不同及石精金光符既不為劍用則止是解化一符單服者此符主隱遁不云健行也種五品芝世亦有法仙人郭子華張季連趙叔達晚又有山世遠者此諸人往來與之遊焉昔居武當今來大霍欲從司命君受書故未許焉山已得為太和真人則應居在南陽太和山矣餘三人不見別顯出也戴公拍腹有十數卷書是太微黃書耳此人即謝允之師也按金相傳太微黃書第八篇有目錄云凡有八卷唯此一卷出世今戴公乃有十許篇亦為不同拍腹之義謂恆以系腰也其外傳事亦同此謝允字道通歷陽人小時為人所略賣往東陽後告官被誣在烏傷獄事將欲入死夜有老公授其符又有黃衣童子去來於是得免咸康中至襄陽入武當山見戴孟孟即先來獄中者因是受道又出仕作歷陽新豐西道三縣所在多神驗年七十餘猶不老後乃告終也黃衣童子者即玉佩金鐺之官耳云坐上常有一人共坐者應是胇胇不明狀也即太極真人時往來也按說如此似答問黃衣童意亦可是午時既及謝因此面訪其事受行玉佩金鐺經自然致太極真人諺云服九靈日月華得降我太極之家此之謂也玄真之法亦其鈔要也行之者神仙不死裴真人有弟子三十四人其十八人學佛道餘者學仙道應作牖字弟子劉顯林辛仲甫趙子常周真人有十五人弟子四人解佛法入室弟子王瑋達李建道泉法堅桐柏有二十五人弟子八人學佛入室弟子于弘智竺法靈鄭文成陳元子此當略舉標勝者耳辛泉子竺皆似胡姓也當是學佛弟子也右八條有掾寫共一篇相連霍山中有學道者鄧伯元王玄甫受服青精石飯吞日丹景之法用思洞房已來積三十四年乃內見五藏冥中夜書以今年正月五日太帝遣羽車見迎伯元玄甫以其日遂乘雲駕龍白日登天今在北玄圃臺受書位為中嶽真人伯元吳人玄甫沛人華陰山中有學道者尹處子張石生李方回並晉武帝時人授仙人管成子蒸丹餌術法俱服得延年健行又受蘇門周壽陵服丹霞之道行已五十年精心內視不復飲食體骨輕健色如童子以今年二月十二日太一遣迎以其日乘雲升天今在玄州受書為高仙真人張石生為東源伯衡山中有學道者張禮正冶明期二人禮正以漢末在山中服黃精顏色丁壯常如年四十時明期以魏末入山服澤瀉柏實丸乃共同止巖中後俱授西城王君虹景丹方從來服此丹已四十三年中患丹砂之難得俱出廣州為沙門是縢含為刺史時也遂得內外洞徹眼明身輕一日行五百里又兼守一守一亦已三十年以三月一日東華遣迎以其日乘雲升天今在方諸飆室俱為上仙絪含以永和十年甲寅年為廣州刺史此得仙乙醜歲十二年是為前服丹已三十二年猶更出查也廬江潛山中有學道者鄭景世張重華並以晉初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹久久不復飲食而身體輕強反易故形以今年四月十九日北玄老太一迎以雲軿白日升天今在玄州括蒼山有學道者平仲節河中人以大胡亂中國時來渡江入括蒼山受師宋君存心鏡之道具百神行洞房事如此積四十五年中精思身形更少體有真炁今年五月一日中央黃老遣迎即日乘雲駕龍白日升天今在滄浪雲台大胡亂者是劉淵劉聰時也石勒為小胡剡小白山中有學道者趙廣信陽城人魏末來度江入此山受李法成服炁法又受師左君守玄中之道內見五藏徹視法如此七八十年周旋郡國或賣藥出入人間人莫知也多來都下市丹砂作九華丹丹成一服太一道君以今年六月十七日遣迎停三日與山中同志別去遂乘雲駕龍白日登天今在東華海中有狼五山中有學道者虞翁生會稽人也昔受仙人介君食日精法以吳時來隱此山兼行雲炁迴形之道精思積久形體更少如童子今年七月二十三日東太帝遣迎即日乘雲升天今在陽谷山中狼五山在海中對白章岸今直呼為狼山赤水山中學道者朱孺子吳末入山服菊花及術餌後遇西歸子從乞度世西歸子授以要言入室存泥丸法三十年遂能致雲雨於洞房中今年八月五日西王母遣迎即日乘五色雲車登天今在積石臺赤水山雲在鄞縣南十里從楠縭口入三百里山正赤周回五十里高千餘丈如此則應是臨海永嘉東北名赤岩者也許先生所住赤山一名燒山即此名山五嶽中學道者數百萬人今年有得道而升天者人名如別年年月月皆有去者如此不可悉紀今為疏一年之得道人耳有不樂上升仙而長在五嶽名山者乃亦不可稱數或為仙官使掌名山者亦復有數千九月二十日夜清靈疏出右八條有掾寫其一卷相隨清靈猶是裴清靈也此九月即應是乙丑歲即疏其年中得道者吳睦者長安人也少為縣吏掌局枉剋民人民人訟之法應入死睦登委叛遠遁山林餓經日行至石室遇見孫先生在室中隱學左右種黍及胡麻室中恆盈食睦至乞食經月不去孫先生知是叛人初不問之與食料理及誦經講道說及禍福睦聞之於是心開意悟因叩頭自搏列其事源立身所行自首事實求得改往遂留石室為先生掃除驅使經四十年後先生受其道俱採藥服食胡麻精修經教得三百二十年服丹白日升天朱犬乇者陳留人也為人無道專作劫盜後人發覺收掩犬乇得逸出遠他境至汝南少室山中見馮先生隱學云後三年乃受其真仙留山服食修道三十八年後入東坑山中壽百四十七歲仙人降將入大有山洞中成真人郭靜者潁川人也少孤無父母兄弟窮苦依棲無所年十六縣召為吏後得罪仍逃伏經二月日不出遇見鄭先生救度一切以法勸化之靜遂隨鄭負簷驅使經七年不敢懈怠遂受其導引之要餌服山術茯苓得壽三百歲復于天維山赤松子降受其二人真道今在大有洞中為真人范伯慈者桂陽人也家本事俗而忽得狂邪因成邪勞病頓臥床席經年迎師解事費用家資漸盡病故不愈聞大道清約無所用於是意變聞沈敬作道士精進理病多驗乃棄俗事之得五十日病疾都愈云云後詣陸玩之受真內道玩之不能入山伯慈不樂於世遂辭去入天目山服食胡麻精思十七年大洞真仙司命君下降受三十六篇經後服還丹白日升天今為玄一真人所注云云云處是抄事人不能並取非本闕也有四條有人於東間鈔得云是真書而不知誰跡亦無所受者而辭旨有用故紀續之又此四人各有所明一則酷吏二則凶劫三則孤煢四是事俗並世間薄運遂能得道足知心之所造非關善惡者也司馬季主後入委羽山石室大有宮中受石精金光藏景化形法於西靈子都西靈子都者太玄仙女也其同時今在大有室中者廣寧鮑叔陽太原王養伯潁川劉瑋惠岱郡段季正俱受師西靈子都之道也季主臨去之際託形枕席為代己之像墓在蜀郡成都升盤山之南諸葛武侯昔建碑銘德於季主墓前碑贊末曰玄漠太寂混合陰陽天地交泮萬品滋彰先生理著分別柔剛鬼神以觀六度顯明真誥云季主咽虹液而頭足異處劍經注云吞刀圭而蟲流今東卿說云托形枕席為代己之像似當是作錄形靈丸兵解去也漢史既不顯其終無以別測其事也廣寧鮑叔陽者漢高帝時趙王張耳張敖之大夫也少好養生服桂屑而卒死於廁溷間今墓在遼東薊城之北山漢高置燕郡以薊屬燕當是未分時也太原王養伯者漢高呂后攝政時中常侍中瑯琊王探也少服澤瀉與留侯張良俱採藥於終南山而養伯不及遂師事季主前漢中常侍不用閹人中郎非侍郎之官或是後別為此位耳潁川劉瑋惠漢景帝時公車司馬劉諷也後事季主晚服日月炁為入室弟子道成晚歸鄉里託形杖履身死桑樹之下今墓在汝南安城縣西山岱郡段季正本隱士也不聞有所服御晚乃從季主學道行度秦州溺水拘得尸而葬川邊今南鄭秦川是也此人亦季主入室弟子尋此四人並是用靈丸雜解之道季主一男一女俱得道男名法育也女名濟華今皆在委羽山中濟華今日正讀三十九章猶未過竟此理亦欲難詳季主讀玉經服明丹之華挹扶晨之暉今顏色如二十女子鬚長三尺黑如墨也昨日東卿君道此如所疏真奇事也不知果云何耳此一行楊君自記與長史不知之辭或云別有以季主託形隱景潛跡委羽紫陽傳具載其事也昨夜東卿至聊試請問季主本末東卿見答令疏如別為以上呈願不怪之省訖付火此楊君與長史書今有華撰周君傳記季主事殊略未見別真手書傳依此語則為非也此前似有按語今闕失一行是後聖李君紀也大都與前者略同然東卿復兼有注解注解近萬餘言大奇作也昨來多論神化之事聊及季主耳去月又見授神虎經注解注解非世間所聞亦自不掌其旨也若更聞如季主比者自當密白此亦楊君與長史書也既是論季主事故仍以相次不複出置下卷長史撰真仙傳欲以季主宗在前所以楊君為請問本末也司命所注二經並未出世也右十條有楊書范安遠適云湛子不事齊齊師伐之春秋傳曰湛無禮也此則左傳上事諶字作譚字音譚國名也莊王十三年為齊桓所滅不知何故述此似有所指也莊子師長桑公子授其微言謂之莊子也隱於抱犢山服北育火丹白日升天上補太極闈編郎長桑即是扁鵲師事見魏傳及史記世人苟知莊生如此者其書彌足可重矣施存者齊人也自號婉盆子得遁變化景之道今在中岳或少室往有壺公正此人也然未受太上書猶未成真焉其行玉斧軍火符是其所受之枝條也施存是孔子弟子三千之數三千之限有此人而不預七十二者明夫子不以仙為教矣壺公即費長房之師軍火符世猶有文存右三條有楊書九疑真人韓偉遠昔受於中嶽宋德玄德玄者周宣時人服此靈飛六甲得道能一日行三千里數變形為鳥獸得玄靈之道今在嵩高偉遠久隨之乃得受法行之道成今處九疑山其女子有郭芍藥趙愛兒王魯連等並受此方法而得道者複數十人或游玄州或處東華方諸台今見居也南嶽夫人言此云郭芍藥漢度遼將軍東平郭蹇女也少好道篤誠真人因授其六甲趙愛兒者幽州刺史劉虞別駕漁陽趙該姊也好道得尸解後又受此符王魯連者魏明帝城門校尉範陽王伯綱女也亦學道一旦忽委婿李子期入陸渾山中真人授此法子期者司州魏人清河王傅也其常言此婦狂走云一旦失所在此事乃出靈飛六甲經中長史抄出之漢大將軍霍光有典衣奴子名還車伺見二星得年六百歲今猶在焉此事出方諸洞房經後長史抄出按魏書云青龍元年並州刺史畢軌送漢度遼將軍範明友解婢奴年三百五十歲言語飲食如常人奴云霍顯者光祿小妻胡友妻是光祿前妻如依此妻便非虛矣吞琅玕之華而方營丘墓者衍門子高丘子洪涯先生是也衍門子墓在漁陽潞縣幽州漁陽有潞縣今上黨亦有潞縣衍門即羨門也高丘子墓在中山聞喜縣中山有安喜縣聞喜乃屬河東洪涯先生墓在武威姑臧縣涼州記作姑臧縣此三郡縣人並云上古死人之空塚矣而不知高丘子時以尸解入六景山後服金液之末又受服琅玕華於中山方複托死乃入玄州受書為中嶽真人於今在也衍門子今在蒙山大洞黃金之庭受書為中元仙卿洪涯先生今為青城真人漱龍胎而死訣飲瓊精而叩棺者先師王西城及趙伯玄劉子先是也王君昔用劍解非龍胎諸丹恐瓊精即是曲晨耳服金丹而告終者臧延甫張子房墨狄子是也挹九轉而尸臭吞刀圭而蟲流司馬季主寧仲君燕昭王王子晉是也桐柏亦用劍解當是此吞刀圭者非九轉也司馬季主亦以靈丸作兵解故右英云頭足異處燕昭學仙而不見別跡景純云無靈績則為先究其事矣周穆王北造昆崙之阿親飲絳山石髓食玉樹之實而方墓乎汲郡此則穆天子傳所載見西王母時也夏禹詣鍾山啖紫柰醉金酒服靈寶行九真而猶葬於會稽此事亦出五符中茅傳又云受行玄真之法北戎長胡大王獻帝舜以白琅之霜十轉紫華服之使人長生飛仙與天地相傾舜即服之而方死葬蒼梧之野此諸君並已龍奏靈阿鳳鼓雲池矣而猶尸解托死者欲斷以生死之情示民有終始之限耳豈同腐骸太陰以肉餉螻蟻者哉直欲遏違世之夫塞俗人之願望也古來英聖之王唯未見顯堯及湯得道及鬼官之跡耳至於青精先生彭鏗鳳綱南山四皓淮南八公並以服上藥不至一劑自欲出處嘿語肥遁山林以遊仙為樂以升虛為戚非不能登天也弗為之耳此諸君自展轉五岳改名易貌不複作尸解之絕也鏗則彭祖名也青精亦出彭傳及王君傳飯方中鳳綱並諸仙人各有別顯軒轅自採首山之銅以鑄鼎虎豹百禽為之視火參爐鼎成而軒轅疾崩葬喬山五百年後山崩空室無尸唯寶劍赤舄在耳一旦又失所在也列仙傳云御龍攀髯及子晉馭鵠並為不同亦可是化後更出而為之也玉子者帝俈也曾詣鍾山獲九化十變經以隱遁日月游行星辰後一旦疾崩營冢在渤海山夏中衰時有發王子墓者室中無所有唯見一劍在北寢上自作龍鳴虎嗥之聲人遂無敢近者後亦失所在也帝俈則堯父外書作嚳字王子喬墓在京陵戰國時複有發其墓者唯見一劍在室人適欲取視忽飛入天中也欒巴昔作兵解去入林慮山中積十三年而後還家今在鵠鳴赤石山中漢書云巴為桂陽豫章太守後下獄死當仍是用靈丸解云也亦出仙傳中右此三條皆出掾寫劍經中經非可輕見既是說諸仙人事跡隱居謹抄出以相輔類耳至人焉在朖曜南辰含靈萬世乘景上旋化成三道日月為鄰實玄實師號曰元人變成三老友帝之先安知至人不有來游觀化兆間混俗為儔釋羽沉鈴安此南釭豈將好兆染俗久留七聖玄紀中云赤君下教變跡作沙門與六弟子俱皆顯姓名也為世染俗不適生期赤怪潛駭三柱為災賢者南遊三嶽是之玄君來行人其誰知赤怪則熒惑星也三柱者五車星中三柱也步屢反在元炁為元君在玄宮為玄師在南辰為南極老人在太虛為太虛真人在南嶽為赤松子此乃天帝四真人之師太一之友此四條是長史抄出不審本是何經書中事並是說南嶽赤君下教之旨師友之目小異諸經桐柏山高萬八千丈其山八重周回八百餘里四面視之如一在會稽東海際一頭亞在海中金庭有不死之鄉在桐柏之中方圓四十里上有黃雲覆之樹則蘇牙琳碧泉則石髓金精其山盡五色金也經丹水而南行有洞交會從中過行三十餘里則得此山今在剡及臨海數縣之境亞海中者今呼括蒼在寧海北鄞縣南金庭則前右弼所稱者此地在山外猶如金靈而靈奇過之今人無正知此處聞採藤人時有遇入之者塢渼甚多自可尋求然既得已居吳安能復覓越所以息心桐柏真人之官自是洞天內耳紫微夫人言右一條某書八渟山高五千里周匝七千里與滄浪方山相連比其下有碧水之海山上有乘林真人鬱池玄宮東王公所鎮處也此山是琳瑯眾玉青華絳實飛間之金所生出矣在滄浪山之東北蓬萊山之東南此即扶桑太帝所居也方山即方丈山也海中山名多載在五嶽序中耳方丈之西北有陰成大山滄浪西南有陽長大山山周回各一千四百里高七百里其山多真仙之人所居處焉此二山是陽九百六歷數之摽揭也百六之運將至則陽長水竭陰成水架矣陽九之運將至則陰成水竭陽長水架矣頃者是陰成山水際已高九千丈矣百六之來無復久時陰成水際出山高則是高乃應雲陽九而言百六似是誤言亦可是水起際如此高非先水退際爾但水性平又非湍瀨二山相去不遠未解那得頓孤懸如此右二條有長史寫未至廟第一高山西頭龍尾北汧洪水一所發地長六丈餘廣五丈入土六尺水流勢撻地二百餘步去路三里對廟後第二高山西頭汧洪水一所發地長四丈餘廣三尺餘入土四尺水勢撻地三百餘步去路二里近廟後汧脅一所洪水發地長五丈餘廣四丈餘入地二尺餘水勢流入汧中去廟一百五十步右蔣山北凡三處發洪水流勢西北行此三條是異跡既不見真手未審是非又不知此發洪當是何時事山南乃經有發處以積石塞之世呼為蔣侯飲馬汧而山後不見有此或當是將來期運之時乎
