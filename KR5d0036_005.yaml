body:
  text: 卷四運題象第四仙道寂寂尋之亦使人不勸也況復求之於無涯耶假令東山忽有石髓磐結紫芝映林夜光煥燭燕胎曜峰靈津肆顯衆真羅吟人人往者皆得掇玄華而揖玉腴對天仙以散想也將必相與把臂太虛駕絡慶雲矣未審子當力赴此二日暫遊山澤不將故以官私自切不獲一果耶今之所以為懈難者蓋暗推於有無之間耳以無期我我亦無也空中有真子不睹之不可謂罕仿佛矣所望在於不褰裳耳二日可不果何時能屈駕看金陵乎十一月二十九日夜定録君告許侯豈能割目前之近滯慕難成之遠功耶若故棲情丘林憑託京畿者觀金陵以偶想將任意于吾子勿謂我無方從無以鑒矣心單則試不眄神苦則教不生賢者之舉可不察耶保命君告右二條楊書斯告實至言矣奉十一月二十九日告得道者以其能排卻衆纍直面而進於是百度自淨衆務雲散該其優者不足為勞披于艱者可以表心正月中必有龜山客來東山至時渠此應作詎字可不一力乎奉覽高命欣然無量始入此月公私艱掇未獲從心命使此本是今字後人改作命使到京往反計日還便沐浴躬詣朝拜不失此月若吉日未過願垂告敕又告賢者之舉復宜詳之昔未受上道之前有欲索側人意有稱説堪陶獎者受隱書之後此計都冥也此下有兩字被枿又齊行剪去後似復更有語此論賢者之舉似仍是前書上紙而復酬十一月二十九日告此告今不存前十一月二十九日告語不同又云正月龜山客來事如此復酬後定録告亦可是右英書中兼有此語耳記不具存難用顯證右二篇長史自書本令勤者勤其事耽其玄微耳慎者亦觸類而作也學道之難不可書矣有恥鄙之心者於道亦遼乎灌秉然後可貴耳賢者之舉自更始爾今且當內忘右紫微夫人道此言此是紫微見長史答右英道賢者之舉事故復酬此語也長史婦亡後更欲納妾而修七元家事最是所禁故屢有及之手筆何其落落盧醫之喻復有韋弦之功解凍爐門其旨乃佳當實心在此濟矣定録告此是中君見長史答右英書復賞贊之也心已至也不復須詣山也每空懷以向真單誠以泛道者雖欲不教其可得乎瞻赴山澤乃更餘事耳要都無懷者實使人悒然今可停也十二月一日夜定録告許侯尋此語復似酬到京不得來事事相關涉不可領正月二十七日將不能暫詣欲營它處耶龜山真人似當其日來未真至齋者自可無仿佛且欲令彼見我乎正月十四日保命告案此告極似前所疑事所以翻覆難解也從此正月起至後並是入丙寅年中事右五條有楊書轡景登霄晨遊宴滄浪宮綵雲繞丹霞靈藹散八空上真吟瓊室高仙歌琳房九鳳唱朱籟虛節錯羽鍾交頸金庭內結我冥中朋俱挹玉醴津倏已嬰童云何當路蹲愆屙隨日崇二月九日夜雲林作晨遊太素宮控軿觀玉河夕宴鬱絶宇朝採圓景華彈敖北寒臺七靈暉紫霞濟濟高仙舉紛紛塵中羅盤桓囂藹內愆纍不當多二月十六日右英作玄清眇眇觀落景出東渟願得絶塵友蕭蕭罕世營吟此再三右三篇有楊書靈人隱玄峰真神韜雲采玄唱非無期妙應自有待豈謂虛空寂至韻故常在攜襟登羽宮同宴廣寒裏借問朋人誰所存唯玉子卓雲虛之駿抗翮于空同之上斯人矣豈不長揖南面永謝千乘乎紫微詩及詠此駕風騁雲軿晨登太渟丘絳津連岑振清波鼓浚流步空觀九緯八剛皆已遊暫宴三金秀來觀建志儔勤懈不相淹是以積百憂二月三十日夜右英作褰裳濟緑河遂見扶桑公高會太林墟寢宴玄華宮信道苟淳篤何不棲東峰紫微夫人歌此陵波越滄浪忽然造金山四顧終日遊罕我雲中人右英吟此控景始暉津飛飆登上清雲臺鬱峨峨閶闔秀玉城晨風鼓丹霞朱煙灑金庭緑蕊粲玄峰紫華巖下生慶雲纏丹爐練玉飛八瓊晏眄廣寒宮萬椿愈童嬰龍旗啓靈電虎旗征朱兵高真回九曜洞觀均潛明誰能步幽道尋我無窮齡紫微夫人作紫闕構虛上玄館衝絶飆琳琅敷靈囿華生結瓊瑤騁軿滄浪津八風激雲韶披羽扇北翳握節鳴金簫鳳籟和千鍾西童歌晨朝心豁虛無外神襟何朗寥回舞太空嶺六氣運重幽我途豈能尋使爾不終雕右英夫人作翳藹紫微館鬱臺散景飆鸞唱華蓋間鳳鈞導龍軺八狼攜絳旌素虎吹角簫雲勃寫靈宮來適塵中囂解轡佳人寢同氣自相招尋宗須臾頃萬齡乃一朝椿期會足衰劫往豈足遼真真乃相目莫令心徂疒抄側交反虛刀揮至空鄙滯五神愁右紫微作朝啓東晨暉飛軿越滄淵山波振青涯八風扇玄煙回眄易遷房有懷真感人三金可遊盤東岑宜永甄紛紛當途中孰能步生津飄颻八霞嶺徘徊飛晨蓋紫軿騰太空麗眄九虛外玉簫激景雲靈煙絶幽藹高仙宴太真清唱無涯際去來山嶽庭何事有待邁四月十四日紫微夫人作玄波振滄濤洪津鼓萬流駕景眄六虛思與佳人遊妙唱不我對清音與誰投雲中騁瓊輪何為塵中趨右同夕右英夫人吟歌此曲松柏生玄嶺鬱為寒林桀蘩葩盛嚴冰未肯懼白雪亂世幽重岫巡生道常潔飛此逸轡輪投彼遐人轍公侯可去來何為不能絶右右英作神玉曜靈津七元煥神扉靈遷方寸裏一躍登太微妙音乘和唱高會亦有機齊此天人眄協彼晨景飛總轡六合外寧有傾與危四月二十三日夜紫微夫人作玄感妙象外和聲自相招靈雲鬱紫晨蘭風扇緑軺上真宴瓊臺邈為地仙摽所期貴遠邁故能秀穎翹玩彼八素翰道成初不遼人事胡可豫使爾形氣銷四月二十七日夜南嶽夫人作右十二篇有楊書又雜掾寫清淨願東山蔭景棲靈穴愔愔間庭虛翳薈青林密圓曜映南軒朱鳳扇幽室拱袂間房內相期啓妙術寥朗遠想玄蕭條神心逸閏月三日夜右英作示許長史案晉歷丙寅年閏四月也右有楊書又掾寫縱心空同津總轡策朱軿佳人來何遲道德何時成吟此道有心許斧子言當採五芝芝草不必得汝亦不能來汝來當可得芝草與汝食此兩得及來並戲作吳音右英吟此右二篇有楊書八途會無宗乘運觀囂羅化浮塵中際解襟有道家聘煙忽未傾攜真造靈阿虛景盤瓊軒玄鈞作鳳歌適路無軌滯神音舞雲波齊德秀玉京何用世間多授書畢又吟良久而復授令書此詩似不與書上相連也坦夷觀天真去纍縱衆情體寂廢機駟崇有則攝生焉得齋物子委運任所經右中候夫人作薄宴塵飆領代謝緣還歸奚識靈劫期顧眄令人悲紫微夫人作右三篇有掾書林振須類感雲蔚待龍吟玄數自相求觸節皆有音飛軿出西華總轡忽來尋八遐非無娛同詠理自欽悼此四羅內百憂常在心俱遊北寒臺神風開爾襟六月二十三日夜南極夫人作登軿發東華扇舞太玄飛轡騰九萬八落亦已均暫眄山水際窈窕靈嶽間同風自齊氣道合理亦親龍芝永遐齡內觀攝天真東岑謂應作岑字可長淨何為物所纏六月二十三日夜中候夫人作右二篇有楊書又掾寫五月十二日中君喻書此九字題卷外從此後並似是丁卯年中授書此事皆論三許挺分也阿映遂能絶志山林勤心道味淨神注精研澄虛鏡玄渟獨宴孑栖偶真乃翁道遠之疇匹薑伯真之徒也服氣挹液卒獲其益亦至事也昔又入在臨海赤山中赤山一名燒山遇良友王世龍趙道玄傅太初者此數子始以晉建興元年渡江入東山中學道耳並與相見數人之業皆勝於映矣映遂師世龍授解束之道修反行之法服玉液朝腦精二三年中面有光華還顏反少極為成道但恨其所稟不饒不得高品之通耳於是司命敕吾舉之使奏聞上宮移名東方諸署為地仙時三官都禁左郎遣典柄侯周魴主非使者嚴白虎來於赤山中即欲執之以去且詰其罪狀吾時禁牙謂應作訝字又乃馳啓司命司命即遣中侯李遵握火鈴而來呵攝之於是魴及白虎乃走去耳李遵未來之時映懼怖失膽亦喪氣矣亦賴龔幼節李開林助映為答對亦幾至敗也自無此二人及其師王世龍亦早惡矣魴誥謂應作詰字之亦有實映答對亦可可三官出丹簡罪簿各執一通而問映云夫欲學道慕生上隸真人玄心棲邈恭誠高靈者當得世功相及禍惡不遘陰德流根仁心上逮乃可步真索仙度名青府耳云何父手殺謝弓且亂逆三光又許朝斬李甗之頭以代蔡扶之級又走斬射潘綦等支解鈴下曹表等水沉湯雲之尸火燒徐昂之骸絞殺桓整刳割振噲酷害虐暴刑攬謂應作濫字四十有三張皇訟冤事在天帝禍戾山積善功無一又汝本屬事帛家之道血食生民逋愆宿責列在三官而越幸網脫奉隸真氣父子一家各事師主同生乖戾不共祭酒罪咎之太陰考方加有如此積罪亦無仙者當可得欺太上之曹使汝得名刊不死之紫録耶汝其無對者有司必執也映自強長嘯振褐撫髮爾乃整氣扉口叱吒而答曰大道不親唯善是與天地無心隨德乃矜是以阪泉流血無違龍髯之舉三苗丹野逐謂應作涿字鹿絳草豈妨大聖靈化高通上達耶吾七世父許子阿者積仁著德陰和鳥獸遇凶荒之年人民飢饉加之疫癘百遺一口阿乃施散家財拯其衆庶親營方藥勤勞外舍臨人之喪如失其親救人之患如己之疾已死之命懸於阿手窮垂之身撫之如子度脫凶年賴阿而全者四百八人仁德不隊謂應作墜字後當鍾我等是以功書上帝德刊靈閣使我祖根流宗澤蔭光後緒故使垂條結華生而好仙應得度世者五人登升者三人録名太上策簡青宮豈是爾輩所可豫乎言畢魴等豁然而笑遵至而去矣此意雖復是世龍之助吾亦壯其辭也於是即得度名東宮當為仙之中者然其身中自宿有陰罪未了處已日就補復解謝太上行當受書署者也蓋爾不復受考於三官已定名於不死之録矣今已移在竹葉山中或名此山為蓋竹山山之東面兩隴西上其中有石井橋橋之北小道直入其間有六叢杉樹樹之左右三百步有小石深室室前有流泉水映與三人共止其中此辰年當自暫出還人食詭亦欲暫還鄉里山之近處令其家兄弟見之者也臨時自當令其弟知之所在乃又寄謝令弟子勤之若欲至竹葉山索映亦即得相見竹葉山東上石橋橋之北小道甚徑易勿從南山上山南道絶險竹葉山中仙人陳仲林許道居尹林子趙叔道此四人並以漢末來入此山叔道已得為下真人仲林大試適過行復去此是竹葉山中舊仙人也其王世龍趙道玄傅太初許映或名遠遊適來四年耳右從五月十二日至此並楊書受旨本納納長者蔚蔚內明撥于昔纍非復故形變扇澡煉得道之情和挹神心仰秀雲靈傾觀晨景德音蘭馨方及十載季瑋謂應作偉字舉名每事勗焉勿復不精太和二年歲在丁卯十二月十七日夜太元真人司命君告穆到丙子年為十年矣時當七十二也到亥子年神化變煉子年始餘十年蕭條斧子和心凝靜道氣雖妙乘之亦整澄形丹空擢摽霄領其神以暉其光將穎實侍辰謂應作晨字之高舉谷子之羅糸互此古鼎字可謂秀落衆望縈渟之仙才又當勤進德修業淡然虛眄十二月十七日夜太元真人司命君告玉斧祖司徒府闢掾不赴隱在本縣茅山五年此十六字榮弟後所注其公府闢似妄也淵奇體道解幽達精虛中受物柔德順貞慈寬博採聞道必行逍遙飛步啓誠坦平策龍上造浮煙三清實真仙之領帥友長里之先生必當封牧種邑守伯仙京傅佐上德列書絳名右説道許長史所得限分爾時護軍長史此六字亦榮弟所注瑋灼清暉潛光翳真二景落鋒飛霞流纏於焉玉子採此雙辰遂開上道允得妙門儀璘洞煥玉標玄金登名五宮懸書七元實迭域之併羅為上清之卿君是子內和感虛託真情專之所致亦南人雲軫之必駕三元景輦之攜遊也此云迭域即穀希子也與前司命所答谷子之羅鼎事同右説道許玉斧所得之分此前後二右字下説字出長史書云右清靈真人説云云而楊君書無此四字當是于時楊向長史口道是裴君也此是道成勤至受書之時初所舉定目之名也亦得道齎詣之分限矣恃而替者得來必無從矣當共置此右五條有楊書長史寫兩本保命告云許子遂能委形冥化從張鎮南之夜解也所以養魂太陰藏魄于地四靈守精五老保藏復十六年殆睹我於東華矣既適潛暢莫覺不真許子即是掾也按張係師為鎮南將軍建安二十一年亡葬鄴東後四十四年至魏甘露四年遇水棺開見尸如生出著床上因舉麈尾覆面大笑吒又亡仍更殯葬其外書事迹略如此未審夜解當用何法依如許掾似非劍杖也右英告曰自古及今死生有津顯默異會藏往滅智與世同之者皆得道之行也若夫瓊丹一御九華三飛雲液晨酣流黃徘徊仰咽金漿咀嚼玉蕤者立便控景登空玄升太微也自世事乖玄斯業未就便當暫履太陰潛生冥鄉外身棄質養胎虛宅陶氣絶籥受精玄漠故改容於三陰之館童顏於九煉之戶然後知神仙為奇死而不亡去來之事理之深也南人告云得道去世或顯或隱託體遺迹道之隱也或有再酣瓊精而叩棺一服刀圭而尸爛鹿皮公吞玉華而流蟲出戶仇季子咽金液而臭聞百里黃帝火九鼎于荊山尚有橋領之墓季主服雲散以潛升猶頭足異處墨秋咽虹丹以投水寧生服石腦而赴火務光剪韭以入清冷之淵柏成納氣而腸胃三腐諸如此比不可勝記微乎得道趣舍之迹無常矣南人即南真人夫也此諸仙人出諸傳記而事迹有參差不同者保命又云既適潛暢莫覺不真如此之指非真尸也右四條有長史書人死必視其形如生人皆尸解也視足不青皮不皺者亦尸解也要目光不毀無異生人亦尸解也頭髮盡脫而失形骨者皆尸解也白日尸解自是仙非尸解之例也右一條甲手書寫若其人暫死適太陰權過三官者肉既灰爛血沉脈散者而猶五藏自生白骨如玉七魄營侍三魂守宅三元權息太神內閉或三十年二十年或十年三年隨意而出當生之時即更收血育肉生津成液復質成形乃勝於昔未死之容也真人煉形于太陰易貌於三官者此之謂也天帝曰太陰煉身形勝服九轉丹形容端且嚴面色似靈雲上登太極闕受書為真人趙成子死後五六年後人晚山行見此死尸在石室中肉朽骨在又見腹中五藏自生如故液血纏裹于內紫包結絡於外夫得道之士暫遊于太陰者太乙守尸三魂營骨七魄衛肉胎靈掾氣右三條是長史抄寫九真經後服五石腴事其用他藥得尸解非是用靈丸之化者皆不得反故鄉三官執之也有死而更生者有頭斷已死乃從一旁出者有未斂而失尸骸者有人形猶在而無復骨者有衣在形去者有髮脫而失形者白日去謂之上尸解夜半去謂之下尸解向曉向暮之際而謂之地下主者也右一條是掾抄寫劍經後論尸解事
