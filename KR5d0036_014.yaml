body:
  text: 卷十三稽神樞第三地下主者復有三等鬼帥之號復有三等並是世有功德積行所鍾或身求長生步道所及或子弟善行庸播祖禰或諷明洞玄化流昆祖洞玄即大洞玄經讀之萬遍七祖已下並得煉質南宮受化胎仙非今世所稱洞玄靈寶經也夫求之者非一而獲之者多途矣要由世積陰行然後皆此廣生矣鬼帥武解主者文解俱仙之始也度名東華簡刊上帝不隸酆宮不受制三官之府也又別云心勤於事欲兼味於清正華目以隨世畏死而希仙者亦多作文武解主者其一等地下主者散在外舍閑停無業不受九宮教制不聞練化之業雖俱在洞天而是主者之下者此自按四明法一百四十年依格得一進耳一進始得步仙階給仙人之使令也依劍經主者大有品秩遷轉年限賒促懸殊此等數之目異于品名反以多為貴如此階秩矣其二等地下主者便徑得行仙階級仙人百四十年進補管禁位管禁之位如世間散吏者也此格即地下主者之中條也李東等今在第一等中李東曲阿人乃領戶為祭酒今猶有其章本亦承用鮑南海法東才乃凡劣而心行清直故得為最下主者使是許家常所使永昌元年先生年二十三就其受六甲陰陽行廚符既相關悉聊複及之耳其第三等地下主者之高者便得出入仙人之堂寢遊行神州之鄉出館易遷童初二府入晏東華上臺受學化形濯景易氣十二年氣攝神魂十五年神束藏魄三十年棺中骨還附神氣四十年平復如生人還遊人間五十年位補仙官六十年得遊廣寒百年得入昆盈之宮此即主者之上者仙人之從容矣張姜子等先在第二等中亦始得入易遷耳鬼帥之位次亦如此矣主者之位亦不限男女按此年限得棺中之骨便得出生世中亦往往有此改變隱適難已意量殆入不可思議之境耳易遷童初二宮是男女之堂館也其中閒靜東海青童君一年再遊校此諸宮觀見群輩也一年再遊似依傳中曰而前書云正月二十三日東宮上人來便是不必復有定期也趙素臺在易遷宮中已四百年不肯徙自謂天下無復樂於此處也趙素臺是趙熙女漢時為幽州刺史有濟窮人於河中救王惠等於族誅行陰德數十事故其身得詣朱陵兒子今並得在洞天中也熙恆出入在定錄府素臺數微服遊行道巷盼山澤以自足矣趙熙漢書不顯微服遊行蓋謂在洞天中耳不應乃出世中也易遷中有高業而蕭條者有竇瓊英韓太華劉春龍王進賢李奚子郭叔香此數人並天姿鬱秀澄上眇邈才及擬勝儀觀駭眾此則主者之高者仙官之可才其次及得張善子輩鄧伯苗母有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨為業以活死為事故祚及於英身矣竇武字游平竇融玄孫峙則應是融祖也武亦恆以財物散施天下貧乏靈帝時為大將軍與陳蕃俱被誅其母產武時並產一蛇蛇出即走上南山至母死無何而來哀泣良久又去亦所以為異但未解俱承七世之慶兄戮而妹仙當非道家之北斗也鬼官別有北斗君以司生殺爾按孫皓敗將張悌軍人柳榮病死已三日且忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晚悌戰死如此即應是第四宮也今第五第六宮不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宮中總主諸六天宮餘四天宮其四明公各在其中治雖云各治一宮又不顯各在何宮宮既並列復不得依位作四方言之尋其公次第高下則第二宮名為西明公治第三宮東明公治第四宮北斗君治及次南次北也二天宮立一官六天凡立為三官三官如今刑名之職主諸考謫常以真仙司命兼以總御之也並統仙府共司生死之任也大斷制皆由仙官道家常呼三官者是此也而消魔經云岱宗又有左火官右水官及女官亦名三官並主考罰今三茅君通掌之大君為都統保命為司察矣所以隸仙官者以為天下人不盡皆死其中應得真仙則非北帝所詮或有雖死而神化反質者如此皆在真仙家簡錄故司命之職應而統之也鬼官北斗君乃是道家七辰北斗之考官此鬼一官又隸九星之精上屬北晨玉君天上北斗有所司察故鬼官亦置此職以精象相應統領既關璇璣是以仰隸太上之曹也府耳未必盡徑來也別更一二密可示爾同氣令知斗處幽間之泰也道業可不勖哉此三人外書並不顯後漢有李云亦為白馬令以直言忤旨死令示同氣者謂以告長史掾也七月二十四日夜保命君告按前受長史司馬諸人雖定錄所告而應是初說洞中事是醜年十一月今此說雜人乃宜繼後反為七月複不應是寅年進退拯難詳從地下主者來凡十四條並有掾寫共一卷也含真臺洞天中皆有非獨此也此一臺偏屬太元府隸司命耳其中有女真二人總之其一女真是張微子漢昭帝時將作大匠張慶女也微子好道因得尸解法而來入此亦先在易遷中微子常服霧氣自云霧氣是山澤水火之華精金石之盈氣也久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期文期青童之妹也微子曾精思於寢靜誠心感靈故文期降之授以服霧之道也服霧之道授微子微子亦時以教諸學在含真易遷中者我昔嘗得此方乃佳可施用者也服霧法常以平旦於寢靜之中坐臥任己先閉目內視仿佛如見五髒畢因口呼出氣二十四過臨目為之使目見五色之氣相繞纏在面上鬱然因又口內此五色氣五十過畢咽唾六十過畢乃微咒曰太霞發暉靈霧四遷結氣宛屈五色洞天神煙合啟金石華真藹鬱紫空煉形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者爾可行此法邪久行之常乘雲霧而遊此服霧法已別抄用事在第三篇中今猶疑存此與本文相隨也其一女真是傅禮和禮和是漢桓帝外甥侍中傅建女也北地人其家奉佛精進女常旦夕灑掃佛前勤勤祝誓心願仙化神靈監其此心亦得來此久處易遷今始得為含真臺主也常服五星氣以得道禮和善歌歌則鳥獸飛聚而聽聲焉右定錄君言張傅二人外書不顯或應各在家譜中又一條有楊書又掾寫王衍為晉武帝尚書令其女字進賢為泯懷太子妃洛陽亂劉曜石勒略進賢渡孟津河於河中欲妻之進賢罵曰我皇太子婦司徒公之女而胡羌小子敢欲干我乎言畢即投河中其侍婢名六出復言曰大既有之小亦宜然復投河中時遇嵩高女真韓西華出遊而泯之撫接二人遂獲內救外示死形體實密濟便將入嵩高山今在華陽宮洞內易遷之中六出時年二十二三許體貌亦整善有心節本姓田漁陽人魏故浚儀令田諷之孫諷曾有陰德之行以及於六出耳晉書云王衍長女名景風貌美賈後為弟謐娶之少女名惠風以配泯懷太子恨之如此則不甚美也永嘉五年六月王彌劉曜石勒破洛賊欲逼妃妃拔刀曰我太尉公之女皇太子之妃有死而已終不為逆虜所辱遂見害家人收葬于城西南洛水之北追諡曰貞定妃與此說小異范幼沖遼西人也受胎化易形今來在此恆服三氣三氣之法存青氣白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止為之十年身中自有三色之氣遂得神仙此高元君太素內景法旦旦為之臨目施行視日亦佳其法雖鮮其事甚驗許侯可為之此法亦以重抄書在第三篇修有事中范監者即其人也昔得為童初監今在華陽中又別云曾為漢尚書郎善解地理以塚宅為意此亦在第三篇右三條並楊書河內李整昔受守一法並洞房得道初在洛陽山近來入華陽中又主諸考祟民間之事整往為常道鄉公傅受道入山時已年六十不知李作何位亦應是監職常道鄉公魏元帝本封也罡山東北有穴通大句曲南之方山之南穴姜伯真數在此山上取石腦石腦在方山北穴下繁陽子昔亦取服此罡山猶是大橫山故後云掾恆與方山五人往來但不知有路通洞天中不爾繁陽子即鹿跡洞中何苗也此北絪山中亦有此物未詳頠山在何處今句曲北鹿跡山西有名頠角山似當是其處也石腦故如石但小斑色而軟耳所在有之服此時時使人發熱又使人不渴李整昔未入山時得風痺疾久久乃愈耳此人先多房內事殆不同今者疾之輕薄也石腦今大茅東亦有形狀圓小如曾青而質色似鍾乳床下乃皎白時有黑斑而虛軟服之乃熱為治亦似鍾乳也羅江大霍有洞臺中有五色隱芝此則南真及司命所任之處也華陽洞亦有五種夜光芝此則司命所請以植句曲內外者也良常山有熒火芝此物在地如熒火狀其實似草而非也大如豆形紫華夜視有光得食一枚心中一孔明食七枚七孔明可夜書計得食四十七枚壽萬年從來未聞有見之者當是無至心尋求耳包山中有白芝又有隱泉之水正紫色此即林屋山也在吳大湖中耳華陽雷平山有田公泉水飲之除腹中三蟲與隱泉水同味云是玉砂之流津也用以珣衣不用灰以此為異矣此水今從地湧出狀如沸水味異美取蒐垢衣便自得淨即所呼為柳谷珣者在長史宅東南一里許也昔高辛時有仙人展上公者於伏龍地植李彌滿其地展先生今為九宮內右司保其常向人說昔在華陽下食白李味異美憶之未久而忽已三千年矣諸歷檢課謂堯元年戊戌至齊之己卯歲二千八百三年高辛即堯父說此語時又應在晉世而已云三千年即是堯至今不啻二千八百年外歷容或不定如此丁亥之數不將已過乎汲塚紀年正二千六百四十三年彌復大懸也後有郭四朝又於其處種五果又此地可種柰所謂福鄉之柰以除災厲秦時有道士周太賓及巴陵侯姜叔茂者來住句曲山下又種五果并五辛菜叔茂以秦孝王時封侯今名此地為姜巴者是矣以其因叔茂而名地焉地號今亦存有大路從小茅後通延陵即呼為姜巴路也但秦孝公時未並楚置郡巴陵縣始晉初不知那有巴陵之封恐是巴蜀之巴故也此二人並已得仙今在蓬萊為左卿今南鄭諸姜則叔茂之後茂曾作書與太極官僚云昔學道於鬼谷道成于少室養翮于華陽待舉於逸域時乘飆輪宴我句曲悟言永歎代謝之速物存人亡我勞如何太賓亦有才藝善鼓琴昔教糜長生孫廣田廣田即孫登也獨弦能彈而成八音真奇事也孫登即嵇康所謂長嘯者亦云見彈一弦之琴斯言非虛矣叔茂種五辛菜常賣以市丹砂而用之今山間猶有韭薤即其遺種邪今呼為韭山在大茅西甚多大韭又餘處亦有蒜薤耳非出姜巴一處也今舍前有塘乃郭四朝所造也高其牆岸蓋水得深但歷代久遠塘牆頹下耳今舍語似是論長史宅宅前今乃有塘近西為堤牆即是遏柳珣水而去郭千甚遠郭千在北洞西北今有大陂塘四朝先應住此未解舍前之意恐長史於彼複立田業又有說在後四朝常乘小船游戲其中每叩船而歌曰清池帶靈岫長林鬱青葱玄鳥藏幽野悟言出從容鼓楫乘神波稽首希晨風未獲解脫期逍遙丘林中晨風謂上清玉晨之風非毛詩所謂鵷彼晨風之鳥也浪神九垓外研道遂金真戢此靈鳳羽藏我華龍鱗高舉方寸物萬吹皆垢塵顧哀朝生惠孰盡汝車輪女寵不弊席男愛不盡輪朝生蜉蝣也以喻人之在世易致消歇耳遊空落飛飆靈步無形方圓景煥明霞九鳳唱朝陽暉翮扇天津菴藹慶雲翔遂造大微宇挹此金梨漿逍遙玄垓表不存亦不亡玄垓九垓皆八極之外九霞之頂名也飛登木星亦名玄朗東陽之垓故若士語盧敖云吾與汗漫期於九垓之上矣駕舞神霄披霞帶九日高皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闔幽冥戶靈變玄跡滅四朝為玉台執蓋郎故云高皇齊龍輪定錄言右十二條掾寫共一篇四朝燕國人也兄弟四人並得道四朝是長兄也真法其司三官者六百年無違坐超遷之四朝職滿上補九宮左仙公領玉臺執蓋郎中間久闕無人後以思和代四朝也山下居民今猶呼一平澤地為郭千者是四朝之姓尚存於民口也四朝往曾使人種植於此地也年年四朝每行皆過詣此山以造思和遊看原阜此是茅傳中言也按如此說郭千止是種植處非居止也住處則長史宅果應是矣今塘牆既頹決水不複甚停人皆以為田耳然其地汗闊小壅猶自成也可得泛舟而歌但無人能追蹤遠世可嘆如何後云此四朝年年行過游看是上補去後猶複憶羨舊居所以數宴良常眷盼朋好張玄賓者定襄人也魏武帝時曾舉茂才歸鄉里事師西河薊公服朮餌兼行洞房白元之事後遇真人樊子明於少室授以遁變隱景之道昔在天柱山中今來華陽內為理禁伯理禁伯主諸水雨官也此人善能論空無乃談士常執本無理云無者大有之宅小有所以生焉積小有以養小無見大有以本大無有有亦無無焉無無亦有有焉所以我目都不見物物亦不見無寄有以成無寄無以得無於是無則無宅也太空亦宅無矣我未生時天下皆無無也其所論端據如此桐柏諸靈亦不能折也自云昔曾詣蓬萊宋晨生晨生者蓬萊左公也與其論無粗得人意過此已去尚未能本有安能本無邪與餘人論空無天下中皆無人焉其高氣秉理如此東卿君紫微玄清亦莫得而乾也理禁伯官亦保命之監國也此論空無之理乃殊得無宗而玄玄固難可曲核矣真人之才義亦是甚有優劣東卿桐柏紫微玄清蓋相推並言談之英辯者故舉此為標也按左傳稱君之世子從曰撫軍守曰監國監國之任則是副貳疑此監國或因作監司也趙威伯者東郡人也少學邯鄲張先生先生得道之人耳晚在中嶽授玉佩金鐺經於范丘林丘林乃是漢樓船將軍衛行道婦也學道得仙遂授行挹日月之道又服九靈明鏡華遂得仙昔亦來在華陽內為保命丞河圖云吳楚多有得見太平者其常語人云此語不虛此驗不久如此諸學者何可不彌加勤勵也其存明鏡非世間常法也受范丘林口訣云善嘯嘯如百鳥雜鳴或如風激眾林或如伐鼓之音時在天市壇上奮然北向長嘯呼風須臾雲翔其上衝氣動林或冥霧飆合或零雨其蒙矣保命有四丞此一人主為暴雨水及領五芝金玉草若欲致洪雨者將可辭詣之也又理禁伯亦主雨水若請雨宜並為辭也其一丞是咸陽樂長冶東卿司命君鄉里人也為小君所舉用漢桓帝中書郎晚從中嶽李先生受道行七元法得仙相去二百餘年猶蒙卿褲之澤也一人是孟君入室弟子鄭雉正者孟君所屬用孟君京兆人或呼為孟先生不知何名位其一人是西山唐房此則神仙傳所載是蜀人奉事李八百者也樂長治主災害鄭雉正主考注唐公房主生死趙威伯主仙籍并記學道者並暴雨水靈芝草洞宮官寮司察吳越非民在任不過此四丞也其下則有四師事在第三篇中定錄道此右此有掾寫依紙墨亦言前篇而中間有此失缺此行後又割恐別復有事並遺落深可恨惜耳杜契者字廣平京兆杜陵人建安之初來渡江東依孫策入會稽嘗從之後為孫權作立信校尉黃武二年漸學道遇介琰先生授之以玄白術隱居大茅山之東面也守玄白者能隱形亦數見身出此市里契與徐宗度晏賢生合三人俱在茅山之中時得入洞耳或自採伐貨易衣糧于虛曲而人自不知之耳猶琰者即白羊公弟子也今在建安方山中也琰即禁山符云為孫權所殺化形而去往建安方山尋白羊公杜必當於此時受道也音薛即與舜同字四畫契三畫分毫有異也徐宗度晉陵人作孫皓左典軍呂悌司馬受風谷先生氣禁道故得俱晏賢生是步陟外甥即宗度之弟子也契弟子二人一人孫賁孫女寒華也少時密與契通情後學道受介琰法又以法受寒華寒華初去時先叛入建安依邵武長張毅毅即通親故得免脫事平乃歸茅山耳寒華行玄白法而有少容今嘗俱處也玄白道忌房室自契受道不得行此吳豫章太守孫賁之子也山陰王孫奚之子寒華也尋此二人乃因奔淫無應入道而用志能自抑斷如此此宜其階也賁是權同堂兄有子四人各名鄰安熙疏而無奚或是小名又無奚或為王者也其弟一子是陳世京世京孫休時侍郎少好道數入佛寺中與契鄉里故晚又授法契初將寒華入建安之時時亦同舉實賴世京濟其密計焉此數子今處茅山之外非常在洞中之客也亦時得入耳亦數至長史舍屋間遊戲然多在大茅之間建安初至孫休即位六十二年杜初從孫策不減年二十左右則逃時已年八十許矣不容此爾世京今服朮澤瀉寒華無所服茅山通無石室則必應起廬舍既有服餌使須藥具兼猶資衣糧不容都為隱默但於時林筼幽阻無人尋跡耳守玄白之道常旦旦坐臥任意存泥丸中有黑氣存心中有白氣臍中有黃氣三氣俱生如雲以覆身上因變成火火又繞身身通洞徹內外如一旦行之至日向中乃止于是服氣百二十過都畢道正如此使人長生不死辟卻萬害所謂知白守黑求死不得知黑守白萬邪消卻尤禁六畜肉及五辛之菜當別寢靜思尤忌房室房室即死此道與守一相似但如為徑要以減之耳忌房室甚於守一守一之忌在於節之耳初存氣出如小豆漸大衝天三氣纏煙繞身共同成一混沌忽生火在三煙之內又合景以煉一身一身之里五髒照徹此亦要道也此數人並已三百餘年正玄白之力也並是不死之學者未及於仙道玄白事已重抄出在第三篇修用中計杜於建安初可年二十許至晉興寧三年始一百九十歲諸人又晚學而此云並三百餘年恐長三字亦強可是二耳若欲守玄白者當與其經經亦少許耳自可兼行以除萬邪卻千害行之三十年匿身隱形日行五百里一名此道為胎精中景玄白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起別寢邪此一誥是論玄白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙勃鬱八道騰五嶽何必秀名山亦足淩矯手攝洞阜棲心潛中興吐納胎精炁玄白誰能勝右杜廣平恆喜歌吟此今疏相示右定錄君道此此亦應同十四夜告從杜來九條並有掾寫共一篇峨峨岑山幽岩嶺芳卓卓先生乘和來翔散髮頹穎躬耕陵堽三餐自足不期裹糧玉迹東映鳳響西彰公侯招之淩風振裳處不矜嘿出不希揚被褐容與杖策頡頏此一篇有異手書乃接前詩後而後又仍接以蕭寂蓽門事既真書止說前一篇已自右畢則此詩非複是杜所作而不知其義是誰近所摽靜舍地此金鄉之至室若非許長史父子豈得居之後世當有赤子賢者乃得居此鄉爾子孫事祕之不可輕泄按此所泬即應是後雲長史所營屋宅處也金陵之地乃廣則此為最勝之地非真仙不得居故唯長史掾可居耳赤子賢者莫測為誰或是姓赤或是大人或將來英賢應運者乃當複得居之既方是後世子孫時事則非今所宜預言兼以此地福重不欲宣廣使人濫住致有犯穢故也許長史今所營屋宅對東面有小山名雷平山周時有雷氏養龍來在此山後有姜叔茂田翁亦居焉其山北有柳汧水或名曰田公泉以其人曾居此山取此水故也雷平山在小茅北基址相連田公泉今具存左右甚多水柳樹故名柳珣此泉即前所云浣衣不用灰者長史宅自湮毀之後無人的知處至宋初長沙景王檀太妃供養道士姓陳為立道士廨於雷平西北即是今北廨也後又有句容山其王文清後為此廨主見傳記知許昔於此立宅因博訪耆宿至大明七年有術虛老公徐偶云其先祖伏事許長史相傳識此宅只在今廨前烏桕樹處應是似猶有齋堂前井存于時草萊蕪沒王即芟除尋覓果得磚井土已欲滿仍掘治更加簹累今有好水水色小白或是所云似鳳門外水味也於是審知是故宅從來空廢無敢居者既云金鄉至室便為伏龍之膏腴矣其西北即有長岡連亙呼為長隱者也雷平山之東北有山俗人呼為大橫山其實名鬱岡山也名山記云所謂岡山者也下有泉水昔李明於此下合神丹而升玄洲水邊今猶有處所此山正東面有古時越翳王塚本墓字後人枿作塚此山今連延甚長後云古人合丹猶應是此李明但言在方隅則疑其小近南水邊不複見有基跡或漸蕪沒故也越翳王是句踐四世孫初不肯立逃入菁山穴越人董出之後於吳徙還會稽以周宣王十一年為孫諸咎所殺越人又殺諸咎不知那得遠來葬此或當有神異處故也今尋視未見指的墳塚而如有兆域處者右定錄君言右三條有掾寫華陽中玉碣文在童初府西向一云四面其文曰解帶被褐尋生理活養存三亦洞我玉文領理八老二十四真不眠內視微氣綿綿把錄太素玄之又玄神道在今子來乃臻易遷云鄧夫人語之解此則得仙此仙之要言易遷不解此許侯可解注之易遷則長史妻也鄧夫人即鄧芝母也此碣文乃粗可領解皆上道中事但下挺者無由究知之故令長史解釋亦或試以戲之耳右一條有某書隱居今所安經昭靈臺前欲立小石碣子刻書華陽頌十五篇皆贊述此山洞內外事庶以標誠靈府永垂遠世而未辦作石今且載其文於此曰河篇征往冊孔記昭昔名三宿麗天序兩金標地英右樞域宅無乃生有在有則還空靈構不待匠虛形自成功右質象總神列三府分途交五便陰暉迎夜翽晨精望曉懸右形位南峰秀玄鼎北嶺橫秦璧表裏玉沙津周回隱輪跡右標貫左帶柳汧水右浚陽谷川土懷北邙色井洌鳳門泉右區別郭千峙流岸姜巴亙遠蹤廟貌或時饗別宅乃恆恭右迹號吳居非知地越家詎隱遷樹蓋徒低蔭石灶未嘗煙右類附果林鬱餘柰蔬圃蔓遺辛熒芝可燭夜田泉常浣塵右物軌降轡龜山客解駕青華童寢宴含真館高會蕭閑宮右遊集清歌翔羽集長嘯歸雲翻孑絃有逸調空談無與論右才英標舍雷平下立靜連石陰上道已沖念飛華當軫心右學稟方嵎游瓊刃華陽棲隱居重離儻或似七元乃扶胥右挺契號期行當滿亥數未終丁迨乃承唐世將賓來聖庭右機萌濟神既有在去留從所宜靈跡何顯晦冥途自相知右業運刊石玄窗上顯誠曲階門動靜顧矜錄不負保舉恩右誠期右此十五首下各兩字是其一篇中意篇中字字皆有義旨後之人自以篇中事求之
