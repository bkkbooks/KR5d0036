body:
  text: 卷三運題象第三北元中玄道君李慶賓之女太保玉郎李靈飛之小妹受書為東宮靈照夫人治方丈臺第十三朱館中夫人著紫錦衣帶神虎符握流金鈴有兩侍女侍女年可二十許夫人年可十三四許聞呼一侍女名隱暉侍女皆青綾衣捧赤玉箱二枚青帶束絡之題白玉檢曰太上章一檢曰太上文此記織檢上文亦同前九華也夫人帶青玉色綬如世人帶章囊狀隱章當長五丈許大三四尺許臨去授作一瑽詩畢乃吟歌雲墉帶天構七氣煥神馮瓊扇啟晨鳴九音絳樞中紫霞興朱門香煙生綠窗四駕舞虎旂青軿擲玄空華蓋隨雲倒落鳳控六龍策景五嶽阿三素眄君房適聞臊穢氣萬濁蕩我胸臭物薰精神囂塵互相衝明王皆摧爛何獨盛德躬高揖苦不早坐地自生蟲八月二十二日夜靈照夫人授作此詩此長史書作靈照夫人而楊君書多作照靈臨去吟曰心勿欲亂神勿淫役道易不順災重不逆永喪其真遂棄我適復生許家不我方當復來爾勤之而已右從北元來八條有長史寫王子晉父周靈王有子三十八人子晉太子也是為王子喬靈王第三女名觀香字眾愛是宋姬子於子喬為別生妹受子喬飛解脫網之道得去入緱外書作維字氏山中後俱與子喬入陸渾積三十九年觀香道成受書為紫清宮內傳妃領東宮中候真夫人此即中候王夫人也子喬弟兄七人得道五男二女其眉壽是觀香之同生兄亦得道此似別有眉壽事今不存而掾書中有夢見人云我是王眉壽之小妹疑此或當是相答也右二條有楊書駕敖八虛徊宴東華房阿母延軒觀朗嘯躡靈風我為有待來故乃越滄浪右英王夫人歌乘飆溯九天息駕三秀嶺有待徘徊眄無待故當淨滄浪奚足勞孰若越玄井右紫微夫人答英歌寫我金庭館解駕三秀畿夜芝披華鋒謂應作峰字咀嚼充長饑高唱無逍遙冬興有待歌空同酬靈音無待將如何右桐柏山真人歌朝遊鬱絕山夕偃高暉堂振轡步靈鋒謂應作峰字無近於滄浪玄井三仞際我馬無津梁倏九萬間八維已相望有待非至無靈音有所喪右清靈真人歌龍旂舞太虛飛輪五岳阿所在皆逍遙有感興冥歌無待愈有待相遇故得和滄浪奚足遼玄井不為多鬱絕尋步間俱會四海羅豈若絕明外三劫方一過右中候夫人歌縱酒觀群惠倏忽四落周不覺所以然實非有待遊相遇皆歡樂不遇亦不憂縱影玄空中兩會自然疇右昭靈李夫人歌駕發西華無待有待間或眄五嶽峰或濯天河津釋輪尋虛舟所在皆纏綿芥子忽萬項中有須彌山小大固無殊遠近同一緣彼作有待來我作無待親右九華安妃歌無待太中有待太有際大小同一波遠近齊一會鳴弦玄霄顛吟嘯運八氣奚不酣靈液眄目娛九裔有無得玄運二待亦相蓋右太虛南嶽真人歌偃息東華靜揚軿運八方俯眄丘垤間莫覺五嶽崇靈阜齊淵泉大小互相從長短無少多大椿須臾終奚不委天順縱神任空同右方諸青童君歌控飆扇太虛八景飛高清仰浮紫晨外俯看絕落冥玄心空同間上下弗流停無待兩際中有待無所營體無則能死體有則攝生東賓會高唱二待奚足爭命駕玉錦輪舞轡仰徘徊朝遊朱火宮夕宴夜光池浮景清霞杪八龍正參差我作無待遊有待輒見隨高會佳人寢二待互是非有無非有定待待各自歸右南極紫元夫人歌按此諸歌詩並似初降語而嫌眾真多高唱上清童紫元太虛未嘗有雜降處恐或遺失耳有待之說並是指右英事非安妃也騰躍雲景轅浮觀霞上空霄軿縱橫舞紫蓋託靈方朱煙纏旌旄羽帔扇香風電嗥猛獸攫雷吟奮玄龍鈞籟昆庭響金笙唱神鍾採芝滄浪阿掇華八渟峰朱顏日愈新劫往方嬰童養形靜東岑七神自相通風塵有憂哀隕我白鬢翁長冥遺遐歎恨不早逸縱九月三日夕雲林王夫人喻作令示許長史停駕望舒移回輪反滄浪未睹若人遊偶想安得康良因俟青春以敘中懷忘右右英吟此再三龜闕鬱巍巍墉臺絡月珠列坐九靈房叩敖吟太玉簫和我神金醴釋我憂宴酣東華內陳鈞千百聲青君呼我起折腰希林庭羽帔扇翠暉玉佩何鏗零俱指高晨寢相期象中冥右紫微歌此二篇超舉步絳霄飛飆北壟庭神華映仙臺圓曜隨風傾啟暉挹丹元扉景飡月精交袂雲林宇浩軫謂應作皓騑還童嬰蕭蕭寄宅是非豈能營陣上自擾競安可語養生右玄壟紫微作控晨浮紫煙入景觀派流羽童捧瓊漿玉華餞琳腴相期白水涯揚我萎蕤珠滄房煥東霞紫造浮絳辰雙德秉道宗作鎮真伯蕃八台可眄目北看乃飛元清淨雲中視眇眇躡景遷吐納洞領秀藏暉隱東山久安人事上日也無虛閒豈若易翁質反此孩中顏九月六日夕雲林喻作與許侯解輪太霞上斂轡造紫丘手把八空氣縱身雲中浮一眄造化剛再視索高疇道要既已足可以解千憂求真得真友不去復何求九月六日夕紫微夫人喻作示許長史並與同學同學謂郗方回也晨闕太霞構玉室起霄清領略三奇觀浮景翔絕冥丹空中有真金映育挺精八風鼓錦被碧樹曜四靈華蓋蔭蘭暉紫轡策綠軿結信通神交觸類率天誠何事外象感須睹瑤玉瓊九月九日雲林右英夫人喻作紫空朗明景玄宮帶絳河濟濟上清房雲臺煥嵯峨八輿造朱池羽蓋傾霄柯震風回三辰金鈴散玉華七轡絡九垓晏眄不必家借問求道子何事坐塵波豈能栖東秀養真收太和九月九日紫微夫人喻作因許示郗郗猶是方回也二景秀鬱玄霄映朗八方丹雲浮高晨逍遙任靈風鼓翮乘素飆竦眄瓊臺中綠蓋入協晨青軿擲空同右揖東林帝上朝太虛皇玉賓剖鳳腦嗷酣飛蕊漿雲鈞回曲寢千音何琅琅錦旌召猛獸華幡正低昂香母折腰唱紫煙排棟梁總轡高清闕解駕佳人房昔運挺未兆靈化順氣翔心眇玄涯感年隨積椿崇形甘垢臭味動靜失滄浪我友實不爾榮辱昨已忘九月十八日夜雲林右英夫人作喻曰吾辭訖此絳景浮玄晨紫軒乘煙征仰超綠闕內俯眄朱火城東霞啟廣暉神光煥七靈翳映汜三燭流任自齊冥風纏空洞宇香音觸節生手攜熾謂應作織字女舞併衿匏瓜庭左徊青羽旗華蓋隨雲傾晏寢九度表是非不我營抱真棲太寂金恣愈日嬰豈似愆穢中慘慘無聊生九月二十五日夜雲林右英夫人授作三轡抗紫軒傾雲東林阿右英吟此道右從騰躍來凡十三篇並有楊書又雜有掾寫遣滯吝賴窮行德不亦甚佳乎不患德之不報所患種福之不多耳此一行則似乎福田也萬事云云盡可觸類矣十二月三日雲林右英夫人告右一條有楊書又有一本小異穆惶恐言仁愛之至猥惠新詩雲藻綺絡金聲玉粲誠翰林之奇秀華錦之盛肆也義類淵微仰覽無射佩之丹心奉以周旋功德淺陋冥報已重福田之喻敢不自勵憑託徽猷情若山海動靜啟悟望垂矜錄許穆惶恐言詣雲林右英夫人機前此即答遣滯吝書也有自起草存青童大君常吟詠曰欲殖滅度根當拔生死栽沉吟墮九泉但坐惜形骸太虛真人常吟詠曰觀神載形時亦如車從馬車敗馬奔亡牽連一時假哀世莫識此但是惜風火種罪天網上受毒地獄下西城真人王君常吟詠曰神為度形舟薄岸當別去形非神常宅神非形常載徘徊生死輪但苦心猶豫小有真人王君常吟詠曰失道從死津三魂迷生道生生日已遠死死日已早悲哉苦痛容根華已顛倒起就渼落生焉知反枯老以去月秋分日于瑤臺大會四君各吟此言以和玄鈞廣韶之弦聲也十月告云去月如似是九月間秋分必在八月則去月自為通乎耳十月十五日右英夫人說此令疏右五條有掾書四旌曜明空朱軒飛靈丘玉蓋蔭七景鼓翮霄上浮九音朗紫空玉敖洞太無宴詠三辰宮唱嘯呼我儔不覺椿已來豈知二景流佳人雖兼忘而未放百憂長林真可靜巖中多自娛十月十七日雲林夫人作與許侯左把玉華蓋飛景躡七元三辰煥紫暉竦眄撫明真變踊期須臾四面皆已神靈發無涯際勤思上清文何事生橫塗令爾感不專陰烏禁反㢌烏賀反此應作喑啞言其速也失玄機不覺年歲分十月十八日紫微夫人作右二篇有楊書北登玄真闕攜手結高羅香煙散八景玄風鼓絳波仰超琅園津俯眄霄陵阿玉簫雲上唱鳳鳴洞九遐乘氣浮太空曷為躡山河金節命羽靈徵兵折萬魔齊挹二晨暉千椿方嬰牙喪真投兢室不解可奈何仰眄太霞宮金閣曜紫清華房映太素四軒皆朱瓊擲輪空同津總轡舞綠軿玉華飛雲蓋西妃運錦旌翻然濁塵涯倏忽佳人庭宿感應期降所招已在冥乘風奏霄晨共酣丹琳罌公侯徒眇眇安知真人靈右二篇十月二十日授亦應是右英喻長史也右二篇有楊書車馬雖重為路人所略推分任運有以招之不必柸子誠小還為童史所偷故疾而惜之今冥鑒即擒蓋所以懼惡而善者別矣今雖默然不言小人足知靈驗有訓在其中非直區區若此小小而不能坦也謹白呈雲林右英夫人十一月十九日此所答右英授事事今不存穆惶恐言沉染鄙俗流浪塵昧罪與年長愆隨日積幸遭玄運靈啟其會披散氛霧朗然達觀真靈清秀並垂戒悟猥辱文翰華藻成林金聲玉振規矩有章父子凡微無以堪荷夙興策勵不敢怠惰顒顒傾注言不自暢穆惶恐言此亦是答右英詩不審的是何詩亦似不存右二條長史自書本靈谷秀瀾縈藏身栖岩京被褐均袞龍帶索齊玉鳴形磐幽遼裏擲神太霞庭霄上有陛賢空中有真聲抑我曲晨飛案此綠軒軿下觀八度內俯歎風塵縈解脫遺波浪登此眇眇清擾兢三津竭奔馳割爾齡十二月一日夜南嶽夫人作與許長史飛輪高晨台控轡玄壟隅手攜紫皇袂倏八風驅玉華翼綠幃青裙扇翠裾冠軒煥崔嵬佩玲帶月珠薄入風塵中塞鼻逃當塗臭腥彫我氣百屙令心殂何不飆然起蕭蕭步太虛十二月一日夜方丈左臺昭靈李夫人作與許玉斧清晨揖絳霞總氣霄上遊徊軿躡曲波遂睹世人憂辭旨蔚然起不散三秀嵎何若巡玄鄉撫敖為爾娛君安有有際我願有中無右英作此駕景遊賢良促轡東圃下右英吟此道咀嚼玄句柔音蔚暢曲夾適宣辭喻摽朗欽欽之詠有由然也玄宗以安我其會矣十二月十四日雲林夫人作與長史此所答長史之詩詩今不存右五篇有楊書該清道難通幽妙達許侯其人也方將曜靈方丘騰躍暉霞身飛九天作則群真師傅金闕撫極種人其德仁以融其教整以和可謂天秀摽韻為後民之圓匠也斧子乃潛晨密煥秀霄空上託心玄宅神棲入領心摽寂刃歸形太初志割姻親於內外寄幽會於隱觀矣雖自思入庇重岫穎翳雲暉故叛父也若父愚可也交當同編雲札列名靈簡運會相遇何以陳之耶昔薛旅字季和往學真道於鍾山北阿經七試而不過即長里薛公之弟也不過者由淫侄失位吝鄙內滯石性不迴致敗其試耳然其人好慈和篤又心愛嘯音鳳響及玄弦之彈是故虛唱凝神徽聲感魂神不遂落由好嘯唱願鳳鳴之故矣長里先生燕代人周武王時人也先生比乞之于太上太上故使生系謂應作繼字肇阿之陰運致欲其該微釋滯于染練新暉速升虛之超長里君之願也若由謂應作猶字愆波不激淫由謂應作愈字出雖百過試之故亦昔之薛旅耶師宗相期拂飾盡性苟能其事我亦罕勞賢者之舉此復宜詳密告由來宿命之始想有已應作以字悟也燕氣內果外柔沉德樂景故其人聞北風則心悲睹啟曜則懷泰思駿騄以慕聘嘉柔順以變蔚彼人之心曷曾不爾乎此則本鄉之風氣首丘之內感也苟能信之君其諧矣如其雍謂應作壅字秉欲丹絳不暢靈人攜手而空反高友斂袂而迴晏神氣不眄其宅寂通不鼓其目命矣夫固可悲耶長里之弟本燕代人故此稱其俗氣以喻長史之心也十二月十六日夜右英告右二篇有楊書太元真人雲林右英王夫人南嶽紫虛元君九華真妃清靈真人紫陽真人桐柏真人昭靈李夫人右八人十二月十七日夜方諸宮東華上房靈妃歌曲紫桂植瑤園朱華聲悽悽月宮生蕊淵日中有瓊池左拔員靈曜右掣丹霞暉流金煥絳庭八景絕煙迴綠蓋浮明朗控節命太微鳳精童華顏琳腴充長肌控晨揖太素乘翔玉階吐納六靈氣玉嬪把巾隨彈敖南雲扇香風鼓錦披叩商百獸舞六天攝神威倏億萬椿齡紀鬱巍巍小鮮未烹鼎言我巖下悲按楊君記云東方赤氣中有言曰小鮮未烹鼎言我巖下悲當以此事諮啟司命故答稱此詩仍及後篇也太微玄清左夫人北渟宮中歌曲鬱藹非真虛太為我館玄公豈有懷縈蒙孤所難落鳳控紫霞矯轡登晨岸寂寂無濠涯暉暉空中觀隱芝秀鳳丘逡巡瑤林畔龍胎嬰爾形八瓊迴素旦琅華繁玉宮綺葩淩巖粲鵬扇絕億領撫翮扶霄翰西庭命長歌雲敖乘虛彈八風纏綠宇藂煙豁然散靈童擲流金太微啟璧案三元起折腰紫皇揮袂贊朗朗扇景曜曄曄長庚煥超軿竦明刃下盻使我惋顧哀地仙輩何為栖林澗十二月十七日夜太元真人司命君書出此詩云是青童宮中內房曲恆吟贊此和神其夜眾真降集唯有此書存餘悉不顯後丁卯年論挺分事亦是十二月十七日恐偶同耳此前一事不應是卯年也右三條有楊書玄玄即排起注之曰故玄玄以八風為關籥天地為隄防四海為甕盎九州為比糠積之以萬殊蒸之以陰陽其陶鑄也充隆炊累剛柔清濁象類不同呼吸吐合恭伯榮注之曰九絕獸神禽也在乎群猛之中猾狡乎激奇之際千年不足極其變萬殊不足適其內日月不足照其眉八澤不足遊其足清雲為卑九垓為淺八宏為小四極為近變動無常恆入之芥子之內玉晨之玉寶太微之威神矣此二條是釋神虎隱文中語不知何真所告又無日月是兩手同書君惶恐言仁德流映高蔭彌綸每貽翰音恩逮繾綣旨諭有咸恆之順宗期則玄霄之會雖欽願榮崇欣想靈誥竊懼熠耀之近暉不可參二景之遠麗嘒彼之小宿難以廁七元之靈觀尊卑殊方高下異位俯仰自失罔知所據凡善誘者勤其切磋忠愛者憂其怠惰大易所以乾乾仲尼所以發嘆于不倦者也自奉教以來洗心自勵沐浴思新其勸獎也摽明得道之妙致其檢戒也陳宿命之本迹淫以喪基鄙滯所以伐德雖盧醫之貢針艾扁鵲之獻藥石無以喻也子張存聖教於紳帶西董佩韋絃以自矯蓋以外戒內以義規心仰銜清訓謹書之丹懷藏之六腑奉以周旋弗敢失墜庶五難解凍於爐門七試飆靜於淵谷方將逍遙東山考室龍林靈構蕭蕭丘園沖深庭延雲駕之奇友堂列羽服之上真句金錫五芝之寶滄浪施長年之珍期實夙夜之乃願信誓不敢誣於神明者也唯少鑒之君惶恐言此長史答右英前七月二十八日喻詩世珍芬馥交者並酬前書論薛旅事猶恐是十二月中右此一篇長史令乙寫
