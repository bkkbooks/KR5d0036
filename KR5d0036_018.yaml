body:
  text: 卷十七握真輔第一蕭寂蓽門研神保形和魂夷氣守養神關者豈可以與夫坐華屋擊鍾鼓饗五鼎艷綺紈者同日而論之哉大羅之與籠樊俱一物耳是以古之高人皆去彼而取此矣老氏寧悶悶不察察而況我之鄙夫未知此一篇是何書中語既有道之辭故聊以抄出是兩手書耳玄玄即排起注之曰故玄玄以八風為橐籥天地為隄防四海為甕罌九州為稗粳積之以萬殊蒸之以陰陽其陶鑄也充隆吹纍剛柔清濁象類不同呼吸含吐恭柏榮注之曰九絶獸神禽也罔起此在乎群麗攬搰乎激奇之際終年不足以極其變萬殊不足以適其內日月不足以曜其目八澤不足以遊其足青雲為卑九垓為淺八紘為小四極為近以此變動無常恆入芥子之內玉晨之玉寶太微之威神矣玄玄即排起調彈恭柏榮並是神虎隱文揮神詩中句如今再注之乃取楊雄玄為論中語更小增損易奪之故當是理符義會可得然也夫心與治遊乎太和唯唐虞能充其任矣神與化蕩乎無境唯伏羲能承其統故二十五弦之具非牙曠不能以為神弓矢質的之具非羿逢蒙不能以為妙耶此一篇亦是玄為論中語不知此復以何所明喻耳猶如引抱朴外篇博喻中語也凡有異處皆以朱書為別如此也若夫奇神倏詭恢譎無方陰陽之所煥育川澤之所函藏則羲和浴日於甘淵烏飛司景於扶桑江非登湄而解佩二女御風於瀟湘潛蛟龍戰於玄泉蕃丘喪馬於淮陽靈洲海運於南極東山遙集於帝鄉驊騮抗轡於巨龜江使感夢於宋王是以洞庭雖廣濟之不容刀盧龍雖峻越之不崇朝岷山懸嶺絶闊千仞束馬綿竹則安樂歸晉遼海泱漾橫帶天渠公孫不競則其亡忽諸若夫飛壺白馬即墨天山三江之浸九河之源尚曷足語哉吾子飛軒結駟駕眄林薄徒聞山河之寶魏國所以未究夫吳起一言而武侯心作也此二條是庾闡楊都賦中語也凡四條並異手書之小度青紙乃古而拙此既與真書相連故並存録相隨載之也楊君秦始皇作長安渭水橫橋廣六丈南北三百八十步六十八間漢時橋北置都水令丞領徒千五百人署屬京兆董卓壞之魏武帝更作廣三丈今橋是也夫鍾瑞物也當金氏之世有六鍾將必見乎晉朝五霸諸侯厥德過之故六鍾嘉瑞耳非復耳事誤子孫也預告寧無崖崖乎此注下四十八字黃民手所妄益是載義熙十二年霍山崩出六鍾故欲附會宋祖輒立此辭而不知事類大乖追可忿笑秦為阿房殿在長安西南二十里殿東西千步南北三百步上坐萬人庭中可受十萬人二世為趙高所殺於宜春宮宮在城南三里二世葬其傍司馬相如所云墓蕪穢而不修者是也秦斂天下兵器鑄以為銅人十二置此十四字共一行行前魚爛餘十在今足令成字如此之諸宮漢時皆在長安董卓壞以為錢餘二人徙在青門裏東宮前魏明帝欲徙詣洛載至霸城重不能致今在霸城大道南胸前有銘曰皇帝二十六年初兼天下諸侯以為郡縣正法律均度量大人來見臨洮身長五丈足迹六尺秦丞相蒙恬李斯所書也缺失秦字廟中鍾絺四枚皆在漢高祖廟中魏明帝徙二枚詣洛故尚方南銅駝巷中是也漢昭帝平陵宣帝杜陵二銅鍾在長安夏侯征西欲徙詣洛重不能致之在青門裏道南其西者是平陵鍾東者杜陵鍾也此後少始皇陵一事鴻門在始皇陵北十餘里漢書云張良解厄於鴻門者也秦王應是楚王作秦王誤耳項籍以沛公為漢王都漢中而分關中為三秦章邯為雍王都大丘今槐里是也司馬欣為塞王都櫟陽今萬年縣是也董翳為翟王都高奴高奴縣在咸陽西北今省高祖自漢中北出襲三面皆平之漢書云乘釁而運席卷三秦者也此三縣今皆有都邑故處也此後少十五六條事當是零失也杜陵宣帝陵也宣帝少依許氏在杜縣葬於南原立廟於曲池之北號曰樂遊廟因菀為名也徙關東名族四十五姓以陪杜陵司馬相如弔二世云臨曲江之洲謂曲池也此一條增損語小異不解那得始此右此前十條並楊君所寫録潘安仁關中記語也用白箋紙行書極好當是聊爾抄其中事東方有赤氣之內有詠言曰小鮮未烹鼎言我巖下悲此是東華宮中歌詩之辭整控啓素鄉河靈已前驅此兩句是揮神詩中之辭風伯不搖條神虎所挾扶十一月二十四日倏忽之間聞洞房中云在丹襆帳中有如人聲讀書如此此是存洞房三真事並前條並楊所自記所感聞之事也得書知洗心謝過甚敘虛心相行復來張生頓首覺題云許君近知來有北行事恨不面今致黃長命縷一枚後復果不張生頓首覺題云楊君夢見一人似女子著鳥毛衣齎此二短折封書來發讀覺見憶昔有此語而猶多有所忘又夢後燒香當進前室此並記夢見張天師書信云張生者即應是諱今疏示長史故不欲顯之又見系師注老子內解皆稱臣生稽首恐此亦可是系師書耳興寧三年四月二十七日楊君夢見一人著朱衣籠冠手持二版懷中又有二版召許玉斧出版皆青為字云召作侍中須臾玉斧出楊仍指此是許郎玉斧自説我應十三年今便見召未解儀體向人答若爾可作剌玉斧作屬道未解儀典方習厲之言須十三年向玉斧揖而去此掾書半紙是口受寫楊君所夢故猶內楊事中侍中之位所謂侍帝晨者也版青為字即青籙白簡也四月二十九日夜半時夢與許玉斧俱座不知是何處也良久見南嶽夫人與紫陽真人周君俱來坐一床因見玉斧與真人周君語曰昔聞先生有守一法願乞以見授周君曰寡人先師蘇君往曾見向言曰以真問仙不亦迂乎僕請舉此言以相與矣玉斧曰情淺區區貪慕道德故欲乞守一法爾言未絶周君又言曰昔所不以道相受者直以吳傖之交而有限隔耳周是汝陰人漢太尉勃七世孫故云傖人也君乃真人也且已大有所稟將用守一何為耶言訖豁然而覺竟不知在何處此夢甚分明故記之四月九日戊寅夜鼓四夢北行登高山迷淪不寤至明日日出四五丈乃覺覺憶登山半日許至頂上大有宮室數千間鬱鬱不可名山四面皆有大水而不知是何處某因仰天天中見一白龍身長數十丈東向飛行空中光彩耀天因又見東面有白衣好女子亦於空中行西向就白龍徑入龍口中須臾復出三入三出乃止又還某右邊向某而又覺某左邊有一老翁著繡衣裳芙蓉冠柱赤九節杖而立俱視其白龍某問公何等女子徑入龍口耶公對曰此太素玉女蕭子夫取龍氣以煉形也此人似方相隸為官也某又問翁何人來登此宇公答曰我蓬萊仙公洛廣休此蓬萊山吾治此上府君故來乃得相見我耳某又問公曰此龍可乘否公答曰此龍當以待真人張誘世石慶安許玉斧丁瑋寧也某又問一龍而四人共乘耶公曰此侍晨帝官龍也譬如世軺車朱鳥更一日乘以上直也須臾間公呼此四賢未來之間某與公及此女以敷席共坐山上俱北向望海水及白龍並有設酒食酒中如石榴子合食之柈亦如世間柈柈中鮭也覺久久許四人並東來共乘一新犢車青牛青油重車上來到並揖此公及某並共語語畢公見語曰向所道四人此則是也覺張誘世年可五十石慶安甚童蒙年可十三四許玉斧年如今日所見丁瑋寧年可三十四五許並著好單衣垂幘履版惟慶安著空頂幘公又曰玉斧府君師友也某曰不然公又曰張誘世常山人公弟子也石慶安汲郡人鉤翼夫人弟子也才均德敵並人士也公因語四人言君並可各作一篇詩以見府君老子亦願聞文筆之美言也於是公各付一青紙及筆各一以與四人四人即取曰但恐倉卒耳於是石慶安先作詩其文曰靈山造太霞豎巖絶霄峰紫煙散神州乘飆駕白龍相攜四賓人東朝桑林公廣休年雖前所氣何蒙蒙實未下路讓惟年以相崇次張誘世作詩其文曰北遊太漠外來登蓬萊闕紫雲遘靈宮香煙何鬱鬱美哉樂廣休久在論道位羅並真人坐齊觀白龍邁離式四人用何時共解帶有懷披襟友欣欣高晨會次許玉斧作詩其文曰遊觀奇山峙漱濯滄流清遙觀蓬萊間巘巘衝霄冥紫芝被絳巖四階植琳矞紛紛靈華散晃晃煥神庭從容七覺外任我攝天生自足方寸裏何用白龍榮丁瑋寧作詩其文曰玄山構滄浪金房映靈軒洛公挺奇尚從容有無間形沉北寒宇三神棲九天同寮相率往推我高勝年弱冠石慶安未肯崇尊賢嘲笑蓬萊公呼此廣休前明公將何以卻此少年翰四人作詩畢並以呈公公讀畢而笑曰此詩各表其才性也石生有逸才而輕邁張生體和而難解許生廣慎而多疑丁生率隱而發遲夫輕邁則真氣薄難解則道不悟多疑則思無神發遲則得靈稽所謂殊途者也若能各返其迷悟其所悟不當速也府君弟子所謂管輅請論有疑疑則無神者矣言詩畢各起兵共下山下山之頃又見此女子乘白龍而北去某與諸人步行南下至山下而各各別去公曰復二十年當共會於七業宮遊此地也於是豁然乃悟汗流終日不能飲食初下半山見許主簿來上相逢於夾石之間公語主簿曰汝何來遲吾為汝置四升酒在山上坐處可往飲之而還逐我主簿即去上山須臾見還行甚疾未至山下相及公曰美酒不答云猶恨酸公曰此太平家酒治人腸也彥曰欲得長生飲太平何酸之有耶故是野家兒也守一慎勿失後當用汝輔翼君於是共至山下各別某末將主簿及玉斧東去公還上山其三人西去五十步公又遣一信見告云許牙纍府君某答云在意到十日夜某先具疏此夢上白諸真道得此異夢分明如不眠不審是何等願告之意唯紫微夫人見答云爾真氣內感靈求萬方神來八玄形與魂翔此實著至之象事顯幽冥非虛構也如洛公語也可密示斧子等勿廣宣露靈中旨也非小事哉深慎衆真並笑清靈曰以冥通冥也心感洞照南嶽君之力也又此一夢事後東間寫得既不自見本不知誰書所稱某處是楊君又當書此以呈長史故云某耳又此四月或即是乙醜年亦可是寅年耳十月二十三日夜夢在一大山上有人見告此是蒙山大洞室中也室四面坐相向皆柏床龍鬚席四壁多文字而不可了許長史著葛戔單衣白夾坐東面西向復有三人皆錦衣平上幘其一人自稱曰我趙叔臺父昔見汝於吳下矣定録告云昔趙叔台王世卿亦言篤學竟不知人意為北明公府所引則是似此人之子而不知是何時人耳吾坐北面南向許長史伏坐上因引筆作書乃沉吟思惟良久書畢即見示曰此書可通否耶書曰日月之道虔晟再拜今奉佳畫酒杯盤一具於南方來年六月可以入郭遣送之事好而又好水火之期求我於大木之日矣晟猶是成音漢時亦有人名此有學之而不得者未有不學而得之者也信哉斯言右長史寫青紙上因以見示意中云作此書欲以刻名也登難之曰郭是何義長史答曰是洞中似郭非冢墓之郭也又難曰何以為虔又答曰虔者敬之始下有文字敬之文耳又難曰何以為晟答曰晟者日下成侍日成而月得耳三錦衣人同贊曰幸哉幸哉學不可欺往來至道之時此一條楊自記所夢事不知是何年云六月入郭未測斯征也此上半行被剪除正應是稱姓名耳許先生前潛景逸世隱光九霄冥神洞觀頤光靈府幸甚幸甚平昔周旋纏綿盟誓超群先覺獨造方外先生年乃大楊君三十歲先生初入東山時楊始年十六絶迹時年十九如此明楊小便好道也自隔暉塵行已今日東眄雲漢涕先言隕伏想玄宮融和所蒞休宜時乘八風平蕩滓翳六天攝威消滅魔氣願使真正之信流行三元玄無之感變無窮矣君前臨發頻煩想夢所見贈惠手迹為信既感冥通銘得之後倏忽未頃如覺千載適能得之奇而難解所謂微乎妙哉微乎妙哉近即疏記所夢密呈此先生被試後楊君因書與之也一書麻紙極好此是寫本所以得存耳羲頓首頓首陰寒奉告承尊體安和以慰未得覲傾企謹白不具楊羲頓首頓首羲白公第三女昨來委瘵旦來小可猶未出外解群情反側動靜馳白頃疫癘可畏而猶未歇益以深憂給事許府君侯此六字折紙背題羲白二吏事近即因謝主簿屬鄭西曹鄭西曹亦以即處聽但事未盡過耳事過便列上也自已以為意此段陳胄王戎之徒實破的也謹曰此書失上紙羲頓首頓首奉告承尊體安和以慰劉家昨夜去使人惻惻似中後定也羲明日早與主簿至墓上省之也晚或復覲楊羲頓首頓首先昨亦得車問想當不審且以惋怛之自非研玄寶精有淩霜之乾者亦自然之常也長史許府君侯此六字題折紙背上也羲白奉賜絹使以充老母夏衣誠感西伯養老之惠然羲受遇過泰榮流分外徒銜戢恩眷無以仰酬至於絹帛之錫非復所當小小供養猶足以自供耳謹付還願深見亮羲白羲白此間故為清淨既無塵埃且小掾住處亦佳但羲尋還不得久共同耳尋更白羲白此二條共紙書又似失上紙羲頓首頓首宿昔更冷奉告承尊體安和以慰此覲返命不具楊羲頓首頓首羲白得主簿書云野中異事郤書別答奉覲乙二謹白此背無題恐失下紙羲頓首頓首旦白反不散風燥奉告承安和行奉勤白書不具楊羲頓首頓首羲白雲芝法不得付此信往羲別當自齎謹白長史許府君侯侍者白此九字題折紙背尋楊與長史書上紙重頓首下紙及單疏並名白又自稱名云尊體於儀式不正可解既非接隸意又乖師資法正當是作貴賤推敬長少謙揖意爾侍者之號即其事也都不見長史與楊書既是經師亦不應致輕此並應時制宜不可必以為準羲頓首頓首吉日攸慶未覲延情奉告承尊體安和以慰羲燒香始訖正爾當暫還家靜中晚乃親展謹白不具楊羲頓首頓首羲白野中未復近問然華新婦已當佳也惟猶懸心奉覲乙二羲白承今日獲稻昨已遣陳伋經紀食飲守視之謹白長史許府君侯此六字題折紙背應在山廨中答書十月五日也羲白符書訖有答教事脫忘送適欲遣承會得告今封付別當抄寫正本以呈也不審竟得服制蟲丸未若脫未就事者當以入年為始耶羲前所得分者即服日日為常不正聞有他異唯覺初時作六七日聞頭腦中熱腹中校沸耳其餘無他想或漸有理謹白羲白主簿孝廉在此奉集惟小慰釋小掾獨處彼方甚當悒悒羲比日追懷眷想不可言上下頃粗可承行垂念謹白羲白昨及今比有答教事甚忽忽始小闋爾頃在東山所得手筆及所聞本末往當以呈比展乃宣羲白羲白奉告具諸一二動靜每垂誨示勞損反側羲白羲白五色紙故在小郎處不令失也謹白羲白明日當東山主簿云當同行復有解廚事小郎又無馬羲即日答公教明日當先思共相併載致理耳不審尊馬可得送以來否此間草易於都下彼幸不用方欲周旋三秀數日事也謹白右此前五書並是在縣答長史書或是單疏或失上紙也羲白許東興昨中後見顧主人猶小設亦不覺久垂當去張泓續至其時日猶可也奉告云扶關入門甚為異事由羲不能節適酒食量宜遣賓伏用悚息願復察恕謹白此事在都答書長史當在護軍府中時羲白承撰集得五十許人又作敘真當可視乃益味玄之徒有以獎勸伏以慨然羲聞似當多此比類暮當倒笈尋料得者遣送謹白已具紙筆須成當自手寫一通也願以寫白石耳願勿以見人此當是煮石方或是五公腴法楊書自此後並是掾去世後事不知誰領録得存當是黃民就其伯間得也羲白漢書載季主事不乃委曲嵇公撰高士傳如為清約輒寫嵇所撰季主事狀贊如別謹呈洞房先進經已寫當奉可令王曠來取一作已白恐忘之謹又白今所有紅箋紙書者即是此也羲白承昨雨不得詣公想明必得委曲耳明晴暫覲乃宣羲白此三書似失上紙並是在都時答羲頓首頓首晴猶冷奉告承尊體安和以慰比復親展反命不備楊羲頓首頓首長史許府君侯侍者白此九字題折紙背羲白季主學業幽玄且道迹至勝乃當在卷之上首耶東卿君大歎季主之為人又羡委羽之高沖矣承撰集粗畢極當可視未睹華翰預已欣歎奉覲一二謹白所書東卿論季主事本別書青紙與此不相隨今在第四篇中所撰要當令得七十二人不審已得幾人若人少者亦當思啓冥中求其類例也然造一段作且當徐徐未可便出也亦欲自繕寫一通呈明公明公常所存棲乃希心於此者也羲白羲白孔安國撰孔子弟子亦七十二人劉向撰列仙亦七十二人皇甫士安撰高士宗亦七十二人陳長文撰耆舊亦七十二人此陳留耆舊也此一書首尾具而不見題當是函封也羲白別紙事覺憶有此乃至佳可上著傳中也輒待保降當咨呈求姓字亦又當見東卿此月內都當令成畢也動靜以白此又失上紙書語是初送神仙傳答也保降者須保命君來也又注此並書並似在縣下時非京都也仙傳猶未得治益要當代東卿至乃委曲耳昨日更委曲再三讀之故為名作益以慨然符待晴當畫之別白羲白傳未得書上王生所以爾者欲以見東卿東卿近來倉卒不得啓此須後至乃呈尊處已別有一本不審可留此處本否羲又欲更有所上所上者畢乃頓以奉還也謹白長史此仙傳遂不顯世不解那得如此恐楊以呈司命不許真事宣行因隱絶之也不審方隅山中幽人為己設坐於易遷戶中未聊白方隅幽人即謂掾也令設虛坐于其母戶中耳信還須牛明日食竟遣送右此書失上紙亦應是函封在縣下時羲頓首奉反告承服散三旦宣通心中此是得力深慰馳情願善將和無復感動羲頃公私勿勿是故替覲小闋奉展楊羲頓首頓首承二紀有患懸情近得師子書都不道病此必輕微耳小晴遣信參之謹白承石生往可念羲乃識之頃者甚多暴卒亦無題此似都下書羲頓首頓首奉告見所疏夢並上章本末尋省反覆夢既是注章亦苦到甚以慨然想此魍魎尋散滅耳比行奉覲楊羲頓首頓首別疏願不以示人諸所屈曲奉覲一二尊所疏夢當可解爾然大要是注氣之作也羲白羲近連亦夢小掾有所道小云云大都無他耳亦欲不復信夢悟故不上白耳尊疹患未和多當是注氣小動所以爾耳上章根具亦當足滅之謹白羲白昔得小掾細白布青紙香珠之屬然此逼左道虛妄之説是故不復稍説耳自當以此物期之甲申也諸所曲屈筆不能盡謹白自掾去後楊多有諸感通事長史既恆念憶故楊每及之也世中多不愜信幽顯所以不欲備説爾來已經太元九年元嘉二十一年兩甲申矣不知此所期謂在何時謂丁亥數周之甲申乎羲頓首頓首奉告承尊體不和餘疹連動懸情灼灼想當偶爾行損承欲章書自陳亦足以斷注鬼之害也夢悟亦不可專信惟當以心鎮之耳尋復平承楊羲頓首頓首承紀謁者還欣之尊已相見問其委曲邪謹白自小掾去世後略無月不作十數夢見之又於睡臥之際亦形見委曲也所言所行如平存爾然不信既著遠近所嗤不敢復言之也見告今具道夢聊復以白願不怪忤若尊意為此為罔罔者願見還當即以付火此書無題亦是函封掾恆面來共記托以睡夢耳於時諸遊貴或聞楊降神信者多所請問不信者則興誚毀故有此言以厲之
