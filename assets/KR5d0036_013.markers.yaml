  - {type: variant, offset: 4786, length: 0, content: '', HFL: 向中乃止於是服氣百二十過都畢道止如此使人長生不死辟却萬害所謂知白守黑求死不得知黑守白萬邪消却尤食六畜肉及五辛之菜當别寢靜思尤忌房室房室即死此道與守一相似但如爲徑要以減之耳忌房室甚於守一守一之忌在於節之耳初存氣出如小豆漸大衝天三氣纏煙繞身共同成一混沌忽生火在三煙之内又合景以鍊一身一身之裏五臟照徹此亦要道也此數人並已三百餘年正玄白之力也並是不死之學者未及於仙道玄白事已重抄岀在第三篇修用中計杜於建安初可年二十許至晋興}
