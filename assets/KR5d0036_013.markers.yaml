  - {type: variant, offset: 5869, length: 3, content: 相親愛, CK-KZ: 有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨爲業以活死爲事故祚及於英身矣竇武字游平竇融玄孫峙則應是融祖也武亦恒以財物散施天下貧乏靈帝時爲大將軍與陳蕃俱被誅其母產武時并產一蛇蛇出卽走上南山至母死無何而來哀泣良久又去亦所以爲異但未解俱承七世之慶兄戮而妹仙當非道家之北斗也鬼官別有北斗君以司生殺耳按孫皓敗將張悌軍人柳榮病死已三日旦忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晚悌戰死如此卽應是第四宮也今第五第六宮不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宮中總主諸六天宮}
  - {type: variant, offset: 5869, length: 3, content: 相親愛, CK-KZ-jye: 有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨爲業以活死爲事故祚及於英身矣竇武字游平竇融玄孫峙則應是融祖也武亦恒以財物散施天下貧乏靈帝時爲大將軍與陳蕃俱被誅其母產武時并產一蛇蛇出卽走上南山至母死無何而來哀泣良久又去亦所以爲異但未解俱承七世之慶兄戮而妹仙當非道家之北斗也鬼官別有北斗君以司生殺耳按孫皓敗將張悌軍人柳榮病死已三日旦忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晚悌戰死如此卽應是第四宮也今第五第六宮不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宮中總主諸六天宮}
  - {type: variant, offset: 5869, length: 0, content: '', WYG: 有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨為業以活死為事故祚及於英身矣竇武字游平竇融𤣥孫峙則應是融祖也武亦恒以財物散施天下貧乏靈帝時為大將軍與陳蕃俱被誅其母産武時并産一蛇蛇出即走上南山至母死無何而來哀泣良久又去亦所以為異但未解俱承七世之慶兄戮而妹當仙非道家之北斗也鬼官别有北斗君以司生殺爾按孫皓敗將張悌軍人柳榮病死已三日且忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晚悌戰死如此即應是第四宫也今第五第六宮不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宫中總主諸六天宮餘四天宮其四明公各在其中治雖云各治一宮又不顯各在何宮宫既並列復不得依位作四方言之尋其公次第髙下則第二宫名為西明公治第三宫東明公治第四宮北斗君治及次南次北也二天宮立一官六天凡立為三官三官如今刑名之職主諸考謫常以眞仙司命兼以總御之也並統仙府共司生死之任也大斷制皆由仙官道家常呼三官者是此也而消魔經云岱宗又有左火官右水官及女官亦名三官並主考罰今三茅君通掌之大君為都統保命為司察矣所以𨽻仙官者以為天下人不盡皆死其中應得眞仙則非北帝所詮或有雖死而神化反質者如此皆在眞仙家簡録故司命之職應而統之也鬼官北斗君乃是道家七辰北斗之考官此鬼一官又𨽻九星之精上屬北晨玉君府耳天上北斗有所司察故鬼官亦置此職以精象}
