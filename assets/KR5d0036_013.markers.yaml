  - {type: variant, offset: 5973, length: 5, content: 事皆有指趣, WYG: 弟一子是陳世京世京孫休時侍郎少好道數入佛寺中與契鄉里故晚又授法契初將寒華入建安之時時亦同舉實賴世京濟其宻計焉此數子今處茅山之外非常在洞中之客也亦時得入耳亦數至長史舍屋間遊戲然多在大茅之間建安初至孫休即位六十二年杜初從孫䇿不減年二十左右則逃時已年八十許矣}
