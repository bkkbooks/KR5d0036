  - {type: variant, offset: 4769, length: 1, content: 看, HFL: 便是不必復有定期也趙素臺在易遷宫中已四百年不肯徙自謂天下無復樂於此處也趙素臺是趙熙女漢時爲幽州刺史有濟窮人於河中救王惠等於族誅行隂德數十事故其身得詣朱陵兒子今並得在洞天中也熙恒出入在定録府素臺數微服遊行道巷盼山澤以自足矣趙熙漢書不顯微服遊行蓋謂在洞天中耳不應乃出世中也易遷中有高業而蕭條者有竇瓊英韓太華劉春龍王進賢李奚子郭叔香此數人並天姿鬱秀澄上眇邈才及擬勝儀觀駭衆此則主者之高者仙官之可才其次及得張善子輩鄧伯苗母有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨爲業以活死爲事故祚及於英身矣竇武字游平竇融玄孫峙則應是融祖也武亦恒以財物散施天下貧乏靈帝時爲大將軍與陳蕃俱被誅其母産武時并産一蛇蛇岀即走上南山至母死無何而來哀泣良久又去亦所以爲異但未解俱承七世之變兄戮而妹仙當非道家之北斗也鬼官别有北斗君以司生殺爾按孫皓敗將張悌軍人柳榮病死已三日旦忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晩悌戰死如此即應是第四宫也今第五第六宫不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宫中緫主諸六天宫餘四天宫其四明公各在其中治雖云各治一宫又不顯各在何宫宫既並列復不得依位作四方言之尋其公次第高下則第二宫名爲西明公治第三宫東明公治第四宫北斗君治及次南次北也二天宫立一官六天凡立爲三官三官如今刑名之職主諸考謫常以眞仙司命兼以緫御之也並統仙府共司生死之任也大斷制皆由仙官道家常呼三官者是此也而消魔經云岱宗又有左火官右水官及女官亦名三官並主考罰今三茅君通掌之大君爲都統保命爲司察矣所以隸仙官者以爲天下人不盡皆死其中應得眞仙則非北帝所詮或有雖死而神化反質者如此皆在眞仙家簡録故司命之職應而統之也鬼官北斗君乃是道家七辰北斗之考官此鬼一官又隸九星之精上屬北晨玉君天上北斗有所司察故鬼官亦置此職以精象相應統領既關琁璣是以仰隸太上之曹也府耳未必盡徑來也别更一二宻可示爾同氣令知斗處幽間之泰也道業可不勗哉此三人外書並不顯後漢有李雲亦爲白馬令以直言忤㫖死令示同氣者謂以告長史掾也七月二十四日夜保命君告按前受長史司馬諸人雖定録所告而應是初說}
