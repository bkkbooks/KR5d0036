  - {type: variant, offset: 4787, length: 0, content: '', krp: 三年始一百九十歲諸人又晩學而此云並三百餘年恐長三字亦强}
  - {type: variant, offset: 4788, length: 2, content: 暫登, HFL: 是二耳若欲守玄白者當與其經經亦少許耳自可兼行以除萬邪却千害行之三十年匿身隱形日行五百里一名此道爲胎精中景玄白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起别寢邪此一誥是論玄白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙教鬱八道騰五嶽何必秀名山亦足凌矯手攝洞阜棲心潜中興吐納胎精炁玄白誰能勝右杜廣平恒喜歌吟此今䟽相示右定録君道此此亦應同十四夜告從杜來九條并有掾寫共一篇峨峨岑山幽巖嶺芳卓卓先生乘和來翔散髮頽穎躬耕陵堽三餐自足不期裹糧玉迹東映鳳響西彰公侯招之凌風振裳處不矜嘿出不希揚被褐容與杖策頡頏此一篇有異手書乃接前詩後而後又仍接以蕭寂蓽門事既眞書止說前一篇已自右畢則此詩非復是杜所作而不知其義是誰近所摽靜舍地此金郷之至室若非許長史父子豈得居之後世當有赤子賢者乃得居此郷爾子孫事祕之不可輕泄按此所摽即應是後云長史所營屋宅處也金陵之地乃廣則此爲最勝之地非眞仙不得居故唯長史掾可居耳赤子賢者莫測爲誰或是姓赤或是大人或將來英賢應運者乃當復得居之既方是後世子孫時事則非今所宜預言兼以此地福重不欲宣廣使人濫住致有犯穢故也許長史今所營屋宅對東面有小山名雷平山周時有雷氏養龍來在此山後有姜叔茂田翁亦居焉其山北有柳汧水或名曰田公泉以其人曾居此山取此水故也雷平山在小茅北基址相連田公泉今具存左右甚多水柳樹故名柳汧此泉即前所云浣衣不用灰者長史宅自湮毁之後無人的知處至宋初長沙景王擅太妃供養道士姓陳爲立道士廨於雷平西北即是今北廨也後又有句容山其王文清後爲此廨主見傳記知許昔於此立宅因博訪耆宿至大明七年有術虚老公徐偶云其先視伏事許長史相傳識此宅只在今廨前烏柏樹處應是似猶有齋堂前井存于時草萊蕪没王即芟除尋覓果得磚井上已欲滿仍掘治更加甓累今有好水水色小白或是所云似鳳門外水味也於是審知是故宅從來空廢無敢居者既云金郷至室便爲}
