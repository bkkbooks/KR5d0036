  - {type: variant, offset: 4795, length: 8, content: 禮拜於靈岫邪可示, HFL: 周宣王十一年爲孫諸咎所殺越人又殺諸咎不知那得遠來葬此或當有神異處故也今尋視未見指的墳冢而如有兆域處者右定録君言右三條有掾寫華陽中玉碣文在童初府西向一云四面其文曰解帶被褐尋生理活養存三亦洞我玉文領理八老二十四眞不眠内視微氣綿綿把録太素玄之又玄神道在今子來乃臻易遷云鄧夫人語之解此則得仙此仙之要言易遷不解此}
