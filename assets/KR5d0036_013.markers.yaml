  - {type: variant, offset: 5892, length: 2, content: 長想, CK-KZ: 職主諸考謫常以眞仙司命兼以總御之}
  - {type: variant, offset: 5892, length: 2, content: 長想, CK-KZ-jye: 職主諸考謫常以眞仙司命兼以總御之}
  - {type: variant, offset: 5892, length: 0, content: '', WYG: 道昔在天柱山中今來華陽内為理禁伯理禁伯主諸水雨官也此人善能論空無乃談士常執本無理云無者大有之宅小有所以生焉積小有以養小無見大有以本大無有有亦無無焉無無亦有有焉所以我目都不見物物亦不見無寄有以成無寄無以得無於是無則無宅也太空亦宅無矣我未生時天下皆無無也其所論端據如此桐柏諸靈亦不能折也自云昔曾詣蓬萊宋晨生晨生者蓬萊左公也與其論無粗得人意過此已去尚未能本有安能本無邪與餘人論空無天下中皆無人焉其髙氣秉理如此東卿君紫微𤣥清亦莫得而千也理禁伯官亦保命之監國也此論空無之理乃殊得無宗而𤣥𤣥固難可曲覈矣眞人之才義亦是甚有優劣東卿桐柏紫㣲𤣥清蓋相推並言談之英辯者故舉此為標也按左傳稱君之世子從曰撫軍守曰監國監國之任則是副貳疑此監國或因作監司也趙威伯者東郡人也少學邯鄲張先生先生得道之人耳晚在中嶽授玉佩金鐺經於范丘林丘林乃是漢樓船將軍衞行道婦也學道得仙遂授行挹日月之道又服九靈明鏡華遂得仙昔亦來在華陽内為保命丞河圖云吳楚得有得見太平者其常語人云此語不虚此騐不及如此諸學者何可不彌加勤勵也其存明鏡非世間常法也受范丘林口訣云善嘯嘯如百鳥雜鳴或如風激衆林或如伐鼓之音時在天市壇上奮然北向}
