  - {type: variant, offset: 4793, length: 1, content: 鄉, HFL: 膏腴矣其西北即有長岡連亘呼爲長隱者也雷平山之東北有山俗人呼爲大横山其實名鬱岡山也名山記云所謂岡山者也下有泉水昔李明於此下合神丹而升玄洲水邊今猶有處所此山正東面有古時越翳王冢本墓字後人黵作冢此山今連延甚長後云古人合丹猶應是此李明但言在方隅則疑其小近南水邊不復見有基迹或漸蕪没故也越翳王是句踐四世孫初不肯立逃入菁山穴越人薰出之後於吴徙還會稽}
