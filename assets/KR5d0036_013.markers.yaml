  - {type: variant, offset: 5888, length: 2, content: 誠孝, WYG: 岫長林鬱青蔥𤣥鳥藏幽野悟言出從容鼔檝乘神波稽首希晨風未獲解脫期逍遥丘林中晨風謂上清玉晨之風非毛詩所謂鴥彼晨風之鳥也浪神九垓外研道遂金眞戢此靈鳯羽藏我華龍鱗髙舉方寸物萬吹皆垢塵顧哀朝生惠孰盡汝車輪女寵不弊席男愛不盡輪朝生蜉蝣也以喻人之在世易致消歇耳遊空落飛飆靈步無形方圓景煥明霞九鳯唱朝陽暉翮扇天津菴藹慶雲翔遂造太微宇挹此金棃漿逍遥𤣥垓表不存亦不亡𤣥垓九垓皆八極之外九霞之頂名也飛登木星亦名𤣥朗東陽之垓故若士語盧敖云吾與汗漫期於九垓之上矣駕歘舞神霄披霞帶九日髙皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闔幽冥戸靈變𤣥迹滅四朝為玉臺埶蓋郎故云髙皇齊龍輪定録言右十二條掾寫共一篇四朝燕國人也兄弟四人並得道四朝是長兄也眞法其司三官者六百年無違坐超遷之四朝職滿上補九宮左仙公領玉臺執蓋郎中間久闕無人後以思和代四朝也山下居民今猶呼一平澤地為郭千者是四朝之姓尚存於民口也四朝往曾使人種植於此地也年年四朝每行皆過詣此山以造思和遊㸔原阜此是茅傳中言也按如此說郭千止是種植處非居止也住處則長史宅果應是矣今塘牆既頹決水不復甚停人皆以為田耳然其地汗濶小壅猶自城池可得汎舟而歌但無人能追蹤逺世可歎如何後云此四朝年年行過遊㸔是上補去後猶復憶羡舊居所以數宴良常眷盼朋好張𤣥賔者定襄人也魏武帝時曾舉茂才歸鄉里事師西河薊公服术餌兼行洞房白元之事後遇眞人樊}
