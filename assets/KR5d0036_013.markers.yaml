  - {type: variant, offset: 5884, length: 2, content: 設床, WYG: 受胎化易形今來在此恒服三氣三氣之法存青氣白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止為之十年身中自有三色之氣遂得神仙此髙元君太素内景法旦旦為之臨目施行視日亦佳其法雖鮮其事甚騐許侯可為之此法亦以重抄書在第三篇修有事耳范監者即其人也昔得為童初監今在華陽中又别云曾為漢尚書郎善解地理以冡宅為意此亦在第三篇右三條並楊書河内李整昔受守一法并洞房得道初在洛陽山近來入華陽中又主諸考祟民間之事整往為常道鄉公傅受道入山時已年六十不知李作何位亦應是監職常道鄉公魏元帝本封也罡山東北有穴通大句曲南之方山之南穴姜伯眞數在此山上取石腦石腦在方山北穴下繁陽子昔亦取服此罡山猶是大横山故後云掾恒與方山五人往來但不知有路通洞天中不爾繁陽子即鹿迹洞中何苗也此北竚山中亦有此物未詳竚山在何處今句曲北鹿迹山西有名竚角山似當是其處也石腦故如石但小斑色而輭耳所在有之服此時時使人發熱又使人不渴李整昔未入山時得風痺疾久久乃愈耳此人先多房内事殆不同今者疾之輕薄也石腦今大茅東亦有形狀圓小如曾青而質色似鍾乳牀下乃皎白時有黒斑而虚輭服之乃熱為治亦似鍾乳也羅江大霍有洞臺中有五色隱芝此則南真及司命所任之處也華陽洞亦有五種夜光芝此則司命所請以植句曲内外者也良常山有熒火芝此物在地如熒火狀其實似草而非也大如豆形紫華夜視有光得食一枚心中一孔明食七枚七孔明可夜書計得食四十七枚夀萬年從來未聞有見之者當是無至心尋求耳包山中有白芝又有隱泉之水正紫色此即林屋山也在吳太湖中耳華陽雷平山有田公泉水飲之除腹中三蟲與隱泉水同味云是玉砂之流津也用以衣不用灰以此為異矣此水今從地涌出狀如沸水味異美取垢衣便自得淨即所呼為柳谷汧者在長史宅東南一里許也昔髙辛時有仙人展上公者於伏龍地植李彌滿其地展先生今為九宮内右司保其常向人說昔在華陽下食白李味異美憶之未久而忽已三千年矣諸厯檢課謂堯元年戊戌至齊之己卯歲二千八百三年髙辛即堯父說此語時又應在晉世而已云三千年即是堯至今不啻二千八百年外厯容或不定如此丁亥之數不將已過乎汲冢紀年正二千六百四十三年彌復大懸也後有郭四朝又於其處種五果又此地可種柰所謂福鄉之柰以除災厲秦時有道士周太賓及巴陵侯姜叔茂者來往句曲山下又種五果并五辛菜叔茂以秦孝王時封侯今名此地為姜巴者是矣以其因叔茂而名地焉地號今亦存有大路從小茅後通延陵即呼為姜巴路也但秦孝公時未并楚置郡巴陵縣始晉初不知那有巴陵之封恐是巴蜀之巴故也此二人並已得仙今在蓬萊為左卿今南鄭諸姜則叔茂之後茂曾作書與太極官僚云昔學道於鬼谷道成於少室養翮於華陽}
