  - {type: variant, offset: 5887, length: 0, content: '', WYG: 舉於逸域時乘飆輪宴我句曲悟言永歎代謝之速物存人亡我勞如何太賔亦有才藝善鼔琴昔教糜長生孫廣田廣田即孫登也獨絃能彈而成八音眞奇事也孫登即嵇康所謂長嘯者亦云見彈一絃之琴斯言非虚矣叔茂種五辛菜常賣以市丹砂而用之今山間猶有韭薤即其遺種邪今呼為韭山在大茅西甚多大韭又餘處亦有蒜薤耳非山姜巴一處也今舍前有塘乃郭四朝所造也髙其牆岸蓋水得深但歴代久逺塘牆頽下耳今舍語似是論長史宅宅前今乃有塘近西為堤牆即是遏柳汧水而去郭千甚遠郭千在北洞西北今有大陂塘四朝先應住此未解舍前之意恐長史於彼復立田業又有説在後四朝常乘小船游戲其中每叩船而歌曰清池帶}
  - {type: page-break, offset: 5887, content: '', id: KR5d0036_WYG_013-10a, image: WYG1059/WYG1059-0439a.png}
