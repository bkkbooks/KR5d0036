  - {type: variant, offset: 0, length: 660, content: 卷十二稽神樞第二昔累得書見意深照旨趣先書以年行西吳衰頹待老中夜慨歎莫與酬諮夫誠感有在亦得之無晚也次書告有年之志疇昔之好恆願真人稟受要訣仰接容景親奉徽音夫勤未上徹精未廣釐真要之騁未可豫及也後漢書云吾發自玄授金闕素名跨邁世跡超登清虛何玄標之渺邈奇洞之淵遠哉欲克己洗心沐浴芳流若能斯者今其時矣末書云廁聞要旨當修五靈自謂西造閬圃東遊玄洲不為邈絕求矜而誘之引而致之是為言貫于心良可啟矣恭佼音效五靈亦復至耳然道浮外跡未關內真是以雲車靈轅相適猶遐昔曾軫華僑依此而言則知華僑先亦蒙真降矣蓋應會敖世事有出嘿途不必靜苟有分無志申公所病遇至不為覆水始惋是以古唁有云逢時不邁山客拚粲者矣夫學道者固不宜恃其質分必當保任於清全矣於焉騁逸松期回輪紫清靈觀四響玄音合唱玉振雲奏不謀而和可謂秘道藏珍真暉之上挺也子建志有年今因以反子昔旨耳此一書似是裴君言且楊書此亦不與後玄帝相連恐非中君答也又長史此四書本今並不存矣玄帝者昔軒轅子昌意娶蜀山之女生高陽德號顓頊顓頊父居弱水之鄉頊身陶七河之津是為玄帝也仗萬靈以信順監眾神以導物役御百氣名致雷電於是乘結元之輦北巡幽陵南至交趾西濟流沙東至蟠木動靜之類小大之神日月所照莫不屬焉四行天下周旋八外諸有洞台之山陰宮之丘皆移安息之石封而填之鑄羽山之銅為寶鼎各獻以一於洞山神峰不獨句曲一山而已此所謂玄帝也此後並中君答前所諮問四條事複以闕上紙也說顓頊與五符語正同五符唯無埋鼎一事耳鮑靚靚及妹並是其七世祖李湛張慮本杜陵北鄉人也在渭橋為客舍積行陰德好道希生故令福逮于靚等使易世變練改氏更生合為兄弟耳根胄雖異德蔭者同故當同生氏族也今並作, CK-KZ-jye: ''}
