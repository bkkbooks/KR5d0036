  - {type: variant, offset: 5983, length: 7, content: 從定錄官寮來凡, WYG: 道常旦旦坐卧任意存泥丸中有黒氣存心中有白氣臍中有黄氣三氣俱仙如雲以覆身上因變成火火又繞身身通洞徹内外如此旦行之至日向中乃止於是服氣百二十過都畢道止如此使人長生不死辟却萬害所謂知白守黒求死不得知黑守白萬邪消却尤食六畜肉及五辛之菜當别寢静思尤忌房室房室即死此道與守一相似但如為徑要以減之耳忌房室甚於守一守一之忌在於節之耳初存氣出如小豆漸大衝天三氣纒煙繞身共同成一混沌忽生火在三煙之内又合景以錬一身一身之裏五臟照徹此亦要道也此數人並已三百餘年正𤣥白之力也並是不死之學者未及於仙道𤣥白事已重抄出在第三篇修用中計杜於建安初可年二十許至晉興寧三年始一百九十歲諸人又晚學而此云並三百餘年恐長三字亦强可是二耳若欲守𤣥白者當與其經經亦少許耳自可兼行以除萬邪却千害行之}
