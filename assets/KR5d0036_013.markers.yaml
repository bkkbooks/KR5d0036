  - {type: variant, offset: 4808, length: 508, content: 此亦應是中君仍前十二月一日言也東宮上人即青童君龜山賓即西王母上卷亦有此告令登伏龍以望山禮拜便異乎陟嶺非必以近易為言恐當宜然也昔有一人好道而不知求道之方唯朝夕拜跪向一枯樹輒云乞長生如此二十八年不倦枯木一旦忽然生華華又有汁甜如蜜有人教令食之遂取此華及汁並食之食訖即仙矣如是用心精誠之至也枯木尚能生紫華濯甘津況三秀之靈阿五芝所播植而不能數恭山岫洗拔滓穢者良可悲也世人所以褷此一字非真每不得如意者亦如子所不得如意耳豈異邪昔有劉少翁曾數入太華山中拜禮向山如此二十年遂忽一旦得見西嶽丈人授其仙道禁山符有西嶽君西嶽公不知是此丈人邪昔有一人數旦旦詣河邊拜河水如此十年河侯河伯遂與相見與其白璧十雙教授水行不溺法此人見在中嶽得道河侯河伯故當是兩神邪左慈初來亦勤心數拜禮靈山五年許乃得深進內外東西宮耳前云三月便得進與此大殊恐以深進為異也學道當如山世遠去人事如清虛真人步深幽當如周紫陽何有不得道邪世遠傳未出其舍家尋學事在讖書即尹公度弟子已得為太和山真人清虛王君紫陽周君各自有傳建志當令勤研神令虛所為所作當令密青童戒南真亦云學道唯須勤密勤即晝夜而勿怠密則非我而不知今中君復說此實為至諭可謂一言以蔽之右定錄君所道使疏此一條又有楊書夫望林者豈不想, HFL: ''}
