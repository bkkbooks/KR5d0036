  - {type: variant, offset: 6001, length: 1, content: 卷, CK-KZ: 條有某書隱居今所安經昭靈臺前欲立小石碣子刻書華陽頌十五篇皆讚述此山洞內外事庶以標誠靈府永垂遠世而未辦作石今且載其文於此曰河篇徵往册孔記昭昔名三宿麗天序兩金標地英右樞域宅無乃生有在有則還空靈構不待匠虛形自成功右質象總神列三府分途交五便陰暉迎夜晢晨精望曉懸右形位南峯秀玄鼎北嶺橫秦璧表裏玉沙津周回隱輪迹右標貫左帶柳汧水右浚陽谷川土懷北邙色井洌鳳門泉右區別郭千峙流岸姜巴亘遠蹤廟貌或時饗別宅乃恒恭右迹號吳居非知地越家詎隱遷樹蓋徒低蔭石竈未嘗煙右類附果林鬱餘㮏蔬圃蔓遺辛熒芝可燭夜田泉常澣塵右物軌降轡龜山客解駕靑華童寢宴含眞館高會蕭閑宮右遊集淸歌翔羽集長嘯歸雲翻孑絃有逸調空談無與論右才英標舍雷平下立靜連石陰上道已沖念飛華當軫心右學禀方嵎遊瓊刃華陽棲隱居重離儻或似七元乃扶胥右挺契號期行當滿亥數未終丁迨乃承唐世將賓來聖庭右機萌濟神旣有在去留從所宜靈迹何顯晦冥途自}
