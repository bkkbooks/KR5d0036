  - {type: variant, offset: 5876, length: 3, content: 伯苗母, WYG: 其中有女真二人總之其一女眞是張微子漢昭帝時將作大匠張慶女也㣲子好道因得尸解法而來入此亦先在易遷中微子常服霧氣自云霧氣是山澤水火之華精金石之盈氣也久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期文期青童之妹也微子曾精思於寢靜誠心感靈故文期降之授以服霧之道也服霧之道授微子微子亦時以教諸學在含真易遷中者我昔嘗得此方乃佳可施用者也服霧法常以平旦於寢静之中坐卧任己先閉目内視髣髴如見五臟畢因口呼出氣二十四過臨目為之使目見五色之氣相繞纒在靣上鬱然因又口内此五色氣五十過畢咽唾六十過畢乃㣲呪曰太霞發暉靈霧四遷結氣宛屈五色洞天神烟合啓金石華真藹鬱紫空鍊形保全出景藏幽五靈化分合明扇虚時乘六雲和攝我身上昇九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州𤣥都多有得此術者爾可行此法邪久行之常乘雲霧而遊此服霧法已别抄用事在第三篇中今猶疑存此與本文相隨也其一女眞是傅禮和禮和是漢桓帝外甥侍中傅建女也北地人其家奉佛精進女常旦夕灑掃佛前勤勤祝誓心願仙化神靈監其此心亦得來此久處易遷今始得為含真臺主也常服五星氣以得道禮和善歌歌則鳥獸飛聚而聽聲焉右定録君言張傳二人外書不顯或應各在家譜中右一條有楊書又掾冩王衍為晉武帝尚書令其女字進賢為愍懷太子妃洛陽亂劉曜石勒畧進賢渡孟津河於河中欲妻之進賢罵曰我皇太子婦司徒公之女而胡羌小子敢欲干我乎言畢}
