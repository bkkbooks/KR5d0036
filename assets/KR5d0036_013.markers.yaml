  - {type: variant, offset: 5612, length: 247, content: 館中都有八十三人又有協辰夫人者九宮之女也太上往遣來教此等法皆以保命授書協辰夫人主教領之也夫人漢司空黃瓊女黃景華也韓終授其岷山丹服得仙黃瓊江夏人字世英漢順帝時司空司徒太尉年七十九亡父名香章和帝時為尚書令救活千餘人瓊子琬司徒太尉為李權所殺夫人亦不知出適末今此諸人或稱女或稱婦或稱母蓋各取名達者而言之非必因附其功福所及也含真臺是女人已得道者隸太元東宮中近有二百人前云八十三人止是易遷耳含真既為貴勝當須遷轉乃得進入也此二宮盡女子之宮也又有童初蕭閑堂二宮以處男子之學也其男女名氏又出後並是略稱標勝者也計與, CK-KZ: ''}
