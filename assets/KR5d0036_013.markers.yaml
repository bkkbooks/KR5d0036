  - {type: 'tls:seg', offset: 4780, content: '', id: KR5d0036_tls_013-16a.6}
  - {type: variant, offset: 4781, length: 0, content: '', HFL: 氣秉理如此東卿君紫微玄清亦莫得而干也理禁伯官亦保命之監國也此論空無之理乃殊得無宗而玄玄固難可曲覈矣眞人之才義亦是甚有優劣東卿桐柏紫微玄清蓋相推並言談之英辯者故舉此爲標也按左傳稱君之世子從曰撫軍守曰監國監國之任則是副貳疑此監國或因作監司也趙威伯者東郡人也少學邯鄲張先生先生得道之人耳晩在中嶽授玉佩金鐺經於范丘林丘林乃是漢樓船將軍衛行道婦也學道得仙遂授行挹日月之道又服九靈明鏡華遂得昔亦來在華陽内爲保命丞河圖云吴楚多有得見太平者其常語人云此語不虚此驗不久如此諸學者何可不彌加勤勵也其存明鏡非世間常法也受范丘林口訣云善嘯嘯如百鳥雜鳴或如風激衆林或如伐鼓之音時在天巿壇上奮然北向長嘯呼風須臾雲翔其上衝氣動林或㝠霧飈合或零雨其濛矣保命有四丞此一人主爲暴雨水及領五芝金玉草若欲致洪雨者將可辭諧之也又理禁伯亦主雨水若請雨宜併爲辭也其一丞是咸陽樂長治東卿司命君郷里人也爲小君所舉用漢桓帝中書郎晩從中嶽李先生受道行七元法得仙相去二百餘年猶蒙卿邽之澤也一人是孟君入室弟子鄭雉正者孟君所屬用孟君京兆人或呼爲孟先生不知何名位其一人是西山唐房此則神仙傳所載是蜀人奉事李八百者也樂長治主灾害鄭雉正主考注唐公房主生死趙威伯主仙籍并記學道者并暴雨水靈芝草洞宫官寮司察吴越非民在任不過此四丞也其下則有四師事在第三篇中定録道此右此有掾寫依紙墨亦言前篇而中間有此失缺此行後又割恐别復有事并遺落深可恨惜耳杜契者字廣平京兆杜陵人建安之初來渡江東依孫策入}
