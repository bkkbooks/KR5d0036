  - {type: variant, offset: 4777, length: 1, content: 賓, HFL: 今在華陽宫洞内易遷之中六出時年二十二三許體貌亦整善有心節本姓田漁陽人魏故浚儀令田諷之孫諷曾有隂德之行以及於六出耳晋書云王衍長女名景風貌美賈后爲弟謐娶之少女名惠風以配愍懷太子恨之如此則不甚美也永嘉五年六月王彌劉曜石勒破洛賊欲逼妃妃拔刀曰我太尉公之女皇太子之妃有死而已終不爲逆虜所辱遂見害家人收葬於城西南洛水之北追謚曰貞定妃與此說小異范幼沖遼西人也受胎化易形今來在此恒服三氣三氣之法存青氣白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止爲之十年身中自有三色之氣遂得神仙此高元君太素内景法旦旦爲之臨目施行視日亦佳其法雖鮮其事甚驗許侯可爲之此法亦以重抄書在第三篇修有事中范監者即其人也昔得爲童初監今在華陽中又別云曾爲漢尚書郎善解地理以冢宅爲意此亦在第三篇右三條並楊書河内李整昔受守一法并洞房得道初在洛陽山近來入華陽中又主諸考崇民間之事整徃爲常道郷公傅受道入山時已年六十不知李作何位亦應是監職常道郷公魏元帝本封也罡山東北有穴通大句曲南之方山之南穴姜伯眞數在此山上取石腦石腦在方山北穴下繁陽子昔亦取服此罡山猶是大横山故後云掾恒與方山五人徃來但不知有路通洞天中不爾繁陽子即鹿迹洞中何苗也此北竚山中亦有此物未詳竚山在何處今句曲北鹿迹山西有名竚角山似當是其處也石腦故如石但小斑色而輭耳所在有之服此時時使人發熱又使人不渴李整昔未入山時得風痺疾久久乃愈耳此人先多房内事殆不同今者疾之輕薄也石腦今大茅東亦有形狀圓小如曾青而質色似鍾乳牀下乃皎白時有黑斑而虚輭服之乃熱爲治亦似鍾乳也羅江大霍有洞臺中有五色隱芝此則南眞及司命所任之處也華陽洞亦有五種夜光芝此則司命所請以植句曲内外者也良常山有熒火芝此物在地如熒火狀其實似草而非也大如豆形紫華夜視有光得食一枚心中一孔明食七枚七孔明可夜書計得食四十七枚壽萬年從來未聞有見之者當是無至心尋求耳包山中有白芝又有隱泉之水正紫色此即林屋山也在吴大湖中耳華陽雷平山有田公泉水飲之除腹中三蟲與隱泉水同味云是玉砂之流津也用以浣衣不用灰以此爲異矣此水今從地涌出狀如沸水味異美取浣垢衣便自得淨即所呼爲柳谷汧者在長史宅東南一里許也昔高辛時有仙人展上公者於伏龍地植李彌滿其地展先生今爲九宫内右司保其常向人說昔在華陽下食白李味異美憶之未久而忽已三千年矣諸曆檢課謂堯元年戊戌至齊之己卯歲二千八百三年高辛即堯父說此語時又應在晋世而已云三千年即是堯至今不啻二千八百年外曆容或不定如此丁亥之數不將已過乎汲冢紀年正二千六百四十三年彌復大懸也後有郭四朝又於其處種五果又此地可種柰所謂福郷之柰以除灾厲秦時有道士周太賔及巴陵侯姜叔茂者來住句曲山下又種五果并五辛菜叔茂以秦孝王時封侯今名此地爲姜巴者是矣以其因叔茂而名地焉地號今亦存有大路從小茅後通延陵即呼爲姜巴路也但秦孝公時未併楚置郡巴陵縣始晋初不知那有巴陵之封恐是巴蜀之巴故也此二人並已得仙今在蓬萊爲左卿今南鄭諸姜則叔茂之後茂曾作書與太極官僚云昔學道於鬼谷道成於少室養翮於華陽待舉於逸域時乘飈輪宴我句曲悟言永歎代謝之速物存人亡我勞如何太賔亦有才藝善鼓琴昔教糜長生孫廣田廣田即孫登也獨絃能彈而成八音眞竒事也孫登即嵇康所謂長嘯者亦云見彈一絃之琴斯言非虚矣叔茂種五辛菜常賣以巿丹砂而用之今山間猶有韭薤即其遺種邪今呼爲韭山在大茅西甚多大韭又餘處亦有蒜薤耳非止姜巴一處也今舍前有塘乃郭四朝所造也高其墻岸蓋水得深但歷代久遠塘墻頽下耳今舍語似是論長史宅宅前今乃有塘近西爲堤墻即是遏柳汧水而去郭千甚遠郭千在北洞西北今有大陂塘四朝先應住此未解舍前之意恐長史於彼復立田業又有說在後四朝常乘小船遊戲其中每叩船而歌曰清池帶靈岫長林鬱青葱玄鳥藏幽野悟言出從容鼓檝乘神波稽首希晨風未獲解脫期逍遥丘林中晨風謂上清玉晨之風非毛詩所謂鵷披晨風之鳥也浪神九垓外研道遂金眞戢此靈鳳羽藏我華龍鱗高舉方寸物萬吹皆垢塵顧哀朝生惠孰盡汝車輪女寵不弊席男愛不盡輪朝生蜉蝣也以喻人之在世易致消歇耳遊空落飛飈靈步無形方圓景焕明霞九鳳唱朝陽暉翮扇天津菴藹慶雲翔遂造大微宇挹此金黎漿逍遥玄垓表不存亦不亡玄垓九垓皆八極之外九霞之頂名也飛登木星亦名玄朗東陽之垓故若士語盧敖云吾與汗漫期於九垓之上矣駕欻舞神霄披霞帶九日高皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闔幽㝠户靈變玄迹滅四朝爲玉臺執蓋郎故云高皇齊龍輪定録言右十二條掾寫}
