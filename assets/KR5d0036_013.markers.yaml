  - {type: variant, offset: 5993, length: 0, content: '', WYG: 名此道為胎精中景𤣥白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起别寢邪此一誥是論𤣥白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙㪍鬱八道騰五嶽何必秀名山亦足淩矯手攝洞阜棲心濳中興吐納胎精炁𤣥白誰能勝右杜廣平恒喜歌吟此今疏相示右定録君道此此亦應同十四夜告從杜來九}
