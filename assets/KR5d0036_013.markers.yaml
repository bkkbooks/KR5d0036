  - {type: variant, offset: 4782, length: 1, content: 真, HFL: 稽嘗從之後爲孫權作立信校尉黄武二年漸學道遇介琰先生授之以玄白術隱居大茅山之東面也守玄白者能隱形亦數見身出此巿里契與徐宗度晏賢生合三人俱在茅山之中時得入洞耳或自採伐貨易衣糧於虚曲而人自不知之耳猶琰者即白羊公弟子也今在建安方山中也琰即禁山符云爲孫權所殺化形而去徃建安方山尋白羊公杜必當於此時受道也契音薛即與舜同契字四畫契三畫分毫有異也徐宗度晋陵人作孫皓左典軍吕悌司馬受風谷先生氣禁道故得契俱晏賢生是步陟外甥即宗度之弟子也契弟子二人一人孫賁孫女寒華也少時宻與契通情後學道受介琰法又以法受寒華寒華初去時先叛入建安依邵武長張毅毅即契通親故得免脫事平乃歸茅山耳寒華行玄白法而有少容今嘗俱處也玄白道忌房室自契受道不得行此吴豫章太守孫賁之子也山隂王孫奚之子寒華也尋此二人乃因奔淫無應入道而用志能自抑斷如此此宜其階也賁是權同堂兄有子四人各名鄰安熙䟽而無奚或是小名又無奚或爲王者也其弟一子是陳世京世京孫休時侍郎少好道數入佛寺中與契郷里故晚又授法契初將寒華入建安之時時亦同舉實賴世京濟其宻計焉此數子今處茅山之外非常在洞中之客也亦時得入耳亦數至長史舍屋間遊戲然多在大茅之間建安初至孫休即位六十二年杜初從孫策不減年二十左右則逃時已年八十許矣不容此爾世京今服术澤瀉寒華無所服茅山通無石室則必應起廬舍既有服餌便須藥具兼猶資衣糧不容都爲隱默但于時林芿幽阻無人尋迹耳守玄白之道常旦旦坐卧任意存泥丸中有黑氣存心中有白氣臍中有黄氣三氣俱}
