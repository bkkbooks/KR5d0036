  - {type: variant, offset: 4779, length: 1, content: 集, krp: 一篇四朝燕國人也兄弟四人並得道四朝是長兄也眞法其司三官者六百年無違坐超遷之四朝職滿上補九宫左仙公領玉臺執蓋郎中間久闕無人後以思和代四朝也山下居民今猶呼一平澤地爲郭千者是四朝之姓尚存於民口也四朝徃曾使人種植於此地也年年四朝每行皆過諧此山以造思和遊看原阜此是茅傳中言也按如此說郭千止是種植處非居止也住處則長史宅果應是矣今塘墻既頽决水不復甚停人皆以爲田耳然其地汗闊小壅猶自成池可得汎舟而歌但無人能追蹤遠世可歎如何後云此四朝年年行過遊看是上補去後猶復憶羡舊居所以數宴良常眷盼朋好張玄賔者定襄人也魏武帝時曾舉茂才歸郷里事師西河薊公服术餌兼行洞房白元之事後遇眞人樊子明於少室授以遯變隱景之道昔在天柱山中今來華陽内爲理禁伯理禁伯主諸水雨官也此人善能論空無乃談士常執本無理云無者大有之宅小有所以生焉積小有以養小無見大有以本大無有有亦無無焉無無亦有有焉所以我目都不見物物亦不見無寄有以成無寄無以得無於是無則無宅也太空亦宅無矣我未生時天下皆無無也其所論端據如此桐柏諸靈亦不能折也自云昔曾諧蓬萊宋晨生晨生者蓬萊左公也與其論無粗得人意過此已去尚未能本有安能本無邪與餘人論空無天下中皆無人焉其}
