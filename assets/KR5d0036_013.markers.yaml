  - {type: variant, offset: 4772, length: 0, content: '', HFL: 事是丑年十一月今此說雜人乃宜繼後反爲七月復不應是寅年進退極難詳從地下主者來凡十四條并有掾寫共一卷也含眞臺洞天中皆有非獨此也此一臺偏屬太元府隸司命耳其中有女眞二人緫之其一女眞是張微子漢昭帝}
