  - {type: variant, offset: 4773, length: 0, content: '', HFL: 將作大匠張慶女也微子好道因得尸解法而來入此亦先在易遷中微子常服霧氣自云霧氣是山澤水火之華精金石之盈氣也久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期文期青童之妹也微子曾精思於寢靜誠心感靈故文期降之授以服霧之道也服霧之道授微子微子亦時以教諸學在含眞易遷中者我昔嘗得此方乃佳可施用者也服霧法常以平旦於寢靜之中坐卧任己先閉目内視髣髴如見五臟畢因口呼出氣二十四過臨目爲之使目見五色之氣相繞纏在面上鬱然因又口内此五色氣五十過畢咽唾六十過畢乃微呪曰太霞發暉靈霧四遷結氣宛屈五色洞天神煙合啓金石華眞藹鬱紫空鍊形保全出景藏幽五靈化分合明扇虚時乘六雲和攝我身上昇九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者爾可行此法邪久行之常乘雲霧而遊此服霧法已别抄用事在第三篇中今猶疑存此與本文相隨也其一女眞是傳禮和禮和是漢桓帝外甥侍中傅建女也北地人其家奉佛精進女常旦夕灑掃佛前勤勤祝誓心願仙化神靈監其此心亦得來此久處易遷今始得爲含眞臺主也常服五星氣以得道禮和善歌歌則鳥獸飛聚而聽聲焉右定録君言張傅二人外書不顯}
