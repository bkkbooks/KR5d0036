  - {type: variant, offset: 5900, length: 1, content: 兒, WYG: 一丞是咸陽樂長治東卿司命君鄉里人也為小君所舉用漢桓帝中書郎晚從中嶽李先生受道行七元法得仙相去二百餘年猶蒙卿邽之澤也一人是孟君入室弟子鄭雉正者孟君所屬用孟君京兆人或呼為孟先生不知何名位其一人是西山唐房此則神仙傳所載是蜀人奉事李八百者也樂長治主災害鄭雉正主考注唐公房主生死趙威伯主仙籍并記學道者并暴雨水靈芝草洞宫官寮司察吳越非民在任不過此四丞也其下則有四師事在第三篇中定録道此右此有掾冩依紙墨亦言前篇而中間有此失缺此行後又割恐别復有事並遺落深可恨惜耳杜契者字廣平京兆杜陵人建安之初來渡江東依孫筞入㑹稽嘗從之後為孫權}
