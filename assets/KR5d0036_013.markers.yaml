  - {type: variant, offset: 4505, length: 253, content: 劉寬字文饒弘農華陰人父名崎順帝時為司徒寬為人謹厚常行有人失牛乃就寬車中認之寬無言解駕牛與之步歸頃有志者得牛而送還慚懼寬乃謝遣之桓帝延熹八年為南陽太守恆用蒲鞭靈帝嘉平五年為太尉嘗於御坐被酒睡伏帝問太尉醉邪寬仰答臣不敢醉但任重責大憂心如醉耳嘗有客來詣寬寬遣奴市酒迂久大醉而還客罵為畜產寬須臾遣人視奴疑恐自殺語左右曰此是人而罵為畜產為辱孰甚故吾懼其死耳後封逮鄉侯六百戶中平二年亡年六十六贈車騎將軍時進諡曰昭討侯子松嗣按此說複為同異故詳載之青谷先生無別顯出凡此諸引教仙人恐皆是下教限不爾則不應得輒然華陽中事當更示爾, CK-KZ: ''}
