  - {type: variant, offset: 5874, length: 1, content: 厚, WYG: 為白馬令以直言忤㫖死令示同氣者謂以告長史掾也七月二十四日夜保命君吿按前受長史司馬諸人雖定録所告而應是初說洞中事是丑年十一月今此說雜人乃宜繼後反為七月復不應是寅年進退極難詳從地下主者來凡十四條並有掾冩共一卷也含眞臺洞天中皆有非獨此也此一臺偏屬太元府𨽻司命}
