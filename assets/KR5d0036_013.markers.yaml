  - {type: variant, offset: 5880, length: 2, content: 鄭夫, WYG: 投河中其侍婢名六出復言曰大既有之小亦宜然復投河中時遇嵩髙女真韓西華出遊而愍之撫接二人遂獲内救外示死形體實宻濟便將入嵩髙山今在華陽宮洞内易遷之中六出時年二十二三許體貌亦整善有心節本姓田漁陽人魏故浚儀令田諷之孫諷曾有陰德之行以及於六出耳晉書云王衍長女名景風貌美賈后為弟謐娶之少女名惠風以配愍懷太子恨之如此則不甚美也永嘉五年六月王彌劉曜石勒破洛賊欲逼妃妃拔刀曰我太尉公之女皇太子之妃有死而已終不為逆虜所辱遂見害家人收葬於城西南洛水之北追謚曰貞定妃與此說小異范幼沖遼西}
