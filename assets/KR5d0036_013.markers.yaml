  - {type: variant, offset: 1565, length: 2362, content: 映挺雙理自分必能鵬飛辰阿雲扇靈元高振玉宇攜轡秀真可謂邈乎其奇落絕之視也於是洞陰之宮內臺下觀風無羽琅之鼓草無瓊金之流嚮雖渟光正明動回五象固乞屈之夾觀小天之浮景耳何足絓卿司之至念紆蘭真以盼汜邪然鑒無不應圓想必通所以興詠事外跡亦並匝苟誠之所企吾無隱也想善建重離之明以期於必詣之會皓清明朗賢亦俱學而得耳不令我等有蹙頞下風矣弘之而已此是受前書後一月日複受此猶論答欲見洞宮事所以有後說也善建重離之明如似指魏傳青錄文而長史名字不相應既已稱俯玄仰白在瓊刃前則此別當有義況也右一條楊書定錄官寮有左右理中監準今長史司馬職又有北河司命主水官考此職常領九宮禁保侯禁保侯職主領應為種民者今洞宮自二君以下便次此三職為大矣左理中監準大府長史昔用韓崇以居之崇字長季吳郡毗陵人也少好道林屋仙人王瑋玄曾授之以流珠丹一法崇奉而修之大有驗瑋玄語之子行此道亦可以出身仕宦無妨仙舉也崇遂仕稍至宛陵令行仁以為政用道以撫民虎狼深避蝗不集界遷汝南太守拔書佐袁安安後位至司徒時人通以崇有識物之鑒也陰皇后葬京師近郡二千石妻當會園陵而崇獨居清素妻忿崇哭泣詔問其故太常馮奚答曰汝南太守韓崇清苦遠尚味道忘形身享重官而妻自紡績政化仁簡視民如傷深達奇博有君子之鑒斯則昏夕之夜光陛下之子產也妻不通寒儉之節哭怨無衣將足以顯崇明德耳上奇之加崇俸祿秩中二千石後孝明皇帝巡狩汝南上治崇府崇使妻出住孤獨老嫗家上聞歎曰韓崇所謂百煉不銷也賜縑五十匹崇在郡積十四年政化洽著舉天下最年七十四瑋玄乃授以隱解法得去入大霍山受瑋玄遁化泥丸紫戶術以度世今在洞中為左理中監漢書所載事跡亦略同而置辭小異耳袁安字邵平初為縣功曹被舉歷仕遂至三公和帝時卒即袁紹高祖也晉世又有馮奚亦為太常名位同耳韓既隱解必是托尸今晉陵上有韓塚崔巍高大從來相呼為韓塚疑如桃君或即是此虛壙而世呼為孫策將韓當塚也云王瑋玄是楚莊王時侍郎受術於玉君若是春秋時楚莊王者疑侍郎之官不似古職而漢楚王又無莊諡右理中監準職如司馬今有劉翊字子翔者居之翊本潁川人少好道德而家世大富常周窮困為事好行陰德密惠陳留張季札當弔師喪車敗牛困翊於汝南界逢之與語不示名字即推車牛與乘之恤死救窮非一人矣後都長安翊舉計掾到都帝嘉其心拜郎中遷陳留太守出長安五百里中斂死恤窮損己分人行達陽平遂遇馬皇先生告翊曰子仁感天地陰德神鬼太上將嘉子之用情矣使我來攜汝以長生之道吾仙官也爾乃能隨我去不翊於是叩頭自搏少好長生幸遇神仙乞願侍給馬皇先生因將翊入桐柏山中授以隱地八術服五星之華法今度名東華來在洞中為定錄右理中監漢書云翊字子相潁陰人家世豐富常能周施而不以為惠曾行於汝南界中有陳留張季札遠赴師喪遇寒冰車敗頓滯道路翊見而謂曰君慎終赴義行宜速達即下車與之不告姓名策馬而去季札意其子相也後故到潁陰還所假乘翊閉門辭行不與相見常守志臥疾不屈聘命河南種巘臨郡引為功曹後黃巾賊起翊救給乏絕資其食者數百人鄉族死亡則為殯斂鰥寡則助其妻娶獻帝遷都西京舉上計掾爾時道路寇阻翊夜行晝伏乃到長安上嘉其忠勤拜議郎遷陳留太守翊又散珍寶唯餘車馬自載東歸出關數百里見士大夫病亡道次仍又以馬易棺脫衣斂之又逢故知飢困於路不忍委去因殺所駕牛以救其乏眾人止之翊曰視沒不救非志士也遂俱餓死此說大同小異故備載之論翊字子翔於字例相得而翊義亦是相相作息亮切音二者未詳孰正馬皇出列仙傳黃帝時馬師也定錄府有典柄執法郎是淳于斟字叔顯主試有道者斟會稽上虞人漢桓帝時作徐州縣令靈帝時大將軍辟掾少好道明術數服食胡麻黃精餌後入吳烏目山中隱居遇仙人慧車子授以虹景丹經修行得道今在洞中為典柄執法郎易參同契云桓帝時上虞淳于叔通受術于青州徐從事仰觀乾象以處災異數有效驗以知術故郡舉方正遷洛陽市長如此亦為小異吳無烏目山婁及吳興並有天目山或即是也慧車子無別顯出十二月一日夜定錄君所道此即同是丑年所受云北河司命頃闕無人昔以桃俊兼之耳俊似錢唐人少為郡幹佐未負笈到太學受業明經術災異晚為交址太守漢末棄世入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也幼平教俊服九精煉氣輔星在心之術俊修之道成今在洞中兼北河司命主水官之考罰此位雖隸定錄其實受事於東華宮中節度桃俊字翁仲者也漢書無此事今塚在錢唐臨平墳壇歷然苗裔猶存鄉近時聞鼙角之響故人不敢侵毀之皆知呼為桃司命塚錢唐杜徵士事京產先與隱居共有詩詠以贊述斯德別在集中幼平亦無所顯出張激子當為太極仙侯激子者河內張奉者也字公先少時名激子耳此人亦少發名字太傅袁隗嘆其高操妻以女女服飾奢麗奉不顧眥無異路人婦改服乃後成室家也後棄世入剡山遇山圖公子山圖公子周哀王時大夫仙人者也授激子九雲水強梁煉桂法激子修此得道今在東華宮行為太極所署也或領九宮尚書與北河侯對職治水考北河司命或為禁保侯亦併共業故也北河司命亦治在洞天之中與張激子對局魏書云張範字公儀河內修武人祖歆漢司徒父延太尉袁隗欲以女妻範範辭不受性恬靜樂道徵命不就後為議郎參丞相魏武軍事甚見敬重好賑救窮乏家無餘財以建安十七年卒弟承字公先亦知名以方正拜議郎諫議大夫趙郡太守後隨魏武西征至長安病亡此說名字翻覆大異承與奉乃相類而非袁婿若是範又其字不同詳按事跡恐多是兄也魏書王修傳又云修往來南陽多止張奉舍奉舉家病修營拯之按張範兄弟乃嘗避地往揚州投袁術又非劉表不應在南陽二三為疑也山圖公子出列仙傳中候夫人所道尋洞中事皆二君所說如此兩條獨是中候夫人者當本是東華中職寮故也我聞易遷中人竇氏言云北河司命禁保侯似有所擬想當審爾竇氏即瓊英也似有所擬者當是長史故中君受云北河司命方驗也恐受業高後定不復為此職然主領種民事亦相符保命府多女官司三官官屬有七人四女三男明晨侍郎七人如今世上御史中丞之職並隸東華方諸宮保命君總關之耳明晨侍郎周爰支者漢河南尹周暢伯持之女也暢汝南安成人好行陰德功在不覺曾作河南尹遭大旱收葬洛陽城旁客死骸骨萬餘人為立義冢祭祀之應時大雨豐收所行多是此輩太上處以暢有陰行令爰支從南宮受化得仙今在洞中爰支亦少好道服伏苓, CK-KZ: 束藏魄}
