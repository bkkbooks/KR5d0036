  - {type: variant, offset: 4775, length: 1, content: 龜, HFL: 楊書又掾寫王衍爲晋武帝尚書令其女字進賢爲愍懷太子妃洛陽亂劉曜石勒略進賢渡孟津河於河中欲妻之進賢罵曰我皇太子婦司徒公之女而胡羌小子敢欲干我乎言畢即投河中其侍婢名六出復言曰大既有之小亦宜然復投河中時遇嵩高女眞韓西華出遊而愍之撫接二人遂獲内救外示死形體實宻濟便將入嵩高}
