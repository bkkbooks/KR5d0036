  - {type: variant, offset: 5914, length: 5, content: 為贈當往洞, WYG: 舜同契字四畫契三畫分毫有異也徐宗度晉陵人作孫皓左典軍吕悌司馬受風谷先生氣禁道故得契俱晏賢生是歩陟外甥即宗度之弟子也契弟子二人一人孫賁孫女寒華也少時宻與契通情後學道受介琰法又以法受寒華寒華初去時先叛入建安依邵武長張毅毅即契通親故得免脫事平乃歸茅山耳寒華行𤣥白法而有少容今嘗俱處也𤣥白道忌房}
