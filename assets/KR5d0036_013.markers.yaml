  - {type: variant, offset: 1001, length: 218, content: 之益左慈字元放李仲甫弟子即葛玄之師也魏武父子招集諸方士慈亦同在中建安末渡江尋山仍得入洞又乞丹砂合九華丹九華丹是太清中經法小括即小括蒼山在永嘉橋縭之北凡此諸人術解甚多而仙弟猶下者並是不聞三品高業故也許先生所以興嘆句曲有五門有心立志清齋三月登尋此門皆可即得得可入但人自不能齋尋之耳來問欲知宮室所作闊狹多少男女主領人數當更相示來疏亦復泰盡邪勤自當見亦何事爾亦何事爾又當先呈啟司命司命令答道宮室之委曲者吾乃敢言之耳此自是司命之別宮吾人亦不得為洞, CK-KZ: 上}
