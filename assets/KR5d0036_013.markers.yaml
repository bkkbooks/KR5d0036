  - {type: variant, offset: 5908, length: 5, content: 爾杯布殆相, WYG: 徐宗度晏賢生合三人俱在茅山之中時得入洞耳或自採伐貨易衣糧於虛曲而人自不知之耳猶琰者即白羊公弟子也今在建安方山中也琰即禁山符云為孫權所殺化形而去往建安方山尋白羊公杜必當於此時受道也契音薛即}
