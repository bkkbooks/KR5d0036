  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 握眞輔第二三月十九日夜夢小掾來在此靜中坐良久自說小茅山三會水處極可看戲向從四平山中來路上見叔父持火炬滿手欲以作變先生可向阿郎道如此鬼火使人口噤不得語此物乃化爲風先生知之不小掾又曰方山大有侯叔草異佳葉乃大昨乃大取近乃失去布複𧙢欲就先生乞此衣掾兩庶生叔並早亡不知此當是誰者方山卽四平山所謂遊處方源常與龍伯高等爲旅也旣採南燭又乞複𧙢則在洞中者猶須衣食故云杜廣平亦伐薪貿糧而況今洞上之士乎斯眞豈復不知斷穀特是不應爲之耳小掾又曰今葬處不吉斷墓脉多所云云右十九日夕所夢此則前書所六以白者如此則掾亦還葬舊墓雖曰虛塚猶須吉地右與長史書今所見眞手者訖此厶厶前少一行又闕失上兩字情兼無以喻懷尋省來告粗承同之僕尋往相見近矣比者翹注良不可言給事安和卽長史也以十九日南州二十二日當還功曹已入昨相見慰懷功曹掾庶長兄小名揆者也方爾悠悠未卒歸也將琴絃之陰德乎聊當一笑琴絃事出彭素經房中之術也此卽日無他公明日當復南州與大司馬別大司馬剋二十六發也第七似不從征公是簡文爲司徒也大司馬是桓温也鎭在姑熟應北伐慕容第七似是掾叔小名嗣伯者爲尚書郎于時是太和四年已巳嵗三月中書也乃遠送米將供洞齋之備耶若君遠研玄鏡澄聲上音在深林之中遐人事之跡使此物之來卒無緣也於今逢耳誠理盡備矣洞齋卽大洞齋法今有眞書小訣如此則掾是備行上品七}
