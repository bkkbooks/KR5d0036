  - {type: variant, offset: 1, length: 0, content: '', HFL: 之十八定八金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造握眞輔第二三月十九日夜夢小掾來在此靜中坐良久自說小茅山三會水處極可看戲向從四平山中來路上見叔父持火炬滿手欲以作變先生可向阿郎道如此鬼火使人口噤不得語此物乃化爲風先生知之不小掾又曰方山大有侯叔草異佳葉乃大昨乃大取近乃失去布複栻欲就先生乞此衣掾兩庶生叔並早亡不知此當是誰者方山即四平山所謂遊處方源常與龍伯高等爲旅也既採南燭又乞複栻則在洞中者猶須衣食故云杜廣平亦伐薪貿糧而況今洞上之士乎斯眞豈復不知斷穀特是不應爲之耳小掾又曰今葬處不吉斷墓脉多所云云右十九日夕所夢此則前書所六以白者如此則掾亦還葬舊墓雖曰虚塚猶須吉地右與長史書今所見眞手者訖此前少一行又闕失上兩字情兼無以喻懷尋省來告粗承同之僕尋徃相見近矣比者翹注良不可言給事安和即長史也以十九日南州二十二日當還功曹已入昨相見慰懷功曹掾庶長兄小名揆者也方爾悠悠未卒歸也將琴絃之隂德乎聊當一笑琴絃事出彭素經房中之術也此即日無他公明日當復南州與大司馬别大司馬剋二十六發也第七似不從征公是簡文爲司徒也大司馬是恒温也鎮在姑熟應北伐慕容第七似是掾叔小名嗣伯者爲尚書郎于時是太和四年己巳歲三月中書也乃遠送米將供洞齋之備耶若君遠研玄鏡澄聲上音在深林之中遐人事之跡使此物之來卒無縁也於今逢耳誠理盡備矣洞齋即大洞齋法今有眞書小訣如此則掾是備行上品七卷耳想所寫已了校當令熟秋冬之間其經當復示也不知是何經明年掾便遁化也故服不春草生此物易尋想數詣玄水之處逍遥也僕此月必徃叙其不久南燭冬乃不彫春時色味彌好既呼爲則是掾合服石和者所以定録云次服飯兼穀無違但一劑干𣏌其事不同耳即不知玄水在何處也亦不煩屬李李疾病未攝事承田己爲勞意敕語陳暉如此必有秋望也此誠小小不暫勞君意者則事去矣給事云南州還當并急四月半間欲至東山想無差錯矣比更告茶一簿直注行下云茶一簿未正可解當爲寄與掾也茶則是茗掾患淡飲所須兼亦以少寐也一日不見君常恐鄙恡之心已生矣君未復能屑屑中出於風塵之間耶右八條楊書並是在都送還山與掾失上紙此書師與弟子灼然作君僕用古體也承給事體氣如故且甚延悚念侍省遑懼辭正爾燒香入靜具啓夜當根陳情事使盡丹苦之理動靜别白尋更承問此少上紙似在縣下答虎牙道長史病事糊連給事前後書上啓神母因書小掾并呈前後答神母云小掾截留給事書唯餘此見還此亦是虎牙是掾去後事也神母應是南眞夫人右楊君在此所寫外書及自記夢事并與答長史兩掾諸書疏及有存録者記此又别有紀事酬答眞人書己在前篇中長史書暮卧先存斗星在所卧席上暮卧存星之時皆先隂呪星名然後存耳祝畢乃存星安卧其中也然後宻叩齒祝九星之精右二條長史抄修洞房事見斧云酉年學戌年當歸戌年道炁當行天下云從戌年當受法此一條是掾去後所記掾記是庚午年去此戌年即應癸酉甲戌年受法者是就其眞人受經二奔之道十一年成眞故定録云復十六年乃覩我於東華者也經云主諸關鏡聦明始此黄庭經中語九月}
