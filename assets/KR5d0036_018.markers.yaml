  - {type: variant, offset: 844, length: 151, content: 里殿東西千步南北三百步上坐萬人庭中可受十萬人二世為趙高所殺於宜春宮宮在城南三里二世葬其傍司馬相如所云墓蕪穢而不修者是也秦斂天下兵器鑄以為銅人十二置此十四字共一行行前魚爛餘十在今足令成字如此之諸宮漢時皆在長安董卓壞以為錢餘二人徙在青門裏東宮前魏明帝欲徙詣洛載至霸城重不能致今在霸城大道南胸前有銘曰皇帝二十, CK-KZ: 日}
