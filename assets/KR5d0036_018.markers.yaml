  - {type: variant, offset: 1460, length: 2, content: 間聞, CK-KZ: 欣然此是作餘姚還爲尙書郎時也以閏月四日夕夢綵物如旛形皆舒著席上或如畫或如錦繡文字煥炳如言可解而不可解愈舒愈更奇異云是楊舍人物時亦不見楊君也意言當寫取云須能畫人整頓所未常見當有十許旛太和八年閏十月而楊君年二十三簡文始爲司徒恐未爲舍人亦恐是後年諸閏耳十一月十二日夢棺器露有水十二月十八日左右夢以鐵釵刺玄武此玄武恐是所言墓之玄武也非所存龜蛇者也二十一日夢見天子天子當年十六七許在殿上此應康帝時不知是何年重復夢見在一處懸嶮自放落下岐危遙見劉升遠與語從此當迴還迴還道難得一細以手巾穿之見吾城扶助吾遂得迴旋右六條並長史自記夢事十月九日詭上厨五人旨南山治此長史自記事旨應作旨謂指誓雷平宅淨金也牙詣夫人詭當用雙金環汝無吾當具交以謝恩也厚若有金貫便以奉夫人云以謝吏兵華功曹至意密語新婦脫婦字令知宻之宻之若無便可以二雙金環奉跪勿𠫤勿𠫤若欲得體上所寶玩者爲好華功曹似是華僑而後又云楊意旨恐是非也厚似是虎牙婦也吾近日疏與汝說二君應有詭其夕卽有誥云吾二人吏兵若無功詭後小子不復爲人使楊意旨中謂可用釵小君卽言釵所以導達開通自可用也新婦有金釵卽可用可停貫也先詣夫人次詣二靈汝疇量之汝索鐶如一日疏新婦銀釵亦可用良無便當用鐶吾停汝辭須詭當詭辭繼其下也不復別作此書卽涉前事也得佳淸閑云敕汝修內經是保命汝不答漠漠不當爾然此非常意皆發自冥妙當作本末答當奉行此意口又無言爲不可也內經或應是黃庭不爾卽應是}
