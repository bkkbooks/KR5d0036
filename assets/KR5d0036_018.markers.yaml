  - {type: variant, offset: 3547, length: 337, content: 佳畫酒杯盤一具於南方來年六月可以入郭遣送之事好而又好水火之期求我於大木之日矣晟猶是成音漢時亦有人名此有學之而不得者未有不學而得之者也信哉斯言右長史寫青紙上因以見示意中云作此書欲以刻名也登難之曰郭是何義長史答曰是洞中似郭非塚墓之郭也又難曰何以為虔又答曰虔者敬之始下有文字敬之文耳又難曰何以為晟答曰晟者日下成侍日成而月得耳三錦衣人同贊曰幸哉幸哉學不可欺往來至道之時此一條楊自記所夢事不知是何年云六月入郭未測斯征也此上半行被剪除正應是稱姓名耳許先生前潛景逸世隱光九霄冥神洞觀頤光靈府幸甚幸甚平昔周旋纏綿盟誓超群先覺獨造方外先生年乃大楊君三十歲先生初入東山時楊始年十六絕迹時年十九如此明楊小便好道也自隔暉塵行已今日東眄雲漢涕先言隕伏想玄宮融和所蒞休宜時乘八風平蕩滓翳六天攝威消滅魔氣, CK-KZ: 敕慰竦息陰炁}
