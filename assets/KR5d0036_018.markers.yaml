  - {type: variant, offset: 85, length: 0, content: '', WYG: 恡之心已生矣君未復能屑屑中出於風塵之間耶右八條楊書並是在都送還山與掾失上紙此書師與弟子灼然作君僕用古體也承給事體氣如故且甚延悚念侍省惶懼辭正爾燒香入靜且啟夜當根陳情事使盡丹苦之理動靜别白尋更承問此少上紙似在縣下答虎牙道長史病事糊連給事前後書上啟神母因書小掾并呈前後答神母云小掾截留給事書唯餘此見還此亦是虎牙是掾去後事也神母應是南真}
