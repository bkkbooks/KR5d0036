  - {type: variant, offset: 1996, length: 1372, content: 月九日戊寅夜鼓四夢北行登高山迷淪不寤至明日日出四五丈乃覺覺憶登山半日許至頂上大有宮室數千間鬱鬱不可名山四面皆有大水而不知是何處某因仰天天中見一白龍身長數十丈東向飛行空中光彩耀天因又見東面有白衣好女子亦於空中行西向就白龍徑入龍口中須臾復出三入三出乃止又還某右邊向某而又覺某左邊有一老翁著繡衣裳芙蓉冠柱赤九節杖而立俱視其白龍某問公何等女子徑入龍口耶公對曰此太素玉女蕭子夫取龍炁以煉形也此人似方相隸為官也某又問翁何人來登此宇公答曰我蓬萊仙公洛廣休此蓬萊山吾治此上府君故來乃得相見我耳某又問公曰此龍可乘否公答曰此龍當以待真人張誘世石慶安許玉斧丁瑋寧也某又問一龍而四人共乘耶公曰此侍晨帝官龍也譬如世軺車朱鳥更一日乘以上直也須臾間公呼此四賢未來之間某與公及此女以敷席共坐山上俱北向望海水及白龍並有設酒食酒中如石榴子合食之柈亦如世間柈柈中鮭也覺久久許四人並東來共乘一新犢車青牛青油重車上來到並揖此公及某並共語語畢公見語曰向所道四人此則是也覺張誘世年可五十石慶安甚童蒙年可十三四許玉斧年如今日所見丁瑋寧年可三十四五許並著好單衣垂幘履版惟慶安著空頂幘公又曰玉斧府君師友也某曰不然公又曰張誘世常山人公弟子也石慶安汲郡人鉤翼夫人弟子也才均德敵並人士也公因語四人言君並可各作一篇詩以見府君老子亦願聞文筆之美言也於是公各付一青紙及筆各一以與四人四人即取曰但恐倉卒耳於是石慶安先作詩其文曰靈山造太霞豎巖絕霄峰紫煙散神州乘飆駕白龍相攜四賓人東朝桑林公廣休年雖前所炁何蒙蒙實未下路讓惟年以相崇次張誘世作詩其文曰北遊太漠外來登蓬萊闕紫雲遘靈宮香煙何鬱鬱美哉樂廣休久在論道位羅並真人坐齊觀白龍邁離式四人用何時共解帶有懷披襟友欣欣高晨會次許玉斧作詩其文曰遊觀奇山峙漱濯滄流清遙觀蓬萊間巘巘衝霄冥紫芝被絳巖四階植琳矞紛紛靈華散晃晃煥神庭從容七覺外任我攝天生自足方寸裏何用白龍榮丁瑋寧作詩其文曰玄山構滄浪金房映靈軒洛公挺奇尚從容有無間形沉北寒宇三神棲九天同寮相率往推我高勝年弱冠石慶安未肯崇尊賢嘲笑蓬萊公呼此廣休前明公將何以卻此少年翰四人作詩畢並以呈公公讀畢而笑曰此詩各表其才性也石生有逸才而輕邁張生體和而難解許生廣慎而多疑丁生率隱而發遲夫輕邁則真炁薄難解則道不悟多疑則思無神發遲則得靈稽所謂殊途者也若能各返其迷悟其所悟不當速也府君弟子所謂管輅請論有疑疑則無神者矣言詩畢各起兵共下山下山之頃又見此女子乘白龍而北去某與諸人步行南下至山下而各各別去公曰復二十年當共會於七業宮遊此地也於是豁然乃悟汗流終日不能飲食初下半山見許主簿來上相逢於夾石之間公語主簿曰汝何來遲吾為汝置四升酒在山上坐處可往飲之而還逐我主簿即去上山須臾見還行甚疾未至山下相及公曰美酒不答云猶恨酸公曰此太平家酒治人腸也彥曰欲得長生飲太平何酸之有耶故是野家兒也守一慎勿失後當用汝輔翼君於是共至山下各別某末將主簿及玉斧東去公還上山其三人西去五十步公又遣一信見告云許牙累府君某答云在意到十日夜某先具疏此夢上白諸真道得此異夢分明如不眠不審是何等願告之意唯紫微夫人見答云爾真炁內感靈求萬方神來八玄形與魂翔此實著至之象事顯幽冥非虛構也如洛公語也可密示斧子等勿廣宣露靈中旨也非小事哉深慎眾真並笑清靈曰以冥通冥也心感洞照南嶽君之力也又此一夢事後東間寫得既不自見本不知誰書所稱某處是楊君又當書此以呈長史故云某耳又此四月或即是乙醜年亦可是寅年耳十, CK-KZ: ''}
