  - {type: variant, offset: 5862, length: 586, content: 縣下時羲頓首奉反告承服散三旦宣通心中此是得力深慰馳情願善將和無復感動羲頃公私勿勿是故替覲小闋奉展楊羲頓首頓首承二紀有患懸情近得師子書都不道病此必輕微耳小晴遣信參之謹白承石生往可念羲乃識之頃者甚多暴卒亦無題此似都下書羲頓首頓首奉告見所疏夢並上章本末尋省反覆夢既是注章亦苦到甚以慨然想此魍魎尋散滅耳比行奉覲楊羲頓首頓首別疏願不以示人諸所屈曲奉覲一二尊所疏夢當可解爾然大要是注氣之作也羲白羲近連亦夢小掾有所道小云云大都無他耳亦欲不復信夢悟故不上白耳尊疹患未和多當是注炁小動所以爾耳上章根具亦當足滅之謹白羲白昔得小掾細白布青紙香珠之屬然此逼左道虛妄之說是故不復稍說耳自當以此物期之甲申也諸所曲屈筆不能盡謹白自掾去後楊多有諸感通事長史既恆念憶故楊每及之也世中多不愜信幽顯所以不欲備說爾來已經太元九年元嘉二十一年兩甲申矣不知此所期謂在何時謂丁亥數周之甲申乎羲頓首頓首奉告承尊體不和餘疹連動懸情灼灼想當偶爾行損承欲章書自陳亦足以斷注鬼之害也夢悟亦不可專信惟當以心鎮之耳尋複平承楊羲頓首頓首承紀謁者還欣之尊已相見問其委曲邪謹白自小掾去世後略無月不作十數夢見之又於睡臥之際亦形見委曲也所言所行如平存爾然不信既著遠近所嗤不敢複言之也見告今具道夢聊複以白願不怪忤若尊意為此為罔罔者願見還當即以付火此書無題亦是函封掾恆面來共記托以睡夢耳於時諸游貴或聞楊降神信者多所請問不信者則興誚毀故有此言以厲之, CK-KZ: 前篇}
