  - {type: variant, offset: 183, length: 141, content: 禽也罔起此在乎群麗攬搰乎激奇之際終年不足以極其變萬殊不足以適其內日月不足以曜其目八澤不足以遊其足青雲為卑九垓為淺八紘為小四極為近以此變動無常恆入芥子之內玉晨之玉寶太微之威神矣玄玄即排起調彈恭柏榮並是神虎隱文揮神詩中句如今再注之乃取楊雄玄為論中語更小增損易奪之故當是理符義會可得然也夫, CK-KZ: 經仙者}
