  - {type: variant, offset: 321, length: 311, content: 然也夫心與治遊乎太和唯唐虞能充其任矣神與化蕩乎無境唯伏羲能承其統故二十五弦之具非牙曠不能以為神弓矢質的之具非羿逢蒙不能以為妙耶此一篇亦是玄為論中語不知此復以何所明喻耳猶如引抱朴外篇博喻中語也凡有異處皆以朱書為別如此也若夫奇神倏詭恢譎無方陰陽之所煥育川澤之所函藏則羲和浴日於甘淵烏飛司景於扶桑江非登湄而解佩二女御風於瀟湘潛蛟龍戰於玄泉蕃丘喪馬於淮陽靈洲海運於南極東山遙集於帝鄉驊騮抗轡於巨龜江使感夢於宋王是以洞庭雖廣濟之不容刀盧龍雖峻越之不崇朝岷山懸嶺絕闊千仞束馬綿竹則安樂歸晉遼海泱瀁橫帶天渠公孫不競則其亡忽諸若夫飛壺白馬即墨天山三江之浸九河之源尚曷足語哉吾子飛軒結駟駕眄林薄徒聞山河之寶魏國所以未究夫吳起一言而武侯心作也, WYG: 仙}
