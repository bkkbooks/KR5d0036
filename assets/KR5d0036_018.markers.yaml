  - {type: variant, offset: 6210, length: 238, content: 一年兩甲申矣不知此所期謂在何時謂丁亥數周之甲申乎羲頓首頓首奉告承尊體不和餘疹連動懸情灼灼想當偶爾行損承欲章書自陳亦足以斷注鬼之害也夢悟亦不可專信惟當以心鎮之耳尋複平承楊羲頓首頓首承紀謁者還欣之尊已相見問其委曲邪謹白自小掾去世後略無月不作十數夢見之又於睡臥之際亦形見委曲也所言所行如平存爾然不信既著遠近所嗤不敢複言之也見告今具道夢聊複以白願不怪忤若尊意為此為罔罔者願見還當即以付火此書無題亦是函封掾恆面來共記托以睡夢耳於時諸游貴或聞楊降神信者多所請問不信者則興誚毀故有此言以厲之, HFL: 八}
