  - {type: variant, offset: 84, length: 0, content: '', WYG: 士乎斯真豈復不知斷穀特是不應為之耳小掾又曰今葬處不吉斷墓脈多所云云右十九日夕所夢此則前書所云以白者如此則掾亦還葬舊墓雖曰虛塚猶須吉地右與長史書今所見真手者訖此厶厶前少一行又闕失上兩字情兼無以喻懷尋省來告粗承同之僕尋往相見近矣比者翹注良不可言給事安和即長史也以十九日南州二十二日當還功曹已入昨相見慰懷功曹掾庶長兄小名揆者也方覺悠悠未卒歸也將琴絃之陰徳乎聊當一笑琴絃事出彭素經房中之術也此即日無他公明日當復南州與大司馬别大司馬剋二十六發也第七似不從征公是簡文為司徒也大司馬是桓溫也鎮在姑孰應北伐慕容第七似是掾叔小名嗣伯者為尚書郎于時是太和四年己巳嵗三月中書也乃遠送米將供洞齋之備耶若君遠研𤣥鏡澄聲上音在深林之中遐人事之跡使此物之來卒無緣也於今逢耳誠理盡備矣洞齋即大洞齋法今有真書小訣如此則掾是備行上品七卷耳想所寫已了校當令熟秋冬之間其經當復示也不知是何經明年掾便遁化也故服不春草生此物易尋想數詣𤣥水之處逍遙也僕此月必往叙其不久南燭冬乃不彫春時色味彌好既呼為則是掾合服石和者所以定錄云次服飯兼榖無違但一劑千杞其事不同耳即不知𤣥水在何處也亦不煩屬李李疾病未攝事承田已為勞意敕語陳暉如此必有秋望也此誠小小不暫勞君意者則事去矣給事云南州還當并急四月半間欲至東山想無差錯矣比更告茶一簿直注行下云茶一簿未正可解當為寄與掾也茶則是茗掾患淡飲所須兼亦以少寐也一日不見君常恐}
