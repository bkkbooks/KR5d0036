  - {type: variant, offset: 5069, length: 582, content: 當在護軍府中時羲白承撰集得五十許人又作敘真當可視乃益味玄之徒有以獎勸伏以慨然羲聞似當多此比類暮當倒笈尋料得者遣送謹白已具紙筆須成當自手寫一通也願以寫白石耳願勿以見人此當是煮石方或是五公腴法楊書自此後並是掾去世後事不知誰領錄得存當是黃民就其伯間得也羲白漢書載季主事不乃委曲嵇公撰高士傳如為清約輒寫嵇所撰季主事狀贊如別謹呈洞房先進經已寫當奉可令王曠來取一作已白恐忘之謹又白今所有紅箋紙書者即是此也羲白承昨雨不得詣公想明必得委曲耳明晴暫覲乃宣羲白此三書似失上紙並是在都時答羲頓首頓首晴猶冷奉告承尊體安和以慰比復親展反命不備楊羲頓首頓首長史許府君侯侍者白此九字題折紙背羲白季主學業幽玄且道跡至勝乃當在卷之上首耶東卿君大歎季主之為人又羨委羽之高沖矣承撰集粗畢極當可視未睹華翰預已欣歎奉覲一二謹白所書東卿論季主事本別書青紙與此不相隨今在第四篇中所撰要當令得七十二人不審已得幾人若人少者亦當思啟冥中求其類例也然造一段作且當徐徐未可便出也亦欲自繕寫一通呈明公明公常所存棲乃希心於此者也羲白羲白孔安國撰孔子弟子亦七十二人劉向撰列仙亦七十二人皇甫士安撰高士宗亦七十二人陳長文撰耆舊亦七十二人此陳留耆舊也此一書首尾具而不見題當是函封也羲白別紙事覺憶有此乃至佳可上著傳中也輒待保降當諮呈求姓字亦又當見東卿此月內都當令成畢也動靜以白此又失上紙書語是初送神仙傳答也保降者須保命君來也又注此並書, CK-KZ: ''}
