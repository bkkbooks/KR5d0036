  body:
  - {type: variant, offset: 1, length: 0, content: '', CK-KZ: 耳想所寫已了校當令熟秋冬之間其經當復示也不知是何經明年掾便遁化也故服飢不春草生此物易尋想數詣玄水之處逍遙也僕此月必往叙其不久南燭冬乃不彫春時色味彌好旣呼爲飢則是掾合服石和者所以定錄云次服飢飯兼穀無違但一劑干祀其事不同耳卽不知玄水在何處也亦不煩屬李李疾病未攝事承田己爲勞意敕語陳暉如此必有秋望也此誠小小不暫勞君意者則事去矣給事云南州還當并急四月半間欲至東山想無差錯矣比更告茶一簿直注行下云茶一簿未正可解當爲寄與掾也茶則是茗掾患淡飲所須兼亦以少寐也一日不見君常恐鄙恡之心已生矣君未復能屑屑中出於風塵之間耶右八條楊書並是在都送還山與掾失上紙此書師與弟子灼然作君僕用古體也承給事體氣如故且甚延悚念侍省遑懼辭正爾燒香入靜具啟夜當根陳情事使盡丹苦之理動靜別白尋更承問此少上紙似在縣下答虎牙道長史病事糊連給事前後書上啟神母因書小掾并呈前後答神母云小掾截留給事書惟餘此見還此亦是虎牙是掾去後事也神母應是南眞夫人右楊君在此所寫外書及自記夢事并與答長史兩掾諸書疏及有存錄者記此又別有紀事酬答眞人書巳在前篇中長史書暮卧先存斗星在所卧席上暮卧存星之時皆先陰呪星名然後存耳祝畢乃存星安卧其中也然後密叩齒祝九星之精右二條長史抄修洞房事見斧云酉年學戌年當歸戌年道炁當行天下云從戌年當受法此一條是掾去後所記掾記是庚午年去此戌年卽應癸酉甲戌年受法者是就其眞人受經二奔之道十一年成眞故定錄云復十六年乃覩我於東華者也經云主諸關鏡聰明始此黃庭經中語九月}
