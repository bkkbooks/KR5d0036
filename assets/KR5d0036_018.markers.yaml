  - {type: variant, offset: 996, length: 456, content: 年初兼天下諸侯以為郡縣正法律均度量大人來見臨洮身長五丈足迹六尺秦丞相蒙恬李斯所書也缺失秦字廟中鍾絺四枚皆在漢高祖廟中魏明帝徙二枚詣洛故尚方南銅駝巷中是也漢昭帝平陵宣帝杜陵二銅鍾在長安夏侯征西欲徙詣洛重不能致之在青門裏道南其西者是平陵鍾東者杜陵鍾也此後少始皇陵一事鴻門在始皇陵北十餘里漢書云張良解厄於鴻門者也秦王應是楚王作秦王誤耳項籍以沛公為漢王都漢中而分關中為三秦章邯為雍王都大丘今槐里是也司馬欣為塞王都櫟陽今萬年縣是也董翳為翟王都高奴高奴縣在咸陽西北今省高祖自漢中北出襲三面皆平之漢書云乘釁而運席卷三秦者也此三縣今皆有都邑故處也此後少十五六條事當是零失也杜陵宣帝陵也宣帝少依許氏在杜縣葬於南原立廟於曲池之北號曰樂遊廟因菀為名也徙關東名族四十五姓以陪杜陵司馬相如弔二世云臨曲江之洲謂曲池也此一條增損語小異不解那得始此右此前十條並楊君所寫錄潘安仁關中記語也用白箋紙行書極好當是聊爾抄其中事東方有赤氣之內有詠言曰小鮮未烹鼎言我巖下悲此是東華宮中歌詩之辭整控啟素鄉河靈已前驅此兩句是揮神詩中之辭風伯不搖條神虎所挾扶十一, CK-KZ: ''}
