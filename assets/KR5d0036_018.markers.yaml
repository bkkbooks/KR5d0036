  - {type: variant, offset: 1457, length: 1, content: 倏, CK-KZ: 七月二十八日八月十九日九月十六日十月十三日十一月十日十二月七日右老子拔白日此是太淸外術事似長史自抄用正月庚申二月辛酉三月庚戌四月癸亥五月壬子六月癸丑七月甲寅八月乙卯九月甲辰十月丁巳十一月丙午十二月丁未右上帝煞害日不可請乞百事無宜此諸日皆是隨月支干衝破凶日也可以類求之亦恐非眞受雖百事無宜而常所脩行或値諸吉恐不可闕也所謂靜室者一曰茅屋二曰方溜室三曰環堵制屋之法用四柱三桁二梁取同種材屋東西首長一丈九尺成中一丈二尺二頭各餘三尺後溜餘三尺五寸前南溜餘三尺棟去地九尺六寸二邊桁去地七尺二寸東南開戸高六尺五寸廣二尺四寸用材爲戸扇務令茂密無使有隙南面開牖名曰通光長一尺七寸高一尺五寸在室中坐令平眉中有板床高一尺二寸長九尺六寸廣六尺五寸薦席隨時寒暑又隨月建周旋轉首壁墻泥令一尺厚好摩治之此法在名山大澤無人之野不宜人間入室春秋四時皆有法然此蓋本道相承道家之一事耳不足爲異也粗要知是以及道機作靜室法與此異恐是別有告受者而不知審的今存想入室亦可依之或云應有經也以正月十五日尙書省中直乞夢非常皆靈仙眞像多所道其子孫慶以閏月二日夕又夢仙靈共會吾請乞佳應又見有厶缺失一字非常好以月半中}
