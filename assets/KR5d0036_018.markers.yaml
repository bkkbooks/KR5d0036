  - {type: variant, offset: 1670, length: 1, content: 籠, CK-KZ: 人皆迴還見禮路邊有一人白衣似卜師因見語云君體羸不堪事可專修所行勿雜他事若不專君當得病君不見信者自當得夢此人自稱姓縢主簿卽兄虎牙也七月向末玉斧夢身體飛揚豁然入一屋下累床南向坐自謂是合日揚光顚迴五辰之道此語出消魔經太上之辭焉見一人在東面立手舒卷書看見如畫圖像山岳狀下輒有書說亦與執書人語良久八月三日夕夢忽有一人弊衣長形容從一小兒來如徇簫簫作嘯旨謂如今徇嘯賣物人也坐與玉斧語乃說上道事斧仍驚愕更危坐須臾將進內戸大論上道顧小兒莫令人見我外鼓斧問樂耶謂鈞天廣樂上淸之曲也云不來欲得可取之爾君自當得鈞樂因問鈞樂幾人答曰十人一鈞大法乃至於萬不知道至十萬仍覺復眠又夢見卷書見玉斧書先舒惟見後是王君事似四輔傳盡共在上多論王君學道時見語學道厯年事自可須二三年間邪意甚敬此人未得拜便覺末見主簿亦在坐泰和元年八月三十日夕夢得一帙有四小卷書云是神母書或云是傳皆以靑細布爲秩秩兩頭紅色書皆是素時先生亦在間又爲玉斧書此傳上篇於戸外壁辟方素上其字似符或如獸像帙布亦不正似布謹記先生卽楊君也泰和三年三月二十五日夕玉斧夢行見天上白雲彌滿纏合甚下而不高仰望雲間時有空處狀如山穴東行數步覺東北有大道便順道行得一深室或如石室白炁從室中出又似水鬱勃來}
