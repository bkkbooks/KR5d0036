  - {type: variant, offset: 4109, length: 0, content: '', CK-KZ: 甯見殺時頭先患瘡瘡流面目檢譜不見載賤當是婦人不顯名也六月二日夜小君授書其夕長史亦夢此夢字也眞書多如此死生之機得失之會蓋更切耳何不遠存玄味躭虛摽流乎求之近應應愈賒也此亦入失之路耳想體尙高韻不細求之於毫末矣七月二十六日夜紫微夫人授作令與許長史右從小茅君來凡十八條楊書七月二十七日禺中許主簿華侯當入靜中爾時無復所有爲防未然耳近不得以疾篤告者我愼法之故且世人知未病之困必泄三官之禁則累加漏身增瘵絕疾今何乃用憂之甚耶名身誰親葢宜思之縱令以小代大如父何如大小俱來於母何如衰自己身訟自家人耳三官自有成事憂惋亦無所解自非齊達於内外者將不得不懼悸今月六日是赤孫絶日先處事耳今雖停放無所復畏然四帥逆已關之於都禁至日爲能遣尸殺使者看望之雖弗復慮矣至日父母將入靜中靜中疾發亦無苦也我其日亦當視汝右三事小茅君說右三條厶書八月六日父母將赤子入靜燒香北向陳乞於二君爾時自當有所見所見萬無所苦也其日中時當有前日碧衣介華袴人來在靜前立徘徊者小君也可就請乞也八月六日中當有一人著平上幘多髭鬚長長爾著紫皮袴褶將黃娥來此人是鬼帥王延也延自爲人作益爲將娥見人耳娥其日或當被縛華書吏其日當內井上助主人耳日中當來須臾去也故宜力上風注冢訟章於卻氣毒之來往也三過如此考者匿矣夫散翳布考皆因人之不陳疾者懼焉則精胎內戰是故疚痾流發非唯一身而已今所以令上章者亦以遏虎牙之盈縮耳范中候所道如此范中候名邈卽是撰南眞傳者許厚當謝詭南眞夫人吏兵告大章如此右小君以小代大復請何爲當啓太上停之何如右小君牙亦爾耶勿忩忩演小子耳許牙何豫乎焉敢復相追爾娥與厚有水火之書吾近承南眞命推縛盡執也小鬼頭不制服豈足憂亦許長史用心之所尅也右小君許厚自是其丈人所責責亦至也責不以家事往來之賓經意意亦當得之也云何每爾此自家長之教忌不豫我也重謝斗當必釋耳范帥頃者以其不詭乃欲不復豫事我不聽之今無爲也詭當一須疾愈送斗恒渴而飲不可飲食多困故而不可食子婦不經心亦不可不令知死丈人之責耶故宜以家事爲勤爲爾不已或能致之於丈人宇下受教耶八月二日夜小君授書此使示斧右十條楊書許長史所使人盜他家狗六頭於長史竈下蒸煮共食之長史何以不檢校使臭腥之氣薰染肴飯旣食而步上道亦已犯眞人之星也有一白犬俗家以許禱土地鬼神云何令人盜烹之土地神言許長史教之使爾不言小人盜自爾也密尋之爾在宇下而不覺恐方有此此亦足以爲一病宜愼八月六日夜茅小君授以與許長史亦宜有辭詣南嶽夫人乞疾病得愈之意又宜辭詣}
