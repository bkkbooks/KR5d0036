  - {type: variant, offset: 4033, length: 0, content: '', WYG: 無所憂不煩此詭可還之右保命君語許侯勿憂嗣伯之詭且還之右右英夫人語小君曰我二人吏兵恐宜詭謝獻以體上之宻寳不爾小子後不肯復為爾用力也許厚之徒也許子所頼在其弟許牙所頼在其父佳事不可忘也惡事不可忘也又為寳宻闗達機宻銀亦為次寳也其今多情彌精耳後勿復數爾勞損其神右小茅君㖟所言許賤者戴石子之女也為讐家薛世等所殺又世殺賤抱小兒阿寜賤今在水官與兒相随骸骨流漂亦訟在三官求對考今生人也寜見殺時頭先患瘡瘡流面目檢譜不見戴賤當是婦人不顯名七月二日夜小君授書其夕長史亦得此夢字也真書多如此死生之機得失之㑹蓋更切耳何不逺存𤣥味躭虚標流乎求之近應應愈賖也此亦入失之路耳想體尚髙韻不細求之於毫末矣七月二十六日夜紫㣲夫人授作令與許長史右從小茅君來凡十八條楊書七月二十七日禺中許主簿華侯當入静中爾時無復所有為防未然耳近不得以疾篤告者我慎法之故且世人}
