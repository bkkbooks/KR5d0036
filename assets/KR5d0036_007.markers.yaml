  - {type: variant, offset: 4057, length: 4, content: 彌貫萬物, WYG: 令上章者亦以遏虎牙之盈縮耳范中候所道如此范中候名邈即是撰南真傳者許厚當謝詭南真夫人吏兵告大章如此右小君以小代大復請何為當啓太上停之何如右小君牙亦爾耶勿怱怱演小子耳許牙何豫乎焉敢復相追爾娥與厚有水火之書吾近承南真命推縛盡執也小鬼頭不制服豈足憂亦許長史用心之所尅也右小君許厚自是其丈人所責責亦至也責不以家事往來之賓經意意亦當得之也云何每爾此自家長之教忌不豫我也重謝斗當必釋耳范帥頃者以其不詭乃欲不復豫事我不聽之今無為也詭當一湏疾愈送斗恒渇}
