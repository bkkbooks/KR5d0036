  - {type: variant, offset: 4020, length: 2, content: 歎息, CK-KZ: 復有冀不此二書長史答先因通華僑意似酬前書而又言用火之言此授今闕右二條厶書茅小君去五月中失日有言云華僑漏泄天文妄說虛無乃今華家父子被考於水官華僑之失道由華騎之佞亂破壞其志念華團華西姑者三官因之以試觀試遂不過僑於是得有死罪故名簡早削奪尋輸頭皮於水官也可密尋彼家有此人名不是誰者此前並是酬問華氏事不知是子年丑年耳許朝者暴殺新野郡功曹張煥之又枉煞求龍馬此人皆看尋際會比告訴水官水官逼許斗使還其邱墳伺察家門當衰之子欲以塞對解逼示彼訟者耳是斗亡月亡日其應至矣君自受命當能治滅萬鬼羅制千神且欲視君之用手耳欲令無他者宜以此日詣斗墓叱攝煥等制敕左官使更求考代震滅爭源也可勿宣此當言我假威於君矣不知君宜往試攝滅之耳滅鬼之迹事中蹔應爾}
