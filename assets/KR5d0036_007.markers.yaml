  - {type: variant, offset: 4019, length: 0, content: '', CK-KZ: 追愧悚昔憑賴華氏每輒奬勸願其有成得見陶冶而躭味華競蹈道不篤恒欲與共淸閑使意盡言苦而已趣向不同密言難遇然喁喁之懷要欲獻其丹款矣不審故}
