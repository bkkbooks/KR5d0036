  - {type: variant, offset: 2, length: 16, content: 甄命授第二服術敘紫微夫人此有椽書, CK-KZ-jye: 神煥領八明委順靈根寶鍊三度養液和魂假使衝風繁激將不能伐我之正性也絕飈勃藹焉能迴己之淸淳耶爾乃空沖自吟虛心待神營攝百絕栖澄至眞當使憂累靡干於玄宅哀念莫擾於絳津也淡泊眇觀顧景共歡於是至樂自鎗零聞於}
  - {type: page-break, offset: 2, content: '', id: KR5d0036_YP-C_20ziji-01-0084a, image: JY237/20ziji-01-0084a.png}
  - {type: variant, offset: 6, length: 1, content: 二, CK-KZ: 三}
  - {type: variant, offset: 6, length: 7, content: 二服術敘紫微夫, HFL: 三體此一字後}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 三體已此一字後人儳益標髙運味𤣥咀眞呼引景曜凝静六神煥領八明委順靈根寳鍊三度養液和魂假使衝風繁激將不能伐我之正性也絶飈勃藹焉能廻己之清淳耶爾乃空沖自吟虚心待神營攝百絶栖澄至真當使憂累靡干於𤣥宅哀念莫擾於絳津也淡泊眇觀顧景共歡於是至樂自鎗零聞於兩耳雲璈虛彈乎空軒也口挹香風眼接三雲俯仰四運日得成真視盼所涯皆已合神矣夫真人之得真每從是而獲耳不真而強真亦於此而顛蹷也復使愆痾填籍憂哀塞抱經營常累憑惜外道和適羣聽求心俗老忽發哀音之兮此作奚胡音猶今小兒啼不止謂為咳呱也長悼死沒以悲逝必精滅神離三魂隕炁邪運空間魄告魍魎乗我虚陣造遘百祟何可握生道以奔於死房陶靈風而踐於尸室擲已吉象投之凶乎已聞髙勝而故由豫屢覩明科而釋疑遂羅洿上章使臭染𨼆書四極擊鼓三官尋誓信云何而忘太初於焉而遊神虎奮爪毒龍効牙八方誠曠遏謂應作曷字處而逃身謝之後方悟清僚之可羡言者之不虚矣且哀聲亂真干忤正炁明君胡不常處福鄉於此振衣而歸室乎正月十一日夜安妃告此一條是寅年正月九華告楊君相譏誚之事故南真後復有所論也楊書真人歸心於一正道炁標任於永信心歸則正神和信順則利貞兆此自然之感對初無假於兩際也夫惑生是非嫌遘疑似潜滯於中抱閒心裏外握察觀之炁内有緼結之哂遺初覺於建始乖𤣥梯而密猜者有如此徒我見其敗未見其立矣蓋有懐而懼者豈獨一人哉}
