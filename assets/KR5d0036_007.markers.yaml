  - {type: variant, offset: 4177, length: 214, content: 鬼耳下鬼謂下解主者鬼帥耳不必是酆宮之鬼也經中亦云如此在官無事夷真內煉紛錯不穢其聰明爭兢不交於胸心者此道士之在官也秀玄棲摽者雖山河崩潰而不眄志道存真者雖寒熱飢渴猶不護此一往之至也精散八虛魂遊萬途或因風以投間或挾魍以結屙將一切撥之而勿耳矣昔之道非今道也靈覺苟殊百隙其如予何章聞之亦足以檢撲矣右九條並楊書夫真者都無情慾之感男女之想也若丹白存於胸中則真感不應靈女上尊不降矣縱有得者不過在於主者耳陰氣之接永不可以修至道也吾昔常恨此賴改之速, CK-KZ: 通}
  - {type: variant, offset: 4177, length: 214, content: 鬼耳下鬼謂下解主者鬼帥耳不必是酆宮之鬼也經中亦云如此在官無事夷真內煉紛錯不穢其聰明爭兢不交於胸心者此道士之在官也秀玄棲摽者雖山河崩潰而不眄志道存真者雖寒熱飢渴猶不護此一往之至也精散八虛魂遊萬途或因風以投間或挾魍以結屙將一切撥之而勿耳矣昔之道非今道也靈覺苟殊百隙其如予何章聞之亦足以檢撲矣右九條並楊書夫真者都無情慾之感男女之想也若丹白存於胸中則真感不應靈女上尊不降矣縱有得者不過在於主者耳陰氣之接永不可以修至道也吾昔常恨此賴改之速, CK-KZ-jye: 通}
