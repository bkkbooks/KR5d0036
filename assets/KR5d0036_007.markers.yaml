  - {type: variant, offset: 4013, length: 1, content: 守, CK-KZ: 學道也所謂爲易者學道也寂玄沉味保和天眞注神栖靈躭研六府惜精閉牝無視無聽此道之易也卽是不能行此者所以爲難許侯研之哉斧子瑩之哉右右英所道令疏彼君勤其事者有獲福者多也墮謂應作隋字之者禍敗積矣范帥言不知道誰應是鬼帥范疆矣右二條有掾書昔因華氏累白書敬靈道高邈音饗冥絕仰瞻九霄注心罔墜矜逮不遺特蒙酬告雲華斐暢玉音粲發誘導恂恂啓悟丹至披覽欣欣五情悅懌某志好有年未獲厶厶缺失二字別本作剋遂恭黨幽晦始覩天日靈眞厶此缺失}
