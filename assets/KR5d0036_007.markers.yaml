  - {type: variant, offset: 4036, length: 17, content: 涯傷性心以欲惡蕩真豈若守根淨沖棲研, WYG: 所解自非齊達於内外者將不得不懼悸今月六日是赤孫絶日先處事耳今雖停放無所復畏然四帥逆己關之於都禁至日為能遣尸殺使者看望之雖弗復慮矣至日父母將入静中静中疾發亦無苦也我其日亦當視汝右}
