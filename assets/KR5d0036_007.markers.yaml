  - {type: variant, offset: 1608, length: 1, content: 期, WYG: 羈至士耶右二條楊書夫金玉山積猶非我也胠箧之擔往矣猶非已也榮冕之盛陳矣猶非貴也采艶之芬華矣猶非}
