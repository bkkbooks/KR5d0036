  - {type: variant, offset: 2300, length: 712, content: 害氣重殃還在於彼此學道之行也又告曰惡人害賢猶仰天而唾唾不污天還污己刑凡刑字皆應作形逆風揚塵塵不污彼還灌其身道不可毀禍必滅己太虛真人曰飯凡人百不如飯一善人飯善人千不如飯一學道者寒棲山林者益當以為意赤君亦無復別授事紫元夫人告曰天下有五難貧窮惠施難也豪富學道難也制命不死難也得見洞經難也生值壬辰後聖世難也我昔問太上何緣得識宿命太上答曰道德無形知之無益要當守志行道譬如磨鏡垢去明存即自見形斷六情守空淨亦見道之真亦知宿命矣又曰念道行道信道遂得信根其福無量也紫微夫人告曰為道者譬彼持火入冥室中其冥即滅而明獨存學道存正愚癡即滅而正常存也財色之於己也譬彼小兒貪刀刃之蜜其甜不足以美口亦即有截舌之患玄清夫人告曰夫人係于妻子寶宅之患甚於牢獄桎梏牢獄桎梏會有原赦而妻子情慾雖有虎口之禍有此一異手寫本無此十九字恐是脫漏己猶甘心投焉其罪無赦情累於人也猶執炬火逆風行也愚者不釋炬火必燒手貪欲恚怒愚癡之毒又闕此十五字於辭有不應爾貪嗔癡所謂三毒處人身中不早以道除斯禍者必有危殆愚癡者火燒手之謂也為道者猶木在水尋流而行亦不左觸岸亦不右觸岸不為人所取不為鬼神所遮又不腐敗吾保其入海矣人為道不為穢慾所惑不為眾邪所誑精進不疑吾保其得道矣南極夫人曰人從愛生憂憂生則有畏無愛即無憂無憂則無畏昔有一人夜誦經甚悲悲至意感忽有懷歸之哀太上真人忽作凡人徑往問之子嘗彈琴耶答曰在家時嘗彈之真人曰絃緩何如答曰不鳴不悲又問弦急何如答曰聲絕而傷悲又問緩急得中如何答曰眾音和合八音妙奏矣真人曰學道亦然執心調適亦如彈琴道可得矣愛慾之大者莫大於色其罪無外其事無赦賴其有一若復有二普天之民莫能為道者也夫學道者行陰德莫大於施惠解救志莫大於守身奉道其福甚大其生甚固矣有人惡我者我不納惡惡自歸己將禍, CK-KZ: 振衣}
