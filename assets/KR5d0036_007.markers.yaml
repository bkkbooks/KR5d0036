  - {type: variant, offset: 4087, length: 5, content: 言促催進散, WYG: 乞疾病得愈之意又宜辭詣保命定錄二君辭㫖當令如南嶽夫人疾者自當告乞於𤣥師不爾不差易遷昨來道此别省此二字題紙背右四條楊書男生許玉斧辭玉斧以尸濁肉人受聖愍濟㧞每賜敕誡實恩隆子孫常仰銜靈澤永頼天廕玉斧以駑鈍頑下質性難訓雖夙夜自厲患於愆失此夕夢悟尋思此意皆玉斧罪責慙懼屏營無地自厝靈道髙虚肉人未達真法唯執心守敬脩行寳祕而已或恐靈㫖髙逺誡喻幾㣲玉斧頑闇不能該悟如此之罪日月臻積違法犯誡亦當千萬神母仁宥輙復原赦故今日憂惶深重肝膽破碎唯晳謂應作析字骨思愆無補往過連陳啓煩多希請非所兼以愧怖玉斧歸誠乞誓以今日更始當洗濯心誠盟於天地静守形骸軌承訓誨乞原父穆兄虎牙小大罪考玉斧不修乞身自受責原赦大小若神母遂見哀愍許玉斧思愆補過舉家端筆受恩是永覩三光受命更生謹辭此與是虎牙病時掾與南真辭也掾自書本虎牙慎}
