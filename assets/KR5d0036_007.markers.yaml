  - {type: variant, offset: 4062, length: 9, content: 玄同鏡寂泯然與泥丸, WYG: 飲不可飲食多困故而不可食子婦不經心亦不可不令知死丈人之責耶故宜以家事為勤為爾不已或能致之於丈人宇下受教耶八月二十夜小君授書此使示斧右十條楊書許長史所使人盜他家狗六頭於長史竈下蒸煑共食之長史何以不檢校使臭腥之氣薫染肴飯既食而歩上道亦已犯真人之星也有一白犬俗家以許禱土地鬼神云何令人盜烹之土地神言許長史教之使爾不言小人盜自爾也宻尋之爾在宇下而不覺方有此此亦足以}
