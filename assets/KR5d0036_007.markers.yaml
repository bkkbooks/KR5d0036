  - {type: variant, offset: 4010, length: 0, content: '', CK-KZ: 陌之情見矣如其不爾四者皆成内賊之害外爲驩兜之患不去𠫤之不散無所復營措於其間矣亦無事趣當爾也戒長史也此三字本朱書亦應是右英夫人言也爲道者實有勤苦斯人也可謂必得之矣右二條長史掾書夫學道者當得專道注眞情無散念撥奢侈保沖白寂然如密有所覩熙然如潛有所得專專似臨深谷戰戰如}
