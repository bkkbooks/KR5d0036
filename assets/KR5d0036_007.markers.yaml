  - {type: variant, offset: 3808, length: 222, content: 鴻鷺對南旅以遐扇揚翮在于十百之野彼鳥自謂足矣然鋋鳩歎其眇邈大鵬哂鴻舉之指謂應作咫字尺耳苟安其安而是非自足故三鳥不相與議焉何譏之乎紫微言右八條並楊書古之至人獨秉靈一之符玄覽委順之化明坦途而合變捫冥樞以齊物故自然之表則存之而不論域領之內則論之而不議矣昔玄風泯絕埃氣彌氛弘猶淪喪澆偽滋起馳驟之徒替真于崖分之外躁兢之群饕利於形名之肆擅智生流蕩之患希求致矜伐之累乖常適於所適離至當于非當矣名身孰親道家良枿謂應作箴字履淹者守一之至戒良可歎息六月八日夜保命告, WYG: 語}
