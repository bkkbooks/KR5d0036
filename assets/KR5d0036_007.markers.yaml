  - {type: variant, offset: 1610, length: 9, content: 優哉悠哉聊樂我云案, WYG: 也能消而蕩之則滛之心亡也鄙滯之門閉矣尚真之覺漸也千謂應作阡字陌之情見矣如其不爾四者皆成内賊之害外為驩兠之患不去之不散無所復營措於其間矣亦無事趣當爾也戒長史也}
