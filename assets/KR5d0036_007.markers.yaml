  - {type: variant, offset: 2998, length: 193, content: 人惡我者我不納惡惡自歸己將禍而歸身中猶景謂應作影字響之隨形聲矣右眾靈教戒所言按此三男真二女真並高真之尊貴者降集甚希恐此是諸降者敘說其事猶如秋分日瑤臺四君吟耳非必親受楊君也三見易遷再云可待要乃起東山屋舍且可離護之耳問其故未見答問眾靈云我或爾耶未詳此意欲識之此一條楊君自記是論長史事數遊心山澤託景仙真者靈氣將泯子之遠樂山神將欣子之向化是故百疾不能干百邪不得犯屢燒香左右者令人魂魄正而恆聞芳風, WYG: 相𩔖宜服五飲丸去水注}
