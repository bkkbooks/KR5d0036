  - {type: variant, offset: 328, length: 351, content: 玃示流血乎坤野爾乃吉凶互衝眾示災咎履坦道者將幽人貞吉居肥遁者亦無往不利冒險巇也行必輿尸涉於東北則喪朋而悔至苟大川之不利明坎井之沉零矣此皆人失其真物乖我和遊竟萬端神鬼用謀容使天地無常以百姓為心於是太上真人泯萬流之鼓動開冥津以悟賢遂爾導達百變攝生理具居福德者常全處危害者彫折御六氣者定壽服靈芝者神逸奇方上術演于清虛之奧金簡玉札撰於委羽之臺窈窕神唱真暉合離歌其章則控晨太微用其道則揚輪九陔軒蓋於流霞之陣眷眄於文昌之台或爐轉丹砂之幽精粉煉金碧之紫漿琅玕鬱勃以流華八瓊雲煥而飛揚絳液回波龍胎隱鳴虎沫鳳腦雲琅玉霜太極月醴三環靈剛若以刀圭奏矣神羽翼張乃披空同之上文煒燁元始之室瓊音琅書發乎三玄之宮寶紱紆三元之贈蕊佩發丹林之房上帝獻紫皞之重躍太真錫流金之火鈴神童啟轅九鳳齊鳴天籟駭虛晨鍾零鏗竦身抑旄八景浮空龍輿虎旂遊扇, CK-KZ: 效牙}
