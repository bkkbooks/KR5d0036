  - {type: variant, offset: 831, length: 128, content: 而蔬礿者亦奚用東鄰之太牢哉乃可加以五雲水桂術根黃精南燭陽草東石空青松柏脂實巨勝茯苓並養生之具將可以長年矣吾又俱察草木之勝負有速益於己者並未及朮勢之多驗乎旦頃以來殺氣蔽天惡煙弭景邪魔橫起百疾雜臻或風寒關結或流腫種屙不期而禍湊意外而病生者比日而來集也夫朮氣則式, CK-KZ: 曠}
