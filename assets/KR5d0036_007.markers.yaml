  - {type: variant, offset: 4087, length: 0, content: '', CK-KZ: 告長史素患淡飲比來疾動故有此告五飲丸卽是世中者耳精合五飲丸當大得力且可自靜息乎范安遠所}
  - {type: variant, offset: 4087, length: 0, content: '', CK-KZ-jye: 告長史素患淡飲比來疾動故有此告五飲丸卽是世中者耳精合五飲丸當大得力且可自靜息乎范安遠所}
