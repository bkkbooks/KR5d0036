  - {type: variant, offset: 960, length: 1173, content: 鬼津吐煙則鎮折邪節強內攝魂益血生腦逐惡致真守精衛命鳷其餌則靈柔四敷榮輸輕盈服其丸散則百病瘳除五藏含液所以長遠視久而更明也古人名之為山精之赤山姜之精太上導仙銘曰子欲長生當服山精子欲輕翔當服山姜此之謂也我非謂諸物皆當減朮為益也且術氣之用是今時所要末世多疾宜當服御耳夫道雖內足猶畏外事之禍形有外充者亦或中崩之弊張單偏致殆可鑒乎術亦可以長生永壽二可以卻萬魔之枉疾我見山林隱逸得服此道千年八百比肩於五岳矣人多書煩不能復一二記示之耳今撰服術數方以悟密尚若必信用庶無橫暴之災既及太平則四炁含融天緯薦生災煙消滅五毒匿形二辰恆察萬物自成於是時任子所運而御亦無復夭傾也今所言朮欲令有心取服遏此災屙耳又頃者末學互相擾競多用混成及黃書赤界之法此誠有生和合二象匹對之真要也若以道交接解脫網羅推會六合行諸節氣卻災消患結精寶胎上使腦神不虧下令三田充溢進退得度而禍除經緯相應而常康敵人執轡而不失六軍長驅而全反者乃有其益亦非仙家之盛事也嗚呼危哉此雖相生之術俱度之法然有似騁冰車而涉乎炎州泛火舟以浪于溺津矣自非真正亦失者萬萬或違戾天文譖害嫉妒靈根鬱塞否泰用隔犯誓愆明得罪三官或構怨連禍王師傷敗或坑降殺服流血膏野或馬力以竭而求之不已若遂深入北塞而不御者亦必絕命于匈奴之刀劍乎將身死于外而家誅于內也可不慎哉可不慎哉我見諸如此等少有獲益徒有求生之妄作常歎息於生生矣豈若守丹真於絳宮朝元神於泥丸保津液而不虧閉幽術於命門餌靈朮以頤生漱華泉於清川研玄妙之秘訣誦太上之隱篇於是高棲于峰岫並金石而論年耶諸侯安得而友帝王不得而臣也遠風塵之五濁常清淨以期真優哉悠哉聊樂我云案此後應有朮方相連而二本並無乃別有掾書二方似即是此法令撰取在第三卷中右一條有掾書兩本一黃箋一碧箋方諸青童見告曰人為道亦苦不為道亦苦惟人自生至老自老至病護身至死其苦無量心惱積罪生死不絕其苦難說況多不終其天年之老哉為道亦苦者清淨存其真守玄思其靈尋師轗軻履試數百勤心不墮用志堅審亦苦之至也視諸侯之位如過客視金玉之寶如磚石視紈綺如弊帛者始可謂能問道耳方諸青童君曰人之為道能拔愛欲之根者譬如掇懸珠一一掇之會有盡時稍去外惡會有盡時盡則得道矣又近喻牛負重行泥中疲極不敢左右顧趣欲離泥以蘇息道士視情慾甚於彼泥中直心念道可免眾苦亦得道矣謹案上相都無降受事唯有此二告及歌詩一首恐未必是楊君親所瞻奉受記也西城王君告曰夫人離三惡道得為人難也既得為人去女為男難也既得為男六情四體完具難也六情既具得生中國難也既處中國值有道父母國君難也既得值有道之君生學道之家有慈仁善心難也善心既發信道德長生者難也既信道德長生值太平壬辰之運為難也可不勖哉三惡道者生不得作人得作鳥獸蟲畜之三惡也太上問道人曰人命在幾日間或對曰在數日之間太上曰子未能為道或對曰人命在飯食之間太上曰子去矣未謂為道或對曰在呼吸之間太上曰善哉可謂為道者矣吾昔聞此言今以告子子善學道庶可免此呼吸弟子雖去吾教, CK-KZ: ''}
