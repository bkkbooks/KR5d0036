  - {type: variant, offset: 4083, length: 0, content: '', CK-KZ: 魂魄未得通接仙眞故也玉斧淸淨藻潔久齋濯魄心近於仙故假象以通夢也通夢而猶不悟可謂信之不篤或悟而忘其詭可謂篤而不思夫詭誓者悉皆受命密交愼不可令人知外書云我聞有命不可以示人乎毛詩楊之水篇云我聞有命不可以告人當謂此也六月三十日夜小君授書密密示之眞司科云有用力於百鬼騁帥御於天威者宜須此詭地下主者解下道之文官地下鬼帥解下道之武官文解一百四十年一進武解二百八十年一進武解一解之下者也夫心動於事慾兼味於淸正華目以隨世而畏死以希仙者皆多作武解也此武解之目世中諸人多有相類宜服五飲丸去水注之氣可急合不但治疾而已亦以住白而有氣色也六月二十三日夜}
