  - {type: variant, offset: 3651, length: 151, content: 月天地此四象正與生生為對失生則四象亦滅非四象之滅生滅之也若使常生則四象常存非四象之常存我能常生故也常生亦能生于無景何四象之足計哉災遘禍生形壞氣亡起何等事耶似由多言而不守一多端而期苟免耳是以玄巢頹枝以墜落百勝喪於一敗矣惜乎通仙之才安可為豎子致弊也豎子致弊蓋為膏肓之患不除借取晉景公之夢不爾則是別有小兒事也, CK-KZ: 夜}
