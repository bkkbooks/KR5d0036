  - {type: variant, offset: 1661, length: 2, content: 黃箋, WYG: 字别本作㣲字疑非請訓誨交湊尅已補過思釋鄙滯夙興勤惕悟寐自厲庶幾積誠卒獲㣲感𤣥運既㑹奉覲有期忽疑長此}
  - {type: punctuation, offset: 1663, content: 、, id: KR5d0036_tls_007-bkkpn316}
  - {type: variant, offset: 1664, length: 4, content: 碧箋方諸, WYG: 字良為厶厶缺失二字别本作延仰生染迷俗沈溺塵昧不達上真謂道盡此決欲習性以静之損厶缺失一字四字朱書以寳之非為色欲厶缺失一字多而患在難厶缺失一字至於水火之戒氷炭之喻朗然照豁敬承清䂓務損之又損之厶謂應是以字至於死灰也歎覺悟之不早恨知機之將晚用火之言其㫖頗㣲思之觸𩔖良追愧悚昔憑頼華氏每輙奬勸願其有成得見陶冶而躭味華競蹈道不篤恒欲與共清閒使意盡言苦而已趣向不同密言難遇然喁喁之懐要欲獻其丹欵矣不審故可復有冀不此二書長史答先因通華僑意似酬前書而又言用火之言此授今闕右二條厶書茅小君去五月中失日有言云華僑漏泄天文妄說虚無乃今華家父子被考於水官華僑之失道由華騎之佞亂破壊其志念華團華西姑者三官因之以試觀試遂不過僑於是得有死罪故名簡早削奪尋輸頭皮於水官也可宻尋彼家有此人名不是誰者此前並是酬問華氏事不知是子年丑年耳許朝者暴殺新野郡功曹張煥之又枉煞求龍馬此人皆看尋際㑹比告訴水官水官逼許斗使還其丘墳伺察家門當衰之子欲以塞對觧逼示彼訟者耳是斗亡月亡日其應至矣君自受命當能治滅萬鬼羅制千神且欲視君之用手耳欲令無他者宜以此日詣斗墓叱攝煥等制敕左官使更求考代震滅爭源也可勿宣此當言我假威於君矣不知君宜往試攝滅之耳滅鬼之迹事中蹔應爾六月十六日夜小君授書此此令楊君為長史家攝遏冡訟也許朝先為南陽郡故得殺新野人而此三人事不出周魴誥先生中當是四十三條限也斗為仙品而猶被水官之逼者是䘮服中殃氣尚相關渉故也紙三百酬鬼帥王延近報錄書以杵宗㑹有功油三斗酬鬼帥傅晃近與功曹使者令勢威照鬼形使不得暴}
