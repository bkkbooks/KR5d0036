  - {type: variant, offset: 4111, length: 1, content: 言, CK-KZ: 定錄二君辭旨當令如南嶽夫人疾者自當告乞於玄師不爾不差易遷昨來道此別省此二字題紙背右四條楊書男生許玉斧辭玉斧以尸濁肉人受聖愍濟拔每賜敕誡實恩隆子孫常仰銜靈澤永賴天廕玉斧以駑鈍頑下質性難訓雖夙夜自厲患於愆失此夕夢悟尋思此意皆玉斧罪責慙懼屏營無地自厝靈道高虛肉人未達眞法唯執心守敬修行寶祕而已或恐靈旨高遠誡喻幾微玉斧頑闇不能該悟如此之罪日月臻積違法犯誡亦當千萬神母仁宥輒復原赦故今日憂惶深重肝膽破碎唯晢謂應作折字骨思愆無補往過連陳啓煩多希請非所兼以愧怖玉斧歸誠乞誓以今日更始當洗濯心誠盟於天地靜守形骸軌承訓誨乞原父穆兄虎牙小大罪考玉斧}
