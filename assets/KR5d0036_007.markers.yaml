  - {type: variant, offset: 1637, length: 2, content: 二方, WYG: 夫學道者當得專道注真情無散念撥奢侈保沖白寂然如密有所覩熙然如潜有所得專專}
  - {type: variant, offset: 1640, length: 0, content: '', WYG: 臨深谷戰戰如履於氷炭始得道之門耳猶未得道之室也所謂為難者學道也所謂為易者學道也寂𤣥沈味保和天真注神栖靈躭研六府惜精閉牝無視無聽此道之易也}
