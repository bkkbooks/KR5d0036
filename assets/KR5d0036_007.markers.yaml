  - {type: variant, offset: 3808, length: 5, content: 鴻鷺對南旅, CK-KZ: 彼人當是指長史也梁氏德狹也此子蕭條氣遠甚矣夫垂蔭萬畝者必出峻極之嶺滔天振岑者必發板桐之源洪哉積陰德之賢有似邠人也紫微答邠卽豳國}
