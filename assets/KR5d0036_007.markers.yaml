  - {type: variant, offset: 4054, length: 1, content: 神, WYG: 事小茅君説右三條厶書八月六日父母將赤子入静燒香北向陳乞於二君爾時自當有所見所見萬無所苦也其日中時當有前日碧衣介華袴人來在静前立徘徊者小君也可就請乞也八月六日中當有一人著平上幘多髭鬚長長爾著紫皮袴褶將黄娥來此人是鬼帥王延也延自為人作益為將娥見人耳娥其日或當被縛華書吏其日當内井上助主人耳日中當來湏去也故宜力上諷注冢訟章於却氣毒之來往也三過如此考者匿矣夫散翳布考皆因人之不陳疾者懼焉則精胎内戰是故疚痾流發非唯一身而已今}
