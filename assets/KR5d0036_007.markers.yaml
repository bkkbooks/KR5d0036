  - {type: variant, offset: 478, length: 1121, content: 術演于清虛之奧金簡玉札撰於委羽之臺窈窕神唱真暉合離歌其章則控晨太微用其道則揚輪九陔軒蓋於流霞之陣眷眄於文昌之台或爐轉丹砂之幽精粉煉金碧之紫漿琅玕鬱勃以流華八瓊雲煥而飛揚絳液回波龍胎隱鳴虎沫鳳腦雲琅玉霜太極月醴三環靈剛若以刀圭奏矣神羽翼張乃披空同之上文煒燁元始之室瓊音琅書發乎三玄之宮寶紱紆三元之贈蕊佩發丹林之房上帝獻紫皞之重躍太真錫流金之火鈴神童啟轅九鳳齊鳴天籟駭虛晨鍾零鏗竦身抑旄八景浮空龍輿虎旂遊扇八方上造常陽之絕杪下寢倒景之蘭堂月妃參駟日華照容靈姬抱衾香煙溢窗顧眄而圓羅邁矣何九萬之足稱哉然後知高仙之道蓋上尋靈之途微妙服御之致合神吉凶之用頓顯也自非無英公子黃老玉書大洞真經三十九章豁落七元太上隱玄者莫有群偶於此術矣復有體神精思寶煉明堂朝適六靈使五藏生華守閉元關內存九真三炁運液而灌溉丹田亦其次也夫丹誠而蔬礿者亦奚用東鄰之太牢哉乃可加以五雲水桂術根黃精南燭陽草東石空青松柏脂實巨勝茯苓並養生之具將可以長年矣吾又俱察草木之勝負有速益於己者並未及朮勢之多驗乎旦頃以來殺氣蔽天惡煙弭景邪魔橫起百疾雜臻或風寒關結或流腫種屙不期而禍湊意外而病生者比日而來集也夫朮氣則式遏鬼津吐煙則鎮折邪節強內攝魂益血生腦逐惡致真守精衛命鳷其餌則靈柔四敷榮輸輕盈服其丸散則百病瘳除五藏含液所以長遠視久而更明也古人名之為山精之赤山姜之精太上導仙銘曰子欲長生當服山精子欲輕翔當服山姜此之謂也我非謂諸物皆當減朮為益也且術氣之用是今時所要末世多疾宜當服御耳夫道雖內足猶畏外事之禍形有外充者亦或中崩之弊張單偏致殆可鑒乎術亦可以長生永壽二可以卻萬魔之枉疾我見山林隱逸得服此道千年八百比肩於五岳矣人多書煩不能復一二記示之耳今撰服術數方以悟密尚若必信用庶無橫暴之災既及太平則四炁含融天緯薦生災煙消滅五毒匿形二辰恆察萬物自成於是時任子所運而御亦無復夭傾也今所言朮欲令有心取服遏此災屙耳又頃者末學互相擾競多用混成及黃書赤界之法此誠有生和合二象匹對之真要也若以道交接解脫網羅推會六合行諸節氣卻災消患結精寶胎上使腦神不虧下令三田充溢進退得度而禍除經緯相應而常康敵人執轡而不失六軍長驅而全反者乃有其益亦非仙家之盛事也嗚呼危哉此雖相生之術俱度之法然有似騁冰車而涉乎炎州泛火舟以浪于溺津矣自非真正亦失者萬萬或違戾天文譖害嫉妒靈根鬱塞否泰用隔犯誓愆明得罪三官或構怨連禍王師傷敗或坑降殺服流血膏野或馬力以竭而求之不已若遂深入北塞而不御者亦必絕命于匈奴之刀劍乎將身死于外而家誅于內也可不慎哉可不慎哉我見諸如此等少有獲益徒有求生之妄作常歎息於生生矣豈若守丹真於絳宮朝元神於泥丸保津液而不虧閉幽術於命門餌靈朮以頤生漱華泉於清川研玄妙之秘訣誦太上之隱篇於是高棲于峰岫並金石而論年耶諸侯安得而友帝王不得而臣也遠, WYG: 逺}
