  - {type: variant, offset: 3273, length: 377, content: 十四字楊所書今未知何事靜睹天地念飛仙靜睹山川念飛仙靜睹萬物念覆載慈心常執心如此得道也人生者如幻化耳寄寓天地間少許時耳若攝氣營神苦辛注真將得道久道成則同與天地共寓在太無中矣若洞虛體無則與太無共寄寓在寂寂中矣能洞寂者則視之不見聽之不聞死生之根易解久長之年易尋尋之可得解之可久夫可久於其道者養生也常可與久遊者納氣也氣全則生存然後能養至養至則合真然後能久登生氣之二域望養全之寂寂視萬物玄黃盡假寄耳豈可不勤之哉氣全則辟鬼邪養全則辟百害入軍不逢甲兵山行不觸虎兕此之謂矣學道之心常如憶朝食未有不得之者也惜氣常如惜面目未有不全者也然面目亦有毀壞者猶氣亦有喪失要人之所惜常在于面目慮有犯穢次及四肢耳若使惜氣常為一身之先急吾少見其枯悴矣案此所雲氣蓋是房中精氣之氣非呼吸之氣人隨俗要求華名譬若燒香眾人皆聞其芳然不知薰以自燔燔盡則氣滅名立則身絕是故高人哂而遠之遂為清淨生之為物譬, WYG: ''}
