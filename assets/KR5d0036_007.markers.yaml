  - {type: variant, offset: 2014, length: 398, content: 運為難也可不勖哉三惡道者生不得作人得作鳥獸蟲畜之三惡也太上問道人曰人命在幾日間或對曰在數日之間太上曰子未能為道或對曰人命在飯食之間太上曰子去矣未謂為道或對曰在呼吸之間太上曰善哉可謂為道者矣吾昔聞此言今以告子子善學道庶可免此呼吸弟子雖去吾教謂應作校字皆猶差懸也千萬里心存吾戒必得道矣研玉經寶書必得仙也處吾左側者意在邪行終不得道也人之為道讀道經行道事者譬若食蜜遍口皆甜六腑皆美而有餘味能行如此者得道矣上宰亦無降揚事有此及服日月芒事耳太虛真人南岳赤君告曰人有眾惡而不自悔頓止其心罪來歸己如川歸海日成深廣耳有惡知非悔過從善罪滅善積亦得道也夫人遇我以禍者當以福往是故福德之氣恆生於此害氣重殃還在於彼此學道之行也又告曰惡人害賢猶仰天而唾唾不污天還污己刑凡刑字皆應作形逆風揚塵塵不污彼還灌其身道不可毀禍必滅己太虛真人曰飯凡人百不如飯一善人飯善人千不如飯一學道者寒棲山林者益當以為意赤君亦無復別授事紫元夫人告曰天, WYG: ''}
