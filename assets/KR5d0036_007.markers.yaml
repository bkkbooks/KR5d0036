  - {type: variant, offset: 3806, length: 0, content: '', CK-KZ: 告許長史可以示同炁而墮惑者此是授長史令說喻楊君勿疑九華之事也楊書故望洪濤之暨天則知其不起乎洿池之中矣睹玄翰之汪穢則知其不出乎章句之徒也紫微言眾藻集而龍章成羣聲會而雲韶諧辛酸備則嘉味和耳中候夫人答此二辭乃出抱朴子外篇博喻中後復有此例當是眾眞借取以譬而用之猶如}
