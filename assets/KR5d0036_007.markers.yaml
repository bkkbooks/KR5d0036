  - {type: variant, offset: 4035, length: 4, content: 無涯傷性, CK-KZ: 杵宗會有功油三斗酬鬼帥傅晃近與功曹使者今勢威照鬼形使不得暴靑絹三十尺酬鬼帥范疆近執載百惡滅訟散禍有功銀叉三枚酬鬼帥深衞近防護疾者招魂安神使冢訟不行有殊功右四條詭以六月十三日小茅君假作玉斧之形以夢告於虎牙使令夫婦明輸此四種詭以酬四帥之禽鬼者何以不復憶此可餘問餘問謂令與同勿忩忩耳非使此四鬼帥本亦道家之祭酒也得下解法受書爲鬼帥耳旣有酬詭後長爲已用}
