  - {type: variant, offset: 4304, length: 0, content: '', WYG: 靈谷秀瀾榮藏身栖巖京被褐均衮龍帶索齊玉鳴形磐幽遼裏擲神太霞庭霄上有陛賢空中有眞聲抑我曲晨飛案此綠軒軿下觀八度内俯歎風塵縈解脱遺波浪登此眇眇清擾競三津竭奔馳割爾齡十二月一日夜南嶽夫人作與許長史飛輪高晨臺控轡𤣥壟隅手攜紫皇袂儵歘八風驅玉華翼綠幃青羣扇翠裾冠軒煥崔巍珮玲帶月珠薄入風塵中塞鼻逃當塗臭腥彫我氣百痾令心殂何不飆然起蕭蕭步太虚十二月一日夜方丈左臺昭靈李夫人作與許玉斧清晨揖綘霞總氣霄上遊徊軿躡曲波遂覩世人憂辭㫖蔚然起不散三秀嵎何若廵𤣥鄉撫璈為爾娯君安有有際我願有中無右英作此駕景遊賢良促轡東圃下右英吟此道咀嚼𤣥句柔音蔚暢曲夾適宣辭喻標朗欽欽之詠有由然}
