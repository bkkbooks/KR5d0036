  - {type: variant, offset: 5383, length: 322, content: 喻即是酬此詩也咸恆義出周易右一篇有長史寫清響散空神風灑林身超冥衢志詠靈音仁侯其人也欲以裴真人本末示郗者可矣其必克諧不善誘之心亦內彰也裴亦何人哉郗即灊也小名方回裴真人本末即是清靈傳也有謝過及七經之士故令示之八月七日夕右英王夫人授書令與許長史右一條楊書又有長史寫守真一篤者一年使頭不白禿髮更生夫內接兒孫以家業自羈外綜王事朋友之交耳目廣用聲氣雜役此亦道不專也行事亦無益矣夫真才例多隱逸棲身林嶺之中遠人間而抱淡則必犬嬰顏而玄鬢也玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未真正穢念盈懷恐此物輩不肯來也苟真誠未一道亦無私也亦不當試問火棗交梨之樹已生君心中也心中猶有荊棘相雜是以二樹不見不審可剪荊棘出此樹單生其實幾好也雖云問也其欲希之近也當為君問主領者, HFL: ''}
