  - {type: variant, offset: 4930, length: 5, content: 喻作令與許, WYG: 北渟宫中歌曲鬱藹非眞虚太无為我館𤣥公豈有懷縈蒙孤所難落鳯控紫霞矯轡登晨岸寂寂無濠涯暉暉空中觀隱芝秀鳯丘逡廵瑤林畔龍胎嬰爾形八瓊迴素旦琅華繁玉宫綺葩凌巖粲鵬扇絶億領撫翮扶霄翰西庭命}
  - {type: page-break, offset: 4930, content: '', id: KR5d0036_WYG_003-17a, image: WYG1059/WYG1059-0343c.png}
