  - {type: variant, offset: 4933, length: 0, content: '', HFL: 疏右五條有掾書四旍曜明空朱軒飛靈丘玉蓋蔭七景鼓翮霄上浮九音朗紫空玉璈洞太無宴詠三辰宫唱嘯呼我儔不覺椿已來豈知二景流佳人雖兼忘而未放百憂長林眞可靜巖中多自娱十月十七日雲林夫人作與許侯左把玉華蓋飛景躡七元三辰焕紫暉竦眄撫明眞變踊期須臾四面皆已神靈發無涯際懃思上清文何事生横涂令爾感不專烏禁反烏賀反此應作喑啞言其速也夫去機不覺年歲分十月十八日紫微夫人作右二篇有楊書北登玄眞闕携手結高羅香煙散八景玄風鼓絳波仰超琅園津俯眄霄陵阿玉簫雲上唱鳳鳴洞九遐乘氣浮太空曷爲躡山河金節命羽靈徵兵折萬魔齊挹二晨暉千椿方嬰牙喪眞投兢室不解可奈何仰眄太霞宫金閣曜紫清華房映太素四軒皆朱瓊擲輪空同津緫轡儛緑軿玉華飛雲蓋西妃運錦旌翻然濁塵涯儵忽佳人庭宿感應期降所招已在冥乘風奏霄晨共酣丹琳罌公侯徒眇眇安知眞人靈右二篇十月二十日授亦應是右英喻長史也右二篇有楊書車馬雖重爲路人所略推分任運有以招之不必𠫤也柸子誠小還爲童史所偷故疾而惜之今冥鑒即擒蓋所以懼惡而善者别矣今雖嘿然不言小人足知靈驗有訓在其中非直區區若此小小而不能坦也謹白呈雲林右英夫人十一月九日此所答右英授事事今不存穆惶恐言沉染鄙俗流浪塵昧罪與年長愆隨日積幸遭玄運靈啓其會披散氛霧朗然達觀眞靈清秀並垂戒悟猥辱文翰華藻成林金聲玉振規矩有章父子凡微無以堪荷夙興策勵不敢怠惰顒顒傾注言不自暢穆惶恐言此亦是答右英詩不審的是何詩亦似不存右二條長史自書本靈谷秀瀾榮藏身栖巖京被褐均衮龍帶索齊玉鳴形磐幽遼裏擲神太霞庭霄上有陛賢空中有眞聲抑我曲晨飛案此緑軒軿下觀八度内俯歎風塵縈解脫遺波浪登此眇眇清擾兢三津竭奔馳割爾齡十二月一日夜南岳夫人作}
