  - {type: variant, offset: 829, length: 401, content: 所道明日當指王屋山事也中君曰伯舉在於下官耳大老子將復可念江東未見有如此而勤道者然勿恃伯而忘道也虛妄者德之病華衒者身之災滯者失之首恥者體之籥遣此四難然後始可以問道耳於是靈軫鳴轅日有仿佛也有淫愆之心勿以行上真之道也昨見清虛宮正落除此輩人名而方又被考罰以度付三官推之可不慎乎右南嶽夫人言許長史慎臨尸弔喪年內耳示許仙侯如此小君言言畢大笑心既忘得亦不同鄙恥不除生籍不書許長史雖已暫除當復曾除而復除之此清靈言東卿司命甚知許長史之慈肅小有天王昨問此人今何在修何道東卿答曰是我鄉里士也鄉里者謂句容與茅山同境耳非言本咸陽人也內明真正外混世業乃良才也今修上真道也此語乃稱人意略有伯形也此南嶽夫人言右從六月二十四日來凡二十四條並有楊書蕭邈真才內鏡外和曾參出田丹心同丹素系三遷來庇方頭此四句是離合作思玄字即長史之字也錄名太極金書東州蹇裳七度耽凝洞樓內累既消魂魄亦柔守之不倦積之勿休五難既遣封伯作侯七度飛步事也洞樓洞房事也右紫微, WYG: 夕雲林}
