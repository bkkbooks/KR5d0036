  - {type: variant, offset: 3458, length: 343, content: 領耳意云爾不代謝奚必四時氣如呼吸千齡如寄趙子可憂不信而末疑其心亦已醯矣司命君與南嶽夫人言為道者常淵淡以獨處每棲神以遊閑安飲啄以自足無旗謂應作祈字眄於籠樊哀樂所以長去夭閼何由而臻者乎稟志各有所宅資性咸有其韻豈可履逐物之邪蹤矯我之正業乎何不肆天摽之極縱適求真之內娛從幽淨以熙心綏所託以棲意處東山以晦跡握玄筌於妙領保隨珠以含照遣五難於胸次耶此三條亦似是東卿言七月十五日夜紫微王夫人授書曰勤精者味玄之靈摽也凝安者拘真之寢衾矣子勤澡丹心競赴高嶺可謂務道之柄勤甚至也然道柔真虛守淡交物安靜任棲神乃啟煥耳要而言之躁疾非盡理矣違之者亦取勞乎與許玉斧七月十五日夜清靈真人授詩企望人飛若感若成威不內接驕女遠屏三四縱橫以入帝庭歷紀建號得為太齡亦必秀映四司元卿翻然縱羽遂登上清此離合掾大名嵒字也與許玉斧此夕又有, CK-KZ: 敘}
