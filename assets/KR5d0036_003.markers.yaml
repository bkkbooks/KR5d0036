  - {type: variant, offset: 4932, length: 0, content: '', krp: 示許長史并與同學同學謂郗回也晨闕太霞構玉室起霄清領略三竒觀浮景翔絶㝠丹空中有眞金映育挺精八風鼓錦被碧樹曜四靈華蓋廕蘭暉紫轡策緑軿結信通神交觸類率天誠何事外象感須覩瑶玉瓊九月九日雲林右英夫人喻作紫空朗明景玄宫帶絳河濟濟上清房雲臺焕嵳峩八輿造朱池羽蓋傾霄柯震風迴三辰金鈴散玉華七轡絡九垓晏眄不必家借問求道子何事坐塵波豈能栖東秀養眞收太和九月九日紫微夫人喻作因許示都郗猶是方回也二景秀鬱玄霄映朗八方丹雲浮高晨逍遥任靈風鼓翮乘素飈竦眄瓊臺中緑蓋入恊晨青軿擲空同右揖東林帝上朝太虚皇玉賔剖鳳腦嗷酣飛蘂漿雲鈞迴曲寢千音何琅琅錦旌召猛獸華幡正低昂香母折腰唱紫煙排棟梁緫轡高清闕解駕佳人房昔運挺未兆靈化順氣翔心眇玄涯感年隨積椿崇形甘垢臭味動靜失滄浪我友實不爾榮辱昨已忘九月十八日夜雲林右英夫人作喻曰吾辭訖此絳景浮玄晨紫軒乘煙征仰超緑闕内俯眄朱火城東霞啓廣暉神光焕七靈翳映氾三燭流任自齊㝠風纏空洞宇香音觸節生手携謂應作織字女儛併衿匏瓜庭左徊青羽旗華蓋隨雲傾晏寢九度表是非不我營抱眞栖太寂金恣愈日嬰豈似愆穢中慘慘無聊生九月二十五日夜雲林右英夫人授作三轡抗紫軒傾雲東林阿右英吟此道右從騰躍來凡十三篇并有楊書又雜有掾寫遣滯恡賴窮行德不亦甚佳乎不患德之不報所患種福之不多耳此一行則似乎福田也萬事云云盡可觸類矣十二月三日雲林右英夫人告右一條有楊書又有一本小異穆惶恐言仁愛之至猥惠新詩雲藻綺絡金聲玉粲誠翰林之竒秀華錦之盛肆也義類淵微仰覽無射佩之丹心奉以周旋功德淺陋冥報已重福田之喻敢不自勵憑託微猷情若山海動靜啓悟望垂矜録許穆惶恐言諧雲林右英夫人机前此即答遣滯恡書也有自起草存青童大君常吟詠曰欲殖滅度根當拔生死栽沉吟墮九泉但坐惜形骸太虚眞人常吟詠曰觀神載形時亦如車從馬車敗馬奔亡牽連一時假哀世莫識此但是惜風火種罪天網上受毒地獄下西城眞人王君常吟詠曰神爲度形舟薄岸當别去形非神常宅神非形常載徘徊生死輪但苦心猶豫小有眞人王君常吟詠曰失道從死津三魂迷生道生生日已遠死死日已早悲哉苦痛容根華已顛倒起就零落生焉知反枯老以去月秋分日於瑶臺大會四君各吟此言以和玄鈞廣韶之絃聲也十月告云去月如似是九月南秋分必在八月則去月自爲通乎耳十月十五日右英夫人說此}
  - {type: variant, offset: 4933, length: 0, content: '', CK-KZ: 疏右五條有掾書四旍曜明空朱軒飛靈邱玉蓋蔭七景鼓翮霄上浮九音朗紫空玉璈洞太無宴詠三辰宮唱嘯呼我儔不覺椿已來豈知二景流佳人雖兼忘而未放百憂長林眞可靜巖中多自娛十月十七日雲林夫人作與許侯左把玉華蓋飛景躡七元三辰煥紫暉竦眄撫明眞變踊期須臾四面皆已神靈發無涯際懃思上淸文何事生橫涂令爾感不專陰烏禁反㢌烏賀反此應作喑啞言其速也夫去機不覺年歲分十月十八日紫微夫人作右二篇有楊書北登玄眞闕携手結高羅香煙散八景玄風鼓絳波仰超琅園津俯眄霄陵阿玉簫雲上唱鳳鳴洞九遐乘氣浮太空曷爲躡山河金節命羽靈徵兵折萬魔齊挹二晨暉千椿方嬰牙喪眞投兢室不解可奈何仰眄太霞宮金閣曜紫淸華房映太素四軒皆朱瓊擲輪空同津總轡儛綠軿玉華飛雲蓋西妃運錦旌翻然濁塵涯儵忽佳人庭宿感應期降所招已在冥乘風奏霄晨共酣丹琳罌公侯徒眇眇安知眞人靈右二篇十月二十日授亦應是右英喻長史也右二篇有楊書車馬雖重爲路人所略推分任運有以招之不必𠫤也柸子誠小還爲童史所偷故疾而惜之今冥鑒卽擒蓋所以懼惡而善者别矣今雖嘿然不言小人足知靈驗有訓在其中非直區區若此小小而不能坦也謹白呈雲林右英夫人十一月十九日此所答右英授事事今不存穆惶恐言沉染鄙俗流浪塵昧罪與年長愆隨日積幸遭玄運靈啓其會披散氛霧朗然達觀眞靈淸秀並垂戒悟猥辱文翰華藻成林金聲玉振規矩有章父子凡微無以堪荷夙興策勵不敢怠惰顒顒傾注言不自暢穆惶恐言此亦是答右英詩不審的是何詩亦似不存右二條長史自書本靈谷秀瀾榮藏身栖巖京被褐均衮龍帶索齊玉鳴形磐幽遼裏擲神太霞庭霄上有陛賢空中有眞聲抑我曲晨飛案此綠軒軿下觀八度内俯歎風塵縈解脫遺波浪登此眇眇淸擾兢三津竭奔馳割爾齡十二月一日夜南岳夫人作}
