  - {type: variant, offset: 4512, length: 318, content: 日此一條又有掾書省所諮有心哉子望對山嶺增懷遠想欣然稟向常見此意夫為道者精則可矣有情不勤則無所能為也勤而不專亦不能有成也要當令吝心消豁穢此後人枿作穢字不可復識疾開散此亦似東卿告長史爾何以不數看東山鬱望三秀徘徊蓽宇目擊林水平彼人往殆無所復益耳凡云三秀者皆謂三茅山之峰山頂為秀故呼三秀也右南嶽夫人與弟子言夫言者性命之全敗也信者得失之關楗也張良三期可謂篤道而明心矣右南嶽夫人與弟子言性甚寬仁而所聞急而應物速者更違旨耳火棗事未宜問也論火棗事在後右九華真妃言右從太元來凡五條並楊書轡景落滄浪騰躍清海津絳煙亂太陽羽蓋傾九天雲輿浮空洞倏忽風波間來尋冥中友相攜侍帝晨王子協明德齊首招玉賢下眄八阿宮上寢希林顛漱此紫瓊腴方知穢途辛佳人將安在勤之乃得親七月十八, CK-KZ: ''}
