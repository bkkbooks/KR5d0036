  - {type: variant, offset: 4839, length: 2, content: 授詩, WYG: 南嶽紫虚元君九華眞妃清靈眞人紫陽眞人桐柏眞人昭靈李夫人右八人十二月十七日夜方諸宫東華上房靈妃歌曲紫桂植瑶園朱華聲悽悽月宫生蘂淵日中有瓊池左㧞員靈曜右掣丹霞暉流金煥絳庭八景絶煙迴綠蓋浮明朗控節命太㣲鳯精童華顔琳充長肌控晨揖太素乗歘翔玉階吐納六靈氣玉嬪把巾隨彈璈南雲扇香風鼓錦披叩商百獸舞六天攝神威儵歘億萬椿齡紀鬱巍巍小鮮未烹鼎言我巖下悲按楊君記云東方赤氣中有言曰小鮮未烹鼎言我巖下悲當以此事諮啓司命故答稱}
