  - {type: variant, offset: 225, length: 892, content: 非上道也有懷於淫氣兼以行乎隱書者適足握水官之筆鳴三官之鼓耳玄挺亦不可得恃解謝亦不可得賴也要而言之貞則靈降專則神使矣夫真人之偶景者所貴存乎匹偶相愛在於二景雖名之為夫婦不行夫婦之跡也是用虛名以示視聽耳苟有黃赤存於胸中真人亦不可得見靈人亦不可得接徒劬勞於執事亦有勞於三官矣雞鳴時南嶽夫人授書曰雞既鳴矣論好之緣篤也紫陽真人授書曰太虛遠逸高卑同接體賢之義著之於冥運耳慎心係於黃赤之疑也茅中君授書曰玄標觸景俯和塵藹玉振愆房清風逸邁可不勖之也言畢諸真人去真妃少留在後曰又煩明君為一辭也而授書曰忘懷蘭素暉心齊契方當數親虔清宇德與流景合宜歡會理髮領秀伏度明君高尚靈映縱滯忘鄙耳言畢持手而下床未至戶之間忽失所在六月二十六日夜降八真人紫微左夫人一紫清上宮九華真妃二上真司命南嶽夫人三紫陽真人四清靈真人五茅中君六茅小君七又有一人甚少整頓建芙蓉冠朱衣帶劍未曾見也意疑是桐柏山真人王子喬多論金庭山中事言多有不可解者恭敬紫微上真九華妃也皆禮揖稱下官此條重出而小異者前所書是楊君自記九華降事隱之不出從此後是更疏說長史事以示長史故此一片兩本也上真云昨與叔申詣清虛宮校為仙真得失之事耳近頓除落四十七人都復上三人耳並復視爾輩之名簡如今佳耳許某乃得在伯札中許某即長史名也楊君疏呈故不載名耳吾初不悟其如此益好也其洗心勤邁宗注理盡心殫意竭如履水火若久如此者真人亦不得逃矣仙道亦不得隱矣但當杜絕其淫色之念吾等亦即可得見可疏示之此南嶽夫人言此即是前二十四日所道明日當指王屋山事也中君曰伯舉在於下官耳大老子將復可念江東未見有如此而勤道者然勿恃伯而忘道也虛妄者德之病華衒者身之災滯者失之首恥者體之籥遣此四難然後始可以問道耳於是靈軫鳴轅日有仿佛也有淫愆之心勿以行上真之道也昨見清虛宮正落除此輩人名而方又被考罰以度付三官推之可不慎乎右南嶽夫人言許長史慎臨尸弔喪年內耳示許仙侯如此小君言言畢大笑心既忘得亦不同鄙恥不除生籍不書許長史雖已暫除當復曾除而復除之此清靈言東卿司命甚知許長史之慈肅小有天王昨問此人今何在修何道東卿答曰是我鄉里士也鄉里者謂句容與茅山同境耳非言本咸陽人也內明真正外混世業乃良才也今修上真道也此語乃稱人意略有伯形也此南嶽夫人言, CK-KZ: ''}
