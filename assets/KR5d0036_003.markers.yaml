  - {type: variant, offset: 4970, length: 0, content: '', WYG: 條有楊書𤣥𤣥即排起注之曰故𤣥𤣥以八風為關籥天地為隄防四海為甕盎九州為粃糠積之以萬殊烝之以陰陽其陶鑄也充隆炊累剛柔清濁象𩔖不同呼吸吐合恭伯榮注之曰九絶獸神禽也在乎羣猛之中猾狡乎激竒之際千年不足極其變萬殊不足適其内日月不足照其眉八澤不足遊其足清雲為卑九垓為淺八紘為小四極為近變動無常恒入之芥子之内玉晨之玉寳大㣲之威神矣此二條是釋神虎隱文中語不知何眞所告又無日月是兩手同書君惶恐言仁德流映高廕彌綸每貽翰音恩逮繾綣㫖諭有咸恒之順宗期則𤣥霄之㑹雖欽願榮崇欣想}
  - {type: page-break, offset: 4970, content: '', id: KR5d0036_WYG_003-18a, image: WYG1059/WYG1059-0344a.png}
  - {type: variant, offset: 4971, length: 181, content: 華吐吸九神芒椿數無絕紀協日積童蒙攜袂明真館仰期無上皇北鈞唱羽人玉玄粲賢眾云河波浪宇得失為我鍾引領囂庭內開心擬穢衝習適榮辱域罕躡希林宮一靜安足苦試去視滄浪右右英夫人所喻右從轡景來三篇並有長史寫弱喪水岡燋瀁篤靈未盡倚伏異因雲梯未抗雖有懷於進趣猶未淵於至理矣君才實天工以清瀾凝浪於高韻志棲神乎太玄期紫庭而步空矣有心洞於飛滯柔翰蔚乎冥契也動合規矩等圓殊方靜和真味吐納興音, WYG: 誥竊懼熠燿之近暉不}
