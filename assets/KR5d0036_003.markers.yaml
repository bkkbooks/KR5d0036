  - {type: variant, offset: 1266, length: 1, content: 卷, WYG: 燭流任自齊冥風纒空洞宇香音觸節生手攜熾謂應作織字女儛併衿匏𤓰庭左徊青羽旗華蓋隨雲傾晏寢九度表是非不我營抱眞栖太寂金姿愈日嬰豈似愆穢}
