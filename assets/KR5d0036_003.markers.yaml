  - {type: variant, offset: 5274, length: 76, content: 王夫人喻書見與勿答右一條有長史寫世珍芬馥交道宗玄霄會振衣尋冥疇回軒風塵際良德映靈暉穎根粲華蔚密言多儻福沖淨尚真貴咸恆當象順攜手同衾帶何為人事間日焉生患害, WYG: 前}
  - {type: variant, offset: 5277, length: 0, content: '', CK-KZ: 南岳紫虛元君九華眞妃淸靈眞人紫陽眞人桐柏眞人昭靈李夫人右八人十二月十七日夜方諸宮東華上房靈妃歌曲紫桂植瑤園朱華聲悽悽月宮生蘂淵日中有瓊池左拔員靈曜右掣丹霞暉流金煥絳庭八景絕煙迴綠蓋浮明朗控節命太微鳳精童華顏琳腴充長肌控晨揖太素乘欻翔玉階吐納六靈氣玉嬪把巾隨彈璈南雲扇香風鼓錦披叩商百獸舞六天攝神威儵欻億萬椿齡紀鬱巍巍小鮮未烹鼎言我巖下悲按楊君記云東方赤氣中有言曰小鮮未烹鼎言言我巖下悲當必以此事諮啓司命故答稱此詩仍及後篇也太微玄淸左夫人北渟宮中歌曲鬱藹非眞虛太旡爲我館玄公豈有懷縈蒙孤所難落鳳控紫霞矯轡登晨岸寂寂無濠涯暉暉空中觀隱芝秀鳳邱逡巡瑤林畔龍胎嬰爾形八瓊迴素旦琅華繁玉宮綺葩凌巖粲鵬扇絕億領撫翮扶霄翰西庭命長歌雲璈乘虛彈八風纏綠宇聚煙豁然散靈童擲流金太微啓壁案三元起折腰紫皇揮袂讚朗朗扇景曜曄曄長庚煥超軿竦明刃下盻使我惋顧哀地仙輩何爲栖林澗十二月十七日夜太元眞人司命君書出此詩云是靑童宮中内房曲恒吟讚此和神其夜眾眞降集唯有此書存餘悉不顯後丁卯年論挺分事亦是十二月十七日恐偶同耳此前一事不應是卯年也右三條有楊書玄玄卽排起注之曰故玄玄以八風爲關籥天地爲隄防四海爲甕盎九州爲粃糠積之以萬殊蒸之以陰陽其陶鑄也充隆炊累剛柔淸濁象類不同呼吸吐合恭伯榮注之曰九絕獸神禽也在乎羣猛之中猾狡乎激奇之際千年不足極其變萬殊不足適其内日月不足照其眉八澤不足遊其足淸雲爲卑九垓爲淺八宏爲小四極爲近變動無常恒入之芥子之内玉晨之玉寶太微之威神矣此二條是釋神虎隱文中語不知何眞所告又無日月是兩手同書君惶恐言仁德流映高廕彌綸每貽翰音恩逮繾綣旨諭有咸恆之順宗期則玄霄之會雖欽願榮崇欣想靈誥竊懼熠燿之近暉不可參二景之遠麗嘒彼之小宿難以厠七元之靈觀尊卑殊方高下異位俯仰自失罔知所據凡善誘者勤其切磋忠愛者憂其怠惰大易所以乾乾仲尼所以發歎於不倦者也自奉教以來洗心自勵沐浴思新其勸奬也摽明得道之妙致其檢戒也陳宿命之本迹淫𠫤所以喪基鄙滯所以伐德雖盧醫之貢針艾扁鵲之獻藥石無以}
