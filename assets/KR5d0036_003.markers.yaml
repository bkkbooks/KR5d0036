  - {type: variant, offset: 1241, length: 0, content: '', WYG: 右英吟此再三龜闕鬱巍巍墉臺絡月珠列坐九靈房叩璈吟太无玉簫和我神金醴釋我憂宴酣東華内陳鈞千百聲青君呼我起折腰希林庭羽帔扇翠暉玉珮何鏗零俱指高晨寢相期象中冥右紫㣲歌此二篇超舉步絳霄飛飆北壟庭神華映仙臺圓曜隨風傾啓暉挹丹元扉景餐月精交袂雲林宇浩軫謂應作皓鬒還童嬰蕭蕭寄无宅是非豈能營陣上自擾競安可語養生右𤣥壟紫㣲作控晨浮紫煙八景觀𣲖流羽童捧瓊漿玉華餞琳相期白水涯揚我萎蕤珠滄房煥東霞紫造浮絳辰雙德秉道宗作鎭眞伯蕃八臺可眄目北看乃飛元清淨雲中視眇眇躡景遷吐納洞領秀藏暉隱東山久安人事上日也無虚閒豈若易翁質反此孩中顔九月六日夕雲林喻作與許侯解輪太霞上斂轡造紫丘手把八空炁縱身雲中浮}
