  - {type: variant, offset: 4305, length: 0, content: '', WYG: 𤣥宗以安我其㑹矣十二月十四日雲林夫人作與長史此所答長史之詩詩今不存右五篇有楊書該清道難通幽妙達許侯其人也方將曜靈方丘騰躍暉霞身飛九天作則羣眞師傅金闕撫極種人其德仁以融其教整以和可謂天秀標韻為後民之圓匠也斧子乃潛晨密煥秀霄空上託心𤣥宅神栖八領心標寂刃歸形}
