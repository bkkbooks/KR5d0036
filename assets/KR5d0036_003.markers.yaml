  - {type: variant, offset: 5403, length: 1219, content: 清響散空神風灑林身超冥衢志詠靈音仁侯其人也欲以裴真人本末示郗者可矣其必克諧不善誘之心亦內彰也裴亦何人哉郗即灊也小名方回裴真人本末即是清靈傳也有謝過及七經之士故令示之八月七日夕右英王夫人授書令與許長史右一條楊書又有長史寫守真一篤者一年使頭不白禿髮更生夫內接兒孫以家業自羈外綜王事朋友之交耳目廣用聲氣雜役此亦道不專也行事亦無益矣夫真才例多隱逸棲身林嶺之中遠人間而抱淡則必犬嬰顏而玄鬢也玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未真正穢念盈懷恐此物輩不肯來也苟真誠未一道亦無私也亦不當試問火棗交梨之樹已生君心中也心中猶有荊棘相雜是以二樹不見不審可剪荊棘出此樹單生其實幾好也雖云問也其欲希之近也當為君問主領者三年更相問以即日始丑年此二字長史後益上八月七日夜雲林右英王夫人口授答許長史凝心虛形內觀洞房抱玄念神專守真一者則頭髮不白禿者更軫軫字亦應是琴未有以百思纏胸寒熱破神營此官務當此風塵口言吉凶之會身扉凡作扉字者皆是排音非扉扇之扉也得失之門眾憂若是萬慮若此雖有真心固為不篤抱道不行握寶不用而自然望頭不白者亦希聞也玉醴金漿交生神梨方丈火棗玄光靈芝我當與山中許道士不以與人間許長史也八月七日夜紫微王夫人授答許長史右六條有掾寫擬駕東岑人停景招隱靜仁德乘波來俱會三秀嶺靈芝信可食使爾無終永噏真獻金漿不待百丈井八月十六日夕清靈真人授右一篇有長史寫虛和可守雄蕭蕭可守雌夫蕭蕭者單景獨往也君絳宮中渠謂應作詎字能仰飛空同上上雲玄之涯不道易聞而患不真書易得而患不行若專如此大天之中盡真仙比肩也我亦無咎於不能為者心不定而欲書將欲沽之哉意不往而求真似欲衒之也願告八月十七日夜右英王夫人授書此與許長史似答心求守雌之真一也肇祖植德華條翁隊即謂七世祖許肇也隊字應作墜頓足懸車無早晚也但心堅注真微密靈機則可矣至于高逸長嶺寢冥林澤縱時事之難鄙遺九親而味神實美舉也心苟不專愆念填胸雖躡閬山以遊步造圓壟以朝冥然亦必敗也若必空空我自當相告有可動之時也今且未可議耶八月十七日夜保命仙君小茅口授與許長史含仁守慈發拔幽憂單心慈誘棲神靈鏡者許長史其人也所恨在于應物速招真急耳夫浩挺虛映乃可守雌已求故當能守之守之蓋易恐亦宜無不可耶八月十八日夜紫微王夫人授示許長史右四條有楊書穆奉被音告頻煩備至仰御恩潤光華彌煥披覽欣慶感荷罔極穆沉滯流俗豈忘拔跡輒已誓之中心思為階漸考室東山棲景林壑此志必也此舉決也方當憑庇靈宗諮稟神規若此之心揆亦鑒之真一之雌其道玄遠妙出秘領穆愆穢未蕩俗累未拔胸心滓濁精誠膚淺未敢預聞南真哀矜去春使經師授以方諸洞房步綱之道八素九真以漸修行不敢紵謂應作怠字懈九真至須幽靜人事雜錯患在未專耳昔人學道尋師索友彌積年載經歷山嶽無所不至契闊險試備嘗勞苦然後授以要訣穆德薄罪厚端坐愆室橫為眾真所見採錄鑒戒繼至啟悟非一古人有言非知之難其行之難夫人垂恩所賜自可徐徐須此須字長史自移東山然後親授道之來也不計遲速恩之隆也何限早晚命使願告敢不上答謹白此長史答前右英論雌一事者掾為書之既被更寫故此本得存焉, CK-KZ: ''}
