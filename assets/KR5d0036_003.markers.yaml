  - {type: variant, offset: 1294, length: 0, content: '', WYG: 翰林之竒秀華錦之盛肆也義𩔖淵㣲仰覽無射珮之丹心奉以周旋功德淺陋冥報已重福田之喻敢不自勵憑託徽猷情若山海動靜啓悟望垂矜錄許穆惶恐言詣雲林右英夫人机前此即答遣滯恡書也有自起草存青童大君常吟詠曰欲殖滅度根當㧞生死栽沈吟墮九泉但坐惜形骸太虚眞人常吟詠曰觀神載形時亦如車從馬車敗馬奔亡牽連一時假哀世莫識此但是惜風火種罪天網上受毒地獄下西城眞人王君常吟詠曰神為度形舟薄岸當别去形非神常宅神非形常載徘徊生死輪但苦心猶豫小有眞人王君常吟詠曰失道從死津三魂迷生道生生日已逺死死日已早悲哉苦痛容根華已顛倒起就零落生焉知反枯老以去月秋分日於瑤臺大㑹四君各吟此言以和𤣥鈞廣韶之絃聲也十月告云去月如似是九月南秋分必在八月則去月自為通呼耳十月十五日右英夫人説此令疏右五條有掾書四旍曜明空朱軒飛靈丘玉蓋蔭七景鼓翮霄上浮九音朗紫空玉璈洞太無宴詠三辰宫唱嘯呼我儔不覺春已來豈知二景流佳人雖兼忘而}
