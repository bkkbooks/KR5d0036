  - {type: variant, offset: 3123, length: 1176, content: 有楊自記乙丑歲晉興寧三年七月四日夜司命東卿君來降侍從七人入戶其一人執紫旄之節其一人執華幡一人執十絕靈幡一人帶綠章囊其三人捧白牙箱箱中似書也其一人握流金鈴侍人並朱衣司命君形甚少於二弟著青錦繡裙紫毛帔巾芙蓉冠二弟並同來倚立命坐乃坐耳言語良久七月六日夜司命君又降良久喻書曰若必範玄秉象清淨罕時遂拔群幽藻戢翼高棲感味上契淵渟嶽峙蕭寥玉篇玩寶神生遺放俗戀調彈清靈澄景虛中五道發明色絕化浪慾與淡並空同冥衢無視無聽爾乃遠齊妙真重起玄覺明德內圓靈摽外足矣終能策雲皞以赴霄書司命之丹錄耳若精散萬念為生不固炁隨塵波心不真合適足勞身神於林殂謂應作棨字實有誤於來學也其道微而易尋其道艱而難得乎亦令示許長史此二條又有長史寫許長史欲山居宗道者貴無邪棲真者安恬愉至寂非弘順之主惔然非教授之匠故當因煩以領耳意云爾不代謝奚必四時氣如呼吸千齡如寄趙子可憂不信而末疑其心亦已醯矣司命君與南嶽夫人言為道者常淵淡以獨處每棲神以遊閑安飲啄以自足無旗謂應作祈字眄於籠樊哀樂所以長去夭閼何由而臻者乎稟志各有所宅資性咸有其韻豈可履逐物之邪蹤矯我之正業乎何不肆天摽之極縱適求真之內娛從幽淨以熙心綏所託以棲意處東山以晦跡握玄筌於妙領保隨珠以含照遣五難於胸次耶此三條亦似是東卿言七月十五日夜紫微王夫人授書曰勤精者味玄之靈摽也凝安者拘真之寢衾矣子勤澡丹心競赴高嶺可謂務道之柄勤甚至也然道柔真虛守淡交物安靜任棲神乃啟煥耳要而言之躁疾非盡理矣違之者亦取勞乎與許玉斧七月十五日夜清靈真人授詩企望人飛若感若成威不內接驕女遠屏三四縱橫以入帝庭歷紀建號得為太齡亦必秀映四司元卿翻然縱羽遂登上清此離合掾大名嵒字也與許玉斧此夕又有中君授書與許卿答欲知洞天中之事今載在第四卷中鳳巢高木素衣衫然此八字是作長史小名穆字也履順思真凝心虛玄仍取此思字玄字即成長史字也五公石腴彼體所便急宜服之可以少顏三八令明次行玄真解駕偃息可誦洞篇瓊刃應數此瓊刃字即是掾小名玉斧也與外傳青錄義同故云應數精心高棲隱默沉閒正氣不虧朮散除疾是爾所宜次服掞飯兼穀勿違益髓除患肌膚充肥然後登山詠洞講微寅獸白齒此四字即是云虎牙也亦能見機遂得不死過度壬辰偃息盛木玩執周書此八字即是作楊字也太極植簡金名西華學服可否自應靈符理異契同神洞相求定錄中候告道藥事是定錄言也此並離合譬喻四人姓名各詮所宜修行版御事尋辭意皆相貫次不知云何得兩人共說寓言必可用不用是無情焉得駕迹尋此空中靈微音良有旨當用慎勿輕事事應神機保爾見太平右右英吟此茅定錄言良箴也可記之仙才不用心煩曲故能得也保命言八月中彼人必東秀暫看燒香必也保命臨去言右從乙丑歲來凡十五條並有楊書欽想風流託心靡景愧以愆昧鄙彰思自榮勵沐浴陶冶濟否之階幸垂眷逮耳許玄惶恐再拜長史大名謐字思玄今此直云玄其意未允詣賈先生此是長史聞楊宣周紫陽說賈玄道等主知試校事故有此書賈即以呈司命司命後所答云賈生近以此書來者也周君說事在第四卷中也右一條是, WYG: ''}
