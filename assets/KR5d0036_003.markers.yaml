  - {type: variant, offset: 1256, length: 4, content: 之側云云, WYG: 廕蘭暉紫轡䇿綠軿結信通神交觸𩔖率天誠何事外象感須覩瑤玉瓊九月九日雲林右英夫人喻作紫空朗明景𤣥宫帶絳河濟濟上清房雲臺煥嵳峨八輿造朱池羽蓋傾霄柯震風迴三辰金鈴散玉華七轡絡九垓晏眄不必家借問求道子何事坐塵波豈能栖東秀養眞收太和九月九日紫㣲夫人喻作因許示郗郗猶是方回也二景秀鬱𤣥霄映朗八方丹雲浮高晨逍遙任靈風鼓翮乗素飆竦眄瓊臺中綠蓋入協晨青軿擲空同右揖東林帝上朝太虚皇玉賓剖鳯腦嗷酣飛蘂漿雲鈞迴曲寢千音何琅琅錦旌召猛獸華幡正低昻香母折腰唱紫煙排棟梁總轡高清闕解駕佳人房昔運挺未兆靈化順氣翔心眇𤣥涯感年隨積椿崇形甘垢臭味動靜失滄浪我友實不爾榮辱昨已忘九月十八日夜雲林右英夫人作喻曰吾辭訖}
