  - {type: variant, offset: 626, length: 0, content: '', WYG: 安妃歌無待太无中有待太有際大小同一波逺近齊一㑹鳴絃𤣥霄顚吟嘯運八氣奚不酣靈液眄目娛九裔有無得𤣥運二待亦相蓋右太虚南嶽眞人歌偃息東華靜揚軿運八方俯眄丘垤間莫覺五嶽崇靈阜齊淵泉大小互相從長短無少多大椿須終奚不委天順縱神任空同右方諸青童君歌控飆扇大虚八景飛高清仰浮紫晨外俯看絶落冥𤣥心空同間上下弗流停無待兩際中有待無所營體無則能死體有則攝生東賓㑹高唱二待奚足爭命駕玉錦輪儛轡仰徘徊朝遊朱火宫夕宴夜光池浮景清霞杪八龍正參差我作無待遊有待輒見隨高㑹佳人寢二待互是非有無非有定待待各自歸右南極紫元夫人歌按此諸歌詩並似初降語而嫌衆眞多高唱上清童紫元太虚未嘗有雜降處恐或遺失耳有待之説並是指右英事非安}
