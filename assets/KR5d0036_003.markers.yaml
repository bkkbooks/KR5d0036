  - {type: variant, offset: 2126, length: 844, content: 必三事大夫侍晨帝躬高佐四輔承制聖君理生斷死賞罰鬼神攝命千靈封山召雲主察陰陽之和氣而加為吳越鬼神之君也妾將挺命凝觀憑華而生靈飛九天虛音飆房因運四覺玄梯同象紫名太上清文八景神映西暉德明內隸乃受書乘氣得為真妃之任矣又當助君總括三霍綜御萬神對命北帝制敕酆山又應相與攜袂靈房乘煙七元嘉會希林內攄因緣也是故君姓於楊我得為安妾自發玄下造君自受書於西宮從北策景乘軿東轅握旄秉鉞專制東蕃三官奉曶河山啟源天丁獻武四甲衛輪當此之時實明君之至貴真仙之盛觀也三官中常有諺謠云楊安大君董真命神正我等之謂耳蓋聖皇之方駕於今有二十八年也復二十二年明君將乘龍駕雲白日昇天先詣上清西宮北朝玉皇三元然後乃得東軫執事矣此自是君玉朗紫微金音虛領為太極所旌乃玄德上挺不復用勤學劬勞陟足山川矣若為精勖之者當小神清瑩鮮耳亦不甚今日不勞之舉也世俗縈網貴賤之間涉塵途之役在得失之津信非真人所得經營乃自坦乎艱泰之用任乎遇否之頃耳見明君之逸誠欣然也睹明君之否誠戚顏也此二感發于顏色之上也復未足以致遠悲抱長戚矣至于內冥偶景併首玄好輕輪塵藹參形世室妾豈以愆累浮卑少時之滯而虧辱於當真之定質耶夫陰陽有對否泰反用二象既羅得失錯綜此皆往來之徑陌耳今人居風塵之休盛者乃多罪之下鬼趣死之考質也夫處無用於囂途乃得真之挺樸任凡庸以內觀乃靈仙之根始也蓋富貴淫麗是破骨之斧鋸有似載罪之舟車耳榮華矜世爭競徼時適足以誨愆要辱為伐命之兵非佳事也是故古之高人覽罪咎之難豫知富貴之不可享矣遂肥遁長林棲景名山咀嚼和氣漱濯清川欲遠此惡跡自求多福超豁糸互聘保全至素者也君亦奚足汲汲于人間之貴賤投身于榮辱之肆哉且方交兵日會三災向臻神風驅除臭氣參天明金生穢於泥瀆寶玉投糞以招塵褰衣振血濁精虧真玄通遠逸是其時也君若其不耐風火之煙欲抱真形於幽林者且可尋解劍之道作告終之術乎自盡出嘿之會隱顯之跡臨時分處有任於明君矣冥數上感有命而交靈書玉臺真契合景是以言單於辭心訖于筆妾豈獨嘆於一人乎蓋示名分之判例也書訖取以與某復曰君省此當少愈不右從六月二十九日來凡十四條並楊君自記書東卿大君昨四更初來見降侍從, CK-KZ: 子喬弟兄}
