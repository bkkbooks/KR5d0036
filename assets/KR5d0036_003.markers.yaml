  - {type: variant, offset: 4965, length: 4, content: 支峰咀嚼, WYG: 十七日夜太元眞人司命君書出此詩云是青童宫中内房曲恒吟讃此和神其夜衆眞降集唯有此書存餘悉不顯後丁卯年論挺分事亦是十二月十七日恐偶同耳此前一事不應是卯年也右}
