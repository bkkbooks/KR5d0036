  - {type: variant, offset: 1268, length: 643, content: 六月二十七日夜喻書此右一條有楊書積精所感萬物盡應妙誠未匝則形華不盡形華不盡則洞房之中難即分明也吾昔受此法常向西北存之耳西北存如小為易見可明示如此西北為天地之爽內照之玄門也六月二十七日紫陽所喻此二十七日眾真複降其事亦應甚多並不出右一條有長史寫二君各有六僮裴君從者持青髦之節一僮帶繡囊周君從者持黃髦之節無囊右二條是甲手書六月二十九日九華真妃授書曰景應雙粲雲會玄落龍秀五空採瓊閬臺長歌靈幕煥啟玉扉眇矣遺事與世長辭霞軫絳波電赴紫棲共攜清響之外同遊雲岫廣崖豈不善乎豈不樂哉日者霞之實霞者日之精君唯聞服日實之法未見知餐霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也眼者身之鏡耳者體之牖視多則鏡昏聽眾則牖閉妾有磨鏡之石決牖之術即能徹洞萬靈眇察絕響可乎面者神之庭髮者腦之華心悲則面燋腦減則髮素所以精炁內喪丹津損竭也妾有童面之經還白之法可乎精者體之神明者身之寶勞多則精散營竟則明消所以老隨氣落耄已及之妾有益精之道延明之經可乎此四道乃上清內書立驗之真章也方欲獻示以補助君之明照耳授畢取以見與某口答唯唯乞請之也六月二十九日夜桐柏真人同來降復諭授令某書曰夫八朗四極靈峰遼遐奇言吐穎瓊音餐振晨飛陵清玄氣赴霄體邁玉虛心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此人者必能旋騰玄漢周灑真庭矣三元可得而見絳名可得而立耳如其心併愆浪目擊色袂動與罔罟共啟靜興爭競之分者此乃適仙路邈求生日闊也子其慎之某書畢取視乃以見與此前是桐柏辭也既同一夕安妃授竟桐柏次蒨故云復授耳卒看如似猶是安妃故顯注之六月三十日夜九華真妃與紫微, CK-KZ: 候}
