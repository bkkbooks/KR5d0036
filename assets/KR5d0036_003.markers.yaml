  - {type: variant, offset: 3392, length: 1, content: 學, CK-KZ: 我作無待親右九華安妃歌無待太无中有待太有際大小同一波遠近齊一會鳴絃玄霄顚吟嘯運八氣奚不酣靈液眄目娛九裔有無得玄運二待亦相蓋右太虛南嶽眞人歌偃息東華靜揚軿運八方俯眄邱垤間莫覺五嶽崇靈阜齊淵泉大小互相從長短無少多大椿須臾終奚不委天順縱神任空同右方諸靑童君歌控飈扇太虛八景飛高淸仰浮紫晨外俯看絕落冥玄心空同間上下弗流停無待兩際中有待無所營體無則能死體有則攝生東賓會高唱二待奚足爭命駕玉錦輪儛轡仰徘徊朝遊朱火宮夕宴夜光池浮景淸霞杪八龍正參差我作無待遊有待輒見隨高會佳人寢二待互是非有無非有定待待各自歸右南極紫元夫人歌按此諸歌詩並似初降語而嫌眾眞多高唱上淸童紫元太虛未嘗有雜降處恐或遺失耳有待之說並是指右英事非安妃}
