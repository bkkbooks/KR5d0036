  - {type: variant, offset: 5279, length: 3, content: 見與勿, CK-KZ: 之丹懷藏之六腑奉以周旋弗敢失墜庶五難解凍於爐門七試飈靜於淵谷方將逍遙東山考室龍林靈搆蕭蕭邱園沖深庭延雲駕之奇友堂列羽服之上眞句金錫五芝之寶滄浪施長年之珍期實夙夜之乃願信誓不敢誣於神明者也唯少鑒之君惶恐言此長史}
