  - {type: variant, offset: 4932, length: 0, content: '', CK-KZ: 示許長史并與同學同學謂郗囘也晨闕太霞構玉室起霄淸領略三奇觀浮景翔絕冥丹空中有眞金映育挺精八風鼓錦被碧樹曜四靈華蓋廕蘭暉紫轡策綠軿結信通神交觸類率天誠何事外象感須覩瑤玉瓊九月九日雲林右英夫人喻作紫空朗明景玄宮帶絳河濟濟上淸房雲臺煥嵳峩八輿造朱池羽蓋傾霄柯震風迴三辰金鈴散玉華七轡絡九垓晏眄不必家借問求道子何事坐塵波豈能栖東秀養眞收太和九月九日紫微夫人喻作因許示郗郗猶是方囘也二景秀鬱玄霄映朗八方丹雲浮高晨逍遙任靈風鼓翮乘素飈竦眄瓊臺中綠蓋入協晨靑軿擲空同右揖東林帝上朝太虛皇玉賓剖鳳腦嗷酣飛蘂漿雲鈞迴曲寢千音何琅琅錦旌召猛獸華幡正低昂香母折腰唱紫煙排棟梁總轡高淸闕解駕佳人房昔運挺未兆靈化順氣翔心眇玄涯感年隨積椿崇形甘垢臭味動靜失滄浪我友實不爾榮辱昨已忘九月十八日夜雲林右英夫人作喻曰吾辭訖此絳景浮玄晨紫軒乘煙征仰超綠闕内俯眄朱火城東霞啓廣暉神光煥七靈翳映氾三燭流任自齊冥風纏空洞宇香音觸節生手㩦熾謂應作織字女儛併衿匏瓜庭左徊靑羽旗華蓋隨雲傾晏寢九度表是非不我營抱眞栖太寂金恣愈日嬰豈似愆穢中慘慘無聊生九月二十五日夜雲林右英夫人授作三轡抗紫軒傾雲東林阿右英吟此道右從騰躍來凡十三篇並有楊書又雜有掾寫遣滯恡賴窮行德不亦甚佳乎不患德之不報所患種福之不多耳此一行則似乎福田也萬事云云盡可觸類矣十二月三日雲林右英夫人告右一條有楊書又有一本小異穆惶恐言仁愛之至猥惠新詩雲藻綺絡金聲玉粲誠翰林之奇秀華錦之盛肆也義類淵微仰覽無射佩之丹心奉以周旋功德淺陋冥報已重福田之喻敢不自勵憑託徽猷情若山海動靜啓悟望垂矜錄許穆惶恐言詣雲林右英夫人机前此卽答遣滯恡書也有自起草存靑童大君常吟詠曰欲殖滅度根當拔生死栽沉吟墮九泉但坐惜形骸太虛眞人常吟詠曰觀神載形時亦如車從馬車敗馬奔亡牽連一時假哀世莫識此但是惜風火種罪天網上受毒地獄下西城眞人王君常吟詠曰神爲度形舟薄岸當别去形非神常宅神非形常載徘徊生死輪但苦心猶豫小有眞人王君常吟詠曰失道從死津三魂迷生道生生日已遠死死日已早悲哉苦痛容根華已顚倒起就零落生焉知反枯老以去月秋分日於瑤臺大會四君各吟此言以和玄鈞廣韶之絃聲也十月告云去月如似是九月南秋分必在八月則去月自爲通乎耳十月十五日右英夫人說此}
