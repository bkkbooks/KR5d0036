  - {type: variant, offset: 1359, length: 1717, content: 紫陽所喻此二十七日眾真複降其事亦應甚多並不出右一條有長史寫二君各有六僮裴君從者持青髦之節一僮帶繡囊周君從者持黃髦之節無囊右二條是甲手書六月二十九日九華真妃授書曰景應雙粲雲會玄落龍秀五空採瓊閬臺長歌靈幕煥啟玉扉眇矣遺事與世長辭霞軫絳波電赴紫棲共攜清響之外同遊雲岫廣崖豈不善乎豈不樂哉日者霞之實霞者日之精君唯聞服日實之法未見知餐霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也眼者身之鏡耳者體之牖視多則鏡昏聽眾則牖閉妾有磨鏡之石決牖之術即能徹洞萬靈眇察絕響可乎面者神之庭髮者腦之華心悲則面燋腦減則髮素所以精炁內喪丹津損竭也妾有童面之經還白之法可乎精者體之神明者身之寶勞多則精散營竟則明消所以老隨氣落耄已及之妾有益精之道延明之經可乎此四道乃上清內書立驗之真章也方欲獻示以補助君之明照耳授畢取以見與某口答唯唯乞請之也六月二十九日夜桐柏真人同來降復諭授令某書曰夫八朗四極靈峰遼遐奇言吐穎瓊音餐振晨飛陵清玄氣赴霄體邁玉虛心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此人者必能旋騰玄漢周灑真庭矣三元可得而見絳名可得而立耳如其心併愆浪目擊色袂動與罔罟共啟靜興爭競之分者此乃適仙路邈求生日闊也子其慎之某書畢取視乃以見與此前是桐柏辭也既同一夕安妃授竟桐柏次蒨故云復授耳卒看如似猶是安妃故顯注之六月三十日夜九華真妃與紫微王夫人南嶽夫人同降真妃坐良久乃命侍女發檢囊之中出二卷書以見付令寫之題如左上清玉霞紫映內觀隱書上清還晨歸童日暉中玄經右二卷名目此題本應是三元八會之書楊君既究識真字今作隸字顯出之耳七月一日夜紫微王夫人南嶽夫人九華真妃紫微桐柏清虛三真人茅二君同降良久某乃自陳於眾靈求安身之術欲知貴賤之分年命之會多少定限於是真妃乃笑良久見授書此曰明君夷質虛閒祕構玉朗蘭淵高流清響金宮可謂能珍寶藏奇幽真內煥摽拂靈篇乘數順生素德神園丹錄玉清興煙拔景冥鼓遐聲也必三事大夫侍晨帝躬高佐四輔承制聖君理生斷死賞罰鬼神攝命千靈封山召雲主察陰陽之和氣而加為吳越鬼神之君也妾將挺命凝觀憑華而生靈飛九天虛音飆房因運四覺玄梯同象紫名太上清文八景神映西暉德明內隸乃受書乘氣得為真妃之任矣又當助君總括三霍綜御萬神對命北帝制敕酆山又應相與攜袂靈房乘煙七元嘉會希林內攄因緣也是故君姓於楊我得為安妾自發玄下造君自受書於西宮從北策景乘軿東轅握旄秉鉞專制東蕃三官奉曶河山啟源天丁獻武四甲衛輪當此之時實明君之至貴真仙之盛觀也三官中常有諺謠云楊安大君董真命神正我等之謂耳蓋聖皇之方駕於今有二十八年也復二十二年明君將乘龍駕雲白日昇天先詣上清西宮北朝玉皇三元然後乃得東軫執事矣此自是君玉朗紫微金音虛領為太極所旌乃玄德上挺不復用勤學劬勞陟足山川矣若為精勖之者當小神清瑩鮮耳亦不甚今日不勞之舉也世俗縈網貴賤之間涉塵途之役在得失之津信非真人所得經營乃自坦乎艱泰之用任乎遇否之頃耳見明君之逸誠欣然也睹明君之否誠戚顏也此二感發于顏色之上也復未足以致遠悲抱長戚矣至于內冥偶景併首玄好輕輪塵藹參形世室妾豈以愆累浮卑少時之滯而虧辱於當真之定質耶夫陰陽有對否泰反用二象既羅得失錯綜此皆往來之徑陌耳今人居風塵之休盛者乃多罪之下鬼趣死之考質也夫處無用於囂途乃得真之挺樸任凡庸以內觀乃靈仙之根始也蓋富貴淫麗是破骨之斧鋸有似載罪之舟車耳榮華矜世爭競徼時適足以誨愆要辱為伐命之兵非佳事也是故古之高人覽罪咎之難豫知富貴之不可享矣遂肥遁長林棲景名山咀嚼和氣漱濯清川欲遠此惡跡自求多福超豁糸互聘保全至素者也君亦奚足汲汲于人間之貴賤投身于榮辱之肆哉且方交兵日會三災向臻神風驅除臭氣參天明金生穢於泥瀆寶玉投糞以招塵褰衣振血濁精虧真玄通遠逸是其時也君若其不耐風火之煙欲抱真形於幽林者且可尋解劍之道作告終之術乎自盡出嘿之會隱顯之跡臨時分處有任於明君矣冥數上感有命而交靈書玉臺真契合景是以言單於辭心訖于筆妾豈獨嘆於一人乎蓋示名分之判例也書訖取以與某復曰君省此當少愈不右從六月二十九日來凡十四條並楊君自記書東卿大君昨四更初來見降侍從七人入戶一人執紫旄節一人執華幡一名十絕靈幡一人帶綠章囊三人捧牙箱一人握流金鈴乃年少於二弟二弟昨並倚立東卿命坐乃坐耳良久言語委曲先昨神女來降意本疑是王母女昨又來定是也南真說云是阿母第十三女王媚蘭字申林治滄浪山受書為, WYG: ''}
