  - {type: variant, offset: 3081, length: 3, content: 兩事並, WYG: 應作喑啞言其速也失去機不覺年歲分十月十八日紫㣲夫人作右二篇有楊書北登𤣥眞闕攜手結髙羅香煙散八景𤣥風鼔絳波仰超琅園津俯眄霄陵阿玉簫雲上唱鳯鳴洞九遐乗氣浮太空曷為躡山河金節命羽靈徵兵折萬魔齊挹二晨暉千椿方嬰牙喪眞投競室不解可奈何仰眄太霞宫金閣曜紫清華房映太素四軒皆朱瓊擲輪空同津總轡儛綠軿玉華飛雲蓋西妃運錦旌翻然濁塵涯儵忽佳人庭宿感應期降所招已在冥乗風奏霄晨共酣丹琳罌公侯徒眇眇安知眞人靈右二篇十月二十日授亦應}
