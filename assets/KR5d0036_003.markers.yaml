  - {type: variant, offset: 1247, length: 0, content: '', CK-KZ: 王子晉父周靈王有子三十八人子晉太子也是爲王子喬靈王第三女名觀香自衆愛是宋姬子於子喬爲别生妹受子喬飛解脫網之道得去入緱外書作維字氏山中後俱與子喬入陸渾積三十九年觀香道成受書爲}
