  - {type: variant, offset: 6939, length: 1, content: 碣, CK-KZ-jye: 經服明丹之華挹扶晨之暉今顏色如二十女子鬚長三尺黑如墨也昨日東卿君道此如所疏眞奇事也不知果云何耳此一行楊君自記與長史不知之辭或云別有以季主託形隱景潛跡委羽紫陽傳具載其事也昨夜東卿至聊試請問季主主本末東卿見答令疏如別爲以上呈願不怪之省訖付火此楊君與長史書今有華撰周君傳記季主事殊略未見別眞手書傳依此語則爲非也此前似有按語今闕失一行是後聖李君紀也大都與前者略同然東卿復兼有注解注解近萬餘言大奇作也昨來多論神化之事聊及季主耳去月又見授神虎經注解注解非世間所聞亦自不掌其旨也若更聞如季主比者自當密白此亦楊君與長史書也旣是論季主事故仍以相次不復出置下卷長史撰眞仙傳欲以季主最在前所以楊君爲請問本末也司命所注二經並未出世也右十條有楊書范安遠適云湛子不事齊齊師伐之春秋傳曰湛無禮也此則左傳上事諶字作譚字奇譚國名也莊王十三年爲齊桓所滅不知何故述此亦似有所指者也莊子師長桑公子授其微言謂之莊子也隱於抱犢山服北育火丹白日升天上補太極闈編郎長桑卽是扁鵲師事見魏傳及史記世人苟知莊生如此者其書彌足可重矣施存者齊人也自號婉盆子得遁變化景之道今在中岳或少室往有壺公正此人也然未受太上書猶未成眞焉其行玉斧軍火符是其所受之枝條也施存是孔子弟子三千之數三千之限有此人而不預七十二者明夫子不以仙爲教矣壺公卽費長房之師軍軍火符世猶有}
