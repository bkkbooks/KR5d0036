  - {type: variant, offset: 5675, length: 1046, content: 火火又繞身身通洞徹內外如一旦行之至日向中乃止于是服氣百二十過都畢道正如此使人長生不死辟卻萬害所謂知白守黑求死不得知黑守白萬邪消卻尤禁六畜肉及五辛之菜當別寢靜思尤忌房室房室即死此道與守一相似但如為徑要以減之耳忌房室甚於守一守一之忌在於節之耳初存氣出如小豆漸大衝天三氣纏煙繞身共同成一混沌忽生火在三煙之內又合景以煉一身一身之里五髒照徹此亦要道也此數人並已三百餘年正玄白之力也並是不死之學者未及於仙道玄白事已重抄出在第三篇修用中計杜於建安初可年二十許至晉興寧三年始一百九十歲諸人又晚學而此云並三百餘年恐長三字亦強可是二耳若欲守玄白者當與其經經亦少許耳自可兼行以除萬邪卻千害行之三十年匿身隱形日行五百里一名此道為胎精中景玄白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起別寢邪此一誥是論玄白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙勃鬱八道騰五嶽何必秀名山亦足淩矯手攝洞阜棲心潛中興吐納胎精炁玄白誰能勝右杜廣平恆喜歌吟此今疏相示右定錄君道此此亦應同十四夜告從杜來九條並有掾寫共一篇峨峨岑山幽岩嶺芳卓卓先生乘和來翔散髮頹穎躬耕陵堽三餐自足不期裹糧玉迹東映鳳響西彰公侯招之淩風振裳處不矜嘿出不希揚被褐容與杖策頡頏此一篇有異手書乃接前詩後而後又仍接以蕭寂蓽門事既真書止說前一篇已自右畢則此詩非複是杜所作而不知其義是誰近所摽靜舍地此金鄉之至室若非許長史父子豈得居之後世當有赤子賢者乃得居此鄉爾子孫事祕之不可輕泄按此所泬即應是後雲長史所營屋宅處也金陵之地乃廣則此為最勝之地非真仙不得居故唯長史掾可居耳赤子賢者莫測為誰或是姓赤或是大人或將來英賢應運者乃當複得居之既方是後世子孫時事則非今所宜預言兼以此地福重不欲宣廣使人濫住致有犯穢故也許長史今所營屋宅對東面有小山名雷平山周時有雷氏養龍來在此山後有姜叔茂田翁亦居焉其山北有柳汧水或名曰田公泉以其人曾居此山取此水故也雷平山在小茅北基址相連田公泉今具存左右甚多水柳樹故名柳珣此泉即前所云浣衣不用灰者長史宅自湮毀之後無人的知處至宋初長沙景王檀太妃供養道士姓陳為立道士廨於雷平西北即是今北廨也後又有句容山其王文清後為此廨主見傳記知許昔於此立宅因博訪耆宿至大明七年有術虛老公徐偶云其先祖伏事許長史相傳識此宅只在今廨前烏桕樹處應是似猶有齋堂前井存于時草萊蕪沒王即芟除尋覓果得磚井土已欲滿仍掘治更加簹累今有好水水色小白或是所云似鳳門外水味也於是審知是故宅從來空廢無敢居者既云金鄉至室便為伏龍之膏腴矣其西北即有長岡連亙呼為長隱, HFL: 尚類騖}
  - {type: variant, offset: 5675, length: 1046, content: 火火又繞身身通洞徹內外如一旦行之至日向中乃止于是服氣百二十過都畢道正如此使人長生不死辟卻萬害所謂知白守黑求死不得知黑守白萬邪消卻尤禁六畜肉及五辛之菜當別寢靜思尤忌房室房室即死此道與守一相似但如為徑要以減之耳忌房室甚於守一守一之忌在於節之耳初存氣出如小豆漸大衝天三氣纏煙繞身共同成一混沌忽生火在三煙之內又合景以煉一身一身之里五髒照徹此亦要道也此數人並已三百餘年正玄白之力也並是不死之學者未及於仙道玄白事已重抄出在第三篇修用中計杜於建安初可年二十許至晉興寧三年始一百九十歲諸人又晚學而此云並三百餘年恐長三字亦強可是二耳若欲守玄白者當與其經經亦少許耳自可兼行以除萬邪卻千害行之三十年匿身隱形日行五百里一名此道為胎精中景玄白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起別寢邪此一誥是論玄白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙勃鬱八道騰五嶽何必秀名山亦足淩矯手攝洞阜棲心潛中興吐納胎精炁玄白誰能勝右杜廣平恆喜歌吟此今疏相示右定錄君道此此亦應同十四夜告從杜來九條並有掾寫共一篇峨峨岑山幽岩嶺芳卓卓先生乘和來翔散髮頹穎躬耕陵堽三餐自足不期裹糧玉迹東映鳳響西彰公侯招之淩風振裳處不矜嘿出不希揚被褐容與杖策頡頏此一篇有異手書乃接前詩後而後又仍接以蕭寂蓽門事既真書止說前一篇已自右畢則此詩非複是杜所作而不知其義是誰近所摽靜舍地此金鄉之至室若非許長史父子豈得居之後世當有赤子賢者乃得居此鄉爾子孫事祕之不可輕泄按此所泬即應是後雲長史所營屋宅處也金陵之地乃廣則此為最勝之地非真仙不得居故唯長史掾可居耳赤子賢者莫測為誰或是姓赤或是大人或將來英賢應運者乃當複得居之既方是後世子孫時事則非今所宜預言兼以此地福重不欲宣廣使人濫住致有犯穢故也許長史今所營屋宅對東面有小山名雷平山周時有雷氏養龍來在此山後有姜叔茂田翁亦居焉其山北有柳汧水或名曰田公泉以其人曾居此山取此水故也雷平山在小茅北基址相連田公泉今具存左右甚多水柳樹故名柳珣此泉即前所云浣衣不用灰者長史宅自湮毀之後無人的知處至宋初長沙景王檀太妃供養道士姓陳為立道士廨於雷平西北即是今北廨也後又有句容山其王文清後為此廨主見傳記知許昔於此立宅因博訪耆宿至大明七年有術虛老公徐偶云其先祖伏事許長史相傳識此宅只在今廨前烏桕樹處應是似猶有齋堂前井存于時草萊蕪沒王即芟除尋覓果得磚井土已欲滿仍掘治更加簹累今有好水水色小白或是所云似鳳門外水味也於是審知是故宅從來空廢無敢居者既云金鄉至室便為伏龍之膏腴矣其西北即有長岡連亙呼為長隱, WYG: 尚𩔖鶩}
