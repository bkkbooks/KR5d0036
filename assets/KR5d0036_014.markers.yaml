  - {type: variant, offset: 6803, length: 3, content: 延甚長, WYG: 趙叔達晚又有山世逺者此諸人往來與之遊焉昔居武當今來大霍欲從司命君受書故未許焉山已得為太和眞人則應居在南陽太和山矣餘三人不見别顯出也戴公拍腹有十數卷書是太㣲黄書耳此人即謝允之師也按金相傳太㣲黄書第八篇有目録云凡有八卷唯此一卷出世今戴公乃有十許篇亦為不同拍腹之義謂恒以繋腰也其外傳事亦同此謝允字道通歴陽人小時為人所畧賣往東陽}
  - {type: variant, offset: 6805, length: 0, content: '', CK-KZ: 嚴潔亦無人敢觸冒者此云如華陽三便門則南洞北洞本大開餘東西及東南皆是塞矣鹿跡華山中及洞主有謝稚堅王伯遼繁陽子號名耳是漢越騎校尉何苗叔達也進之同母弟少好道曾居河東繁山之南服食故自號爲繁陽子中君答}
