  - {type: variant, offset: 5966, length: 147, content: 形日行五百里一名此道為胎精中景玄白法也八月十四日夜保命仙君告此告必應是告牙亦可是試以戲長史爾牙守一竟未起別寢邪此一誥是論玄白守一事忽然憶寅獸寅獸當是未免房中因而及此也渟景翳廣林曖曖東霞升晨風舞六煙勃鬱八道騰五嶽何必秀名山亦足淩矯手攝洞阜棲心潛中興吐納胎精炁玄白誰能勝右杜廣平恆喜歌吟此今疏相示右, CK-KZ: 處方臺師}
