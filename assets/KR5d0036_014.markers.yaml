  - {type: variant, offset: 6931, length: 0, content: '', CK-KZ-jye: 條楊書范帥云三官有獄官不名廷尉名大理李豐今爲大理都餘一守缺以擬王附子不以與許虎也守職如今獄之三官也李豐字安國改字宣國馮翊人李義子本寒微有才志遂事魏爲尙書僕射尉與夏侯玄謀廢晉景王事泄召來令人以刀鐶撞腰煞之大理當爲大理卽古之獄官前漢洎魏時廷尉亦名大理此職是仙官也王附子是王厶之小名許虎卽虎牙也鮑靚因吾屬長史鼠子輩旣爾可語郡守令得反映亦屬吾其家比衰欲非可奈何可寫存之耶鼠子恐是鮑靚小名鮑爲南海郡仍解化兒輩未得歸都所以屬之鮑卽許先生之師也右二條有楊書武當山道士戴孟者乃姓燕名濟字仲微漢明帝末時人也夫爲養生者皆隱其名字藏其所生之時故易姓爲戴託官於武帝耳而此人少好道德不仕於世矣少孤養母母喪行服葬服闋遂入華陽山服朮食大黃及黃精種雲母雄黃丹砂芝草受法於淸靈眞人卽裴冀州之弟子也得不死之道裴眞人授其玉珮金鐺經并石精金光符遂能輕身健行周旋名山日行七百里多所經涉猶未得成仙人也戴乃授行玉珮金鐺而止不死而已未得神仙於理爲小難詳後又云玄眞亦其鈔要行之者神仙不死又與本經不同及石精金光符旣不爲劒用則止是解化一符單服者此符主隱遯不云健行也種五品芝世亦有法仙人郭子華張季連趙叔達晚又有山世遠者此諸人往來與之遊焉昔居武當今來大霍欲從司命君受書故未許焉山已得爲太和眞人則應居在南陽太和山矣餘三人不見別顯出也戴公拍腹有十數卷書是太微黃書耳此人卽謝允之師也按金相傳太微黃書第八篇有目錄云凡有八卷唯此一卷出世今戴公乃有十許篇亦爲不同拍腹之義謂恒以繫腰也其外傳事亦同此謝允字道通厯陽人小時爲人所略賣往東陽後告官被誣在烏傷獄事將欲入死夜有老公授其符又有黃衣童子去來於是得免咸康中至襄陽入武當山見戴孟孟卽先來獄中者因是受道又出仕作厯陽新豐西道三縣所在多神驗年七十餘猶不老後乃告終也黃衣童子者卽玉佩金鐺之官耳云坐上常有一人共坐胇者應是胇胇不明狀也卽太極眞人時往來也按說如此似答問黃衣童意亦可是午時旣及謝因此面訪其事受行玉珮金鐺經自然致太極眞人諺云服九靈日月華得降我太極之家此之謂也玄眞之法亦其鈔要也行之者神仙不死裴眞人有弟子三十四人其十八人學佛道餘者學仙道艹王虛應作牖字弟子劉顯林辛仲甫趙子常周眞人有十五人弟子四人解佛法入室弟子王瑋達李建道泉法堅桐栢有二十五人弟子八人學佛入室弟子于弘智竺法靈鄭文成陳元子此當略舉標勝者耳辛泉于竺皆似胡姓也當是學佛弟子也右八}
