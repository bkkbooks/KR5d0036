  - {type: variant, offset: 6824, length: 1, content: 疑, WYG: 應是臨海永嘉東北名赤巖者也許先生所住赤山一名燒山即此名山五嶽中學道者數百萬人今年有得道而升天者人名如别年年月月皆有去者如此不可悉紀今為䟽一年之得道人耳有不樂上升仙而長在五嶽名山者乃亦不可稱數或為仙官使掌名山者亦復有數千九月二十日夜清靈䟽出清靈猶是裴清靈也此九月即應是乙丑歲即䟽}
  - {type: variant, offset: 6826, length: 5, content: 小近南水邊, WYG: 年中得道者右八條有椽寫共一卷相隨吳睦者長安人也少為縣吏掌局枉尅民人民人訟之法應入死睦登委羽逺遁山林餓經日行至石室遇見孫先生在室中隱學左右種黍及胡麻室中恒盈食睦至乞食經月}
  - {type: page-break, offset: 6826, content: '', id: KR5d0036_WYG_014-11b, image: WYG1059/WYG1059-0450b.png}
