  - {type: variant, offset: 6942, length: 3, content: 童初府, CK-KZ: 嵩高偉遠久隨之乃得受法行之道成今處九疑山其女子有郭芍藥趙愛兒王魯連等並受此方法而得道者復數十人或遊玄州或處東華方諸臺今見居也南嶽夫人言此云郭芍藥漢度遼將軍東平郭蹇女也少道篤誠眞人因授其六甲趙愛兒者幽州剌史劉虞別駕漁陽趙該姊也好道得尸解後又受此符王魯連者魏明帝城門校尉范陽王伯綱女也亦學道一旦忽委聓李子期入陸渾山中眞人授此法子期者同州魏人淸河王傅也其常言此婦狂走云一旦失所在此事乃出靈飛六甲經中長史抄出之漢大將軍霍光有典衣奴子名還車伺見二星得年六百嵗今猶在焉此事出方諸洞房經後長史抄出按魏書有云靑龍元年并州剌史畢軌送漢度遼將軍范明友解婢奴年三百五十嵗言諸飲食如常人奴云霍顯者光祿小妻胡友妻是光祿前妻如依此妻便非虛矣吞琅玕之華而方營邱墓者衍門子高邱子洪涯先生是也衍門子墓在漁陽潞縣幽州漁陽有潞縣今黨亦有潞縣衍門卽羡門也高邱子墓在中山聞喜縣中山有安喜縣聞喜乃屬河東洪涯先生墓在武威姑臧縣涼州記作姑臧縣此三郡縣人並云上古死人之空塚矣而不知高邱子時以尸解入六景山後服金液之末又受服琅玕華於中山方復託死乃入玄州受書爲中嶽眞人于今在也衍門子今在蒙山大洞黃金之庭受書爲中元仙卿洪涯先生今爲靑城眞人漱龍胎而死訣飲瓊精而叩棺者先師王}
