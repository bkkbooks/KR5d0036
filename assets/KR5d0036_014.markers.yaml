  - {type: variant, offset: 6755, length: 0, content: '', CK-KZ: 所以楊君夢掾云向從四平山來也右六條是手新寫應是保命君所告也鹿迹山中有絶洞絶洞者纔有一二畝空地無所通達故爲絶洞洞室四面皆有靑白石亦以自然光明如厶𢇁舊作糸射字如此張形下正平自有石牀石塌曲夾長短障隔分別有如刻成亦整盛也東北有小口纔劣容人入入二三百步乃得洞室初入口甚急愈入愈寬大也口外南面有三積石積石}
