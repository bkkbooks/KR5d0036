  - {type: variant, offset: 14, length: 4, content: 三等鬼帥, HFL: 一洞口見外近時有人入見一青蛇在洞中因與呼爲青龍洞山近上及北面西面亦並有洞穴同不知何者是此兩口耳山上又有泉水冬夏不竭山平所以號爲四平及方山也甚多南燭今積金山東此樹皆能高大館中諸道士所資爲藥也其中先止者有張祖常劉平阿吕子華蔡天生龍伯高並處于方臺矣張祖常者彭城人也吴時從北來得入此室祖常託形墮車而死故隱身幽館而修守一}
