  - {type: variant, offset: 6936, length: 0, content: '', CK-KZ: 陰山中有學道者尹虔子張石生李方回並晉武帝時人授仙人管成子蒸丹餌朮法俱服得延年健行又受蘇門周壽陵服丹霞之道行已五十年精心內視不復飲食體骨輕健色如童子以今年二月十二日太一遣迎以其日乘雲升天今在玄州受書爲高仙眞人張石生爲東源伯衡山中有學道者張禮正冶明期二人禮正以漢末在山中服黃精顏色丁壯常如年四十時明期以魏末入山服澤瀉栢實丸乃共同止巖中後俱授西城王君虹景丹方從來服此丹已四十三年中患丹砂之難得俱出廣州爲沙門是縢含爲剌史時也遂得內外洞徹眼明身輕一日行五百里又兼守一守一亦已三十年以三月一日東華遣迎以其日乘雲升天今在方諸飈室俱爲上仙縢含以永和十年甲寅年爲廣州剌史此得仙乙丑嵗十二年是爲前服丹已三十二年猶更出查也廬江潛山中有學道者鄭景世張重華並以晉初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹久久不復飲食而身體輕强反易故形以今年四月十九日北玄老太一迎以雲軿白日升天今在玄州括蒼山有學道者平仲節河中人以大胡亂中國時來渡江入括蒼山受師宋君存心鏡之道具百神行洞房事如此積四十五年中精思身形更少體有眞炁今年五月一日中央黃老遣迎卽日乘雲駕龍白日升天今在滄浪雲臺大胡亂者是劉淵劉聰時也石勒爲小胡剡小白山中有學道者趙廣信}
