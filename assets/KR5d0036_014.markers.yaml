  - {type: variant, offset: 445, length: 1330, content: 堂寢遊行神州之鄉出館易遷童初二府入晏東華上臺受學化形濯景易氣十二年氣攝神魂十五年神束藏魄三十年棺中骨還附神氣四十年平復如生人還遊人間五十年位補仙官六十年得遊廣寒百年得入昆盈之宮此即主者之上者仙人之從容矣張姜子等先在第二等中亦始得入易遷耳鬼帥之位次亦如此矣主者之位亦不限男女按此年限得棺中之骨便得出生世中亦往往有此改變隱適難已意量殆入不可思議之境耳易遷童初二宮是男女之堂館也其中閒靜東海青童君一年再遊校此諸宮觀見群輩也一年再遊似依傳中曰而前書云正月二十三日東宮上人來便是不必復有定期也趙素臺在易遷宮中已四百年不肯徙自謂天下無復樂於此處也趙素臺是趙熙女漢時為幽州刺史有濟窮人於河中救王惠等於族誅行陰德數十事故其身得詣朱陵兒子今並得在洞天中也熙恆出入在定錄府素臺數微服遊行道巷盼山澤以自足矣趙熙漢書不顯微服遊行蓋謂在洞天中耳不應乃出世中也易遷中有高業而蕭條者有竇瓊英韓太華劉春龍王進賢李奚子郭叔香此數人並天姿鬱秀澄上眇邈才及擬勝儀觀駭眾此則主者之高者仙官之可才其次及得張善子輩鄧伯苗母有善行故後來人多宗芘之竇瓊英者竇武妹也其七世祖有名峙者以藏枯骨為業以活死為事故祚及於英身矣竇武字游平竇融玄孫峙則應是融祖也武亦恆以財物散施天下貧乏靈帝時為大將軍與陳蕃俱被誅其母產武時並產一蛇蛇出即走上南山至母死無何而來哀泣良久又去亦所以為異但未解俱承七世之慶兄戮而妹仙當非道家之北斗也鬼官別有北斗君以司生殺爾按孫皓敗將張悌軍人柳榮病死已三日且忽起大呼云至北斗門下見人縛悌來因是驚誤爾日晚悌戰死如此即應是第四宮也今第五第六宮不顯所主者恐是考責之府也鬼官之太帝者北帝君也治第一天宮中總主諸六天宮餘四天宮其四明公各在其中治雖云各治一宮又不顯各在何宮宮既並列復不得依位作四方言之尋其公次第高下則第二宮名為西明公治第三宮東明公治第四宮北斗君治及次南次北也二天宮立一官六天凡立為三官三官如今刑名之職主諸考謫常以真仙司命兼以總御之也並統仙府共司生死之任也大斷制皆由仙官道家常呼三官者是此也而消魔經云岱宗又有左火官右水官及女官亦名三官並主考罰今三茅君通掌之大君為都統保命為司察矣所以隸仙官者以為天下人不盡皆死其中應得真仙則非北帝所詮或有雖死而神化反質者如此皆在真仙家簡錄故司命之職應而統之也鬼官北斗君乃是道家七辰北斗之考官此鬼一官又隸九星之精上屬北晨玉君天上北斗有所司察故鬼官亦置此職以精象相應統領既關璇璣是以仰隸太上之曹也府耳未必盡徑來也別更一二密可示爾同氣令知斗處幽間之泰也道業可不勖哉此三人外書並不顯後漢有李云亦為白馬令以直言忤旨死令示同氣者謂以告長史掾也七月二十四日夜保命君告按前受長史司馬諸人雖定錄所告而應是初說洞中事是醜年十一月今此說雜人乃宜繼後反為七月複不應是寅年進退拯難詳從地下主者來凡十四條並有掾寫共一卷也含真臺洞天中皆有非獨此也此一臺偏屬太元府隸司命耳其中有女真二人總之其一女真是張微子漢昭帝時將作大匠張慶女也微子好道因得尸解法而來入此亦先在易遷中微子常服霧氣自云霧氣是山澤水火之華精金石之盈氣也久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期文期青童之妹也微子曾精思於寢靜誠心感靈故文期降之授以服霧之道也服霧之道授微子微子亦時以教諸學在含真易遷中者我昔嘗得此方乃, HFL: ''}
