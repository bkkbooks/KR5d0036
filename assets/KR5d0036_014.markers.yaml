  - {type: variant, offset: 6942, length: 5, content: 童初府西向, WYG: 朖曜南辰含靈萬世乘景上旋化成三道日月為隣實𤣥實師號曰元人變成三老友帝之先安知至人不有來遊觀化兆間混俗為儔釋羽沈鈴安此南堣豈將好兆染俗久留七聖𤣥紀中云赤君下教變迹作沙門與六弟子俱皆顯姓名也為世染俗不適生期赤怪潜駭三柱為災賢者南遊三嶽是之𤣥君來行人其誰知赤怪則熒惑星也三柱者五車星中三柱也陟屢反在元炁為元君在𤣥宫為𤣥師在南辰為南極老人在太虚為太虚眞人在南嶽為赤松子此乃天帝四眞人之師太}
