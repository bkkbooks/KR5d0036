  - {type: variant, offset: 5826, length: 139, content: 合景以煉一身一身之里五髒照徹此亦要道也此數人並已三百餘年正玄白之力也並是不死之學者未及於仙道玄白事已重抄出在第三篇修用中計杜於建安初可年二十許至晉興寧三年始一百九十歲諸人又晚學而此云並三百餘年恐長三字亦強可是二耳若欲守玄白者當與其經經亦少許耳自可兼行以除萬邪卻千害行之三十年匿身, CK-KZ: 常服靑飢方託形醉亡}
