  - {type: variant, offset: 5794, length: 1, content: 初, CK-KZ: 戴孟之本族乃亦已陳之在後矣吕子華者山陽人也陰君弟子已服虹丹之液而未讀內經來從東卿受太霄隱書而誦之常以幽隱方臺爲樂不願造于仙位也蔡天生者上谷人也小爲嘯父賣雜香於野外以自業贍情性仁篤口不言惡道逢河伯少女從天生市香天生知是異人再拜上一檐香少女感之乃教其朝天帝玉皇之法遂以獲仙託形舄杖隱}
