  - {type: variant, offset: 6942, length: 5, content: 童初府西向, HFL: 朗曜南辰含靈萬世乘景上旋化成三道日月爲鄰實玄實師號曰元人變成三老友帝之先安知至人不有來遊觀化兆間混俗爲儔釋羽沉鈴安此南堣豈將好兆染俗久留七聖玄紀中云赤君下教變迹作沙門與六弟子俱皆顯姓名也爲世染俗不適生期赤怪潜駭三柱爲灾賢者南遊三嶽是之玄君來行人其誰知赤怪則熒惑星也三柱者五車星中三柱也步屢反在元炁爲元君在玄宫爲玄師在南辰爲南極老人在太虚爲太虚眞人在南嶽爲赤松子此乃天帝四眞人之師太}
