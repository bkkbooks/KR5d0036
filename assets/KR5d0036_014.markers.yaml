  - {type: variant, offset: 2689, length: 282, content: 云掾恆與方山五人往來但不知有路通洞天中不爾繁陽子即鹿跡洞中何苗也此北絪山中亦有此物未詳頠山在何處今句曲北鹿跡山西有名頠角山似當是其處也石腦故如石但小斑色而軟耳所在有之服此時時使人發熱又使人不渴李整昔未入山時得風痺疾久久乃愈耳此人先多房內事殆不同今者疾之輕薄也石腦今大茅東亦有形狀圓小如曾青而質色似鍾乳床下乃皎白時有黑斑而虛軟服之乃熱為治亦似鍾乳也羅江大霍有洞臺中有五色隱芝此則南真及司命所任之處也華陽洞亦有五種夜光芝此則司命所請以植句曲內外者也良常山有熒火芝此物在地如熒火狀其實似草而非也大如豆形紫華夜視有光得食一枚心中一孔明食七枚七孔明可夜書計得食四十七枚壽萬年, HFL: ''}
