  - {type: variant, offset: 6910, length: 1, content: 視, HFL: 此四人並是用靈丸雜解之道季主一男一女俱得道男名法育也女名濟華今皆在委羽山中濟華今日正讀三十九章猶未過竟此理亦欲難詳季主讀玉經服明丹之華挹扶晨之暉今顔色如二十女子鬚長三尺黑如墨也昨日東卿君道此如所疏眞竒事也不知果云何耳此一行楊君自記與長史不知之辭或云别有以季主託形隱景潜跡委羽紫陽傳具載其事也昨夜東卿至聊試請問季主本末東卿見答令疏如別爲以上呈願不怪之省訖付火此楊君與長史書今有華撰周君傳記季主事殊略}
