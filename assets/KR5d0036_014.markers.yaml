  - {type: variant, offset: 6946, length: 1, content: 向, CK-KZ: 城及趙伯玄劉子先是也王君昔用劍解非龍胎諸丹恐瓊精卽是曲晨耳服金丹而告終者臧延甫張子房墨狄子是也挹九轉而尸臰吞刀圭而虫流司馬季主甯仲君燕昭王王子晉是也桐栢亦用劍解當是此吞刀圭者非九轉也司馬季主亦以靈丸作兵解故右英云頭足異處燕昭學仙而不見別跡景純云无靈炁則爲先究其事矣周穆王北造崑崙之阿親飲絳山石髓食玉樹之實而方墓乎汲郡此則穆天子傳所載見西王母時也夏禹詣鍾山啖紫柰醉金酒服靈寶行九眞而猶葬於會稽此事亦出五符中茅傳又云受行玄眞之法北戎長胡大王獻帝舜以白琅之霜十轉紫華服之使人長生飛仙與天地相傾舜卽服之而方死葬蒼梧之野此諸君並已龍奏靈阿鳳鼓雲池矣而猶尸解託死者欲斷以生死之情示民有終始之限耳豈同腐骸太陰以肉餉螻蟻者哉直欲遏違世之夫塞俗人之願望也古來英聖之王唯未見顯堯及湯得道及鬼官之迹耳至於靑精先生彭鏗鳳綱南山四皓淮南八公並以服上藥不至}
