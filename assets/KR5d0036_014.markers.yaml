  - {type: 'tls:seg', offset: 6900, content: '', id: KR5d0036_tls_014-22a.27}
  - {type: variant, offset: 6900, length: 1, content: 或, CK-KZ: 其母亦被刑苗旣非進同生官位復異具苗而字達於義不類恐別是一弟不必是名苗戰死者耳又有馮良馮良是南陽冠軍軍人少作縣吏年三十爲尉從佐迎督郵自恥無志因毁車煞牛裂敗衣幘遂去從師受詩傳禮易復學道術占候家中謂已死十五年乃還整修志節抗操嚴恪州郡禮辟不就詔特徵賢良高弟半道委之還家時三公爭讓位於良遂不降就年六十七乃棄世東渡入山今在鹿跡洞中後漢安帝時人也漢書所載事亦畧同又有郎宗者字仲綏北海安邱人少仕宦爲吳縣令學精道術占候風炁後一旦有暴風經窗間占知京師大火燒大夏門遣人往參果爾諸公聞之以博士徵宗宗恥以占事就夜解印綬負笈遯去居華山下服胡麻丸得道今在洞中後漢書載郎宗事云理京房易善星算風角六日七分能望氣占候吉凶常賣卜自奉安帝徵對策爲諸儒表後拜吳令時卒有暴風宗占知京師}
  - {type: page-break, offset: 6900, content: '', id: KR5d0036_CK-KZ_03p082b, image: JY237/CK-KZ_JY237_03p082b.png}
