  - {type: variant, offset: 6802, length: 2, content: 連延, CK-KZ: 屬南徐州界正對茅山北望見之亦有道士住鹿跡在石上故仍以爲名洞口處乃可知而}
  - {type: variant, offset: 6802, length: 2, content: 連延, CK-KZ-jye: 屬南徐州界正對茅山北望見之亦有道士住鹿跡在石上故仍以爲名洞口處乃可知而}
  - {type: variant, offset: 6802, length: 2, content: 連延, HFL: 屬南徐州界正對茅山北望見之亦有道士住鹿跡在石上故仍以爲名洞口處乃可知而}
  - {type: variant, offset: 6802, length: 0, content: '', WYG: 屬南徐州界正對茅山北望見之亦有道士住鹿跡在石上故仍以為名洞口處乃可知而甚嚴潔亦无人敢觸冒者此云如華陽三便門則南洞北洞本天開餘東西及東南皆是塞矣鹿跡華山中及洞主有謝稚堅王伯遼繁陽子號名耳是漢越騎校尉何苗叔達也進之同母弟少好道曾居河東繁山之南服食故自號為繁陽子中君答長史問葛𤣥云在葢竹山恒與謝稚堅相隨今稚堅乃在此不知為去來往還為當兩人同姓名也後漢書云何苗是何進異母弟為車騎將軍黨附閹勢進被害時苗於朱雀闕下與進將吳匡戰死被斬董卓又破棺出尸支解之既非故為兵解去不知遂得來居此其母亦被刑苗既非進同生官位復異其苗而字達於義不𩔖恐别是一弟不必是名苗戰死者耳又有馮良馮良南陽冠軍軍人少作縣吏年三十為尉從佐迎督郵自恥無志因毁車煞牛裂敗衣幘遂去從師受詩傳禮易復學道術占候家中謂已死十五年乃還整修志節抗操嚴恪州郡禮辟不就詔特徵賢良髙第半道委之還家時三公爭讓位於良遂不降就年六十七乃棄世東渡入山今在鹿跡洞中後漢安帝時人也漢書所載事亦畧同又有郎宗者字仲綏北海安丘人少仕宦為吳縣令學精道術占候風炁後一旦有暴風經窻間占知京師大火燒大夏門遣人往參果爾諸公聞之以博士徵宗宗恥以占事就夜解印綬負笈遯去居華山下服胡麻丸得道今在洞中後漢書載郎宗事云理京房易善星算風角六日七分能望氣占候吉凶常賣卜自奉安帝徵對䇿為諸儒表後拜吳令時卒有暴風宗占知京師當有大火記識日月遣人參候果如其言諸公聞而表上以博士徵之宗恥以占驗見知徵書到夜懸印綬於縣庭而遯去遂終身不仕子顗字雅光傳父業研精學徒常數伯人順帝陽嘉二年徵詣闕上書十一事拜郎中還家後為同縣孫禮所害其餘其王叔明鮑元治尹葢婦之徒復二十餘人並在北山不能復一二記之也此數人是絶洞諸山之主耳此絶洞仙人亦思得學道者欲與之共處於洞室困時无其人耳此洞既无所通達正是地仙棲處必非三十六天之限也道喪由簮良可哀矣寓家辱人哉簮者謂人貪仕宦衣冠坐此不得務道家室本寄寓耳此洞中乃是永宅為戀戀不去實足辱敗人矣此亦諷誘於長史耳右保命君告右三條楊書范帥云三官有獄官不名廷尉名大理李豐今為大理都餘一守缺以擬王附子不以與許虎也守職如今獄之三官也李豐字安國改字宣國馮翊人李義子本寒微有才志遂事魏為尚書僕射尉與夏侯𤣥謀廢晉景王事泄召來令人以刀鐶撞腰煞之大理當為大理即古之獄官前漢洎魏時廷尉亦名大理此軄是仙官也王附子是王厶之小名許虎即虎牙也鮑靚因吾屬長史鼠子輩既爾可語郡守令得反映亦屬吾其家比衰欲非可奈何可寫存之鼠子恐是鮑靚小名鮑為南海郡仍解化兒輩未得歸都所以屬之鮑即許先生之師也右二條有楊書武當山道士戴孟者乃姓燕名濟字仲㣲漢明帝末時人也夫為養生者皆隱其名字藏其所生之時故易姓為戴託官於武帝耳而此人少好道德不仕於世矣少孤養母母喪行服葬服闋遂入華陽山服术食大黄及黄精種雲母雄黄丹砂芝草受法於清靈真人即裴冀州之弟子也得不死之道裴真人授其玉珮金鐺經并石精金光符遂能輕身健行周旋名山日行七百里多所經渉猶未得成仙人也戴乃授行玉佩金鐺而止不死而已未得神仙於理為小難詳後又云𤣥真亦其鈔要行之者神仙不死又與本經不同及石精金光符既不為劒用則止是解化一符單服者此符主隱遯不云健行也種五品芝世亦有法仙人郭子華張季}
