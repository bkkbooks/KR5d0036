  - {type: variant, offset: 5181, length: 263, content: 中也琰即禁山符云為孫權所殺化形而去往建安方山尋白羊公杜必當於此時受道也音薛即與舜同字四畫契三畫分毫有異也徐宗度晉陵人作孫皓左典軍呂悌司馬受風谷先生氣禁道故得俱晏賢生是步陟外甥即宗度之弟子也契弟子二人一人孫賁孫女寒華也少時密與契通情後學道受介琰法又以法受寒華寒華初去時先叛入建安依邵武長張毅毅即通親故得免脫事平乃歸茅山耳寒華行玄白法而有少容今嘗俱處也玄白道忌房室自契受道不得行此吳豫章太守孫賁之子也山陰王孫奚之子寒華也尋此二人乃因奔淫無應入道而用志能自抑斷如此此宜其階也賁是權同堂兄有子四人各名鄰安熙疏而無奚或是小名又無奚或為王, CK-KZ: ''}
