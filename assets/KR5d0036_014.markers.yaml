  - {type: variant, offset: 6952, length: 6, content: 文曰解帶被褐, CK-KZ: 山盡五色金也經丹水而南行有洞交會從中過行三十餘里則得此山今在剡及臨海數縣之境亞海中者今呼括蒼在甯海北鄞縣南金庭則前右弼所稱者此地在山外猶如金靈而靈奇遇之今人無正知此處聞採藤人時有遇入之者隖隩甚多自可}
