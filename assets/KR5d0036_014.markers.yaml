  - {type: variant, offset: 6904, length: 0, content: '', ZTDZ: 仙於理爲小難詳後又云玄眞亦其鈔要行之者神仙不死又與本經不同及石精金光符既不爲劒用則止是解化一符單服者此符主隱遯不云健行也種五品芝世亦有法仙人郭子華張季連趙叔達晩又有山世遠者此諸人徃來與之遊焉昔居武當今來大霍欲從司命君受書故未許焉山已得爲太和眞人則應居在南陽太和山矣餘三人不見别顯岀也戴公拍腹有十數卷書是太微黄書耳此人即謝允之師也按金相傳太微黄書第八篇有目録云凡有八卷唯此一卷出世今戴公乃有十許篇亦爲不同拍腹之義謂恒以繫腰也其外傳事亦同此謝允字道通歷陽人小時爲人所略賣徃東陽後告官被誣在爲傷獄事將欲入死夜有老公授其符又有黄衣童子去來於是得免咸康中至襄陽入武當山見戴孟孟即先來獄中者因是受道又岀仕作歷陽新豐西道三縣所在多神驗年七十餘猶不老後乃告終也黄衣童子者即玉珮金鐺之官耳云坐上常有一人共坐胇者應是胇胇不明狀也即太極眞人時徃來也按說如此似答問黄衣童意亦可是午時既及謝因此面訪其事受行玉珮金鐺經自然致太極眞人諺云服九靈日月華得降我太極之家此之謂也玄眞之法亦其鈔要也行之者神仙不死裴眞人有弟子三十四人其十八人學佛道餘者學仙道應作牖字弟子劉顯林辛仲甫趙子常周眞人有十五人弟子四人解佛法入室弟子王瑋達李建道泉法堅桐栢有二十五人弟子八人學佛入室弟子于弘智竺法靈鄭文成陳元子此當略舉標勝者耳辛泉于竺皆似胡姓也當是學佛弟子也右八條有掾寫共一篇相連霍山中有學道者鄧伯元王玄甫受服青精石飯吞日丹景之法用思洞房已來積三十四年乃内見五藏㝠中夜書以今年正月五日太帝遣羽車見迎伯元玄甫以其日遂乘雲駕龍白日登天今在北玄圃臺受書位爲中嶽眞人伯元吴人玄甫沛人華隂山中有學道者尹虔子張石生李方回並晋武帝時人授仙人管成子蒸丹餌术法俱服得延年健行又受蘇門周壽陵服丹霞之道行已五十年精心内視不復飲食體骨輕健色如童子以今年二月十二日太一遣迎以其日乘雲升天今在玄州受書爲高仙眞人張石生爲東源伯衡山中有學道者張禮正冶明期二人禮正以漢末在山中服黄精顔色丁壯常如年四十時明期以魏末入山服澤瀉栢實丸乃共同止巖中後俱授西城王君虹景丹方從來服此丹已四十三年中患丹砂之難得俱出廣州爲沙門是縢含爲刺史時也遂得内外洞徹眼明身輕一日行五百里又兼守一守一亦已三十年以三月一日東華遣迎以其日乘雲升天今在方諸飈室俱爲上仙縢含以永和十年甲寅年爲廣州刺史此得仙乙丑歲十二年是爲前服丹已三十二年猶更出查也廬江潜山中有學道者鄭景世張重華並以晋初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹久久不復飲食而身體輕强反易故形以今年四月十九日北玄老太一迎以雲軿白日升天今在玄州括蒼山有學道者平仲節河中人以大胡亂中國時來渡江入括蒼山受師宋君存心鏡之道具百神行洞房事如此積四十五年中精思身形更少體有眞炁今年五月一日中央黄老遣迎即日乘雲駕龍白日升天今在滄浪雲臺大胡亂者是劉淵劉聦時也石勒爲小胡剡小白山中有學道者趙廣信陽城人魏末來度江入此山受李法成服炁法又受師左君守玄中之道内見五藏徹視法如此七八十年周旋郡國或賣藥岀入人間人莫知也多來都下巿丹砂作九華丹丹成一服太一道君以今年六月十七日遣迎停三日與山中同志别去遂乘雲駕龍白日登天今在東華海中有狼五山中有學道者虞翁生會稽人也昔受仙人介君食日精法以吴時來隱此山兼行雲炁迴形之道精思積久形體更少如童子今年七月二十三日東太帝遣迎即日乘雲升天今在陽谷山中狼五山在海中對白章岸今直呼爲狼山赤水山中學道者朱孺子吴末入山服菊花及术餌後遇西歸子從乞度世西歸子授以要言入室存泥丸法三十年遂能致雲雨於洞房中今年八月五日西王母遣迎即日乘五色雲車登天今在積石臺赤水山云在鄞縣南十里從楠谿口入三百里山正赤週迴五十里高千餘丈如此則應是臨海永嘉東北名赤巖者也許先生所住赤山一名燒山即此名山五嶽中學道者數百萬人今年有得道而升天者人名如別年年月月皆有去者如此不可悉紀今爲疏一年之得道人耳有不樂上升仙而長在五嶽名山者乃亦不可稱數或爲仙官使掌名山者亦復有數千九月二十日夜清靈䟽出右八條有掾寫共一卷相隨清靈猶是裴清靈也此九月即應是乙丑歲即疏其年中得道者吴睦者長安人也少爲縣吏掌局枉尅民人民人訟之法應入死睦登委叛遠遁山林餓經日行至石室遇見孫先生在室中隱學左右種黍及胡麻室中恒盈食睦至乞食經月不去孫先生知是叛人初不問之與食料理及誦經講道說及禍福睦聞之於是心開意悟因叩頭自搏列其事源立身所行自首事實求得改徃遂留石室爲先生掃除驅使經四十年後先生受其道俱採藥服食胡麻精修經教得三百二十年服丹白日升天朱㹠者陳留人也爲人無道專作劫盜後人發覺收掩㹠得逸出遠他境至汝南少室山中見馮先生隱學云後三年乃受其眞仙留山服食修道三十八年後入東阬山中壽百四十七歲仙人降將入大有山洞中成眞人郭靜者潁川人也少孤無父母兄弟窮苦依棲無所年十六縣召爲吏後得罪仍逃伏經二月日不出遇見鄭先生救度一切以法勸化之靜遂隨鄭負擔駈使經七年不敢懈怠遂受其導引之要餌服山术茯苓得壽三百歲復於天維山赤松子降受其二人眞道今在大有洞中爲眞人范伯慈者桂陽人也家本事俗而忽得狂邪因成邪勞病頓卧床蓆經年迎師解事費用家資漸盡病故不愈聞大道清約無所用於是意變聞沈敬作道士精進理病多驗乃棄俗事之得五十日病疾都愈云云後詣陸玩之受眞内道玩之不能入山伯慈不樂於世遂辭去入天目山服食胡麻精思十七年大洞眞仙司命君下降受三十六篇經後服還丹白日昇天今爲玄一眞人所注云云云處是抄事人不能併取非本闕也右四條有人於東間鈔得云是眞書而不知誰跡亦無所受者而辭㫖有用故紀續之又此四人各有所明一則酷吏二則凶劫三則孤煢四是事俗并世間薄運遂能得道足知心之所造非關善惡者也司馬季主後入委羽山石室大有宫中受石精金光藏景化形法於西靈子都西靈子都者太玄仙女也其同時今在大有室中者廣甯鮑叔陽太原王養伯潁川劉瑋惠岱郡段季正俱受師西靈子都之道也季主臨去之際託形枕席爲代己之像墓在蜀郡成都升盤山之南諸葛武侯昔建碑銘德於季主墓前碑讚末曰玄漠太寂混合隂陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明眞誥云季主咽虹液而頭足}
