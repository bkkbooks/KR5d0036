  - {type: variant, offset: 6854, length: 1, content: 肯, WYG: 問之與食料理及誦經講道說及禍福睦聞之於是心開意悟因叩頭自搏列其事源}
  - {type: punctuation, offset: 6856, content: ，, id: KR5d0036_tls_014-bkkpn1292}
  - {type: 'tls:seg', offset: 6856, content: '', id: KR5d0036_tls_014-22a.21}
  - {type: variant, offset: 6856, length: 0, content: '', WYG: 身所行自首事實求得改往遂留石室為先生掃除驅使經四十年後先生受其道俱採藥服食胡麻精修經教得三百二十年服丹白日升天朱㹠者陳留人也為人無道專作刼盗後人發覺収掩㹠得逸出逺他境至汝南少室山中見馮先生隱學云後三年乃受其眞仙留山服食修道三十八年後入東阬山中夀百四十七歲仙人降將入大有山洞中成真人郭静者潁川人也少孤無父母兄弟窮苦依棲無所年十六縣召為吏後得罪仍}
  - {type: page-break, offset: 6856, content: '', id: KR5d0036_WYG_014-12a, image: WYG1059/WYG1059-0450c.png}
  - {type: variant, offset: 6857, length: 0, content: '', WYG: 伏經二月日不出遇見鄭先生救度一切以法勸化之静遂隨鄭負擔駈使經七年不敢懈怠遂受其導引之要餌服山术茯苓得壽三百歲復於天維山赤松子降受其二人眞道今在大有洞中為真人范伯慈者桂陽人也家本事俗而忽得狂邪因成邪勞病頓卧牀蓆經年迎師解事費用家資漸盡病故不愈聞大道清約無所用於是意變聞沈敬作道士精進理病多驗乃棄俗事之得五十日病疾都愈云云後詣陸玩之受眞内道玩之不能}
  - {type: page-break, offset: 6857, content: '', id: KR5d0036_WYG_014-12b, image: WYG1059/WYG1059-0450d.png}
  - {type: page-break, offset: 6857, content: '', id: KR5d0036_WYG_014-13a, image: WYG1059/WYG1059-0451a.png}
  - {type: variant, offset: 6858, length: 1, content: 菁, WYG: ''}
  - {type: variant, offset: 6860, length: 2, content: 穴越, WYG: 伯慈不樂於世遂辭去入天目山服食胡麻精思十七年大洞眞仙司命君下降受三十六篇經後服還丹白日昇天今為𤣥一眞}
  - {type: punctuation, offset: 6861, content: ，, id: KR5d0036_tls_014-bkkpn1293}
  - {type: 'tls:seg', offset: 6861, content: '', id: KR5d0036_tls_014-22a.22}
  - {type: variant, offset: 6863, length: 1, content: 董, WYG: 所注云云云處是抄事人不能併取非本闕也有四條有人於東間鈔得云是真書而不知誰跡亦無所受者而辭旨有用故紀續之又此四人各有所明一則酷吏二則凶刼三則孤煢四是事俗並世間薄運遂能得道足知心之所造非關善惡者也司馬季主後入委羽山石室大有宫中受石精金光藏景化形法於西靈子都西靈子都者太𤣥仙女也其同時今在大有室中者廣甯鮑叔陽太原王養伯潁川劉瑋惠岱郡段季正俱受師西靈子都之道也季主臨去之際託形枕席為代已之像墓在蜀郡成都升盤山之南諸葛武侯昔建碑銘德於季主墓前碑讚末曰𤣥漠太寂混合陰陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明眞誥云季主咽虹液而頭足異處劍經注云吞刀圭而蟲流今東卿說云託形枕席為代已之像似當是作録形靈丸兵解去也漢史既不顯其終无以别測其事也廣甯鮑叔陽者漢髙帝時趙王張耳張敖之大夫也少好養生服桂屑而卒死於厠溷間今墓在遼東薊城之北山漢髙置燕郡以薊屬燕當是未分時也太原王養伯者漢高吕后攝政時中常侍中瑯瑘王探也少服澤㵼與留侯張良俱採藥於終南山而養伯不反遂師事季主前漢中常侍不用閹人中郎非侍郎之官或是後别為此位耳潁川劉瑋惠漢景帝時公車司馬劉諷也後事季主晚服日月炁為入室弟子道成晚歸鄉里託形杖履身死桑樹之下今墓在汝南安城縣西山岱郡段季正本隱士也不聞有所服御晚乃從季主學道行度秦川溺水拘得尸而葬川邊今南鄭秦川是也此人亦季主入室弟子尋此四人並是用靈丸雜解之道季主一男一女俱得道男名法育也女名法肓也女名濟華今皆在委羽山中濟華今日正讀三十九章猶未過竟此理亦欲難詳季主讀玉經服明丹之華挹扶晨之暉今顔色如二十女子鬚長三尺黒如墨也昨日東卿君道此如所疏眞奇事也不知果云何耳此亦行楊君自記與長史不知之辭或云别有以季主託形隱景潜跡委羽紫陽傳具載其事也昨夜東卿至聊試請問季主本末東卿見答令䟽如别為以上呈願不怪之省訖付火此楊君與長史書今有華撰周君傳記季主事殊畧未見别眞手書傳依此語則為非也此前似有案語今闕失一行是後聖李君紀也大都與前者畧同然東卿復兼有注解注解近萬餘言大奇作也昨來多論神化之耳聊及季主耳去月又見授神虎經注解注解非世間所聞亦自不掌其旨也若更聞如季主比者自當宻白此亦楊君與長史書也既是論季主事故仍以相次不復}
