  - {type: variant, offset: 5377, length: 180, content: 子也山陰王孫奚之子寒華也尋此二人乃因奔淫無應入道而用志能自抑斷如此此宜其階也賁是權同堂兄有子四人各名鄰安熙疏而無奚或是小名又無奚或為王者也其弟一子是陳世京世京孫休時侍郎少好道數入佛寺中與契鄉里故晚又授法契初將寒華入建安之時時亦同舉實賴世京濟其密計焉此數子今處茅山之外非常在洞中之客也亦時得入耳亦數至長史舍屋間遊戲然多在大茅之間建安初至孫休即位六十二年杜初從孫策, HFL: 士謂刻鵠}
