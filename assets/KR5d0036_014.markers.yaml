  - {type: variant, offset: 6949, length: 0, content: '', CK-KZ: 御龍攀髯及子晉馭鵠並爲不同亦可是化後更出而爲之也玉子者帝俈也曾詣鍾山獲九化十變經以隱遁日月遊行星辰後一旦疾崩營塚在渤海山夏中衰時有發王子墓者室中無所有唯見一劍在北寢上自作龍鳴虎嗥之聲人遂無敢近者後亦失所在也帝俈則堯父外書作嚳字王子喬墓在京陵戰國時復有發其墓者唯見一劍在室人適欲取視忽飛入天中也欒巴昔作兵解去入林慮山中積十三年而後還家今在鵠鳴赤石山中漢書云巴爲桂陽豫章太守後下獄死當仍是用靈丸解云也亦出仙傳中右此三條皆出掾寫劍經中經非可輕見旣是說諸仙人事迹隱居謹抄出以相輔類耳至人焉在朖曜南辰含靈萬世乘景上旋化三道日月爲鄰實玄實師號曰元人變成三老友帝之先安知至人不有來遊觀化兆間混俗爲儔釋羽沉鈴安此南堣豈將好兆染俗久留七聖玄紀中云赤君下教變迹作沙門與六弟子俱皆顯姓名也爲世染俗不適生期赤怪潛駭三柱爲災賢者南遊三嶽是之玄君來行人其誰知赤怪則熒惑星也三柱者五車星中三柱也步屢反在元炁爲元君在玄宮爲玄師在南辰爲南極老人在太虛爲太虛眞人在南嶽爲赤松子此乃天帝四眞人之師太一之友此四條是長史抄出不審本是何經書中事並是說南嶽赤君下教之旨師友之目小異諸經桐柏山高萬八千丈其山八重周迴八百餘里}
