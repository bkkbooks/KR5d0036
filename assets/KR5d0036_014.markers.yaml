  - {type: variant, offset: 7514, length: 1, content: 自, CK-KZ: 所居處焉此二山是陽九百六厯數之摽揭也百六之運將至則陽長水竭陰成水架矣陽九之運將至則陰成水竭陽長水架矣頃者是陰成山水際已高九千丈矣百六之來無復久時陰成水際出山高則是高乃應云陽九而言百六似是誤言亦可是水起際如此高非先水退際爾但水性平又非湍瀨二山相去不遠未解那得頓孤懸如此右二條有長史寫未至廟第一高山西頭龍尾北汧洪水一所發地長六丈餘廣五丈入土六尺水流勢撻地二百餘步去路三里對廟後第二高山西頭汧洪水一所發地長四丈餘廣三尺餘入土四尺水勢撻地三百餘步去路二里近廟後汧脇一所洪水發地長五丈餘廣四丈餘入地二尺餘水勢流东入汧中去廟一百五十步右蔣山北凡三處發洪水流勢西北行此三條是異迹旣不見眞手未審是非又不知此發洪當是何時事山南乃經有發處}
