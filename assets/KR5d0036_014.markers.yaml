  - {type: 'tls:seg', offset: 6816, content: '', id: KR5d0036_tls_014-22a.15}
  - {type: variant, offset: 6816, length: 0, content: '', WYG: 似答問黄衣童意亦可是午時既及謝因此面訪其事受行玉佩金鐺經自然致太極眞人諺云服九靈日月華得降我太極之家此之謂也𤣥眞之法亦其鈔要也行之者神仙不死裴眞人有弟子三十四人其十八人學佛道餘者學仙道北墟應作牗字弟子劉顯林辛仲甫趙子常周眞人有十五人弟子四人解佛法入室弟子王瑋達}
  - {type: page-break, offset: 6816, content: '', id: KR5d0036_WYG_014-8a, image: WYG1059/WYG1059-0448c.png}
  - {type: variant, offset: 6817, length: 0, content: '', WYG: 建道泉法堅桐栢有二十五人弟子八人學佛入室弟子于𢎞智竺法靈鄭文成陳元子此當畧舉標勝者耳辛泉于竺皆似胡姓也當是學佛弟子也右八條有掾寫共一篇相連霍山中有學道者鄧伯元王𤣥甫受服青精石飯吞日丹景之法用思洞房已來積三十四年乃内見五藏㝠中夜書以今年正月五日太常遣羽車見迎伯元𤣥甫以其日遂乘雲駕龍白日登天今在北𤣥圃臺受書位為中嶽真人伯元呉人𤣥甫沛人華陰山中有學道者尹䖍子張石生李方回並晉武帝時人授仙人管成子蒸丹餌术法俱服得延年健行又受蘇門周夀陵服丹霞之道行已五十年精心内視不復飲食體骨輕健色如童子以今年二月十二日太一遣迎以其日乘雲升天今在𤣥州受書為髙仙眞人張石生為東源伯衡山中有學道者張禮正冶}
  - {type: page-break, offset: 6817, content: '', id: KR5d0036_WYG_014-8b, image: WYG1059/WYG1059-0448d.png}
  - {type: variant, offset: 6818, length: 2, content: 但言, WYG: 期二人禮正以漢末在山中服黄精顔色丁壯常如年四十時明期以魏末入山服澤㵼栢實丸乃共同止巖中後俱授西城王君虹景丹方從來服此丹已四十三年中患丹砂之難得俱出廣州為沙門是滕含為刺史時也遂得内外洞徹眼明身輕一日行五百里又兼守一守一亦已三十年以三月一日東華遣迎以其日乘雲升天今}
  - {type: page-break, offset: 6818, content: '', id: KR5d0036_WYG_014-9a, image: WYG1059/WYG1059-0449a.png}
  - {type: variant, offset: 6822, length: 1, content: 隅, WYG: 諸飈室俱為上仙滕含以永和十年甲寅年為廣州刺史此得仙乙丑歲十二年是為前服丹已三十二年猶更出查也廬江潜山中有學道者鄭景世張重華並以晉初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服𤣥丹久久不復飲食而身體輕强反易故形以今年四月十九日北𤣥老太一迎以雲軿白日升天今在𤣥州括蒼山有學道者平仲節河中人以大胡亂中國時來渡江入括蒼山受師宋君存心鏡之道具百神行洞房事如此積四十五年中精思身形更少體有眞炁今年五月一日中央黄老遣迎即日乘雲駕龍白日升天今在滄浪雲臺大胡亂者是劉淵劉聰時也石勒為小胡剡小白山中有學道者趙廣信陽城人魏末來度江入此山受李法成服炁法又受師左君守𤣥中之道内見五藏徹視法如此七八十年周旋郡國或賣藥出入人間人莫知也多來都下市丹砂作九華丹丹成一服太一道君以今年六月十七日遣迎停三日與山中同志别去遂乘雲駕龍白日登天今在東華海中有狼五山中有學道者虞翁生㑹稽人也昔受仙人介君食日精法以吳時來隱此山兼行雲炁迴形之道精思積久形體更少如童子今年七月二十三日東太帝遣迎即日乘雲升天今在陽谷山中狼五山在海中對白章岸今直呼為狼山赤水山中學道者朱孺子吳末入山服菊花及术餌後遇西歸子從乞度世西歸子授以要言入室存泥丸法三十年遂能致雲雨於洞房中今年八月五日西王母遣迎即日乘五色雲車登天今在積石臺赤水山云在鄞縣南十里從楠谿口入三百里山正赤週迴五十里髙千餘丈如此}
  - {type: page-break, offset: 6822, content: '', id: KR5d0036_WYG_014-9b, image: WYG1059/WYG1059-0449b.png}
