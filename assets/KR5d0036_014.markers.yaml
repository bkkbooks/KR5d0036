  - {type: variant, offset: 6903, length: 2, content: 神異, CK-KZ: 大火記識日月遣人參候果如其言諸公聞而表上以博士徵之宗恥以占驗見知徵書到夜懸印綬於縣庭而遯去遂終身不仕子顗字稚元傳父業研精學徒常數伯人順帝陽嘉二年徵詣闕上書十一事拜郎中還家後爲同縣孫禮所害其餘其王叔明鮑元治尹蓋婦之徒復二十餘人並在北山不能復一二記之也此數人是絶洞諸山之主耳此絶洞仙人亦思得學道者欲與之共}
