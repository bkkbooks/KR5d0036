  - {type: variant, offset: 6914, length: 3, content: 的墳塚, HFL: 也莊子師長桑公子授其微言謂之莊子也隱於抱犢山服北育火丹白日升天上補太極闈編郎長桑即是扁鵲師事見魏傳及史記世人苟知莊生如此者其書彌足可重矣施存者齊人也自號婉盆子得遁變化景之道今在中岳或少室徃有壺公正此人也然未受太上書猶未成眞焉其行玉斧軍火符是其所受之枝條也施存是孔子弟子三千之數三千之限有此人}
