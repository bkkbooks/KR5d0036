  - {type: variant, offset: 6396, length: 325, content: 欲宣廣使人濫住致有犯穢故也許長史今所營屋宅對東面有小山名雷平山周時有雷氏養龍來在此山後有姜叔茂田翁亦居焉其山北有柳汧水或名曰田公泉以其人曾居此山取此水故也雷平山在小茅北基址相連田公泉今具存左右甚多水柳樹故名柳珣此泉即前所云浣衣不用灰者長史宅自湮毀之後無人的知處至宋初長沙景王檀太妃供養道士姓陳為立道士廨於雷平西北即是今北廨也後又有句容山其王文清後為此廨主見傳記知許昔於此立宅因博訪耆宿至大明七年有術虛老公徐偶云其先祖伏事許長史相傳識此宅只在今廨前烏桕樹處應是似猶有齋堂前井存于時草萊蕪沒王即芟除尋覓果得磚井土已欲滿仍掘治更加簹累今有好水水色小白或是所云似鳳門外水味也於是審知是故宅從來空廢無敢居者既云金鄉至室便為伏龍之膏腴矣其西北即有長岡連亙呼為長隱, CK-KZ: 成尙類騖}
