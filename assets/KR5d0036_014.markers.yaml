  - {type: variant, offset: 1784, length: 735, content: 常以平旦於寢靜之中坐臥任己先閉目內視仿佛如見五髒畢因口呼出氣二十四過臨目為之使目見五色之氣相繞纏在面上鬱然因又口內此五色氣五十過畢咽唾六十過畢乃微咒曰太霞發暉靈霧四遷結氣宛屈五色洞天神煙合啟金石華真藹鬱紫空煉形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者爾可行此法邪久行之常乘雲霧而遊此服霧法已別抄用事在第三篇中今猶疑存此與本文相隨也其一女真是傅禮和禮和是漢桓帝外甥侍中傅建女也北地人其家奉佛精進女常旦夕灑掃佛前勤勤祝誓心願仙化神靈監其此心亦得來此久處易遷今始得為含真臺主也常服五星氣以得道禮和善歌歌則鳥獸飛聚而聽聲焉右定錄君言張傅二人外書不顯或應各在家譜中又一條有楊書又掾寫王衍為晉武帝尚書令其女字進賢為泯懷太子妃洛陽亂劉曜石勒略進賢渡孟津河於河中欲妻之進賢罵曰我皇太子婦司徒公之女而胡羌小子敢欲干我乎言畢即投河中其侍婢名六出復言曰大既有之小亦宜然復投河中時遇嵩高女真韓西華出遊而泯之撫接二人遂獲內救外示死形體實密濟便將入嵩高山今在華陽宮洞內易遷之中六出時年二十二三許體貌亦整善有心節本姓田漁陽人魏故浚儀令田諷之孫諷曾有陰德之行以及於六出耳晉書云王衍長女名景風貌美賈後為弟謐娶之少女名惠風以配泯懷太子恨之如此則不甚美也永嘉五年六月王彌劉曜石勒破洛賊欲逼妃妃拔刀曰我太尉公之女皇太子之妃有死而已終不為逆虜所辱遂見害家人收葬于城西南洛水之北追諡曰貞定妃與此說小異范幼沖遼西人也受胎化易形今來在此恆服三氣三氣之法存青氣白氣赤氣各如綖從東方日下來直入口中挹之九十過自飽便止為之十年身中自有三色之氣遂得神仙此高元君太素內景法旦旦為之臨目施行視日亦佳其法雖鮮其事甚驗許侯可為之此法亦以重抄書在第三篇修有事中范監者, HFL: ''}
