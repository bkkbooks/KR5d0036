  - {type: variant, offset: 6842, length: 50, content: 也越翳王是句踐四世孫初不肯立逃入菁山穴越人董出之後於吳徙還會稽以周宣王十一年為孫諸咎所殺越人又殺諸咎, CK-KZ: 爲兵解去}
