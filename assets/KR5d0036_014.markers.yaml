  - {type: variant, offset: 6913, length: 0, content: '', ZTDZ: 别眞手書傳依此語則爲非也此前似有按語今闕失一行是後聖李君紀也大都與前者略同然東卿復兼有注解注解近萬餘言大竒作也昨來多論神化之事聊及季主耳去月又見授神虎經注解注解非世間所聞亦自不掌其㫖也若更聞如季主比者自當宻白此亦楊君與長史書也既是論季主事故仍以相次不復岀置下卷長史撰眞仙傳欲以季主㝡在前所以楊君爲請問本末也司命所注二經並未出世也右十條有楊書范安遠適云湛子不事齊齊師伐之春秋傳曰湛無禮也此則左傳上事諶字作譚字竒譚國名也莊王十三年爲齊桓所滅不知何故述此似有所}
