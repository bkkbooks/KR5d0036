  - {type: variant, offset: 6909, length: 0, content: '', HFL: 墓在遼東薊城之北山漢高置燕郡以薊屬燕當是未分時也太原王養伯者漢高吕后攝政時中常侍中瑯琊王探也少服澤瀉與留侯張良俱採藥於終南山而養伯不及遂師事季主前漢中常侍不用閹人中郎非侍郎之官或是後别爲此位耳潁川劉瑋惠漢景帝時公車司馬劉諷也後事季主晩服日月炁爲入室弟子道成晩歸郷里託形杖履身死桑樹之下今墓在汝南安城縣西山岱郡段季正本隱士也不聞有所服御晩乃從季主學道行度秦州溺水拘得尸而葬川邊今南鄭秦川是也此人亦季主入室弟子}
