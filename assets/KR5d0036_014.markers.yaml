  - {type: variant, offset: 32, length: 220, content: 所鍾或身求長生步道所及或子弟善行庸播祖禰或諷明洞玄化流昆祖洞玄即大洞玄經讀之萬遍七祖已下並得煉質南宮受化胎仙非今世所稱洞玄靈寶經也夫求之者非一而獲之者多途矣要由世積陰行然後皆此廣生矣鬼帥武解主者文解俱仙之始也度名東華簡刊上帝不隸酆宮不受制三官之府也又別云心勤於事欲兼味於清正華目以隨世畏死而希仙者亦多作文武解主者其一等地下主者散在外舍閑停無業不受九宮教制不聞練化之業雖俱在洞天而是主者之下者此自按四明法一百四十年依格得一進耳一進始得步仙階給, HFL: 遇}
