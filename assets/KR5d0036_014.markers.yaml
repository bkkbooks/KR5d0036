  - {type: variant, offset: 5626, length: 159, content: 阻無人尋跡耳守玄白之道常旦旦坐臥任意存泥丸中有黑氣存心中有白氣臍中有黃氣三氣俱生如雲以覆身上因變成火火又繞身身通洞徹內外如一旦行之至日向中乃止于是服氣百二十過都畢道正如此使人長生不死辟卻萬害所謂知白守黑求死不得知黑守白萬邪消卻尤禁六畜肉及五辛之菜當別寢靜思尤忌房室房室即死此道與守一相似但如為徑要以減之耳忌房室甚於守一, CK-KZ: 館而修}
