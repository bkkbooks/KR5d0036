  - {type: variant, offset: 6903, length: 0, content: '', HFL: 大火記識日月遣人參候果如其言諸公聞而表上以博士徵之宗耻以占驗見知徵書到夜懸印綬於縣庭而遯去遂終身不仕子顗字稚元傳父業研精學徒常數佰人順帝陽嘉二年徵詣闕上書十一事拜郎中還家後爲同縣孫禮所害其餘其王叔明鮑元治尹蓋婦之徒復二十餘人並在北山不能復一二記之也此數人是絶洞諸山之主耳此絶洞仙人亦思得學道者欲與之共處於洞室困時無其人耳此洞既無所通達正是地仙棲處必非三十六天之限也道喪由簪良可哀矣寓家辱人哉簪者謂人貪仕宦衣冠坐此不得務道家室本寄寓耳此洞中乃是永宅爲戀戀不去實足辱敗人矣此亦諷誘於長史耳右保命君告右三條楊書范帥云三官有獄官不名廷尉名大理李豐今爲大理都餘一守缺以擬王附子不以與許虎也守職如今獄之三官也李豐字安國改字宣國馮翊人李義子本寒微有才志遂事魏爲尚書僕射尉與夏侯玄謀廢晋景王事泄召來令人以刀鐶撞腰煞之大理當爲大理即古之獄官前漢洎魏時廷尉亦名大理此職是仙官也王附子是王厶之小名許虎即虎牙也鮑靚因吾屬長史鼠子輩既爾可語郡守令得反映亦屬吾其家比衰欲非可奈何可寫存之耶鼠子恐是鮑靚小名鮑爲南海郡仍解化兒輩未得歸都所以屬之鮑即許先生之師也右二條有楊書武當山道士戴孟者乃姓燕名濟字仲微漢明帝末時人也夫爲養生者皆隱其名字藏其所生之時故易姓爲戴託官於武帝耳而此人少好道德不仕於世矣少孤養母母喪行服葬服闋遂入華陽山服术食大黄及黄精種雲母雄黄丹砂芝草受法於清靈眞人即裴冀州之弟子也得不死之道裴眞人授其玉珮金鐺經并石精金光符遂能輕身健行周旋名山日行七百里多所經涉猶未得成仙人也戴乃授行玉珮金鐺而止不死而已未得}
