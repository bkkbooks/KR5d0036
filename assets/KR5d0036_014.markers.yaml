  - {type: variant, offset: 6938, length: 0, content: '', CK-KZ-jye: 之道內見五藏徹視法如此七八十年周旋郡國或賣藥出入人間人莫知也多來都下市丹砂作九華丹丹成一服太一道君以今年六月十七日遣迎停三日與山中同志別去遂乘雲駕龍白日登天今在東華海中有狼五山中有學道者虞翁生會稽人也昔受仙人介君食日精法以吳時來隱此山兼行雲炁迴形之道精思積久形體更少如童子今年七月二十三日東太帝遣迎卽日乘雲升天今在陽谷山中狼五山在海中對白章岸今直呼爲狼山赤水山中學道者朱孺子吳末入山服菊花及朮餌後遇西歸子從乞度世西歸子授以要言入室存泥丸法三十年遂能致雲雨於洞房中今年八月五日西王母遣迎卽日乘五色雲車登天今在積石臺赤水山云在鄞縣南十里從楠谿口入三百里山正赤週迴五十里高千餘丈如此則應是臨海永嘉東北名赤巖者也許先生所住赤山一名燒山卽此名山五嶽中學道者數百萬人今年有得道而升天者人名如別年年月月皆有去者如此不可悉紀今爲疏一年之得道人耳有不樂上升仙而長在五嶽名山者乃亦不可稱數或爲仙官使掌名山者亦復有數千九月二十日夜淸靈疏出右八條有掾寫共一卷相隨淸靈猶是裴淸靈也此九月卽應是乙丑嵗卽疏其年中得道者吳睦者長安人也少爲縣吏掌局枉尅民人民人訟之法應入死睦登委叛遠遁山林餓經日行至石室遇見孫先生在室中隱學左右種黍及胡麻室中恒盈食睦至乞食經月不去孫先生知是叛人初不問之與食料理及誦經講道說及禍福睦聞之於是心開意悟因叩頭自搏列其事源立身所行自首事實求得改往遂留石室爲先生掃除驅使經四十年後先生受其道俱採藥服食胡麻精修經教得三百二十年服丹白日升天朱㹠者陳留人也爲人無道專作劫盜後人發覺收掩㹠得逸出遠他境至汝南少室山中見馮先生隱學云後三年乃受其眞仙留山服食修道三十八年後入東阬山中夀百四十七嵗仙人降將入大有山洞中成眞人郭靜者穎川人也少孤無父母兄弟窮苦依棲無所年十六縣召爲吏後得罪仍逃伏經二月日不出遇見鄭先生救度一切以法勸化之靜遂隨鄭負擔駈使經七年不敢懈怠遂受其導引之要餌服山朮茯苓得夀三百嵗復於天維山赤松子降受其二人眞道今在大有洞中爲眞人范伯慈者桂陽人也家本事俗而忽得狂邪因成邪勞病頓卧床蓆經年迎師解事費用家資漸盡病故不愈聞大道淸約無所用於是意變聞沈敬作道士精進理病多驗乃棄俗事之得五十日病疾都愈云云後詣陸玩之受眞內道玩之不能入山伯慈不樂於世遂辭去入天目山服食胡麻精思十七年大洞眞仙司命君下降受三十六篇經後服還丹白日昇天今爲玄一眞人所注云云云處是抄事人不能併取非本闕也有四條有人於東間鈔得云是眞書而不知誰跡亦無所受者而辭旨有用故紀續之又此四人各有所明一則酷吏二則凶劫三則孤煢四是事俗並世間薄運遂能得道足知心之所造非關善惡者也司馬季主後入委羽山石室大有宮中受石精金光藏景化形法於西靈子都西靈子都者太玄仙女也其同時今在大有室中者廣甯鮑叔陽太原王養伯穎川劉瑋惠岱郡段季正俱受師西靈子都之道也季主臨去之際託形枕席爲代己之像墓在蜀郡成都升盤山之南諸葛武侯昔建碑銘德於季主墓前碑讚末曰玄漠太寂混合陰陽天地交泮萬品滋彰先生理著分別柔剛鬼神以觀六度顯明眞誥云季主咽虹液而頭足異處劍經註云吞刀圭而虫流今東卿說云託形枕席爲代己之像似當是作錄形靈丸兵解去也漢史旣不顯其終無以別測其事也廣甯鮑叔陽者漢高帝時趙王張耳張敖之大夫也少好養生服桂屑而卒死於厠溷間今墓在遼東薊城之北山漢高置燕郡以薊屬燕當是未分時也太原王養伯者漢高吕后攝政時中常侍中瑯琊王探也少服澤瀉與留侯張良俱採藥於終南山而養伯不及遂師事季主前漢中常侍不用閹人中郎非侍郎之官或是後別爲此位耳穎川劉瑋惠漢景帝時公車司馬劉諷也後事季主晚服日月炁爲入室弟子道成晚歸鄉里託形杖履身死桑樹之下今墓在汝南安城縣西山岱郡段季正本隱士也不聞有所服御晚乃從季主學道行度秦州溺水拘得尸而葬川邊今南鄭秦川是也此人亦季主入室弟子尋此四人並是用靈丸雜解之道季主一男一女俱得道男名法育也女名濟華今皆在委羽山中濟華今日正讀三十九章猶未過竟此理亦欲難詳季主讀}
