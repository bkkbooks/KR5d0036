  - {type: variant, offset: 6948, length: 0, content: '', CK-KZ: 劑自欲出處嘿語肥遁山林以遊仙爲樂以升虛爲戚非不能登天也弗爲之耳此諸君自展轉五嶽改名易貌不復作尸解之絶也鏗則彭祖名也靑精亦出彭傳及王君傳飢飯方中鳳綱并諸仙人各有別顯之處軒轅自採首山之銅以鑄鼎虎豹百禽爲之視火參鑪鼎成而軒轅疾崩葬喬山五百年後山崩空室無尸唯寶劍赤舄在耳一旦又失所在也列仙傳}
