  - {type: variant, offset: 6933, length: 0, content: '', HFL: 楊書九疑眞人韓偉遠昔受於中嶽宋德玄德玄者周宣時人服此靈飛六甲得道能一日行三千里數變形爲鳥獸得玄靈之道今在嵩高偉遠久隨之乃得受法行之道成今處九疑山其女子有郭芍藥趙愛兒王魯連等並受此方法而得道者復數十人或遊玄州或處東華方諸臺今見居也南嶽夫人言此云郭芍藥漢度遼將軍東平郭蹇女也少好道篤誠眞人因授其六甲趙愛兒者幽州刺史劉虞别駕漁陽趙該姊也好道得尸解後又受此符王魯連者魏眀帝城門校尉范陽王伯綱女也亦學道一旦忽委聓李子期入陸渾山中眞人授此法子期者同州魏人清河王傅也其常言此婦狂走云一旦失所在此事乃出靈飛六甲經中長史抄出之漢大將軍霍光有典衣奴子名還車伺見二星得年六百歲今猶在焉此事岀方諸洞房經後長史抄出按魏書云青龍元年并州刺史畢軌送漢度遼將軍范明友解婢奴年三百五十歲言諸飲食如常人奴云霍顯者光禄小妻胡友妻是光禄前妻如依此妻便非虚矣吞琅玕之華而方營丘墓者衍門子高丘子洪涯先生是也衍門子墓在漁陽潞縣幽州漁陽有潞縣今黨亦有潞縣衍門即羡門也高丘子墓在中山聞喜縣中山有安喜縣聞喜乃屬河東洪涯先生墓在武威姑臧縣凉州記作姑臧縣此三郡縣人並云上古死人之空塚矣而不知高丘子時以尸解入六景山後服金液之末又受服琅玕華於中山方復託死乃入玄州受書爲中嶽眞人于今在也衍門子今在蒙山大洞黄金之庭受書爲中元仙卿洪涯先生今爲青城眞人漱龍胎而死訣飲瓊精而叩棺者先師王西城及趙伯玄劉子先是也王君昔用劒解非龍胎諸丹恐瓊精即是曲晨耳服金丹而告終者臧延甫張子房墨狄子是也挹九轉而尸臰吞刀圭而虫流司馬季主甯仲君燕昭王王子晋是也桐栢亦用劒解當是此吞刀圭者非九轉也司馬季主亦以靈丸作兵解故右英云頭足異處燕昭學仙而不見别跡景純云无靈炁則爲先究其事矣周穆王北造崑崙之阿親飲絳山石髓食玉樹之實而方墓乎汲郡此則穆天子傳所載見西王母時也夏禹詣鍾山啖紫柰醉金酒服靈寳行九眞而猶葬於會稽此事亦出五符中茅傳又云受行玄眞之法北戎長胡大王獻帝舜以白琅之霜十轉紫華服之使人長生飛仙與天地相傾舜即服之而方死葬蒼梧之野此諸君並已龍奏靈阿鳳鼓雲池矣而猶尸解託死者欲斷以生死之情示民有終始之限耳豈同腐骸太隂以肉餉螻蟻者哉直欲遏違世之夫塞俗人之願望也古來英聖之王唯未見顯堯及湯得道及鬼官之迹耳至於青精先生彭鏗鳳綱南山四皓淮南八公並以服上藥不至一劑自欲出處嘿語肥遁山林以遊仙爲樂以升虚爲戚非不能登天也弗爲之耳此諸君自展轉五嶽改名易貌不復作尸解之絶也鏗則彭祖名也青精亦出彭傳及王君傳飯方中鳳綱并諸仙人各有别顯軒轅自採首山之銅以鑄鼎虎豹百禽爲之視火叅鑪鼎成而軒轅疾崩葬喬山五百年後山崩空室無尸唯寳劒赤舄在耳一旦又失所在也列仙傳云御龍攀髯及子晋馭鵠並爲不同亦可是化後更岀而爲之也玉子者帝俈也曾詣鍾山獲九化十變經以隱遁日月遊行星辰後一旦疾崩營塚在渤海山夏中衰時有發玉子墓者室中無所有唯見一劒在北寢上自作龍鳴虎嗥之聲人遂無敢近者後亦失所在也帝俈則堯父外書作嚳字王子喬墓在京陵戰國時復有發其墓者唯見一劒在室人適欲取視忽飛入天中也欒巴昔作兵解去入林慮山中積十三年而後還家今在鵠鳴赤石山中漢書云巴爲桂陽豫章太守後下獄死當仍是用靈丸解云也亦出仙傳中右此三條皆出}
