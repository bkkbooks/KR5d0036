  - {type: variant, offset: 4960, length: 405, content: 主仙籍并記學道者並暴雨水靈芝草洞宮官寮司察吳越非民在任不過此四丞也其下則有四師事在第三篇中定錄道此右此有掾寫依紙墨亦言前篇而中間有此失缺此行後又割恐別復有事並遺落深可恨惜耳杜契者字廣平京兆杜陵人建安之初來渡江東依孫策入會稽嘗從之後為孫權作立信校尉黃武二年漸學道遇介琰先生授之以玄白術隱居大茅山之東面也守玄白者能隱形亦數見身出此市里契與徐宗度晏賢生合三人俱在茅山之中時得入洞耳或自採伐貨易衣糧于虛曲而人自不知之耳猶琰者即白羊公弟子也今在建安方山中也琰即禁山符云為孫權所殺化形而去往建安方山尋白羊公杜必當於此時受道也音薛即與舜同字四畫契三畫分毫有異也徐宗度晉陵人作孫皓左典軍呂悌司馬受風谷先生氣禁道故得俱晏賢生是步陟外甥即宗度之弟子也契弟子二人一人孫賁孫女寒華也少時密與契通情後學道受介琰法又以法受寒華寒華初去時先叛入建安依邵武長張毅毅即通親故得免脫事平乃歸茅山耳寒華行玄白法而有少容今嘗俱處也玄白道忌房室自契受道, HFL: 高}
