  - {type: variant, offset: 6933, length: 0, content: '', WYG: 楊書九疑眞人韓偉逺昔受於中嶽宋德𤣥德𤣥者周宣時人服此靈飛六甲得道能一日行三千里數變形為鳥獸得𤣥靈之道今在嵩髙偉逺久隨之乃得受法行之道成今處九疑山其女子有郭芍藥趙愛兒王魯連等並受此方法而得道者復數十人或遊𤣥州或處東華方諸臺今見居也南嶽夫人言此云郭芍藥漢度遼將軍東平郭蹇女也少好道篤誠眞人因授其六甲趙愛兒者幽州刺史劉虞别駕漁陽趙該姊也好道得尸解後又受此符王魯連者魏明帝城門校尉范陽王伯綱女也亦學道一旦忽委聓李子期入陸渾山中眞人授此法子期者司州魏人清河王傅也其常言此婦狂走云一旦失所在此事乃出靈飛六甲經中長史抄出之漢大將軍霍光有典衣奴子名還車伺見二星得年六百歲今猶在焉此事出方諸洞房經後長史抄出按魏書云青龍元年并州刺史畢軌送漢度遼將軍范明友鮮卑奴年三百五十歲言語飲食如常人奴云霍顯者光後小妻明友妻是光前妻女如依此妻便非虚矣吞琅玕之華而方營丘墓者衍門子髙丘子洪涯先生是也衍門子墓在漁陽潞縣幽州漁陽有潞縣上黨亦有潞縣衍門即羡門也高丘子墓在中山聞喜縣中山有安喜縣聞喜乃屬河東洪涯先生墓在武威姑臧縣涼州記作姑臧縣此三郡縣人並云上古死人之空塚矣而不知髙丘子時以尸解入六景山後服金液之末又受服琅玕華於中山方復託死乃入𤣥州受書為中嶽眞人于今在也衍門子今在蒙山大洞黄金之庭受書為中元仙卿洪涯先生今為青城眞人潄龍胎而死訣飲瓊精而叩棺者先師王西城及趙伯𤣥劉子先是也王君昔用劒解非龍胎諸丹恐瓊精即是曲晨耳服金丹而告終者臧延甫張子房墨狄子是也挹九轉而尸臰吞刀圭而蟲流司馬季主甯仲君燕昭王王子晉是也桐栢亦用劒解當是此吞刀圭者非九轉也司馬季主亦以靈丸作兵解故右英云頭足異處燕昭學仙而不見别跡景純云无靈炁則為未究其事矣周穆王北造崑崙之阿親飲絳山石髓食玉樹之實而方墓乎汲郡此則穆天子傳所載見南王母時也夏禹詣鍾山啖紫柰醉金酒服靈寶行九眞而猶塟於㑹稽此事亦出五符中茅傳又云受行𤣥眞之法北戎長胡大王獻帝舜以白琅之霜十轉紫華服之使人長生飛仙與天地相傾舜即服之而方死塟蒼梧之野此諸君並已龍奏靈阿鳯鼔雲池矣而猶尸解託死者欲斷以生死之情示民有終始之限耳豈同腐骸太陰以肉餉螻蟻者哉直欲遏違世之夫塞俗人之願望也古來英聖之王唯未見顯堯及湯得道及鬼官之迹耳至於青精先生彭鏗鳯綱南山四皓淮南八公並以服上藥不至一劑自欲出處嘿語肥遁山林以遊仙為樂以升虚為戚非不能登天也弗為之耳此諸君自展轉五嶽改名易貌不復作尸解之絶也鏗則彭祖名也青精亦出彭傳及王君傳飯方中鳯綱并諸仙人各有别顯軒轅自採首山之銅以鑄鼎虎豹百禽為之視火參鑪鼎成而軒轅疾崩葬喬山五百年後山崩空室無尸唯寶劒赤舄在耳一旦又失所在也列仙傳云御龍攀髯及子晉馭鵠並為不同亦可是化後更出而為之也玉子者帝俈也曾詣鍾山獲九化十變經以隱遁日月遊行星辰後一旦疾痛營塚在渤海山夏中衰時有發王子墓者室中無所有唯見一劒在北寢上自作龍鳴虎嘷之聲人遂無敢近者後亦矢所在也帝俈則堯父外書作嚳字王子喬墓在京陵戰國時復有發其墓者唯見一劒在室人適欲取視忽飛入天中也欒巴昔作兵解去入林慮山中積十三年而後還家今在鵠鳴赤石山中漢書云巴為桂陽豫章太守後下獄死當仍是用靈丸解云也亦出仙傳中右此三條皆出}
