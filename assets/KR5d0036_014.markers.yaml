  - {type: variant, offset: 3314, length: 1586, content: 此地為姜巴者是矣以其因叔茂而名地焉地號今亦存有大路從小茅後通延陵即呼為姜巴路也但秦孝公時未並楚置郡巴陵縣始晉初不知那有巴陵之封恐是巴蜀之巴故也此二人並已得仙今在蓬萊為左卿今南鄭諸姜則叔茂之後茂曾作書與太極官僚云昔學道於鬼谷道成于少室養翮于華陽待舉於逸域時乘飆輪宴我句曲悟言永歎代謝之速物存人亡我勞如何太賓亦有才藝善鼓琴昔教糜長生孫廣田廣田即孫登也獨弦能彈而成八音真奇事也孫登即嵇康所謂長嘯者亦云見彈一弦之琴斯言非虛矣叔茂種五辛菜常賣以市丹砂而用之今山間猶有韭薤即其遺種邪今呼為韭山在大茅西甚多大韭又餘處亦有蒜薤耳非出姜巴一處也今舍前有塘乃郭四朝所造也高其牆岸蓋水得深但歷代久遠塘牆頹下耳今舍語似是論長史宅宅前今乃有塘近西為堤牆即是遏柳珣水而去郭千甚遠郭千在北洞西北今有大陂塘四朝先應住此未解舍前之意恐長史於彼複立田業又有說在後四朝常乘小船游戲其中每叩船而歌曰清池帶靈岫長林鬱青葱玄鳥藏幽野悟言出從容鼓楫乘神波稽首希晨風未獲解脫期逍遙丘林中晨風謂上清玉晨之風非毛詩所謂鵷彼晨風之鳥也浪神九垓外研道遂金真戢此靈鳳羽藏我華龍鱗高舉方寸物萬吹皆垢塵顧哀朝生惠孰盡汝車輪女寵不弊席男愛不盡輪朝生蜉蝣也以喻人之在世易致消歇耳遊空落飛飆靈步無形方圓景煥明霞九鳳唱朝陽暉翮扇天津菴藹慶雲翔遂造大微宇挹此金梨漿逍遙玄垓表不存亦不亡玄垓九垓皆八極之外九霞之頂名也飛登木星亦名玄朗東陽之垓故若士語盧敖云吾與汗漫期於九垓之上矣駕舞神霄披霞帶九日高皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闔幽冥戶靈變玄跡滅四朝為玉台執蓋郎故云高皇齊龍輪定錄言右十二條掾寫共一篇四朝燕國人也兄弟四人並得道四朝是長兄也真法其司三官者六百年無違坐超遷之四朝職滿上補九宮左仙公領玉臺執蓋郎中間久闕無人後以思和代四朝也山下居民今猶呼一平澤地為郭千者是四朝之姓尚存於民口也四朝往曾使人種植於此地也年年四朝每行皆過詣此山以造思和遊看原阜此是茅傳中言也按如此說郭千止是種植處非居止也住處則長史宅果應是矣今塘牆既頹決水不複甚停人皆以為田耳然其地汗闊小壅猶自成也可得泛舟而歌但無人能追蹤遠世可嘆如何後云此四朝年年行過游看是上補去後猶複憶羨舊居所以數宴良常眷盼朋好張玄賓者定襄人也魏武帝時曾舉茂才歸鄉里事師西河薊公服朮餌兼行洞房白元之事後遇真人樊子明於少室授以遁變隱景之道昔在天柱山中今來華陽內為理禁伯理禁伯主諸水雨官也此人善能論空無乃談士常執本無理云無者大有之宅小有所以生焉積小有以養小無見大有以本大無有有亦無無焉無無亦有有焉所以我目都不見物物亦不見無寄有以成無寄無以得無於是無則無宅也太空亦宅無矣我未生時天下皆無無也其所論端據如此桐柏諸靈亦不能折也自云昔曾詣蓬萊宋晨生晨生者蓬萊左公也與其論無粗得人意過此已去尚未能本有安能本無邪與餘人論空無天下中皆無人焉其高氣秉理如此東卿君紫微玄清亦莫得而乾也理禁伯官亦保命之監國也此論空無之理乃殊得無宗而玄玄固難可曲核矣真人之才義亦是甚有優劣東卿桐柏紫微玄清蓋相推並言談之英辯者故舉此為標也按左傳稱君之世子從曰撫軍守曰監國監國之任則是副貳疑此監國或因作監司也趙威伯者東郡人也少學邯鄲張先生先生得道之人耳晚在中嶽授玉佩金鐺經於范丘林丘林乃是漢樓船將軍衛行道婦也學道得仙遂授行挹日月之道又服九靈明鏡華遂得仙昔亦來在華陽內為保命丞河圖云吳楚多有得見太平者其常語人云此語不虛此驗不久如此諸學者何可不彌加勤勵也其存明鏡非世間常法也受范丘林口訣云善嘯嘯如百鳥雜鳴或如風激眾林或如伐鼓之音時在天市壇上奮然北向長嘯呼風須臾雲翔其上衝氣動林或冥霧飆合或零雨其蒙矣保命有四丞此一人主為暴雨水及領五芝金玉草若欲致洪雨者將可辭詣之也又理禁伯亦主雨水若請雨宜並為辭也其一丞是咸陽樂長冶東卿司命君鄉里人也為小君所舉用漢桓帝中書郎晚從中嶽李先生受道行七元法得仙相去二百餘年猶蒙卿褲之澤也一人是孟君入室弟子鄭雉正者孟君所屬用孟君, HFL: 述}
