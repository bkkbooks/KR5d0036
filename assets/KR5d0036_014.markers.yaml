法勸化之靜遂隨鄭負擔駈使經七年不敢懈怠遂受其導引之要餌服山术茯苓得壽三百歲復於天維山赤松子降受其二人眞道今在大有洞中爲眞人范伯慈者桂陽人也家本事俗而忽得狂邪因成邪勞病頓卧床蓆經年迎師解事費用家資漸盡病故不愈聞大道清約無所用於是意變聞沈敬作道士精進理病多驗乃棄俗事之得五十日病疾都愈云云後詣陸玩之受眞内道玩之不能入山伯慈不樂於世遂辭去入天目山服食胡麻精思十七年大洞眞仙司命君下降受三十六篇經後服還丹白日昇天今爲玄一眞人所注云云云處是抄事人不能併取非本闕也右四條有人於東間鈔得云是眞書而不知誰跡亦無所受者而辭㫖有用故紀續之又此四人各有所明一則酷吏二則凶劫三則孤煢四是事俗并世間薄運遂能得道足知心之所造非關善惡者也司馬季主後入委羽山石室大有宫中受石精金光藏景化形法於西靈子都西靈子都者太玄仙女也其同時今在大有室中者廣甯鮑叔陽太原王養伯潁川劉瑋惠岱郡段季正俱受師西靈子都之道也季主臨去之際託形枕席爲代己之像墓在蜀郡成都升盤山之南諸葛武侯昔建碑銘德於季主墓前碑讚末曰玄漠太寂混合隂陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明眞誥云季主咽虹液而頭足}
