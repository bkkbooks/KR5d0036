  - {type: variant, offset: 2234, length: 1, content: 戴, CK-KZ: 若兼之以漱液祝說亦善叩齒卽神存故鬼邪不得干今修上道者日夜旣恒有此事所以並得長生耳昔鮑助者濟北人也助旣少微外書不顯都不學道亦不知法術年四十餘忽得面風氣口目不正炁入口而兩齒上下恒相切拍甚有聲響如此晝夜不止得壽年百二十七嵗後}
