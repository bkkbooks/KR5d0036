  - {type: variant, offset: 94, length: 0, content: '', CK-KZ: 恐鬼神恍惚不使知見實事耳世人有知酆都六天宫門名則百鬼不敢爲害欲卧時常北向祝之三遍微其音也前云宫名今云門名是爲門亦}
