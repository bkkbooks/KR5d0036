  - {type: variant, offset: 2225, length: 265, content: 經涉猶未得成仙人也戴乃授行玉佩金鐺而止不死而已未得神仙於理為小難詳後又云玄真亦其鈔要行之者神仙不死又與本經不同及石精金光符既不為劍用則止是解化一符單服者此符主隱遁不云健行也種五品芝世亦有法仙人郭子華張季連趙叔達晚又有山世遠者此諸人往來與之遊焉昔居武當今來大霍欲從司命君受書故未許焉山已得為太和真人則應居在南陽太和山矣餘三人不見別顯出也戴公拍腹有十數卷書是太微黃書耳此人即謝允之師也按金相傳太微黃書第八篇有目錄云凡有八卷唯此一卷出世今戴公乃有十許篇亦為不同拍腹之義謂恆以系腰也其外傳事亦同此謝允字道通歷陽人小時為人所略賣往東陽後告官, HFL: 逼}
