  - {type: variant, offset: 31, length: 0, content: '', CK-KZ: 山上有六宫洞中有六宫輒周迴千里是爲六天鬼神之宫也周迴一萬五千五百爲宫周迴一千里者三百二十五所今此六宫止得六所爾其餘空尙三百一十九所計不容頓耳恐所言或有舛漏處也山上爲外宫洞中爲內宫制度等耳此山旣非人跡所及故山上可以得立容不知山復有幾洞門也第一宫}
