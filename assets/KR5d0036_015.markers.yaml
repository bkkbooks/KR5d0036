  - {type: variant, offset: 38, length: 2, content: 口見, CK-KZ: 邊各餘二十餘里南北有殊遠悉悉當爲藩屏故也不爾莫測所以也第二宫名爲泰煞諒事宗天宫第三宫名爲明晨耐犯武城天宫第四宫名爲恬昭罪氣天宫第五宫名爲宗靈七非天宫第六宫名爲敢司連宛屢天宫凡此六天宫亦皆應有義旨乃粗可領解自不容輕說凡六天宫是爲鬼神六天之治也洞中六天宫亦同名相像如一也此卽應是北酆鬼王决斷罪人住處其神卽應是經呼爲閻羅王所住處也其王卽今北大帝也但不知五道大神當是何者爾凡生生之類其死莫不隸之至}
