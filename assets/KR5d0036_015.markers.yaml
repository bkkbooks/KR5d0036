  - {type: variant, offset: 2246, length: 0, content: '', CK-KZ: 便有祠事矣杜瓊字伯瑜蜀人也博學有才思注韓詩兼明數術逆記魏當代漢仕劉禪時爲鴻臚太常延熙十三年亡年八十餘耳侍帝晨有八人徐庶龐德爰愉李廣王嘉何晏解結殷浩並如世之侍中李廣漢武驍騎將軍征匈奴時被吏譴憤慨自刎}
