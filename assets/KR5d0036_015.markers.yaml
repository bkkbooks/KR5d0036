  - {type: variant, offset: 1451, length: 249, content: 漢書所載事亦略同又有郎宗者字仲綏北海安丘人少仕宦為吳縣令學精道術占候風炁後一旦有暴風經窗間占知京師大火燒大夏門遣人往參果爾諸公聞之以博士徵宗宗恥以占事就夜解印綬負笈遁去居華山下服胡麻丸得道今在洞中後漢書載郎宗事云理京房易善星算風角六日七分能望氣占候吉凶常賣卜自奉安帝徵對策為諸儒表後拜吳令時卒有暴風宗占知京師當有大火記識日月遣人參候果如其言諸公聞而表上以博士徵之宗恥以占驗見知徵書到夜懸印綬於縣庭而遁去遂終身不仕子顗字稚元傳父業研精學徒常數百人順帝陽嘉二年徵詣闕上書十一事拜郎中還家後為同縣孫禮所害, CK-KZ: ''}
