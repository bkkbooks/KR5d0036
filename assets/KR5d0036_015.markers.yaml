  - {type: variant, offset: 1732, length: 0, content: '', HFL: 四條並是可承用事已别抄在第三篇中孟先生即應是京兆孟君及屬用鄭承者前篇有西嶽蔣夫人今火天下岳未審有兩人爲是誤也夜行常琢齒琢齒亦無正限}
