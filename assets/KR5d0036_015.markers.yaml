  - {type: variant, offset: 2238, length: 4, content: 玉佩金鐺, CK-KZ: 叩齒鳴打天鼓以警身中諸神神不敢散鬼氣不得入是以无有緣趣得煞之耳以此論之若助不行冰渡河亦可出千嵗壽不啻也當是遇大寒凍步行冰上口噤不能復叩齒是故鬼因溺着河中耳患風病}
