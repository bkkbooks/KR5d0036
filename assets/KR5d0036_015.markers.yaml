  - {type: variant, offset: 1337, length: 1, content: 作, CK-KZ: 孤有志操仕晉爲吏部侍郎御史中丞吏部尙書領軍尙書僕射尙書令永和七年病亡年六十四贈侍中司徒諡穆公月書不顯范明唯前漢有范明友恐非是此人又誥試許先生者稱典柄侯周魴主非吏者嚴白虎尋典柄侯猶應是典柄呼之脫到爾周魴字子魚吳郡陽羡人周處父也仕吳爲鄱陽太守甚有威惠嚴白虎者吳郡人也以孫策時入山聚眾策討之乃散奔餘杭死弟名輿亦勇健策僞與會乃戟刺殺之耳殷浩侍帝晨與何晏對此有八人事在後殷浩字淵原陳留長平人康帝建元初爲揚州刺史永和六年進中軍將軍都督五州北伐姚襄敗還爲桓温所廢徙東陽永和十二年以憂亡善能譚論後與何晏對也晏字平叔何進孫善言玄理位至侍中尙書黨曹爽爲司馬宣王所誅温太眞爲監海開國伯治東海近取杜預爲長史位比大將軍長史温嶠字太眞太原祁人仕晉爲江左平南將軍江州刺史下平蘇峻位至驃騎將軍開府封始五公咸和四年病亡年四十二贈太將軍諡中武公杜預字元凱京兆杜陵人博識多智注春秋仕晉起家尙書郎位至都督荆州鎭襄陽伐吳有功封當陽侯太康五年還洛于鄧}
  - {type: page-break, offset: 1337, content: '', id: KR5d0036_CK-KZ_04p006b, image: JY237/CK-KZ_JY237_04p006b.png}
