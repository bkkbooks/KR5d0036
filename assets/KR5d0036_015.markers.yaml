  - {type: variant, offset: 2359, length: 1, content: 受, CK-KZ: 領之此則是北河侯必是相統屬矣劉備字玄德涿郡人初起義兵後遂據蜀稱尊號三年病亡年六十三諡昭烈皇帝尋于時同爲三國之主魏武孫策今位任皆高劉此職雖小而隷仙官其優劣或可得相匹也韓遂字文紂某某人漢末阻兵構亂西土建安二十五年魏武伐之奔金城之內爲其將趜演等所害遂乃驍雄而未免寇難乃得與劉備對仕殊爲不類兼隸仙官益復超顯也又有大禁晨二人如今尙}
