  - {type: variant, offset: 1733, length: 0, content: '', ZTDZ: 也煞鬼邪鬼常畏琢齒聲是故不得犯人也若兼之以漱液祝說亦善叩齒即神存故鬼邪不得干今修上道者日夜既恒有此事所以並得長生爾昔鮑助者濟北人也助既少微外書不顯都不學道亦不知法術年四十餘忽得面風氣口目不正炁入口而兩齒上下恒相切拍甚有聲響如此晝夜不止得壽年百二十七歲後乃遇寒過大冰墮長壽河中死耳北帝中間亦比遣煞鬼及日遊地殃使取之而此數煞鬼終不敢近助鬼官問其故天煞答云此人乃多方術以制於我常行叩齒鳴打天皷以警身中諸神神不敢散鬼氣不得入是以無有縁趣得煞之耳以此論之若助不行冰渡河亦可出千歲壽不啻也當是遇大寒凍步行冰上口噤不能復叩齒是故鬼因溺着河中耳患風病而齒自叩動者猶尚辟死却煞鬼矣何患道士眞叩齒鳴天皷具身神耶仙方云常吞液叩齒使人反少以此而言人命便無定限一切皆是夭遏耳若修道精勤如鮑助啄齒何容不得永年正患有時懈替則爲鬼所襲同於溺河之斃也凡諸鬼亦是不能靈智乃以風病爲多術豈勝謬邪酆都山上樹木水澤如世間但稻米粒幾大味如菱其餘四穀不爾但名稻爲重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈炁交被嘉穀應時四節既享祝人以祀神禾鬱乎浩京巨穗横我玄臺爰有明祥帝者以熙此之謂矣此更說酆都中事仍復及重思耳說祝人有祠者不容有蒸嘗之義當即是前所云獻奉仙官故也又鬼年限足應受餘生亦復死便有祠事矣杜瓊字伯瑜蜀人也博學有才思注韓詩兼明數術逆記魏當代漢仕劉禪時爲鴻臚太常延熙十三年亡年八十餘耳侍帝晨有八人徐庶龐德爰愉李廣王嘉何晏解結殷浩並如世之侍中李廣漢武驍騎將軍征匈奴時被吏譴憤慨自刎而死王嘉蜀郡人平帝時爲郎中至王莽乃棄官還郷不肯臣公述伏劒而死徐庶字元直潁川人薦諸葛亮於劉備後魏武虜其母乃歸魏仕至中丞眀帝大和中病亡龐德字令明南安人隨張鎮南降魏武拜立義將軍屯樊城爲關羽所害謚杜侯迎喪葬鄴身首如生爰愉字世都濮陽人有才辨多術藝事晋武辟司徒魏舒府位至侍中中書令監解結字稚連濟南人係弟也一仕晋黄門侍郎中丞荆豫州刺史尚書趙王倫時爲孫秀所害也何殷二人以注在前前所說唯道二人今當是更請問乃悉具顯之四明公及北斗君並有侍帝晨五人其向者八}
