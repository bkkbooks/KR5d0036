  - {type: variant, offset: 1728, length: 0, content: '', CK-KZ: 蓋鬼神之事不足示於世也荀公言也荀公卽是荀中侯旣隸司命統諸鬼官故究知之但論事參差前後遞互如似隨問隨答非自然敘述手也世人多不信幽冥鬼神故戒勿宣示若致疑謗益漏失爾右此前一段所說不}
