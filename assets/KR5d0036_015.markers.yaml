  - {type: variant, offset: 620, length: 615, content: 曰龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之效伯高不得猶為謹沄之士謂刻鵠不成尚類鶩者也雷平山之東北良常山之東南其間有燕口山三小山相隅故也一名曰方偶山下古人曾合九鼎丹於此問也幽人在此時心樂居焉今常遊此方隅山下亦有洞室名曰方源館亦有二口常見外也常有此五人為旅其山即是大橫西南別有二墩壟相聚今人不複有乎其名者前云李明合丹即是此矣幽人者掾去世後不欲顯名故號為幽人此是未受事且停洞館修業也山今亦有兩小口五人為旅即向之四平山者既去來相通故時共游處也所以楊君夢掾云向從四平山來也右六條是手新寫應是保命君所告也鹿迹山中有絕洞絕洞者纔有一二畝空地無所通達故為絕洞洞室四面皆有青白石亦以自然光明如泬舊作綍字如此張形下正平自有石床石塌曲夾長短障隔分別有如刻成亦整盛也東北有小口才劣容人入入二三百步乃得洞室初入口甚急愈入愈寬大也口外南面有三積石積石下有汧索即可得也亦或以一小石掩穴口穴口大小俱如華陽三便門便門亦用小石塞其口自非清齋久潔索不可得鹿跡洞子亦爾不受穢氣故也此山今屬南徐州界正對茅山北望見之亦有道士住鹿跡在石上故仍以為名洞口處乃可知而甚嚴潔亦無人敢觸冒者此云如華陽三便門則南洞北洞本大開餘東西及東南皆是塞矣鹿跡華山中及洞主有謝稚堅王伯遼繁陽子號名耳是漢越騎校尉何苗叔達也進之同母弟少好道曾居河東繁山之南服食故自號為繁陽子中君答長史問葛玄云在蓋竹山恆與謝稚堅相隨今稚堅乃在此不知為去來往還為當兩人同姓名也後漢書云何苗是何進異母弟為車, CK-KZ: 僕射驃}
