  - {type: variant, offset: 2247, length: 4, content: 已未得神, CK-KZ: 死王嘉蜀郡人平帝時爲郎中至王莽乃棄官還鄕不肯臣公述伏劍而死徐庶字元直潁川人薦諸葛亮于劉備後魏武虜其母乃歸魏仕至中丞明帝大和中病亡龐德字令明南安人隨張鎭南降魏武拜立義將軍屯樊城爲關羽所害諡杜侯迎喪葬鄴身首如生爰愉字世都濮陽人有才辨多術藝事晉武辟司徒魏舒府位至侍中中書令監解結字稚連濟南人係弟也一仕晉黃門侍郎中丞荆豫州刺史尙書趙王倫時爲孫秀所害也何殷二人以注在前前所說惟道二人今當是更請問乃悉具顯之四明公及北斗君並有侍帝晨五人其向者八人是北大帝官隷耳選用亦同侍帝晨之號}
