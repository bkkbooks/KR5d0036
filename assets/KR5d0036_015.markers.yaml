  - {type: variant, offset: 2245, length: 0, content: '', CK-KZ: 得永年正患有時懈替則爲鬼所襲同于溺河之斃也凡諸鬼亦是不能靈智乃以風病爲多術豈勝謬邪酆都山上樹木水澤如世間但稻米粒幾大味如菱其餘四穀不爾但名稻爲重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈炁交被嘉穀應時四節旣享祝人以祀神禾鬱乎浩京巨穗橫我玄臺爰有明祥帝者以熙此之謂矣此更說酆都中事仍復及重思耳說祝人有祠者不容有蒸嘗之義當卽是前所云獻奉仙官故也又鬼年限足應受餘生亦復}
