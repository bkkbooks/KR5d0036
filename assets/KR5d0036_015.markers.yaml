  - {type: variant, offset: 214, length: 7, content: 室祖常託形墮車, krp: 項梁城作酆宫誦曰紂絶標帝晨諒事遘重阿炎如霄中煙勃若景曜華武陽帶神鋒恬昭吞青河閶闔臨丹井雲門鬱嵯峨七非通竒蓋連宛亦敷魔六天横北道此是鬼神家誦有二萬言今略道六天之宫名抄出之耳夜中亦可微讀之亦云辟鬼邪前第三宫名武城今云武陽或當是有兩白也蘇韶傳云是之聖者有項梁義賢者有吴季子但不知項是何世人也或恐是項羽之叔項梁而不應聖於季子也酆都稻名重思其米如石榴子粒異大色味如菱亦以上獻仙官後又有叙重思事既是異日所說兩出自非嫌石榴子即世之安石榴也炎慶甲者古之炎帝也今爲北太帝君天下鬼神之主也炎帝神農氏造耕稼嘗百藥其聖功不減軒轅顓頊無應爲鬼帝又黄帝所伐大庭氏稱炎帝恐當是此非神農也又外書云神農牛首今佛家作地獄中主煞者亦牛首復致疑焉四明公升擢既有年限太帝位秩亦應加崇極此雖已三千餘年或恐如世中帝王不轉而公輔屢遷也武王發今爲鬼官北斗君文王之子周武王也姓姬名發伐殷紂而爲天子即位二年崩禮云年九十三竹書云年四十五按後云四明公並得昇仙階而不道北斗君既仰隸玉晨亦應預同遷品耳夏啓爲東明公領斗君師禹之子也姓姒竹書云在位三十九年亡年七十八自崩滅後至今己卯歲允二千四百二十五年案司命說啓在位二千四百年得上補九宫如此則宋元徽四年去矣文王爲西明公領北帝師文王名昌禮云年九十七亡此父子並得稱聖德而不免官鬼雖爲煞戮之過亦當是不學仙道故也邵公奭爲南眀公邵公名奭文王庶子食采於邵卦於燕國按周公邵公太公俱佐命尅紂公在不殊而周公有聖德仙鬼之中並無顯出太公執匏秉鉞威罰最深乃載出列仙邵公恩流甘棠翻爲魁職亦復難了皆當各縁其根本業分故也酆都唯有六宫而周文王父子頓處其三明周德之崇深矣吴季札爲北眀公吴王壽夢之少子闔閭之叔父太伯之後也亦姬姓讓國居乎延陵今季子廟是也雖有仁賢之德乃亞乎先聖亦有殊例尋此諸公前後參差當是道時代謝用人也自夏啓已來二千餘年方得遷改乃十倍於地下生者之數明仙家品例故爲貴妙四明公復有賔友四人然此四公後並當升仙階也四明主領四方鬼賔友四人其事在後又按後定録告云邵奭爲東明公行上補九宫右保此乃仙階之證而與前不同且啓尚未去邵理不得仙恐脫耳誤云邵耳既云東明公則應猶是啓也其疑事别在後也西明郎十六人主天下房廟鬼之血食此郎亦應是隸西明公房廟血食是受命居職者非謂精邪假附也周顗爲鬼官司命帥今以鄧岳程遐二人代以其多事故也周顗字伯仁汝南安城人仕晋過江位至尚書僕射元帝永昌元年王敦南下遣收於石頭南門被害年五十四追贈光禄開府謚康侯鄧岳字伯山陳郡人討郭默有功咸寧初爲平南將軍廣州刺史於州病亡辛玄子後云鄧岳爲謝幼輿司馬此當是己遷也程遐代郡人爲石勒謀臣妹爲勒妻官至右僕射開府代郡公勒死爲石虎所煞也西明都禁郎賈誼昔爲治馬融事不當被黜守泰山泰山君近請爲司馬已被可賈誼前漢文帝時爲梁孝王傅憂憤嘔血}
