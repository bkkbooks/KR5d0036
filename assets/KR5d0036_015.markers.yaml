  - {type: variant, offset: 95, length: 6, content: 與呼為青龍洞, CK-KZ: 宫爲名宫直是虛號門則有榜題百鬼皆見而人今亦知之故所以畏伏也祝曰吾是太上弟子下統六天六天之宫是吾所部不但所部乃太上之所主吾知六天之宫名故得長生敢有犯者太上當斬汝形此云下統六天者不爲六天所統也不但吾自所部領乃太上令吾主之故復以爲威猶如郡縣官爵有臺除非白版之例也第一宫名紂絶陰天宫以次東行第二宫名此二字楊君書際紙下如此掾寫不熟詳乃作七字今世中諸本皆作第七此誤爾宫唯有六豈容是有七耶此呪復說以次東行四字者是欲令鬼輩訝吾知其次第位例也從此以次訖六宫止乃啄齒六下乃卧辟諸鬼邪之氣此一遍呪訖六啄齒畢又呪如此三過乃卧耳此法已重抄在第三篇修事中耳人初死皆先詣紂絶陰天宫中受事或有先詣名}
