  - {type: variant, offset: 1730, length: 0, content: '', CK-KZ: 則猶應是乙丑年}
  - {type: variant, offset: 1730, length: 0, content: '', CK-KZ-jye: 則猶應是乙丑年}
  - {type: variant, offset: 1730, length: 0, content: '', HFL: 則猶應是乙丑年也人卧床當令高高則地氣不及鬼吹不干鬼氣之侵人常依地而逆上鬼者隂物多因藉以宣其氣或附人畜或依器物或託飲食然後得肆其凶毒耳昔有人病在地卧於病中乃見鬼於壁穿下以手爲管而吹之此即是鬼吹之事也人卧室宇當令潔盛潔盛則受靈炁不盛則受故炁故炁之亂人室宇者所爲不成所作不立一身亦耳當洗沐澡潔不爾無冀矣故炁皆謂鬼神塵濁不正之炁此等皆承人爲惡既靈助無主道豈可議也勿道學道道學道鬼犯人事亦不立使人病是體未眞故也眞誥亟多此戒云一言一事泄乃滅筭豈但疾病而已所謂仙者必實學何趣說之耶群魔伺察有如影響也山世遠受孟先生法暮卧先讀黄庭内景經一過乃瞑使人魂魄自制練但行此道二十一年亦仙矣是爲合萬過也得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道}
  - {type: page-break, offset: 1730, content: '', id: KR5d0036_HFL_015-009b, image: hfl/0639/0639-170.png}
  - {type: page-break, offset: 1730, content: '', id: KR5d0036_HFL_015-010a, image: hfl/0639/0639-171.png}
