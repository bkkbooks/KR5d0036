  - {type: variant, offset: 3140, length: 1064, content: 一守一亦已三十年以三月一日東華遣迎以其日乘雲升天今在方諸飆室俱為上仙絪含以永和十年甲寅年為廣州刺史此得仙乙醜歲十二年是為前服丹已三十二年猶更出查也廬江潛山中有學道者鄭景世張重華並以晉初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹久久不復飲食而身體輕強反易故形以今年四月十九日北玄老太一迎以雲軿白日升天今在玄州括蒼山有學道者平仲節河中人以大胡亂中國時來渡江入括蒼山受師宋君存心鏡之道具百神行洞房事如此積四十五年中精思身形更少體有真炁今年五月一日中央黃老遣迎即日乘雲駕龍白日升天今在滄浪雲台大胡亂者是劉淵劉聰時也石勒為小胡剡小白山中有學道者趙廣信陽城人魏末來度江入此山受李法成服炁法又受師左君守玄中之道內見五藏徹視法如此七八十年周旋郡國或賣藥出入人間人莫知也多來都下市丹砂作九華丹丹成一服太一道君以今年六月十七日遣迎停三日與山中同志別去遂乘雲駕龍白日登天今在東華海中有狼五山中有學道者虞翁生會稽人也昔受仙人介君食日精法以吳時來隱此山兼行雲炁迴形之道精思積久形體更少如童子今年七月二十三日東太帝遣迎即日乘雲升天今在陽谷山中狼五山在海中對白章岸今直呼為狼山赤水山中學道者朱孺子吳末入山服菊花及術餌後遇西歸子從乞度世西歸子授以要言入室存泥丸法三十年遂能致雲雨於洞房中今年八月五日西王母遣迎即日乘五色雲車登天今在積石臺赤水山雲在鄞縣南十里從楠縭口入三百里山正赤周回五十里高千餘丈如此則應是臨海永嘉東北名赤岩者也許先生所住赤山一名燒山即此名山五嶽中學道者數百萬人今年有得道而升天者人名如別年年月月皆有去者如此不可悉紀今為疏一年之得道人耳有不樂上升仙而長在五嶽名山者乃亦不可稱數或為仙官使掌名山者亦復有數千九月二十日夜清靈疏出右八條有掾寫其一卷相隨清靈猶是裴清靈也此九月即應是乙丑歲即疏其年中得道者吳睦者長安人也少為縣吏掌局枉剋民人民人訟之法應入死睦登委叛遠遁山林餓經日行至石室遇見孫先生在室中隱學左右種黍及胡麻室中恆盈食睦至乞食經月不去孫先生知是叛人初不問之與食料理及誦經講道說及禍福睦聞之於是心開意悟因叩頭自搏列其事源立身所行自首事實求得改往遂留石室為先生掃除驅使經四十年後先生受其道俱採藥服食胡麻精修經教得三百二十年服丹白日升天朱犬乇者陳留人也為人無道專作劫盜後人發覺收掩犬乇得逸出遠他境至汝南少室山中見馮先生隱學云後三年乃受其真仙留山服食修道三十八年後入東坑山中壽百四十七歲仙人降將入大有山洞中成真人郭靜者潁川人也少孤無父母兄弟窮苦依棲無所年十六縣召為吏後得罪仍逃伏經二月日不出遇見鄭先生救度一切以法勸化之靜遂隨鄭負簷驅使經七年, CK-KZ: ''}
