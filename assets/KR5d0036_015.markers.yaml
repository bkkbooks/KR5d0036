  - {type: variant, offset: 2236, length: 1, content: 授, CK-KZ: 遇寒過大冰墮長夀河中死耳北帝中間亦比遣煞鬼及日遊地殃使取之而此數煞鬼終不敢近助鬼官問其故天煞答云此人乃多方術以制於我常}
