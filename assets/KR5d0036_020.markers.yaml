  - {type: variant, offset: 162, length: 456, content: 卷真誥握真輔第六此卷是三君在世自所記錄及書疏往來非真誥之例分為二卷真誥翼真檢第七此卷是泬明真緒證質玄原悉隱居所述非真誥之例分為二卷右真誥一蘊其十六卷是真人所誥四卷是在世記述仰尋道經上清上品事極高真之業佛經妙法蓮華理會一乘之致仙書莊子內篇義窮玄任之境此三道足以包括萬象體具幽明而並各二十卷者當是璇璣七政以齊八方故也隱居所製登真隱訣亦為七貫今述此真誥復成七日五七之數物理備矣夫真人之旨不同世目謹仰範緯候取其義類以三言為題所以莊篇亦如此者蓋長桑公子之微言故也俗儒觀之未解所以真誥者真人口受之誥也猶如佛經皆言佛說而顧玄平謂為真迹當言真人之手書迹也亦可言真人之所行事跡也若以手書為言真人不得為隸字若以事迹為目則此迹不在真人爾且書此之時未得稱真既於義無旨故不宜為號南嶽夫人傳載青籙文云歲在甲子朔日辛亥先農饗旦甲寅羽水起安啟年經乃始傳得道之子當修玉文謹推按晉歷哀帝興寧二年太歲甲子正月一日辛亥朔歷忌可祀先農四日甲寅羽水正月中炁羽即雨也起者興也安者寧也故迂隱其稱耳如此則興寧二年正月南真已降授楊君諸經也今檢真授中有年月最先者唯三, CK-KZ: ''}
