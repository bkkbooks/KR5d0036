  - {type: variant, offset: 33, length: 2, content: 感對, CK-KZ: 卷魚爛穿壞旣未悟其眞手不知㩉錄惟寫取文字而已經本悉埋藏之也掾書所佩列紀黃素書一短卷本許丞以與弟子蘇道會道會以授上虞何法仁法仁以傳朱僧摽僧摽以奉鍾法師樓居士見而求取今猶應在樓間掾抄魏傳中黃庭經并復眞授數紙先在剡山王惠朗間王亡後今應是其女弟子及同學章靈民處永興有一姓解家者昔亦經供養許郎又得小小雜書後菁山女道士樊妙羅因緣得其楊書酆宫事一卷樊亡在其女弟子沈偶間沈又以與四明山孔總已還封昭臺解家所餘今絶蹤迹又聞山陰及錢塘數家皆有古經恐脫雜眞書從來遂未獲尋檢想好學挺分之子可殷勤求之脫有所得見使一覩則瓊礫辨矣又魏夫人小息還爲會稽時携夫人中箱法衣并有經書}
