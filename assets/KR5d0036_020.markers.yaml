  - {type: variant, offset: 2889, length: 901, content: 長史掾立宅在小茅後雷平山西北掾於宅治寫修用以泰和五年隱化長史以泰元元年又去掾子黃民時年十七乃收集所寫經符祕籙歷歲于時亦有數卷散出在諸親通間今句容所得者是也元興三年京畿紛亂黃民乃奉經入剡長史父昔為剡縣令甚有德惠長史大兄亦又在剡居是故投憩焉為東闡馬朗家所供養朗一名溫公朗同堂弟名罕共相周給時人咸知許先生得道又祖父亦有名稱多加宗敬錢塘杜道鞠即居士京產之父道業富盛數相招致于時諸人並未知尋閱經法止稟奉而已至義熙中魯國孔默崇信道教為晉安太守罷職還至錢塘聞有許郎先人得道經書具存乃往詣許許不與相見孔膝行稽顙積有旬月兼獻奉殷勤用情甚至許不獲已始乃傳之孔仍令晉安郡吏王興繕寫興善有心尚又能書畫故以委之孔還都唯寶錄而已竟未修用元嘉中復為廣州刺史及亡後其子熙先休先才學敏贍竊取看覽見大洞真經說云誦之萬遍則能得仙大致譏誚殊謂不然以為仙道必須丹藥煉形乃可超舉豈有空積聲詠以致羽服兼有諸道人助毀其法或謂不宜蓄此因一時焚蕩無復孑遺此當是冥意不欲使流傳於外世故也後熙先等復與范曄同謀被誅也王興先為孔寫輒復私繕一通後將還東修學始濟浙江便遇風淪漂唯有黃庭一篇得存興乃自加切責仍住剡山稍就讀誦山靈即火燒其屋又於露壇研詠俄頃驟雨紙墨沾壞遍數遂不得畢興深知罪譴杜絕人倫唯書歷日貿糧以續炁命其子道泰為晉安船官督資產豐富數來拜獻兼以二奴奉給興一無留納而終乎剡山於是孔王所寫真經二本前後皆滅遂不行世此當是興先不師受妄竊寫用所致如此也復有王靈期者才思綺拔志規敷道見葛巢甫造構靈寶風教大行深所忿嫉于是詣許丞求受上經丞不相允王凍露霜雪幾至性命許感其誠到遂復授之王得經欣躍退還尋究知至法不可宣行要言難以顯泄乃竊加損益盛其藻麗依王魏諸傳題目張開造制以備其錄並增重詭信崇貴其道凡五十餘篇趍競之徒聞其豐博互來宗稟傳寫既廣枝葉蘩雜新舊渾淆未易甄別自非已見真經實難證辨其點綴手本頗有漏出即今猶存又朱先生僧泬學增褚公伯玉語云天下才情人故自絕群吾與王靈期同船發都至頓破崗蒞竟便已作得兩卷上經實自可訝自靈期已前上經已往往舛雜弘農楊洗隆安四年庚子歲於海陵再遇隱盟上經二十餘篇有數卷非真其雲尋經已來一十二年此則楊君去後便以動作故靈寶經中得取以相揉非都是靈期造製但所造製者自多耳, CK-KZ: ''}
