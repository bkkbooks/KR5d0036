  - {type: variant, offset: 1796, length: 741, content: 也掾書乃是學楊而字體勁利偏善寫經畫符與楊相似鬱勃鋒勢迨非人功所逮長史章草乃能而正書古拙符又不巧故不寫經也隱居昔見張道恩善別法書歎其神識今睹三君跡一字一畫便望影懸了自思非智藝所及特天假此監令有以顯悟爾又按三君手書作字有異今世者有龜龍虛華顯服寫辭闕關之例三君同爾其楊飛掾飛楊我掾我楊靈長史靈掾靈楊真長史真楊師掾師楊惡長史惡此其自相為異者又鬼魔字皆作摩淨潔皆作盛潔盛貯皆作請貯凡大略如此亦不可備記恐後人以世手傳寫必隨世改動故摽示其例令相承謹按爾此諸同異悉已具載在登真隱訣中又按三君書字有不得體者於理乃應治易要宜全其本跡不可從實闇改則澆流散亂不復固真今並各朱郭疑字而注其下又按三君多書荊州白箋歲月積久或首尾零落或魚爛缺失前人糊手翕不能悉相連補並先抄取書字因毀除碎敗所缺之處非復真手雖他人充題事由先言今並從實綴錄不復分析又按三君書有全卷者唯道授二許寫酆都宮記是楊及掾書並有首尾完具事亦相類其餘或五紙三紙一紙一片悉後人糊連相隨非本家次比今並挑拔取其年月事類相貫不復依如先卷又按眾真辭旨皆有義趣或詩或戒互相酬配而顧所撰真迹枝分類別各為部卷致語用乖越不復可領今並還依本事並日月紙墨相承貫者以為詮次又按起居寶神及明堂夢祝述敘諸法十有餘條乃多是抄經而無正首尾猶如日芒日象玄白服霧之屬而顧獨不撰用致令遺逸今並詮錄各從其例又按有未見真本復不測有無流傳所記舛駁不類者未敢便頓省除皆且注所疑之意各於條下又按所載洞宮及諸山仙人氏族並欲以外書詳注出其根宗恐大致顯泄仰忤冥軌唯有異同疑昧者略摽言之其酆宮鬼官乃可隨宜顯說又按此書所起以真降為先然後眾事繼述真降之顯在乎九華而顧撰最致末卷又先生事迹未近真階尚不宜預在此部而顧遂載王右軍父子書傳並於事為非今以安記第一省除許傳別充外書神仙之例唯先生成仙之後與弟書一篇留在下卷又, CK-KZ: ''}
