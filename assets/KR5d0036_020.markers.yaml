  - {type: variant, offset: 7, length: 0, content: '', WYG: 二孔璪賤時杜居士京產將諸經書往剡南墅大墟住始與顧歡戚景𤣥朱僧標等數人共相料視顧先已寫在樓間經粗識真書於是分别選出凡有經傳四五卷真㖟七八篇今猶在杜家其經二真並真㖟已還封昭臺宋大明末有戴法興兄延興作剡縣亦好道及吳興天目山諸𤣥秀並頗得寫杜經樓從弟道濟及法真鍾興女傅光並得寫樓鍾間經亦互相通涉雖各摹符而殊多麄略唯加意潤色滑澤取好了無復規矩鋒勢寫經又多浮謬至庚午嵗隱居入東陽道諸晚學者漸効為精山陰潘文盛錢塘杜高士義興蔣𢎞素句容許靈真並是能者時人今知摹二王法書而永不悟摹真經經正起隱居手爾亦不必皆須郭填但}
