  body:
  - {type: variant, offset: 1, length: 0, content: '', CK-KZ-jye: 眞㖟七八篇今猶在杜家其經二眞並眞㖟已還封昭臺宋大明末有戴法興兄延興作剡縣亦好道及吳興天目山諸玄秀並頗得寫杜經樓從弟道濟及法眞鍾興女傳光並得寫樓鍾間經亦互相通涉雖各摹符而殊多麤略唯加意潤色滑澤取好了無復規矩鋒勢寫經又多浮謬至庚午嵗隱居入東陽道諸晚學者漸効爲精山陰潘文盛錢塘杜高士義興蔣弘素句容許靈眞並是能者時人令知摹二王法書而永不悟摹眞經經正起隱居手爾亦不必皆須郭塡但一筆就畫勢力殆不異眞至於符無大小故宜皆應郭塡也泰始四年終於剡移還始甯岹山馬智晚爲眾僧所說改事佛法悉以道經數}
  - {type: variant, offset: 1, length: 0, content: '', HFL: 之二}
  - {type: variant, offset: 1, length: 0, content: '', ZTDZ: 之二}
  - {type: variant, offset: 1, length: 0, content: '', krp: 之二}
  - {type: variant, offset: 2, length: 5, content: 九翼真檢第, CK-KZ-jye: 卷送與鍾皆是何公先爲其父寫者亦有王靈期雜經惟四五篇并眞㖟六七篇是眞手不關樓所得者其經二卷此眞㖟等悉已還封昭臺鍾亡後所餘亡應在兄女及戚景玄處昔有陳雷者東陽人是許長史門附謹敬有心長史常使典看經書頗加訓授其亦換有所寫兼得長史自步七元星圖長史去後因還東陽義熙十三年與東陽太守任城魏欣之兄子二人共合丹丹成三人前後服服皆有神異託迹暫死化遁而去雷有孫名某號爲長樂今居永康橫江橋北菁山道士樊仙亦頗就得所寫經書但步圖猶在其處今所服用卽是其本自此前凡諸經書在處者其篇數並別有目錄若止零牒}
  - {type: variant, offset: 2, length: 1, content: 九, HFL: 定十金闕右卿司命蓬萊都水盬梁國師貞白眞人華陽隱居陶弘景造}
  - {type: variant, offset: 2, length: 1, content: 九, WYG: 梁陶𢎞景撰}
