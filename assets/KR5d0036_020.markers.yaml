  - {type: variant, offset: 8, length: 3, content: 真誥敘, CK-KZ: 筆就畫勢力殆不異眞至於符無大小故宜皆應郭塡也泰始四年終於剡移還始甯岹山馬智晚爲眾僧所說改事佛法悉以道經數十卷送與鍾皆是何公先爲其父寫者亦有王靈期雜經惟四五篇并眞㖟六七篇是眞手不關樓所得者其經二卷此眞㖟等悉已還封昭臺鍾亡後所餘亡應在兄女及戚景玄處昔有陳雷者東陽人是許長史門附謹敬有心長史常使典看經書頗加訓授其亦換有所寫兼得長史自步七元星圖長史去後因還東陽義熙十三年與東陽太守任城魏欣之兄子二人共合丹丹成三人前後服服皆有神異託迹暫死化遁而去雷有孫名某號爲長樂今居永康橫江橋北菁山道士樊仙亦頗就得所寫經書但步圖猶在其處今所服用卽是其本自此前凡諸經書在處者其篇數並別有目}
