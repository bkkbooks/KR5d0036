  - {type: variant, offset: 8, length: 7, content: 真誥敘錄真誥運, krp: 筆就畫勢力殆不異眞至於符無大小故宜皆應郭填也泰始四年終於剡移還始寧岹山馬智晚爲衆僧所說改事佛法悉以道經數十卷送與鍾皆是何公先爲其父寫者亦有王靈期雜經唯四五篇并眞㖟六七篇是眞手不關樓所得者其經二卷此眞㖟等悉已還封昭臺鍾亡後所餘亡應在兄女及戚景玄處昔有陳雷者東陽人是許長史門附謹敬有心長史常使典看經書頗加訓授其亦换有所寫兼得長史自步七元星圖長史去後因還東陽義熙十三年與東陽太守任城魏欣之兄子二人共合丹丹成三人前後服服皆有神異託迹暫死化遁而去雷有孫名某號爲長樂今居永康横江橋北菁山道士樊仙亦頗就得所寫經書但步圖猶在其處今所服用即是其本自此前凡諸經書在處者其篇數並别有目録若止零牒一兩篇者今復顯}
  - {type: variant, offset: 9, length: 3, content: 誥敘錄, WYG: 至於符無大小故宜皆應郭填也泰始四年終於剡移還始寧岹山馬智晚為衆僧所説改事佛法悉以道經數十巻送與鍾皆是何公先為其父寫者亦有王靈期雜經唯四五篇并}
