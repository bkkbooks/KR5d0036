  - {type: variant, offset: 19, length: 0, content: '', CK-KZ: 卷本在句容葛粲間泰始某年葛以示陸先生陸旣敷述眞文赤書人鳥五符等教授施行已廣不欲復顯出奇迹因以絹物與葛請取甚加隱閉顧公聞而苦求一看遂不令見唯以傳東陽孫遊嶽及女弟子梅令文陸亡亦隨還廬山徐叔摽後將出徐亡乃在陸瓌文間已還封昭臺楊書王君傳一卷本在句容葛永眞間中又在王文淸家後屬茅山道士葛景仙已還封昭臺掾書飛步經一卷本在句容嚴虬家大明七年饑荒少糧其里王文淸以錢食與嚴求得之因在王家已還封昭臺掾書西嶽公禁山符楊書中黃制虎豹符凡二短卷本上虞吳曇拔所得許丞一瓠𤬛雜道書吳以}
