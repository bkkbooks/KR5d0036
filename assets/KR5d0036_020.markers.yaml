  - {type: variant, offset: 20, length: 0, content: '', CK-KZ: 二卷與褚先生伯玉伯玉居南霍遊行諸山恒帶自隨褚亡留在弟子朱僧摽間後褚弟五弟之孫名仲儼又就朱取之已還封昭臺吳曇拔者上虞且靡人頗有才致初爲道士許丞以一瓠𤬛書皆三君小小要用雜訣以與之其後事佛出家悉分散乞人都盡後又罷佛還俗遂留宕而終諸書訣並未測所在掾書太素五神二十四神并迴元隱道經一卷及八素陰陽歌一}
