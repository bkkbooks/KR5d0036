  - {type: variant, offset: 623, length: 1, content: 月, CK-KZ-jye: 世族祖漢徵士許劭字子將是五世族祖吳丞相許晏字孝然四世族祖並同承十一世祖光武時許交州後交相子名聖卿許姓本出炎帝時姜氏至周武王封許叔於許今豫州許昌也至周敬王十五年爲鄭所滅徙居山陽昌邑因國爲姓至交州乃移於汝南平輿也敬父名旉公府掾敬第五子名光字少張尙書郎鉅鹿太守少府卿過江值吴初爲光祿勳妻戴氏同葬今句容安成里墓爲剏造之始縣人傳呼云許光祿墓今墳碑顯然並甲向光第二子名闕字季優有才學吴尙書郎長水校尉妻戴氏同葬墓次闕第三子名休字文烈優遊道素高尙其氣州辟別駕不就前妻晉陵華氏後妻同縣葛氏侍中葛相女同葬墓次休長子名尙字元甫有才學令聞吳鳳凰三年爲中書郎年五十亡妻同郡陶氏卽荆州刺史陶濬女同葬墓次尙第二子名副字仲先庶生卽長史之父也淳和美懿州郡所稱爲晉元帝安東參軍又征北參軍帶下邳太守後爲甯朔將軍與孔坦討沈充封西城縣侯出爲剡令有風化與謝弈兄弟周旋値蘇峻亂又携親族往剡事平還拜奉車都尉年七十七亡前妻晉陵華氏名轉御吏中丞華琦妹也後妻應氏名來子竟陵太守應彥徽女同葬縣北大墓也副有八男第一奮一名守字孝方庶生有文武才望出繼叔父朝爲何次道參軍後爲所後弟夷吾所譛康帝誅之年三十六妻王氏墓葬縣北大墓有曾孫薈之位至三府第二炤字行明正生承嫡襲封通濟有當世局度亦爲何次道參軍南臺侍御史淮陵太守年七十一亡妻游氏別葬縣東合留村第三羣字太和正生明爽有才幹爲虞譚參軍年四十四亡妻厯陽邵氏同葬縣北大墓第四邁卽先生也第五某卽長史也並同正生別記在後第六茂玄庶生早亡母姓陳也第七礭字義玄小名嗣伯庶生母姓朱也出後伯父㨗梗槩有大度好學出爲桓温揚州從事謝安衞軍參軍隨謝玄討符堅有功封都鄉侯尙書蒼部駕部郎正員郎通直常侍後患風不能言隆安二年亡年七十妻宣城紀氏同葬縣北大墓第八靈寶庶生早亡母亦姓陳副有四女長女名姜正生早亡第二女名娥皇正生出適同郡建康令黃演第三女名修容庶生母姓張出適安固令晉陵弘升第四女名暉容與礭同生出適同郡紀詮也副弟名朝字楊先勇猛以氣俠聞厯爲襄陽新野南陽潯陽太守後與甘卓謀討王敦事覺卓死朝自裁年五十三還葬縣北大墓妻葛悌女抱朴姊也初養奮後自生夷吾高子並又亡無後先生名邁字叔玄小名映淸虛懷道遐棲世外故自改名遠遊與王右軍父子周旋子猷乃修在三之敬按手書授六甲陰陽符云永昌元年年二十三嵗則是永康元年庚申嵗生也而譜云永和四年秋絶迹於臨安西山年四十八此則永甯元年辛酉生爲少一年今以自記爲正絶迹時年四十九矣娶吳郡孫宏字彥達女卽驃騎秀之孫旣離好無子歸宗先生得道事迹在第二卷中定錄所喻被試事已具載焉長史名謐字思玄一名穆正生少知名儒雅淸素博學有才章簡文皇帝久垂俗表之顧與時賢多所儔結少仕郡主簿功曹史王導蔡謨臨川辟從事不赴選補太學博士出爲餘姚令入爲尙書郎郡中正護軍長史給事中散騎常侍雖外混俗務而內修眞學密授教記遵行上道挺分所得乃爲上淸眞人爵登侯伯位編卿司治仙佐治助聖牧民按泰和二年丁卯嵗司命所告云丙子年當去時年七十二此則永興二年乙丑生太元元年去也而譜云孝武甯康元年去世年七十一此爲泰安二年癸亥生爲多二年今以眞爲正顧云甯康元年七十二又非也妻同郡陶威女名科斗興甯中亡卽入易遷宫受學同葬縣西北二里舊墓長史三男一女長男名甽小名揆庶生郡公曹妻劉氏少子名鳳遊郡主簿鳳遊子道伏字明之明之少子靜泰字元寶爲海平縣令久居會稽禹井山頗遵承家法傳受經書皆摹寫而已靜泰妻同郡葛氏唯有一子名靈眞戊午生今猶在會稽亦敦尙道業善能符書自長史後唯有此六世孫一人而已中男名聯字元暉少名虎牙正生敦厚信向郡主簿功曹謝安爲護軍又引爲功曹除永康令衞尉丞晉康太守不之官又爲輔國司馬安帝元興三年於家去世年六十八則成帝咸康三年丁酉嵗生也顧云咸和三年生亦大謬妻晉陵華琦孫名子容同葬江乘界新安里中子赤孫字玄眞篤實和隱郡主簿功曹年七十四亡有四子及孫並早亡今無後也小男名翽字道翔小名玉斧正生幼有珪璋標挺長史器異之郡舉上計掾主簿並不赴淸秀瑩潔糠粃塵務居雷平山下修業勤精恒願早遊洞室不欲久停人世遂詣北洞告終卽居方隅山洞方原館中常去來四平方臺故眞誥云幽人在世時心常樂居焉又楊君與長史書亦云不審方隅山中幽人爲己設坐於易遷戸中未亡後十六年當度往東華受書爲上淸仙公上相帝晨譜云年三十而不記去嵗按二錄泰和二年丁卯時年二十七則是咸甯七年辛卯生也顧云咸和六年生又云司徒辟掾皆爲非實自泰和三年已後無復蹤迹依譜年三十卽是庚午年去世又眞誥云從張鎭南之夜解而未審張解之法耆老傳云掾乃在北洞北石壇上燒香禮拜因伏而不起明旦視形如生此壇今猶存厯然則是故求隱化早絶世塵也事別在第二卷中妻建康令黃演女卽姑娥皇之子名敬儀生黃民乃遣還家後離絶又出適宛陵令戴耆之長史一女名素薰庶生出適越騎校尉晉陵華瑛子名廣掾子黃民字玄文升平五年辛酉生時掾年}
