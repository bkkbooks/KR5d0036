  - {type: variant, offset: 3838, length: 1285, content: 王既獨擅新奇舉世崇奉遂託云真授非復先本許見卷帙華廣詭信豐厚門徒殷盛金帛充積亦復莫測其然乃鄙閉自有之書而更就王求寫於是合迹俱宣同聲相贊故致許王齊轡真偽比蹤承流向風千里而至後又有菜買者亦從許受得此十數卷頗兼真本分張傳受其跡不復具存菜買善行下道之教於上經不甚流傳也馬朗既見許所傳王經卷目增多復欲更受營理信克日當度忽夢見有一玉碗從天來下墜地破碎覺而發疑云此經當在天為寶下地不復堪用於是便停論馬朗雖不修學而寶奉精至夢既不凡解之又善亦應是得道人元嘉六年許丞欲移歸錢塘乃封其先真經一廚子且付馬朗淨室之中語朗云此經並是先靈之迹唯須我自來取縱有書信慎勿與之乃分持經傳及雜書十數卷自隨來至杜家停數月疾患慮恐不差遣人取經朗既惜書兼執先旨近親受教敕豈敢輕付遂不與信俄而許便過世所齎者因留杜間即今世上諸經書悉是也許丞長子榮弟迎喪還鄉服闋後上剡就馬求經馬善料理不與其經許既慚戢不復苦索仍停剡住因又以靈期之經教授唱言並寫真本又皆注經後云某年某月某真人授許遠遊于時世人多知先生服食入山得道而不究長史父子事跡故也人亦初無疑悟者經涉數年中唯就馬得兩三卷真經頗亦宣泄今王惠朗諸人所得者是也元嘉十二年仍於剡亡因葬白山榮弟在剡大縱淫侈都不以經學為意所以何公在馬家快得尋寫馬朗馬罕敬事經寶有過君父恆使有心奴子二人一名白首一名平頭常侍直香火灑掃拂拭每有神光靈炁見於室宇朗妻頗能通見云數有青衣玉女空中去來狀如飛鳥馬家遂致富盛資產巨萬年老命終朗子洪洪弟真罕子智等猶共遵向末年事佛乃弛廢之爾此當是經運應出所致也山陰何道敬志向專素頗工書畫少遊剡山為馬家所供侍經書法事皆以委之見此符跡炳煥異於世文以元嘉十一年稍就摹寫馬罕既在別宅兼令何為起數篇所以二錄合本仍留罕間何後多換取真書出還剡東墅青壇山住乃記說真經之事可有兩三紙但何性鄙滯不能精修高業後多致散失猶餘數卷今在其女弟子始豐後堂山張玉景間何常以彭素為事質又野朴顧居士聞其得經故往詣尋詣正遇見荷鋤外還顧謂是奴僕因問何公在否何答不知于是還里永不相見顧留停累日謂苦備至遂不接之時人咸以何鄙恥不除而失知人之會也何既分將經去又泄說其意馬朗忿恨乃洋銅灌廚籥約敕家人不得復開大明七年三吳饑饉剡縣得熟樓居士惠明者先以在剡乃復攜女師鹽官鍾義山眷屬數人就食此境樓既善於章符五行宿命亦皆開解馬洪又復宗事出入堂靜備睹經廚先已見何所記意甚貪樂而有鑰嚴固觀覽無方景和元年乃出都令嘉興殳季真啟敕封取景和既猖狂樓謂上經不可出世乃料簡取真經真傳及雜受十餘篇乃留置鍾間唯以豁落符及真受二十許小篇並何公所摹二錄等將至都殳即以呈景和於華林暫開仍以付後堂道士泰始初殳乃啟將出私解陸修靜南下立崇虛館又取在館陸亡隨還廬山徐叔摽後將下都及徐亡仍在陸兄子瑰文間此中有三君所書真受後人糊連裝榻分為二十四篇建元三年敕董仲民往廬山營功德董欲求神異徐因分楊書一篇為兩篇與董還上高帝高帝以付五經典書戴慶戴慶出外仍將自隨徐因亡後弟子李果之又取一篇及豁落以去所餘惟二十一篇悉以還封昭臺也樓從都還仍住剡就鍾求先所留真經鍾不以還之乃就起寫久久方得數篇既與馬洪為恨移歸東陽長山馬後遂來潛取而誤得他經樓中時似複有所零落今猶應一兩篇在其二卷已還封昭台, CK-KZ: ''}
