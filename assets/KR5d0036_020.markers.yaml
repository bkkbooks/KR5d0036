  - {type: variant, offset: 22, length: 10, content: 立辭表意發詠暢旨論冥, CK-KZ: 東陽章靈民先出都遇得之章于時未識眞書惟言是道家常經而已歸東陽以示顧顧不向道仍留之分迴元爲二卷章後旣知方就求得今在章間其二景歌一卷章已與孫公已還封昭臺章云于時又有曲素金眞金華等}
