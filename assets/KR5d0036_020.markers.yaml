  - {type: variant, offset: 7, length: 0, content: '', CK-KZ: 二孔璪賤時杜居士京產將諸經書往剡南墅大墟住始與顧歡戚景玄朱僧摽等數人共相料視顧先已寫在樓間經粗識眞書於是分別選出凡有經傳四五卷眞㖟七八篇今猶在杜家其經二眞並眞㖟已還封昭臺宋大明末有戴法興兄延興作剡縣亦好道及吳興天目山諸玄秀並頗得寫杜經樓從弟道濟及法眞鍾興女傳光並得寫樓鍾間經亦互相通涉雖各摹符而殊多麤略唯加意潤色滑澤取好了無復規矩鋒勢寫經又多浮謬至庚午嵗隱居入東陽道諸晚學者漸効爲精山陰潘文盛錢塘杜高士義興蔣弘素句容許靈眞並是能者時人令知摹二王法書而永不悟摹眞經經正起隱居手爾亦不必皆須郭塡但}
