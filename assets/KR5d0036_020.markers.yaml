  - {type: variant, offset: 872, length: 0, content: '', CK-KZ: 云鳳巢高木素衣衫然者配况長史名也曾參出田云云者離合長史字也許仙侯許卿者得眞位也給事常侍者在官世也有云許朝者卽長史叔南陽也有云寅獸白齒者是虎牙也亦直云寅獸者亦云寅客亦云許虎許牙也許主簿者牙位也華新婦者牙妻也似云名厚卽所謂許厚華侯華書吏者牙婦弟也有云瓊刃者譬訓掾小名也卽靑錄所載若鋒者矣企望人飛云云者卽離合掾官名也有云許㹠子似是揆小名也有云易遷夫人及斗者卽掾母陶科也有云勿憂嗣伯之詭者卽長史弟小名也有云來子雖善於爾者卽長史後母也有云當奈張者何者卽長史父妾也有云黃娥者卽長史娥掾婦母也出適黃家故曰黃娥本名娥皇有云演小子耳者卽娥皇壻黃演也有云赤孫者卽虎牙兒也登升者三人先生長史掾也度世者五人虎牙黃民榮弟大娘小娘尋虎牙云遂得不死過度壬辰必是度世之限其餘無迹顯出黃民傳奉經業道育亡有異徵恐或預例其二人亦可更在後世子孫若必以七世爲限則靈眞之子實鍾斯慶長史婦陶威女雖入易遷恐此自承陶家福耳不必關許氏五人之}
