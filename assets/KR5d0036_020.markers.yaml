  - {type: variant, offset: 959, length: 793, content: 示許爾唯安妃數條是楊自所記錄今人見題目云某日某月某君受許長史及掾某皆謂是二許親承音旨殊不然也今有二許書者並是別寫楊所示者耳又按掾自記云泰和三年行某道二錄是二年受自三年後無復有疏長史正書既不工所繕寫蓋少今一事乃有兩三本皆是二許重寫悉無異同然楊諸書記都無重本明知唯在掾間者于今頗存而楊間自有杳然莫測自楊去後六七年中長史間迹亦悉不顯又按今所詮綜年月唯乙丑歲事最多其丙寅丁卯各數條而已且第一卷猶可領略次第其餘卷日月前後參差不盡得序又按凡所注日月某受多不書年今正率其先後以為次第事有斷絕亦不必皆得又本無年月及不注某受者並不可知依先闕之又按真授說餘人好惡者皆是長史因楊請問故各有所答並密在許間于時其人未必悉知又按併衿接景陽安亦灼然顯說凡所興有待無待諸詩及辭喻諷旨皆是雲林應降嬪仙侯事義並亦表著而南真自是訓授之師紫微則下教之匠並不關儔結之例但中候昭靈亦似別有所在既事未一時故不正的的耳其餘男真或陪從所引或職司所任至如二君最為領據之主今人讀此辭事若不悟斯理者永不領其旨故略摽大意宜共密之又按二許應修經業既未得接真無由見經故南真先以授楊然後使傳傳則成師所以長史與右英書云南真哀矜去春使經師見授洞房云云而二許以世典為隔未崇禮敬楊亦不敢自處既違真科故告云受經則師乃恥之耶然則南真是玄中之師故楊及長史皆謂為玄師又云疾者當啟告於玄師不爾不差而長史與右英及眾真書亦稱惶恐言者此同於師儀爾實非師也又按楊書中有草行多饞黵者皆是受旨時書既縭遽貴略後更追憶前語隨復增損之也有謹正好書者是更復重起以示長史耳又按三君手書今既不摹則混寫無由分別故各注條下若有未見真手不知是何君書者注云某書又有四五異手書未辨為同時使寫為後人更寫既無姓名不證真偽今並撰錄注其條下以甲乙丙丁各甄別之又按書字中有異手增損饞改多是許丞及丞子所為或招引名稱或取會當時並多浮妄而顧皆不能辨從而取之今既非摹書恐漸致亂惑並隨字注銘若是真手自治不復顯別又按三君手迹, CK-KZ: ''}
