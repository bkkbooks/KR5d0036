  - {type: variant, offset: 621, length: 1, content: 歲, CK-KZ: 嵗來渡江居丹陽之句容縣都鄕吉楊里後值吳初事爲光祿勳今許光祿墓是也則肇時猶居汝南平輿顧云句容子阿謬矣眞誥云長史七世祖肇字子阿有振惠之功今檢譜七世祖名敬字鴻卿後漢安帝時爲光祿順帝永建元年拜司徒名字與眞誥不同未詳所以舛異安帝永初二年三年大饑斗米二千文人相食若所救活四百八人必應在此時也應邵漢官儀載崔瑗表云許敬年且百嵗猶居相位如此非唯陰德遠流後𦙍交目陽功著世所以年永身安位至台鼎子訓孫相並爲三公光來過江奕世丕承遂至神仙蜀司徒許靖字文休是長史}
