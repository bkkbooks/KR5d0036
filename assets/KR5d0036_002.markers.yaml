  - {type: variant, offset: 2626, length: 213, content: 改玩之而不遷乎夫人在世先有能書善為事者得真仙之日外書之變亦忽然隨身而自反矣真事皆邇者不復廢今已得之濁書方又受學於上文而後重知真書者也鬼道亦然但書字有小乖違耳且以靈筆真手初不敢下交於肉人雖時當有得道之人而身未超世者亦故不敢下手陳書墨以顯示於字迹也至乃符文神藻所求所佩者自復始來而作耳所以爾者世人固不能了其端緒又使吾等不有隱諱耳冥中自相參解矣內外自相關矣又四極明科高上禁重亦自不聽我等復為世間常書也我既下手子固不解亦將何趣兩為煩濫, CK-KZ: 可}
