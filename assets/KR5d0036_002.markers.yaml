  - {type: variant, offset: 5500, length: 2, content: 汝違, HFL: 懈九眞至須幽靜人事雜錯患在未專耳昔人學道尋師索友彌積年載經歷山岳無所不至契闊險試備嘗勞苦然後授以要訣穆德薄罪厚端坐愆室横爲衆眞所見採録鑒戒繼至啓悟非一古人有言非知之難其行之難夫人垂恩所賜自可徐徐}
  - {type: page-break, offset: 5500, content: '', id: KR5d0036_HFL_002-022b, image: hfl/0637/0637-087.png}
  - {type: variant, offset: 5500, length: 2, content: 汝違, WYG: 能仰飛空同上上雲𤣥之涯不道易聞而患不眞書易得而患不行若專如此大天之中盡眞仙比肩也我亦無咎於不能為者心不定而欲書將欲沽之哉意不往而求眞似欲之也願告八月十七日夜右英王夫人授書此與許長史似答心求守雌之眞一也肇祖植德華條翁隊即謂七世祖許肇也隊字應作墜頓足懸車無早晚也但心堅注眞㣲密靈機則可矣至於高逸長嶺寢冥林澤縱時事之難鄙遺九親而味神實美舉也心茍不專愆念塡胷雖躡閬山以遊步造圓壟以朝冥然亦必敗也若必空空我自當相告有可動之時也今且未可議耶八月十七日夜保命仙君小茅口授與許長史含仁守慈發㧞幽憂單心慈誘棲神靈鏡者許長史其人也所恨在於應物速招眞急耳夫浩挺虚映乃可守雌已求故當能守之守之蓋易恐亦宜無不可耶八月十八日夜紫㣲王夫人授示許長史右四條有楊書穆奉被音告頻煩備至仰衘恩潤光華彌煥披覽欣慶感荷罔極穆沈滯流俗豈忘拔迹輙已誓之中心思為階漸考室東山棲景林壑此志必也}
