  - {type: variant, offset: 2097, length: 2, content: 十四, CK-KZ: 樹不見不審可剪荆棘出此樹單生其實幾好也雖云問也其欲希之近也當爲君問主領者三年更相問以卽日始丑年此二字長史後益上八月七日夜雲林右英王夫人口授答許長史凝心虛形內觀洞房抱玄念神專守眞一者則頭髮不白秃者更軫軫字亦應是琴未有以百思纏胸寒熱破神營此官務當此風塵口言吉凶之會身扉凡作扉字者皆是排音非扉扇之扉也得失之門眾憂若是萬慮若此雖有眞心固爲不篤抱道不行握寶不用而自然望頭不白者亦希聞也玉醴金漿交生神梨方丈火棗玄光靈芝我當與山中許道士不以與人間許長史也八月七}
  - {type: page-break, offset: 2097, content: '', id: KR5d0036_CK-KZ_02p029b, image: JY237/CK-KZ_JY237_02p029b.png}
