  - {type: variant, offset: 4927, length: 0, content: '', WYG: 内彰也裴亦何人哉郄即愔也小名方回裴眞人本末即是清靈傳也有謝過及七經之士故令示之八月七日夕右英王夫人授書令與許長史右一條楊書又有長史寫守眞一篤者一年使頭不白禿髪更生夫内接兒孫以家業自羈外綜王事朋友之交耳目廣用聲氣雜役此亦道不專也行事亦無益矣夫眞才例多隱逸棲身林嶺之中逺人間而抱澹則必孾顔而𤣥鬢也玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未眞正穢念盈懐恐此物輩不肯來也茍眞誠未一道亦無私也亦不當試問火棗交梨之樹}
