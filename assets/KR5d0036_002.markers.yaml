  - {type: 'tls:seg', offset: 235, content: '', id: KR5d0036_tls_002-5a.10}
  - {type: variant, offset: 235, length: 0, content: '', CK-KZ: 也與許玉斧此夕又有中君授書與許卿答欲知洞天中之事今載在第四卷中鳳巢高木素衣衫然此八字是作長史小名穆字也履順思眞凝心虛玄仍取此思字玄字卽成長史字也五公石腴彼體所便急宜服之可以少顏三八令明次行玄眞解駕偃息可誦洞篇瓊刃應數此瓊刃字卽是掾小名玉斧也與外傳靑錄義同故云應數精心高栖隱嘿沉閑正氣不虧术散除疾是爾所宜次服䭀飯兼穀勿違益髓除患肌膚充肥然後登山詠洞講微寅獸白齒此四字卽是云虎牙也亦能見機遂得不死過度壬辰偃息盛木玩執周書此八字卽是作楊字也太極植簡金名西華學服可否}
