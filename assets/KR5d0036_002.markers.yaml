  - {type: variant, offset: 202, length: 0, content: '', CK-KZ: 四日來凡二十四條並有楊書蕭邈眞才内鏡外和曾參出田丹心同丹素糸三遷來庇方頭此四句是離合作思玄字卽長史之字也錄名太極金書東州蹇裳七度躭凝洞樓内累旣消魂魄亦柔守之不倦積之勿休五難旣遣封伯作侯七度飛步事也洞樓洞房事也右紫微王夫人所喻令示許長史右一條有長史寫紫微夫人喻曰披華蓋之側云云此事出在第三卷中六月二十七日夜喻書此右一條有楊書積精所感萬物盡應妙誠未匝則形華不盡形華不盡則洞房之中難卽分明也吾昔受此法常向西北存之耳西北存如小爲易見可明示如此西北爲天地之爽内照之玄門也六月二十七日紫陽所喻此二十七日眾眞復降其事亦應甚多並不出右一條有長史寫二君各有六僮裴君從者持靑髦之節一僮帶繡囊周君從者持黃髦之節無囊右二條是甲手書六月二十九日九華眞妃授書曰景應雙粲雲會玄落龍秀五空採瓊閬臺長歌靈幙煥啓玉扉眇矣遺事與世長辭霞軫絳波電赴紫栖共攜淸響之外同遊雲岫廣崖豈不善乎豈不樂哉日者霞之實霞者日之精君唯聞服日實之法未見知餐霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映}
