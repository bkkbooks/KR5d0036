  - {type: variant, offset: 4948, length: 546, content: 冥乎自然此復是二象大宗內外之配職耳實非所以變無反淡凝情虛刃靈刀七累遺任太素保真啟玉單景八空之謂也秀寂高清鬱輿流霄使鳳歌雲路龍吟虎嗥天皇雙景遠升辰樓飛星擲光日月映軀口吐冥煙眼激電光上寢瓊房流行玉清手掣景雲足陟金庭若自此之時在得道之頃為當固盡內外理同金石情纏雙好齊心幃莫耳為必抱衾均牢有輕中之接塵穢七神悲魂任魄乎蓋是妾求氏族於明君耳非有邪也今可謂得志懷真情已如一方當相與結駟玉虛偶行北玄同掇絳實於玉圃併採丹華於閬園分飲於紫川之水齊濯於碧河之濱紫華毛帔日冕蓉冠逍遙上清俱朝三元八景出落鳳扉雲關仰漱金髓詠歌玉玄浮空寢晏高會太晨四鈞朗唱香母奏煙齊首偶觀攜帶交裙不亦樂乎不亦得志乎明君其順運隨會妾必無辭且亦自不得背實反冥苟任胸懷矣授畢復自取視而言曰今以此書相詣庶豁其滯疑耳言畢乃笑良久紫微夫人曰真妃之辭盡矣論好之緣著矣爾亦不得復有所容也玄運冥分使之然耳南嶽夫人見授書曰冥期數感玄運相適應分來聘新搆因緣此攜真之善事也蓋示有偶對之名定內外之職而已不必苟循世中之弊穢而行淫濁之下跡矣偶靈妃以接景聘貴真之少女於爾親交亦大有進業之益得而無傷絕之慮耳千神於是可使試觀不得復陳矣真旌必可剋往雲軿必可俱駕也吾往曾因紫微夫人為汝構及此意今遂如願益使我欣欣慎復疑矧於心胸矣我昨見金臺李夫人於清虛中言爾尚有疑正之心色氣小有眼眼, CK-KZ: 敢𢙛}
