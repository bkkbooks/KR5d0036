  - {type: variant, offset: 2840, length: 322, content: 此亦當暗其可否殆不足嫌想少暢豁於胸懷盡不自書之流分矣上真司命南嶽夫人授今書如左若夫仰擲雲輪總轡太空手維霄綱足陟玉庭身升帝闕披寶歙青上論九玄之逸度下紀萬椿之大生遂竦景電肅千霞煥明真言玄浪高談玉清激朱唇之流徽運日氣之零零爰乃吐烽卻煙彈金奏瓊鸞音蒨粲鳳唱嘉聲耳若但應景下旋迴靈塵埃參輦弊宇敖佛朝市來成真才訓我弟子則玉振落響琳鍾內抑周目五濁契闊愆室神勞臭腥填鼻斂氣遂閉蘭音於中華之元退案金聲之劣劣而發耳夫神者言微於邇萬里必接奇韻雖觸鏡鑒無滯故真理之既分聞遐則道高邈璞不肆瑩而致有卑微之聰也今子乃有心覺之至將致嫌似之思外觀流俗之對內有遲疑之悟乎不運事宜亦已邁也望所營者道研詠者妙耳道妙既得高下之音必坦然矣此非所謀吾子加之至慮散蕩斯念宜慎之耳右三條有楊書六, CK-KZ: 八}
