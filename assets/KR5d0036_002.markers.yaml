  - {type: variant, offset: 2212, length: 675, content: 淪倏遷灼寂是故放蕩無津遂任鼓風舵存乎虛舟而行耳故實中之空空中之有有中之無象矣至於書跡之示則揮形紙札文理炳注粗好外著玄翰挺煥而範質用顯默藻斯坦形傳塵濁苟騫露有骸之物而得與世進退上玷逸真之詠下虧有隔之禁亦我等所不行靈法所不許也今請陳為書之本始也造文之既肇矣乃是五色初萌文章畫定之時秀人民之交別陰陽之分則有三元八會群方飛天之書又有八龍雲篆明光之章也其後逮二皇之世演八會之文為龍鳳之章拘省雲篆之迹以為順形梵書分破二道壞真從易配別本支乃為六十四種之書也遂播之于三十六天十方上下也各各取其篇類異而用之音典雖均蔚跡隔異矣校而論之八會之書是書之至真建文章之祖也雲篆明光是其根宗所起有書而始也今三元八會之書皇上太極高真清仙之所用也雲篆明光之章今所見神靈符書之字是也爾乃見華季之世生造亂真共作巧末趣徑下書皆流尸濁文淫僻之字舍本效假是囂穢死迹耳夫真仙之人曷為棄本領之文跡乎畫淫亂之下字耶夫得為真人者事事皆盡得真也奚獨於凡末之粗術淫浮之弊作而當守之而不改玩之而不遷乎夫人在世先有能書善為事者得真仙之日外書之變亦忽然隨身而自反矣真事皆邇者不復廢今已得之濁書方又受學於上文而後重知真書者也鬼道亦然但書字有小乖違耳且以靈筆真手初不敢下交於肉人雖時當有得道之人而身未超世者亦故不敢下手陳書墨以顯示於字迹也至乃符文神藻所求所佩者自復始來而作耳所以爾者世人固不能了其端緒又使吾等不有隱諱耳冥中自相參解矣內外自相關矣又四極明科高上禁重亦自不聽我等復為世間常書也我既下手子固不解亦將何趣兩為煩濫耶此亦當暗其可否殆不足嫌想少暢豁於胸懷盡不自書之流分矣上真司命南嶽夫人授今書如左若夫仰擲雲輪總轡, WYG: 同亹亹德韻和飄飄步}
