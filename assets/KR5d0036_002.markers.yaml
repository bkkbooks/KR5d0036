  - {type: variant, offset: 237, length: 1, content: 往, CK-KZ: 並離合譬喻四人姓名各詮所宜修行服御事尋辭意皆相貫次不知云何得兩人共說寓言必可用不用是無情焉得駕欻迹尋此空中靈微音良有旨當用愼勿輕事事應神機保爾見太平右右英吟此茅定錄言良箴也可記之仙才不用心煩曲故能得也保命言八月中彼人必東秀蹔看燒香必也保命臨去言右從乙丑歲}
