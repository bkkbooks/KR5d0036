  - {type: variant, offset: 2933, length: 679, content: 談玉清激朱唇之流徽運日氣之零零爰乃吐烽卻煙彈金奏瓊鸞音蒨粲鳳唱嘉聲耳若但應景下旋迴靈塵埃參輦弊宇敖佛朝市來成真才訓我弟子則玉振落響琳鍾內抑周目五濁契闊愆室神勞臭腥填鼻斂氣遂閉蘭音於中華之元退案金聲之劣劣而發耳夫神者言微於邇萬里必接奇韻雖觸鏡鑒無滯故真理之既分聞遐則道高邈璞不肆瑩而致有卑微之聰也今子乃有心覺之至將致嫌似之思外觀流俗之對內有遲疑之悟乎不運事宜亦已邁也望所營者道研詠者妙耳道妙既得高下之音必坦然矣此非所謀吾子加之至慮散蕩斯念宜慎之耳右三條有楊書六月二十四日夜南嶽夫人見授令書此先是二十二日夕有在別室共論講道紫微南嶽二夫人聲氣語音殊下不解其趣今故授書此以答所共講者之疑心也初來見授時色氣猶不平授畢可爾弟子唯覺色有不平都無他可道此一條亦是楊君自記論南嶽夫人其夕語弟子言我明日當詣王屋山清虛宮令汝知之所至也其夕又言海東桐柏山西頭適崩二百許丈紫微王夫人云世人之思慮何得事事真審耶可不事有答其心也南嶽夫人言戲之耳欲建豎之也瑩實之也興寧三年歲在乙丑六月二十五日夜此是安妃降事之端記錄別為一卷故更起年歲號首也紫微王夫人見降又與一神女俱來神女著雲錦示蜀上丹下青文彩光鮮腰中有綠繡帶帶係十餘小鈴鈴青色黃色更相參差左帶玉佩佩亦如世間佩但幾小耳衣服倏倏有光照朗室內如日中映視雲母形也雲髮鬃此應是騑字騑黑髮貌也鬢整頓絕倫作髻乃在頂中又垂餘髮至腰許指著金環白珠約臂視之年可十三四許左右又有兩侍女其一侍女著朱衣帶青章囊手中又持一錦囊囊長尺一二寸許以盛書書當有十許卷也以白玉檢檢囊口見刻檢上字云玉清神虎內真紫元丹章其一侍女著青衣捧白箱以絳帶束絡之白箱似象牙箱形也二侍女年可堪十, WYG: 蹤}
