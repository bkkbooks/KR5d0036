  - {type: variant, offset: 222, length: 4, content: 厶厶剪缺, CK-KZ: 眞妃坐良久乃命侍女發檢囊之中出二卷書以見付今寫之題如左上淸玉霞紫映内觀隱書上淸還晨歸童日暉中玄經右二卷名目此題本應是三元八會之書楊君旣究識眞字今作隸字顯出之耳七月一日夜紫微王夫人南岳夫人九華眞妃紫陽桐柏淸虛三眞人茅二君同降良久某乃自陳於眾靈求安身之術欲知貴賤之分年命之會多少定限於是眞妃乃笑良久見授書此曰明君夷質虛閑祕搆玉朗蘭淵高流淸響金宮可謂能珍寶藏奇幽眞内煥摽拂靈篇乘數順生素德神園丹錄玉淸興煙拔景冥鼓遐聲也必三事大夫侍晨帝躬高佐四輔承制聖君理生斷死賞罰鬼神攝命千靈封山召雲主察陰陽之和氣而加爲吳越鬼神之君也妾將挺命凝觀憑華而生靈飛九天虛音飈房因運四覺玄梯同象紫名太上淸文八景神映西暉德明内隸乃受書乘氣得爲眞妃之任矣又當助君總括三霍綜御萬神對命北帝制敕酆山又應相與攜袂靈房乘煙七元嘉會希林内攄因緣也是故君姓於楊我得爲安妾自發玄下造君自受書於西宮從北策景乘軿東轅握髦秉鉞專制東蕃三官奉笏河山啓源天丁獻武四甲衞輪當此之時實明君之至貴眞仙之盛觀也三官中常有諺謡云楊安大君董眞命神正我等之謂耳蓋聖皇之方駕於今有二十八年也復二十二年明君將乘龍駕雲白日昇天先詣上淸西宮北朝玉皇三元然後乃得東軫執事矣此自是君玉朗紫微金音虛領爲太極所旌乃玄德上挺不復用懃學劬勞陟足山川矣若爲精勗之者當小神淸瑩鮮耳亦不甚今日不勞之舉也世俗縈網貴賤之間涉塵塗之役在得失之津信非眞人所得經營乃自坦乎艱泰之用任乎遇否之頃耳見明君之逸誠欣然也覩明君之否誠慼顏也此二感發於顏色之上也復未足以致遠悲抱長慼矣至於内冥偶景併首玄好輕輪塵藹參形世室妾豈以愆累浮卑少時之滯而虧辱於當眞之定質耶夫陰陽有對否泰反用二象旣羅得失錯綜此皆往來之徑陌耳今人居風塵之休盛者乃多罪之下鬼趣死之考質也夫處無用於囂塗乃得眞之挺樸任凡庸以内觀乃靈仙之根始也蓋富貴淫麗是破骨之斧鋸有似載罪之舟車耳榮華矜世爭競徼時適足以誨愆要辱爲伐命之兵非佳事也是故古之高人覽罪咎之難豫知富貴之不可享矣遂肥遯長林棲景名山咀嚼和氣漱濯淸川欲遠此惡迹自求多福超豁絙聘保全至素者也君亦奚足汲汲於人間之貴賤投身於榮辱之肆哉且方交兵日會三災向臻神風駈除臭氣參天明金生穢於泥瀆寶玉投糞以招塵褰衣振血濁精虧眞玄通遠逸是其時也君若其不耐風火之煙欲抱眞形於幽林者可且尋解劍之道作告終之術乎自盡出嘿之會隱顯之迹臨時分處有任於明君矣冥數上感有命而交靈書玉臺眞契合景是以言單於辭心訖於筆妾豈獨歎於一人乎蓋示名分之判例也書訖取以與某復曰君省此當少愈不右從六月二十九日來凡十四條並楊君自記書東卿大君昨夜四更初來見降侍從七人入戸一人執紫旄節一人執華幡一名十絕靈幡一人帶綠章囊三人捧牙箱一人握流金鈴乃年少於二弟二弟昨並倚立東向命坐乃坐耳良久言語委曲先昨神女來降意本疑是王母女昨又來定是也南眞說云是阿母第十三女王媚蘭字申林治滄浪山受書爲雲林夫人}
