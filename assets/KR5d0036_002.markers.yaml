  - {type: variant, offset: 1030, length: 861, content: 母稱九靈則八靈宜在七靈前而今返在後者亦所未詳又受讀黃庭事雲北嶽蔣夫人與今不同上真東宮衛夫人方丈臺昭靈李夫人紫清上宮九華安妃朱陵北絕臺上嬪管妃北嶽上真山夫人西漢夫人長陵杜夫人右十五女真東向坐北起南行說此事時雖不記月日不知在何年既是眾真名位故出以居前按眾真位號前云以為高者猶今世之徽號也六月二十一日夜定錄問云許長史欲云何尋道登答勤修真誠之意定錄又言昔有趙叔臺王世卿亦言篤學而竟不如人意遂為北明公府所引此是乙丑年六月也自此前唯有六月十五日定錄授是答長史書論茅山中事此前又已有一授不記何月日並在第四卷中自餘無有先此者北明公府酆都宮中官屬也昔扉廓天津採華赤丘是時聲穎靈示蒙塵華喬此即應是說初降華僑事字少倚人發煥秀山高說延霄自謂玄響所振無往不豁既濯以靈波實望與物榮菴既未能暢業駢羅遊岫逐逸然後知悟言之際應玄至少於是佛音弗駕而旋偃靜葛臺夫玄刃無親流鑒遁真若以雲壁一往想齊獨邁俯自啟灑動應潛逸始乃吾等並有欣慨耳往見況意相知篤末書云伏覽聖記事跡淵妙金策素著青錄玄定遂跨塵俗逍遙紫陽何蕭蕭之清遠眇眇之真貴哉若能者矣請借來喻又云得道之階錯厲精神靖躬信宿洗誠求矜如斯而言道已邇也然夤夜之間宜篤經營乃後得手結天維足浮靈綱心遊太空目擊洞房不待久日也若五情愆波三魂越於是三真舞劍黃闕捷關耳可不力之可不力之六月二十二日夜雞鳴喻書此紫陽旨也右二條有長史寫清靈真人說寶神經云云抄此修行事出在第三卷中不復兩載紫微夫人喻書如左云云事亦在第三卷興寧三年歲在乙丑六月二十三日夜喻書此其夕先共道諸人多有耳目不聰明者欲啟乞此法即夜有降者即乃見喻也此楊君自記也長史年出六十耳目欲衰故有諮請楊不欲指斥託云諸人又告云道士有耳重者云云事亦在第三卷右一條清靈真人言真人告云櫛頭理髮欲得過多事亦在第三卷右一條紫微夫人言其夜初降者適入戶未坐自言今夕波聲如雷弟子請問其故答云向見東海中大波耳弟子者楊君自稱也右南嶽夫人言又告云汝憎血否答曰實憎之云血在路上若汝憎之當那得行又答曰當避之耳又云避之佳故不如目不見乃佳右南嶽夫人言自此後諸真共語耳又云寶神經是裴清靈錦囊中書侍者常所帶者也裴昔從紫微, WYG: ''}
