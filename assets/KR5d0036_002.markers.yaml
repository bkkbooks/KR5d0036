  - {type: variant, offset: 228, length: 0, content: '', CK-KZ: 事並是七月五日夜略記後更復委曲重數在後如此則右英夫人始以七月三日四日頻夕降也右二條有楊自記乙丑歲晉興甯三年七月四日夜司命東卿君來降侍從七人入戸其一人執紫旄之節其一人執華旛一名十絕靈幡一人帶綠章囊其三人捧白牙箱箱中似書也其一人握流金鈴侍人並朱衣司命君形甚少於二弟著靑錦繡裙紫毛帔巾芙蓉冠二弟並同來倚立命坐乃坐耳言語良久七月六日夜司命君又降良久喻書曰若必範玄秉象淸淨罕時遂拔羣幽藻戢翼高栖感味上契淵渟岳峙蕭寥玉篇翫寶神生遺放俗戀調彈淸靈澄景虛中五道發明色絕化浪慾與淡并空同冥衢無視無聽爾乃遠齊妙眞重起玄覺明德内圓靈摽外足矣終能策雲軿以赴霄書司命之丹錄耳若精散萬念爲生不固炁隨塵波心不眞合適足勞身神於林殂謂應作岨}
