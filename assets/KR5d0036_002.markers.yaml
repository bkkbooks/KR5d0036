  - {type: variant, offset: 203, length: 4, content: 下青衣顏, WYG: 清之法也眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉妾有磨鏡之石决牖之術即能徹洞萬靈眇察絶響可乎面者神之庭髮者腦之華心悲則面焦腦減則髪素所以精元内喪丹津損竭也妾有童面之經還白之法可乎精者體之神明者身之寳勞多則精散營竟則明消所以老隨氣落耄已及之妾有益精之道延明之經可乎此四道乃上清内書立驗之眞章也方欲獻示以補助君之明照耳授畢取以見與某口答唯唯乞請之也六月二十九日夜桐柏眞人同來降復諭授令某書曰夫八朗四極靈峰遼遐竒言吐頴瓊音餐振晨飛陵清𤣥氣赴霄體邁玉虚心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此人者必能旋騰𤣥漢周灑眞庭矣三元可得而見絳名可得而立耳如其心併愆浪目擊}
