  - {type: variant, offset: 1726, length: 165, content: 一條清靈真人言真人告云櫛頭理髮欲得過多事亦在第三卷右一條紫微夫人言其夜初降者適入戶未坐自言今夕波聲如雷弟子請問其故答云向見東海中大波耳弟子者楊君自稱也右南嶽夫人言又告云汝憎血否答曰實憎之云血在路上若汝憎之當那得行又答曰當避之耳又云避之佳故不如目不見乃佳右南嶽夫人言自此後諸真共語耳又云寶神經是裴清靈錦囊中書侍者常所帶者也裴昔從紫微, CK-KZ: 英王}
