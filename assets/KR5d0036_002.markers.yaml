  - {type: variant, offset: 3613, length: 886, content: 八許整飾非常神女及侍者顏容瑩朗鮮徹如玉五香馥芬如燒香嬰氣者也香嬰者嬰香也出外國初來入戶在紫微夫人後行夫人既入戶之始仍見告曰今日有貴客來相詣論好也於是某即起立夫人曰可不須起但當共坐自相向作禮耳夫人坐南向某其夕先坐承床下西向神女因見就同床坐東向各以左手作禮作禮畢紫微夫人曰此是太虛上真元君金臺李夫人之少女也太虛元君昔遣詣龜山學上清道道成受太上書署為紫清上宮九華真妃者也於是賜姓安名鬱嬪字靈簫紫微夫人又問某世上曾見有此人不某答曰靈尊高秀無以為喻夫人因大笑於爾如何某不復答紫清真妃坐良久都不言妃手中先握三枚棗色如乾棗而形長大內無核亦不作棗味有似於梨味耳妃先以一枚見與次以一枚與紫微夫人自留一枚語令各食之食之畢少久許時真妃問某年幾是何月生某登答言三十六庚寅歲九月生也真妃又曰君師南真夫人司命秉權道高妙備實良德之宗也聞君德音甚久不圖今日得敘因緣歡願於冥運之會依然有松蘿之纏矣某乃稱名答曰沉湎下俗塵染其質高卑雲邈無緣稟敬猥虧靈降欣踊罔極唯蒙啟訓以祛其闇濟某元元宿夜所願也真妃曰君今語不得有謙飾謙飾之辭殊非事宜又良久真妃見告曰欲作一紙文相贈便因君以筆運我鄙意當可爾乎某答奉命即襞紙染筆登口見授作詩如左詩曰雲闕豎空上瓊臺聳鬱羅紫宮乘綠景靈觀藹嵯峨琅軒朱房內上德煥絳霞俯漱雲瓶津仰掇碧柰花濯足玉天池鼓枻牽牛河遂策景雲駕落龍轡玄阿振衣塵滓際褰裳步濁波願為山澤結剛柔順以和相攜雙清內上真道不邪紫微會良謀唱納享福多某書訖取視之乃曰今以相贈以宣丹心勿云云也若意中有不相解者自有微訪耳紫微夫人曰我復因爾作一紙文以相曉者以示善事耳某又襞紙染筆夫人見授詩云二象內外泮玄氣果中分冥會不待駕所期貴得真南嶽鑄明金眇觀傾笈拚良德飛霞照遂感靈霄人乘飆儔衾寢齊牢攜絳雲悟歎天人際數中自有緣上道誠不邪塵滓非所聞同目咸恆象高唱為爾因書訖紫微夫人取視視畢曰以此贈爾今日於我為因緣之主唱意之謀客矣紫微夫人又曰明日南嶽夫人當還我當與妃共迎之於雲陶間明日不還者乃復數日事又良久紫微夫人曰我去矣明日當復與真妃俱來詣爾也覺下床而失所在也真妃少留在後而言曰冥情未攄意氣未忘想君俱詠之耳明日當復來乃取某手而執之而自下床未出戶之間忽然不見六, WYG: ''}
