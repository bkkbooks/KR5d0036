  - {type: variant, offset: 4610, length: 312, content: 可得解者揖敬紫微紫清南真三女真餘人共言平耳云是桐柏山真人王子喬也都不與某語又前後初有真人來見降者時皆自不即與某共語耳各坐良久紫清真妃曰欲復煩明君之手筆書一事以散意忘言可乎某又襞紙待授真妃乃徐徐微言而授曰我是元君之少女太虛李夫人愛子也昔初學真於龜台受玉章於高上荷虎錄於紫皇秉瓊鉞於天帝受書於上真之妃以遊行玉清也常數自手扉九羅足躡玄房霄形靈虛仰歠日根入宴七闕出轡雲輪攝三辰而俱升散景霞以飛軒也非不能採擇上室訪搜紫童求王宮之良儔偶高靈而為雙接玄引奇友於帝郎矣直是我推機任會應度歷數俯景塵沫參龍下邁招冥求之雄追得匹之黨耳自因宿命相與乃有墨會定名素契玉鄉齊理二慶攜鴈而行匏爵分味醮衾結裳顧儔中饋內藏真方也推此而往已定分冥簡青書上元是故, WYG: ''}
