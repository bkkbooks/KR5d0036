  - {type: variant, offset: 5500, length: 2, content: 汝違, CK-KZ: 懈九眞至須幽靜人事雜錯患在未專耳昔人學道尋師索友彌積年嵗經厯山岳無所不至契闊險試備嘗勞苦然後授以要訣穆德薄罪厚端坐愆室橫爲眾眞所見採錄鑒戒繼至啓悟非一古人有言非知之難其行之難夫人垂恩所賜自可徐徐須}
