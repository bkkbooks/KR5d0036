  - {type: variant, offset: 231, length: 0, content: '', CK-KZ: 作祈字眄於籠樊哀樂所以長去夭閼何由而臻者乎禀志各有所宅資性咸有其韻豈可履逐物之邪蹤矯我之正業乎何不肆天摽之極縱適求眞之内娛從幽淨以熙心綏所託以栖意處東山以晦迹握玄筌於妙領保隋珠以含照遣五難於胸次耶此三條亦似}
