  - {type: variant, offset: 232, length: 2, content: 羊權, CK-KZ: 東卿言七月十五日夜紫微王夫人授書曰懃精者味玄之靈摽也凝安者拘眞之寢衾矣子懃澡丹心競赴高嶺可謂務道之柄懃甚至也然道柔眞虛守淡交物安靜任栖神乃啓煥耳要而言之躁疾非盡理矣違之者亦取勞乎與許玉斧七月十五日夜淸靈眞人授詩企望人飛若感若成威不內接驕女遠屏三四縱橫以入帝庭厯紀建號得爲太齡亦必秀映四司元卿翻然縱羽遂登上淸此離合掾大名名翽}
