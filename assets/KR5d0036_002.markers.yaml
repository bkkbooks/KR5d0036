  - {type: variant, offset: 4505, length: 2, content: 眾真, WYG: 紫㣲夫人喻作令與許長史絳闕扉廣霄披丹登景房紫旗振雲霞羽晨撫八風停蓋濯碧谿採秀月支峯咀嚼三靈華吐吸九神芒椿數無絶紀協日積童蒙攜袂明眞館仰期無上皇北鈞唱羽人玉𤣥粲賢衆云何波浪宇得失為我鍾引領囂庭内開心擬穢衝習適榮辱域罕躡希林宫一靜安足苦試去視滄浪右右英夫人所喻右從轡景}
