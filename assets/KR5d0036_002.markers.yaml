  - {type: variant, offset: 4512, length: 1, content: 微, WYG: 庭而步空矣有心洞於飛滯柔翰蔚乎冥契也動合規矩等圓殊方静和眞味吐納興音可謂縱誕德挺良為欽然矣然穢思不豁鄙内固淫念不漸靈池未澄將未得相與論内外之期汎二景之交耳夫失機者貴在能改相釋有情今無妨矣雖蹔弭羣聽故克和也前塗丨謂應作攸字邈此比非一漏緒多端當恒戰密茍情有愆散得隨事失悟言㣲矣將何以遏之將何以遣之右七月二十六日夜雲林右英}
