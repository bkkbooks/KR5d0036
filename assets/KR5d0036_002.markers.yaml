  - {type: variant, offset: 240, length: 0, content: '', CK-KZ: 條是長史自書本也太元眞人以此書見與因授令書如左若夫能眇邈於當世則所重唯身也罕營外難者則無死地矣是以古之學者握玄筌以藏領匿穎鏡於紛務凝神乎山巖之庭頤眞於逸谷之津於是散髮高岫經緯我生暉暉景曜採吸五靈遊躡九道登元濯形投思絕空人事無營閉存三氣研諸妙精故能迴日薄之年反爲童嬰耳苟事累沙會交軒塞路但所守之不能勗也何試校之能停耶物物相要觸類興患天人之眄豈時漏哉所司賞於修業所試在於不日新矣賈生近以此書來託向亹亹可謂有情然無逝我梁有似逆詐耳七}
