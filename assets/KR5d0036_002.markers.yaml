  - {type: variant, offset: 2096, length: 0, content: '', CK-KZ: 七日夕右英王夫人授書令與許長史右一條楊書又有長史寫守眞一篤者一年使頭不白秃髮更生夫内接兒孫以家業自羈外綜王事朋友之交耳目廣用聲氣雜役此亦道不專也行事亦無益矣夫眞才例多隱逸栖身林嶺之中遠人間而抱淡則必孾顏而玄鬢也玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未眞正穢念盈懷恐此物輩不肯來也苟眞誠未一道亦無私也亦不當試問火棗交梨之樹已生君心中也心中猶有荆棘相雜是以}
