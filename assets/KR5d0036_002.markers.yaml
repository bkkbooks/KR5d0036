  - {type: variant, offset: 228, length: 0, content: '', HFL: 事並是七月五日夜略記後更復委曲重數在後如此則右英夫人始以七月三日四日頻夕降也右二條有楊自記乙丑歲𣈆興寧三年七月四日夜司命東卿君來降侍從七人入户其一人執紫旄之節其一人執華旛一名十絶靈幡一人帶緑章囊其三人捧白牙箱箱中似書也其一人握流金鈴侍人並朱衣司命君形甚少於二弟著青錦繡裙紫毛帔巾芙蓉冠二弟並同來倚立命坐乃坐耳言語良久七月六日夜司命君又降良久喻書曰若必範玄秉象清淨罕時遂拔羣幽藻戢翼高栖感味上契淵渟岳峙蕭寥玉篇翫寳神生遺放俗戀調彈清靈澄景虚中五道發明色絶化浪慾與淡并空同冥衢無視無聽爾乃遠齊妙眞重起玄覺眀德内圓靈摽外足矣終能策雲軿以赴霄書司命之丹録耳若精散萬念爲生不固炁隨塵波心不眞合適足勞身神於林謂應作岨字實有誤於來學也其道微而易尋其道艱而難得乎亦令示許長史此二條又有長史寫許長史欲山居宗道者貴無邪栖眞者安恬愉至寂非弘順之主惔然非教授之匠故當因煩以領旡耳意云爾不代謝奚必四時氣如呼吸千齡如寄趙子可憂不信而末疑其心亦已醯矣司命君與南岳夫人言爲道者常淵淡以獨處每栖神以遊閑安飲啄以自足無謂應作祈字眄於籠樊哀樂所以長去夭閼何由而臻者乎禀志各有所宅資性咸有其韻豈可履逐物之邪蹤矯我之正業乎何不肆天摽之極縱適求眞之内娱從幽淨以熙心綏所託以栖意處東山以晦跡握玄筌於妙領保隨珠以含照遣五難於胷次耶此三條亦似是東卿言七月十五日夜紫微王夫人授書曰懃精者味玄之靈摽也凝安者拘眞之寢衾矣子懃澡丹心競赴高嶺可謂務道之柄懃甚至也然道柔眞虚守淡交物安靜任栖神乃啓焕耳要而言之躁疾非盡理矣違之者亦取勞乎與許玉斧七月十五日夜清靈眞人授詩企望人飛若感若成威不内接驕女遠屏三四縱横以入帝庭歷紀建號得爲太齡亦必秀映四司元卿翻然縱羽遂登上清此離合掾大名名翽字也與許玉斧此夕又有中君授書與許卿答欲知洞天中之事今載在第四卷中鳳巢高木素衣衫然此八字是作長史小名穆字也履順思眞凝心虚玄仍取此思字玄}
