  - {type: variant, offset: 203, length: 4, content: 下青衣顏, CK-KZ: 淸之法也眼者身之鏡耳者體之牖視多則鏡昏聽眾則牖閉妾有磨鏡之石決牖之術卽能徹洞萬靈眇察絕響可乎面者神之庭髮者腦之華心悲則面燋腦減則髮素所以精元內喪丹津損竭也妾有童面之經還白之法可乎精者體之神明者身之寶勞多則精散營竟則明消所以老隨氣落耄已及之妾有益精之道延明之經可乎此四道乃上淸内書立驗之眞章也方欲獻示以補助君之明照耳授畢取以見與某口答唯唯乞請之也六月二十九日夜桐柏眞人同來降復諭授令某書曰夫八朗四極靈峰遼遐奇言吐穎瓊音餐振晨飛陵淸玄氣赴霄體邁玉虛心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此人者必能旋騰玄漢周灑眞庭矣三元可得而見絳名可得而立耳如其心併愆浪目擊}
  - {type: page-break, offset: 203, content: '', id: KR5d0036_CK-KZ_02p019b, image: JY237/CK-KZ_JY237_02p019b.png}
