  - {type: variant, offset: 11, length: 2, content: 萼綠, CK-KZ: 術耳非眞人之事也吾數見行此而絕種未見種此而得生矣百萬之中莫不盡被考罰者矣千萬之中誤有一人得之得之遠至於不死耳張陵承此以教世人耳陵之變舉亦不行此矣爾愼言濁生之下道壞眞霄之正氣也思懷淫慾存心色觀而以兼行上道者適足明三官考罰耳所謂抱玉赴火以金棺葬狗也色觀謂之黃赤上道謂之隱書人之難曉乃至於此紫微夫人授書曰夫黃書赤界雖長生之祕要實得生之下術也非上宮天眞流軿晏景之夫所得言也此道在長養分生而已非上道也有懷於淫氣兼以行乎隱書者適足握水官之筆鳴三官之鼓耳玄挺亦不可得恃解謝亦不可得賴也要而言之貞則靈降專則神使矣夫眞人之偶景者所貴存乎匹偶相愛在於二景雖名之爲夫婦不行夫婦之迹也是用虛名以示視聽耳苟有黃赤存於胸中眞人亦不可得見靈人亦不可得接徒劬勞於執事亦有勞於三官矣鷄鳴時南岳夫人授書曰雞旣鳴矣論好之緣篤也紫陽眞人授書曰太虛遠逸高卑同接體賢之義著之於冥運耳愼心係於黃赤之疑也茅中君授者日玄標觸景俯和塵藹玉振愆房淸風逸萬可不勗之也言畢諸眞人去眞妃少留在後曰又煩明君爲一辭也而授書曰忘懷蘭素暉心齊契方當數親虔淸宇德與流景合宜歡會理髮領秀伏度明君高尙靈映縱滯忘鄙耳言畢持手而下牀未至戸之間忽失所在六月二十六日夜降八眞人紫微左夫人一紫淸上宮九}
