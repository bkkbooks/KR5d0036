  - {type: variant, offset: 2115, length: 3, content: 既身降, CK-KZ: 芝信可食使爾無終永噏眞獻金漿不待百丈井八月十六日夕淸靈眞人授右一篇有長史寫虛和可守雄蕭蕭可守雌夫蕭蕭者單景獨往也君絳宮中渠謂應作詎字能仰飛空同上上雲玄之涯不道易聞而患不眞書易得而患不行若專如此大天之中盡眞仙比肩也我亦無咎}
