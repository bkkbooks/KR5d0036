  - {type: punctuation, offset: 618, content: (, id: KR5d0036_tls_005-bkkpn120}
  - {type: variant, offset: 618, length: 1, content: 此, WYG: 三闗事與黄庭同並有説而無法君曰當存五神於體五神者謂兩手兩足頭}
  - {type: variant, offset: 620, length: 2, content: 紫微, WYG: 也頭想恒青兩手恒赤兩足恒白者則去仙近矣昔徐季道學道在鵠鳴山中亦時時出民間忽}
  - {type: variant, offset: 623, length: 5, content: 長史答右英, WYG: 一人着皮袴練褶拄桃枝杖逢季}
  - {type: page-break, offset: 623, content: '', id: KR5d0036_WYG_005-11b, image: WYG1059/WYG1059-0359d.png}
  - {type: variant, offset: 629, length: 2, content: 賢者, WYG: 季道不覺}
  - {type: variant, offset: 632, length: 6, content: 舉事故復酬此, WYG: 數數非一季道乃悟而拜謝之因}
