  - {type: variant, offset: 4547, length: 2, content: 真尸, CK-KZ: 一零子忽發視下見其家父母大小近而不遠乃悲思季主來還乃遣之歸後復取之復使守一銅櫃又使勿發零子復發之如前見其家季主遣之遂不得道此事乃入不可思議之境然每當依此觸類愼之積功滿千雖有過故得仙功滿三百而過不足相補者子仙功滿二百者孫仙子無過又無功德藉先人功德便得仙所謂先人餘慶其無志多過者可得富貴仙不可冀}
