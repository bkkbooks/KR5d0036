  - {type: variant, offset: 13, length: 0, content: '', CK-KZ: 經在世君曰仙道有七變神法七轉之經君曰仙道有大洞眞經三十九篇在世君曰仙道有大丹隱書八禀十訣君曰仙道有天關三圖七星移度君曰仙道有九丹變化胎精中記君曰仙道有九赤班符封山墜海君曰仙道有金液神丹太極隱芝君曰仙道有五行祕符呼魂召魄君曰仙道有曲素決辭以招六天之鬼在世君曰仙道有黃水月華服之化而爲月君曰仙道有徊水玉精服之化而爲日君曰仙道有鐶剛樹子服之化而爲雲君曰仙道有水陽靑映服之化而爲石君曰仙道有赤樹白子服之化而爲玉君曰仙道有絳樹靑實服之化爲黃金君曰仙道有琅玕華丹服之化爲飛龍右此十七條在靈書紫文中並琅玕丹之所變化也君曰仙道有九轉神丹服之化爲白鵠右在茅司命傳中君曰仙道有天皇象符以合元炁}
