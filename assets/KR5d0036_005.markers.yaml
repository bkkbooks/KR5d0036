  - {type: variant, offset: 2615, length: 8, content: 馳啟司命司命即遣, WYG: 九宮之公卿大夫仙官有上下各有次秩仙有左右府而有左右公左右卿左右大夫左右御史也明大洞為仙卿服金丹為大夫服衆芝為御史若得太極𨼆芝服之便為左右仙公及真人矣君曰有尸解乃過者乃有數種並是仙之數也尸觧之仙不得御華葢乗飛龍登太極遊九宫也此謂自然得尸觧為地下主者之𩔖耳非云託化遯變之例也君曰陽丹九轉世人皆有此術不復説之此謂房}
