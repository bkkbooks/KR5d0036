  - {type: variant, offset: 4522, length: 0, content: '', CK-KZ: 有左右公左右卿左右大夫左右御史也明大洞爲仙卿服金丹爲大夫服眾芝爲御史若得太極隱芝服之便爲左右仙公及眞人矣君曰有尸解乃過者乃有數種並是仙之數也尸解之仙不得御華蓋乘飛龍登太極遊九宮也此謂自然得尸解爲地下主者之類耳非云託化遁變之之例也君曰陽丹九轉世人皆有此術不復說之此謂房中之}
  - {type: variant, offset: 4522, length: 0, content: '', CK-KZ-jye: 有左右公左右卿左右大夫左右御史也明大洞爲仙卿服金丹爲大夫服眾芝爲御史若得太極隱芝服之便爲左右仙公及眞人矣君曰有尸解乃過者乃有數種並是仙之數也尸解之仙不得御華蓋乘飛龍登太極遊九宮也此謂自然得尸解爲地下主者之類耳非云託化遁變之之例也君曰陽丹九轉世人皆有此術不復說之此謂房中之}
