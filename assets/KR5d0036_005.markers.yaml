  - {type: 'tls:seg', offset: 7, content: '', id: KR5d0036_tls_005-2a.1}
  - {type: variant, offset: 7, length: 0, content: '', CK-KZ: 方君曰道有除六天之文三天正法在世君曰道有黃氣陽精藏天隱月君曰道有三元布經道眞之圖君曰道有黃素神方四十四訣君曰道有黃書赤界長生之要長史書本杜家剪除此一行君曰道有赤丹金精石景水母君曰道有靑要紫書金根眾文君曰道有玉淸眞訣三九素語君曰道有石精金光藏景錄形在世君曰道有丹景道精隱地八術君曰道有白簡素籙得道之名君曰道有紫度炎光夜照神燭君曰此皆道之經也黃書杜家黵易此字爲經方世多有者然亦是祕道之事矣天師取其名而布其化事旨大略猶同但每增廣其法耳此所云黃書赤界三一經涓子所說黃赤内眞者非今世中天師所演也君曰}
