  - {type: variant, offset: 2435, length: 0, content: '', WYG: 君曰食草木之藥不知房中之法及行炁導引服藥無益也終不得道若至志感靈所存必至者亦不湏草藥之益也若但知行房中導引行炁不知神丹之法亦不得仙也若得金汋神丹不湏其他術也立便仙矣若得大洞真經者復不湏金丹之道也讀之萬過畢便仙也房中之術導引行氣世自有經不復一二説之此謂徒服藥存修而交接之事不絶亦不得長生非言都不為者若都不為止服藥皆能得仙經曰得道者皆𨼆榖蟲之法而見三尸之術夫榖蟲死則三尸枯三尸枯自然落矣殺榖蟲自有别方得者祕之此即蘇傳中初神丸方也其餘雜法皆不及此也君曰人生有骨録必有篤志道使之然若如青光先生谷希子南岳松子長里先生墨羽之徒皆為太極真人所友或為太上天帝所念者興雲駕龍以迎之故不學道而仙自來也過此以下皆湏篤志也案此諸人學道皆有事迹並經辛懃而云不學自得其義未了墨羽應是墨翟亦或是木羽也君曰然則學道者有九患皆人之大病若審患病則仙不逺也患人有志無時有時無友有友無志有志不遇其師遇師不覺覺師不懃懃不守道或志不固固不能乆皆人之九患也人少而好道守固一心水火不能懼其心榮華不能惑其志修真抱素乆則遇師不患無也如此則不湏友而成亦不湏感而動也此學仙之廣要言也汝當思此君曰夫喜怒損志哀慼損性榮華惑徳隂陽竭精皆學道之大忌仙法之所疾也雖還精胎息僅而補之内虗已徹猶非本真莫若知而不為為而不散此仙之要道生之本業也君曰欲得延年當洗面精心日出二丈正面向之口吐死炁鼻噏日精須鼻得便止是為炁通亦以補精復胎長生之方也君曰食慎勿使多多則生病飽慎便卧卧則心蕩心蕩多失性食多生病生病則藥不行欲學道者慎此未服食時也君曰式䂓之法使人目明乆而徹視常以甲子之旬取東流清水合真丹以洗目日向清明平旦二七過常行之佳此事一出二十四神中彼謂之拂童而用庚午日中時也君曰欲為道者目想日月耳響師聲口恒吐死氣取生炁體象五星行恒如跚空心存思長生慎笑節語常思其形要道也君曰七五之法常當存之五者在身七者在經君曰世有下土惡強之鬼多作婦女以惑試人若有此者便炁思天關之中衡輔之星具身神正顔色定志意熟視其規中珠子濁不明者則鬼試也知鬼試則思七星在靣前亦可在頭上以却之若規中方明者仙道人也悟者便拜之不悟為試不過若遇邪而謂真人亦是不過之例也子慎之焉邪正相亂此最試之難者君曰飲食不可卒斷但當漸減之耳十日令減一升則半年便斷矣斷榖自有方世多有者不復重説之世人之食桃檔以補身不知桃皮之勝也桃皮别自有方君曰斷榖入山當煑食白石}
