  - {type: variant, offset: 4297, length: 217, content: 自世事乖玄斯業未就便當蹔履太陰潛生冥鄉外身棄質養胎虛宅陶氣絕龠受精玄漠故改容於三陰之館童顏於九煉之戶然後知神仙為奇死而不亡去來之事理之深也南人告云得道去世或顯或隱託體遺跡道之隱也或有再酣瓊精而叩棺一服刀圭而尸爛鹿皮公吞玉華而流蟲出戶仇季子咽金液而臭聞百里黃帝火九鼎于荊山尚有橋領之墓季主服雲散以潛升猶頭足異處墨秋咽虹丹以投水寧生服石腦而赴火務光剪韮以入清冷之淵柏成納氣而腸胃三腐諸如此比不可勝記微乎得道趣舍之跡無常矣南人即南真人夫也此, CK-KZ: ''}
