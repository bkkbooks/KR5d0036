  front:
  - {type: variant, offset: 0, length: 1, content: 卷, CK-KZ: 甄命授第一道授此有長史掾各寫一本題目如此不知當是道家舊書爲降楊時說其事旨悉與眞經相符疑應是裴君所授所以爾者按說寶神經云道日此後云我之所師南岳赤松子又房中之事惟裴君少時受行耳眞誥中有吾昔常恨此賴解之早耳此語亦似是淸靈言故也君曰道者混然是生元炁元炁成然後有太極太極則天地之父母道之奥也故道有大歸是爲素眞故非道無以成眞非眞無以成道道不成其素安可見乎是以爲大歸也見而謂之妙成而謂之道用而謂之性性與道之體體好至道道使之然也此說人體自然與道炁合所以天命謂性率性謂道修道謂教今以道教使性成眞則同於道矣君曰太上者道之子孫審道之本洞道之根是以爲上淸眞人爲老君之師此卽謂太上高聖玉晨大道君也爲太極左眞人中央黃老君之師君曰老君者太上之弟子也年七歲而知長生之要是以爲太極眞人君曰太極有}
