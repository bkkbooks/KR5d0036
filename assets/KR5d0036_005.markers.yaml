  - {type: variant, offset: 358, length: 622, content: 此月公私艱掇未獲從心命使此本是今字後人改作命使到京往反計日還便沐浴躬詣朝拜不失此月若吉日未過願垂告敕又告賢者之舉復宜詳之昔未受上道之前有欲索側人意有稱說堪陶獎者受隱書之後此計都冥也此下有兩字被枿又齊行剪去後似復更有語此論賢者之舉似仍是前書上紙而復酬十一月二十九日告此告今不存前十一月二十九日告語不同又云正月龜山客來事如此復酬後定錄告亦可是右英書中兼有此語耳記不具存難用顯證右二篇長史自書本令勤者勤其事耽其玄微耳慎者亦觸類而作也學道之難不可書矣有恥鄙之心者於道亦遼乎灌秉然後可貴耳賢者之舉自更始爾今且當內忘右紫微夫人道此言此是紫微見長史答右英道賢者之舉事故復酬此語也長史婦亡後更欲納妾而修七元家事最是所禁故屢有及之手筆何其落落盧醫之喻復有韋弦之功解凍爐門其旨乃佳當實心在此濟矣定錄告此是中君見長史答右英書複賞贊之也心已至也不復須詣山也每空懷以向真單誠以泛道者雖欲不教其可得乎瞻赴山澤乃更餘事耳要都無懷者實使人悒然今可停也十二月一日夜定錄告許侯尋此語復似酬到京不得來事事相關涉不可領正月二十七日將不能暫詣欲營它處耶龜山真人似當其日來未真至齋者自可無仿佛且欲令彼見我乎正月十四日保命告案此告極似前所疑事所以翻覆難解也從此正月起至後並是入丙寅年中事右五條有楊書轡景登霄晨遊宴滄浪宮綵雲繞丹霞靈藹散八空上真吟瓊室高仙歌琳房九鳳唱朱籟虛節錯羽鍾交頸金庭內結我冥中朋俱挹玉醴津倏已嬰童云何當路蹲愆屙隨日崇二月九日夜雲林作晨遊太素宮控軿觀玉河夕宴鬱絕宇朝採圓景, CK-KZ: ''}
