  - {type: variant, offset: 4239, length: 10, content: 津顯默異會藏往滅智與, CK-KZ: 骨錄必有篤志道使之然若如靑光先生谷希子南岳松子長里先生墨羽之徒皆爲太極眞人所友或爲太上天帝所念者興雲駕龍以迎之故不學道而仙自來也過此以下皆須篤志也案此諸人學道皆有事迹並經辛懃而云不學自得其義未了墨羽應是墨翟亦或是木羽也君曰然則學道者有九患皆人之大病若審患病則仙不遠也患人有志無時有時無友有友無志有志不遇其師遇師不覺覺師不懃懃不守道或志不固固不能久皆人之九患也人少而好道守固一心水火不能懼其心榮華不能惑其志修眞抱素久則遇師不患無也如此則不須友而成亦不須感而動也此學仙之廣要言也汝當思此君曰夫喜怒損志哀慼損性榮華惑德陰陽竭精皆學道之大忌仙法之所疾也雖還精胎息僅而補之內虛已徹猶非本眞莫若知而不爲爲而不散此仙之要道生之本業也君曰欲得延年當洗面精心日出二丈正面向之口吐死炁鼻噏日精須鼻得嚏便止是爲炁通亦以補精復胎長生之方也君曰食愼勿使多多則生病飽愼便卧卧則心蕩心蕩多失性食多生病生病則藥不行欲學道者愼此未服食時也君曰式規之法使人目明久而徹視常以甲子之旬取東流淸水合眞丹以洗目日向淸明平旦二七過常行之佳此事一出二十四神中彼謂之拂童而用庚午日中時也君曰欲爲道者目想日月耳響師聲口恒吐死氣取生炁體象五星行恒如跚空心存思長生愼笑節語常思其形要道也君曰七五之法常當存之五者在身七者在經君曰}
