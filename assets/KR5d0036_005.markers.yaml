  - {type: variant, offset: 2735, length: 8, content: 玄心棲邈恭誠高靈, WYG: 之弟子嘗兄弟四人俱行為惡人所擊傷其左臂三弟大怒欲取治之崇子曰無用笑而各去此人後仕宦而崇子譽致之數數非一此人乃往謝之而猶譽不止其人曰我惡人也不可以受君子之施乃自殺後崇子得道太極真人以為有殺人之過不得為真人此葢為善之過尚招其弊況為惡乎今時事亦多有𩔖此}
