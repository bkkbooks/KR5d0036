  body:
  - {type: variant, offset: 1, length: 0, content: '', HFL: 之五安五金闕右卿司命蓬萊都水監梁國師貞白眞人華陽隱居陶弘景造甄命授第一道授此有長史掾各寫一本題目如此不知當是道家舊書爲降楊時說其事㫖悉與眞經相符疑應是裴君所授所以爾者按說寳神經云道日此後云我之所師南岳赤松子又房中之事惟裴君少時受行耳眞誥中有吾昔常恨此賴解之早耳此語亦似是清靈言故也君曰道者混然是生元炁元炁成然後有太極太極則天地之父母道之奥也故道有大歸是爲素眞故非道無以成眞非眞無以成道道不成其素安可見乎是以爲大歸也見而謂之妙成而謂之道用而謂之性性與道之體體好至道道使之然也此說人體自然與道炁合所以天命謂性率性謂道修道謂教今以道教使性成眞則同於道矣君曰太上者道之子孫審道之本洞道之根是以爲上清眞人爲老君之師此即謂太上高聖玉晨大道君也爲太極左眞人中央黄老君之師君曰老君者太上之弟子也年七歲而知長生之要是以爲太極眞人君曰太極有}
  - {type: page-break, offset: 1, content: '', id: KR5d0036_HFL_005-001b, image: hfl/0637/0637-159.png}
  - {type: variant, offset: 1, length: 0, content: '', WYG: 五梁陶𢎞景撰甄命授第一道授此有長史掾各寫一本題目如此不知當是道家舊書為降楊時説其事㫖悉與真經相符疑應是裴君所授所以爾者按説寳神經云道日此後云我之所師南岳赤松子又房中之事惟裴君少時受行耳真誥中有吾昔常恨此頼觧之早耳此語亦似是清靈言故也君曰道者混然是生元炁元炁成然後有太極太極則天地之父母道之奥也故道有大歸是為素真故非道無以成真非真無以成道道不成其素安可見乎是以為大歸也見而謂之妙成而謂之道用而謂之性性與道之體體好至道道使之然也此説人體自然與道炁合所以天命謂性率性謂道修道謂教今以道教使性成真則同於道矣君曰太上者道之子孫審道之本洞道之根是以為上清真人為老君之師此即謂太上髙聖玉晨大道君也為太極左真人中央黄老君之師君曰老君者太上之弟子也年七嵗而知長生之要是以為太極真人君曰太極有}
  - {type: page-break, offset: 1, content: '', id: KR5d0036_WYG_005-1b, image: WYG1059/WYG1059-0354b.png}
  - {type: page-break, offset: 1, content: '', id: KR5d0036_WYG_005-2a, image: WYG1059/WYG1059-0355a.png}
