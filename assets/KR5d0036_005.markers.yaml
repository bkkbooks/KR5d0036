  - {type: variant, offset: 3629, length: 393, content: 當七十二也到亥子年神化變煉子年始餘十年蕭條斧子和心凝靜道氣雖妙乘之亦整澄形丹空擢摽霄領其神以暉其光將穎實侍辰謂應作晨字之高舉谷子之羅糸互此古鼎字可謂秀落眾望縈渟之仙才又當勤進德修業淡然虛眄十二月十七日夜太元真人司命君告玉斧祖司徒府闢掾不赴隱在本縣茅山五年此十六字榮弟後所注其公府闢似妄也淵奇體道解幽達精虛中受物柔德順貞慈寬博採聞道必行逍遙飛步啟誠坦平策龍上造浮煙三清實真仙之領帥友長里之先生必當封牧種邑守伯仙京傅佐上德列書絳名右說道許長史所得限分爾時護軍長史此六字亦榮弟所注瑋灼清暉潛光翳真二景落鋒飛霞流纏於焉玉子採此雙辰遂開上道允得妙門儀璘洞煥玉標玄金登名五宮懸書七元實迭域之併羅為上清之卿君是子內和感虛託真情專之所致亦南人雲軫之必駕三元景輦之攜遊也此云迭域即穀希子也與前司命所答谷子之羅鼎事同右說道許玉斧所得之分此前後二右字下說字出長史書云右清靈真人說云云而楊君書無此四字當是于時楊, CK-KZ: 正西北}
