  - {type: variant, offset: 4214, length: 4, content: 解當用何, CK-KZ: 半時去枕平卧握固放體氣調而微者身神具矣如有不具便速起燒香平坐閉目握固兩膝上心存體神使兩目中有白炁如鷄子大在目前則復故也五日一行之此卽二十四神中事也君曰食草木之藥不知房中之}
