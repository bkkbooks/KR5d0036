  - {type: variant, offset: 2493, length: 3, content: 映矣映, CK-KZ: 常山中積九十七年精思無所不感忽然見老公頭首皓白三人知是大神乃叩頭流血涕淚交連悲喜自搏就之請道公乃出素書七卷以與誦之兄弟三人俱精讀之奄有一白鹿在山邊二弟放書觀之周君讀之不廢二弟還周君多其弟七過其二弟内意或云仙人化作白鹿呼周視之周君不應周君誦之萬過二弟誦得九千七百三十三過周君翻然飛仙二弟取書誦之石室忽有石爆成火燒去書二人}
