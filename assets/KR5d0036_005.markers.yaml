  - {type: variant, offset: 2, length: 4, content: 運題象第, CK-KZ: 眞人老君處其左佩神虎之符帶流金之鈴執紫毛之節巾金精之巾行則扶華晨蓋乘三素之雲此二條事出九眞中經卽是論中央黃老君也黃老爲太虛眞人南岳赤君之師裴旣師赤君所以崇其本始而陳其德位也君曰道有八素眞經太上之隱書也在世君曰道有九眞中經老君之祕言也在世君曰道有太淸上經變化七十}
