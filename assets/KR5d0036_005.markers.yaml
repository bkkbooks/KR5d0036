  - {type: variant, offset: 3195, length: 759, content: 豫乎言畢魴等豁然而笑遵至而去矣此意雖復是世龍之助吾亦壯其辭也於是即得度名東宮當為仙之中者然其身中自宿有陰罪未了處已日就補復解謝太上行當受書署者也蓋爾不復受考於三官已定名於不死之錄矣今已移在竹葉山中或名此山為蓋竹山山之東面兩隴西上其中有石井橋橋之北小道直入其間有六叢杉樹樹之左右三百步有小石深室室前有流泉水映與三人共止其中此辰年當自蹔出還人食詭亦欲蹔還鄉里山之近處令其家兄弟見之者也臨時自當令其弟知之所在乃又寄謝令弟子勤之若欲至竹葉山索映亦即得相見竹葉山東上石橋橋之北小道甚徑易勿從南山上山南道絕險竹葉山中仙人陳仲林許道居尹林子趙叔道此四人並以漢末來入此山叔道已得為下真人仲林大試適過行復去此是竹葉山中舊仙人也其王世龍趙道玄傅太初許映或名遠游適來四年耳右從五月十二日至此並楊書受旨本納納長者蔚蔚內明撥于昔累非復故形變扇澡煉得道之情和挹神心仰秀雲靈傾觀晨景德音蘭馨方及十載季瑋謂應作偉字舉名每事勖焉勿復不精太和二年歲在丁卯十二月十七日夜太元真人司命君告穆到丙子年為十年矣時當七十二也到亥子年神化變煉子年始餘十年蕭條斧子和心凝靜道氣雖妙乘之亦整澄形丹空擢摽霄領其神以暉其光將穎實侍辰謂應作晨字之高舉谷子之羅糸互此古鼎字可謂秀落眾望縈渟之仙才又當勤進德修業淡然虛眄十二月十七日夜太元真人司命君告玉斧祖司徒府闢掾不赴隱在本縣茅山五年此十六字榮弟後所注其公府闢似妄也淵奇體道解幽達精虛中受物柔德順貞慈寬博採聞道必行逍遙飛步啟誠坦平策龍上造浮煙三清實真仙之領帥友長里之先生必當封牧種邑守伯仙京傅佐上德列書絳名右說道許長史所得限分爾時護軍長史此六字亦榮弟所注瑋灼清暉潛光翳真二景落鋒飛霞流纏於焉玉子採此雙辰遂開上道允得妙門儀璘洞煥玉標玄金登名五宮懸書七元實迭域之併羅為上清之卿君是子內和感虛託真情專之所致亦南人雲軫之必駕三元景輦之攜遊, WYG: 冀}
