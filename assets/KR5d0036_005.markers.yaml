  - {type: variant, offset: 4219, length: 5, content: 依如許掾似, CK-KZ: 及行炁導引服藥無益也終不得道若至志感靈所存必至者亦不須草藥之益也若但知行房中導引行炁不知神丹之法亦不得仙也若得金汋神丹不須其他術也立便仙矣若得大洞眞經者復不須金丹之道也讀之萬過畢便仙也房中之術導引行氣世自有經不復一二說之此謂徒服藥存修而交接之事不絕亦不得長生}
