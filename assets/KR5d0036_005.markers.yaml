  - {type: 'tls:seg', offset: 571, content: '', id: KR5d0036_tls_005-8a.4}
  - {type: variant, offset: 573, length: 0, content: '', WYG: 在王屋山中積四十餘年共合神丹毛伯道先服}
  - {type: variant, offset: 574, length: 1, content: 難, WYG: 而死道恭服之又死謝稚堅張兆期見之如此}
  - {type: punctuation, offset: 575, content: ，, id: KR5d0036_tls_005-bkkpn111}
  - {type: 'tls:seg', offset: 575, content: '', id: KR5d0036_tls_005-8a.5}
  - {type: variant, offset: 576, length: 3, content: 可書矣, WYG: 敢服之並捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百嵗今猶在山中遊行五嶽此人知神丹之得道而不悟試在其中故但陸仙耳無復登天冀也謝稚堅}
  - {type: punctuation, offset: 579, content: 。, id: KR5d0036_tls_005-bkkpn112}
  - {type: 'tls:seg', offset: 579, content: '', id: KR5d0036_tls_005-8a.6}
  - {type: variant, offset: 580, length: 2, content: 恥鄙, WYG: 三處出一云與葛𤣥相随一云在鹿迹洞中一即是此未詳為是一人當同姓名耳君曰晉初有真人郭聲子在洛市中作卜師時劉石張臧四姓並欲學道常自歎云不遇明師明師出而已不覺皆為試不過皆無所得也常當慎此有異不覺便為試不過也人有學道}
  - {type: page-break, offset: 580, content: '', id: KR5d0036_WYG_005-9b, image: WYG1059/WYG1059-0358d.png}
  - {type: variant, offset: 584, length: 0, content: '', WYG: 天疎而不失皆並試人汝深思此意慎之也君曰昔閭成子少好長生好學道四十餘年後入荆山中積七十餘嵗為荆山山神所試成子謂是真人拜而求道而為大蛇所噬殆至於死頼悟之速而存太上想七星以却之因而得免後復為邪鬼所惑失其左目遂不得道而絶山中子當慎此之試恒存於師也猶是成子用志不專頗有邪心故也君曰黄子陽}
  - {type: page-break, offset: 584, content: '', id: KR5d0036_WYG_005-10a, image: WYG1059/WYG1059-0359a.png}
  - {type: punctuation, offset: 585, content: ，, id: KR5d0036_tls_005-bkkpn113}
  - {type: 'tls:seg', offset: 585, content: '', id: KR5d0036_tls_005-8a.7}
  - {type: variant, offset: 585, length: 0, content: '', WYG: 魏人也少知長生之妙學道在博落山中九十餘年但食桃皮飲石中黄水後逢司馬季主季主以導仙八方與之遂以度世此六國時魏非漢後魏世也君曰有劉奉林者是周時人學道在嵩髙山積四百年三合神丹為邪物所敗乃行徙入委羽之山能炁三日不息}
  - {type: variant, offset: 586, length: 0, content: '', WYG: 今千餘年矣猶未升仙猶是試多不過}
  - {type: variant, offset: 587, length: 0, content: '', WYG: 數未足故也此人但服黄連以得不死耳不能有所役使也君曰昔髙丘子殷人也}
  - {type: page-break, offset: 587, content: '', id: KR5d0036_WYG_005-10b, image: WYG1059/WYG1059-0359b.png}
  - {type: variant, offset: 588, length: 5, content: 遼乎灌秉然, WYG: 好道入六景山積五百二十餘嵗但讀黄素道經服餌术}
  - {type: punctuation, offset: 590, content: ？, id: KR5d0036_tls_005-bkkpn114}
  - {type: 'tls:seg', offset: 590, content: '', id: KR5d0036_tls_005-8a.8}
  - {type: variant, offset: 594, length: 4, content: 可貴耳賢, WYG: 合鴻丹以得陸仙遊行五嶽二百餘年後得金液以升太清也今為中嶽真人此説與劍經序亦略同君曰為道當令三闗恒調是根精固骨之道也三闗}
  - {type: punctuation, offset: 597, content: 。, id: KR5d0036_tls_005-bkkpn115}
  - {type: 'tls:seg', offset: 597, content: '', id: KR5d0036_tls_005-8a.9}
  - {type: variant, offset: 599, length: 0, content: '', WYG: 口為心闗足為地闗手為人闗謂}
  - {type: variant, offset: 600, length: 0, content: '', WYG: 三闗三闗調則五藏安五藏安則}
  - {type: punctuation, offset: 601, content: ，, id: KR5d0036_tls_005-bkkpn116}
  - {type: 'tls:seg', offset: 601, content: '', id: KR5d0036_tls_005-8a.10}
  - {type: variant, offset: 601, length: 6, content: 自更始爾今且, WYG: 身無病昔趙叔期學道在王屋山中時時出民間聞有能卜者在市閭中叔期往見之因語叔期曰欲入天門調三闗存朱衣正崑崙叔期知是神人因拜叩頭就請要訣因以一卷書與之是胎精中記拜受此書入山誦之後合神丹而升天此皆前事之徴者汝}
  - {type: page-break, offset: 601, content: '', id: KR5d0036_WYG_005-11a, image: WYG1059/WYG1059-0359c.png}
  - {type: punctuation, offset: 605, content: ，, id: KR5d0036_tls_005-bkkpn117}
  - {type: 'tls:seg', offset: 605, content: '', id: KR5d0036_tls_005-8a.11}
  - {type: variant, offset: 608, length: 8, content: 內忘右紫微夫人道, WYG: 識}
  - {type: punctuation, offset: 610, content: 。, id: KR5d0036_tls_005-bkkpn118}
  - {type: xml-element, offset: 610, content: '', id: KR5d0036_tls_005-8a_end}
