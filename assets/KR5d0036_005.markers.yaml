  - {type: variant, offset: 1861, length: 489, content: 爾形氣銷四月二十七日夜南嶽夫人作右十二篇有楊書又雜掾寫清淨願東山蔭景棲靈穴愔愔閑庭虛翳薈青林密圓曜映南軒朱鳳扇幽室拱袂閑房內相期啟妙術寥朗遠想玄蕭條神心逸閏月三日夜右英作示許長史案晉歷丙寅年閏四月也右有楊書又掾寫縱心空同津總轡策朱軿佳人來何遲道德何時成吟此道有心許斧子言當採五芝芝草不必得汝亦不能來汝來當可得芝草與汝食此兩得及來並戲作吳音右英吟此右二篇有楊書八途會無宗乘運觀囂羅化浮塵中際解衿有道家聘煙忽未傾攜真造靈阿虛景盤瓊軒玄鈞作鳳歌適路無軌滯神音舞雲波齊德秀玉京何用世間多授書畢又吟良久而復授令書此詩似不與書上相連也坦夷觀天真去累縱眾情體寂廢機駟崇有則攝生焉得齋物子委運任所經右中候夫人作薄宴塵飆領代謝緣還歸奚識靈劫期顧眄令人悲紫微夫人作右三篇有掾書林振須類感雲蔚待龍吟玄數自相求觸節皆有音飛軿出西華總轡忽來尋八遐非無娛同詠理自欽悼此四羅內百憂常在心俱遊北寒臺神風開爾襟六月二十三日夜南極夫人作登軿發東華扇舞太玄飛轡騰九萬八落亦已均暫眄山水際窈窕靈岳間同風自齊氣道合理亦親龍芝永遐齡內觀攝天真東岑謂應作岑字可長淨何為物所纏六月二十三日夜中候夫人作右二篇有楊書又掾寫五月十二, WYG: 平倚}
