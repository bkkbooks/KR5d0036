  - {type: variant, offset: 981, length: 1496, content: 彈敖北寒臺七靈暉紫霞濟濟高仙舉紛紛塵中羅盤桓囂藹內愆累不當多二月十六日右英作玄清眇眇觀落景出東渟願得絕塵友蕭蕭罕世營吟此再三右三篇有楊書靈人隱玄峰真神韜雲采玄唱非無期妙應自有待豈謂虛空寂至韻故常在攜襟登羽宮同宴廣寒裏借問朋人誰所存唯玉子卓雲虛之駿抗翮于空同之上斯人矣豈不長揖南面永謝千乘乎紫微詩及詠此駕風騁雲軿晨登太渟丘絳津連岑振清波鼓浚流步空觀九緯八剛皆已遊蹔宴三金秀來觀建志儔勤懈不相淹是以積百憂二月三十日夜右英作褰裳濟綠河遂見扶桑公高會太林墟寢宴玄華宮信道苟淳篤何不棲東峰紫微夫人歌此陵波越滄浪忽然造金山四顧終日遊罕我雲中人右英吟此控景始暉津飛飆登上清雲臺鬱峨峨閶闔秀玉城晨風鼓丹霞朱煙灑金庭綠蕊粲玄峰紫華巖下生慶雲纏丹爐練玉飛八瓊晏眄廣寒宮萬椿愈童嬰龍旂啟靈電虎旗征朱兵高真迴九曜洞觀均潛明誰能步幽道尋我無窮齡紫微夫人作紫闕構虛上玄館衝絕飆琳琅敷靈囿華生結瓊瑤騁軿滄浪津八風激雲韶披羽扇北翳握節鳴金簫鳳籟和千鍾西童歌晨朝心豁虛無外神襟何朗寥回舞太空嶺六氣運重幽我途豈能尋使爾不終彫右英夫人作翳藹紫微館鬱臺散景飆鸞唱華蓋間鳳鈞導龍軺八狼攜絳旌素虎吹角簫雲勃寫靈宮來適塵中囂解轡佳人寢同氣自相招尋宗須臾頃萬齡乃一朝椿期會足衰劫往豈足遼真真乃相目莫令心徂疒抄側交反虛刀揮至空鄙滯五神愁右紫微作朝啟東晨暉飛軿越滄淵山波振青涯八風扇玄煙回眄易遷房有懷真感人三金可遊盤東岑宜永甄紛紛當途中孰能步生津飄颻八霞嶺徘徊飛晨蓋紫軿騰太空麗眄九虛外玉簫激景雲靈煙絕幽藹高仙宴太真清唱無涯際去來山岳庭何事有待邁四月十四日紫微夫人作玄波振滄濤洪津鼓萬流駕景眄六虛思與佳人遊妙唱不我對清音與誰投雲中騁瓊輪何為塵中趨右同夕右英夫人吟歌此曲松柏生玄嶺鬱為寒林桀蘩葩盛嚴冰未肯懼白雪亂世幽重岫巡生道常潔飛此逸轡輪投彼遐人轍公侯可去來何為不能絕右右英作神玉曜靈津七元煥神扉靈遷方寸裏一躍登太微妙音乘和唱高會亦有機齊此天人眄協彼晨景飛總轡六合外寧有傾與危四月二十三日夜紫微夫人作玄感妙象外和聲自相招靈雲鬱紫晨蘭風扇綠軺上真宴瓊臺邈為地仙摽所期貴遠邁故能秀穎翹玩彼八素翰道成初不遼人事胡可豫使爾形氣銷四月二十七日夜南嶽夫人作右十二篇有楊書又雜掾寫清淨願東山蔭景棲靈穴愔愔閑庭虛翳薈青林密圓曜映南軒朱鳳扇幽室拱袂閑房內相期啟妙術寥朗遠想玄蕭條神心逸閏月三日夜右英作示許長史案晉歷丙寅年閏四月也右有楊書又掾寫縱心空同津總轡策朱軿佳人來何遲道德何時成吟此道有心許斧子言當採五芝芝草不必得汝亦不能來汝來當可得芝草與汝食此兩得及來並戲作吳音右英吟此右二篇有楊書八途會無宗乘運觀囂羅化浮塵中際解衿有道家聘煙忽未傾攜真造靈阿虛景盤瓊軒玄鈞作鳳歌適路無軌滯神音舞雲波齊德秀玉京何用世間多授書畢又吟良久而復授令書此詩似不與書上相連也坦夷觀天真去累縱眾情體寂廢機駟崇有則攝生焉得齋物子委運任所經右中候夫人作薄宴塵飆領代謝緣還歸奚識靈劫期顧眄令人悲紫微夫人作右三篇有掾書林振須類感雲蔚待龍吟玄數自相求觸節皆有音飛軿出西華總轡忽來尋八遐非無娛同詠理自欽悼此四羅內百憂常在心俱遊北寒臺神風開爾襟六月二十三日夜南極夫人作登軿發東華扇舞太玄飛轡騰九萬八落亦已均暫眄山水際窈窕靈岳間同風自齊氣道合理亦親龍芝永遐齡內觀攝天真東岑謂應作岑字可長淨何為物所纏六月二十三日夜中候夫人作右二篇有楊書又掾寫五月十二日中君喻書此九字題卷外從此後並似是丁卯年中授書此事皆論三許挺分也阿映遂能絕志山林勤心道味淨神注精研澄虛鏡玄渟獨宴孑栖偶真乃翁道遠之疇匹姜伯真之徒也服炁挹液卒獲其益亦至事也昔又入在臨海赤山中赤山一名燒山遇良友王世龍趙道玄傅太初者此數子始以晉建興元年渡江入東, CK-KZ: 陰}
