  - {type: variant, offset: 19, length: 0, content: '', WYG: 今既語子以得道之方又語汝以試觀之法於此試而不過者亦子之愚也夫欲試之人皆意之所不悟情之所不及者而為之子慎之哉君曰仙道十二試皆過而授此經此十二事大試也皆太極真人臨見之可不慎哉君曰昔中山劉偉道學仙在嶓冢山積十二年仙人試之以石重十萬斤一白髪懸之使偉道卧其下偉道顔無變色心安體悦卧在其下積十二年仙人數試之無所不至已皆語之遂賜其神丹而白日昇天此應是漢時人君曰昔青烏公者身受明師之教審仙妙之理至於入華隂山中學道積四百七十一嵗十二試之有三不過後服金汋而升太極太極道君以為試三不過但仙人而已不得為真人}
