  - {type: variant, offset: 2606, length: 891, content: 禁牙謂應作訝字又乃馳啟司命司命即遣中侯李遵握火鈴而來呵攝之於是魴及白虎乃走去耳李遵未來之時映懼怖失膽亦喪氣矣亦賴龔幼節李開林助映為答對亦幾至敗也自無此二人及其師王世龍亦早惡矣魴誥謂應作詰字之亦有實映答對亦可可三官出丹簡罪簿各執一通而問映云夫欲學道慕生上隸真人玄心棲邈恭誠高靈者當得世功相及禍惡不遘陰德流根仁心上逮乃可步真索仙度名青府耳云何父手殺謝弓且亂逆三光又許朝斬李甗之頭以代蔡扶之級又走斬射潘綦等支解鈴下曹表等水沉湯雲之尸火燒徐昂之骸絞殺桓整刳割振噲酷害虐暴刑攬謂應作濫字四十有三張皇訟冤事在天帝禍戾山積善功無一又汝本屬事帛家之道血食生民逋愆宿責列在三官而越幸網脫奉隸真氣父子一家各事師主同生乖戾不共祭酒罪咎之太陰考方加有如此積罪亦無仙者當可得欺太上之曹使汝得名刊不死之紫錄耶汝其無對者有司必執也映自強長嘯振褐撫髮爾乃整氣扉口叱吒而答曰大道不親唯善是與天地無心隨德乃矜是以阪泉流血無違龍髯之舉三苗丹野逐謂應作涿字鹿絳草豈妨大聖靈化高通上達耶吾七世父許子阿者積仁著德陰和鳥獸遇凶荒之年人民飢饉加之疫癘百遺一口阿乃施散家財拯其眾庶親營方藥勤勞外舍臨人之喪如失其親救人之患如己之疾已死之命懸於阿手窮垂之身撫之如子度脫凶年賴阿而全者四百八人仁德不隊謂應作墜字後當鍾我等是以功書上帝德刊靈閣使我祖根流宗澤蔭光後緒故使垂條結華生而好仙應得度世者五人登升者三人錄名太上策簡青宮豈是爾輩所可豫乎言畢魴等豁然而笑遵至而去矣此意雖復是世龍之助吾亦壯其辭也於是即得度名東宮當為仙之中者然其身中自宿有陰罪未了處已日就補復解謝太上行當受書署者也蓋爾不復受考於三官已定名於不死之錄矣今已移在竹葉山中或名此山為蓋竹山山之東面兩隴西上其中有石井橋橋之北小道直入其間有六叢杉樹樹之左右三百步有小石深室室前有流泉水映與三人共止其中此辰年當自蹔出還人食詭亦欲蹔還鄉里山之近處令其家兄弟見之者也臨時自當令其弟知之所在乃又寄謝令弟子勤之若欲至竹葉山索映亦即得相見竹葉山東上石橋橋之北小道甚徑易勿從南山上山南道絕險竹葉山中仙人陳仲林許道居尹林子趙叔道此四人並以漢末來入此山叔道已得為下真人仲林大試適過行復去此是竹葉山中舊仙, CK-KZ: ''}
