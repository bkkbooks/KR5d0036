  - {type: variant, offset: 780, length: 183, content: 語復似酬到京不得來事事相關涉不可領正月二十七日將不能暫詣欲營它處耶龜山真人似當其日來未真至齋者自可無仿佛且欲令彼見我乎正月十四日保命告案此告極似前所疑事所以翻覆難解也從此正月起至後並是入丙寅年中事右五條有楊書轡景登霄晨遊宴滄浪宮綵雲繞丹霞靈藹散八空上真吟瓊室高仙歌琳房九鳳唱朱籟虛節錯羽鍾交頸金庭內結我冥中朋俱挹玉醴津倏已嬰童云何當路蹲愆屙隨日崇二月九日夜雲林作晨遊, WYG: 即}
