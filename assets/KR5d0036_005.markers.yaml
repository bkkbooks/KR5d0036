  - {type: variant, offset: 4160, length: 393, content: 年亡葬鄴東後四十四年至魏甘露四年遇水棺開見尸如生出著床上因舉麈尾覆面大笑吒又亡仍更殯葬其外書事跡略如此未審夜解當用何法依如許掾似非劍杖也右英告曰自古及今死生有津顯默異會藏往滅智與世同之者皆得道之行也若夫瓊丹一御九華三飛雲液晨酣流黃徘徊仰咽金漿咀嚼玉蕤者立便控景登空玄升太微也自世事乖玄斯業未就便當蹔履太陰潛生冥鄉外身棄質養胎虛宅陶氣絕龠受精玄漠故改容於三陰之館童顏於九煉之戶然後知神仙為奇死而不亡去來之事理之深也南人告云得道去世或顯或隱託體遺跡道之隱也或有再酣瓊精而叩棺一服刀圭而尸爛鹿皮公吞玉華而流蟲出戶仇季子咽金液而臭聞百里黃帝火九鼎于荊山尚有橋領之墓季主服雲散以潛升猶頭足異處墨秋咽虹丹以投水寧生服石腦而赴火務光剪韮以入清冷之淵柏成納氣而腸胃三腐諸如此比不可勝記微乎得道趣舍之跡無常矣南人即南真人夫也此諸仙人出諸傳記而事跡有參差不同者保命又云既適潛暢莫覺不真如此之指非真尸也右四條, WYG: 卷}
  - {type: variant, offset: 4161, length: 3, content: 亡葬鄴, CK-KZ: 後服食入中山學道猶存此法當復十許年後閉目乃奄見崑崙存之不止遂見仙人授以金汋之方遂以得道猶是精感道應使之然也非此術之妙也君曰眞人隱其道妙而露其醜形或衣敗身悴狀如癡人人欲學道作此試人卒不可識也不識則爲試不過汝恒當愼此也昔漢初有四五小兒路上畫地戲一兒歌曰著靑裙入天門揖金母拜木公到復是隱言也時人莫知之唯張子房知之乃往拜之此乃}
