  - {type: variant, offset: 4211, length: 0, content: '', CK-KZ: 積四十九年後遂服食入焦山太極眞人百四十事試之皆過遂服金丹而詠大洞眞經今補仙官爲太極左仙卿有至志者也非佛所能致是其中寸定矣此說與傅含眞奉佛事亦同君曰昔毛伯道劉道恭謝稚堅張兆期皆後漢時人也學道在王屋山中積四十餘年共合神丹毛伯道先服之而死道恭服之又死謝稚堅張兆期見之如此不敢服之並捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百歲今猶在山中遊行五嶽此人知神丹之得道而不悟試在其中故但陸仙耳無復登天冀也謝稚堅三處出一云葛玄相隨一云在鹿迹洞中一卽是此}
