  - {type: variant, offset: 965, length: 556, content: 宮控軿觀玉河夕宴鬱絕宇朝採圓景華彈敖北寒臺七靈暉紫霞濟濟高仙舉紛紛塵中羅盤桓囂藹內愆累不當多二月十六日右英作玄清眇眇觀落景出東渟願得絕塵友蕭蕭罕世營吟此再三右三篇有楊書靈人隱玄峰真神韜雲采玄唱非無期妙應自有待豈謂虛空寂至韻故常在攜襟登羽宮同宴廣寒裏借問朋人誰所存唯玉子卓雲虛之駿抗翮于空同之上斯人矣豈不長揖南面永謝千乘乎紫微詩及詠此駕風騁雲軿晨登太渟丘絳津連岑振清波鼓浚流步空觀九緯八剛皆已遊蹔宴三金秀來觀建志儔勤懈不相淹是以積百憂二月三十日夜右英作褰裳濟綠河遂見扶桑公高會太林墟寢宴玄華宮信道苟淳篤何不棲東峰紫微夫人歌此陵波越滄浪忽然造金山四顧終日遊罕我雲中人右英吟此控景始暉津飛飆登上清雲臺鬱峨峨閶闔秀玉城晨風鼓丹霞朱煙灑金庭綠蕊粲玄峰紫華巖下生慶雲纏丹爐練玉飛八瓊晏眄廣寒宮萬椿愈童嬰龍旂啟靈電虎旗征朱兵高真迴九曜洞觀均潛明誰能步幽道尋我無窮齡紫微夫人作紫闕構虛上玄館衝絕飆琳琅敷靈囿華生結瓊瑤騁軿滄浪津八風激雲韶披羽扇北翳握節鳴金簫鳳籟和千鍾西童歌晨朝心豁虛無外神襟何朗寥回舞太空嶺六氣運重幽我途豈能尋使爾不終彫右英夫人作翳藹紫微館鬱臺散景飆鸞唱華蓋間鳳鈞導龍軺八狼攜絳旌素虎吹角簫雲勃寫靈宮來適塵中囂解轡佳人寢同氣自相招尋宗須臾頃萬齡乃一朝椿期會足衰劫往豈足遼真真乃相目莫令心徂疒抄側交反虛刀揮至空鄙滯, WYG: ''}
