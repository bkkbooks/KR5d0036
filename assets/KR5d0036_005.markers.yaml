  - {type: variant, offset: 4165, length: 1, content: 後, CK-KZ: 王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖王母君曰昔有傅先生者其少好道入焦山石室中積七年而太極老君詣之與之木鑽使穿一石盤厚五尺許云穿此盤便當得道其人乃晝夜穿之積}
