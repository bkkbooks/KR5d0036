  - {type: variant, offset: 1637, length: 223, content: 作玄波振滄濤洪津鼓萬流駕景眄六虛思與佳人遊妙唱不我對清音與誰投雲中騁瓊輪何為塵中趨右同夕右英夫人吟歌此曲松柏生玄嶺鬱為寒林桀蘩葩盛嚴冰未肯懼白雪亂世幽重岫巡生道常潔飛此逸轡輪投彼遐人轍公侯可去來何為不能絕右右英作神玉曜靈津七元煥神扉靈遷方寸裏一躍登太微妙音乘和唱高會亦有機齊此天人眄協彼晨景飛總轡六合外寧有傾與危四月二十三日夜紫微夫人作玄感妙象外和聲自相招靈雲鬱紫晨蘭風扇綠軺上真宴瓊臺邈為地仙摽所期貴遠邁故能秀穎翹玩彼八素翰道成初不遼人事胡可豫, WYG: ''}
