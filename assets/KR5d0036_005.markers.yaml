  - {type: variant, offset: 2436, length: 0, content: '', WYG: 白石子者以石為糧故世號曰白石生此至人也今為東府左仙卿煑白石自有方也白石之方白石生所造也}
  - {type: variant, offset: 2437, length: 0, content: '', WYG: 善太素傳所謂白石有精是為白石生也此方在世君曰太素傳者道書也學此應奉太上老君上清皇人此皓然虗映景中之道非仙之道也老子所謂谷神是也君曰王屋山仙之别天所謂陽臺是也諸始得道者皆詣陽臺陽臺是清虚之宫也欲}
