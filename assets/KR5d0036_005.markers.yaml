  - {type: variant, offset: 4252, length: 0, content: '', CK-KZ: 鬼多作婦女以惑試人若有此者便閇炁思天關之中衡輔之星具身神正顏色定志意熟視其規中珠子濁不明者則鬼試也知鬼試則思七星在面前亦可在頭上以卻之若規中方明者仙道人也悟者便拜之不悟爲試不過若遇邪而謂眞人亦是不過之例也子愼之焉邪正相亂此最試之難者君曰飲食不可卒斷但當漸減之耳十日令減一升則半年便斷矣斷穀自有方世多有者不復重說之世人之食桃檔以補身不知桃皮之勝也桃皮別自有方君曰斷穀入山當煮食白石昔白石子者以石爲糧故世號曰白石生此至人也今爲東府左仙卿煮白石自有方也白石之方白石生所造也又善太素傳所謂白石有精是爲白石生也此方在世君曰太素傳者道書也學此應奉太上老君上淸皇人此皓然虛映景中之道非仙之尊也老子所謂谷神是也君曰王屋山仙之别天所謂陽臺是也諸始得道}
