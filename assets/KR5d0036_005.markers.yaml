  - {type: variant, offset: 2478, length: 0, content: '', WYG: 難尚也下生鮑濟之水水}
  - {type: variant, offset: 2479, length: 1, content: 學, WYG: 有石精得而服之可長生此山在河内泌水縣即濟水所出之源也君曰大洞者神州是也神州别有三山三山有七宫七宫有七變朝化為金日中化為銀暮化為銅夜化為光或化為山或化為水或化為石謂之七變七變有七經七經有二十一玉童随此書故曰大洞真經讀之萬過便仙此仙}
