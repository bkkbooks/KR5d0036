  - {type: variant, offset: 4212, length: 1, content: 審, YP-C: 詳爲是一人當同姓名耳君曰晉初有眞人郭聲子在洛市中作卜師時劉石張臧四姓並欲學道常自歎云不遇明師明師出而已不覺皆爲試不過皆無所得也常當愼此有異不覺便爲試不過也人有學道之心天網疎而不失皆並試人汝深思此意愼之也君曰昔閭成子少好長生好學道四十餘年後入荆山中積七十餘歲爲荆山山神所試成子謂是眞人拜而求道而爲大蛇所噬殆至於死賴悟之速而存太上想七星以卻之因而得免後復爲邪鬼所惑失其左目遂不得道而絕山中子當愼此之試恒存於師也猶是成子用志不專頗有邪心故也君曰黃子陽者魏人也少知長生之妙學道在博落山中九十餘年但食桃皮飲石中黃水後逢司馬季主季主以導仙八方與之遂以度世此六國時魏非漢後魏世也君曰有劉奉林者是周時人學道在嵩高山積四百年三合神丹爲邪物所敗乃行徙入委羽之山能閇炁三日不息於今千餘年矣猶未升仙猶是試多不過道數未足故也此人但服黃蓮以得不死耳不能有所役使也君曰昔高邱子殷人也亦好道入六景山積五百二十餘歲但讀黃素道經服餌术後合鴻丹以得陸仙遊行五嶽二百餘年後得金液以升太清也今爲中嶽眞人此說與劍經序亦略同君曰爲道當令三關恒調是根精固骨之道也三關者口爲心關足爲地關手爲人關謂之三關三關調則五藏安五藏安則舉身無病昔趙叔期學道在王屋山中時時出民間聞有能卜者在市閭中叔期往見之因語叔期欲入天門調三關存朱衣正崑崙叔期知是神人因拜叩頭就請要訣因以一卷書與之是胎精中記拜受此書入山誦之後合神丹而升天此皆前事之徵者汝當識此言三關事與黃庭同並有說而無法君曰當存五神於體五神者謂兩手兩足頭是也頭想恒青兩手恒赤兩足恒白者則去仙近矣昔徐季道學道在鵠鳴山中亦時時出民間忽見一人着皮袴練褶拄桃枝杖逢季道季道不覺之數數非一季道乃悟而拜謝之因語季道曰欲學道者當巾天青咏大曆𨀅雙白徊二赤此五神之事也其語隱也大厯三皇文是也此卽太素五神事也别有經法君曰欲使心正常以日出三丈錯手着兩肩上以日當心心中間暖則心正矣常能行之佳昔有姜伯眞者學在猛山中行道採藥奄值仙人仙人使平倚日中其影偏仙人曰子知仙道之貴而篤志學之而不知心不正之爲失因教之如此後遂得道定錄目許先生云姜伯眞之徒不知卽此姜不君曰常以}
