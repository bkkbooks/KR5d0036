  - {type: variant, offset: 375, length: 0, content: '', CK-KZ-jye: 蕩斯念宜愼之耳右三條有楊書六月二十四日夜南嶽夫人見授令書此先是二十二日夕有在別室共論講道紫微南嶽二夫人聲氣語音殊下不解其趣今故授書此以答所共講者之疑心也初來見授時色氣猶不平授畢可爾弟子唯覺色有不平都無他可道此一條亦是楊君自記論南嶽夫人其夕語弟子言我明日當詣王屋山淸虛宮令汝知之所至也其夕又言海東桐柏山西頭適崩二百許丈紫微王夫人云世人之思慮何得事事眞審耶可不事有答其心也南嶽夫人言戲之耳欲建竪之也瑩實之也興甯三年歲在乙丑六月二十五日夜此是安妃降事之端記錄别爲一卷故更起年歲號首也紫微王夫人見降又與一神女俱來神女着雲錦䙱上丹下靑文彩光鮮腰中有綠繡帶帶係十餘小鈴鈴靑色黃色更相參差左帶玉佩佩亦如世間佩但幾小耳衣服儵儵有光照朗室內如日中映視雲母形也雲髮鬃此應是鬒字鬒黑髮貌也鬢整頓絕倫作髻乃在頂中又垂餘髮至腰許指着金環白珠約臂視之年可十三四許左右又有兩侍女其一侍女着朱衣帶靑章囊手中又持一錦囊囊長尺一二寸許以盛書書當有十許卷也以白玉檢檢囊口見刻檢上字云玉淸神虎內眞紫元丹章其一侍女着靑衣捧白箱以絳帶束絡之白箱似象牙箱形也二侍女年可堪十七八許整飾非常神女及侍者顏容瑩朗鮮徹如玉五香馥芬如燒香嬰氣者也香嬰者嬰香也出外國初來入戸在紫微夫人後行夫人旣入戸之始仍見告曰今日有貴客來相議論好也於是某卽起立夫人曰可不須起但當共坐自相向作禮耳夫人坐南向某其夕先坐承床下西向神女因見就同床坐東向各以左手作禮作禮畢紫微夫人曰此是太虛上眞元君金臺李夫人之少女也太虛元君昔遣詣龜山學上淸道道成受太上書署爲紫淸上宮九華眞妃者也於是賜姓安名鬱嬪字靈簫紫微夫人又問某世上曾見有此人不某答曰靈尊高秀無以爲喻夫人因}
