  - {type: variant, offset: 377, length: 0, content: '', HFL: 人自留一枚語令各食之食之畢少久許時眞妃問某年幾是何月生某登答言三十六庚寅歲九月生也眞妃又曰君師南眞夫人司命秉權道高妙備實良德之宗也聞君德音甚久不圖今日得叙因縁歡願於㝠運之會依然有松蘿之纏矣某乃稱名答曰沈湎下俗塵染其質高卑雲邈無縁禀敬猥虧靈降欣踴罔極唯蒙啓訓以袪其闇濟某元元宿夜所願也眞妃曰君今語不得有謙飾謙飾之辭殊非事宜又良久眞妃見告曰欲作一紙文相贈便因君以筆運我鄙意當可爾乎某答奉命即襞紙染筆登口見授作詩如左詩曰雲闕堅空上瓊臺聳鬱羅紫宫乘緑景靈觀藹嵳峩琅軒朱房内上德焕絳霞俯漱雲瓶津仰掇碧柰花濯足玉天池鼓枻牽牛河遂策景雲駕落龍轡玄阿振衣塵滓際褰裳步濁波願爲山澤結剛柔順以和相携雙清内上眞道不邪紫微會良謀唱納享福多某書訖取視之乃曰今以相贈以宣丹心勿云云也若意中有不相解者自有微訪耳紫微夫人曰我復因爾作一紙文以相曉者以示善事耳某又襞紙染筆夫人見授詩云二象内外泮玄氣果中分㝠會不待駕所其貴得眞南嶽鑄明金眇觀傾笈𢁥良德飛霞照遂感靈霄人乘飈儔衾寢齊牢携絳雲悟歎天人際數中自有縁上道誠不邪塵泮非所聞同目咸恒象高唱爲爾因書訖紫微夫人取視視畢曰以此贈爾今曰於我爲因縁之主唱意之謀客矣紫微夫人又曰明日南岳夫人當還我當與妃共迎之於雲陶間明日不還者乃復數日事又良久紫微夫人曰我去矣明日當復與眞妃俱來詣爾也覺下牀而失所在也眞妃少留在後而言曰㝠情未攄意氣未忘想君俱咏之耳明目當復來乃取某手而執之而自下牀未出户之間忽然不見六月二十六日夕衆眞來䟽如左紫微王夫人紫清上宫九華眞妃上眞司命南嶽夫人某師凡此前後云某者皆楊君自隱名也紫陽眞人茅中君清靈眞人茅小君又有一人年甚少整頓非常建芙蓉冠著朱衣以白珠綴衣縫帶劒都未曾見此人來多論金庭山中事與衆眞共言又有不可得解者揖敬紫微紫清南眞三女眞餘人共言平耳云是桐柏山眞人王子喬也都不與某語又前後初有眞人來見降者時皆自不即與某共語耳各坐良久紫清眞妃曰欲復煩明君之手筆書一事以散意忘言可乎某又襞紙待授眞妃乃徐徐微言而授曰我是元君之少女太虚李夫人愛子也昔初學眞於龜臺受玉章於高上荷虎録於紫皇秉瓊鉞於天帝受書於上眞之妃以遊}
