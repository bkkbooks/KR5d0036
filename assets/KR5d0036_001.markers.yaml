  - {type: variant, offset: 370, length: 1, content: 冬, WYG: 十日夜降厶厶翦缺此兩字即應是羊權字自此往來一月之中輒六過來耳云本姓厶又翦除此一字應是楊字贈此此一字本是權字後人黵作此字詩一篇并致火澣布手巾一枚金玉條脫各一枚條脫乃太而異精好神女語見此本是草作權字後人黵作見字而乙上之君慎勿泄我泄我則彼此獲罪訪問此人云是九嶷山中得道女羅郁也宿命時曾為師母毒殺乳婦𤣥州以先罪未滅故今謫降於濁以償其過與權此權亦草作故似前體而不黵耳尸解藥今在湘東山本懸此中一寸此女已九百歲矣尋此應是降羊權權字道輿忱之少子後為晉簡文黄門郎即羊欣祖故欣亦修道服食也此乃為楊君所書者當以其同姓亦可楊權相問因答其事而疏説之耳按升平三年是己未歲在乙丑前六年衆真並未降事右三條楊君草書於紙上南嶽夫人與弟子言書識如左弟子即楊君自稱也此衆眞似是集洞宫時所以司命最在端當為主人故也夫人向楊説次第位號如此非降楊時也東嶽上眞卿司命君東宫九㣲眞人金闕上相青童大君蓬萊右仙公賈寳安鄭人自此後皆是稱諸眞人之字非其人名也氏族亦見世道書傳中也清虚小有天王王子登按青童高尊乃可不敢稱諱字此清虚是南嶽之師尚稱字獨不顯茅司命字亦為難詳也桐柏眞人右弼王領五嶽司侍帝晨王子喬青蓋眞人侍帝晨郭世幹衛人戎山眞人太極右仙公范伯華幽人少室眞人北臺郎劉千夀沛人嶓冡眞人左禁郎王道寧常山人大梁眞人魏顯仁長樂人岷山眞人陰友宗陸渾眞人太極監西郭幼度九嶷山侯張上貴楚人岱宗神侯領羅酆右禁司鮑元節東海人華山仙伯秦叔隱馮翊人葛衍眞人周季通陽洛眞人領西歸傳淳于太𤣥西域人潛山眞伯趙祖陽涿郡人勾曲眞人定録右禁郎茅季偉鬱絶眞人裴𤣥人白水仙都朱交甫三官保命司茅思和太和眞人山世逺右二十三眞人坐西起南向東行此於禮乃是南向以西方為上而後女眞東向則應起南今反北者當是以側近高眞故也太和靈嬪上眞左夫人北海六㣲𤣥清夫人北漢七靈右夫人太極中華右夫人紫微左宫王夫人滄浪雲林右英夫人按右英是紫㣲姊今反在後當位業有升降耳上眞司命南嶽夫人此即魏夫人也自説故不稱姓八靈道母西嶽蔣夫人按有數號者並以多為高西王母稱九靈則八靈宜在七靈前而今反在後者亦所未詳又受讀黃庭事云北嶽蔣夫人與今不同上眞東宫衛夫人方丈臺昭靈李夫人紫清上宫九華安妃朱陵北絶臺上嬪管妃北嶽上眞山夫人西漢夫人長陵杜夫人右十五女眞東向坐北起南行説此事時雖不記月日不知在何年既是衆眞名位故出以居前按衆眞位號前云以為高者猶今世之徽號也六月二十一日夜定録問云許長史欲云何尋道登答懃修眞誠之意定録又言昔有趙叔臺王世卿亦言篤學而竟不如人意遂為北明公府所引此是乙丑年六月也自此前唯有六月十五日定録授是答長史書論茅山中事此前又已有一授不記何月日並在第四卷中自餘無有先此者北明公府酆都宫中官屬也昔扉廓天津採華赤丘是時聲穎靈袂蒙塵華喬此即應是説初降華僑事字少倚人發煥秀山高説延霄自謂𤣥響所振無往不豁既濯以靈波實望與物榮菴既未能暢業駢羅遊岫逐逸然後知悟言之際應𤣥}
