  - {type: variant, offset: 377, length: 0, content: '', CK-KZ: 人自留一枚語令各食之食之畢少久許時眞妃問某年幾是何月生某登答言三十六庚寅歲九月生也眞妃又曰君師南眞夫人司命秉權道高妙備實良德之宗也聞君德音甚久不圖今日得敘因緣歡願於冥運之會依然有松蘿之纏矣某乃稱名答曰沈湎下俗塵染其質高卑雲邈無緣禀敬猥虧靈降欣踊罔極唯蒙啓訓以祛其闇濟某元元宿夜所願也眞妃曰君今語不得有謙飾謙飾之辭殊非事宜又良久眞妃見告曰欲作一紙文相贈便因君以筆運我鄙意當可爾乎某答奉命卽襞紙染筆登口見授作詩如左詩曰雲闕竪空上瓊臺聳鬱羅紫宮乘綠景靈觀藹嵳峩琅軒朱房内上德煥絳霞俯漱雲瓶津仰掇碧柰花濯足玉天池鼓枻牽牛河遂策景雲駕落龍轡玄阿振衣塵滓際褰裳步濁波願爲山澤結剛柔順以和相携雙淸内上眞道不邪紫微會良謀唱納享福多某書訖取視之乃曰今以相贈以宣丹心勿云云也若意中有不相解者自有微訪耳紫微夫人曰我復因爾作一紙文以相曉者以示善事耳某又襞紙染筆夫人見授詩云二象内外泮玄氣果中分冥會不待駕所其貴得眞南嶽鑄明金眇觀傾笈𢁥良德飛霞照遂感靈霄人乘飈儔衾寢齊牢携絳雲悟歎天人際數中自有緣上道誠不邪塵滓非所聞同目咸恒象高唱爲爾因書訖紫微夫人取視視畢曰以此贈爾今日於我爲因緣之主唱意之謀客矣紫微夫人又曰明日南岳夫人當還我當與妃共迎之於雲陶間明日不還者乃復數日事又良久紫微夫人曰我去矣明日當復與眞妃俱來詣爾也覺下牀而失所在也眞妃少留在後而言曰冥情未攄意氣未忘想君俱咏之耳明日當復來乃取某手而執之而自下牀未出戸之間忽然不見六月二十六日夕眾眞來疏如左紫微王夫人紫淸上宮九華眞妃上眞司命南嶽夫人某師凡此前後云某者皆楊君自隱名也紫陽眞人茅中君淸靈眞人茅小君又有一人年甚少整頓非常建芙蓉冠著朱衣以白珠綴衣縫帶劍都未曾見此人來多論金庭山中事與眾眞共言又有不可得解者揖敬紫微紫淸南眞三女眞餘人共言平耳云是桐柏山眞人王子喬也都不與某語又前後初有眞人來見降者時皆自不卽與某共語耳各坐良久紫淸眞妃曰欲復煩明君之手筆書一事以散意忘言可乎某又襞紙待授眞妃乃徐徐微言而授曰我是元君之少女太虛李夫人愛子也昔初學眞於龜臺受玉章於高上荷虎錄於紫皇秉瓊鉞於天帝受書於上眞之妃以遊}
