  - {type: variant, offset: 380, length: 1, content: 郎, CK-KZ: 上元是故善鄙之心亦已齊矣對景之好亦已域矣得願而遊歡兼昔旨豈不冥乎自然此復是二象大宗内外之配職耳實非所以變無反淡凝情虛刃靈刀七累遺任太素保眞啓玉單景八空之謂也秀寂}
