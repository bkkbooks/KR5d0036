  - {type: variant, offset: 382, length: 3, content: 似孫敘, CK-KZ: 淸鬱輿流霄使鳳歌雲路龍吟虎嘷天皇雙景遠升辰樓飛星擲光日月映軀口吐冥煙眼激電光上寢瓊房流行玉淸手掣景雲足陟金庭若自此之時在得道之頃爲當固盡內外理同金石情纏雙好齊心幃幙耳爲必抱衾均牢有輕中之接塵穢七神悲魂任魄乎蓋是妾求氏族於明君耳非有邪也今可謂得志懷眞情已如一方當相與結駟玉虛偶行此玄同掇絳實於玉圃併採丹華於閬園分飲於紫川之水齊濯於碧河之濱紫華毛帔日冕蓉冠逍遥上淸俱朝三元八景出落鳳扉雲關仰漱金髓咏歌玉玄浮空寢晏高會太晨四鈞朗唱香母奏煙齊首偶觀携帶交裙不亦樂乎不亦得志乎明君其順運隨會妾必無辭且亦自不得背實反冥苟任胷懷矣授畢復自取視而言曰今以此書相詣庶豁其滯疑耳言畢乃笑良久紫微夫人曰眞妃之辭盡矣論好之緣著矣爾亦不得復有所容也玄運冥分使之然耳南岳夫人見授書曰冥期數感玄運相適應分來聘新搆因緣此携眞之善事也蓋示有偶對之名定內外之職而已不必苟循世中之弊穢而行淫濁之下迹矣偶靈妃以接景聘貴眞之少女於爾親交亦大有進業之益得而無傷絕之慮耳千神於是可使試觀不得復陳矣眞旌必可尅往雲軒必可俱駕也吾往曾因紫微夫人爲汝構及此意今遂如願益使我欣欣愼復疑矧於心胷矣我昨見金臺李夫人於淸虛中言爾尙有疑正之心色氣小有眼眼謂應作悢悢字汝違此舉誤人不小眞妃有神虎內眞丹靑玉文非爾所有者輩良才求寫故當不爲隱耳今日相攜何但文章而已將必乘景王霄乎若有未悟者宜微訪可否眞妃見夫人書言乃笑而言攜手雙臺娛歎良會景軿同機於此齊乎}
