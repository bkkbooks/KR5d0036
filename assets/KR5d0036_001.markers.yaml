  - {type: variant, offset: 373, length: 0, content: '', CK-KZ-jye: 也若五情愆波三魂越𠫤於是三眞舞劍黃闕捷關耳可不力之可不力之六月二十二日夜鷄鳴喻書此紫陽旨也右二條有長史寫淸靈眞人說寶神經云云鈔此修行事出在第三卷中不復兩載紫微夫人喻書如左云云事亦在第三卷興甯三年歲在乙丑六月二十三日夜喻書此其夕先共道諸人多有耳目不聰明者欲啓乞此法卽夜有降者卽乃見喻也此楊君自記也長史年出六十耳目欲衰故有咨請楊不欲指斥託云諸人又告云道士有耳重者云云事亦在第三卷右一條淸靈眞人言眞人告云櫛頭理髮欲得過多事亦在第三卷右一條紫微夫人言其夜初降者適入戸未坐自言今夕波聲如雷弟子請問其故答云向見東海中大波耳弟子者楊君自稱也右南嶽夫人言又告云汝憎血否答曰實憎之云血在路上若汝憎之當𨚗得行又答曰當避之耳又云避之佳故不如目不見乃佳右南嶽夫人言自此後諸眞共語耳又云寶神經是裴淸靈錦囊中書侍者常所帶者也裴昔從紫微夫人授此書也吾亦有俱如此寫西宮中定本問西宮所在答云是玄圃北壇西瑶之上臺也天眞珍文盡藏於此中右南嶽夫人言裴眞人又言此書與隱書同輩事要而卽可得用也一名七玄隱書右二十三日授訖此南嶽夫人見告云紫微左夫人王諱淸娥字愈意阿母第二十女也鎭羽野玄壟山主教當得成眞人者右一條先此一夕所授此一條卽是二十二日夜與紫陽所喻同夕當復大應有事後云聲氣下亦是此夕楊後又追憶此一事更疏在二十二日例中故云先此一夕也右從淸靈來凡十二條有長史寫六月二十四日夜紫微王夫人來降因下地請問眞靈旣身降於塵濁之人而手足猶未嘗自有所書故當是卑高迹邈未可見乎敢諮於此願誨蒙昧夫人因令復坐卽見授令書此以答曰此楊君自述事也例多如此夫沈景虛玄無塗可尋言發空中無物可縱流浪乘忽化遁不滯者也此二行皆浮沈冥淪儵遷灼寂是故放蕩無津遂任鼓風柂存乎虛舟而行耳故實中之空空中之有有中之無象矣至於書迹之示則揮形紙札文理昺注麤好外著玄翰挺煥而範質用顯默藻斯坦形傳塵濁苟騫露有骸之物而得與世進退上玷逸眞之詠下虧有隔之禁亦我等所不行靈法所不許也今請陳爲書之本始也造文之旣肇矣乃是五色初萌文章畫定之時秀人民之交別陰陽之分則有三元八會羣方飛天之書又有八龍雲篆明光之章也其後逮二皇之世演八會之文爲龍鳳之章拘省雲篆之迹以爲順形梵書分破二道壤眞從易配別本支乃爲六十四種之書也遂播之于三十六天十方上下也各各取其篇類異而用之音典雖均蔚跡隔異矣校而論之八會之書是書之至眞建文章之祖也雲篆明光是其根宗所起有書而始也今三元八會之書皇上太極高眞淸仙之所用也雲篆明光之章今所見神靈符書之字是也爾乃見華季之世生造亂眞共作巧末趣徑下書皆流尸濁文淫僻之字舍本效假是囂穢死迹耳夫眞仙之人曷爲棄本領之文迹手畫淫亂之下字耶夫得爲眞人者事事皆盡得眞也奚獨於凡末之麤術淫浮之弊作而當守之而不改玩之而不遷乎夫人在世先有能書善爲事者得眞仙之日外書之變亦忽然隨身而自反矣眞事皆邇者不復廢今已得之濁書方又受學於上文而後重知眞書者也鬼道亦然但書字有小乖違耳且以靈筆眞手初不敢下交於肉人雖時當有得道之人而身未超世者亦故不敢下手陳書墨以顯示於字迹也至乃符文神藻所求所佩者自復始來而作耳所以爾者世人固不能了其端緒又使吾等不有隱諱耳冥中自相參解矣內外自相關矣又四極明科高上禁重亦自不聽我等復爲世間常書也我旣下手子固不解亦將何趣兩爲煩濫耶此亦當闇其可否殆不足嫌想少暢豁於胸懷盡不自書之流分矣上眞司命南嶽夫人授令書如左若夫仰擲雲輪總轡太空手維霄綱足陟玉庭身升帝闕披寶歙靑上論九玄之逸度下紀萬椿之大生遂竦景電肅千霞煥明眞言玄浪高談玉淸激朱脣之流徽運日氣之零零爰乃吐烽卻煙彈金奏瓊鸞音蒨粲鳳唱嘉聲耳若但應景下旋迴靈塵埃參輦弊宇敖彿}
