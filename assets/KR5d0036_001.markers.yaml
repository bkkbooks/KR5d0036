  - {type: variant, offset: 378, length: 1, content: 秘, CK-KZ: 玉淸也常數自手扉九羅足躡玄房霄形靈虛仰歠日根入宴七闕出轡雲輪攝三辰而俱升散景霞以飛軒也非不能採擇上室訪搜紫童求玉宮之良儔偶高靈而爲雙接玄引奇友于帝郎矣直是我推機任會應度厯數俯景塵沬參龍下邁招冥求之雄追得匹之黨耳自因宿命相與乃有墨會定名素契玉鄕齊理二慶㩦鴈而行匏爵分味醮衾結裳顧儔中饋內藏眞方也推此而往已定分冥簡靑}
