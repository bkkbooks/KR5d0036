  - {type: variant, offset: 1585, length: 522, content: 日夕雲林喻作與許侯解輪太霞上斂轡造紫丘手把八空氣縱身雲中浮一眄造化剛再視索高疇道要既已足可以解千憂求真得真友不去復何求九月六日夕紫微夫人喻作示許長史並與同學同學謂郗方回也晨闕太霞構玉室起霄清領略三奇觀浮景翔絕冥丹空中有真金映育挺精八風鼓錦被碧樹曜四靈華蓋蔭蘭暉紫轡策綠軿結信通神交觸類率天誠何事外象感須睹瑤玉瓊九月九日雲林右英夫人喻作紫空朗明景玄宮帶絳河濟濟上清房雲臺煥嵯峨八輿造朱池羽蓋傾霄柯震風回三辰金鈴散玉華七轡絡九垓晏眄不必家借問求道子何事坐塵波豈能栖東秀養真收太和九月九日紫微夫人喻作因許示郗郗猶是方回也二景秀鬱玄霄映朗八方丹雲浮高晨逍遙任靈風鼓翮乘素飆竦眄瓊臺中綠蓋入協晨青軿擲空同右揖東林帝上朝太虛皇玉賓剖鳳腦嗷酣飛蕊漿雲鈞回曲寢千音何琅琅錦旌召猛獸華幡正低昂香母折腰唱紫煙排棟梁總轡高清闕解駕佳人房昔運挺未兆靈化順氣翔心眇玄涯感年隨積椿崇形甘垢臭味動靜失滄浪我友實不爾榮辱昨已忘九月十八日夜雲林右英夫人作喻曰吾辭訖此絳景浮玄晨紫軒乘煙征仰超綠闕內俯眄朱火城東霞啟廣暉神光煥七靈翳映汜三燭流任自齊冥風纏空洞宇香音觸節生手攜熾謂應作織字女舞併衿匏瓜庭左徊青羽旗華蓋隨雲傾晏寢九度表是非不我營抱真棲太寂金恣愈日嬰豈似愆穢中慘慘無聊生九, WYG: ''}
