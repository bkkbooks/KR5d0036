  - {type: variant, offset: 563, length: 3, content: 乘飆溯, WYG: 晨朝心豁虚無外神襟何朗寥儛太空嶺六氣運重幽我塗豈能尋使爾不終彫右英夫人作翳藹紫㣲館鬱臺散景飈鸞唱華蓋間鳯鈞導龍軺八狼攜絳旌素虎吹角簫雲勃寫靈宫來適塵中囂解轡佳人寢同炁自相招尋宗須臾頃萬齡乃一朝椿期㑹足衰刼往豈足遼眞眞乃相目莫令心徂虚刀揮至空鄙滯五神愁右紫㣲作朝啓東晨暉飛軿越滄淵山波振青涯八風扇𤣥煙迴眄易遷房有懐眞感人三金可遊盤東岑宜永甄紛紛當塗中孰能步生津飄颻八霞嶺徘徊飛晨蓋紫軿騰太空曬眄}
