  - {type: variant, offset: 600, length: 0, content: '', CK-KZ: 道賢者之舉事故復酬此語也長史婦亡後更欲納妾而修七元家事最是所禁故屢有及之手筆何其落落盧醫之喻復有韋絃之功解凍爐門其旨乃佳當實心在此濟矣定錄告此是中君見長史答右英書復賞讚之也心已至也不復須詣山也每空懷以向眞單誠以汎道者雖欲不教其可得乎瞻赴山澤乃更餘事耳要都無懷者實使人悒然今可停也十二月一日夜定錄告許侯尋此語復似酬到京不得來事事相關涉不可領正月二十七日將不能蹔詣欲營宅處耶龜山眞人似當其日來未眞至齋者自可無彷彿且欲令彼見我乎正月十四日保命告案此告極似前所疑事所以翻覆難解也從此正月起至後並是入丙寅年中事右五條有楊書轡景登霄晨遊宴滄浪宮綵雲繞丹霞靈藹散八空上眞吟瓊室高仙}
