  - {type: variant, offset: 4421, length: 2, content: 恐偶, CK-KZ: 夜太元眞人司命君告玉斧祖司徒府辟掾不赴隱在本縣茅山五年此十六字榮弟後所注其公府辟似妄也淵奇體道解幽達精虛中受物柔德順貞慈寬博採聞道必行逍遙飛步啓誠坦平策龍上造浮煙三淸實眞仙之領帥友長里之先生必當封牧種邑守伯仙京傅佐上德列書絳名右說道許長史所得限分爾時護軍長史此六字亦榮弟所注瑋灼淸暉潜光翳眞二景落鋒飛霞流纏於焉玉子採此雙辰遂開上道允得妙門儀璘洞煥玉標玄金登名五宮懸書七元實迭域之併羅爲上淸之卿君是子内和感虛託眞情專之所致亦南人雲軫之必駕三元景輦之攜遊也此云迭域卽谷希子也與前司命所答谷子之羅鼎事}
