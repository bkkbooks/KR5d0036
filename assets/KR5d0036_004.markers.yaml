  - {type: variant, offset: 992, length: 263, content: 順縱神任空同右方諸青童君歌控飆扇太虛八景飛高清仰浮紫晨外俯看絕落冥玄心空同間上下弗流停無待兩際中有待無所營體無則能死體有則攝生東賓會高唱二待奚足爭命駕玉錦輪舞轡仰徘徊朝遊朱火宮夕宴夜光池浮景清霞杪八龍正參差我作無待遊有待輒見隨高會佳人寢二待互是非有無非有定待待各自歸右南極紫元夫人歌按此諸歌詩並似初降語而嫌眾真多高唱上清童紫元太虛未嘗有雜降處恐或遺失耳有待之說並是指右英事非安妃也騰躍雲景轅浮觀霞上空霄軿縱橫舞紫蓋託靈方朱煙纏旌旄羽帔扇香風電嗥猛獸攫雷吟奮玄龍鈞籟昆庭響金笙唱神鍾採芝滄浪阿掇華八渟峰朱顏日愈新劫往方嬰童養形靜, WYG: 眞}
