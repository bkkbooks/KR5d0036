  - {type: variant, offset: 605, length: 0, content: '', CK-KZ-jye: 内結我冥中朋俱挹玉醴津儵欻已嬰童云何當路蹲愆痾隨日崇二月九日夜雲林作晨遊太素宮控軿觀玉河夕冥鬱絕宇朝採圓景華彈璈北寒臺七靈暉紫霞濟濟高仙舉紛紛塵中羅盤桓囂藹内愆累不當多二月十六日右英作玄淸眇眇觀落景出東渟願得絕塵友蕭蕭罕世營吟此再三右三篇有楊書靈人隱玄峯眞神韜雲采玄唱非無期妙應自有待豈謂虛空寂至韻故常在㩦襟登羽宮同宴廣寒裏借問朋人誰所存唯玉子卓雲虛之駿抗翮於空同之上斯人矣豈不長揖南面永謝千乘乎紫微詩及詠此駕風騁雲軿晨登太渟邱絳津連岑振淸波鼓浚流步空觀九緯八剛皆已遊蹔宴三金秀來觀建志儔懃懈不相淹是以積百憂二月三十日夜右英作褰裳濟綠河遂見扶桑公高會太林墟寢宴玄華宮信道苟淳篤何不栖東峯紫微夫人歌此陵波越滄浪忽然造金山四顧終日遊罕我雲中人右英吟此控景始暉津飛飈登上淸雲臺鬱峨峨閶闔秀玉城晨風鼓丹霞朱煙灑金庭綠蕊粲玄峯紫華巖下生慶雲纏丹爐練玉飛八瓊晏眄廣寒宮萬椿愈童嬰龍旂啓靈電虎旗徵朱兵高眞迴九曜洞觀均潛明誰能步幽道尋我無窮齡紫微夫人作紫闕搆虛上玄}
