  - {type: variant, offset: 3901, length: 1, content: 秉, CK-KZ: 鹿絳草豈妨大聖靈化高通上達耶吾七世父許子阿者積仁著德陰和鳥獸遇凶荒之年人民飢饉加之疫癘百遺一口阿乃施散家財拯其眾庶親營方藥懃勞外舍臨人之喪如失其親救人之患如己之疾已死之命懸於阿手窮垂之身撫之如子度脫凶年賴阿而全者四百八人仁德不隊謂應作墜字後當鍾我等是以功書上帝德刊靈閣使我祖根流宗澤廕光後緒故使垂條結華生而好仙應得度世者五人登升者三人錄名太上策簡靑宮豈是爾輩所可豫乎言畢魴等豁然而笑遵至而去矣此意雖復是世龍之助吾亦壯其辭也於是卽得度名東宮當爲仙之中者然其身中自宿有陰罪未了處已日就補復解謝太上行當受書署者也蓋爾不復受考於三官已定名於不死之錄矣今已移在竹葉山中或名此山爲蓋竹山山之東面兩隴西上其中有石井橋橋之北小道直入其間有六叢杉樹樹之左右三百步有小石深室室前有流泉水映與三人共止其中此辰年當自蹔出還人食詭亦}
