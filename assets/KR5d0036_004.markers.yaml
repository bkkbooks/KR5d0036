  - {type: variant, offset: 524, length: 1, content: 條, CK-KZ: 篇長史自書本令懃者懃其事躭其玄微耳愼者亦觸類而作也學道之難不可書矣}
  - {type: variant, offset: 524, length: 1, content: 條, CK-KZ-jye: 篇長史自書本令懃者懃其事躭其玄微耳愼者亦觸類而作也學道之難不可書矣}
  - {type: variant, offset: 524, length: 1, content: 條, HFL: 篇長史自書本令懃者懃其事躭其玄微耳愼者亦觸類而作也學道之難不可書矣}
  - {type: variant, offset: 524, length: 0, content: '', WYG: 篇長史自書本令懃者懃其事躭其𤣥㣲耳愼者亦觸𩔖而作也學道之難不可書矣有恥鄙之心者於道亦遼乎灌秉然後可貴耳賢者之舉自更始爾今且當内忘右紫㣲夫人道此言此是紫㣲見長史答右英道賢者之舉事故復酬此語也長史婦亡後更欲納妾而修七元家事最是所禁故屢有及之手筆何其落落盧醫之喻復有韋絃之功解凍爐門其㫖乃佳當實心在此濟矣定錄告此事中君見長史答右英書復賞讃之也心已至也不復須詣山也每空懐以向眞單誠以汎道者雖欲不教其可得乎瞻赴山澤乃更餘事耳要都無懐者實使人悒然今可停也十二月一日夜定録告許侯尋此語復似酬到京不得來事事相闗涉不可領正月二十七日將不能蹔詣欲營宅處耶龜山眞人似當其日來未眞至齋者自可無彷彿且欲令彼見我乎正月十四日保命告案此告極似前所疑事所以翻覆難解也從此正月起至後並是入丙寅年中事右五}
