  - {type: variant, offset: 2741, length: 274, content: 北登玄真闕攜手結高羅香煙散八景玄風鼓絳波仰超琅園津俯眄霄陵阿玉簫雲上唱鳳鳴洞九遐乘氣浮太空曷為躡山河金節命羽靈徵兵折萬魔齊挹二晨暉千椿方嬰牙喪真投兢室不解可奈何仰眄太霞宮金閣曜紫清華房映太素四軒皆朱瓊擲輪空同津總轡舞綠軿玉華飛雲蓋西妃運錦旌翻然濁塵涯倏忽佳人庭宿感應期降所招已在冥乘風奏霄晨共酣丹琳罌公侯徒眇眇安知真人靈右二篇十月二十日授亦應是右英喻長史也右二篇有楊書車馬雖重為路人所略推分任運有以招之不必柸子誠小還為童史所偷故疾而惜之今冥鑒即擒蓋所以懼惡而善者別矣今雖默然不言小人足知靈驗有訓在其中非直區區若此小小而不能坦也謹白呈雲林右英夫人十一, CK-KZ: 又掾寫五}
