  - {type: variant, offset: 636, length: 0, content: '', CK-KZ: 此曲松柏生玄嶺鬱爲寒林桀蘩葩盛嚴氷未肯懼白雪亂世幽重岫巡生道常潔飛此逸轡輪投彼遐人轍公侯可去來何爲不能絕右右英作神玉曜靈津七元煥神扉靈遷方寸裏一躍登太微妙音乘和唱高會亦有機齊此天人眄協彼晨景飛總轡六合外甯有傾與危四月二十三日夜紫微夫人作玄感妙象外和聲自相招靈雲鬱紫晨蘭風扇綠軺上眞宴瓊臺邈爲地仙摽所期貴遠邁故能秀穎翹翫彼八素翰道成初不遼人事胡可豫使爾形氣銷四月二十七日夜南嶽夫人作右十二篇有楊書又雜掾寫淸淨願東山蔭景栖靈穴愔愔閑庭虛翳薈靑林密圓曜映南軒朱鳳扇幽室拱袂閑房内相期啓妙術寥朗遠想玄蕭條神心逸閏月三日夜右英作示許長史案晉厯丙寅年閏四月也右有楊書又掾寫縱心}
  - {type: page-break, offset: 636, content: '', id: KR5d0036_CK-KZ_02p051a, image: JY237/CK-KZ_JY237_02p051a.png}
