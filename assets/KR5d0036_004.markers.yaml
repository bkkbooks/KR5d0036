  - {type: variant, offset: 559, length: 1, content: 王, WYG: 吟此控景始暉津飛飈登上清雲臺鬱峩峩閶闔秀玉城晨風鼓丹霞朱煙灑金庭綠蘂粲𤣥峯紫華巖下生慶雲纒丹爐練玉飛八瓊晏眄廣寒宫萬椿愈童嬰龍旂啓靈電虎旗徵朱兵高眞迴九曜洞觀均潛明誰能步幽道尋我無窮齡紫㣲}
