  - {type: variant, offset: 551, length: 0, content: '', WYG: 豈謂虚空寂至韻故常在攜襟登羽宫同宴廣寒裏借問朋人誰所存唯玉子卓雲虚之駿抗翮於空同之上斯人矣豈不長揖南面永謝千乗乎紫㣲詩及詠此駕風騁雲軿晨登太渟丘絳津連岑振清波鼓浚流步空觀九緯八剛皆已遊蹔宴三金秀}
