  - {type: variant, offset: 601, length: 0, content: '', WYG: 此曲松柏生𤣥嶺鬱為寒林桀蘩葩盛嚴氷未肯懼白雪亂世幽重岫廵生道常潔飛此逸轡輪投彼遐人轍公侯可去來何為不能絶右右英作神玉曜靈津七元煥神扉靈遷方寸裏一躍登太㣲妙音乘和唱高㑹亦有機齊此天人眄恊彼晨景飛總轡六合外寧有傾與危四月二十三日夜紫㣲夫人作𤣥感妙象外和聲自相招靈雲鬱紫晨蘭風扇綠軺上眞宴瓊臺邈為地仙標所期貴逺邁故能秀頴翹翫彼八素翰道成初不遼人事胡可豫使爾形氣銷四月二十七日夜南嶽夫人作右十二篇有楊書又雜掾}
