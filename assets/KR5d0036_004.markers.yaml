  - {type: variant, offset: 3053, length: 438, content: 運靈啟其會披散氛霧朗然達觀真靈清秀並垂戒悟猥辱文翰華藻成林金聲玉振規矩有章父子凡微無以堪荷夙興策勵不敢怠惰顒顒傾注言不自暢穆惶恐言此亦是答右英詩不審的是何詩亦似不存右二條長史自書本靈谷秀瀾縈藏身栖岩京被褐均袞龍帶索齊玉鳴形磐幽遼裏擲神太霞庭霄上有陛賢空中有真聲抑我曲晨飛案此綠軒軿下觀八度內俯歎風塵縈解脫遺波浪登此眇眇清擾兢三津竭奔馳割爾齡十二月一日夜南嶽夫人作與許長史飛輪高晨台控轡玄壟隅手攜紫皇袂倏八風驅玉華翼綠幃青裙扇翠裾冠軒煥崔嵬佩玲帶月珠薄入風塵中塞鼻逃當塗臭腥彫我氣百屙令心殂何不飆然起蕭蕭步太虛十二月一日夜方丈左臺昭靈李夫人作與許玉斧清晨揖絳霞總氣霄上遊徊軿躡曲波遂睹世人憂辭旨蔚然起不散三秀嵎何若巡玄鄉撫敖為爾娛君安有有際我願有中無右英作此駕景遊賢良促轡東圃下右英吟此道咀嚼玄句柔音蔚暢曲夾適宣辭喻摽朗欽欽之詠有由然也玄宗以安我其會矣十二月十四日雲林夫人作與長史此所答長史之詩詩今不存右五篇有楊書該清道難通幽妙達許侯其人也方將曜靈方丘騰躍暉霞身飛九天作則群真師, CK-KZ: ''}
