  - {type: variant, offset: 528, length: 2, content: 駕敖, WYG: 轡景登霄晨遊宴滄浪宫綵雲繞丹霞靈藹散}
  - {type: variant, offset: 531, length: 2, content: 虛徊, WYG: 空上眞吟瓊室高仙歌琳房九鳯唱朱籟虚節錯羽鐘交頸金庭内結我冥中朋俱挹玉醴津儵歘已嬰童云何當路蹲愆痾隨日崇二月九日夜雲林作晨遊太素宫控軿觀玉河夕}
