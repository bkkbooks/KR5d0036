  - {type: variant, offset: 83, length: 186, content: 侍女名隱暉侍女皆青綾衣捧赤玉箱二枚青帶束絡之題白玉檢曰太上章一檢曰太上文此記織檢上文亦同前九華也夫人帶青玉色綬如世人帶章囊狀隱章當長五丈許大三四尺許臨去授作一瑽詩畢乃吟歌雲墉帶天構七氣煥神馮瓊扇啟晨鳴九音絳樞中紫霞興朱門香煙生綠窗四駕舞虎旂青軿擲玄空華蓋隨雲倒落鳳控六龍策景五嶽阿三素眄君房適聞臊穢氣萬濁蕩我胸臭物薰精神囂塵互相衝明王皆摧爛何獨盛德躬高揖苦不早坐地自生蟲八, CK-KZ: ''}
