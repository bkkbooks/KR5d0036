  - {type: variant, offset: 4761, length: 2, content: 妙致, CK-KZ: 行也若夫瓊丹一御九華三飛雲液晨酣流黃徘徊仰咽金漿咀嚼玉蕤者立便控景登空玄升太微也自世事乖玄斯業未就便當蹔履太陰潜生冥外身棄質養胎虛宅陶氣絕籥受精玄漠故改容於三陰之館童顏於九鍊之戸然後知神仙爲奇死而不亡去來之事理之深也南人告云得道去世或顯或隱託體遺迹道之隱也或有再酣瓊精而叩棺一服刀圭而尸爛鹿皮公吞玉華而流虫出尸仇季子咽金液而臭聞百里黃帝火九鼎於荆山尙有橋領之墓季主服雲散以潜升猶頭足異處墨秋咽虹丹以投水甯生服石腦而赴火務光剪韮以入淸冷之淵栢成納氣而腸胃三腐諸如此比不可勝記微乎得道趣舍之迹無常矣南人卽南眞夫人也此諸仙人出諸傳記而事迹有參差不同者保命又云旣適潜暢莫覺不眞如此之指非眞尸也右四條有長史書人死必視}
