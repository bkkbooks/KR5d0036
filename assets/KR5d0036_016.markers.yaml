  - {type: variant, offset: 5485, length: 0, content: '', CK-KZ: 永和十一年去郡告靈不復仕先與許先生周旋頗亦慕道至昇平五年辛酉嵗亡年五十九今乙丑年說云五年則亡後被繫被繫之事檢迹未見其咎恐以懟憾告靈爲謫耳蔣濟爲南山伯領二千兵蔣濟字子通楚國平阿人仕漢魏厯位至太尉從宣王誅曹爽其年亡諡景侯爲領軍時有其婦夢亡兒爲太山五伯來迎太廟西孫阿爲太山令求囑阿乞轉在好處濟卽爲仍之阿亦卽亡後又夢云已䝉轉錄事凡如此例鬼官職位雖略因生時貴賤而大有舛駁皆由德業之優劣功過之輕重更品其階敘不復得全依其本基耳王廙爲部鬼將軍廙字世將瑯瑘人修齡父也多才藝工書善屬文解音聲位至平南將軍荆州刺史年四十七病亡贈驃騎諡康侯也此有識位者粗相識耳其無位者不可一二盡知之如此散者無限數也此皆後段所說似猶是荀中侯所以止道或不稱姓而顗復云姓恐以分別周顗也所說人多是近世當由代謝參苦兼易意識者矣三代乃遠而兩漢魏晉實有一段才名人如劉向董仲舒揚雄張衡蔡邕鄭玄王弼阮嵇之儔並不應空散數術有如管郭亦無標迹故當多不隸三官頗得預于仙家驅任矣前論帝王中亦不均魏文晉武受命之主而不顯反言魏武晉宣孫權應與劉備同亦不載道策此並當啟國之基功高樂推故也其繼體守文之君都無所出矣右以前後兩過受事皆是楊君受旨書多儳治又掾更寫兩本悉無異並各成一卷相隨始末訖此耳許肇今爲東明公右帥晨帥晨之任如世間中書監許肇字子阿卽長史七代祖司徒敬也雖有賑救之功而非陰德故未蒙受化旣福流後葉方使上拔然後爲九宫之仙耳此帥晨之官四明亦並應有之邵奭爲東明公云行上補九宫右保公前云邵爲南明公今乃是東若非名號之誤則東南之差旣尋當遷擢則必應是啟中君脫爾云邵耳亦可是有甘棠之德故不限其年月耳右七月十六日夜定錄君所告此二條別受不關酆記部辛玄子自叙并詩此下剪除半行去不知當是何字也玄子字延期隴西定谷人漢明帝時諫議大夫上洛雲中趙國三郡太守辛隱之子辛隱字某某檢外書未得此位業按諸辛舊關隴豪族前漢有辛慶忌後漢有辛繕並高直之士辛毗是其七世孫則隱是毗之八世祖但一百四五十年中而已八世嫌其太促耳玄子少好道遵奉法戒至心苦行日中菜食鍊形守精不遘外物州府辟聘一無降就遊山林棄世風塵志願憑子晉於緱岑侣陵陽於步玄故改名爲玄子而自字延期矣不圖先世之多愆殃流子孫結眚刊於帝簡運沉逮於後昆享年不永遂没命於長梁之津西王母見我苦行酆都北帝愍我道心告勑司命傳檄三官攝取形骸還魂復眞使我頤胎位爲靈神於今二百餘年矣溺水致命事同王衍之女恐卽此形骸皆不復得生並是反質胎神耳雖有道心而無道業故不得便居仙品也近得度名南宫定策朱陵藏精待時方列爲仙而大帝今且見差領東海侯代庾生又見選補禁元中郎將爲吳越鬼神之司王事靡盬斯亦勞矣若夫冠晨佩靑蕭條羽袂鳴鈴仙階轉軿瓊室者雖實素心而卒日也恨未便得與玄眞併羅同宴琨墉察鈞韶之遺音掇靈芝乎幽峯振翠衣於九霄儛玄翮於十方耳方當攝御羣鬼領理是非處眾穢之中間聲交於邪魔之紛紜事與道德爲闊眼與盱眞爲疎孰比熙寂於玄境逍遙於太初哉夫同聲偕合物亦類分相聞邈矣係景委積是以名書上淸丹錄玄殖有道之氣與靈合德託體高輝故來相從今贈詩三篇以叙推情之至也其辭曰楊君旣爲吳越司命董統鬼神玄子職隷方應相開故先造以陳情也尋鬼書旣異不應是自運筆亦當口授疏之耳疇昔入冥鄉順駕應靈招神隨空無散炁與慶雲消形非明玉質玄匠安能彫蹀足吟幽唱仰首玩鳴條林室有逸歡絶此軒外交遺景附圓曜嘉音何寥寥此篇敘事迹之本志也寂通寄興感玄炁攝動音高輪雖參差萬仞故來尋蕭蕭研道子合神契靈衿委順浪世化心摽窈窕林同期理外遊相與靜東衣此篇申情寄之來緣也命駕廣酆阿逸跡超冥鄕空中自有物有中亦無常悟言有無際相與會濠梁目擊玄解了鬼神理自忘此篇論人鬼之幽致也玄子云魏時辛毗字佐治是七世之孫也漢}
