  - {type: variant, offset: 3391, length: 0, content: '', HFL: 云行上補九宫右保公前云邵爲南明公今乃是東若非名號之誤則東南之差既尋當遷擢則必應是啓中君脫爾云邵耳亦可是有甘棠之德故不限其年月耳右七月十六日夜定録君所告此二條别受不關酆記部辛玄子自叙并詩此下剪除半行去不知當是何字也玄子字延期隴西定谷人漢明帝時諫議大夫上洛雲中趙國三郡太守辛隱之子辛隱字某某檢}
