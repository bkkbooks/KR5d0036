  - {type: variant, offset: 43, length: 1819, content: 北北海之中不知去岸幾萬里耳山高二千六百里周迴三萬里其山下有洞天在山之周迴一萬五千里其上其下並有鬼神宮室山上有六宮洞中有六宮輒周回千里是為六天鬼神之宮也周回一萬五千五百為宮周回一千里者三百二十五所今此六宮止得六所爾其餘宮尚三百一十九所計不容頓耳恐所言或有舛漏處也山上為外宮洞中為內宮制度等耳此山既非人跡所及故山上可以得立容不知山複有幾洞門也第一宮名為紂絕陰天宮以次東行以周回論之洞中直東西有三千七百五十里今一宮周回二里是徑二百五十里六宮若並列合居千五百里耳其兩邊各餘二十餘里南北有殊遠悉悉當為藩屏故也不爾莫測所以也第二宮名為泰煞諒事宗天宮第三宮名為明晨耐犯武城天宮第四宮名為恬昭罪氣天宮第五宮名為宗靈七非天宮第六宮名為敢司連宛屢天宮凡此六天宮亦皆應有義旨乃粗可領解自不容輕說凡六天宮是為鬼神六天之治也洞中六天宮亦同名相像如一也此即應是北酆鬼王決斷罪人住處其神即應是經呼為閻羅王所住處也其王即今北大帝也但不知五道大神當是何者爾凡生生之類其死莫不隸之至于地獄所在盡有不盡一處泰山河海亦各有焉此山外宮當是曹局職司主領文簿洞中內宮是住止及考謫之處也今書家說有人死而複生者並雲初北向行詣宮府考署或如城關檢課文書恐此皆是至山上外宮中爾如胡毋班往泰山府君處亦不覺入洞中恐鬼神恍惚不使知見實事耳世人有知酆都六天宮門名則百鬼不敢為害欲臥時常北向祝之三遍微其音也前雲宮名今雲門名是為門亦因宮為名宮直是虛號門則有榜題百鬼皆見而人今亦知之故所以畏伏也祝曰吾是太上弟子下統六天六天之宮是吾所部不但所部乃太上之所主吾知六天之宮名故得長生敢有犯者太上當斬汝形此云下統六天者不為六天所統也不但吾自所部領乃太上令吾主之故複以為威猶如郡縣官爵有臺除非白版之例也第一宮名紂絕陰天宮以次東行第二宮名此二字楊君書際紙下如此掾寫不熟詳乃作七字今世中諸本皆作第七此誤爾宮唯有六豈容是有七耶此咒複說以次東行四字者是欲令鬼輩訝吾知其次第位例也從此以次訖六宮止乃啄齒六下乃臥辟諸鬼邪之氣此一遍咒訖六啄齒畢又咒如此三遇乃臥耳此法已重抄在第三篇修事中耳人初死皆先詣紂絕陰天宮中受事或有先詣名山及泰山江河者不必便徑先詣第一天要受事之日罪考吉凶之日當來詣此第一天宮耳此宮是北帝所治故後悉應關由猶如今州縣之獄初雖各有執隸終應送台定其刑書泰煞諒事宗天宮諸煞鬼是第二天也卒死暴亡又經於此此宮當得專主收煞也其卒死暴亡恐文書未正或姓名相同者所以先來檢問之也賢人聖人去世先經明晨第三天宮受事後云四明公各治一宮不知此泰煞明晨兩宮當是何公所居暴亡及賢聖雖先暫經亦猶應詣紂絕為正也禍福吉凶續命罪害由恬昭第四天宮鬼官地斗君治此中鬼官之北斗是複籍先身之切罪乎然武以至忠而亡必復入仙品矣韓太華者韓安國之妹也漢二帥將軍李廣利之婦也利宿世有功德利今亦在南宮受化廣利為漢武名將伐大宛時所殺戮殊不少以先世功德遂能消之韓氏字安國家福逮不應關李相扶夫妻既同條恐人脫致疑是以複標別言之亦或由因結致此也劉春龍者漢宗正劉奉先之女奉先漢某帝時為宗正李奚子者李忠之祖母也忠晉初東平太守忠祖父田舍人耳而多行陰德常大雪寒凍而不覆積稻常露穀於園庭恆恐鳥雀饑死其用心如此李忠不顯晉書如此說則妻複似是緣夫之功而夫身反不見有所果亦難可詳言王進賢王衍女也事詳在後郭叔香者王修母王修字叔治北海人為魏武郎中令年七歲喪母母以杜日亡不知是郭誰女也其童初府有王少道范叔勝李伯山皆童初府之標者少好道漢時人王遁兒也漢時山陽太守范叔勝北地人也魏文帝黃門郎李伯山李沖父也沖漢時為白馬令行陰德或積世有道中行所鍾此二府仙人皆一進再進得入此項梁城作酆宮誦曰紂絕摽帶晨諒事遘重阿炎如霄中煙勃若景曜華武陽帶神鋒恬昭吞青河閶闔臨丹井雲門鬱嵯峨七非通奇蓋連宛亦敷魔六天橫北道此是鬼神家誦有二萬言今略道六天之宮名抄出之耳夜中亦可微讀之亦云辟鬼邪前第三宮名武城今云武賏或當是有兩名也蘇韶傳云是之聖者有項梁義賢者有美季子但不知項是何世人也或恐是項羽之叔項梁而不應聖于季子也酆都稻名重思其米如石榴子粒異大色味如菱亦以上獻仙官後又有敘重思事既是異日所說兩出自非嫌石榴子即世之安石榴也炎慶甲者古之炎帝也今為北太帝君天下鬼神之主也炎帝神農氏造耕稼嘗百藥其聖功不減軒轅顓頊無應為鬼帝又黃帝所伐大庭氏稱炎帝恐當是此非神農也又外書云神農牛首今佛家作地獄中主煞者亦牛首複致疑焉四明公升擢既有年限太帝位秩亦應加崇極此雖已三千餘年或恐如世中帝王不轉而公輔屢遷也武王發今為鬼官北斗君文王之子周武王也姓姬名發伐殷紂而為天子, HFL: 基}
