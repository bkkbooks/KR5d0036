  - {type: variant, offset: 1801, length: 134, content: 限太帝位秩亦應加崇極此雖已三千餘年或恐如世中帝王不轉而公輔屢遷也武王發今為鬼官北斗君文王之子周武王也姓姬名發伐殷紂而為天子即位二年崩禮云年九十三竹書云年四十五按後云四明公並得升仙階而不道北斗君既仰隸玉晨亦應預同遷品耳夏啟為東明公領斗君師禹之子也姓姒竹書云即位三十九年亡, WYG: 亾}
