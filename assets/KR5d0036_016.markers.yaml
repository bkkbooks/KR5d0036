  - {type: variant, offset: 58, length: 1213, content: 二千六百里周迴三萬里其山下有洞天在山之周迴一萬五千里其上其下並有鬼神宮室山上有六宮洞中有六宮輒周回千里是為六天鬼神之宮也周回一萬五千五百為宮周回一千里者三百二十五所今此六宮止得六所爾其餘宮尚三百一十九所計不容頓耳恐所言或有舛漏處也山上為外宮洞中為內宮制度等耳此山既非人跡所及故山上可以得立容不知山複有幾洞門也第一宮名為紂絕陰天宮以次東行以周回論之洞中直東西有三千七百五十里今一宮周回二里是徑二百五十里六宮若並列合居千五百里耳其兩邊各餘二十餘里南北有殊遠悉悉當為藩屏故也不爾莫測所以也第二宮名為泰煞諒事宗天宮第三宮名為明晨耐犯武城天宮第四宮名為恬昭罪氣天宮第五宮名為宗靈七非天宮第六宮名為敢司連宛屢天宮凡此六天宮亦皆應有義旨乃粗可領解自不容輕說凡六天宮是為鬼神六天之治也洞中六天宮亦同名相像如一也此即應是北酆鬼王決斷罪人住處其神即應是經呼為閻羅王所住處也其王即今北大帝也但不知五道大神當是何者爾凡生生之類其死莫不隸之至于地獄所在盡有不盡一處泰山河海亦各有焉此山外宮當是曹局職司主領文簿洞中內宮是住止及考謫之處也今書家說有人死而複生者並雲初北向行詣宮府考署或如城關檢課文書恐此皆是至山上外宮中爾如胡毋班往泰山府君處亦不覺入洞中恐鬼神恍惚不使知見實事耳世人有知酆都六天宮門名則百鬼不敢為害欲臥時常北向祝之三遍微其音也前雲宮名今雲門名是為門亦因宮為名宮直是虛號門則有榜題百鬼皆見而人今亦知之故所以畏伏也祝曰吾是太上弟子下統六天六天之宮是吾所部不但所部乃太上之所主吾知六天之宮名故得長生敢有犯者太上當斬汝形此云下統六天者不為六天所統也不但吾自所部領乃太上令吾主之故複以為威猶如郡縣官爵有臺除非白版之例也第一宮名紂絕陰天宮以次東行第二宮名此二字楊君書際紙下如此掾寫不熟詳乃作七字今世中諸本皆作第七此誤爾宮唯有六豈容是有七耶此咒複說以次東行四字者是欲令鬼輩訝吾知其次第位例也從此以次訖六宮止乃啄齒六下乃臥辟諸鬼邪之氣此一遍咒訖六啄齒畢又咒如此三遇乃臥耳此法已重抄在第三篇修事中耳人初死皆先詣紂絕陰天宮中受事或有先詣名山及泰山江河者不必便徑先詣第一天要受事之日罪考吉凶之日當來詣此第一天宮耳此宮是北帝所治故後悉應關由猶如今州縣之獄初雖各有執隸終應送台定其刑書泰煞諒事宗天宮諸煞鬼是第二天也卒死暴亡又經於此此宮當得專主收煞也其卒死暴亡恐文書未正或姓名相同者所以先來檢問之也賢人聖人去世先經明晨第三天宮受事後云四明公各治一宮不知此泰煞明晨兩宮當是何公所居暴亡及賢聖雖先暫經亦猶應詣紂絕為正也禍福吉凶續命罪害由恬昭第四天宮鬼官地斗君治此中鬼官之北斗是複籍先身之切罪乎然武以至忠而亡必復入仙品矣韓太華者韓安國之妹也漢二帥將軍李廣利之婦也利宿世有功德利今亦在南宮受化廣利為漢武名將伐大宛時所殺戮殊不少以先世功德遂能消之韓氏字安國家福逮不應關李相扶夫妻既同條恐人脫致疑是以複標別言之亦或由因結致此也劉春龍者漢宗正劉奉先之女奉先漢某帝時為宗正李奚子者李忠之, CK-KZ: ''}
