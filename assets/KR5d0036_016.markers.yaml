  - {type: variant, offset: 3382, length: 0, content: '', HFL: 一年去郡告靈不復仕先與許先生周旋頗亦慕道至昇平五年辛酉歲亡年五十九今乙丑年說云五年則亡後被繫被繫之事檢迹未見其咎恐以懟憾告靈爲謫耳蔣濟爲南山伯領二千兵蔣濟字子通楚國平阿人仕漢魏歷位至太尉從宣王誅曹爽其年亡謚景侯爲領軍時有其婦夢亡兒爲太山五伯來迎太廟西孫阿爲太山令求囑阿乞轉在好處濟即爲仍之阿亦即亡後又夢云已蒙轉録事凡如此例鬼官職位雖略因生時貴賤而大有舛駁皆由德業之優劣功過之輕重更品其階叙不復得全依其本基耳王廙爲部鬼將軍廙字世將瑯瑘人修齡父也多才藝政書善屬文解音聲位至平南將軍荆州刺史年}
