  - {type: variant, offset: 3889, length: 39, content: 此當是深功厚德之所致也魏武帝為北君太傅北君則北斗君周武王也四明各有賓友恐北斗君, HFL: 耳}
  - {type: variant, offset: 3889, length: 0, content: '', WYG: 雖實素心而卒日也恨未便得與𤣥眞併羅同晏琨墉察鈞韶之遺音掇靈芝乎幽峰振翠衣於九霄儛𤣥翮於十方耳方當攝御羣鬼領理是非處衆穢之中間聲交於邪魔之紛紜事與道德為闊眼與盱眞為踈孰比熙寂於𤣥境逍遥於太初哉夫同聲偕合物亦𩔖分相聞邈矣係景委積是以名書上清丹録𤣥殖有道之氣與靈合德託體髙輝故來相從今贈詩三篇以叙推情之至也其辭曰楊君既為吳越司命董綂鬼神𤣥子職𨽻方應相關故先造以陳情也尋鬼書既異不應是自運筆亦當口受䟽之耳疇昔入㝠鄉順駕應靈招神隨空無散炁與慶雲消形非明玉質𤣥匠安能彫蹀足吟幽唱仰首翫鳴條林室有逸歡絶}
