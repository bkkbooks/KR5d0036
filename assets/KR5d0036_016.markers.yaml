  - {type: variant, offset: 2718, length: 175, content: 門郎為天門亭長下官此是北帝門也後漢云主南北門龠則一宮有二天門也蘇韶傳云修門郎有八人乃言顏淵卜商今見居職恐此不然周撫字道和潯陽柴桑人周訪子也先為王敦將東下伐都事敗與鄧嶽俱走西陽蠻中敦被殺赫出又為將討蘇峻後伐蜀平李勢封建成公為鎮西將軍益州刺史乃三十許年興寧三年病亡贈征西將軍諡襄公郤鑒字道微高平人即灊父也永昌元年率諸流民來渡江東後討平王敦封高平公又為車騎, CK-KZ: 魏世爲}
