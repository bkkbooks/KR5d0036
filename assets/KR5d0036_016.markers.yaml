  - {type: variant, offset: 5214, length: 419, content: 晉武闢司徒魏舒府位至侍中中書令監解結字稚連濟南人係弟也一仕晉黃門侍郎中丞荊豫川刺史尚書趙王倫時為孫秀所害也何殷二人以注在前前所說唯道二人今當是更請問乃悉具顯之四明公及北斗君並有侍帝晨五人其向者八人是北大帝官隸耳選用亦同侍帝晨之號仙官亦有俱是侍中位也此言選用並同不知止取名位當品才識兼論功德耶此諸人才位永不相類恐幽途所詮別當有以耳又有中郎直事四人如世之尚書也戴淵公孫度劉封郭嘉今見在職封者是玄德之養子此職應是太帝領僚如今散曹尚書耳戴淵字若愚廣陵人也仕晉歷位至護軍尚書僕射驃騎將軍與周俱為王敦所害贈光祿諡簡侯公孫度字叔濟遼東人淵之祖也初為遼東太守建安中遂僭號稱王建大子羽儀傳國子康至孫淵被司馬宣王所煞劉封本羅侯寇氏子劉備未有兒養為息性剛猛有氣力武藝後建節度賜死此異族為嗣亦是仍得襲姓也郭嘉者字奉孝潁川陽翟人魏武謀臣為軍謀祭酒病亡年三十八諡真侯也玄德今為北河侯與韓遂對統今屬仙官仙官又有北河司命禁保侯亦司三官中事乃隸東華官保命君領之此則是北河侯, HFL: ''}
