  - {type: variant, offset: 3918, length: 10, content: 四明各有賓友恐北斗君, WYG: 鄧攸字伯道平陽襄陵人仕晉為太子洗馬吏部郎河東太守為石勒所没後得還江東為吳郡太守吏部尚書自咸和元年病亾贈光禄攸從胡叛還時乃棄其已兒自携亾弟之子來渡江遂自無兒絶後嗣謝安歎曰天道無知令鄧伯道無兒右辛𤣥子所言說㝠中事亦多矣今粗書其麤者耳}
