  - {type: variant, offset: 1337, length: 375, content: 功而夫身反不見有所果亦難可詳言王進賢王衍女也事詳在後郭叔香者王修母王修字叔治北海人為魏武郎中令年七歲喪母母以杜日亡不知是郭誰女也其童初府有王少道范叔勝李伯山皆童初府之標者少好道漢時人王遁兒也漢時山陽太守范叔勝北地人也魏文帝黃門郎李伯山李沖父也沖漢時為白馬令行陰德或積世有道中行所鍾此二府仙人皆一進再進得入此項梁城作酆宮誦曰紂絕摽帶晨諒事遘重阿炎如霄中煙勃若景曜華武陽帶神鋒恬昭吞青河閶闔臨丹井雲門鬱嵯峨七非通奇蓋連宛亦敷魔六天橫北道此是鬼神家誦有二萬言今略道六天之宮名抄出之耳夜中亦可微讀之亦云辟鬼邪前第三宮名武城今云武賏或當是有兩名也蘇韶傳云是之聖者有項梁義賢者有美季子但不知項是何世人也或恐是項羽之叔項梁而不應聖于季子也酆都稻名重思其米如石榴子粒異大色味如菱亦以上獻仙官後又有敘重思事既是異日所說兩出自非嫌石榴子即世之安石榴也炎慶甲者古之炎帝也今, WYG: 庾元規}
