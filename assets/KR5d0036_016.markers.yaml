  - {type: variant, offset: 4133, length: 876, content: 逆上鬼者陰物多因藉以宣其氣或附人畜或依器物或托飲食然後得肆其凶毒耳昔有人病在地臥於病中乃見鬼於壁穿下以手為管而吹之此即是鬼吹之事也人臥室宇當令潔盛潔盛則受靈炁不盛則受故炁故炁之亂人室宇者所為不成所作不立一身亦耳當洗沐澡潔不爾無冀矣故績皆謂鬼神塵濁不正之績此等皆承人為惡既靈助無主道豈可議也勿道學道道學道鬼犯人事亦不立使人病是體未真故也真誥亟多此戒云一言一事泄乃減算豈但疾病而已所謂仙者心實學何趣說之耶群魔伺察有如影響也山世遠受孟先生法暮臥先讀黃庭內景經一過乃瞑使人魂魄自制練但行此道二十一年亦仙矣是為合萬過也得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道也此四條並是可承用事已別抄在第三篇中孟先生即應是京兆孟君及屬用鄭承者前篇有西嶽蔣夫人今又云北岳未審有兩人為是誤也夜行常琢齒琢齒亦無正限數也煞鬼邪鬼常畏琢齒聲是故不得犯人也若兼之以漱液祝說亦善叩齒即神存故鬼邪不得於今修上道者日夜既恆有此事所以並得長生爾昔鮑助者濟北人也助既少微外書不顯都不學道亦不知法術年四十餘忽得面風氣口目不正炁入口而兩齒上下恆相切拍甚有聲響如此晝夜不止得壽年百二十七歲後乃遇寒過大冰墮長壽河中死耳北帝中間亦比遣煞鬼及日遊地殃使取之而此數煞鬼終不敢近助鬼官問其故天煞答云此人乃多方術以制於我常行叩齒鳴打天鼓以警身中諸神神不敢散鬼氣不得入是以無有緣趣得煞之耳以此論之若助不行冰渡河亦可出千歲壽不啻也當是遇大寒凍步行冰上口噤不能復叩齒是故鬼因溺著河中耳患風病而齒自叩動者猶尚闢死卻煞鬼矣何患道士真叩齒鳴天鼓具身神耶仙方云常吞液叩齒使人反少以此而言人命便無定限一切皆是夭遏耳若修道精勤如鮑助啄齒何容不得永年正患有時懈替則為鬼所襲同于溺河之斃也凡諸鬼亦是不能靈智乃以風病為多術豈勝謬邪酆都山上樹木水澤如世間但稻米粒幾大味如菱其餘四穀不爾但名稻為重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈炁交被嘉穀應時四節既享祝人以祀神禾鬱乎浩京巨穗橫我玄臺爰有明祥帝者以熙此之謂矣此更說酆都中事仍復及重思耳說祝人有祠者不容有蒸嘗之義當即是前所云獻奉仙官故也又鬼年限足應受餘生亦複死便有祠事矣杜瓊字伯瑜蜀人也, CK-KZ: ''}
