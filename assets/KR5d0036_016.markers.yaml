  - {type: variant, offset: 2890, length: 395, content: 為車騎大將軍兗州刺史鎮廣陵複鎮徐州蘇峻平拜司空改封南昌公猶鎮京兆城咸康五年病亡年七十一也贈太宰諡文成公也北斗君天門亭長今是臧洪臧洪代隗囂又一人是王波新補此亦正是南門爾其餘四明公四宮門亦應大有並不顯出臧洪字子源廣陵射陽人慷慨有節義漢末洪舉義兵誅董卓後為青州及東郡太守背袁紹紹攻圍食盡被擒乃害之隗囂字季孟天水人有才德為物所附前漢末據隴西自稱王建武元年光武伐之憤逼得病兼餓遂亡王波渤海人也晉尚書金史有才能投石虎為中書監被殺紀瞻本為撫河將軍司馬今為北天修門郎代田錄瞻與虞潭更直一日守天門北天猶應是北帝門也紀瞻字思遠丹陽句容人初仕吳為中郎將吳平還洛舉秀才稍遷為會稽太守遷侍中尚書僕射驃騎將軍泰寧三年病亡年七十二贈開府諡穆侯田錄魏武帝時為程昱參軍後為河間太守反叛為閻柔所破爾虞潭字思奧會稽餘姚人即虞翻孫也位至衛將軍右光祿開府武昌侯咸陽八年病亡年七十贈光祿諡孝列侯也魏釗領廬山侯釗字君思會稽人仕晉成穆公世, WYG: 授}
