  - {type: variant, offset: 3231, length: 4, content: 即虞翻孫, CK-KZ: 遷居鄱陽後徙廬江而屬潯陽柴桑晉世累經征討大有功位至侍中太尉都督八州荆江二州刺史長沙公咸和四年還長沙亡於樊谿年七十六贈大司馬諡桓公庾亮代之而郭長翔靈語云陶公正有罪謫未得敘用又別記云陶公亡後少時遣先奮死傳教與其兒相傳云公謝郎連與庾公相言語天上事始判故令郎知于時庾猶存後三四年而亡滕含子並南陽西鄂人永和中爲平南將軍廣州刺史于州病亡諡戴侯陶以其自代資位復是奇懸徐甯字安期東海剡人羡之祖也初桓彝舉與庾亮爲護軍功曹稱爲添岱淸士後仕至正員吏部郎冠軍江州順陽簡侯羡之年少時嘗來形見自稱我是汝祖戒其禍福後並如言蔡謨字道明陳留考城人克子}
