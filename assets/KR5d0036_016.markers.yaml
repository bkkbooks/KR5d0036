  - {type: variant, offset: 5673, length: 0, content: '', CK-KZ: 色亦是淡乎榮利也務光辭湯讓而負石投河宋女恐是子胥所逢浣紗於漂水之陽者後旣投金以報之故謂之金漂漂字或應作漂字耳先世有功在三官流逮後嗣或易世鍊化改氏更生者此七世陰德根葉相及也旣終當遺腳一骨以歸三官餘骨隨身而遷也男留左女留右皆受書爲地下主者二百八十年乃得進受地仙之道矣臨終之日視其形如生人之肉脫死之}
