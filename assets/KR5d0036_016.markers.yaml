  - {type: variant, offset: 2259, length: 359, content: 四人然此四公後並當升仙階也四明主領四方鬼賓友四人其事在後又按後定錄告云邵奭為東明公行上補九宮右保此乃仙階之証而與前不同且啟尚未去邵理不得仙恐脫耳誤云邵耳既云東明公則應猶是啟也其疑事別在後也西明郎十六人主天下房廟鬼之血食此郎亦應是隸西明公房廟血食是受命居職者非謂精邪假附也周顗為鬼官司命帥今以鄧岳程遐二人代以其多事故也周字伯仁汝南安城人仕晉過江位至尚書僕射元帝永昌元年王敦南下遣收於石頭南門被害年五十四追贈光祿開府諡康侯鄧嶽字伯山陳郡人討郭默有功鹹寧初為平南將軍廣州刺史於州病亡辛玄子後云鄧岳為謝幼輿司馬此當是已遷也程遐代郡人為石勒謀臣妹為勒妻官至右僕射開府代郡公勒死為石虎所煞也西明都禁郎賈誼昔為治馬融事不當被黜守泰山泰山君近請為司馬已被可賈誼前漢文帝時為梁孝王傳憂憤嘔血而死後云荀郤為泰山君用曹洪為司馬今當代曹也馬融, CK-KZ: 劉邦}
