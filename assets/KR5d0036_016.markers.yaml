  - {type: variant, offset: 1736, length: 9, content: 聖功不減軒轅顓頊無, WYG: 兒靈語云庾公作撫東大將軍治在東海之東統十萬兵取吾為司馬間者本欲取謝仁祖選官以為資望未足蔣大侯先取為都尉是以拘逼王長豫為長史委以軍事甚有髙稱又云王丞相為尚書令大用事決萬機按如此語即𤣥子所說如復似}
