  - {type: variant, offset: 4005, length: 0, content: '', HFL: 使百鳥山獸巡其墳埏也至忠者能公犯直心精貫白日或剖藏煞身以激其君者也比干今在戎山李善今在少室有得此變鍊者甚多舉此二人爲摽耳比干剖心可爲至忠至於孝子感靈者亦復不少而今止舉李善如似不類當李善之地乃可涉忠而非孝迹也恐以其能存李元後胤使獲繼嗣因此以成其孝功所不論耳若程嬰齊孫杵臼亦應在孝品矣李善字次遜本南陽育陽李元家奴漢建武中元家人之死盡而巨富唯盡一孤兒名續祖尚在孩抱諸奴復共欲煞之而分其才善乃宻負續祖逃瑕丘山中哺養乳乃爲生計至十歲餘出告縣令鍾離意意於是表薦悉收其群奴煞之而立續祖爲家光武拜善爲太子舍人後遷日南九江太守其事迹正是如此而鍾離傳所說少復有異耳夫有上聖之德既終皆受三官書爲地下主者一千年乃轉補三官之五帝或爲東西南北明公以治鬼神復一千四百年乃得遊行太清爲九宫之中仙也以年限言之是聖德更不及忠孝也計此終後凡二千四百年乃得入仙階益知前應是夏啓非召公明矣季子亡後至晋興寧始八百八十許未滿千歲不知那已爲明公耶酆都中所記都無頓說五帝者恐此如北帝之例復有五耶所以後言英雄者爲五帝上相而北帝有秦皇矣又蘇韶傳云揚雄張衡等爲五帝揚張既非上聖爵位亦卑不應得與炎帝爲儔復當或有小五帝不論耳揚張}
