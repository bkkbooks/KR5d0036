  - {type: variant, offset: 5662, length: 0, content: '', CK-KZ: 贈光祿攸從胡叛還時乃棄其己兒自携亡弟之子來渡江遂自無兒絶後嗣謝安歎曰天道無知令鄧伯道無兒右辛玄子所言說冥中事亦多矣今粗書其麤者耳不復一二具說此記雖玄子所受而雜有楊君之辭也楊書不存今有掾寫本耳此紙後又被剪缺恐事亦未必盡夫至忠至孝之人旣終皆受書爲地下主者一百四十}
