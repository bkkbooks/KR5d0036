  - {type: variant, offset: 1865, length: 806, content: 年崩禮云年九十三竹書云年四十五按後云四明公並得升仙階而不道北斗君既仰隸玉晨亦應預同遷品耳夏啟為東明公領斗君師禹之子也姓姒竹書云即位三十九年亡年七十八自崩滅後至今己卯歲允二千四百二十五年安司命說格在位二千四百年得上補九宮如此則宋元徽四年去矣文王為西明公領北帝師文王名昌禮云年九十七亡此父子並得稱聖德而不免官鬼雖為煞戮之過亦當是不學仙道故也邵公奭為南明公邵公名奭文王庶子食採於邵封於燕國按周公邵公太公俱佐命克紂公在不殊而周公有聖德仙鬼之中並無顯出太公執旄秉鉞威罰最深乃載出列仙邵公恩流甘棠翻為魁職亦復難了皆當各緣其根本業分故也酆都唯有六宮而周文王父子頓處其三明周德之崇深矣吳季札為北明公吳王壽夢之少子闔閭之叔父太伯之後也亦姬姓讓國居乎延陵今季子廟是也雖有仁賢之德乃亞乎先聖亦有殊例尋此諸公前後參差當是道時代謝用人也自夏啟已來二千餘年方得遷改乃十倍於地下主者之數明仙家品例故為貴妙四明公復有賓友四人然此四公後並當升仙階也四明主領四方鬼賓友四人其事在後又按後定錄告云邵奭為東明公行上補九宮右保此乃仙階之証而與前不同且啟尚未去邵理不得仙恐脫耳誤云邵耳既云東明公則應猶是啟也其疑事別在後也西明郎十六人主天下房廟鬼之血食此郎亦應是隸西明公房廟血食是受命居職者非謂精邪假附也周顗為鬼官司命帥今以鄧岳程遐二人代以其多事故也周字伯仁汝南安城人仕晉過江位至尚書僕射元帝永昌元年王敦南下遣收於石頭南門被害年五十四追贈光祿開府諡康侯鄧嶽字伯山陳郡人討郭默有功鹹寧初為平南將軍廣州刺史於州病亡辛玄子後云鄧岳為謝幼輿司馬此當是已遷也程遐代郡人為石勒謀臣妹為勒妻官至右僕射開府代郡公勒死為石虎所煞也西明都禁郎賈誼昔為治馬融事不當被黜守泰山泰山君近請為司馬已被可賈誼前漢文帝時為梁孝王傳憂憤嘔血而死後云荀郤為泰山君用曹洪為司馬今當代曹也馬融字季長扶風人也博學有才理鄭玄之師也仕後漢為南郡太守未嘗按劍殺人忤梁冀被徙朔方于路自刺不死後赦還拜議郎延壽九, HFL: ''}
