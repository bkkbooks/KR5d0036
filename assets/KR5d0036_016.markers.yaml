  - {type: variant, offset: 3290, length: 0, content: '', HFL: 司馬王文度鎮廣陵忽見卒來召作平北將軍徐兖二州刺史王云我今已作此官卒云此是天上職耳須臾去尋迎至而亡失天地間事理乃不可限以胷臆而尋之此幽顯中都是有三部皆相關類也上則仙中則人下則鬼人善者得爲仙仙之謫者更爲人人惡者更爲鬼鬼福者復爲人鬼法人人法仙循還徃來觸類相同正是隱顯小小之隔耳達者監之便无復所關荀顗取顧衆爲太山將軍用曹洪爲司馬桓範爲長史顧衆字長始吴郡人顧愷孫顧祕子也仕晋}
