  - {type: variant, offset: 3269, length: 1, content: 廬, YP-C: 一萬兵鎮處亦有數百處也領數千兵鎮處亦有數百處更相統隸耳皆有長史司馬王文度鎮廣陵忽見卒來召作平北將軍徐兖二州剌史王云我今已作此官卒云此是天上職耳須臾去尋迎至而亡失天地間事理乃不可限以胸臆而尋之此幽顯中都是有三部皆相關類也上則仙中則人下則鬼人善者得爲仙仙之謫者更爲人人惡者更爲鬼鬼福者復爲人鬼法人人法仙循還往來觸類相同正是隱顯小小之隔耳達者監之便无復所關荀顗取顧眾爲太}
