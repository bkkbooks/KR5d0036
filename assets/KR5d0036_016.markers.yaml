  - {type: 'tls:seg', offset: 4655, content: '', id: KR5d0036_tls_016-35a.6}
  - {type: punctuation, offset: 4661, content: ，, id: KR5d0036_tls_016-bkkpn875}
  - {type: 'tls:seg', offset: 4661, content: '', id: KR5d0036_tls_016-35a.7}
  - {type: variant, offset: 4664, length: 949, content: 我常行叩齒鳴打天鼓以警身中諸神神不敢散鬼氣不得入是以無有緣趣得煞之耳以此論之若助不行冰渡河亦可出千歲壽不啻也當是遇大寒凍步行冰上口噤不能復叩齒是故鬼因溺著河中耳患風病而齒自叩動者猶尚闢死卻煞鬼矣何患道士真叩齒鳴天鼓具身神耶仙方云常吞液叩齒使人反少以此而言人命便無定限一切皆是夭遏耳若修道精勤如鮑助啄齒何容不得永年正患有時懈替則為鬼所襲同于溺河之斃也凡諸鬼亦是不能靈智乃以風病為多術豈勝謬邪酆都山上樹木水澤如世間但稻米粒幾大味如菱其餘四穀不爾但名稻為重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈炁交被嘉穀應時四節既享祝人以祀神禾鬱乎浩京巨穗橫我玄臺爰有明祥帝者以熙此之謂矣此更說酆都中事仍復及重思耳說祝人有祠者不容有蒸嘗之義當即是前所云獻奉仙官故也又鬼年限足應受餘生亦複死便有祠事矣杜瓊字伯瑜蜀人也博學有才思注韓詩兼明數術逆記魏當代漢仕劉禪時為鴻臚太常延熙十三年亡年八十餘耳侍帝晨有八人徐庶龐德爰愉李廣王嘉何晏解結殷浩並如世之侍中李廣漢武驍騎將軍征匈奴時被吏譴憒慨自刎而死王嘉蜀郡人平帝時為郎中至王莽乃棄官還鄉不肯臣公孫述伏劍而死徐庶字元直潁川人薦諸葛亮於劉備後魏武虜其母乃歸魏仕至中丞明帝大和中病亡龐德字令明南安人隨張鎮南降魏武拜立義將軍屯樊城為關羽所害諡杜侯迎喪葬鄴身首如生爰愉字世都濮陽人有才辨多術藝事晉武闢司徒魏舒府位至侍中中書令監解結字稚連濟南人係弟也一仕晉黃門侍郎中丞荊豫川刺史尚書趙王倫時為孫秀所害也何殷二人以注在前前所說唯道二人今當是更請問乃悉具顯之四明公及北斗君並有侍帝晨五人其向者八人是北大帝官隸耳選用亦同侍帝晨之號仙官亦有俱是侍中位也此言選用並同不知止取名位當品才識兼論功德耶此諸人才位永不相類恐幽途所詮別當有以耳又有中郎直事四人如世之尚書也戴淵公孫度劉封郭嘉今見在職封者是玄德之養子此職應是太帝領僚如今散曹尚書耳戴淵字若愚廣陵人也仕晉歷位至護軍尚書僕射驃騎將軍與周俱為王敦所害贈光祿諡簡侯公孫度字叔濟遼東人淵之祖也初為遼東太守建安中遂僭號稱王建大子羽儀傳國子康至孫淵被司馬宣王所煞劉封本羅侯寇氏子劉備未有兒養為息性剛猛有氣力武藝後建節度賜死此異族為嗣亦是仍得襲姓也郭嘉者字奉孝潁川陽翟人魏武謀臣為軍謀祭酒病亡年三十八諡真侯也玄德今為北河侯與韓遂對統今屬仙官仙官又有北河司命禁保侯亦司, WYG: ''}
