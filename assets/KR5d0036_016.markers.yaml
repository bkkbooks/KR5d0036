  - {type: variant, offset: 1272, length: 765, content: 母也忠晉初東平太守忠祖父田舍人耳而多行陰德常大雪寒凍而不覆積稻常露穀於園庭恆恐鳥雀饑死其用心如此李忠不顯晉書如此說則妻複似是緣夫之功而夫身反不見有所果亦難可詳言王進賢王衍女也事詳在後郭叔香者王修母王修字叔治北海人為魏武郎中令年七歲喪母母以杜日亡不知是郭誰女也其童初府有王少道范叔勝李伯山皆童初府之標者少好道漢時人王遁兒也漢時山陽太守范叔勝北地人也魏文帝黃門郎李伯山李沖父也沖漢時為白馬令行陰德或積世有道中行所鍾此二府仙人皆一進再進得入此項梁城作酆宮誦曰紂絕摽帶晨諒事遘重阿炎如霄中煙勃若景曜華武陽帶神鋒恬昭吞青河閶闔臨丹井雲門鬱嵯峨七非通奇蓋連宛亦敷魔六天橫北道此是鬼神家誦有二萬言今略道六天之宮名抄出之耳夜中亦可微讀之亦云辟鬼邪前第三宮名武城今云武賏或當是有兩名也蘇韶傳云是之聖者有項梁義賢者有美季子但不知項是何世人也或恐是項羽之叔項梁而不應聖于季子也酆都稻名重思其米如石榴子粒異大色味如菱亦以上獻仙官後又有敘重思事既是異日所說兩出自非嫌石榴子即世之安石榴也炎慶甲者古之炎帝也今為北太帝君天下鬼神之主也炎帝神農氏造耕稼嘗百藥其聖功不減軒轅顓頊無應為鬼帝又黃帝所伐大庭氏稱炎帝恐當是此非神農也又外書云神農牛首今佛家作地獄中主煞者亦牛首複致疑焉四明公升擢既有年限太帝位秩亦應加崇極此雖已三千餘年或恐如世中帝王不轉而公輔屢遷也武王發今為鬼官北斗君文王之子周武王也姓姬名發伐殷紂而為天子即位二年崩禮云年九十三竹書云年四十五按後云四明公並得升仙階而不道北斗君既仰隸玉晨亦應預同遷品耳夏啟為東明公領斗君師禹之子也姓姒竹書云即位三十九年亡年七十八自崩滅後至今己卯歲允二千四百二十五年安司命說格在位二千四百年得上補九宮如此則宋元徽四年去矣文王為西明公領北帝師文王名昌禮云年九十七亡此父子並得稱聖德而不免官鬼雖為煞戮之過亦當是不學仙道故也邵公奭為, CK-KZ: 爲}
