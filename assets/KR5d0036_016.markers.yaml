  - {type: variant, offset: 3386, length: 0, content: '', HFL: 侯所以止道或不稱姓而顗復云姓恐以分别周顗也所說人多是近世當由代謝參差兼易憶識者矣三代乃遠而兩漢魏晋實有一段才名人如劉向董仲舒揚雄張衡蔡邕鄭玄王弼阮嵇之儔並不應空散數術有如管郭亦無標迹故當多不隸三官頗得預於仙家驅任矣前論帝王中亦不均魏文晋武受命之主而不顯反言魏武晋宣孫權應與劉備同亦不載道策此並當啓國之基功高樂推故也其繼體守文之君都無所岀矣右以前後兩過受事皆是楊君受㫖書多儳治又掾更寫兩本悉無異並各成一卷相隨始末訖此耳許肇今爲東明公右帥晨帥晨之任如世間中書監許肇字子阿即長史七代祖}
