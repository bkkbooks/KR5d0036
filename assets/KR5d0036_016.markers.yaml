  - {type: variant, offset: 3890, length: 0, content: '', WYG: 軒外交遺景附圓曜嘉音何寥寥此篇叙事迹之本志也寂通寄興感𤣥炁攝動音髙輪雖參差萬仞故來尋蕭蕭研道子合神契靈衿委順浪世化心標窈窕林同期理外逰相與静東岑此篇申情寄之來縁也命駕廣酆阿逸跡超𡨕鄉空中自有物有中亦無常悟言有无際相與㑹濠梁目擊𤣥解了鬼神理自忘此篇論人鬼之幽致也𤣥子云魏時辛毗字佐治是七世之孫也漢建武一年從隴西徙居潁川陽翟縣毗仕魏世使持節大將軍司馬宣王軍帥衞尉封侯毗子名敞為河内太守太常卿所說並與魏書同也𤣥子云庾生者晉庾太尉也北帝往用為撫東將軍後又轉為東海侯今又用為酆䑓侍帝晨右禁監近取馮懷為司馬侍帝晨如今世侍中右禁監如世右衞將軍而甚重如說與前大異}
