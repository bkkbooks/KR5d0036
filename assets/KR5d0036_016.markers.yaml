  - {type: variant, offset: 3381, length: 477, content: 十四贈侍中司徒諡穆公外書不顯範明唯前漢有范明友恐非是此人又誥試許先生者稱典柄侯周魴主非吏者嚴白虎尋典柄侯猶應是典柄呼之脫到爾周魴字子魚吳郡陽羨人周處父也仕吳為鄱陽太守甚有威惠嚴白虎者吳郡人也以孫策時入山聚眾策討之乃散奔餘杭死弟名輿亦勇健策偽與會乃戟刺殺之爾殷浩侍帝晨與何晏對此有八人事在後殷浩字淵源陳留長平人康帝建元初為楊州刺史永和六年進中軍將軍都督五州北伐姚襄敗還為桓溫所廢徙東陽永和十二年以憂亡善能譚論後與何晏對也晏字平叔何進孫善言玄理位至侍中尚書黨曹爽為司馬宣王所誅溫太真為監海開國伯治東海近收杜預為長史位比大將軍長史溫嶠字太真太原祁人仕晉為江左平南將軍江州刺史下平蘇峻位至驃騎將軍開府封始五公咸和四年病亡年四十二贈太將軍諡中武公杜預字元凱京兆杜陵人博識多智注春秋仕晉起家尚書郎位至都督荊州鎮襄陽伐吳有功封當陽侯太康五年還洛於鄧縣病亡年六十三葬洛陽贈征南大將軍諡成侯何次道始從北帝內禁御史得還朱火宮受化以其多施惠之功故也後辛玄子亦云如此次道名充廬江潛人位至尚書令驃騎將軍除揚州刺史錄尚書輔正世業奉佛多施惠立功德每為善事以永和二年正月戊寅病亡年五十五, CK-KZ: ''}
