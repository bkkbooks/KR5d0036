  - {type: variant, offset: 3874, length: 0, content: '', WYG: 陰德故未蒙受化既福流後葉方使上拔然後為九宮之仙耳此帥晨之官}
  - {type: variant, offset: 3876, length: 0, content: '', WYG: 亦並應有之邵奭為東明}
  - {type: variant, offset: 3877, length: 0, content: '', WYG: 云行上補九宫右保公前云邵為南明公今乃是東若非名號之誤則東南之差既尋當遷擢則必應是啓中君脫爾云邵耳亦可是有甘棠之德故不限其年月耳右七月十六日夜定録君所告此二條别受不關酆記部辛𤣥子自叙幷詩此下翦除半行去不知當是何字也𤣥子字延期隴西定谷人漢明帝時諌議大夫上洛雲中趙國三郡太守辛隱之子辛隱字某某檢外書未得此位業按諸辛舊關隴豪族前漢有辛慶忌後漢有辛繕並髙直之士辛毗是其七世孫則隱是毗之八世祖但一百四五十年中}
  - {type: page-break, offset: 3877, content: '', id: KR5d0036_WYG_016-6b, image: WYG1059/WYG1059-0466b.png}
  - {type: variant, offset: 3878, length: 1, content: 猶, WYG: 已八世嫌其太促耳𤣥子少好道遵奉法戒至心苦行日中菜食錬形守精不遘外物州府辟聘一無降就遊山林棄世風塵志願憑子晉於緱岑侣陵陽於步𤣥故改名為𤣥子而自字延期矣不圖先世之多愆殃流子孫眚刋於帝簡運沈逮於後昆享年不永遂没命於長梁之津西王母見我苦行酆都北帝愍我道心告勑司命傳檄三官攝取形骸還魂復眞使我頥胎位為靈神於今二百餘年矣溺水致命事同王衍之女恐即此形骸皆不復}
  - {type: page-break, offset: 3878, content: '', id: KR5d0036_WYG_016-7a, image: WYG1059/WYG1059-0466c.png}
