  - {type: variant, offset: 5666, length: 3, content: 諡昭烈, CK-KZ: 官書爲地下主者一千年乃轉補三官之五帝或爲東西南北明公以治鬼神復一千四百年乃得遊行太淸爲九宫之中仙也以年限言之是聖德更不及忠孝也計此終後凡二千四百年乃得入仙階益知前應是夏啟非召公明矣季子亡後至晉興甯始八百八十許未滿千嵗不知那已爲明公耶酆都中所記都無頓說五帝者恐此如北帝之例復有五耶所以後言英雄者爲五帝上相而北帝有秦}
  - {type: variant, offset: 5666, length: 3, content: 諡昭烈, CK-KZ-jye: 官書爲地下主者一千年乃轉補三官之五帝或爲東西南北明公以治鬼神復一千四百年乃得遊行太淸爲九宫之中仙也以年限言之是聖德更不及忠孝也計此終後凡二千四百年乃得入仙階益知前應是夏啟非召公明矣季子亡後至晉興甯始八百八十許未滿千嵗不知那已爲明公耶酆都中所記都無頓說五帝者恐此如北帝之例復有五耶所以後言英雄者爲五帝上相而北帝有秦}
