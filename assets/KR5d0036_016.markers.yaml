  - {type: variant, offset: 3869, length: 4, content: 鬼職雜位, WYG: 書多儳治又掾更寫兩本悉無異並各成一卷相隨始末訖此耳許肇今為東明公右帥晨帥晨之任如世間中書監許肇字子阿即長史七代祖師徒敬也雖有賑救之功而}
  - {type: page-break, offset: 3869, content: '', id: KR5d0036_WYG_016-6a, image: WYG1059/WYG1059-0466a.png}
  - {type: variant, offset: 3870, length: 127, content: 職雜位非四明公而猶得受化朱宮升居仙品者此當是深功厚德之所致也魏武帝為北君太傅北君則北斗君周武王也四明各有賓友恐北斗君不置此職當以太傅准之魏武帝曹操沛國譙人英在撥亂匡定天下封魏王加九錫獻帝建安一十五年正月病亡年六十六此年十月魏文仍受禪追贈太祖武皇帝也其餘多, CK-KZ: 鬼}
