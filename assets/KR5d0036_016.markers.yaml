  - {type: variant, offset: 5665, length: 0, content: '', CK-KZ: 年聽一試進也此地下主者亦卽是洞中所記李更等者非別鬼官復爲主者也一百四十年一進便入第二等給仙人使乃得稍受道教耳至孝者能感激鬼神使百鳥山獸巡其墳埏也至忠者能公犯直心精貫白日或剖藏煞身以激其君者也比干今在戎山李善今在少室有得此變鍊者甚多舉此二人爲摽耳比干剖心可爲至忠至於孝子感靈者亦復不少而今止舉李善如似不類當李善之地乃可涉忠而非孝迹也恐以其能存李元後胤使獲繼嗣因此以成其孝功所不論耳若程嬰公孫杵臼亦應在孝品矣李善字次遜本南陽育陽李元家奴漢建武中元家人之死盡而巨富唯盡一孤兒名續祖尙在孩抱諸奴復共欲煞之而分其才善乃密負續祖逃瑕邱山中哺養乳乃爲生計至十嵗餘出告縣令鍾離意意於是表薦悉收其群奴煞之而立續祖爲家光武拜善爲太子舍人後遷日南九江太守其事迹正是如此而鍾離傳所說少復有異耳夫有上聖之德旣終皆受}
  - {type: page-break, offset: 5665, content: '', id: KR5d0036_CK-KZ_04p019a, image: JY237/CK-KZ_JY237_04p019a.png}
