  - {type: variant, offset: 3900, length: 3, content: 魏武帝, WYG: 左禁監是謝幼輿以鄧岳為司馬此則准左衞將軍也幼輿名鯤即謝安伯謝尚之父也為王敦長史豫章郡太守年五十三病亾贈太常諡康侯鄧岳已在前而云代周顗為司馬帥耳郄南昌公先}
  - {type: variant, offset: 3905, length: 1, content: 君, WYG: 帝南朱陽大門靈關侯後又轉為髙明司直昔坐與劉慶孫爭免官今始當復職也髙明司直如世尚書僕射前云郄為南門亭長亭長恐即靈關之職既以周撫代故得轉司直而郭長翔靈語亦云郄公甚屈為天門亭長舊選常用州征二千石未有三公作也如此所以得速遷劉慶孫名輿中山人劉越石之兄也才識辯贍為東海王越長史永嘉中病指疽而亾年四十七贈驃騎將軍諡眞侯也何次道今在南宫承華臺中已得受書行至南嶽中此人在世施惠之功甚多故早得返形前荀公說何始得還朱火今言已受書則𤣥子所受後成在後耳周伯仁近見用為西明公中都䕶中都䕶如世}
