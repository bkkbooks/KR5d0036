  - {type: variant, offset: 22, length: 219, content: 六合為言當是於中國指向也則當正對幽州遼東之北北海之中不知去岸幾萬里耳山高二千六百里周迴三萬里其山下有洞天在山之周迴一萬五千里其上其下並有鬼神宮室山上有六宮洞中有六宮輒周回千里是為六天鬼神之宮也周回一萬五千五百為宮周回一千里者三百二十五所今此六宮止得六所爾其餘宮尚三百一十九所計不容頓耳恐所言或有舛漏處也山上為外宮洞中為內宮制度等耳此山既非人跡所及故山上可以得立容不知山複有幾洞門也第一宮名為紂絕陰天宮以次東行以周回論之洞中直東西有三千七百, WYG: 安漢社稷被疑懼服藥自盡年}
