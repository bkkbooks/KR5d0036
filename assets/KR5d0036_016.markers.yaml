  - {type: variant, offset: 5634, length: 468, content: 是相統屬矣劉備字玄德涿郡人初起義兵後遂據蜀稱尊號三年病亡年六十三諡昭烈皇帝尋于時同為三國之主魏武孫策今位任皆高劉此職雖小而隸仙官其優劣或可得相匹也韓遂字文紂某某人漢末阻兵構亂西土建安二十五年魏武伐之奔金城之內為其將芃演等所害遂乃驍雄而未免寇難乃得與劉備對仕殊為不類兼隸仙官益復超顯也又有大禁晨二人如今尚書令漢光武及孫文臺二人居之光武劉秀字文叔高祖八代孫起兵討王莽赤眉平定天下即位三十三年病亡年六十三孫堅字文台吳郡人策父也袁術表為破虜將軍豫州刺史討董卓後伐劉表初平二年為表將軍黃祖部下人所射亡年三十七堅雖忠烈而位微今與天子同職亦似韓遂之匹玄德也又有中禁晨如今之中書令監有二人顏懷楊彪二人居之懷字思季彪字文先者顏懷字思季未得此人楊彪字文先弘農人漢司空楊修父也值董卓悖亂扶濟獻帝東西危苦備經三司至魏文黃初六年乃亡年八十四許長史父今為彈方侯彈方侯有二人各司南北許長史為南彈方侯劉贊為司馬鮑勛為北彈方侯韋遵為司馬亦各主南北門籥許領威南兵千人鮑勛領威北兵千人大都備門主收執而已如今世有羽林監威南威北兵如道家天丁力士甲卒之例也二禁晨及南北彈方侯亦應並, HFL: ''}
