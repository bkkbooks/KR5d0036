  - {type: variant, offset: 3267, length: 1, content: 釗, HFL: 晋凡有三劉陶後漢者字子竒潁川人也靈帝侍中尚書令後繫獄閉炁而死魏世者字季冶淮南人劉曄之子也才辨而無行曹爽用爲選部郎後出平源太守景王誅之晋初者字正輿沛國人永嘉中爲揚州刺史此三人不知何者是東越大將軍以意言之多是正輿耳荀顗爲太山君荀顗字景倩彧第四子也博學有詞理佐命晋世起家爲黄門郎遷尚書僕射司空太尉太傅太始十年亡年七十謚曰康公蘇韶傳云劉孔才爲太山公欲反北帝已誅滅之孔才即劉邵也又梅頤爲豫章太守夢被召作太山府君克日便亡不知此二位與君復各是異職否耳又云有太山令}
  - {type: page-break, offset: 3267, content: '', id: KR5d0036_HFL_016-004a, image: hfl/0640/0640-010.png}
