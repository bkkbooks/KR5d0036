  - {type: variant, offset: 3405, length: 0, content: '', HFL: 即此形骸皆不復得生並是反質胎神耳雖有道心而無道業故不得便居仙品也近得度名南宫定策朱陵藏精待時方列爲仙而大帝今且見差領東海侯代庾生又見選補禁元中郎將爲吴越鬼神之司王事靡盬斯亦勞矣若夫冠晨佩青蕭條羽袂鳴鈴仙階轉軿瓊室者雖實素心而卒日也恨未便得與玄眞併羅同晏琨墉察鈞韶之遺音掇靈芝乎幽峯振翠衣於九霄儛玄翮於十方耳方當攝御群鬼領理是}
