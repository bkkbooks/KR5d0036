  - {type: variant, offset: 4054, length: 2, content: 敘述, HFL: 非故爲皎潔者也王陽先漢人也夫至貞者紛華不能散其正炁萬乘不能激其名操也男言之務光之行有似矣女言之未金漂女是也貞者非止不淫於色亦是惔乎榮利也務光辭湯讓而負石投河宋女恐是子胥所逢浣紗於漂水之陽者後既投金以報之故謂之金漂漂字或應作漂字耳先世有功在三官流逮後嗣或易世鍊化改氏更生者此七世隂德根葉相及也既終當遺脚一骨以歸三官餘骨隨身而遷也男留左女留右皆受書爲地下主者二百八十年乃得進受地仙之道矣臨終之日視其形如生人之肉脫死之時尸不强直足指不青}
