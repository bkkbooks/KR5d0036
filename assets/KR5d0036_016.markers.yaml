  - {type: variant, offset: 5511, length: 1, content: 煞, CK-KZ: 說並與魏書同也玄子云庾生者晉庾太尉也北帝往用爲撫東將軍後又轉爲東海侯今又用爲酆臺侍帝晨右禁監近取馮懷爲司馬侍帝晨如今世侍中右禁監如世右衞將軍而甚重如說與前大異當是後遷侍中領衞便是勝中懷將軍也帝晨無司馬此是右禁之職耳馮衞字祖思長樂人晉成帝時爲太常散騎常侍卒追贈金紫光祿階也左禁監是謝幼輿以鄧岳爲司馬此則准左衞將軍也幼輿名鯤卽謝安伯謝尙之父也爲王敦長史豫章郡太守年五十三病亡贈太常諡康侯鄧岳已在前而云代周顗爲司馬帥耳郄南昌公先爲北帝南朱陽大門靈關侯後天轉爲高明司直昔坐與}
