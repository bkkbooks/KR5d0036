  - {type: variant, offset: 5991, length: 339, content: 許長史父今為彈方侯彈方侯有二人各司南北許長史為南彈方侯劉贊為司馬鮑勛為北彈方侯韋遵為司馬亦各主南北門籥許領威南兵千人鮑勛領威北兵千人大都備門主收執而已如今世有羽林監威南威北兵如道家天丁力士甲卒之例也二禁晨及南北彈方侯亦應並是北帝官屬也受此語時未必不呼許名恐是楊自不疏之耳北帝咒所謂威南威北即謂此兵當是驍勇者也許氏事具在別篇劉贊字正明會稽長山人少為部吏好讀兵書慷慨有大志擊黃巾賊傷足一腳屈遂自割筋得伸後為左護軍與孫峻征淮南未至病困為魏將蔣班所逼被害年七十三鮑勛字叔業鮑宣九世孫即鮑信子也清白有高節漢建安中為中庶子黃門郎魏文帝御史中丞數諫諍忤旨左遷治書執法後被誅韋遵字公藝吳人即韋昭之孫也博學有文才善書仕晉成穆之世為尚書左民郎中書黃門侍郎代王逸少為臨川郡守以母憂亡年六十四也孫策為東, WYG: ''}
