  - {type: variant, offset: 3401, length: 3, content: 范明友, HFL: 辛慶忌後漢有辛繕並高直之士辛毗是其七世孫則隱是毗之八世祖但一百四五十年中而已八世嫌其太促耳玄子少好道遵奉法戒至心苦行日中菜食鍊形守精不遘外物州府辟聘一無降就遊山林棄世風塵志願憑子晋於緱岑侣陵陽於步玄故改名爲玄子而自字延期矣不圖先世之多愆殃流子孫結眚刊於帝簡運沉逮於後昆享年不水遂没命於長梁之津西王母見我苦行酆都北帝愍我道心告勑司命傳檄三官攝取形骸還魂復眞使我頤胎位爲靈神於今二百餘年矣溺水致命事同王衍之女}
  - {type: page-break, offset: 3401, content: '', id: KR5d0036_HFL_016-007a, image: hfl/0640/0640-016.png}
