  - {type: variant, offset: 4002, length: 1, content: 蓋, HFL: 具說此記雖玄子所受而雜有楊君之辭也楊書不存今有掾寫本耳此紙後又被剪缺恐事亦未必盡夫至忠至孝之人既終皆受書爲地下主者一百四十年乃得受下仙之教授以大道從此漸進得補仙官一百四十年聽一試進也此地下主者亦即是洞中所記李更等者非别鬼官復爲主者也一百四十年一進便入第二等給仙人使乃得稍受道教耳至孝者能感激}
