  - {type: variant, offset: 3865, length: 1, content: 按, WYG: 尋此不擒叛將亦是鬼鬼不能相制由如人也人皆非自然威攝仙真猶尚握節持鈴以勒此輩而况其問𩔖乎四鎮皆領鬼兵萬人中官領兵不過數千四鎮有泰山君盧龍公東越大將軍南巴侯四官各領萬人四鎮非正是四方今此處並在中國迴還不過數千里耳他方復應大有所以後言數百處也何曾為南巴侯何曾字潁考陳郡陽夏人何䕫子也性豪侈而博學孝悌初仕魏世稍遷尚書征北將軍司徒封朗陵侯晉太尉太保太宰朗陵公太始四年十年八十餘諡曰元公曹仁為盧龍公曹仁字子孝魏武從弟雄勇冠世善弓馬數從征伐有功位至車騎將軍都督荆揚益州諸軍事大將軍封陳侯黄初四年病亾年五十六諡曰忠侯也劉陶為東越大將軍漢魏晉凡有三劉陶後漢者字子奇潁川人也靈帝侍中尚書令後繫獄閉炁而死魏世者字季冶淮南人劉曄之子也才辨而无行曹爽用為選部郎後出平原太守景王誅之晉初者字正輿沛國人永嘉中為揚州刺史此三人不知何者是東越大將軍以意言之多是正輿耳荀顗為太山君荀顗字景倩彧第四子也博學有詞理佐命晉世起家為黄門郎遷尚書僕射司空太尉太傅太始十年亾年七十諡曰康公蘇韶傳云劉孔才為太山公欲反北帝已誅滅之孔才即劉劭也又梅頥為豫章太守夢被召作太山府君克日便亾不知此二位與君復各是異職否耳又云有太山令領一萬兵鎮處亦有數百處也領數千兵鎮處亦有數百處更相統𨽻耳皆有長史司馬王文度鎮廣陵忽見卒來召作平北將軍徐兖二州刺史王云我今已作此官卒云此是天上職耳須叟去尋迎至而亾夫天地間事理乃不可限以胷臆而尋之此幽顯中都是有三部皆相關𩔖也上則仙中則人下則鬼人善者得為仙仙之謫者更為人人惡者更為鬼鬼福者復為人鬼法人人法仙循瓊往來觸𩔖相同正是隱顯小小之隔耳達者監之便无復所關荀顗取顧衆為太山將軍用曹洪為司馬桓範為長史顧衆字長始吳郡人顧愷孫顧祕子也仕晉丹陽尹領軍尚書僕射永和二年亾年七十三追贈特進諡靖伯曹洪字子亷魏武從弟家大富而儉恡數征伐為驃騎將軍封樂成侯太和六年病亾桓範字元則沛國人有才學籌䇿仕魏世位至大司農黨曹爽被誅也王逸少有事繫禁中已五年云事已散即王右軍也受時不欲呼楊君名所以道其字耳逸少即王廙兄曠之子有風炁善書後為㑹稽太守永和十一年去郡告靈不復仕先與許先生周旋頗亦慕道至昇平五年辛酉歲亾年五十九今乙丑年説云五年則亾後被繫被繫之事檢迹未見其咎恐以懟憾告靈為謫耳蔣濟為南山伯領二千兵蔣濟字子通楚國平阿人仕漢魏厯位至太尉從宣王誅曹爽其年亾諡景侯為領軍時有其婦夢亾兒為太山五伯來迎太廟西孫阿為太山令求囑阿乞轉在好處濟即為仍之阿亦即亾後又夢云已蒙轉録事凡}
