  - {type: variant, offset: 4430, length: 1, content: 孟, HFL: 耳右此五條皆積行獲仙不學而得但爲階級之難造道用年歲耳要自得度名方諸不復承受三官之號令矣此雖五條而有七事事中復有輕重非至志者亦不辦得此例也今預在學道之品微微小業便可與之比肩呪乃眞妙者乎由是言之可不自督耳諸有英雄之才彌羅四海誅暴整亂拓平九州建號帝王臣妾四海者既終受書於三官四輔或爲五帝上相或爲四明公賔友以助治百鬼綜理死生者此等自奉屬於三官永無進仙之冀坐煞伐積酷害生死多故也酆宫中諸人職皆是矣疑荀彧一人清秀整潔非跋扈虐害唯以謀謨智策佐魏武耳乃得爲賔友與漢高等比位恐當别有㫖趣凡在世有才識藝解爲一時所稱者既没並即隨才受其職位不必執其在生之小罪}
  - {type: page-break, offset: 4430, content: '', id: KR5d0036_HFL_016-013a, image: hfl/0640/0640-028.png}
