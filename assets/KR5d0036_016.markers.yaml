  - {type: variant, offset: 3868, length: 0, content: '', WYG: 例鬼官職位雖略因生時貴賤而大有舛駁皆由德業之優劣功過之輕重更品其階叙不復得全依其本基耳王廙為部鬼將軍廙字世將瑯琊人修齡父也多才藝攻書善屬文解音聲位至平南將軍荆州刺史年四十七病亾贈驃騎諡康侯也此有職位者粗相識耳其無位者不可一二盡知之如此散者無限數也此皆後段所說似猶是荀中候所以止道或不稱姓而顗復云姓恐以分别周顗也所說人多是近世當由代謝參差兼易憶識者矣三代乃逺而兩漢魏晉實有一段才名人如劉向董仲舒揚雄張衡蔡邕鄭𤣥王弼阮嵇之儔並不應空散數術有如管郭亦無標迹故當多不𨽻三官頗得預於仙官驅任矣前論帝王中亦不均魏文晉武受命之主而不顯反言魏武晉宣孫權應與劉備同亦不載道䇿此並當啓國之基功髙樂推故也其繼體守文之君都無所出矣右以前後兩過受事皆是楊君受}
