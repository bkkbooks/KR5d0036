  - {type: variant, offset: 5674, length: 2, content: 同為, CK-KZ: 尸不强直足指不靑手足不皺者謂之先有德行自然得尸解者也此是先世有陰功密德不拘於迹者旣非己身所辦故以一骨酬副}
  - {type: variant, offset: 5674, length: 2, content: 同為, CK-KZ-jye: 尸不强直足指不靑手足不皺者謂之先有德行自然得尸解者也此是先世有陰功密德不拘於迹者旣非己身所辦故以一骨酬副}
  - {type: variant, offset: 5676, length: 314, content: 三國之主魏武孫策今位任皆高劉此職雖小而隸仙官其優劣或可得相匹也韓遂字文紂某某人漢末阻兵構亂西土建安二十五年魏武伐之奔金城之內為其將芃演等所害遂乃驍雄而未免寇難乃得與劉備對仕殊為不類兼隸仙官益復超顯也又有大禁晨二人如今尚書令漢光武及孫文臺二人居之光武劉秀字文叔高祖八代孫起兵討王莽赤眉平定天下即位三十三年病亡年六十三孫堅字文台吳郡人策父也袁術表為破虜將軍豫州刺史討董卓後伐劉表初平二年為表將軍黃祖部下人所射亡年三十七堅雖忠烈而位微今與天子同職亦似韓遂之匹玄德也又有中禁晨如今之中書令監有二人顏懷楊彪二人居之懷字思季彪字文先者顏懷字思季未得此人楊彪字文先弘農人漢司空楊修父也值董卓悖亂扶濟獻帝東西危苦備經三司至魏文黃初六年乃亡年八十, WYG: ''}
  - {type: variant, offset: 5677, length: 1, content: 國, CK-KZ: 官也此骨恐是質形之骨非神形之骨旣被遺落當復重生之耳火都論仙鬼中諸人在世有刳腹刎頸支體分裂死者永自不關後形其神先以離出故今形可得而斃傷殘初不斷神矣而世或有見鬼身不全者蓋是尸魄託骸者耳非其大神本經}
