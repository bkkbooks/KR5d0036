  - {type: variant, offset: 3394, length: 178, content: 顯範明唯前漢有范明友恐非是此人又誥試許先生者稱典柄侯周魴主非吏者嚴白虎尋典柄侯猶應是典柄呼之脫到爾周魴字子魚吳郡陽羨人周處父也仕吳為鄱陽太守甚有威惠嚴白虎者吳郡人也以孫策時入山聚眾策討之乃散奔餘杭死弟名輿亦勇健策偽與會乃戟刺殺之爾殷浩侍帝晨與何晏對此有八人事在後殷浩字淵源陳留長平人康帝建元初為楊州刺史永和六年進中軍將軍都督五州北伐姚襄敗還為桓溫所廢徙東陽, WYG: 受}
