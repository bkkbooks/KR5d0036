  - {type: variant, offset: 3196, length: 2, content: 田錄, CK-KZ: 晉武受禪追諡高祖宣皇帝荀彧爲北明公賓友荀彧字文若穎川人漢武末爲尙書令有風儀識鑒初爲魏武謀臣欲以安漢社稷被疑懼服藥自盡年五十諡敬侯追贈太尉荀之列在賓友亦如延陵之匹四明位雖非亞而德望賢矣其中㝛運先世有陰德惠救者乃時有徑補仙官或入南宫受化不拘職位也在世之罪福多少乃爲稱量處分耳大都行陰德多恤窮厄例皆速詣南宫爲仙在世行陰功密德好道信仙者旣有淺深輕重故其受報亦不得皆同有卽身地仙不死者有託形尸解去者有旣終得入洞宫受學者有先詣朱火宫煉形者有先爲地下主者乃進品者有先經鬼官乃遷化者有身不得去功及子孫令學道乃拔度者諸如此例高下數十品不可以一槩求之庾元規爲北太帝中衞大將軍取郭長翔爲長史以華歆爲司馬此所謂軍公者也領鬼兵數千人辛玄子所說與此大異恐是受有前後或能幾被迴換故耳庾亮字元規潁川人咸和中爲征西將軍江荆豫三州剌史鎭武昌咸康六年於鎭病亡年五十二贈太尉諡文康公未病時乃獨見陶侃乘輿來讓之於此得病而亡郭翻字長翔武昌人少有高志庾欲引爲上佐不肯就亡後與其兒靈語云庾公作撫東大將軍治在東海之東統十萬兵取吾爲司馬間者本欲取謝仁祖選官以爲資望未足蔣大侯先取爲都尉是以拘逼王長豫爲長史委以軍事甚有高稱又云王丞相爲尙書令大用事决萬機按如此語卽玄子所說如復似應在前今以郭爲長史當是後更轉任但謝仁祖在世爲僕射鎭西將軍乃言資望未足殊爲難辨王丞相卽王導長豫是導之元子早亡華歆字子魚平原人爲豫章太守同孫策策亡從}
