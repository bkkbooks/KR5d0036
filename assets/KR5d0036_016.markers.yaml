  - {type: variant, offset: 2040, length: 217, content: 邵公名奭文王庶子食採於邵封於燕國按周公邵公太公俱佐命克紂公在不殊而周公有聖德仙鬼之中並無顯出太公執旄秉鉞威罰最深乃載出列仙邵公恩流甘棠翻為魁職亦復難了皆當各緣其根本業分故也酆都唯有六宮而周文王父子頓處其三明周德之崇深矣吳季札為北明公吳王壽夢之少子闔閭之叔父太伯之後也亦姬姓讓國居乎延陵今季子廟是也雖有仁賢之德乃亞乎先聖亦有殊例尋此諸公前後參差當是道時代謝用人也自夏啟已來二千餘年方得遷改乃十倍於地下主者之數明仙家品例故為貴妙四明公復有, CK-KZ: ''}
