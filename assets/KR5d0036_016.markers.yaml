  - {type: variant, offset: 5671, length: 1, content: 尋, CK-KZ: 楊張旣非上聖爵位亦卑不應得與炎帝爲儔復當或有小五帝不論耳楊張之事亦或不然也夫有蕭邈之才有絶眾之望養其浩然不營榮貴者旣終受三官書爲善爽之鬼四百年乃得爲地下主者從此以進以三百年爲一階此事是高士逸民之品也從主者以去是入仙階不復爲鬼官耳夫有至貞至廉之才者旣終受書爲三官淸鬼二百八十年乃得爲地下主者從此以漸得進補仙官以二百八十年爲一階耳此格復是小勝高士而年數倍於忠孝故知忠孝貞廉爲行之㝡耳夫至廉者不食非己之食不衣非己之布帛王陽有似也此目應以夷齊爲標高士中亦多此例而今乃舉王陽當年淳德自然非故爲皎潔者也王陽先漢人也夫至貞者紛華不能散其正炁萬乘不能激其名操也男言之務光之行有似矣女言之宋金漂女是也貞者非止不淫}
  - {type: page-break, offset: 5671, content: '', id: KR5d0036_CK-KZ_04p019b, image: JY237/CK-KZ_JY237_04p019b.png}
