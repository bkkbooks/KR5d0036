  - {type: variant, offset: 5659, length: 233, content: 束甚得厶厶厶厶失四字謹啟從二十三日來凡三書長史並似在縣下家中時也玉斧言承舍人下恐過句容未進此湛家穀猶未熟今遣朱生出參願尊即令生反得穀願為都作米此無可舂者若至便當就合恐藥草燥得米下船乃可採草謹啟玉斧言此間釜小可正一斛不與甑相宜又上稻應得釜用都有大釜容二斛已上者願與諸藥俱致無見可否足借斧當於縣下少一行十許字謹啟此求米及大釜皆是作飢飯所須也雲穀未熟當在九月中此一書長史在都下右八條掾在山與答父書于時長史在都及縣下也右此並掾在世間所記事及書有存錄者訖此又有與真靈辭具在前篇, CK-KZ: 封昭臺}
