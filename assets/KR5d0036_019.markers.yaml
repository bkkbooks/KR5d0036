  - {type: 'tls:seg', offset: 2714, content: '', id: KR5d0036_tls_019-45a.6}
  - {type: variant, offset: 2714, length: 0, content: '', CK-KZ: 助毁其法或謂不宜蓄此因一時焚蕩無復孑遺此當是冥意不欲使流傳於外世故也後熙先等復與范曄同謀被誅也王興先爲孔寫輒復私繕一通後將還東修學始濟浙江便遇風淪漂唯有黃庭一篇得存興乃自加切責仍住剡山稍就讀誦山靈卽火燒其屋又於露壇研詠俄頃驟雨紙墨霑壞遍數遂不得畢興深知罪譴杜絶人倫惟書厯日貿糧以續炁命其子道泰爲晉安船官督資產豐富數來拜獻兼以二奴奉給興一無留納而終乎剡山於是孔王所寫眞經二本前後皆滅遂不行世此當是興先不師受妄竊寫用所致如此也復有王靈期者才思綺拔志規敷道見葛巢甫造構靈寶風教大行深所忿嫉於是詣許丞求受上經丞不相允王凍露霜雪幾至性命許感其誠到遂復授之王得經欣躍退還尋究知至法不可宣行要言難以顯泄乃竊加損益盛其藻麗依王魏諸傳題目張開造制以備其錄并增重}
