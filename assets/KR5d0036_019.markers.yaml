  - {type: variant, offset: 2978, length: 1, content: 口, CK-KZ: 也王旣獨擅新奇舉世崇奉遂託云眞授非復先本許見卷袠華廣詭信豐厚門徒殷盛金帛充積亦復莫測其然乃鄙閉自有之書而更就王求寫於是合迹俱宣同聲相讚故致許王齊轡眞僞比蹤承流向風千里而至後}
