  - {type: variant, offset: 2712, length: 1, content: 夫, CK-KZ: 許許不與相見孔膝行稽顙積有旬月兼獻奉殷勤用情甚至許不獲已始乃傳之孔仍令晉安郡吏王興繕寫興善有心尚又能書畫故以委之孔還都唯寶錄而已竟未修用元嘉中復爲廣州剌史及亡後其子熙先休先才學敏贍竊取看覽見大洞眞經說云誦之萬遍則能得仙大致譏誚殊謂不然以爲仙道必須丹藥鍊形乃可超舉豈有空積聲詠以致羽服兼有諸道}
