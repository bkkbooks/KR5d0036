  - {type: variant, offset: 467, length: 469, content: 中書也乃遠送米將供洞齋之備耶若君遠研玄鏡澄聲上音在深林之中遐人事之跡使此物之來卒無緣也於今逢耳誠理盡備矣洞齋即大洞齋法今有真書小訣如此則掾是備行上品七卷耳想所寫已了校當令熟秋冬之間其經當復示也不知是何經明年掾便遁化也故服飢不春草生此物易尋想數詣玄水之處逍遙也僕此月必往敘其不久南燭冬乃不雕春時色味彌好既呼為飢則是掾合服石和者所以定錄云次服飢飯兼穀無違但一劑千杞其事不同耳即不知玄水在何處也亦不煩屬李李疾病未攝事承田已為勞意敕語陳暉如此必有秋望也此誠小小不暫勞君意者則事去矣給事云南州還當並急四月半間欲至東山想無差錯矣比更告茶一簿直注行下云茶一簿未正可解當為寄與掾也茶則是茗掾患淡飲所須兼亦以少寐也一日不見君常恐鄙吝之心已生矣君未復能屑屑中出於風塵之間耶右八條楊書並是在都送還山與掾失上紙此書師與弟子灼然作君僕用古體也承給事體氣如故且甚延悚念侍省遑懼辭正爾燒香入靜具啟夜當根陳情事使盡丹苦之理動靜別白尋更承問此少上紙似在縣下答虎牙道長史病事糊連給事前後書上啟神母因書小掾並呈前後答神母云小掾截留給事書唯餘此見還此亦是虎牙是掾去後事也神母應是, WYG: ''}
