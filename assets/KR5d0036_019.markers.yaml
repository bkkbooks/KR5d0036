  - {type: variant, offset: 1807, length: 808, content: 其事告王君使傳知真者告青童使傳成真者夫知真者謂知真而得真成真者謂勤求而獲真者耳出消魔經序凡此者當皆是略記其旨自以備忘耳正月四日二月八日三月十一日四月十六日五月二十日六月二十四日七月二十八日八月十九日九月十六日十月十三日十一月十日十二月七日右老子拔白日此是太清外術事似長史自抄用正月庚申二月辛酉三月庚戌四月癸亥五月壬子六月癸丑七月甲寅八月乙卯九月甲辰十月丁巳十一月丙午十二月丁未右上帝煞害日不可請乞百事無宜此諸日皆是隨月支干衝破凶日也可以類求之亦恐非真受雖百事無宜而常所修行或值諸吉恐不可闕也所謂靜室者一曰茅屋二曰方溜室三曰環堵制屋之法用四柱三桁二梁取同種材屋東西首長一丈九尺成中一丈二尺二頭各餘三尺後溜餘三尺五寸前南溜餘三尺棟去地九尺六寸二邊桁去地七尺二寸東南開戶高六尺五寸廣二尺四寸用材為戶扇務令茂密無使有隙南面開牖名曰通光長一尺七寸高一尺五寸在室中坐令平眉中有板床高一尺二寸長九尺六寸廣六尺五寸薦席隨時寒暑又隨月建周旋轉首壁牆泥令一尺厚好摩治之此法在名山大澤無人之野不宜人間入室春秋四時皆有法然此蓋本道相承道家之一事耳不足為異也粗要知是以及道機作靜室法與此異恐是別有告受者而不知審的今存想入室亦可依之或云應有經也以正月十五日尚書省中直乞夢非常皆靈仙真像多所道其子孫慶以閏月二日夕又夢仙靈共會吾請乞佳應又見有厶缺失一字非常好以月半中忽見九老先生乘軺引從詣吾相見欣然云連在宣城四十日始還問吾消息云今至蕪湖二十三日當還還當省吾得見之欣然此是作餘姚還為尚書郎時也以閏月四日夕夢綵物如幡形皆舒著席上或如畫或如錦繡文字煥炳如言可解而不可解愈舒愈更奇異云是楊舍人物時亦不見楊君也意言當寫取云須能畫人整頓所未常見當有十許幡永和八年閏十月而楊君年二十三簡文始為司徒恐未為舍人亦恐是後年諸閏耳十一月十二日夢棺器露有水十二月十八日左右夢以鐵釵刺玄武此玄武恐是所言墓之玄武也非所存龜蛇者也二十一日夢見天子天子當年十六七許在殿上此應康帝時, CK-KZ: 眞手}
