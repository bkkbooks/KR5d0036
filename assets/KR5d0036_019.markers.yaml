  - {type: variant, offset: 2675, length: 0, content: '', krp: 章草乃能而正書古拙符又不巧故不寫經也隱居昔見張道恩善别法書歎其神識今睹三君跡一字一畫便望影懸了自思非智藝所及特天假此監令有以顯悟爾又按三君手書作字有異今世者有龜龍虚華顯服寫辭闕關之例三君同爾其楊飛掾飛楊我掾我楊靈長史靈掾靈楊眞長史眞楊師掾師楊惡長史惡此其自相爲異者又鬼魔字皆作摩淨潔皆作盛潔盛貯皆作請貯凡大略如此亦不可備記恐後人以世手傳寫必隨世改動故摽示其例令相承謹按爾此諸同異悉已具載在登眞隱訣中又按三君書字有不得體者於理乃應治易要宜全其本跡不可從實闇改則澆流散亂不復固眞今並各朱郭疑字而注其下又按三君多書荆州白牋歲月積久或首尾零落或魚爛缺失前人糊㩉不能悉相連補並先抄取書字因毁除碎敗所缺之處非復眞手雖他人充題事由先言今并從實綴録不復分析又按三君書有全卷者唯道授二許寫酆都宫記是楊及掾書并有首尾完具事亦相類其餘或五紙三紙一紙一片悉後人糊連相隨非本家次比今并挑扷取其年月事類相貫不復依如先卷又按衆眞辭㫖皆有義趣或詩或戒互相酬配而顧所撰眞迹枝分類别各爲部卷致語用乖越不復可領今並還依本事并日月紙墨相承貫者以爲詮次又按起居寳神及明堂夢祝述叙諸法十有餘條乃多是抄經而無正首尾猶如日芒日象玄白服霧之屬而顧獨不撰用致令遺逸今并詮録各從其例又按有未見眞本復不測有無流傳所記舛駁不類者未敢便頓省除皆且注所疑之意各於條下又按所載洞宫及諸山仙人氏族并欲以外書詳注出其根宗恐大致顯泄仰忤㝠軌唯有異同疑昧者略摽言之其酆宫鬼官乃可隨宜顯說又按此書所起以眞降爲先然後衆事繼述眞降之顯在乎九華而顧撰最致末卷又先生事迹未近眞階尚不宜預在此部而顧遂載王右軍父子書傳並於事爲非今以安記第一省除許傳别充外書神仙之例唯先生成仙之後與弟書一篇留在下卷又長史書即是問華陽事華陽事仍是答長史書强分爲兩部於事相失今依㫖還爲貫次又顧所記二許年月殊自違僻今謹依眞嗳檢求又以許家譜參校注名異同在此卷後又按三君書迹有非疏眞㖟或寫世間典籍兼}
