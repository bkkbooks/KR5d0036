  - {type: variant, offset: 3319, length: 205, content: 能渝也謂應作逾字此則是定錄所說被試事也聞弟遠造上法上清諸道也偶真重幽雲林降也心觀靈元謝過法也炁陶太素五種事也登七闕之巍峨飛天堽也味三辰以積遷日月五星虛落霄表精郎九玄此道高邈非是吾徒所得聞也亦由下挺稟淺未由望也然高行者常戒在危殆得趣者常險乎將失禍福之明於斯而用矣道親於勤神歸精感丹心待真招之須臾若念慮百端狹以營道雖騁百年亦無冀也三官急難吾昔聞之在前重論排遣諸試難事得為爾前通也七考之福既以播之於後子何功業當復延及, CK-KZ: 究}
