  - {type: variant, offset: 1471, length: 4, content: 黃庭遍數, CK-KZ: 此辭事若不悟斯理者永不領其旨故略摽大意宜共宻之又按二許應修經業旣未得接眞無由見經故南眞先以授楊然後使傳傳則成師所以長史與右英書云南眞哀矜去春使經師見授洞房云云而二許以世典爲隔未崇禮敬楊亦不敢自處旣違眞科故告云受經則師乃恥之耶然則南眞是玄中之師故楊及長史皆謂爲玄師又云疾者當啟告於玄師不爾不差而長史與右英及眾眞書亦稱惶恐言者此同於師儀爾實非師}
