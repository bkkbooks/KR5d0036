  - {type: variant, offset: 3530, length: 178, content: 運乘易不亦速耶幾成而敗自己而作試校千端因邪而生耳想善加苦心勞形勤諸功德萬物云云亦何益哉斧子蕭蕭其可羨也各不自悟當造此事斧獨何人享其高乎歎獨絕超邈也師友之結得失所宗託景希真在於此舉也吾方棲神岫室蔭形深林采汧谷之幽芝掇丹草以成真矣成真之辭小為誇激昔約道成當還信雖未都通徹粗有仿佛亦欲暫偃洞野看望墳塋不期而往冀暫見弟因緣簡略臨書增懷映謝從曾祖本名映改名遠游此十字, CK-KZ: 葬白山}
