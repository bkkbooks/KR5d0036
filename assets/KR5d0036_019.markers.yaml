  - {type: variant, offset: 4550, length: 722, content: 見後是王君事似四輔傳盡共在上多論王君學道時見語學道歷年事自可須二三年間邪意甚敬此人未得拜便覺末見主簿亦在坐泰和元年八月三十日夕夢得一帙有四小卷書云是神母書或云是傳皆以青細布為秩秩兩頭紅色書皆是素時先生亦在間又為玉斧書此傳上篇於戶外壁辟方素上其字似符或如獸像帙布亦不正似布謹記先生即楊君也泰和三年三月二十五日夕玉斧夢行見天上白雲彌滿纏合甚下而不高仰望雲間時有空處狀如山穴東行數步覺東北有大道便順道行得一深室或如石室白炁從室中出又似水鬱勃來冠玉斧身時急坐亦不恐向炁忽散見室裏有床席器物殊整潔意中自謂是靈人所住止處仍向室拜叩頭訖請乞室內有一穴玉斧復從此前進穴內甚急小不得前意復更欲進忽見一人在室外語玉斧未可進尋當得前乃向此人再拜揖而退又見送至道上說玉斧應受書之言極殷勤委曲當勤存南真夫人使三人送玉斧令通板橋初出又見犢車中有二露頭年少與向人言笑未至所住便覺欣願靈悟如夢之告謹以記之右七條並掾自疏記夢事於時區區之心亦與隱居今日何異三月八日拜疏玉斧言鄭恨還奉敕尊猶患飲痛不除違遠竦息陰臑願今飡食無恙即日此蒙恩牙近至此便西願早至謹及啟疏玉斧再拜玉斧言尊欲得六甲符似在句容牙處斧都不以書來山中願就牙器中料謹啟此六甲符非靈飛也當是在右玄錄也玉斧言承近三日會流盃尊亦作詩後信願寄還謹啟鹽茗即至願賜檳榔斧常須食謹啟恆須茗及檳榔亦是多痰飲意故云可數沐浴濯水疾之瘕也此書體重小異今世呼父為尊于理乃好昔時儀多如此也四月十七日拜疏玉斧言漸熱不審尊體動靜何如願飲漸覺除違遠燋竦急假願行出即日此蒙恩謹及啟疏玉斧再拜玉斧言有檳榔願賜今暫倩徐沈出至便及謹啟四月十八日拜疏玉斧言昨徐沈啟願即至漸熱不審尊體康和飲漸覺除違遠戀竦牙如常揆時得出斧粗蒙恩謹及馮令史啟疏玉斧再拜揆是庶長兄也四月, CK-KZ: ''}
