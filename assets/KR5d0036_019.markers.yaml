  - {type: variant, offset: 1449, length: 3, content: 圖暫缺, CK-KZ: 定錄所問從此月日相次稍有降事又按中侯夫人告云令種竹比宇以致繼嗣又云福和者當有二子盛德命世尋此是簡文爲相王時以無兒所請於是李夫人生孝武及會稽王福和應是李夫人私名也于時猶在卑賤孝武崩時年三十五則是壬戌年生又在甲子前二嵗如此眾眞降楊已久矣又定錄以乙丑年六月喻書與長史云曾得往年三月八日書此亦應是癸亥甲子年中也又按愕綠華以升平三年降卽是己未嵗又在甲子前五年此降雖非楊君楊君已知見而記之也又按乙丑嵗安妃謂楊君曰復}
