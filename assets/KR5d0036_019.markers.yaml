  - {type: variant, offset: 5399, length: 258, content: 十三日拜疏玉斧言奉敕昨夜至慰馳竦熱願尊體飡食無恙未得侍見戀慕旦陳滕啟疏願已至謹及啟疏玉斧再拜玉斧言楊舍人弟病委頓為懸耿想行當佳謹啟前楊書云老母今此云弟唯兩事顯耳其餘親族皆莫之聞四月二十八日拜疏玉斧言昨奉敕慰竦息陰炁願尊體無恙飲覺除違燋竦謹及啟疏玉斧再拜玉斧言錢即與田主此間都無復密付二升餘華新婦欲得少許願分之亦長在中謹啟山家貧險亦殊為契闊華新婦即牙妻也五月四日拜疏玉斧言節至增感思濕熱不審尊體動靜何如飲猶未除違遠竦灼服散微得飲水猶是得益願彼大小無恙尊五日當下願必果謹遣扶南啟疏玉斧再拜玉斧言陳鹿至尊賜脯及蒸蔥即至帝都, CK-KZ: 卷}
