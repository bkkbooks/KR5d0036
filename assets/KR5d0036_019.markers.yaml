  - {type: variant, offset: 1454, length: 1, content: 四, CK-KZ: 二年明君將乘雲駕龍北朝上淸則應以太元十一年丙戌去世如此二十許載辭事不少今之所存略有數年尋檢首尾百不遺一又按眾眞未降楊之前已令華僑通傳音意於長史華旣漏妄被黜故復使楊令授而華時文迹都不出世又按二許雖玄挺高秀而質撓世迹故未得接眞今所授之事多是爲許立辭悉楊授旨疏以示許爾唯安妃數條是楊自所記錄今人見題目云某}
