  - {type: variant, offset: 1464, length: 2, content: 右此, CK-KZ: 旣不工所繕寫蓋少今一事乃有兩三本皆是二許重寫悉無異同然楊諸書記都無重本明知唯在掾間者于今頗存而楊間自有杳然莫測自楊去後六七年中長史間迹亦悉不顯又按今所詮綜年月唯乙丑嵗事最多其丙寅丁卯各數條而已且第一卷猶可領略次第其餘卷日月前後參差不盡得序又按凡所注日月某受多不書年今正率其先後以爲次第事有斷絶亦不必皆得又本無年月及不注某受者並不可知依先闕之又按眞授說餘人好惡者皆}
