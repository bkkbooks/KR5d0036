  - {type: variant, offset: 2755, length: 220, content: 知密之密之若無便可以二雙金環奉跪勿吝勿吝若欲得體上所寶玩者為好華功曹似是華僑而後又云楊意旨恐是非也厚似是虎牙婦也吾近日疏與汝說二君應有詭其夕即有誥云吾二人吏兵若無功詭後小子不復為人使楊意旨中謂可用釵小君即言釵所以導達開通自可用也新婦有金釵即可用可停貫也先詣夫人次詣二靈汝疇量之汝索環如一日疏新婦銀釵亦可用良無便當用環吾停汝辭須詭當詭辭繼其下也不復別作此書即涉前事也得佳清閒云敕汝修內經是保命汝不答漠漠不當爾然此非常意皆發自冥妙當作本末答當奉, CK-KZ: 王造}
