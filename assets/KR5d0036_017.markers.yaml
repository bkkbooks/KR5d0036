  - {type: variant, offset: 11, length: 0, content: '', WYG: 廟中魏明帝徙二枚詣洛故尚方南銅駞巷中是也漢昭帝平陵宣帝杜陵二銅鍾在長安夏侯征西欲徙詣洛重不能致之在青門裏道南其西者是平陵鍾東者杜陵鍾也此後少始皇陵一事鴻門在始皇陵北十餘里漢書云張良解厄於鴻門者也秦王應是楚王作秦王誤耳項籍以沛公}
