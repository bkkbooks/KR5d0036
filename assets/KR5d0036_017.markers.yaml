  - {type: variant, offset: 2, length: 0, content: '', WYG: 七梁陶𢎞景撰握真輔第一蕭寂蓽門研神形和魂夷炁守養神闗者豈可以與夫坐華屋擊鐘鼓饗五鼎豔綺紈者同日而論之哉大羅之與籠樊俱一物耳是以古之高人皆去彼而取此矣老氏寧悶悶不察察而況我之鄙夫未知此一篇是何書中語既有道之辭故聊以抄出是兩手書耳𤣥𤣥即排起注之曰故𤣥𤣥以八風為橐籥天地為隄防四海為罋罌九州為稗穅積之以萬殊蒸之以陰陽其陶鑄也充隆吹累剛柔清濁象𩔖不同呼吸含吐恭柏榮注之曰九絶獸神禽也㒺起此在乎羣麗擥搰乎激奇之際終年不足以極其變萬殊不足以適其内日月不足以曜其目八澤不足以遊其足青雲為卑九垓為淺八紘為小四極為近以此變動無常恒入芥子之内玉晨之玉寶太微之威神矣𤣥𤣥即排起調彈恭柏榮並是神虎隱文揮神詩中句如今再注之乃取揚雄𤣥為論中語更小増損易奪之故當是理符義㑹可得然也夫心與治遊乎太和唯唐虞能充其任矣神與化蕩乎無境唯伏羲能承其綂故二十五絃之具非牙曠不能以為神弓矢質的之具非羿逄蒙不能以為妙耶此一篇亦是𤣥為論中語不知此復以何所明喻耳猶如引抱朴外篇愽喻中語也凡有異處皆以朱書為别如此也若夫奇神儵詭恢譎無方陰陽之所煥育川澤之所函藏則羲和浴日於甘淵烏飛司景於扶桑江婔登湄而解珮二女禦風於瀟湘潛蛟龍戰於𤣥泉蕃丘喪馬於淮陽靈洲海運於南極東山遙集於帝鄉驊騮抗轡於巨龜江使感夢於宋王是以洞庭雖廣濟之不容刀盧龍雖峻越之不崇朝㟭山懸嶺絶濶千仞束馬綿竹則安樂歸晉遼海泱瀁橫帶天渠公孫不競則其亡忽諸若夫飛壺白馬即墨天山三江之浸九河之源尚曷足語哉吾子飛軒結駟駕眄林薄徒聞山河之寶魏國所以未究夫吳起一言而武侯心怍也此二條是庾闡楊都賦中語也凡四條並異手書之小度青紙乃古而拙此既與真書相連故並存錄相隨載之也楊君秦始皇作長安渭水橫橋廣}
