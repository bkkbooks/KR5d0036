  - {type: variant, offset: 5334, length: 0, content: '', YP-C: 之者也信哉斯言右長史寫青紙上因以見示意中云作此書欲以刻名也登難之曰郭是何義長史答曰是洞中似郭非冢墓之郭也又難曰何以爲虔又答曰虔者敬之始下有文字敬之文耳又難曰何以爲晟答曰晟者日下成侍日成而月得耳三錦衣人同讚曰幸哉幸哉學不可欺往來至道之時此一條楊自記所夢事不知是何年云六月入郭未測斯斯徵也此上半行被剪除正應是稱姓名耳許先生前潜景逸世隱光九霄冥神洞觀頤光靈府幸甚幸甚平昔周旋纏綿盟誓超羣先覺獨造方外先生年乃大楊君三十歲先生初入東山時楊始年十六絶迹時年十九如此明楊小便好道也自隔暉塵行已今日東眄雲漢涕先言隕伏想玄宮融和所莅休宜時乘八風平蕩滓翳六天攝威消滅魔氣願使眞正之信流行三元玄無之感變無窮矣君前臨發頻煩想夢所見贈惠手跡爲信旣感冥通銘得之後儵忽未頃如覺千載適能得之奇而難解所謂微乎妙哉微乎妙哉近卽疏記所夢密呈此先生被試後楊君因書與之也一書麻紙極好此是寫本所以得存耳羲頓首頓首陰寒奉告承尊體安和以慰未得覲傾企謹白不具楊羲頓首頓首羲白公第三女昨來委瘵旦來小可猶未出外解群情反側動靜馳白頃疫癘可畏而猶未歇益以深憂給事許府君侯此六字折紙背題羲白二吏事近卽因謝主簿屬鄭西曹鄭西曹亦以卽處聽}
