markers:
  front:
  - {type: variant, offset: 0, length: 1, content: 卷, CK-KZ: 握眞輔第一蕭寂蓽門研神保形和魂夷炁守養神關者豈可以與夫坐華屋擊鍾鼓饗五鼎艷綺紈者同日而論之哉大羅之與籠樊俱一物耳是以古之高人皆去彼而取此矣老氏甯悶悶不察察而况我之鄙夫未知此一篇是何書中語旣有道之辭故聊以抄出是兩手書耳玄玄卽排起注之曰故玄玄以八風爲橐籥天地爲隄防四海爲罋罌九州爲稗穅積之以萬殊蒸之以陰陽其陶鑄也充隆吹累剛柔淸濁象類不同呼吸含吐恭柏榮注之曰九絶獸神禽也罔起此在乎群麗擥搰乎激奇之際終年不足以極其變萬殊不足以適其內日月不足以曜其目八澤不足以遊其足靑雲爲卑九垓爲淺八絃爲小四極爲近以此變動無常恒入芥子之內玉晨之玉寶太微之威神矣玄玄卽排起調彈恭柏榮並是神虎隱文揮神詩中句如今再注之乃取揚雄玄爲論中語更小增損易奪之故當是理符義會可得然也夫心與治遊乎太和唯唐虞能充其任矣神與化蕩乎無境惟伏羲能承其統故二十五絃之具非牙曠不能以爲神弓矢質的之具非羿逢蒙不能以爲妙耶此一篇亦是玄爲論中語不知此復以何所明喻耳猶如引抱朴外篇博喻中語也凡有異處皆以朱書爲別如此也若夫奇神儵詭恢譎無方陰陽之所煥育川澤之所函藏則羲和浴日於甘淵烏飛司景於扶桑江婔登湄而解珮二女禦風於瀟湘潛蛟龍戰於玄泉蕃邱喪馬於淮陽靈洲海運於南極東山遙集於帝鄕驊騮抗轡於巨龜江使感夢於宋王是以洞庭雖廣濟之不容刀盧龍雖峻越之不崇朝岷山懸嶺絶闊千仞束馬綿竹則安樂歸晉遼海泱瀁橫帶天渠公孫不競則其亡忽諸若夫飛壺白馬卽墨天山三江之𣷽九河之源尙曷足語哉吾子飛軒結駟駕眄林薄徒聞山河之寶魏國所以未究夫吳起一言而武侯心怍也此二條是庾闡楊都賦中語也凡四條並異手書之小度靑紙乃古而拙此旣與眞書相連故並存錄相隨載之也楊君秦始皇作長安渭水橫橋廣六丈南北三百八十步六十八間漢時橋北置都水令丞領徒千五百人署屬京兆董卓壞之魏武帝更作廣三丈今橋是也夫鍾瑞物也當金氏之世有六鍾將必見乎晉朝五霸諸侯厥德過之故六鍾嘉瑞耳非復耳事誤子孫也預告甯無唈唈乎此注下四十八字黃民手所妄益是載義羲十二年霍山崩出六鍾故欲附會宋祖輒立此辭而不知事類大乖追可忿笑秦爲阿房殿在長安西南二十里殿東西千步南北三百步上坐萬人庭中可受十萬人二世爲趙高所殺於宜春宫宫在城南三里二世葬其傍司馬相如所云墓蕪穢而不修者是也秦斂天下兵器鑄以爲銅人十二置此十四字共一行行前魚爛餘十在今足令成字如此之諸宫漢時皆在長安董卓壞以爲錢餘二人徙在靑門裏東宫前魏明帝欲徙詣洛載至霸城重不能致今在霸城大道南胸前有銘曰皇帝二}
