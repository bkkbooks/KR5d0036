  - {type: variant, offset: 15, length: 4, content: 賓友劉邦, CK-KZ-jye: 將何以卻此少年翰四人作詩畢並以呈公公讀畢而笑曰此詩各表其才性也石生有逸才而輕邁張生體和而難解許生廣愼而多疑丁生率隱而發遲夫輕邁則眞炁薄難解則道不悟多疑則思無神發遲則得靈稽所謂殊途者也若能各返其迷悟其所悟不當速也府君弟子所謂管輅請論有疑疑則無神者矣言詩畢各起兵共下山下山之頃又見此女子乘白龍而北去某與諸人步行南下至山下而各各別去公曰復二十年當共會于七業宫遊此地也於是豁然乃悟汗流終日不能飲食初下半山見許主簿來上相逢於夾石之間公語主簿曰汝何來遲吾爲汝置四升酒在山上坐處可往飲之而還逐我主簿卽去上山須臾見還行甚疾未至山下相及公曰美酒不答云猶恨酸公曰此太平家酒治人腸也彥云欲得長生飲太平何酸之有耶故是野家兒也守一愼勿失後當用汝輔翼君於是共至山下各別某末將主簿及玉斧東去公還上山其三人西去五十步公又遣一信見告云許牙累府君某答云在意到十日夜某先具疏此夢上白諸眞道得此異夢分明如不眠不審是何等願告之意唯紫微夫人見答云爾眞炁內感靈求萬方神來八玄形與魂翔此實著至之象事顯幽冥非虛構也如洛公語也可密示斧子等勿廣宣露靈中旨也非小事哉深愼眾眞並笑淸靈曰以㝠通㝠也心感洞照南嶽君之力也又此一夢事後東間寫得旣不自見本不知誰書所稱某處是楊君又當書此以呈長史故云某耳又此四月或卽是乙丑年亦可是寅年耳十月二十三日夜夢在一大山上有人見告此是䝉山大洞室中也室四面坐相向皆柏床龍鬚席四壁多文}
