  - {type: variant, offset: 5341, length: 0, content: '', CK-KZ: 一段作且當徐徐未可便出也亦欲自繕寫一通呈明公明公常所存棲乃希心於此者也羲白羲白孔安國撰孔子弟子亦七十二人劉向撰列仙亦七十二人皇甫士安撰高士宗亦七十二人陳長文撰耆舊亦七十二人此陳留耆舊也此一書首尾具而不見題當是函封也羲白別紙事覺憶有此乃至佳可上著傳中也輒待保降當咨呈求姓字亦又當見東卿此月內都當令成畢也動靜以白此又失上紙書語是初送神仙傳答也保降者須保命君來也又注此并書並似在縣下時非京都也仙傳猶未得治益要當代東卿至乃委曲耳昨日更委曲再三讀之故爲名作益以慨然符待晴當畫之別白羲白傳未得書上王生所以爾者欲以見東卿東卿近來倉卒不得啟此須後至乃呈尊處已別有一本不審可留此處本否羲又欲更有所上所上者畢乃頓以奉還也謹白長史此仙傳遂不顯世不解那得如此恐楊以呈司命不許眞事宣行因隱絶之也不審方隅山中幽人爲已設坐於易遷戸中未聊白方隅幽人卽謂掾也令設虛坐于其母戸中耳信還須牛明日食竟遣送右此書失上紙亦應是函封在縣下時羲頓首奉反告承服散三旦宣通心中此是得力深慰馳情願善將和無復感動羲頃公私勿勿是故替覲小闋奉展楊羲頓首頓首承二紀有患懸情近得師子書都不}
