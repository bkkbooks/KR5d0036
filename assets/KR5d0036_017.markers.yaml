  - {type: variant, offset: 13, length: 0, content: '', WYG: 原立廟於曲池之北號曰樂遊廟因苑為名也徙闗東名族四十五姓以陪杜陵司馬相如弔二世云臨曲江之隑洲謂曲池也此一條増損語小異不解那得始此右此前十條並楊君所寫録潘安仁闗中記語也用白牋紙行書極好當是聊爾抄其中事東方有赤氣之内有詠言曰小鮮未烹鼎言我巖下悲此是東華宫中歌詩之辭整控啓素鄉河靈已前驅此兩句是揮神詩中之辭風伯不搖條神虎所挾扶十一月二十四日儵忽之間聞洞房中云在丹幞帳中有如人聲讀書如此此是存洞房三真事並前條並楊所自記所感聞之事也得書知洗心謝過甚叙虚心相行復來張生頓首覺題云許君近知來有北行事恨不面今致黃長命縷一枚後復果不張生頓首覺題云楊君夢見一人似女子著鳥毛衣齎此二短折封書來發讀覺見憶昔有此語而猶多有所忘又夢後燒香當進前室此並記夢見張天師書信云張生者即應是諱今疏示長史故不欲顯之又見系師注老子内解皆稱臣生稽首恐此亦可是系師書耳興寧三年四月二十七日楊君夢見一人著朱衣籠冠手持二版懷中又有二版召許玉斧出版皆青為字云召作侍中須臾玉斧出楊仍指此是郎玉斧自説我應十三年今缺便見召未解儀體向人答若爾可作刺玉斧作屬道未解儀典方習厲之言須十三年向玉斧揖而去此椽書半紙是口受寫楊君所夢故猶内楊事中侍中之位所謂侍帝晨者也版青為字即青籙白簡也四月二十九日夜半時夢與許玉斧俱座不知是何處也良久見南嶽夫人與紫陽真人周君俱來坐一牀因見玉斧與真人周君語曰昔聞先生有守一法願乞以見授周君曰寡人先師蘇君往曾見向言曰以真問仙不亦迂乎僕請舉此言以相與矣玉斧曰情淺區區貪慕道徳故欲乞守一法爾言未絶周君又言曰昔所不以道相受者直以吳傖之交而有限隔耳周是汝陰人漢太尉勃七世孫故云傖人也君乃真人也且已大有所稟將用守一何為耶言訖豁然而覺竟不知在何處此夢甚分明故記之四月九日戊寅夜鼓四夢北行登高山迷淪不寤至明日日出四五丈乃覺覺憶登山半日許至頂上大有宫室數千間鬱鬱不可名山四面皆有大水而不知是何處某因仰天天中見一白龍身長數十丈東向飛行空中光彩耀天因又見東面有白衣好女子亦於空中行西向就白龍徑入龍口中須臾復出三入三出乃止又還某右邊向某而又覺某左邊有一老翁著繡衣裳芙蓉冠拄赤九節杖而立俱視其白龍某問公何等女子徑入龍口耶公對曰此太素玉女蕭子夫取龍炁以鍊形也此人似方相隸為官也某又問翁何人來登此宇公答曰我蓬萊仙公洛廣休此蓬萊山吾治此上府君故來乃得相見我耳某又問公曰此龍可乘否公答曰此龍當以待真人張誘世石慶安許玉斧丁瑋寧也某又問一龍而四人共乘耶公曰此侍晨帝官龍也譬如世軺車朱鳥更一日乘以上直也須臾間公呼此四賢未來之間某與公及此女以敷席共坐山上俱北向望海水及白龍并有設酒食酒中如石榴子合食之柈亦如世間柈柈中鮭也覺久久許四人並東來共乘一新犢車青牛青油重車上來到並揖此公及某並共語語畢公見語曰向所道四人此則是也覺張誘世年可五十石慶安甚童蒙年可十三四許玉斧年如今日所見丁瑋寧年可三十四五許並著好單衣垂幘履版惟慶安著空頂幘公又曰玉斧府君師友也某曰不然公又曰張誘世常山人公弟子也石慶安汲郡人鉤翼夫人弟子也才均徳敵並人士也公因語四人言君並可各作一篇詩以見府君老子亦願聞文筆之美言也於是公各付一青紙及筆各一以與四人四人即取曰但恐倉卒耳於是石慶安先作詩其文曰靈山造太霞豎巖絶霄峰紫烟散神州乘飇駕白龍相攜四賓人東朝桑林公廣休年雖前所炁何蒙蒙寔未下路讓惟年以相崇次張誘世作詩其文曰北遊太漠外來登蓬萊闕紫雲遘靈宫香烟何鬱鬱美哉樂廣休久在論道位羅駢真人坐齊觀白龍邁離式四人用何時共解帶有懷披襟友欣欣高晨㑹次許玉斧作詩其文曰遊觀奇山峙潄濯滄流清遙觀蓬萊間巘巘衝霄㝠紫芝被綘巖四階植琳璚紛紛靈華散晃晃煥神庭從容七覺外任我攝天生自足方寸裏何用白龍榮丁瑋寧作詩其文曰𤣥山構滄浪金房映靈軒洛公挺奇尚從容有無間形沈北寒宇三神棲九天同寮相率往推我高勝年弱冠石慶安未肯崇尊賢嘲笑蓬萊公呼此廣休前}
