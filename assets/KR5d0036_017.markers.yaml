  - {type: variant, offset: 5420, length: 469, content: 諸有英雄之才彌羅四海誅暴整亂拓平九州建號帝王臣妾四海者既終受書於三官四輔或為五帝上相或為四明公賓友以助治百鬼綜理死生者此等自奉屬於三官永無進仙之冀坐煞伐積酷害生死多故也酆宮中諸人職皆是矣疑荀彧一人清秀整潔非跋扈虐害唯以謀謨智策佐魏武耳乃得為賓友與漢高等比位恐當別有旨趣凡在世有才識藝解為一時所稱者既沒並即隨才受其職位不必執其在生之小罪先充諸考謫也若過為非理是所不論若悠悠冗散不辯異人者罪無大小悉當安之秦始皇今為北帝上相劉季今為南明公賓友有其人甚多略示其摽的耳此是舉建號帝王者之宗耳北帝之有上相亦當如四明之有賓友也齊桓公今為三官都禁郎主生死之簡錄晉文公今為水官司命其楚嚴公趙簡子之徒數百人今猶散息於三官府未見任也此等名位自是三官之寮耳無豫真仙家事矣五霸亦一時之雄齊桓晉文處職並要楚嚴公即莊王也簡子雖非霸限亦擅命專制所夢天帝使射熊之事必是北帝之府矣劍經序稱燕昭亦得仙燕昭六國時英主遂不墜於三官乃知煉丹獨往亦為殊拔也從論忠孝已來至此並出掾寫劍經中東卿司命所說即是鬼神事謹抄出繼此以相証發自三代已來賢聖及英雄者為仙鬼中不見殷湯周公孔子闔閭勾踐春秋, CK-KZ: 于}
