  - {type: variant, offset: 8, length: 0, content: '', WYG: 年霍山崩出六鍾故欲附㑹宋祖輒立此辭而不知事𩔖大乖最可忿笑秦為阿房殿在長安西南二十里殿東西千步南北三百步上坐萬人庭中可受十萬人二世為趙高所殺於宜春宫宫在城南三里二世葬其傍司馬相如所云墓蕪而不修者是也秦斂天下兵器鑄以為銅人十二置此十四字共一行行前魚爛餘十在今足令成字如此之諸宫漢時皆在長安董卓壞以為錢餘二人徙在青門裏東宫前魏明帝欲徙詣洛載至霸城重不能致今在霸城大道南胷前有銘曰皇帝二十六年初兼天下諸侯以為郡縣正法律均度量大人來見臨洮身長五丈足迹六尺秦丞相蒙恬李斯所書也丨缺失秦字廟中鍾簴四枚皆在}
