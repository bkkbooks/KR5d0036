  - {type: variant, offset: 279, length: 3536, content: 有托形尸解去者有既終得入洞宮受學者有先詣朱火宮煉形者有先為地下主者乃進品者有先經鬼官乃遷化者有身不得去功及子孫令學道乃拔度者諸如此例高下數十品不可以一概求之庾元規為北太帝中衛大將軍取郭長翔為長史以華歆為司馬此所謂軍公者也領鬼兵數千人辛玄子所說與此大異恐是受有前後或能幾被迴換故耳庾亮字元規潁川人咸和中為征西將軍江荊豫三州刺史鎮武昌咸康六年於鎮病亡年五十二贈太尉諡文康公未病時乃獨見陶侃乘輿來讓之於此得病而亡郭翻字長翔武昌人少有高志庾欲引為上佐不肯就亡後與其兒靈語云庾公作撫東大將軍治在東海之東統十萬兵取吾為司馬間者本欲取謝仁祖選官以為資望未足蔣大侯先取為都尉是以拘逼王長豫為長史委以軍事甚有高稱又云王丞相為尚書令大用事決萬機按如此語即玄子所說如復似應在前今以郭為長史當是後更轉任但謝仁祖在世為僕射鎮西將軍乃言資望未足殊為難辨王丞相即王導長豫是導之元子早亡華歆字子魚平原人為豫章太守同孫策策亡從魏武帝歷顯位為司徒太尉封博平侯太和五年亡年七十三諡敬侯孔文舉為後中衛大將軍以張繡為司馬唐固為長史孔融字文舉魯人孔子二十代孫漢末名士為北海太守後為曹公所害張繡武威人濟從子也漢末因亂起兵後降魏武為破羌將軍從征烏丸未至柳城亡諡定侯唐固字子正丹陽句容人修身謹行博學儒術注國語公羊梁傳孫權漢武四年為尚書僕射年七十餘病亡耳陶侃為西河侯亦領兵數千近求滕含自代猶未許侃以徐寧為長史寧坐收北闕叛將不擒免官當以蔡謨代寧陶侃字士衡先自丹陽人遷居鄱陽後徒廬江而屬潯陽柴桑晉世累經征討大有功位至侍中太尉都督八州荊江二州刺史長沙公咸和四年還長沙亡於樊溪年七十六贈大司馬諡桓公庾亮代之而郭長翔靈語云陶公正有罪謫未得敘用又別記云陶公亡後少時遣先奮死傳教與其兒相傳云公謝郎達與庾公相言語天上事始判故令郎知于時庾猶存後三四年而亡滕含子並南陽西鄂人永和中為平南將軍廣州刺史於州病亡諡戴侯陶以其自代資位複是奇懸徐寧字安期東海剡人羨之祖也初桓彞舉與庾亮為護軍功曹稱為海岱清士後仕至正員吏部郎冠軍江州順陽簡侯羨之年少時嘗來形見自稱我是汝祖戒其禍福後並如言蔡謨字道明陳留考城人克子也位至揚州刺史又授司徒不受永和十二年病亡年七十六贈司空諡文穆公尋此不擒叛將亦是鬼鬼不能相制由如人也人皆非自然威攝仙真猶尚握節持鈴以勒此輩而況其同類乎四鎮皆領鬼兵萬人中官領兵不過數千四鎮有泰山君盧龍公東越大將軍南巴侯四官各領萬人四鎮非正是四方今此處並在中國迴還不過數千里耳他方復應大有所以後言數百處也何曾為南巴侯何曾字穎考陳郡陽夏人何夔子也性豪侈而博學孝悌初仕魏世稍遷尚書征北將軍司徒封朗陵侯晉太尉太保太宰朗陵公太始四年亡年八十餘諡曰元公曹仁為盧龍公曹仁字子孝魏武從弟雄勇冠世善弓馬數從征伐有功位至車騎將軍都督荊揚益州諸軍事大將軍封陳侯黃初四年病亡年五十六諡曰忠侯也劉陶為東越大將軍漢魏晉凡有三劉陶後漢者字子奇潁川人也靈帝侍中尚書令後繫獄閉績而死魏世者字季冶淮南人劉曄之子也才辨而無行曹爽用為選部郎後出平源太守景王誅之晉初者字正輿沛國人永嘉中為揚州刺史此三人不知何者是東越大將軍以意言之多是正輿耳荀顗為太山君荀字景倩彧第四子也傳學有詞理佐命晉世起家為黃門郎遷尚書僕射司空太尉太傅太始十年亡年七十諡曰康公蘇韶傳云劉孔才為太山公欲反北帝已誅滅之孔才即劉壒也又梅頤為豫章太守夢被召作太山府君克日便亡不知此二位與君復各是異職否耳又云有太山令領一萬兵鎮處亦有數百處也領數千兵鎮處亦有數百處更相統隸耳皆有長史司馬王文度鎮廣陵忽見卒來召作平北將軍徐兗二州刺史王云我今已作此官卒云此是天上職耳須臾去尋迎至而亡失天地間事理乃不可限以胸臆而尋之此幽顯中都是有三部皆相關類也上則仙中則人下則鬼人善者得為仙仙之謫者更為人人惡者更為鬼鬼福者複為人鬼法人人法仙循還往來觸類相同正是隱顯小小之隔耳遠者監之便無複所關荀顗取顧眾為太山將軍用曹洪為司馬桓範為長史顧眾字長始吳郡人顧愷孫顧秘子也仕晉丹陽尹領軍尚書僕射永和二年亡年七十三追贈特進諡靖伯曹洪字子廉魏武從弟家大富而儉吝數征伐為驃騎將軍封樂成侯太和六年病亡桓範字元則沛國人有才學籌策仕魏世位至太司農黨曹爽被誅也王逸少有事繫禁中已五年云事已散即王右軍也受時不欲呼楊君名所以道其字耳逸少即王濆兄曠之子有風績善書後為會稽太守永和十一年去郡告靈不復仕先與許先生周旋頗亦慕道至昇平五年辛酉歲亡年五十九今乙丑年說云五年則亡後被繫被繫之事檢跡未見其咎恐以懟憾告靈為謫耳蔣濟為南山伯領二千兵蔣濟字子通楚國平阿人仕漢魏歷位至太尉從宣王誅曹爽其年亡諡景侯為領軍時有其婦夢亡兒為太山五伯來迎太廟西孫阿為太山令求囑阿乞轉在好處濟即為仍之阿亦即亡後又夢云已蒙轉錄事凡如此例鬼官職位雖略因生時貴賤而大有舛駁皆由德業之優劣功過之輕重更品其階敘不複得全依其本基耳王廙為部鬼將軍廙字世將琅琊人修齡父也多才藝政書善屬文解音聲位至平南將軍荊州刺史年四十七病亡贈驃騎諡康侯也此有識位者粗相識耳其無位者不可一二盡知之如此散者無限數也此皆後段所說似猶是荀中候所以止道或不稱姓而複云姓恐以分別周也所說人多是近世當由代謝參差兼易億識者矣三代乃遠而兩漢魏晉實有一段才名人如劉向董仲舒揚雄張衡蔡邕鄭玄王弼阮嵇之儔並不應空散數術有如管郭亦無標跡故當多不隸三官頗得預於仙家驅任矣前論帝王中亦不均魏文晉武受命之主而不顯反言魏武晉宣孫權應與劉備同亦不載道策此並當啟國之基功高樂推故也其繼體守文之君都無所出矣右以前後兩過受事皆是楊君受旨書多饞治又掾更寫兩本悉無異並各成一卷相隨始末訖此耳許肇今為東明公右帥晨帥晨之任如世間中書監許肇字子阿即長史七代祖司徒敬也雖有賑救之功而非陰德故未蒙受化既福流後葉方使上拔然後為九宮之仙耳此帥晨之官四明亦並應有之邵奭為東明公云行上補九宮右保公前云邵為南明公今乃是東若非名號之誤則東南之羌既尋當遷擢則必應是啟中君脫爾雲邵耳亦可是有甘棠之德故不限其年月耳右七月十六日夜定錄君所告此二條別受不關酆記部辛玄子自敘并詩此下剪除半行去不知當是何字也玄子字延期隴西定谷人漢明帝時諫議大夫上洛雲中趙國三郡太守辛隱之子辛隱字某某檢外書未得此位業按諸辛舊關隴豪族前漢有辛慶忌後漢有辛繕並高直之士辛毗是其七世孫則隱是毗之八世祖但一百四五十年中而已八世嫌其太促耳玄子少好道遵奉法戒至心苦行日中菜食煉形守精不遘外物州府辟聘一無降就遊山林棄世風塵志願憑子晉於緱岑侶陵陽於步玄故改名為玄子而自字延期矣不圖先世之多愆殃流子孫結眚刊於帝簡運沉逮於後昆享年不永遂沒命於長梁之津西王母見我苦行酆都北帝泯我道心告敕司命傳檄三官攝取形骸還魂復真使我頤胎位為靈神於今二百餘年矣溺水致命事同王衍之女恐即此形骸皆不復得生並是反質胎神耳雖有道心而無道業故不得便居仙品也近得度名南宮定策朱陵藏精待時方列為仙而大帝今且見差領東海侯代庾生又見選補禁元中郎將為吳越鬼神之司王事靡盬斯亦勞矣若夫冠晨佩青蕭條羽袂鳴鈴仙階轉軿瓊室者雖實素心而卒日也恨未便得與玄真併羅同晏琨墉察鈞韶之遺音掇靈芝乎幽峰振翠衣於九霄舞玄翮于十方耳方當攝御群鬼領理是非處眾穢之中間聲交於邪魔之紛紜事與道德為闊眼與盱真為疏熟比熙寂於玄境逍遙於太初哉夫同聲偕合物亦類分相聞邈矣係景委積是以名書上清丹錄玄殖有道之氣與靈合德託體高輝故來相從今贈詩三篇以敘推情之至也其辭曰楊君既為吳越司命董統鬼神玄子職隸方應相開故先造以陳情也尋鬼書既異不應是自運筆亦當口受疏之耳疇昔入冥鄉順駕應靈招神隨空無散炁與慶雲消形非明玉質玄匠安能彫蹀足吟幽唱仰首玩鳴條林室有逸歡絕此軒外交遺景附圓曜嘉音何寥寥此篇敘事跡之本志也寂通寄興感玄炁攝動音高輪雖參差萬仞故來尋蕭蕭研道子合神契靈衿委順浪世化心摽窈窕林同期理外遊相與靜東此篇申情寄之來緣也命駕廣酆阿逸跡超冥鄉空中自有物有中亦無常悟言有無際相與會濠梁目擊玄解了鬼神理自忘此篇論人鬼之幽致也玄子云魏時辛毗字佐治是七世之孫也漢建武一年從隴西徙居潁川陽翟縣毗仕魏世使持節大將軍司馬宣王軍帥衛尉封侯毗子名敞為河內太守太常卿所說並與魏書同也玄子云庾生者晉庾太尉也北帝往用為撫東將軍後又轉為東海侯今又用為酆臺侍帝晨右禁監近取馮懷為司馬侍帝晨如今世侍中右禁監如世右衛將軍而甚重如說與前大異當是後遷侍中領衛便是勝中衛將軍也帝晨無司馬此是右禁之職耳馮懷字祖思長樂人晉成帝時為太常散騎常侍卒追贈金紫光祿階也左禁監是謝幼輿以鄧岳為司馬此則准左衛將軍也幼輿名鯤即謝安伯謝尚之父也為王敦長史豫章郡太守年五十三病亡贈太常諡康侯鄧岳已在前而云代周郤為司馬帥耳郤南昌公先為北帝南朱陽大門靈關侯後天轉為高明司直昔坐與劉慶孫爭免官今始當復職也高明司直如世尚書僕射前云郤為南門亭長亭長恐即靈關之職既以周撫代故得轉司直而郭長翔靈語亦云郤公甚屈為天門亭長舊選常用州征二千石, CK-KZ: ''}
