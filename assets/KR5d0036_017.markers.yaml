  - {type: variant, offset: 5339, length: 1, content: 難, CK-KZ-jye: 徒實破的也謹曰此書失上紙羲頓首頓首奉告承尊體安和以慰劉家昨夜去使人惻惻似中後定也羲明日早與主簿至墓上省之也晚或復覲楊羲頓首頓首先昨亦得車問想當不審且以惋怛之自非研玄寶精有凌霜之幹者亦自然之常也長史許府君侯此六字題折紙背上也羲白奉賜絹使以充老母夏衣誠感西伯養老之惠然羲受遇過泰榮流分外徒銜戢恩眷無以仰酬至於絹帛之錫非復所當小小供養猶足以自供耳謹付還願深見亮羲白羲白此間故爲淸淨旣無塵埃且小掾住處亦佳但羲尋還不得久共同耳尋更白羲白此二條共紙書又似失上紙羲頓首頓首宿昔更冷奉告承尊體安和以慰此覲返命不具楊羲頓首頓首羲白得主簿書云野中異事郄書別答奉覲乙二謹白此背無題恐失下紙羲頓首頓首旦白反不散風燥奉告承安和行奉勤白書不具楊羲頓首頓首羲白雲芝法不得付此信往羲別當自齎謹白長史許府君侯侍者白此九字題折紙背尋楊與長史書上紙重頓首下紙及單疏並名白又自稱名云尊體於儀式不正可解旣非接隷意又乖師資法正當是作貴賤推敬長少謙抑意爾侍者之號卽其事也都不見長史與楊書旣是經師亦不應致輕此並應時制宜不可必以爲唯羲頓首頓首吉日攸慶未覲延情奉告承尊體安和以慰羲燒香始訖正爾當暫還家靜中晚乃親展謹白不具楊羲頓首頓首羲白野中未復近問然華新婦已當佳也惟猶懸心奉覲乙二羲白承今日穫稻昨已遣陳伋經紀食飲守視之謹白長史許府君侯此六字題折紙背應在山廨中答書十月五日也羲白符書訖有答教事脫忘送適欲遣承會得告今封付別當抄寫正本以呈也不審竟得服制虫丸未若脫未就事者當以入年爲始耶羲前所得分者卽服日日爲常不正聞有他異惟覺初時作六七日聞頭腦中熱腹中校沸耳其餘無他想或漸有理謹白羲白主簿孝廉在此奉集惟小慰釋小掾獨處彼方甚當悒悒羲比日追懷眷想不可言上下頃粗可承行垂念謹白羲白昨及今比有答教事甚忽忽始小闋爾頃在東山所得手筆及所聞本末往當以呈比展乃宣羲白羲白奉告具諸一二動靜每垂誨示勞損反側羲白羲白五色紙故在小郎處不令失也謹白羲白明日當東山主簿云當同行復有解厨事小郎又無馬羲卽日答公教明日當先思共相併載致理耳不審尊馬可得送以來否此間草易於都下彼幸不用方欲周旋三秀數日事也謹白右此前五書並是在縣答長史書或是單疏或失上紙也羲白許東興昨中後見顧主人猶小設亦不覺久垂當去張泓續至其時日猶可也奉告云扶關入門甚爲異事由羲不能節適酒食量宜遣賓伏用悚息願復察恕謹白此事在都答書長史當在護軍府中時羲白承撰集得五十許人又作敘眞當可視乃益味玄之徒有以奬勸伏以慨然羲聞似當多此比類暮當倒笈尋料得者遣送謹白已具紙筆須成當自手寫一通也願以寫白石耳願勿以見人此當是煮石方或是五公腴法楊書自此後並是掾去世後事不知誰領錄得存當是黃民就其伯間得也羲白漢書載季主事不乃委曲嵇公撰高士傳如爲淸約輒寫嵇所撰季主事狀讚如別謹呈洞房先進經已寫當奉可令王曠來取一作己白恐忘之謹又白今所有紅牋紙書者卽是此也羲白承昨雨不得詣公想明必得委曲耳明晴暫覲乃宣羲白此三書似失上紙並是在都時答羲頓首頓首晴猶冷奉告承尊體安和以慰比復親展反命不備楊羲頓首頓首長史許府君侯侍者白此九字題折紙背羲白季主學業幽玄且道跡至勝乃當在卷之上首耶東卿君大歎季主之爲人又羡委羽之高沖矣承撰集粗畢極當可視未覩華翰預已欣歎奉覲一二謹白所書東卿論季主事本別書靑紙與此不相隨今在第四篇中所撰要當令得七十二人不審已得幾人若人少者亦當思啟冥中求其類例也然}
