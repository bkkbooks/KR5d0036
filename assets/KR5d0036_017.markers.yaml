  - {type: variant, offset: 12, length: 0, content: '', WYG: 漢王都漢中而分闗中為三秦章邯為雍王都大丘今槐里是也司馬欣為塞王都櫟陽今萬年縣是也董翳為翟王都高奴高奴縣在咸陽西北今省高祖自漢中北出襲三面皆平之漢書云乘釁而運席卷三秦者也此三縣今皆有都邑故處也此後少十五六條事當是零失也杜陵宣帝陵也宣帝少依許氏在杜縣葬於}
