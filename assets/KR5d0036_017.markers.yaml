  - {type: variant, offset: 3817, length: 1513, content: 三公作也如此所以得速遷劉慶孫名輿中山人劉越石之兄也才識辯贍為東海王越長史永嘉中病指疽而亡年四十七贈驃騎將軍諡真侯也何次道今在南宮承華臺中已得受書行至南嶽中此人在世施惠之功甚多故早得返形前荀公說何始得還朱火今言已受書則玄子所受後成在後耳周伯仁近見用為西明公中都護中都護如世太傅之官也坐選鄭攸不平左降為中護中護准少傅周本司命帥當得程遐代而遷此官也鄧攸字伯道平陽襄陵人仕晉為太子洗馬吏部郎河東太守為石勒所沒後得還江東為吳郡太守吏部尚書自咸和元年病亡贈光祿攸從胡叛還時乃棄其己兒自攜亡弟之子來渡江遂自無兒絕後嗣謝安嘆曰天道無知令鄧伯道無兒右辛玄子所言說冥中事亦多矣今粗書其粗者耳不復一二具說此記雖玄子所受而雜有楊君之辭也楊書不存今有掾寫本耳此紙後又被剪缺恐事亦未必盡夫至忠至孝之人既終皆受書為地下主者一百四十年乃得受下仙之教授以大道從此漸進得補仙官一百四十年聽一試進也此地下主者亦即是洞中所記李東等者非別鬼官複為主者也一百四十年一進便入第二等給仙人使乃得稍受道教耳至孝者能感激鬼神使百鳥山獸巡其墳埏也至忠者能公犯直心精貫白日或剖藏煞身以激其君者也比干今在戎山李善今在少室有得此變煉者甚多舉此二人為摽耳比干剖心可為至忠至於孝子感靈者亦複不少而今止舉李善如似不類當李善之地乃可涉忠而非孝跡也恐以其能存李元後胤使獲繼嗣因此以成其孝功所不論耳若程嬰齊孫杵臼亦應在孝品矣李善字次遜本南陽育陽李元家奴漢建武中元家人之死盡而巨富唯盡一孤兒名續祖尚在孩抱諸奴復共欲煞之而分其才善乃密負續祖逃瑕丘山中哺養乳乃為生計至十歲餘出告縣令鍾離意意於是表薦悉收其群奴煞之而立續祖為家光武拜善為太子舍人後遷日南九江太守其事跡正是如此而鍾離傳所說少復有異耳夫有上聖之德既終皆受三官書為地下主者一千年乃轉補三官之五帝或為東西南北明公以治鬼神復一千四百年乃得遊行太清為九宮之中仙也以年限言之是聖德更不及忠孝也計此終後凡二千四百年乃得入仙階益知前應是夏啟非召公明矣季子亡後至晉興寧始八百八十許未滿千歲不知那已為明公耶酆都中所記都無頓說五帝者恐此如北帝之例複有五耶所以後言英雄者為五帝上相而北帝有秦皇矣又蘇韶傳云楊雄張衡等為五帝楊張既非上聖爵位亦卑不應得與炎帝為儔複當或有小五帝不論耳楊張之事亦或不然也夫有蕭邈之才有絕眾之望養其浩然不營榮貴者既終受三官書為善爽之鬼四百年乃得為地下主者從此以進以三百年為一階此事是高士逸民之品也從主者以去是入仙階不複為鬼官耳夫有至貞至廉之才者既終受書為三官清鬼二百八十年乃得為地下主者從此以漸得進補仙官以二百八十年為一階耳此格復是小勝高士而年數倍於忠孝故知忠孝貞廉為行之最耳夫至廉者不食非己之食不衣非己之布帛王陽有似也此目應以夷齊為摽高士中亦多此例而今乃舉王陽當年淳德自然非故為皎潔者也王陽先漢人也夫至貞者紛華不能散其正炁萬乘不能激其名操也男言之務光之行有似矣女言之宋金漂女是也貞者非止不淫於色亦是惔乎榮利也務光辭湯讓而負石投河宋女恐是子胥所逢浣沙於漂水之陽者後既投金以報之故謂之金漂漂字或應作溧字耳先世有功在三官流逮後嗣或易世煉化改氏更生者此七世陰德根葉相及也既終當遺腳一骨以歸三官餘骨隨身而遷也男留左女留右皆受書為地下主者二百八十年乃得進受地仙之道矣臨終之日視其形如生人之肉脫死之時尸不強直足指不青手足不皺者謂之先有德行自然得尸解者也此是先世有陰功密德不拘於迹者既非己身所辦故以一骨酬副三官也此骨恐是質形之骨非神形之骨既被遺落當複重生之耳火都論仙鬼中諸人在世有刳腹刎頸支體分裂死者永自不關後形其神先以離出故今形可得而斃傷殘初不斷神矣而世或有見鬼身不全者蓋是尸魄託骸者耳非其大神本經之主也尸解之說復有多條已抄記在第三篇中耳右此五條皆積行獲仙, CK-KZ: ''}
