  - {type: variant, offset: 496, length: 0, content: '', CK-KZ: 煙含啟金石華眞藹鬱紫空鍊形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者久行之常乘雲霧而遊也右一條楊書又掾寫守玄白之道常旦旦坐卧任意存泥丸中有黑氣存心中有白氣存臍中有黃氣三氣俱生如雲氣覆身因變成火火又繞身身通洞徹內外如一旦行至向中乃止於是服氣一百二十都畢道正如此使人長生不死辟卻萬害尤禁六畜肉五辛之味當別寢處靜思尤忌房室房室卽死初存出氣如小豆漸大衝天三炁纏煙繞身共同成一混忽生火在三煙之內又合景}
