  - {type: variant, offset: 855, length: 0, content: '', CK-KZ: 此前五條並似令告牙也又云性躁暴者一身之賊病求道之堅梯也遂之者眞去改之者道來每事觸類皆當柔遲而盡精潔之理如此幾乎道者也此語似令告掾小茅君云丹砂雄黃雌黃家家皆有之至於無一人合藥者也皆如傳國璽印父傳子子傳孫耳好道而不專疲志而不固華名鍾於胷心榮味交於外視萬萬皆}
