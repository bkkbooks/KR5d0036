  - {type: variant, offset: 7170, length: 0, content: '', WYG: 之鬼來侵我神也所以道士棲山林而幽身者皆欲逺兹囂絶放人間之業是恐外物凡百犯其性命也祕之陳出神仙傳李少君口訣道士求仙不欲見死人尸損神壊氣之極人君師父親愛不得已而臨之耳所以道士去世不事王侯是無君也塊然獨存是無友也唯父母師主不得不臨喪致感極之哀不性命之傷耳茍以此故而傷是以無傷之也吾其祕之故口傳焉漢武臣出神仙傳女仙人劉綱妻口訣求仙者勿與女子三月九日六月二日九月六日十二月三日是其日當入室不可見女子六尸亂}
