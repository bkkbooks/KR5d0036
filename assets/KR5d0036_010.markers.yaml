  - {type: variant, offset: 5770, length: 0, content: '', CK-KZ: 知若云冢墓王相刑害諸不足者一以塡文厭之無不厭伏反凶爲吉𡇌行下被割餘一字如此當是此字後行又被剪語則未盡也從員三尺來別一紙復是異人迹不與前同而俱書靑紙色理亦小殊疑此並寫非眞前范監旣有此言恐後人因以造法耳上淸眞人馮延夀口訣前云是楚市乞人西岳眞人馮延壽西嶽之號自不妨上淸之目也此後凡十四事雖未見眞書類其事旨不乖眞法故別撰錄附於卷末夫學生之道當先治病不使體有虛邪及血少腦減津液穢滯也不先治病雖服食行炁無益於身昔有道士王仲甫者少乃有意好事神仙恒吸引二景餐霞之法四十餘年都不覺益其子亦服之足一十八年白日升天後}
