  - {type: variant, offset: 5778, length: 1, content: 月, CK-KZ: 不得升度者以子身有大病腦宮虧減筋液不注靈津未溢雖復接景餐霞故未爲身益仲甫遂因服藥治病兼修其事又一十八年亦白日升天今在玄州受書爲中嶽眞人領九玄之司于今在也此說殊功事要仲甫父子無餘別顯也夫學生之夫必夷心養神服食治病使腦宮塡滿玄精不傾然後可以存神服霞呼吸二景耳若數行交接漏泄施寫者則氣穢神亡精靈枯竭雖復玄挺玉籙金書太極者將亦不可解於非生乎在昔先師常誡於斯事云學生之人一接則傾一年之藥勢二接則傾二年之藥勢過三以往則所傾之藥都亡於身矣是以眞仙之士常愼於此以爲生生之大忌此事彌會眾經之旨夫學道唯欲嘿然養神閉氣使極吐氣使微又不得言語大呼喚令人神氣勞損如此以學皆非養生也凡存神光行眞仙之事者又不得以衣服借人亦不服非已之物諸是巾褐履屐之具皆使鮮盛三魂七魄或栖其中亦爲}
  - {type: page-break, offset: 5778, content: '', id: KR5d0036_CK-KZ_03p034b, image: JY237/CK-KZ_JY237_03p034b.png}
