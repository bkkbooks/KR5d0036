  - {type: variant, offset: 848, length: 0, content: '', WYG: 是也自非傳授者皆不得令其見所寫之紙也此又一未體矣南眞云寫神虎文不精則萬物不為己用心將徒勞耳得紙更留心謹寫燒香先者寫上書當恒燒香文之左右亦初不能令專使煙清恒也精誠務在匪懈求道唯取於不倦耳此又近於替乎夫得道者常恨於不早聞受失道者常恨於不精懃何謂精耶專篤其事也何謂懃耶恭繕其業也既加之以檢愼守之以取感者則去眞近矣爾其營之勿忘也此前五條並似止告楊君受書則師乃恥之耶真心既有不盡獲考者非一人子往師蘇林守一當先齋受戒能得此度世幾未可量也九華真妃言守五㪷内一是真一之上也皆地真人法也上黨王真京兆孟君司馬季主皆先按於此道而始矣魯女生邯鄲張君今皆在}
