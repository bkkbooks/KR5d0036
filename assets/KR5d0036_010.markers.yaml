  - {type: variant, offset: 250, length: 148, content: 商販之汲汲豈憚險難哉所期唯錢貨而已耳若使求道者常如賈販之用心亦有何不得仙耶但惜初學者皆言專心盡勤至而後漸懈縱有亦似車之將故而百節緩落又似負重之牛造遠足蹇夫學者之所患而為得者之所笑皆如此輩事耳苟能心研內鏡者是為感發乎神將有靈人發子之蒙攜辰景之輿矣此答諮步五星法也經圖唯言隨綱往還又有一法云越綱蹈星今, HFL: 范}
