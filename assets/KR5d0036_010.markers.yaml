  - {type: variant, offset: 42, length: 207, content: 指建故當北向執書以漸求之耳若既解書意識星轉之隨時自宜隨斗所指按而存步如此則無有常向不為皆向北也夫一切北向自為始學者耳恐此將可以意通觸類不足復問邪此答長史諮飛步經中北向執書意也太上真人步五星之道以致五星降室閉氣上綱當先呼五星星夫人名字畢乃越綱蹈星謂始上綱便頓住呼名字呼名字畢乃越綱蹈星耳若每至星上得復重心呼所至星處之名字益其佳也若其煩重難常但可案舊而行耳昔鬱沙公北里子長陵老人皆案此法而得升天不以煩難為辭也所謂治生者, WYG: ''}
