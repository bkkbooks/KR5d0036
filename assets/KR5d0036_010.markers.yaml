  - {type: variant, offset: 1072, length: 0, content: '', ZTDZ: 老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衛我九重辟尸千里去却不祥敢有小鬼欲來見狀攫天大斧斬鬼五形炎帝裂血北斗燃骨四明破骸天猷滅類神刀一下萬鬼自潰畢四言輒一琢齒以爲節也若㝠夜白日得祝爲恒祝也鬼有三被此祝者眼精目爛而身即死矣此上神祝皆斬鬼之司名北帝祕其道若世人得此法恒能行之便不死之道也男女大小皆可行之此所謂北帝之神祝煞鬼之良法鬼三被此法皆自死矣常亦畏聞此言矣因病行此立愈叩齒當臨目存見五藏此中一字楊本穿壞不可識掾亦仍闕無具五神自然存也酆都中祕此祝法今宻及之耳不可泄非有道者共祕之乎右五條楊書又掾寫楊書北帝祝是口㖟時書極多儳黵改易風病之所生生於丘墳隂濕三泉壅滯是故地官以水氣相激多作風痹風痹之重者舉體不授輕者半身成失手足也若常夢在東北及西北經接故居或見靈牀處所者正欲與冢相接耳墓之東北爲徵絶命西北爲九戹此皆冢訟之凶地若見亡者於其間益其驗也若每遇此夢者卧覺當正向上三琢齒而祝之曰太元上玄九都紫天理魂護命高素眞人我佩上法受教太玄長生久視神飛體仙冢墓永安鬼訟塞姦魂魄和悦惡氣不煙遊魅罔象敢干我神北帝呵制收氣入淵得籙上皇謹奏玉晨如此者再祝祝又三叩齒則不復夢冢墓及家死鬼也此北帝祕祝也有心好事者皆可行之若經常得惡夢不祥者皆可按此法於是鬼氣滅也邪鬼散形也此應令以受長史也但許姓羽音今去東北徵絶命是爲不同又九戹之名墓書無法手臂不授者沉風毒氣在脉中結附痺骨使之然耳宜針灸針灸則愈又宜按北帝曲折之祝若行之百過疾亦消除也先以一手徐徐按摩臂良久畢乃臨目内視咽液三過叩齒三通正心微祝曰太上四玄五華六庭三魂七魄天關地精神符榮衛天胎上明四肢百神九節萬靈受録玉晨刊書玉城玉女侍身玉童護命永齊二景飛仙上清長與日月年俱後傾超騰昇仙得整太平流風結痾注鬼五飛魍魎冢氣隂氣相徊陵我四肢干我盛衰太上天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰收摧如有干試干明上威畢此亦以告長史也長史極多惡夢恒有冢注炁又患飲癖及兩手不理故每授諸法并針灸在後若弟子有心者按摩疾處皆用此法但不復令臨目内視咽液啄齒耳昔唐覽者居林慮山中爲鬼所擊舉身不授似如綿囊有道人教按摩此法皆即除也此北帝曲折之法諸疾有曲折者用此法皆佳不但風痺不授而已也唐覽無别所出不知何世人也酆都北帝有此數法亦參於高仙家用也又有曲折經藏著西明公處周文王爲酆都西明公也鄭子眞則康成之孫也今在陽濯山昔初學時正患兩脚不授積年其晚用針灸兼行曲折祝法百日都除鄭玄唯有一兒爲賊所害有遺腹子名卜同耳既不入山又復不病脚此子眞又非谷口者進退乖異莫辯質據唐覽今在華山得虹丹法合服得不死前來至此並應是保命告十三過針三過灸無不愈左手勝右手也少陽左肘手脉内纏故宜十三過針乃得理内脉入少陽也灸氣得温浮上臂血得風痺故宜三過灸乃得補定流津使筋屬不滯也灸手幽關及風絃并五津凡三處急要也當待佳日我自别相示也保不使爾失此手也右中候夫人言手幽關風絃五津凡三處偃側圖及諸灸經並無此穴名夫風考之行也皆因衰氣之間隙耳體有虧縮故病來侵之也若今差愈誠能省周旋之役者必風痾除也今當爲攝制冢注之氣爾既小佳亦可上冢訟章我當爲關奏之也於是注氣絶矣昔鄧雲山停當得道頓兩手不授吾使人語之令灸風徊曲津兩處耳六七日間便得作五禽按摩也若針力訖當語所灸處又心存行道亦與身行之無異也昔趙公成兩脚曳不能起旦夕常心存拜太上如此三十年太上眞人賜公成流明檀桓散一劑即能起行後遂得道今在鵠鳴山下夫存拜及心行道之時皆燒香左右如欲行事狀也此謂内研太玄心行靈業栖息三宫偃逸神府者矣右保命言風徊曲津兩處灸經亦無此穴冢訟章不見有眞本鄧雲山趙公成並無别顯出也夜卧覺存日象在疾手中握之使日光赤芒從臂中逆至肘腋間良久日芒忽變成火燒臂使臂内外通匝洞徹良久畢乃隂祝曰四明上元日月氣分流光焕曜灌液凝魂神光散景蕩穢鍊煙洞徹風氣百邪燔然使得長生四肢完全注害考鬼收付北辰畢存思良久放身自忘右保命說此云案}
