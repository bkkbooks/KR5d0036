  - {type: variant, offset: 2890, length: 763, content: 髮不落而日生常數易櫛櫛之取多而不使痛亦可令侍者櫛取多也於是血液不滯髮根常堅右一條安九華所告令施用此二條皆駐白止落之事亦是令答示長史也紫微夫人喻曰披華蓋之側延和天真入山澗之谷填天山之源則虛靈可見萬鬼滅身所謂仰和天真俯按山源也華蓋一名華庭也天真是兩眉之間眉之角也山源是鼻下人中之本側在鼻下小入谷中也華庭在兩眉之下是徹視之津梁天真是引靈之上房旦中暮恆咽液三九過急以手三九陰按之以為常令致靈徹視杜遏萬邪之道也一日三過行耳紫微夫人言人有卒病垂死者世中凡醫唯知針人中不知針山源谷中此太謬也本注從此注起是楊接長史書也按而祝曰開通天庭使我長生徹視萬里魂魄返嬰滅鬼卻魔來致千靈上升太上與日合並得補真人列象玄名楚莊公時此即春秋時楚莊王也市長宋來子恆灑掃一市久時有一乞食公入市經日乞恆歌曰天庭發雙華山源彰陰邪清晨按天馬來詣太真家真人無那隱又以滅百魔恆歌此乞食一市人無解歌者獨來子忽悟疑是仙人然故未解其歌耳乃遂師此乞食公棄官追逐積十三年此公遂授以中仙之道來子今在中嶽乞食公者西嶽真人馮延壽也周宣王時史官也手為天馬鼻下為山源六月二十七日夜喻書此楊接書訖此雲林王夫人曰仙真之道以耳目為主淫色則目暗廣憂則耳閉此二病從中來而外奔也非復有他矣今令人聰明益易耳但不為之者行之難欲得上通徹映旁觀鬼神當洗心絕念放棄流淫所謂嚴其始矣夜臥先急閉目東向以手大指後掌各左右按拭目就耳門使兩掌俱交會於項中三九過存目中當有紫青絳三色氣出目前此是內按三素雲以灌合童子也陰祝曰眼童三雲兩目真君英明注精開通清神太玄云儀靈驕翩翩保利雙闕啟徹九門百節應響朝液泥丸身升玉宮列為上真凡四十八字祝畢咽液五十過畢乃開目以為常坐起可行之不必夜也要以生炁時一年許耳目便精明久為之徹視千里羅映神靈聽于絕響者也此亦真仙之高道不但明目開耳而已夫欲學道者皆當不欲令人知見所聞每事盡爾太上宮中歌曰手把八雲氣英明, CK-KZ: 方洞}
