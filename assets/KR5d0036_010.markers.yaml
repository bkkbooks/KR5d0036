  - {type: variant, offset: 2034, length: 828, content: 常居矣真人所以能旁觀四達使八霞照朗者實常居之數明也目下權上是決明保室歸嬰至道以手旋耳行者採明映之術也旋于是理開血散皺兆不生目華玄照和精神盈矣夫人之將老鮮不先始於耳目也又老形之兆亦發始于目際之左右也以手乘額上內存赤子日月雙明上元歡喜三九始眉數畢乃止此謂手朝三元固腦堅髮之道也頭四面以兩手乘之順髮就結唯令多也於是頭血流散風濕不凝都畢以手按目四眥二九過覺令見光分明是檢眼神之道久為之得見百靈凡修行此道及卷中諸雜事並甚有節度悉以別撰在登真隱訣中今不可備皆注釋勤而行之使手不離面乃佳以成真人猶不廢也欲行此道皆盟金為誓金之多少在人盡誠而設耳不徒爾苟行而已真官曰欲聞起居金為盟書謂非其人而不傳授也此道出太上寶神經中此經初不下傳於世也當來為真人者時有得者反白之要事盡於此盟信既定無科謂受此宜用金環二雙紫微夫人喻書如左紫微是承裴君說寶神經畢仍複更接論寶神事如此則裴所說亦同此夕夜臥覺常更叩齒九通咽液九過畢以手按鼻之邊左右上下數十過微咒曰太上四明九門發精耳目玄徹通真達靈天中玄臺流炁調平驕女雲儀眼童英明華聰晃朗百度眇清保和上元徘徊九城五藏植根耳目自生天臺鬱素柱梁不傾七魄澡煉三魂安寧赤子攜景輒與我並有敢掩我耳目太上當摧以流鈴萬凶消滅所願必成日月守門心藏五星真皇所祝群響敬聽臥覺輒按祝如此勿失一臥也真道雖成如我輩故常行之也但不復臥自坐為之耳此太上寶神經中祝辭上道也令人耳目聰明強識豁朗鼻中調平不垂津洟四響八徹面有童顏制魂錄魄卻辟千魔七孔分流色如素華真人起居之妙道也所以名起居者常行之故也畢又咽液九過摩拭面目令少熱以為常每欲數也興寧三年歲在乙丑六月二十三日夜喻書此其夕先共道諸人多有耳目不聰明者欲啟乞此法即夜有降者即仍見喻也此楊君自記也長史年出六十耳目欲損故有諮請楊不欲指斥托云諸人耳又告云道士耳重者行黃赤炁失節度也不可不慎此蓋指戒長史也右一條清靈言櫛頭理髮欲得多過通流血氣散風濕也數易櫛更番用之也亦可不須解髮也右一條紫微夫人言太極綠經曰理髮欲向王地既櫛髮之始而微祝曰泥丸玄華保精, CK-KZ: ''}
