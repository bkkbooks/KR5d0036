  - {type: variant, offset: 497, length: 0, content: '', CK-KZ: 煉一身一身之裏五藏照徹此亦要道也右二條有掾寫并右三事在論華陽第四卷中今又重鈔可修事出此耳其本文猶在彼卷太極眞人敕酆臺北帝使告三此三字被後人黵不可復識官制神滅鬼靈符盛以重紫之囊係之頭上入穢淹脫也此九字又被靑黵乃不可都識而非今所書字衞符有三天直使者二人凶鬼萬邪有干佩符者卽死此下復有十字亦被黵不可復識男女各佩一已別題之小君今書此符相與佩之在玉馬經上一名北帝書七元符中有一符無題相傳言是此符而玉馬經世未嘗見不敢爲定一雄黃二雌黃三鉛黃右三黃華先投朱砂一熟研之於器中}
