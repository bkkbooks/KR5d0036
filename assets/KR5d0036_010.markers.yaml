  - {type: variant, offset: 848, length: 0, content: '', CK-KZ: 是也自非傳授者皆不得令其見所寫之紙也此又一未體矣南眞云寫神虎文不精則萬物不爲己用心將徒勞耳得紙更留心謹寫燒香先者寫上書當恒燒香文之左右亦初不能令專使煙淸恒也精誠務在匪懈求道唯取於不倦耳此又近於替乎夫得道者常恨於不早聞受失道者常恨於不精懃何謂精耶專篤其事也何謂懃耶恭繕其業也旣加之以檢愼守之以取感者則去眞近矣爾其營之勿忘也此前五條並似止告楊君受書則師乃恥之耶眞心旣有不盡獲考者非一人子往師蘇林守一當先齋受戒能得此度世幾未可量也九華眞妃言守五㪷内一是眞一之上也皆地眞人法也上黨王眞京兆孟君司馬季主皆先按於此道而始矣魯女生邯鄲張君今皆在}
  - {type: page-break, offset: 848, content: '', id: KR5d0036_CK-KZ_03p024b, image: JY237/CK-KZ_JY237_03p024b.png}
  - {type: page-break, offset: 848, content: '', id: KR5d0036_CK-KZ_03p025a, image: JY237/CK-KZ_JY237_03p025a.png}
