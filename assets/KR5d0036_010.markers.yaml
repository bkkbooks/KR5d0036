  - {type: variant, offset: 1721, length: 129, content: 人冥冥者亦具監其意也若外難未披假詠兼存實復未能迴西榆之年還發玄童矣苟耽玄篤也志之勤也縱令牙雕面皺頂生素華者我道能變之為嬰在須臾之間耳但問志之何如爾老少之學無所在也吾往即其人也說此諸事皆是令告長史也求道要先令目清耳聰為事主也且耳目是尋真之梯級綜靈之門戶得失繫之, CK-KZ: 雖同墓法}
