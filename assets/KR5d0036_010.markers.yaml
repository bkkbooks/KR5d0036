  - {type: variant, offset: 7164, length: 0, content: '', CK-KZ: 點畢先叩齒三通微祝曰上景飛纏朱黃散煙炁攝虛邪尸穢沈泯和魂鍊魄合體大神令我不死萬壽永全聰明徹視長享利津祝畢又琢齒三通咽液三過并右手第二指攝右鼻孔下左手第二指攝左目下各七過當盡陰案之勿舉手也於是都畢按此二處是七魄遊尸之門戸鉞精賊邪之津梁矣故受朱黃之精塞尸鬼之路引二景之薰遏淫亂之炁也此太極上法常能行之則魂魄和柔尸穢散絶長生神仙通炁徹視行之三年色念都泯矣此頗似太靈眞人法可兼修用之凡上淸叩齒咽液法皆各有方先後有次不得亂雜使眞靈混錯也夫叩齒以命神咽炁以和眞納和因六液以運入制神須鳴鼓而行列矣凡存修上法禮祝之時皆先叩齒上下相叩勿左右也一呼一吸令得三叩爲善須禮祝畢更又叩齒乃得咽諸炁液耳此名爲呼神和眞以求升仙者也吾屢見僞俗之人或誤定經文先後雜亂無有次緒用以爲益良可悲也此亦同五神經中意旨右本卷訖此養性禁忌口訣復有此諸條亦未見眞書而似是二許抄事皆仙人條用小訣有助於施行故並撰錄黃仙君口訣服食藥物不欲食蒜及石榴子猪肝犬頭肉至忌都絶爲上道士自不可食猪犬肉而交房中令藥力不行又計食一斤損算百}
