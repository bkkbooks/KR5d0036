  - {type: variant, offset: 856, length: 1, content: 下, WYG: 也適足疲我三官之司矣此語似令告牙可令許斧數沐浴濯其水疾之氣也消其積考之瘕也亦致}
  - {type: variant, offset: 856, length: 4, content: 下真品目, YP-C: 也適足疲我三官之司矣此語似令告牙可令許斧數沐浴濯其水疾之氣也消其積考之瘕也亦致眞之階右紫陽眞人言沐浴不數魄之性也違魄返眞是練其濁穢自亡矣右紫微夫人言上道法衣巾不假人不同器皿者車服床寢不共之也所以遏穢垢之津路防其邪風之往來耳此甚易行而更以爲難所爲信道不篤欲飛反沉者也心遘何必言哉其自當知所爲此三條以令告長史右南岳夫人語右十六條並楊書又雜掾寫人卧床當令高高則地氣不及鬼吹不干鬼炁之侵人常依地而逆上耳高謂三尺已上也人卧室宇當令潔盛盛則受靈氣不盛則受故氣故氣之亂人室宇者所爲不成所作不立一身亦爾當數洗沐澡潔不爾無冀盛字是淨義中國本無淨字故作盛也諸經中通如此勿道學道道學道鬼犯人亦不立使人病是體未眞故青童亦云一言一事泄減一筭如此可不愼之此三條本在酆官記中楊書又掾書}
