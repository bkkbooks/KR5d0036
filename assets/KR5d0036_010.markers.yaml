  - {type: variant, offset: 5768, length: 1, content: 真, CK-KZ: 辟斥諸禁忌不得妄爲害氣當令子孫昌熾文詠九功武備七德世世貴王與天地無窮一如土下九天律令員三尺猶是方員方員之法六邊皆等如印形也趙公明今千二百官儀乃以爲温鬼之名九功十德事出右傳夫施用此法愼不可令}
