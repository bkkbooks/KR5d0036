  - {type: variant, offset: 851, length: 0, content: '', CK-KZ: 一亦可得漸階上道而進復爲不難也五斗內一涓子內法昔所授於峩山眉臺中本其外守一玄一之屬莫有逮其蹤者也小君言五豆寸眞一卽今蘇傳中分至日所存用者是也中君曰良懃不休吾當與其流珠眞此亦中眞之上道也流珠亦九宫家事其}
