  - {type: variant, offset: 5770, length: 0, content: '', ZTDZ: 徒復千條萬章誰能明吉凶四相哉辟非之下冢墓由此而成亦由此而敗非神非聖難可明也必能審此術子玄武延軀孫無復冢墓之患能知墳墓之法十禁萬忌一皆厭之必反凶爲吉能得此法永爲吉冢不足宣也此一紙異手書青紙依如此法亦爲可解其九步九尺而不云十步三尺者是九尺入冢裏正虎嘯八垂取中心爲數也但辟非應是朱鳥而云冢後若徵家甲向朱鳥在西南羽家庚向朱鳥在東北所不論耳員三尺題其文曰天帝告土下冢中王氣五方諸神趙公明等某國公侯甲乙年如干歲生值清眞之氣死歸神宫翳身㝠郷潜寧沖虚辟斥諸禁忌不得妄爲害氣當令子孫昌熾文詠九功武備七德世世貴王與天地無窮一如土下九天律令員三尺猶是方員方員之法六邊皆等如印形也趙公明今千二百官儀乃以爲温鬼之名九功十德事出左傳夫施用此法愼不可令人知若云冢墓王相刑害諸不足者一以填文厭之無不厭伏反凶爲吉行下被割餘一字如此當是此字後行又被剪語則未盡也從員三尺來别一紙復是異人迹不與前同而俱書青紙色理亦小殊疑此並寫非眞前范監既有此言恐後人因以造法耳上清眞人馮延壽口訣前云是楚巿乞人西岳眞人馮延壽西嶽之號自不妨上清之目也此後凡十四事雖未見眞書類其事㫖不乖眞法故别撰録附於卷末夫學生之道當先治病不使體有虚邪及血少腦減津液穢滯也不先治病雖服食行炁無益於身昔有道士王仲甫者少乃有意好事神仙恒吸引二景餐霞之法四十餘年都不覺益其子亦服之足一十八年白日升天後}
