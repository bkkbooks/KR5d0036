  - {type: variant, offset: 5843, length: 1, content: 到, CK-KZ: 叩齒以會神靈充和血氣使靈液凝滿帝一欣宅所謂沖氣不勞啓血不泄也此別一法經中未見其事也學生之法不可泣淚及多唾泄此皆爲損液漏津使喉腦大竭是以眞人道士常吐納咽味以和六液凡甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席及言語面會當淸齋不寢警備其日遣諸可欲凡五卯之日常當齋入室東向心拜存神念炁期感神明亦適意所陳恒如此者玉女降侍此三條與經語亦互相同者也常以本命之日向其方面叩齒三通心存再拜而微呪曰太一鎭生三炁合眞室胎上景母玄父元生我五藏攝我精神下灌玉液上朝泥丸夕鍊七魄朝和三魂右命玉華左嘯金晨命我神仙役靈使神常保利津飛行}
