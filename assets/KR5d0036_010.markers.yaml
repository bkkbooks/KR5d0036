  - {type: variant, offset: 7214, length: 794, content: 兼行益善善也仙人一日一夕行千事初不覺勞明勤道之至生不可失矣寶書日月即謂紫文所用者右西城王君告此並告楊君令以示諸許也為道當如射箭箭直往不顧乃能得造堋的操志入山唯往勿疑乃獲至真玄清告按南極西城玄清二高真未當有餘降受唯戒及詩各一條耳不審此當是何時所喻右八條並楊書行此四道按玉玄上法一年便驚視聽自可勤之舉之無疑中君此事失前紙不知是何法也太極真人云讀道德經五千文萬遍則雲駕來迎萬遍畢未去者一月二讀之耳須雲駕至而去右二條某書山世遠受孟先生法暮臥先讀黃庭內景經一過乃眠使人魂魄自制煉恆行此二十一年亦仙矣是為合萬過夕得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道也此二十一年夕一過不得萬遍一恐應為七或為八字不爾夕則二三過耳存五星當謹按八素以王星為始存以生氣時若不王星先出者故宜不先存王也至於視星入室任意耳唯以勤感為上耳亦不必須都見星然後速通也視之亦審耳清靈君告存思要法當覺目睹五星于方面並乘芒而下行我然後依王星下而存王星但吞咽一芒畢又當鎮星下又存鎮星良久總五星各一芒使俱入口而咽之如鎮星星過數也此一事異法經中無此說若頓存五星自當依常法不心存對星下也依此言則後是單修法也六月一日夜青靈真人言右四條楊書青當為清也日中五帝字曰日魂珠景昭韜綠映迴霞赤童玄炎飆象凡十六字此是金闕聖君採服飛根之道昔受之於太微天帝君一名赤丹金精石景水母玉胞之經右英云珠圓會暉韜綠凝日霞煥明赤童秉靈玄炎散光飆象鬱清此日之勢也神之威也此說按紫文曰日魂事義旨不正可領右二條厶書扶晨始暉生紫雲映玄阿煥洞圓光蔚晃朗濯耀羅眇眇靈景元森灑空清華九天館玉賓金房煙霄歌右大洞真經中篇今鈔數行今洞經亦有此四句外國呼日為濯耀羅方諸真人呼日為圓羅曜夢見此濯耀羅者日之應也紫雲中人者胎宮神也玄真之道矣日德蔭澤長生之象紫雲罔晨魂魄安也身康神寧從此始矣辭四通已呈意氣安和此楊君自與長史書語耳右英疏大洞真經言以釋夢濯耀羅之義也如別此亦自語也長史夢事不顯右四條楊書, CK-KZ: ''}
  - {type: variant, offset: 7214, length: 794, content: 兼行益善善也仙人一日一夕行千事初不覺勞明勤道之至生不可失矣寶書日月即謂紫文所用者右西城王君告此並告楊君令以示諸許也為道當如射箭箭直往不顧乃能得造堋的操志入山唯往勿疑乃獲至真玄清告按南極西城玄清二高真未當有餘降受唯戒及詩各一條耳不審此當是何時所喻右八條並楊書行此四道按玉玄上法一年便驚視聽自可勤之舉之無疑中君此事失前紙不知是何法也太極真人云讀道德經五千文萬遍則雲駕來迎萬遍畢未去者一月二讀之耳須雲駕至而去右二條某書山世遠受孟先生法暮臥先讀黃庭內景經一過乃眠使人魂魄自制煉恆行此二十一年亦仙矣是為合萬過夕得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道也此二十一年夕一過不得萬遍一恐應為七或為八字不爾夕則二三過耳存五星當謹按八素以王星為始存以生氣時若不王星先出者故宜不先存王也至於視星入室任意耳唯以勤感為上耳亦不必須都見星然後速通也視之亦審耳清靈君告存思要法當覺目睹五星于方面並乘芒而下行我然後依王星下而存王星但吞咽一芒畢又當鎮星下又存鎮星良久總五星各一芒使俱入口而咽之如鎮星星過數也此一事異法經中無此說若頓存五星自當依常法不心存對星下也依此言則後是單修法也六月一日夜青靈真人言右四條楊書青當為清也日中五帝字曰日魂珠景昭韜綠映迴霞赤童玄炎飆象凡十六字此是金闕聖君採服飛根之道昔受之於太微天帝君一名赤丹金精石景水母玉胞之經右英云珠圓會暉韜綠凝日霞煥明赤童秉靈玄炎散光飆象鬱清此日之勢也神之威也此說按紫文曰日魂事義旨不正可領右二條厶書扶晨始暉生紫雲映玄阿煥洞圓光蔚晃朗濯耀羅眇眇靈景元森灑空清華九天館玉賓金房煙霄歌右大洞真經中篇今鈔數行今洞經亦有此四句外國呼日為濯耀羅方諸真人呼日為圓羅曜夢見此濯耀羅者日之應也紫雲中人者胎宮神也玄真之道矣日德蔭澤長生之象紫雲罔晨魂魄安也身康神寧從此始矣辭四通已呈意氣安和此楊君自與長史書語耳右英疏大洞真經言以釋夢濯耀羅之義也如別此亦自語也長史夢事不顯右四條楊書, CK-KZ-jye: ''}
