  - {type: variant, offset: 4455, length: 1305, content: 月五日六月四日七月三日八月二日九月一日十月十日十一月十一日十二月十二日夜于寢靜之室北向六再拜訖稽首跪曰謹啟太上大道高虛玉晨太素紫宮八靈三元君中央黃老無英白元太帝五老高真上仙太極皇精三皇君大洞三景弟子某謹以吉日之夜天關九開之間上聞太上玉皇真君乞得長生世上壽無億年時乘黃晨綠蓋龍轅上詣紫庭役使萬神侍衛四明畢勿令人知也此一條掾寫右四朝太素三元君法以吉日夜半時太上大道玉晨君常以正月四日二月八日三月十五日四月八日五月九日六月六日七月七日八月八日九月九日十月五日十一月三日十二月十二日登玉霄琳房四眄天下有志節遠游之心者子至其日平旦日出時北向再拜亦可于靜中也自陳本懷所願畢因咽液三十六過長史寫東海青童君常以丁卯日登方諸東華臺四望子以此日常可向日再拜日出行之可因此以服日精又掾寫右紫虛元君所出右此三事並上學隱朝之法其經並不顯世故南真出之亦是令長史遵用也右三條有長史掾共書同在一紙上常以二月二日三月三日八月八日九月九日十月十日夜于寢室存思洞中訣事而獨處不眠者吉也其夕衛經玉童玉女將太極典禁真人來于空中而察子也是其夜常燒香精苦有如所待者也坐臥存思或讀書念真在意為之唯不可以其夕施他事非求道之方耳若兼慎于其日益善匪唯守夜矣受洞訣之始常當修此好以為意也數遇惡夢者一曰魄妖二曰心試三曰尸賊厭消之方也若夢覺以左手躡人中二七過琢齒二七遍微祝曰大洞真玄張煉三魂第一魂速守七魄第二魂速守泥丸第三魂受心節度速啟太上三元君向遇不祥之夢是七魄遊尸來協萬邪之源急召桃康護命上告帝君五老九真皆守體門黃閣神師紫戶將軍把鉞搖鈴消滅惡津反凶成吉生死無緣畢若又臥必獲吉應而造為惡夢之氣則受閉于三關之下也三年之後唯神感旨應乃有夢也夢皆如見將來之明審也略無復惡占不祥之想矣長史作惡字皆酉下心其義與西下心亦同但謂西方金之心剛惡也若夜遇善夢吉應好夢而心中自以為佳則吉感也臥覺當摩目二七叩齒二七遍而微咒曰太上高精三帝丹靈絳宮明徹吉感告情三元柔魄天皇授經所向諧合飛仙上清常與玉真俱會紫庭畢此太洞秘訣以傳於始涉津流者矣右此三事亦是洞房太丹家事真經亦未顯世今世中經乃粗有其事皆增損不同右三條有長史寫此符摹長史畫此符摹掾畫已上符本朱畫明堂內經開心闢妄符王君撰用開日旦向王朱書再拜服之祝曰五神開心徹聽絕音三魂攝精盡守丹心使我勿妄五藏遠尋拜畢祝祝畢乃服服畢咽液五過叩齒五通勿令人見兩妄字謂皆應作忘若不用開日以月旦月十五日二十七日一月三服一年便驗祕術也右符及此三條有長史掾寫兩本掾朱書東卿司命曰先師王君昔見授太上明堂玄真上經清齋休糧存日月在口中晝存日夜存月令大如環日赤色有紫光九芒月黃色有白光十芒存咽服光芒之液常密行之無數若不修存之時令日月還住面明堂中日居左月居右令二景與目童合炁相通也此道以攝運生精理和魂神六丁奉侍天兵衛護此上真道也太上玄真經先盟而後行行之然後可聞玉佩金榼之道耳季偉昔長齋三年始誠竭單思乃能得之于是神光映身然後受書耳此玄真之道要而不煩吾常寶秘藏之囊肘故以相示有慎密者也明堂玄真自有經經亦少耳大都口訣正如此而行之偉昔亦不得經但按此而行始乃得經耳爾欲得可就偉取玉佩隱書非偉所見耳夜行及冥臥心中恐者存日月還入明堂中須臾百邪自滅山居恆爾此為佳右此是說玄真經存之法其大經在茅傳, CK-KZ: 卷}
