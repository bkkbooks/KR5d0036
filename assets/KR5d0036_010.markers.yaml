  - {type: variant, offset: 3654, length: 660, content: 二童太真握明鏡鑑合日月鋒雲儀拂高闕開括泥丸宮萬響入百關驕女坐玄房愈行愈鮮盛英靈自爾通此歌正言耳目之經也我滄浪方丈仙人常寶而為也此道出太上四明玉經中傳行以青金為誓然後乃施行耳右此並是右英夫人受令告長史也又用盟信兼有青帛令亦宜依准立格乃得受傳耳謂青可二十尺金環二雙此四明玉經三品元目也閉炁拜靜百鬼畏憚功曹可見與語謂久行之耳七月二日南嶽夫人喻燒香時勿反顧忤真炁致邪應也入靜戶先前使人通達上聞臨食上勿道死事洗澡時常存六丁令人所向如願理髮欲向王地既櫛髮之初而微咒曰泥丸玄華保精長存右為隱月左為日根六合清煉百神受恩祝畢咽液三過此一條猶是安妃所說無異但不知何者前後耳按以日月推此則是後也右四條南嶽夫人喻正一平經曰閉氣拜靜使百鬼畏憚功曹使者龍虎君可見與語謂能精心久行之耳泰清家有正一平今此悉載拜靜眾事必應是泰清經恐脫字也又曰燒香時勿反顧反顧則忤真炁使致邪應也又曰入靜戶先前右足著前後進左足令與右足齊畢乃趍行如故使人陳啟通達上聞又曰臨食上勿道死事勿露食物來眾邪炁又曰數澡洗每至甲子當沐不爾當以幾月旦使人通靈浴不患數患人不能耳蕩煉尸臭而真炁來入右玄師所敕使施用右六條與前所說大同小異者是受旨是略記今更詳記寫此並益後二條以示長史也右十條並長史寫服仙藥常向本命服畢勿道死喪凶事犯胎傷神徒服無益東卿司命君此一條本在受明堂玄真法後右一條楊書太上九變十化易新經曰若履淹穢及諸不靜處當洗澡浴與解形以除之其法用竹葉十兩桃皮削取白四兩以清水一斛二斗於釜中煮之令一沸出適寒溫以浴形即萬淹消除也既以除淹又辟濕痺瘡痒之疾且竹虛素而內白桃即卻邪而折穢故用此二物以消, CK-KZ: ''}
