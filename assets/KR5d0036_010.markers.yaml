  - {type: variant, offset: 5766, length: 1, content: 太, CK-KZ: 夫欲建吉冢之法去塊後正取九步九尺名曰上玄辟靑龍乘氣非華葢宮王氣神趙子都冢墓百忌害氣之神盡來屬之能制五土之精轉禍爲福侯王之冢招搖欲隱起九上玄辟非尺以石方圓三尺題其文埋之土三尺也世間愚人徒復千條萬章誰能明吉凶四相哉辟非之下冢墓由此而成亦由此而敗非神非聖難可明也必能審此術子玄武延軀孫無復冢墓之患能知墳墓之法千禁萬忌一皆厭之必反凶爲吉能得此法永爲吉冢不足宣也此一紙異手書靑紙依如此法亦爲可解其九步九尺而不云十步三尺者是九尺入冢裏正取中心爲數也但辟非應是朱鳥而虎嘯八垂云冢後若徵家甲向朱鳥在西南羽家庚向朱鳥在東北所不論耳員三尺題其文曰天帝告土下冢中王氣五方諸神趙公明等某國公侯甲乙年如干嵗生值淸眞之氣死歸神宮翳身冥鄉潜甯沖}
