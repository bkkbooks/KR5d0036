  - {type: variant, offset: 5951, length: 1093, content: 人聰明朗徹五藏生華魂魄制煉六府安和長生不死之道此兩字是摹真本朱書右書日月象法亦可圓書日也右一條楊書右此二法不審是何真所受漢孝明皇帝夢見神人身長丈六項生圓光飛在殿前欣然悅之遍問朝廷通人傅毅對曰臣聞天竺國有得道者號曰佛傳聞能飛行身有白光殆其神乎帝乃悟即遣使者張騫羽林郎秦景博士王遵等十四人之大月氏國採寫佛經四十二章秘蘭臺石室第十四即時起洛陽城西門外道北立佛寺又於南宮清涼臺作佛形像及鬼子母圖帝感非常先造壽陵亦於殿上作佛象是時國豐民安遠夷慕化願為臣妾佛像來中國始自明帝時耳此說粗與外書同而長安中似久已有佛裴君即是其事且佛法乃興天竺賓而月氏無有與此為異今既欲說小方諸奉佛故先宜敘此也按張騫非前漢者或姓名同耳傅毅字仲武見漢書秦景王遵等不顯此寺名白馬寺明帝乃葬顯節陵此云壽陵者漢諸帝在位時皆預造壽陵猶今世人作壽塚非陵名也外書記亦雲遣侍中張堪或云郎中張灊並往天竺寫致經象並沙門來至又恐今此說未必是真受猶可楊君疏舊語耳但真經誥中自亟有論及佛事也方諸正四方故謂之方諸一面長一千三百里四面合五千二百里上高九千丈有長明太山夜月高丘各周迴四百里小小山川如此間耳但草木多茂蔚而華實多蒨粲饒不死草甘泉水所在有之飲食者不死青君宮在東華山上方二百里中盡天仙上真宮室也金玉瓊瑤雜為棟宇又有玄寒山山上別為外宮宮室周二百里中方諸東西面又各有小方諸去大方諸三千里小方諸亦方面各三百里周迴一千二百里亦各別有青君宮室又特多中仙人及靈鳥靈獸輩大方諸對會稽之東南小看去會稽岸七萬里東北看則有湯谷建木鄉又去方諸六萬里方諸是乙地湯谷是甲地則自寅至辰十萬里方五隅七言之邪角十四萬里故去會稽七萬里也大方諸之西小方諸上多有奉佛道者有浮圖以金玉鏤之或有高百丈者數十曾謂應作層字樓也其上人盡孝順而不死是食不死草所致也皆服五星精讀夏歸藏經用之以飛行按夏曰連山殷曰歸藏與此不同依如三弟子雖奉佛道不作比丘形服世人謂在真菩薩家耳大方諸之東小方諸上多奇靈寶物有白玉酒金漿汧青君畜積天寶之器物盡在於此亦多有仙人食不死草飲此酒漿身作金玉色澤常多吹九靈簫以自娛樂能吹簫者聞四十里簫有三十孔竹長二三尺九簫同唱百獸拚舞鳳凰數十來至和簫聲大方諸宮青君常治處也其上人皆天真高仙太極公卿諸司命所在也有服日月芒法雖甫得道為真猶故服之霍山赤城亦為司命之府唯太元真人南嶽夫人在焉李仲甫在西方韓眾在南方餘三十一司命皆在東華青童為太司命總統故也楊君亦云東軫執事不知當在第幾住耳直存心中有象太如錢在心中赤色又存日有九芒從心中上出喉至齒間而芒此字非真徊還胃中如此良久臨目存此字非真見心胃中分明乃吐氣嗽液三十九過止一日三為之行之一年疾病除五年身有光彩十八年必得道行日中無影辟百鬼千惡災氣恆存, CK-KZ: ''}
