  - {type: variant, offset: 3891, length: 0, content: '', CK-KZ: 常以二日登山延迎請祝自然得見吾也誠之至矣陰宮何足不觀乎左慈復何人耶此卽南面之東便門應在柏枝礲石穴中此礲小穴甚多難卒分別必須精感得開乃可議入云二日者謂十二月二日依傳說年有兩日恐三月十八日諠譁雜鬧非專請之宜故也左慈以成仙人質見易於俗所以三月淸齋便得入洞長史雖挺分高邈而形識猶昧豈可相比此語是欲相奬勵耳長史後答亦作此意仰酬之也三月十八日十二月二日東卿司命君是其日上要總眞王君太虛眞人東海靑童合會於句曲之山游看洞室好道者欲求神仙宜預齋戒待此日登山請乞篤志心誠者三君自卽見之抽引令前授以要道以入洞門辟兵水之災見太平聖君按中君書云常以二日登山延迎請祝卽請十二月二日不見道三月十八日者屢有正月中耳今臘月二日多寒雪遠近略無來者唯三月十八日輙公私雲集車有數百乘人將四五千道俗男女狀如都市之眾看人唯共登山作靈寶唱讚事訖便散豈復有深誠宻契願覩神眞者乎縱時有至誠一兩人復}
