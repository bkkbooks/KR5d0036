  - {type: variant, offset: 4026, length: 234, content: 曲折經藏著西明公處周文王為酆都西明公也鄭子真則康成之孫也今在陽濯山昔初學時正患兩腳不授積年其晚用針灸兼行曲折祝法百日都除鄭玄唯有一兒為賊所害有遺腹子名小同耳既不入山又複不病腳此子真又非穀口者進退乖異莫辯質據唐覽今在華山得虹丹法合服得不死前來至此並應是保命告十三過針三過灸無不愈左手勝右手也少陽左肘手脈內纏故宜十三過鍼乃得理內脈入少陽也灸氣得溫浮上臂血得風痺故宜三過灸乃得補定流津使筋屬不滯也灸手幽關及風弦并五津凡三處急要也當待佳日我自別相示也保不使爾失此手也右中候夫人, CK-KZ: 葛孝亦}
