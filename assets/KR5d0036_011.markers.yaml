  - {type: variant, offset: 953, length: 595, content: 受此訣是告長史也右一條厶書成治朮一斛清水潔洗令盛訖乃細搗為屑以清水二斛合煮令爛以絹囊盛絞取汁置銅器中湯上蒸之內白蜜一斗大乾棗去核熟細搗令皮肉和會取一斗又內術蜜之中絞令相得如餔狀日食如彈丸三四枚一時百病除二時萬害不傷三時面有光澤四時耳目聰明三年顏如女子神仙不死又法成朮一斛水盛洗洗乃乾干乃細搗為屑大棗四斗去核乃搗令和合清酒五斗會于銅器中煎攪使成餌狀日服如李子三丸百病不能傷而面如童子而耐寒凍又法朮散五斤伏苓煮三沸搗取散五斤右二物合和更搗三千杵盛以密器旦服五合百災百毒百疫不能犯面童而壯健久服能飛越峰谷耳聰目明矣此三方有掾寫似是紫微夫人所授繼朮敘後者煉麻腴法清水三斛麻腴一斛薤白二斤合三物會煎之以木蓋蓋上勿令腴煙散出取一斛止內酒中服之亦可單服此一方有長史寫乃別出四蕊丹方中而世之方本又加蔥白二斤太極真人遺帶散白粉服一刀圭當暴心痛如刺三日欲飲飲既足一斛氣乃絕絕即是死也既斂失尸所在但餘衣在耳是為白日解帶之仙若知藥名者不復心痛但飲足一斛仍絕也既絕已自覺所遺尸者在地也臨時自有玉女玉童以青皞輿共來載之也欲停者當心痛三日節與飲耳其方亦可舉家用雲霞衣九兩是其首此一條不知出何處事即應是白翳散也世未見方右一條厶書齋者不宜雜不齋者而相混並未體正道後宜改之上道之高神虎經是也自非傳授者皆不得令其見所寫之紙也此又一未體矣南真云寫神虎文不精則萬物不為己用心將徒勞耳得紙更留心謹寫燒香先者寫上書當恆燒香文之左右亦初不, CK-KZ: ''}
