  - {type: variant, offset: 3353, length: 145, content: 口受時書極多饞黵改易風病之所生生於丘墳陰濕三泉壅滯是故地官以水氣相激多作風痺風痺之重者舉體不授輕者半身成失手足也若常夢在東北及西北經接故居或見靈床處所者正欲與塚相接耳墓之東北為征絕命西北為九戹此皆冢訟之凶地若見亡者於其間益其驗也若每遇此夢者臥覺當正向上三琢齒而祝之曰太元上玄九都紫天理魂護命, CK-KZ: 中央}
