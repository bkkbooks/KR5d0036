  - {type: variant, offset: 3892, length: 2, content: 飲癖, CK-KZ: 此諠穢終不能得專心自達如此抽引乞恩無因得果矣唯隱居所住中巖禁斷淸年得無遊雜旣去洞隔嶺人自不知至於此也良常山西南垂有可住處是司命往時別宅處也亦可合丹司命初過江立宅於此以自蕩滌質對神鬼今按垂之爲言如是邊際此正應在長史宅後大橫之西今父老相傳言如是邊際此正應在長史宅後大橫之西今父老相傳乃言大茅之西北平地棠梨樹間名下薄處言是司命君故宅耕墾至肥良多見磚瓦故物似經住止處亦驗烈不可穢犯君此審是則宜言中茅之西不應遠舉良常大都眞人語自不正的遇所引處便言耳昔時山下遠近諸處長林榛艻遮天蔽日無處不可隱密卽今斫伐耕稼四通九達山中亦皆顯露時移事異不復可准乃言未久如此正復五六十年來漸劇耳良常東南又有可住處其間當有累石如竈形竈間或有寄生樹樹如曲蓋形此處至好但恨淺耳雖爾自足此處今亦存但無復有寄生曲樹耳亦帶北洞流水其左右並近大路所以言淺卽今凋迥無復可往也洞口西北有一地地小危不安要自足立外靜舍也今此中以去多荒蕪漸近村埭並不足復居昔時言去縣小近往來爲易又近洞口所以屢}
