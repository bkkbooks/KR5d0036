  - {type: variant, offset: 3898, length: 0, content: '', WYG: 論耳意欲營轉鍊之事亦指此山前臨長澗東流水至幽𨼆有形勢若基搆有期當更宣述耳大茅山有𤣥帝時銅鼎古鼎字鼎可容四五斛許偃刻甚精好在山獨髙處入土八尺許上有盤石掩鼎上𤣥帝時命東海神使埋藏於此此亦當是移安息石時所埋也今最高處乃多石每吉日逺近道士咸登上燒香禮拜无復草木累石為小壇昔經有小瓦屋為風所倒尋古來帝王並重鼎器者以其兩鉉法日月三足法三才能烹飪熟成萬物兼自能輕重神變𨼆顯故也中君後答云鑄羽山之銅以作之諸有洞天之山皆爾大茅山下亦有泉水其下可立靜舍近水口處乃佳當小危不安耳今近南大洞口有好流水而多石小出下便平比世有來居之者唯宋初有女道士徐漂女為廣州刺史陸徽所供養在洞口前住積年亡女弟子姓宋為人高潔物莫能干年老而亡仍葬山南宋女弟子姓潘又襲住于今尚在元徽中有數男人復來其前而居至齊初乃敕句容人王文清仍此立館號為崇元開置堂宇廂廊殊為方副常有七八道士皆資俸力自二十許年逺近男女互來依約周流數里廨舍十餘坊而學上道者甚寡不過修靈寶齋及章符而已近有一女人來洞口住勤於灑掃自稱洞吏頗作巫師占卜多雜浮假此例亦處處有之大茅東西亦有澗水有晉末得道者任敦住處合藥竈墌猶存今有薛彪數人居之又有朱法永近小山上快矚眺而乏水良常山對穴口東視小山之嶺其上有埋銅數千斤以盤石塡其上漢時其山下有屈氏家大富財有巨億埋銅器於此于今在也亦有錢錢在西北小山上向也今此山具存无知其錢銅處縱有彷彿亦不識尋視此山明地高下墽澗不似經墟村住處恐嵗代久逺勢迹乖異故也曾得往年三月一日八月八日二書此乙丑所受則長史往年書是甲子年中按答云直置書於述墟朱家靜中則非因華僑楊君送之也三月一日書云今當墾赤石田日為往來之階亦竟不就事也復云豈可遐棄坐觀存没哉此道自決求眞之精誠也心不在我不可責人使必成之也赤石田今中茅西十許里有大塘食澗水久廢不修𨼆居今更築治為田十餘頃長史昔意欲避形迹因作田之階得數處望靈山而遇旱塘壞竟不果所以此書譏之耳都不齋而有書云齋戒也此亦有答明辭奏不可輕妄動靜必皆聞徹矣八月八日書云謹操身詣大茅之端乞特見採録使目接温顔耳聆玉音此語為求道之甚急也得近書具至心可勤道奬志也司命君自在東宫又書不應總合德有輕重之故也司命常住大霍之赤城此間唯有府曹耳具位有高卑故不宜共作辭啟二君雖同居華陽而官府各異不得同紙凡書奏不如口啟於此可具鑒其儀格耳吾等已自相知之厚薄書疏亦甚為班班欲停之如何此是長史輕脫置書於他家靜中而去恐方將人到又致漏泄眞靈愼宻故有此語欲戒試其心事耳長史後答此言亦殆為巧便此書疏愼示俗人脱有見者掘壞靈山爾之罪大也恐俗人貪狡之徒知此金寶處堪能鑿掘則事由宣泄此罪眞為不輕非但爾時敎戒亦傳貽無窮將來諸子咸共秘之右定録中君答長史前書說句曲山事訖此長史前書無本出今唯有後答亦隨條奉酬次第如左右從前良常來凡二十一條並有掾寫昔年十餘嵗時述虚此乃應是墟字而由來皆作虛字即今之山西村名也間耆宿有見語茅山上故昔有仙人乃有市處早已徙去後見包公問動靜此君見答今故在此山非為徙去此山洞庭之西門通太湖包山中所以仙人在中住也唯説中仙君一人字不言有兄弟三人不分别長少不道司命君尊逺别治東宫未見傳記乃知高卑有差降班次有等級耳輒敬承誨命於此而改此長史又更答書云今有所起草存故得撰録而前紙斷失亦非起端語也包公是鮑靚句容人悉呼作包也答書時已是蒙示傳記是乙丑年初矣告小阿口直下三四里便徑至陰宫東𤣥掖門入此穴口二百步便朗然如晝日不審此洞天之别光為引太陽之光以映穴中耶此洞天中官府曠大云宫室數百間屋官屬正二仙君兄弟復有地仙官男女凡有幾許人為直是石室亦有金堂玉房耶宫室與洞庭包山相連不包公及妺朱氏昔在世曾得入此宫不二人為未得登舉作地下主者耶治在何處愚昧冒啟懼有干忤包公及妺事前中君書無有當復是别㖟今更重問并洞中事定録又答有後也市山之盤石市名之存由於此也今之孜孜志慕於道無心金玉尊靈所置唯助令彌宻耳豈有掘犯}
