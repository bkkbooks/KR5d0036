  - {type: variant, offset: 3900, length: 7, content: 每授諸法並針灸, CK-KZ: 爲未之照察也山左右泉水金玉津液其地亦可立靜舍合丹輙當以爲意此上答天市泉水可住事而竟無所立也不審玄帝是何世耶後生蒙蒙多所不及願告顓臾水王故號玄帝外書亦爾長史脫致疑問耳此條復有答}
