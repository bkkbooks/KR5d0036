  - {type: variant, offset: 3855, length: 3, content: 暉考注, CK-KZ: 其明晦今大天崖畔了不得窮此小天邊際殆可捫覩日月出入則應有限當是忽然起滅不由孔穴但未知其形若大小耳句曲之洞宫有五門南兩便門東西便門北大便門凡合五便門也今山南大洞卽是南面之西便門東門似在栢枝隴中北良常洞卽是北大便門而東西並不顯中君告云東便門在中茅東小茅阿口從此入至洞天最近而外口甚小又以石塞之事具在後則西便門亦當如此正應在今所呼作石墳處也栢枝乃有兩三洞口恐眞門外亦不開此三門精齋尋之自可}
