  - {type: variant, offset: 5197, length: 2765, content: 異手書青紙依如此法亦為可解其九步九尺而不云十步三尺者是九尺入冢裏正取中心為數也但闢非應是朱鳥而云塚後若徵家甲向朱鳥在西南羽家庾向朱鳥在東北所不論耳員三天題其文曰天帝告土下塚中王氣五方諸神趙公明等某國公侯甲乙年如千歲生值清真之氣死歸神宮翳身冥鄉潛寧沖虛辟斥諸禁忌不得妄為害氣當令子孫昌熾文詠九功武備七德世世貴王與天地無窮一如土下九天律令員三天猶是方員方員之法六邊皆等如印形也趙公明今千二百官儀乃以為溫鬼之名九功十德事出左傳夫施用此法慎不可令人知若云冢墓王相刑害諸不足者一以填文厭之無不厭伏反凶為吉祇行下被割餘一字如此當是此字後行又被剪語則未盡也從員三天來別一紙復是異人跡不與前同而俱書青紙色理亦小殊疑此並寫非真前范監既有此言恐後人因以造法耳上清真人馮延壽口訣前云是楚市乞人西岳真人馮延壽西嶽之號自不妨上清之目也此後凡十四事雖未見真書類其事旨不乖真法故別撰錄附於卷末夫學生之道當先治病不使體有虛邪及血少腦減津液穢滯也不先治病雖服食行炁無益于身昔有道士王仲甫者少乃有意好事神仙恆吸引二景鳷霞之法四十餘年都不覺益其子亦服之足一十八年白日升天後南嶽真人忽降仲甫而教之云子所以不得升度者以子身有大病腦宮虧減筋液不注靈津未溢雖復接景鳷霞故未為身益仲甫遂因服藥治病兼修其事又一十八年亦白日升天今在玄州受書為中嶽真人領九玄之司于今在也此說殊切事要仲甫父子無餘別顯也夫學生之夫必夷心養神服食治病使腦宮填滿玄精不傾然後可以存神服霞呼吸二景耳若數行交接漏泄施寫者則氣穢神亡精靈枯竭雖復玄挺玉籙金書太極者將亦不可解于非生乎在昔先師常誡於斯事云學生之人一接則傾一年之藥勢二接則傾二年之藥勢過三以往則所傾之藥都亡于身矣是以真仙之士常慎於此以為生生之大忌此事彌會眾經之旨夫學道唯欲默然養神閉氣使極吐氣使微又不得言語大呼喚令人神氣勞損如此以學皆非養生也凡存神光行真仙之事者又不得以衣服借人亦不服非己之物諸是巾褐履屐之具皆使鮮盛三魂七魄或棲其中亦為五神之炁忌污沾故也又八節之日皆當齋盛謀諸善事以營于道之方也慎不可以其日忿爭喜怒及行威刑皆天人大忌為重罪也右三條亦與經事相符凡研味至道及讀誦神經者十言二十言中輒當一二過舐唇咽液百言五十言中輒兩三過叩齒以會神靈充和血氣使靈液凝滿帝一欣宅所謂沖氣不勞啟血不泄也此別一法經中未見其事也學生之法不可泣淚及多唾泄此皆為損液漏津使喉腦大竭是以真人道士常吐納咽味以和六液凡甲寅庚申之日是尸鬼競亂精神躁穢之日也不可與夫妻同席及言語面會當清齋不寢警備其日遣諸可欲凡五卯之日常當齋入室東向心拜存神念炁期感神明亦適意所陳恆如此者玉女降侍此三條與經語亦互相同者也常以本命之日向其方面叩齒三通心存再拜而微咒曰太一鎮生三炁合真室胎上景母玄父元生我五藏攝我精神下灌玉液上朝泥丸夕煉七魄朝和三魂右命玉華左嘯金晨命我神仙役靈使神常保利津飛行十天祝畢又心拜四方叩齒三通咽液三過此名為太上祝生隱朝胎元之道常能行之令魂魄保守長生神仙未見此經法凡入室燒香皆當對席心拜叩齒陰祝隨意所陳唯使精專必獲靈感此亦朝靜之例也凡人常存思識己之形極使仿佛對在我前使面上恆有日月之光洞照一形使日在左月在右去面前令九寸存畢乃琢齒三通微祝曰元胎上真雙景二玄右抱七魄左拘三魂令我神明與形常存祝畢又叩齒三七過咽液七過此名為帝君煉形拘魂制魄之道使人精明神仙長生不死若不得祝者亦可單存之耳道授乃有識形而未見此祝法又學道之士當先檢制魂魄消滅尸鬼常以月晦朔之日庚申甲寅之日當清齋入室沐浴塵埃正席而坐得不眠者益善以真朱筆點左目眥下以雄黃筆點右鼻下令小半入谷裏也點畢先叩齒三通微祝曰上景飛纏朱黃散煙炁攝虛邪尸穢沉泯和魂煉魄合體大神令我不死萬壽永全聰明徹視長享利津祝畢又琢齒三通咽液三過並右手第二指躡右鼻孔下左手第二指躡左目下各七過當盡陰案之勿舉手也於是都畢按此二處是七魄游尸之門戶鉞精賊邪之津梁矣故受朱黃之精塞尸鬼之路引二景之薰遏淫亂之炁也此太極上法常能行之則魂魄和柔尸穢散絕長生神仙通炁徹視行之三年色念都泯矣此頗似太靈真人法可兼修用之凡上清叩齒咽液法皆各有方先後有次不得亂雜使真靈混錯也夫叩齒以命神咽炁以和真納和因六液以運入制神須鳴鼓而行列矣凡存修上法禮祝之時皆先叩齒上下相叩勿左右也一呼一吸令得三叩為善須禮祝畢更又叩齒乃得咽諸炁液耳此名為呼神和真以求升仙者也吾屢見偽俗之人或誤定經文先後雜亂無有次緒用以為益良可悲也此亦同五神經中意旨右本卷訖此養性禁忌口訣復有此諸條亦未見真書而似是二許抄事皆仙人條用小訣有助于施行故並撰錄黃仙君口訣服食藥物不欲食蒜及石榴子豬肝犬頭肉至忌都絕為上道士自不可食豬犬肉而交房中令藥力不行又計食一斤損笄百日子其慎之此彭祖弟子撰傳者青牛道士口訣暮臥存日在額上月在臍上辟千鬼萬邪致玉女來降萬禍伏走秘驗即封君達也出神仙傳五岳序沈羲口訣服神藥勿向北方大忌亥子日不可唾亡精失氣減損年命藥勢如土沈出神仙傳呂恭口訣入山之日未至山百步先卻行百步反足乃登山山精不犯人眾邪伏走百毒藏匿呂出神仙傳欒巴口訣行經山及諸靈廟祠間存口中有真人字赤靈丈人侍以玉女二人一女名華正一女名攝精丈人著赤羅袍玉女二人上下黃衣所存畢乃叱吒曰廟中鬼神速來使百邪詣赤靈丈人受斬死眾精卻千里此是三天前軀使者捕鬼之法即欒豫章也出劍經神仙傳虎豹符及後漢書東海小童口訣道士求仙勿與女子交一交而傾一年之藥力若無所服而行房內減笄三十年此上相青童君之別號也東陵聖母口訣學道慎勿言有多為山神百精所試夜臥閉目存眼童子在泥丸中令內視身神長生升天劉京亦用此術出神仙傳今為海神之宗劉京渝漢末人出飛步經後女仙程偉妻口訣服食勿食血物食血物使不得去三尸乾肉可耳程偉為漢期門郎其婦知房事見葛洪內篇也鳳綱口訣道士有疾閉目內視心使生火以燒身身盡存之使精如仿佛疾病即愈是痛處存其火祕驗出神仙傳能釀百草花以起死者陳安世口訣道士結頭理髮及飲食施履屐枕褥勿令非道士者見其理髮干其飲食動其履屐用其枕褥彼俗尸魄形中之鬼來侵我神也所以道士棲山林而幽身者皆欲遠茲囂穢絕放人間之業是恐外物凡百犯其性命也祕之陳出神仙傳李少君口訣道士求仙不欲見死人尸損神壞氣之極人君師父親愛不得已而臨之耳所以道士去世不事王侯是無君也塊然獨存是無友也唯父母師主不得不臨喪致感極之哀不吝性命之傷耳苟以此故而傷是以無傷之也吾其秘之故口傳焉漢武臣出神仙傳女仙人劉綱妻口訣求仙者勿與女子三月九日六月二日九月六日十二月三日是其日當入室不可見女子六尸亂則藏血擾潰飛越三魂失守神彫氣逝積以致死所以忌此日者非但塞遏淫泆而已將以安女宮女宮在申男宮在寅寅申相刑刑殺相加是日男女三尸出于目珠瞳之中女尸招男男尸招女禍害往來喪神虧正雖人不自覺而形露已損由三尸戰於眼中流血於泥丸也子至其日雖至寵之女子親愛之令婦固不可相對我先師但修此道而仙矣複不及至親無心者矣子其慎之矣綱妻出神仙傳又虎豹符中凡此雜事皆與真經相符並可按而施用也, CK-KZ: 背}
