  - {type: variant, offset: 53, length: 2, content: 賦詩, HFL: 按傳中云金陵之地方三十七八頃恐是其大垠所至至於實録正當十餘頃耳高平者是可住處也會登其地依說觀望自可領略粗知其處若爲仙眞度世及種民者無患不自然得至苟其非分徒携手築室必當諸方不立趣使移去耳悠悠凡猥勿承此强欲居之金陵之左右汧谷溪源陵之左有山也右有源汧名柳谷陵之西有源汧名陽谷名山内經福地誌曰伏龍之地在柳谷之西金壇之右可以高棲正金陵之福地也按今呼爲柳谷汧者其源出小茅後田公泉而西南流至述墟首入大汧陽谷汧者今無復其名而長隱山岡後有小汧西流南折亦會述墟首又父老云陽谷汧源乃出中茅前大茅後藪川注合爲}
