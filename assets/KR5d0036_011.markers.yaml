  - {type: variant, offset: 3861, length: 3, content: 辰收摧, CK-KZ: 大洞猶有鬼神去來而眞仙人出入都不由五門皆欻爾無間設此門者爲示是山洞體製或外人應入故耳虛空之內皆有石階曲出以承門口令得往來上下也人卒行出入者都不覺是洞天之中故自謂是外之道路也日月之光旣自不異草木水澤又與外無別飛鳥交橫風雲蓊鬱亦不知所以疑之矣所謂洞天神宮靈妙無方不可得而議不可得而罔也世人採藥往往誤入諸洞中皆}
