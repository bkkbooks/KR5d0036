  - {type: variant, offset: 3880, length: 0, content: '', WYG: 今尋檢其處亦可見石蓋亦殊自不小也茅山北垂洞口一山名良常山本亦句曲相連都一名耳始皇三十七年十月癸丑始皇出遊十一月行至雲夢祠虞舜於九疑浮江下觀藉柯度梅渚過丹陽至錢塘臨浙江水波惡乃至西百二十里從峽中度上會稽祭夏禹望于南海而立石刻頌秦徳於會稽山李斯請書而還過諸山川遂登句曲北垂山埋白璧一雙於是會羣官饗從駕始皇歎曰巡狩之樂莫過於山海自今已往良為常也爾乃羣臣並稱夀喚曰良為常矣又鳴大鼓擊大鐘萬聲齊唱洞駭山澤讃樂吉兆大小咸善乃改句曲北垂曰良常之山也良常之意從此而名檢外書始皇三十七年正月出遊雲夢丹陽浙江上㑹稽祭夏禹望南海刻石紀功還過呉渡江來並北海至瑯琊至平原得病七月丙寅崩於沙丘九月葬驪山如此之時皆朱有瀆即是從延陵步道上取句容江來路仍過停饗設耳非必故詣句曲所以止住山北邊下處遂不進前嶺且於時亦未驗此山之靈竒祀璧之意者為通是望山設所以中君云所履山川皆祀以玉璧也夫號從主人名由地表小君以漢成帝時㖟紫書云治于良常北洞蓋内因此成稱也又檢始皇崩不發喪令車載鮑魚以亂炁此應夏月中如外書所説相似今依傳言乃是三十六年十月建亥之月為秦正月為出遊是至雲夢耳不爾則是三十八年秋崩也未作秦厯不能得定癸丑是何月中比别更詳正之王莽地皇三年七月戊申此七月二十四日也遣使者章邕賫黄金百鎰銅鐘五枚贈之於句曲三仙君王莽制金為貨名鎰形如錢無孔重一兩直錢一千百鎰則百兩也光武建武七年三月丁巳此三月二十四日也遣使者呉倫賫金五十斤獻之於三君今並埋在小茅山上獨高處埳上有聚石入地三四尺也此則今小茅山積石上最高處是也此二事不顯眞㖟中漢明帝永平二年詔敕郡縣修守丹陽句曲眞人之廟按三君初得道乗白鵠在山頭時諸村邑人互見兼祈禱靈驗因共立廟於山東號曰白鵠廟每饗祀之時或聞言語或見白鵠在帳中或聞伎樂聲於是競各供侍此廟今猶在山東平阿村中有女子姓尹為祝逮山西諸村各各造廟大茅西為呉墟廟中茅後山上為述墟廟並嵗事鼓舞同乎血祀蓋已為西明所司非復眞仙僚屬矣中茅山𤣥嶺獨高處司命君埋西胡玉門丹砂六千斤於此山深二丈許埳上四面有小盤石鎭其上其山左右當泉水下流水皆小赤色飲之益人此山下左右亦有小平處可堪靜舍左元放時就司命乞丹砂得十二斤耳今此嶺前後甚多大石而山上左右無正流水東南近下有一長澗西南近下亦有小水度嶺南𨼆居住處近山上有湧泉冬夏無窮而水色不甚覺赤耳平處可住東西唯當近澗左右為好左氏乞丹砂當是入洞時所請以合爐火九華丹右楊書大茅山中茅山相連長阿中有連石古時名為積金山此山中甚多金物其處宜人住可索有水處為屋室靜舍乃佳此數處亦任意耳快可合丹以修上道中茅之前大茅之後下麓長澗東西亦出山外對館此即𨼆居今所住東面一横壟也此壟純絶石石形甚瓌竒多穿穴側傍盤紆下深乃有無底處屢投脆物在中間玲玲之響久之此云多金物亦當是久來眞仙所投也西南有大石壁聳而坼開内有洞入數丈漸狹小不復容人乃飆飆有風外數步便有一湧泉冬夏清流即下解所資近外澗口又有一湧泉水勢乃駛上者冬温而夏冷今正對邏前小近下復有一穴湧泉特竒大水大旱未嘗增減色小白而甘美柔弱灌注無窮但恨在山西自不得東流耳亦别開決作東流用之又渡此嶺東南有一石穴水東流極好其處𨼆障甚可合丹即後所云菌山之前也正患去徑路近車聲人響殆欲相聞今若斷此路不復聽車聲人行便是第一處方當思為其宜茅山住止惟有𨼆居今所住及南洞口}
