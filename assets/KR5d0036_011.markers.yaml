  - {type: variant, offset: 3499, length: 133, content: 素真人我佩上法受教太玄長生久視神飛體仙塚墓永安鬼訟塞姦魂魄和悅惡氣不煙遊魅罔象敢干我神北帝呵制收氣入淵得籙上皇謹奏玉晨如此者再祝祝又三叩齒則不復夢冢墓及家死鬼也此北帝祕祝也有心好事者皆可行之若經常得惡夢不祥者皆可按此法于是鬼氣滅也邪鬼散形也此應令以受長史也但許姓羽音, CK-KZ: 四邊漸下}
