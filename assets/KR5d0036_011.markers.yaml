  - {type: variant, offset: 3971, length: 0, content: '', CK-KZ: 有一地地小危不安可立外靜舍愚意本自欲立內外靜舍輙當疇量在宜亦不聞立此外靜事而今有一累石壇厯然相傳乃言掾於此壇化遯也每往拜視輒感嘆纏心告菌山至佳司命臨去埋金於此欲服金者可取且竊有合金液意今未敢議此若山居積年修學日進後而事可得密者臨時啓質中君書云吾昔臨去埋金不道司命長史此答誤耳告大茅山有玄}
