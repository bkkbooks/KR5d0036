markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 稽神樞第一金陵者洞虛之膏腴句曲之地胏也履之者萬萬知之者無一保命君㖟作此言按㖟此應在乙丑年六月已前甲子嵗中事始論此山受福之端也其地肥良故曰膏腴水至則浮故曰地胏厯世遊踐莫有知其處者句曲山源曲而有所容故號爲句容里過江一百五十里訪索卽得凡此後紫書大字者並茅三君傳所記也傳旣以寶祕見之者稀今謹抄取說山事共相證顯按山形宛曲東西邅迴故曰句曲從山嶺分界西及北屬句容東及南屬延陵句容旣立爲縣故其里不復存昔時應在述墟左右耳今山去石頭江水步道一百五六十六里江水之東金陵之左右間小澤澤東有句曲之山是也此葢呼秣陵之金陵非地胏之金陵矣小澤卽謂今赤山湖也從江水直對望山東西左右正自如此也此山洞虛內觀內有靈府洞庭四開穴岫長連古人謂爲金壇之虛臺天后之便闕淸虛之東窗林屋之隔沓眾洞相通陰路所適七塗九源四方交達眞洞仙館也此論洞天中諸所通達天后者林屋洞中之眞君位在太湖苞山下龍威丈人所入得靈寶五符處也淸虛是王屋洞天名言華陽與比並相貫通也山形似已故以句曲爲名焉今登中茅玄嶺前後望諸峰壟盤紆曲轉以大茅爲首東行北轉又折西行北轉又折東北行至大橫反覆南北狀如左書已字之形金陵者兵水不能加災癘所不犯河圖中要元篇第四十四}
