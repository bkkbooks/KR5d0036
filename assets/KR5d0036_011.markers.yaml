  - {type: variant, offset: 4885, length: 309, content: 此猶是前所服三氣之範監也四靈雖同墓法而形相莫辯又以朱鳥為上玄亦所未詳也積善憇德慈心在物兼修長存之方洞守形中之寶者雖有此墓為以示始終之觀耳至于神全得會熙鏡玄開亦何時永為朽物不復生出耶此墓之人斯可謂應運矣此並論長史婦所葬墓事辛玄子所言辛玄子事在第五卷中右三條楊書青龍秉氣上玄闢非玄武延軀虎嘯八垂夫欲建吉塚之法去塊後正取九步九尺名曰上玄辟非華蓋宮王氣神趙子都冢墓百忌害氣之神盡來屬之能制五土之精轉禍為福侯王之塚招搖欲隱起九尺以石方圓三尺題其文埋之土三尺也世間愚人徒復千條萬章誰能明吉凶四相哉辟非之下塚墓由此而成亦由此而敗非神非聖難可明也必能審此術子孫無復冢墓之患能知墳墓之法千禁萬忌一皆厭之必反凶為吉能得此法永為吉冢不足宣也, CK-KZ: 嵗乙丑}
