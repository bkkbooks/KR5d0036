  - {type: variant, offset: 3883, length: 0, content: '', WYG: 好所恨逈曠且此一山通無虺蝮毒螫時有青虵都不犯物虎亦甚少自古來未聞害人山居不問道俗皆少温病山德寛容不到險阻但恨無青林冬夏常鬱如東間諸山耳自𨼆居往來熂養成秀於形望大好山出好术并雜藥絶宜松柏而本無人植不容自生今亦分布歳種之耳茅山天市壇四面皆有寶金白玉各八九千斤去壇左右二丈許入地九尺耳昔東海青童君曾乗獨飆飛輪之車通按行有洞天之山曾來於此山上矣其山左右有泉水皆金玉之津氣可索其有小安處為靜舍乃佳若飲此水甚便益人精可合丹天市之壇石正當洞天之中央𤣥窻之上也此石是安息國天市山石也所以名之為天市盤石也𤣥帝時召四海神使運此盤石於洞天之上耳非但句曲而已仙人市壇之下洞宫之中央窻上也句曲山腹内虚空謂之洞臺仙府也𤣥帝時召四海神使運安息國天市山寶玉璞石以塡洞天之中央𤣥窻之上也東海青童君曽乗獨飆飛輪之車通按行有洞臺之山皆埋寶金白玉各八九千斤於市石左右四面以鎭陰宫之嶺諸有洞天皆爾不但句曲而已邑人呼天市盤石為仙人市壇是其欲少有彷彿而不了了也青童飆輪之迹今故分明句曲之山諸記說今悉分明唯天市壇石未知的何所在以論迹而言𨼆量正應大茅左右而踐行不見其異處或恐為土木蕪没所不論耳按保命趙承每登壇長嘯風雲立至此則不應在小處長見雲氣出入恒先起大茅北陰此或當高而陰故也夫眞人常御九龍左驂名飆右服名歘既履山頂故指乗其右驂今大茅嶺上向東行有路傍山平治狀如人功足通軌轍相傳皆呼此為飆輪迹乃無埋没石壇既未顯金寶亦難測所埋又疑洞天中央𤣥窻之上不應乃近南門復恐在中茅間邑人耆老亦不復知仙人市壇處自𨼆居來此山七八年尚未得窮歴踐行而況悠悠之徒令其究竟之所以來得遍履者患於無良侣可同登陟之艱獨行又覺踽踽是以遂爾淹稽常所耻恨比日方負杖孤遊庶當委曲所聞所見耳中茅山東有小穴穴口纔如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口餘小穿如盃大使山靈守衞之此盤石亦時開發耳謂之陰宫之阿門子勤齋戒尋之得從此入易於良常洞口其中}
