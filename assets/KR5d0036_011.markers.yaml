  - {type: variant, offset: 70, length: 0, content: '', CK-KZ: 宅西北近長隱小岡下乃時有故破瓦器焦赤土甚多疑是人居處旣經耕墾基域不復存而了無井亦恐如長史井堙沒耳又小茅大橫不見採金處大茅金井若是復不應頓如此遠居二三疑昧金陵之土似北邙及北谷關土堅實而宜禾穀掘其間作井正似長安鳳門外井水味是淸源幽瀾洞泉遠沽耳水色白都不學道居其土飲其水亦令人壽考也是金津潤液之所溉耶子其祕之吾有傳紀具載其事行當相示定錄君受作密令爾許侯北邙山在洛陽北數里北谷關卽孟津關也土色黃黑而肥腴鳳門卽長安北門也今所擬金陵地並無土種植及住止鑿井者乃是無知察亦爲眞靈愛護不使輕得居焉吾有傳紀者卽是三茅傳也按長史甲子年書云未見傳記則㖟此書時或在癸亥年中也傳中亦稱良土甘美居之度世故因此而顯言也地處少少耳隱略十餘頃許高而平者六七頃也旣知其要覩其形勢便朗朗也故不曲示耳保命君告按傳中云金陵之地方三十七八頃恐是其大垠所至至於實錄正當十餘頃耳高平者是可住處也會登其地依說觀望}
