  - {type: variant, offset: 3884, length: 3, content: 惡夢恆, CK-KZ: 沙路曲僻經水處不大便易又道路遠不如小阿穴口直下三四里便徑至陰宮東玄掖門入此穴口二百步便朗然如晝日此卽洞天東門也隱量乃可知處自未敢輕索入耳前傳云洞宮出土上計十三四里許今此云三四里便至掖門者是近山下已薄而門勢又未平計入門復應向下數里乃得至宮耳入口便明者此爲內光出照不必關外日者也大茅山亦}
