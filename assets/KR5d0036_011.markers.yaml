  - {type: variant, offset: 60, length: 0, content: '', HFL: 質也是以百代百易非復本名良可歎也按今小茅東北一長大山名大横山云本名鬱崗山山即在今所謂伏龍之東世又呼伏龍地爲死蛇崗亦粗有彷彿又見其長而高益呼爲長隱隱音於覲切其言可隱障也此崗山雖多細石亦可居耳近東南取長史宅至雷平間甚有可住處義興蔣員蒭等今并立田舍於崗下近去長史宅四五里越桐栢之金庭吴句曲之金陵養眞之福境成神之靈墟也五倍堯水東海傾人盡病死武安兵其如予何由我帶近洞臺之幽門恃此而彷佯耳右弼王王眞人㖟令宻示許侯}
