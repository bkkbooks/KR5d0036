  - {type: variant, offset: 1550, length: 435, content: 專使煙清恆也精誠務在匪懈求道唯取于不倦耳此又近於替乎夫得道者常恨于不早聞受失道者常恨於不精勤何謂精耶專篤其事也何謂勤耶恭繕其業也既加之以檢慎守之以取感者則去真近矣爾其營之勿忘也此前五條並似止告楊君受書則師乃恥之耶真心既有不盡獲考者非一人子往師蘇林守一當先齋受戒能得此度世幾未可量也九華真妃言守五斗內一是真一之上也皆地真人法也上黨王真京兆孟君司馬季主皆先按于此道而始矣魯女生邯鄲張君今皆在中嶽及華山正守此一亦可得漸階上道而進復為不難也五斗內一涓子內法昔所授于峨嵋臺中本其外守一玄一之屬莫有逮其蹤者也小君言五斗真一即今蘇傳中分至日所存用者是也中君曰良勤不休吾當與其流珠真此亦中真之上道也流珠亦九宮家事其經未出世此前五條並似令告牙也又云性躁暴者一身之賊病求道之堅梯也遂之者真去改之者道來每事觸類皆當柔遲而盡精潔之理如此幾乎道者也此語似令告掾小茅君云丹砂雄黃雌黃家家皆有之至於無一人合藥者也皆如傳國璽印父傳子子傳孫耳好道而不專疲志而不固華名鍾于胸心榮味交于外視萬萬皆是也適足疲我, CK-KZ: ''}
