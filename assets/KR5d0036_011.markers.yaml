  - {type: variant, offset: 3895, length: 0, content: '', CK-KZ: 之耳外靜舍當以俟游賔從憩止非自往修行之所益知是欲相近之意也須居士所撰本此中向近所摽精舍地一篇今視掾書者不以相次乃別出在長史所營宅前耳此後長史答書道西北地危仍次菌山不酬金鄉至室語明知本别㖟之也句曲之山有名菌山此山至佳亦有金乃可往採入土不過一二尺耳吾昔臨去時曾埋金於此欲服金者可往取但當不中以營私累耳今人不復識呼菌山者尋此山形當如菌孤立亦或是囷蒼之囷形如囷也按大茅後長阿積金東凹地有一山子獨秀如博山爐且又近積金山恐此或當是卽今多石及樹木但金之所在指一}
