  - {type: variant, offset: 338, length: 614, content: 煙含啟金石華真藹鬱紫空煉形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目事訖此道神妙又神州玄都多有得此術者久行之常乘雲務而遊也右一條楊書又掾寫守玄白之道常旦旦坐臥任意存泥丸中有黑氣存心中有白氣存臍中有黃氣三氣俱生如雲氣覆身因變成火火又繞身身通洞徹內外如一旦行至向中乃止于是服氣一百二十都畢道正如此使人長生不死辟卻萬害尤禁六畜肉五辛之味當別寢處靜思尤忌房室房室即死初存出氣如小豆漸大衝天三炁纏煙繞身共同成一混忽生火在三煙之內又合景以煉一身一身之裏五藏照徹此亦要道也右二條有掾寫並右三事在論華陽第四卷中今又重鈔可修事出此耳其本文猶在彼卷太極真人敕酆臺北帝使告三此三字被後人枿不可複識官制神滅鬼靈符盛以重紫之囊係之頭上入穢淹脕也此九字又被青枿乃不可都識而非今所書字衛符有三天直使者二人凶鬼萬邪有乾佩符者即死此下複有十字亦被枿不可複識男女各佩一已別題之小君今書此符相與佩之在玉馬經上一名北帝書七元符中有一符無題相傳言是此符而玉馬經世未嘗見不敢為定一雄黃二雌黃三鉛黃右三黃華先投朱砂一熟研之于器中次投雄黃熟研之次投雌黃熟研之次投鉛黃合研之良久成也以膠清合研之言一者以意為之一分之品量多少也此是諭作三黃色以畫符法真符多用此右三條楊書合藥當令精不精者不自咎反責方之不驗若是人可謂咎乎可使鈔方合耳可用昌蒲五兩所以用十兩末知道門戶之人耳可用茱萸根皮二兩紫雲芝英三兩此用君口訣此是論合初神丸事其方在蘇傳中即周紫陽所撰, CK-KZ: 眞限衞}
