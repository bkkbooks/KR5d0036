  - {type: variant, offset: 73, length: 3, content: 真書及, CK-KZ: 猥勿承此强欲居之金陵之左右汧谷溪源陵之左有山也右有源汧名柳谷陵之西有源汧名陽谷名山內經福地誌曰伏龍之地在柳谷之西金壇之右可以高棲正金陵之福地也按今呼爲柳谷汧者其源出小茅後田公泉而西南流至述墟首入大汧陽谷汧者今無復其名而長隱山岡後有小汧西流南折亦會述墟首又父老云陽谷汧源乃出中茅前大茅後數川注合爲一汧出山直西行北轉亦會大汧論兩汧相交之內卽是此地大略東西不得極正故兼以左右爲言但今之所云二谷不知卽是昔號不雖有耆相承傳譯漸失兼汧源迥異不必可指的爲據也上}
