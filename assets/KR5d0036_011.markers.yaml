  - {type: variant, offset: 49, length: 6, content: 既開啟告賦詩, CK-KZ: 言相感悟乃從楊君宣說吾之所啓發矣句曲山其間有金陵之地地方三十七八頃是金陵之地胏也土良而井水甜美居其地必得度世見太平河圖內元經曰乃地胏土良水淸句曲之山金壇之陵可以度世上昇曲城又河書中篇曰句金之山其間有陵兵病不往洪波不登此之謂也後所稱河圖卽是前要元篇語雖山壇字異其理猶同此蓋指論金陵地胏}
