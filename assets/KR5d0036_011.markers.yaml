  - {type: variant, offset: 2256, length: 1084, content: 勿道學道道學道鬼犯人亦不立使人病是體未真故青童亦云一言一事泄減一如此可不慎之此三條本在酆宮記中楊書又掾書大洞真經高上內章遏邪大祝上法曰每當經危險之路鬼廟之間意中諸有疑難之處心將有微忌敕所經履者乃當先反舌內向咽液三過畢以左手第二第三指躡兩鼻孔下人中之本鼻中隔孔之內際也三十六過即手急按勿舉指計數也鼻中隔之際名曰山源山源者一名鬼井一名神池一名邪根一名魂臺也躡畢因叩齒七通畢又進手心以掩鼻于是臨目乃微祝曰朱鳥淩天神威內張山源四鎮鬼井逃亡神池吐氣邪根伏藏魂臺四明瓊房零琅玉真巍峨坐鎮明堂手暉紫霞頭建神光執詠洞經三十九章中有辟邪龍虎截岳斬堽猛獸奔牛銜刀吞鑲揭山攫天神雀毒龍六領吐火啖鬼之王電豬雷父掣星流橫梟磕駁灼逆風橫行天禽羅陳皆在我傍吐火萬丈以除不祥群精啟道封落山鄉千神百靈併手叩顙澤尉捧燈為我燒香所在所經萬神奉迎畢又叩齒三通乃開目除去左手手按山源則鬼神閉門手薄神池則邪根散分手臨魂臺則玉真守關于是感激靈根天獸來衛千精震伏莫干我炁此自然之理使忽爾而然也鼻下山源是一身之武津真邪之通府不真者所以生邪氣為真者所以遏萬邪在我運攝之耳故吉凶兆焉明堂中亦一身之文池死生之形宅存其神可以眇乎內觀廢其道所以致乎朽爛故由我御順其術而死生悔焉右一條出大洞真經高上首章此一條不審誰受有長史寫此經亦未出世也夜行常當琢齒亦無正限數也煞鬼邪鬼常畏琢齒聲是故不得犯人也若兼以漱液祝說益善世人有知酆都六天宮門名則百鬼不敢為害欲臥時常先向北祝之三過微其音也祝曰吾是太上弟子下統六天六天之宮是吾所部不但所部乃太上之所主吾知六天門名是故長生敢有犯者太上斬汝形第一宮名紂絕陰天宮以次東行第二宮名泰煞諒事宗天宮第三宮名明晨耐犯武城天宮第四宮名恬照罪炁天宮第五宮名宗靈七非天宮第六宮名敢司連宛屢天宮止乃琢齒六下乃臥辟諸鬼邪之氣如此凡三過也此二法出酆都記今鈔相隨北帝煞鬼之法先叩齒三十六下乃祝曰天蓬天蓬九元煞童五丁都司高刁北公七政八靈太上浩凶長顱巨獸手把帝鍾素梟三晨嚴駕夔龍威劍神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼橫身飲風蒼舌綠齒四目老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衛我九重辟尸千里去卻不祥敢有小鬼欲來見狀攫天大斧斬鬼五形炎帝裂血北斗燃骨四明破骸天猷滅類神刀一下萬鬼自潰畢四言輒一琢齒以為節也若冥夜白日得祝為恆祝也鬼有三被此祝者眼精目爛而身即死矣此上神祝皆斬鬼之司名北帝秘其道若世人得此法恆能行之便不死之道也男女大小皆可行之此所謂北帝之神祝煞鬼之良法鬼三被此法皆自死矣常亦畏聞此言矣因病行此立愈叩齒當臨目存見五藏厶此中一字楊本穿壞不可識掾亦仍闕無具五神自然存也酆都中秘此祝法今密及之耳不可泄非有道者共秘之乎右, CK-KZ: ''}
