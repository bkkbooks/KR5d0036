  - {type: variant, offset: 4509, length: 295, content: 保命言風徊曲津兩處灸經亦無此穴塚訟章不見有異本鄧雲山趙公成並無別顯出也夜臥覺存日象在疾手中握之使日光赤芒從臂中逆至肘腋間良久日芒忽變成火燒臂使臂內外通匝洞徹良久畢乃陰祝曰四明上元日月氣分流光煥曜灌液凝魂神光散景蕩穢煉煙洞徹風氣百邪燔然使得長生四肢完全注害考鬼收付北辰畢存思良久放身自忘右保命說此云案消魔上秘祝法此經未出世若猶是智慧七卷限者未審小君亦安得見之右八條並掾書寫昨具以墓事請問荀侯荀侯云極陰積冱久經墳塋遂使地官激注塚靈沉滯風邪之興恆繼此而作然衝氣欲散作考漸歇鎮塞之宜未為急也不如通婦墓之井以潤乎易遷之途救渴惠乎路人陰惠流于四衢植棠棣于龍川散松楊以固標此其所利耶荀侯即應是荀中侯也此即, CK-KZ: ''}
