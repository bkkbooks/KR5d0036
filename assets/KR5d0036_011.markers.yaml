  - {type: variant, offset: 68, length: 0, content: '', CK-KZ-jye: 句曲山秦時名爲句金之壇以洞天內有金壇百丈因以致名也外又有積金山亦因積金爲壇號矣周時名其源澤爲曲水之穴按山形曲折後人合爲句曲之山漢有三茅君來治其上時父老又轉名茅君之山三君往曾各乘一白鵠各集山之三處時人互有見者是以發於歌謠乃復因鵠集之處分句曲之山爲大茅君中茅君小茅君三山焉總而言之盡是句曲之一山耳無異名也三茅山隱山連相屬皆句曲山一名耳時人因事而諭今故有枝條數十作別名舊不爾也今以在南最高者爲大茅山中央有三峰連岑鼎立以近後最高者爲中茅山近北一岑孤峰上有聚石者爲小茅山大茅中茅間名長阿東出通延陵句曲阿西出通句容湖就以爲連石積金山馬嶺相帶狀如埭形其中茅小茅間名小阿東西出亦如此有一小馬嶺相連自小茅山後去便有雷平燕口方嵎大橫良常諸山靡迆相屬垂至破罡瀆自大茅南復有韮山竹吳山方山從此疊障達于吳興諸山至於羅浮窮於南海也山生黃金漢靈帝時詔勑郡縣採句曲之金以充武庫逮孫權時又遣宿衞人採金常輸官兵帥百家遂屯居伏龍之地因改爲金陵之墟名也河圖已得之於昔可謂絶妙今大茅山南猶有數深坑大坎相傳呼之爲金井當是孫權時所鑿掘也今此山近東諸處碎石往往皆有金砂云兵帥仍屯居伏龍今則無復有唯小近西有述墟昔乃名术墟今是良民述墟前十數里大茅有吳墟村以號而言乃欲相似而復不關金陵}
