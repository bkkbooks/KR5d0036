  - {type: variant, offset: 3874, length: 1, content: 亦, CK-KZ: 路至穎川間便應徑通王屋淸虛天也元放當是爲魏武所逼後仍來後眞㖟乃云淸齋五年然後乃得深進內外宮耳三種芝恐是下品者也良常北垂洞宮口直山領南行二百步有秦始皇埋藏白璧兩雙入地七尺上有小磐石在嶺上以覆塪處李斯刻書璧其文曰始皇聖德章平山河巡狩蒼川勒銘素璧若掘卽可得始皇所履山川皆祀以玉璧不但句曲而已從此後墨書皆定錄眞君㖟}
