  - {type: variant, offset: 49, length: 6, content: 既開啟告賦詩, CK-KZ-jye: 言相感悟乃從楊君宣說吾之所啓發矣句曲山其間有金陵之地地方三十七八頃是金陵之地胏也土良而井水甜美居其地必得度世見太平河圖內元經曰乃地胏土良水淸句曲之山金壇之陵可以度世上昇曲城又河書中篇曰句金之山其間有陵兵病不往洪波不登此之謂也後所稱河圖卽是前要元篇語雖山壇字異其理猶同此蓋指論金陵地胏}
  - {type: variant, offset: 49, length: 0, content: '', HFL: 言相感悟乃從楊君宣說吾之所啓發矣句曲山其間有金陵之地地方三十七八頃是金陵之地胏也上良而井水甜美居其地必得度世見太平河圖内元經曰乃地肺土良水清句曲之山金壇之陵可以度世上昇曲城又河書中篇曰句金之山其間有陵兵病不徃洪波不登此之謂也後所稱河圖即是前要元篇語雖山壇字異其理猶同此蓋指論金陵地肺一片地能如此耳其餘處未必有所免辟耳金陵古名之爲伏龍之地河圖逆察故書記運會之時方來之定名耳至於金陵之號已二百餘年矣尋金陵之號起自楚時至秦皇遇江厭氣乃改爲秣陵漢來縣舊治小丹陽今猶呼爲故治也晋太康三年割淮水之南屬之義熙九年移治闕場元熙元年徙還今處此是江東之金陵耳傳所言二百餘年者是吴孫權使人採金屯居伏龍山因名金陵自然響會所以歎河圖之逆兆也句曲山秦時名爲句金之壇以洞天内有金壇百丈因以致名也外又有積金山亦因積金爲壇號矣周時名其源澤爲曲水之穴按山形曲折後人合爲句曲之山漢有三茅君來治其上時父老又轉名茅君之山三君徃曾各乘一白鵠各集山之三處時人互有見者是以發於歌謡乃復因鵠集之處分句曲之山爲大茅君中茅君小茅君三山焉緫而言之盡是句曲之一山耳無異名也三茅山隱相屬皆句曲山一名耳時人因事而諭今故有枝條數十作别名舊不爾也今以在南最高者爲大茅山中央有三峰連吟鼎立以近後最高者爲中茅山近北一岭孤峰上有聚石者爲小茅山大茅中茅間名長阿東出通延陵句曲阿西出通句容湖就以爲連石積金山馬嶺相帶狀如埭形其中茅小茅間名小阿東西出亦如此有一小馬嶺相連自小茅山後去便有雷平燕口方嵎大横良常諸山靡迆相屬垂至破罡瀆自大茅南復有韮山竹吴山方山從此疊障達于吴興諸山至于羅浮窮於南海也山生黄金漢靈帝時詔勑郡縣採句曲之金以充武庫逮孫權時又遣宿衛人採金常輸官兵帥百家遂屯居伏龍之地因改爲金陵之墟名也河圖已得之於昔可謂絶妙今大茅山南猶有數深坑大坎相傳呼之爲金井當是孫權時所鑿掘也今此山近東諸處碎石徃徃皆有金砂云兵帥仍屯居伏龍今則無復有唯小近西有述墟昔乃名术墟今是良民述墟前十數里大茅有吴墟村以號而言乃欲相似而復不關金陵長史宅西北近長隱小岡下乃時有故破瓦器焦赤土甚多疑是人居處}
