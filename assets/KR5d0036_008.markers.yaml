  - {type: variant, offset: 2592, length: 282, content: 有此告五飲丸即是世中者耳精合五飲丸當大得力且可自靜息乎範安遠所言語許長史無所憂不煩此詭可還之右保命君語許侯勿憂嗣伯之詭且還之右右英夫人語小君曰我二人吏兵恐宜詭謝獻以體上之密寶不爾小子後不肯復為爾用力也許厚之徒也許犬乇子所賴在其弟許牙所賴在其父佳事不可忘也惡事不可忘也又為寶密關達機密銀亦為次寶也其今多情彌精耳後勿復數爾勞損其神右小茅君受所言許賤者戴石子之女也為仇家薛世等所殺又世殺賤抱小兒阿寧賤今在水官與兒相隨骸骨流漂亦訟在三官求對考今生人也寧見殺時頭先患瘡瘡流面目檢譜不見戴賤當是婦人不顯名也七月二日夜小君授書其夕長史亦得此夢字也真書多如此死生之機得失之會蓋更切, CK-KZ: 爲修}
