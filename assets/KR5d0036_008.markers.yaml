  - {type: variant, offset: 4919, length: 0, content: '', CK-KZ: 格若不專篤而守迷行外舍道法者則都失也紫微前語與太元殊乖而如此所云當是迷不能勤乎要道司命顯其終迹故也情不餘念者道乃來耳郗囘猶未足以論至道耶小君郗綜婦丁淑英者有救窮之陰德又遇趙阜之厄而不言内慈自中玄感皇人故令福逮於囘使好仙也綜墓在東平淑英今爲朱陵嬪數遊三上司命亦令聽政焉此二人當是囘之曾祖也外書不顯郗瞿與薛春華至垂心於門宗初不以生人爲事然訟者多但不能咸制之耳每見諫考訴者甚懃至也}
