  - {type: variant, offset: 3055, length: 164, content: 成事憂惋亦無所解自非齊達於內外者將不得不懼悸今月六日是赤孫絕日先處事耳今雖停放無所復畏然四帥逆已關之于都禁至日為能遣尸殺使者看望之雖弗復慮矣至日父母將入靜中靜中疾發亦無苦也我其日亦當視汝右三事小茅君說右三條厶書八月六日父母將赤子入靜燒香北向陳乞於二君爾時自當有所見所見萬無所苦也其日中時當有前日碧衣介華褲人來在靜前立徘徊者小君也, CK-KZ: ''}
