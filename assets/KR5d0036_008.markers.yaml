  - {type: variant, offset: 5178, length: 0, content: '', CK-KZ: 小君說言郗鑒今在三官爲劉季姜所訟爭三德事周馬頭在水官訟其壻引理甚苦郗朗伊香之二人今爲牙女子奇求此范帥昨受江羅辭郗相今爲大曹吏所逮其婦形嬰桃受事未了方索代人於此家此自是旁聽小君之言語耳不令書之爲自疏識以示耳此二十二字是楊君自記與長史高齡反化晚而祭酒弱道氣不交靈助無主是以羣邪纏玄急行其禍奚不宗生生乎於我助之有緣其婦言亦急家事當須了之非他得豫今六天之橫縱而太平之微薄靈不足以助順適足以招羣奸所以神光披越而邪乘正任矣高齡之無德久矣鬼訟之紛錯積矣許長史黃氏黵作掾字將欲理之耶若翻然奉張諱道者我當與其一符使服之如此必愈而𢾒此豁字也矣不然往詣水官所謂鳴呼哀哉張諱卽天師名也楊不欲顯疏也邪氣入體鬼填胸次其將迴惑於邪正必不能奉正於一平氣耶如此吾治疾之方殆不可得正一平氣卽天師祭酒之化也彼往其子亦去何一身之永逝乎八月十九日夜保命君密語許長史冢訟尤甚恐亦未已齡曾鑿敗古人碑銘之文以自顯焉陰賊於鬼神弊謂應作蔽字善以自摽訴者誠多事以此爲首先八月二十四日夜保命告欲取謝奉補期門郎而今已有兼人北帝故權停之耳近差王允之兼行得代奉若服朮酒可未便恭命也高耆亦可服朮其家冢訟亦爲紛紛朮遏鬼炁故必無他耳范中候言此謝奉字弘道會稽人仕至呉郡丹陽尹吏部尙書王允之敦同堂弟王舒子有智幹爲河南中郎將江州遷衞將軍會稽封番禺侯年四十亡諡中侯高耆卽謂齡也期門郎酆都中官而記中不見此職惟有脩門耳從平凝來凡十四條有掾寫夫觀物適任内順明靈託性命於高眞委形氣於神攝者亦剋疆以永遐迴秋齡以保眞今德匠旣凝神杖信澄心密靜圓順廣敬固天祐焉然胤嗣不多或時彫落將猶靈關失緯潜機未鎭耳當今五氣滋曜常朗文昌之房三星結華每煥璇衡之内是以玄潤胎萌遂其流根矣我案九合内志文曰竹者爲北機上精受氣於玄軒之宿也所以圓虛内鮮重陰含素亦皆植根敷實結繁眾多矣公試可種竹於内北宇之外使美者游其下焉爾乃天感機神大致繼嗣孕旣保全誕亦夀考微著之興常守利貞此玄人之祕規行之者甚驗六月二十三日中候夫人告公孝武壬戌生此應是辛酉年而後又云上相座動後以臨登極乃是後午未年此爲大懸靈草廕玄方仰感旋曜精洗洗似草竹言邊應詵詵字卽毛詩螽斯羽詵詵兮宜爾子孫之義也繁茂萌重德必克昌紫微夫人作福和者當有二子盛德命世福和似是李夫人賤時小名也今晉書名俊容二子卽孝武并弟道子也同夜中候告右三條楊書又掾寫德匠旣凝玄範自天安危之事未宜問也公傾注甚至所以未相酬者豫事難論耳頃天氣激逸陰景屢變太白解體於二辰之中愆勃於紫房之下王者惡焉天子有憂上相座動今聊作讖密以相示有此及讖有掾寫在掾自記修事後共紙尋眞綜迴文令難解耳今拘連相取又别疏出之其授之時維當道其辭楊君後自更錯義皆是說晉代之事並有明徵也相欺豈妙道要吾知之天祕能有術金之萬尋師疾逆除惡子自之制夷遂平世天命乘驅寶奇龍者墓可悲眞間世復思宜神熙逆厯有數在兹基無不無兵隆誰定帝紜室來之皇愼地先卒兒必虧金紛異五亂德天火數失期座當變見遠凶匠制規三由匠足不慮憂危撥保封寸莫其測源劉知向有明施者三五瑞天之代隆換迭相運推精氣神妙二參儀愼凡傳人賢精氣神妙參二儀愼傳凡人賢者施封天制地無不宜子能寶祕天知之吾道要妙豈相期自有奇神先兵規火寸三五天瑞之隆代迭換運相推明匠保德愼無思驅惡除逆疾尋思萬金之術龍之熙隆數卒三失由兒莫測其源劉向知有凶撥亂皇復基乘天命世遂平夷制逆者誰必定期匠不足慮憂遠危五世之間眞可悲墓厯有數帝座虧當見變異紛紛來金室在兹枕麝香一具於頸間辟水注之來絕惡夢矣常存三關佳也右英告公凡云公者皆簡文帝爲相主時也右一條楊書五字朱書太元眞人告許長史此後非眞說我嘗見南陽樂子長淳朴之人不師不受順天任命亦不知修生之方行不犯惡德合自然雖不得延年度世死登福堂練神受氣名賓帝錄遂得補修門郎位亞仙次緣天資有分亦由先世積德流慶所陶若使其粗知有攝生之理兼得太上一言之訣如此求道無往不舉矣夫人所以不盡年夀中多夭遏涉世者或遭刀兵之難致榮祿不終祚胤不長志道之人雖有一生之心鑽求匪懈徒復遭遇眞文躭玄精微慕尙者眾得升騰者稀經非不妙靈豈無感愚愚相隨安知修眞之本營神養性鎭守之法世人積小以來形中傷犯者多帝一不治百神驚散考試萬端所謂荒城之内荆棘生焉無妙術以自導修道以求仙貪榮慕貴多垂成而敗皆由喪眞犯氣愚瞽罔昧豈識此機耶致奪年滅筭萬事不成以此求生去生遠矣虛自苦耳太上有玄機之道煥落七神枕中之要此道微乎妙哉初不傳於下挺愚俗之人有此道者帝一治於玄宮萬神守備與天同心案訣謹而修之登山越海萬試不干修仙升度所欲從心斯豈虛言耶卿父子玄機邈世理妙接眞故可榮神之仙才而爲眾眞所稱非吾獨所稱舉故當與卿同編仙錄無復理外之嫌亦已諮啓卿故令知乃心受用金龍玉魚此不可闕所以爾者詣太上前昭靈亦當粗具近所寫神虎符意嫌不精可更書爲善卿前所道相王事頃面郗囘亦知有好心但所得少耳自當保其天年也見謝所作傳未易功乃能序述聖迹賞解作奇此是天發其心昨亦已見司命君大以爲佳冥中自當報之有緣其子孫若知醮靈岳祈天眞降應必也豈虛言哉謝家一門唐承之世繁林蔚然甚可欣也安石先對所鍾如何具如近面不足宣眞人西城王君答許候右四條别一手書陸修靜後於東陽所得不與諸迹同辭事僞陋不類眞旨疑是後人所作樂子長非受五符者唐承卽列紀所云四十六丁亥之期}
