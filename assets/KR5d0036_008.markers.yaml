  - {type: variant, offset: 10, length: 0, content: '', CK-KZ: 害明德也故令許君之徒含景内魄若抑四者研虛注靈則仙可冀定錄告除治爾床席左右令潔靜理護衣被者使有常人常燒香使冷然不雜也南岳上眞當數看出内便料理起居可使草及木瓜耳手自先有風患是以今風氣之本至耳多云針灸佳益使人無憂此易遷令告長史也草及木瓜當是理衣下人名也可迎黃民來出民奴旣欲來又云其月末左右當小小疾患迎來在此則疾患除也當部分護靜屋以爲急并欲得}
