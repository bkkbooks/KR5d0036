  - {type: variant, offset: 1219, length: 1147, content: 道者當得專道注真情無散念撥奢侈保沖白寂然如密有所睹熙然如潛有所得專專似臨深谷戰戰如履於冰炭始得道之門耳猶未得道之室也所謂為難者學道也所謂為易者學道也寂玄沉味保和天真注神栖靈耽研六府惜精閉牝無視無聽此道之易也即是不能行此者所以為難許侯研之哉斧子瑩之哉右右英所道令疏彼君勤其事者有獲福者多也墮謂應作隋字之者禍敗積矣范帥言不知道誰應是鬼帥範疆矣右二條有掾書昔因華氏累白書敬靈道高邈音饗冥絕仰瞻九霄注心罔墜矜逮不遺特蒙酬告雲華斐暢玉音粲發誘導恂恂啟悟丹至披覽欣欣五情悅懌某志好有年未獲厶厶缺失二字別本作剋還恭黨幽晦始睹天日靈真厶此缺失一字別本作微字疑非請訓誨交湊剋己補過思釋鄙滯夙興勤惕悟寐自厲庶幾積誠卒獲微感玄運既會奉覲有期想疑長此一字良為厶厶缺失二字別本作延仰生染迷俗沉溺塵昧不達上真謂道盡此決欲習性以靜之損厶缺失一字四字朱書以寶之非為色欲厶缺失一字多而患在難厶缺失一字至於水火之戒冰炭之喻朗然照豁敬承清規務損之又損之厶謂應是以字至於死灰也歎覺悟之不早恨知機之將晚用火之言其旨頗微思之觸類良追愧悚昔憑賴華氏每輒獎勸願其有成得見陶冶而耽味華競蹈道不篤恆欲與共清閒使意盡言苦而已趣向不同密言難遇然喁喁之懷要欲獻其丹款矣不審故可復有冀不此二書長史答先因通華僑意似酬前書而又言用火之言此授今闕右二條厶書茅小君去五月中失日有言云華僑漏泄天文妄說虛無乃今華家父子被考於水官華僑之失道由華騎之佞亂破壞其志念華團華西姑者三官因之以試觀試遂不過僑於是得有死罪故名簡早削奪尋輸頭皮於水官也可密尋彼家有此人名不是誰者此前並是酬問華氏事不知是子年醜年耳許朝者暴殺新野郡功曹張煥之又枉煞求龍馬此人皆看尋際會比告訴水官水官逼許斗使還其丘墳伺察家門當衰之子欲以塞對解逼示彼訟者耳是斗亡月亡日其應至矣君自受命當能治滅萬鬼羅制千神且欲視君之用手耳欲令無他者宜以此日詣斗墓叱攝煥等制敕左官使更求考代震滅爭源也可勿宣此當言我假威于君矣不知君宜往試攝滅之耳滅鬼之迹事中暫應爾六月十六日夜小君授書此此令楊君為長史家攝遏塚訟也許朝先為南陽郡故得殺新野人而此三人事不出周魴誥先生中當是四十三條限也斗為仙品而猶被水官之逼者是喪服中殃氣尚相關涉故也紙三百酬鬼帥王延近報錄書以杵宗會有功油三斗酬鬼帥傅晃近與功曹使者令勢威照鬼形使不得暴青絹三十尺酬鬼帥範疆近執載百惡滅訟散禍有功銀叉三枚酬鬼帥深衛近防護疾者招魂安神使塚訟不行有殊功右四條詭以六月十三日小茅君假作玉斧之形以夢告于虎牙使令夫婦明輸此四種詭以酬四帥之禽鬼者何以不復憶此可餘問餘問謂令與同勿絺絺耳非使此四鬼帥本亦道家之祭酒也得下解法受書為鬼帥耳既有酬詭後長為己用心也所以夢假於玉斧之形者虎牙魂魄未得通接仙真故也玉斧清淨藻潔久齋濯魄心近於仙故假象以通夢也通夢而猶不悟可謂信之不篤或悟而忘其詭可謂篤, CK-KZ: ''}
