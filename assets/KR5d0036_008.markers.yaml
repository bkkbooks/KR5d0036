  - {type: variant, offset: 4505, length: 328, content: 即愈不欲者當與定錄君語尋自差保命君語多有所道甚云云覲當乙二第七無慮也此一行楊君與長史書語耳戲言獪耳許長史勿笑此落廓不束高下失常定之勿疑若不加意勿單用此慎示人慎示人一句保命告長史右十四條厶書衰年體羸多為風寒所乘當深頤養晏此無事上味玄元棲守絳津體寂至達心研內觀屏彼萬累蕩濯他念乃始近其門戶耳若憂累多端人事未省雖復憩靈空洞存心淡泊纏綿亦弗能達也漁陽田豫曰人以老馳車輪者譬猶鍾鳴漏盡而夜行不休是罪人也以此喻老嗜好行來屑屑與年少為黨耳若今能誓不復行者則立愈矣如其不爾則疹與年階可與心共議耶田豫字國讓漁陽雍奴人有幹略為並州刺史遷衛尉年老求遜位與司馬宣王書曰年過七十而以居位譬猶鍾鳴漏盡而夜行不休是罪人也年八十二亡引此語以動長史令去官也藥四丸日服一行來宜詳前後已累言之矣, CK-KZ: 消故爲難合紫微答但頷頭}
