  - {type: punctuation, offset: 870, content: 《, id: KR5d0036_tls_008-bkkpn176}
  - {type: variant, offset: 870, length: 348, content: 博喻兩篇合為今語而改機阱作羈落靈鶻作靈羽罩羅作羅糸互耳尋飛絕影之足而不能騁逸於呂梁淩波泳淵之屬而不得陟峻攀危彼子誠可才異也安能內攝哉輔機者欲仁人也德欲茂矣繁林蘙薈則羽族雲萃玄淵浩汗則鱗群競赴若其宅心者眾將何事於近紫微言右八條楊書又有掾寫有道者皆當深研靈奧棲心事外但思味勤篤糟粕餘物亦足自了耳桐柏真人言夫清淨未若東山養真未若幽林栖形景而虛上遠風塵之網纏于是榮辱之羅何足以羈至士耶右二條楊書夫金玉山積猶非我也胠騑之簷往矣猶非己也榮冕之盛陳矣猶非貴也采艷之芬華矣猶非真也能消而蕩之則淫吝之心亡也鄙滯之門閉矣尚真之覺漸也千謂應作阡字陌之情見矣如其不爾四者皆成內賊之害外為兜之患不去之不散無所復營措于其間矣亦無事趣當爾也戒長史也此三字本朱書亦應是右英夫人言也為道者實有勤苦斯人也可謂必得之矣右二條長史掾書夫, CK-KZ: ''}
