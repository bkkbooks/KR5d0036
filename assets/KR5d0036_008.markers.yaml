  - {type: variant, offset: 3474, length: 1359, content: 不制服豈足憂亦許長史用心之所剋也右小君許厚自是其丈人所責責亦至也責不以家事往來之賓經意意亦當得之也云何每爾此自家長之教忌不豫我也重謝斗當必釋耳范帥頃者以其不詭乃欲不復豫事我不聽之今無為也詭當一須疾愈送斗恆渴而飲不可飲食多困故而不可食子婦不經心亦不可不令知死丈人之責耶故宜以家事為勤為爾不已或能致之于丈人宇下受教耶八月二日夜小君授書此使示斧右十條楊書許長史所使人盜他家狗六頭於長史灶下蒸煮共食之長史何以不檢校使臭腥之氣薰染肴飯既食而步上道亦已犯真人之星也有一白犬俗家以許禱土地鬼神云何令人盜烹之土地神言許長史教之使爾不言小人盜自爾也密尋之爾在宇下而不覺恐方有此此亦足以為一病宜慎八月六日夜茅小君授以與許長史亦宜有辭詣南嶽夫人乞疾病得愈之意又宜辭詣保命定錄二君辭旨當令如南嶽夫人疾者自當告乞于玄師不爾不差易遷昨來道此別省此二字題紙背右四條楊書男生許玉斧辭玉斧以尸濁肉人受聖泯濟拔每賜敕誡實恩隆子孫常仰銜靈澤永賴天蔭玉斧以駑鈍頑下質性難訓雖夙夜自厲患於愆失此夕夢悟尋思此意皆玉斧罪責慚懼屏營無地自厝靈道高虛肉人未達真法唯執心守敬修行寶秘而已或恐靈旨高遠誡喻幾微玉斧頑暗不能該悟如此之罪日月臻積違法犯誡亦當千萬神母仁宥輒復原赦故今日憂惶深重肝膽破碎唯晢謂應作折字骨思愆無補往過連陳啟煩多希請非所兼以愧怖玉斧歸誠乞誓以今日更始當洗濯心誠盟于天地靜守形骸軌承訓誨乞原父穆兄虎牙小大罪考玉斧不修乞身自受責原赦大小若神母遂見哀泯許玉斧思愆補過舉家端等受恩是永睹三光受命更生謹辭此是虎牙病時掾與南真辭也掾自書本虎牙慎不可復履淹及見人之新淹者三元驚喪多喜殺人八月二十四日南真告學道者常不能慎事尚自致百屙歸咎于神靈當風臥濕反責他於失覆皆癡人也安可以告玄妙哉保命告牙右二條有掾書須臾自吟曰朝華煥晨井九蓋傾青雲前此珪璋庸不識萬流椿解落倏頃寅客何必人或云是誡誡則能改右英晚而言曰見形之子守分業於儒墨栖沈之客步玄辭而詠虛彼人自可晚曉耳許伯兄弟復有心乎恐皮耳試復一悟忌其微路耳九月二十八日茅保命告可成與不極此舉定錄君說此違內負心三魂失真真既錯散魄乘其間夫為道者當使內外鏡徹宮商相應靈感于中神降于外信不虛也映昔亦如此諸人陶其心今已消也夫須人陶而改者故下通耳所以勤勤期不令在此近亦粗具右小君言世事非所期時運何足聞有道自當見中路莫不煩吾欲因楊問便自知乃作此右清靈有間於邪而邪炁為之踊也非病也右安九華語念不宜多多則正散正散而求不病猶開門以捍猛敵右紫微語治自當差無苦保命君言何以至喪家保命君言欲服符飲水使即愈不欲者當與定錄君語尋自差保命君語多有所道甚云云覲當乙二第七無慮也此一行楊君與長史書語耳戲言獪耳許長史勿笑此落廓不束高下失常定之勿疑若不加意勿單用此慎示人慎示人一句保命告長史右十四條厶書衰年體羸多為風寒所乘當深頤養晏此無事上味玄元棲守絳津體寂至達心研內觀屏彼萬累蕩濯他念乃始近其門戶耳若憂累多端人事未省雖復憩靈空洞存心淡泊纏綿亦弗能達也漁陽田豫曰人以老馳車輪者譬猶鍾鳴漏盡而夜行不休是罪人也以此喻老嗜好行來屑屑與年少為黨耳若今能誓不復行者則立愈矣如其不爾則疹與年階可與心共議耶田豫字國讓漁陽雍奴人有幹略為並州刺史遷衛尉年老求遜位與司馬宣王書曰年過七十而以居位譬猶鍾鳴漏盡而夜行不休是罪人也年八十二亡引此語以動長史令去官也藥四丸日服一行來宜詳前後已累言之矣, WYG: ''}
