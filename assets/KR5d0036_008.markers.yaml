  - {type: variant, offset: 4838, length: 1, content: 夢, CK-KZ: 陸納兄弟淸眞淳一有姜伯子之風知欲有遠志欣然其祖父有陰德當慶流七世知陸苟子自誓乞苦齋一年欲受經卿自此二字後人儳益非眞更量之劉遵乃有好心早自知保命答許長史陸納兄名始並有德行祖名英仕呉丹陽郡太守苟子當是人小名不詳是誰納爲尙書令太元二十年亡虞昭爲其兄子此二字後人黵易作先人字本猶可識事文書牽連身被攝繫方未已殆欲無理賴其在世粗有功德且其家福德强章聞累疊被上御事已散尋蒙追遣之其病雖篤無所憂許侯爲之甚至密相示保命答許長史庾道季身處陽官貴勢不能順天用法憒憒慢信心形不同自少及長善功無一積}
