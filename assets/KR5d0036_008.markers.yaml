  - {type: variant, offset: 5178, length: 0, content: '', WYG: 小君説言郗鑒今在三官為劉季姜所訟争三徳事周馬頭在水官訟其壻引理甚苦郗朗伊香之二人今為牙女子竒求此范帥昨受江羅辭郗相今為大曹吏所逮其婦邢嬰桃受事未了方索代人於此家此自是旁聽小君之言語耳不令書之為自疏識以示耳此二十二字是楊君自記與長史髙齡反化晚而祭酒弱道氣不交靈助無主是以羣邪纒𤣥急行其禍奚不宗生生乎於我助之有緣其婦言亦急家事當湏了之非他得豫今六天之横縱而太平之㣲薄靈不足以助順適足以招羣奸所以神光披越而邪乗正任矣髙齡之無徳乆矣鬼訟之紛錯積矣許長史黄氏黵作掾字將欲理之耶若翻然奉張諱道者我當與其一符使服之如此必愈而豁此豁字也矣不然往詣水官所謂嗚呼哀哉張諱即天師名也楊不欲顯疏也邪氣入體鬼填次其將廻惑於邪正必不能奉正一於平氣耶如此吾治疾之方殆不可得正一平氣即天師祭酒之化也彼往其子亦去何一身之永逝乎八月十九日夜保命君宻語許長史冢訟尤甚恐亦未已齡曽鑿敗古人碑銘之文以自顯焉隂賊於鬼神弊謂應作蔽字善以自標訴者誠多事以此為首先八月二十四日夜保命告欲取謝奉補期門郎而今已有兼人北帝故權停之耳近差王允之兼行得代奉若服术酒可未便恭命也髙耆亦可服术其家冢訟亦為紛紛术遏鬼炁故必無他耳范中候言此謝奉字𢎞道㑹稽人仕至呉郡丹陽尹吏部尚書王允之敦同堂弟王舒子有智幹為西南中郎將江州遷衛將軍㑹稽封番禺侯年四十亡諡忠侯髙耆即謂齡也期門即酆都中官而記中不見此職惟有修門耳從平凝來凡十四條有掾寫夫觀物適任内順明靈託性命於髙真委形氣於神攝者亦尅疆以永遐廻秋齡以保真今徳匠既凝神仗信澄心宻静圓順廣敬固天祐焉然𦙍嗣不多或時彫落將猶靈闗失緯潜機未鎮耳當今五氣滋曜常朗文昌之房三星結華每煥璇衡之内是以𤣥潤胎萌遂其流根矣我按九合内志文曰竹者為北機上精受氣於𤣥軒之宿也所以圓虚内鮮重隂含素亦皆植根敷實結繁衆多矣公試可種竹於内北宇之外使美者遊其下焉爾乃天感機神大致繼嗣孕既保全誕亦夀考㣲著之興常守利貞此𤣥人之秘䂓行之者甚驗六月二十三日中候夫人告公孝武壬戌生此應是辛酉年而後又云上相座動後以臨登極乃是後午未年此為大懸靈草廕𤣥方仰感旋曜精洗洗似草作言邉應詵詵字即毛詩螽斯羽詵詵兮宜爾子孫之義也繁茂萌重徳必克昌紫㣲夫人作福和者當有二子盛徳命世福和似是李夫人賤時小名也今晉書名俊容二子即孝武并弟道子也同夜中候告右三條楊書又掾寫徳匠既凝𤣥範自天安危之事未宜問也公傾注甚至所以未相酬者豫事難論耳頃天氣激逸隂景屢變太白觧體於二辰之中愆勃於紫房之下王者惡焉天子有憂上相座動今聊作䜟宻以相示右此及䜟有掾寫在掾自記修事後共紙尋真綜文令難解耳今拘連相取又别疏出之其授之時維當道其辤楊君後自更錯義皆是説晉代之事並有明徵也相欺豈妙道要吾知之天袐能有術金之萬尋師疾逆除惡子自之制夷遂平世天命乘驅寶奇龍者篡可悲真間世復思宜神熈逆歴有數在茲基無不無兵隆誰定帝紜室來之皇慎地先卒兒必虧金紛異五亂徳天火數失期座當變見逺凶匠制規三由匠足不慮憂危撥保封寸莫其測源劉知向有明施者三五瑞天之代隆換迭相運推精氣神妙二參儀慎凡傳人賢精氣神妙參二儀慎傳凡人賢者施封天制地無不宜子能寶袐天知之吾道要妙豈相期自有奇神先兵規火寸三五天瑞之隆代迭換運相推明匠保徳慎無思驅惡除逆疾尋思萬金之術龍之熈隆數卒三失由兒莫測其源劉向知有凶撥亂皇復基乘天命世遂平夷制逆者誰必定期匠不足慮憂逺危五世之間真可悲篡歴有數帝座虧當見變異紛紛來金室在兹枕麝香一具於頸間辟水注之來絶惡夢矣常存三關佳也右英告公凡云公者皆簡文帝為相王時也右一條楊書五字朱書太元真人告許長史此後非真説我嘗見南陽樂子長淳朴之人不師不受順天任命亦不知修生之方行不犯惡徳合自然雖不得延年度世死登福堂練神受氣名賓帝錄遂得補修門郎位亞仙次緣天資有分亦由先世積徳流慶所陶若使其粗知有攝生之理兼得太上一言之訣如此求道無往不舉矣夫人所以不盡年夀中多夭遏涉世者或遭刀兵之難致榮祿不終祚𦙍不長志道之人雖有一生之心鑽求匪懈徒復遭遇真文躭𤣥精微慕尚者衆得升騰者稀經非不妙靈豈無感愚愚相隨安知修真之本營神養性鎮守之法世人積小以來形中傷犯者多帝一不治百神驚散考試萬端所謂荒城之内荆棘生焉無妙術以自導修道以求仙貪榮慕貴多垂成而敗皆由䘮真犯氣愚瞽㒺昧豈識此機耶致奪年滅筭萬事不成以此求生去生逺矣虚自苦耳太上有𤣥機之道煥落七神枕中之要此道㣲乎妙哉初不傳於下挺愚俗之人有此道者帝一治於𤣥宫萬神守備與天同心按訣謹而修之登山越海萬試不干修仙升度所欲從心斯豈虚言耶卿父子𤣥機世理妙接真故可縈淳之仙才而為衆真所稱非吾獨所稱舉故當與卿同編仙録無復理外之嫌亦已諮啓卿故令知乃心受用金龍玉魚此不可闕所以爾者詣太上前昭靈亦當粗具近所寫神虎符意嫌不精可更書為善卿前所道相王事頃郗囘亦知有好心但所得少耳自當保其天年也見謝所作傳未易功乃能序述聖迹賞觧作竒此是天發其心昨亦已見司命君大以為佳冥中自當報之有緣其子孫若知醮靈岳祈天真降應必也豈虚言哉謝家一門唐承之世繁林蔚然甚可欣也安石先對所鍾如何具如近不足宣真人西城王君答許侯右四條别一手書陸修静後於東陽所得不與諸迹同辭事偽陋不𩔖真㫖疑是後人所作樂子長非受五符者唐承即列紀所云四十六丁亥之期真誥卷八}
