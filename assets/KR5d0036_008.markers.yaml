  - {type: variant, offset: 11, length: 342, content: 字後人益標高運味玄咀真呼引景曜凝靜六神煥領八明委順靈根寶煉三度養液和魂假使衝風繁激將不能伐我之正性也絕飆勃藹焉能迴己之清淳耶爾乃空沖自吟虛心待神營攝百絕栖澄至真當使憂累靡干於玄宅哀念莫擾於絳津也淡泊眇觀顧景共歡於是至樂自棨零聞於兩耳雲敖虛彈乎空軒也口挹香風眼接三雲俯仰四運日得成真視盻所涯皆已合神矣夫真人之得真每從是而獲耳不真而強真亦於此而顛蹷也復使愆屙填籍憂哀塞抱經營常累憑惜外道和適群聽求心俗老忽發哀音之兮水牙此作奚胡音猶今小兒啼不止謂為咳呱也長悼死沒以悲逝必精滅神離三魂隕炁邪運空間魄告魍魎乘我虛陣造遘百祟何可握生道以奔于死房陶靈風而踐於尸室擲已吉象投之凶穢乎已聞高勝而故由豫屢睹明科而未釋疑遂羅污上章使臭染隱書四極擊鼓三官尋矛誓信云何而忘太初于焉而遊神虎奮爪毒龍效牙八方誠曠遏, CK-KZ-jye: 彰}
