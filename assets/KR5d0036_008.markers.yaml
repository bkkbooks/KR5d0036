  - {type: variant, offset: 4916, length: 1, content: 既, CK-KZ: 示郗希遐遠曜冥響凝玄蕭浪上韻躭夢遯眞仰飛霄霧俯散靈根飛步四覺内觀七緣者則必有丹書秀簡帝房之錄玄聲八振栖身五嶽於是灌胎朝元吐納六液從容三道誨此景福上可以策軒空洞下可以反華變黑矣若形羈榮羅鼓輪華園乘波適物鳴簪風塵外有謀道之名内有百憂來臻者適足勞天年以騁思終歸骸於三官耳齋之不專徒悟而無益可謂意不盡言乎葢行眞炁當吐三納四乘七吞九今吸之不足躡之失序神漏泝源精亡胎擾雖休糧日挹而莫知道與年喪矣欲階此渡也其未接乎夫索長生者多津尋靈塗者千百何必用氷爐以盛火趣償責於三官耶右中君言因許長史示郗紫微夫人云郗若得道乃當爲太淸監也若能聞要道而勤者當}
