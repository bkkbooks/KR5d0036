  - {type: variant, offset: 3219, length: 25, content: 可就請乞也八月六日中當有一人著平上幘多髭須長長爾著, WYG: 先以水銀磨銀屑使消故為難合}
  - {type: variant, offset: 3220, length: 264, content: 就請乞也八月六日中當有一人著平上幘多髭須長長爾著紫皮褲褶將黃娥來此人是鬼帥王延也延自為人作益為將娥見人耳娥其日或當被縛華書吏其日當內井上助主人耳日中當來須臾去也故宜力上風注塚訟章於卻氣毒之來往也三過如此考者匿矣夫散翳布考皆因人之不陳疾者懼焉則精胎內戰是故疚屙流發非唯一身而已今所以令上章者亦以遏虎牙之盈縮耳范中候所道如此範中候名邈即是撰南真傳者許厚當謝詭南真夫人吏兵告大章如此右小君以小代大復請何為當啟太上停之何如右小君牙亦爾耶勿忩忩演小子耳許牙何豫乎焉敢復相追爾娥與厚有水火之書吾近承南真命推縛盡執也小鬼頭不制服豈足憂亦許長史, CK-KZ: 尋索密}
