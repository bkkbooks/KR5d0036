  - {type: variant, offset: 2833, length: 382, content: 婦人不顯名也七月二日夜小君授書其夕長史亦得此夢字也真書多如此死生之機得失之會蓋更切耳何不遠存玄味耽虛摽流乎求之近應應愈賒也此亦入失之路耳想體尚高韻不細求之於毫末矣七月二十六日夜紫微夫人授作令與許長史右從小茅君來凡十八條楊書七月二十七日禺中許主簿華侯當入靜中爾時無復所有為防未然耳近不得以疾篤告者我慎法之故且世人知未病之困必泄三官之禁則累加漏身增瘵絕疾今何乃用憂之甚耶名身誰親蓋宜思之縱令以小代大如父何如大小俱來于母何如衰自己身訟自家人耳三官自有成事憂惋亦無所解自非齊達於內外者將不得不懼悸今月六日是赤孫絕日先處事耳今雖停放無所復畏然四帥逆已關之于都禁至日為能遣尸殺使者看望之雖弗復慮矣至日父母將入靜中靜中疾發亦無苦也我其日亦當視汝右三事小茅君說右三條厶書八月六日父母將赤子入靜燒香北向陳乞於二君爾時自當有所見所見萬無所苦也其日中時當有前日碧衣介華褲人來在靜前立徘徊, WYG: ''}
