自當報之有縁其子孫若知醮靈岳祈天眞降應必也豈虚言哉謝家一門唐承之世繁林蔚然甚可欣也安石先對所鍾如何具如近面不足宣眞人西城王君答許侯右四條别一手書陸修靜後於東陽所得不與諸迹同辭事僞陋不類眞㫖疑是後人所作樂子長非受五符者唐承即列紀所云四十六丁亥之期眞誥卷之八}
