  - {type: variant, offset: 1192, length: 155, content: 誓乞苦齋一年欲受經卿自此二字後人褷益非真更量之劉遵乃有好心早自知保命答許長史陸納兄名始並有德行祖名英仕吳丹陽郡太守苟子當是人小名不詳是誰納為尚書令太元二十年亡虞昭為其兄子此二字後人枿易作先人字本猶可識事文書牽連身被攝繫方未已殆欲無理賴其在世粗有功德且其家福德強章聞累疊皆被上御事已散尋蒙追遣之其病雖篤無所憂許侯, WYG: 坐}
