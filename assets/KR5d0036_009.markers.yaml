  - {type: variant, offset: 4305, length: 1, content: 侯, CK-KZ: 也爲道當如射箭箭直往不顧乃能得造堋的操志入山唯往勿疑乃獲至眞玄淸告按南極西城玄淸二高眞未當有餘降受唯戒及詩各一條耳不審此當是何時所喻右八條並楊書行此四道按玉玄上法一年便驚視聽自可懃之舉之無疑中君此事失前紙不知是何法也太極眞人云讀道德經五千文萬遍則雲駕來迎萬遍畢未去者一月二讀之耳須雲駕至而去右二條某書山世遠受孟先生法暮卧先讀黃庭內景經一過乃眠使人魂魄自制鍊恒行此二十一年亦仙矣是爲合萬過夕得三四過乃佳北嶽蔣夫人云讀此經亦使人無病是不死之道也此一十一年夕一過不得萬遍一恐應爲七或爲八字不爾夕則二三過耳存五星當謹按八素以王星爲始存以生氣時若不王星先出者故宜不先存王也至於視星入室任意耳唯以懃感爲上耳亦不必須都見星然後速通也視之亦審耳淸靈君告存思要法當覺目睹五星於方面並乘芒而下行我然後依王星下而存王星但吞咽一芒畢又當鎮星下又存鎮星良久總五星各一芒使俱入口而咽之如鎮星星過數也此一事異法經中無此說若頓存五星自當依常法不心存對星下也依此言則後是單修法也六月一日夜靑靈眞人言}
