  - {type: variant, offset: 139, length: 0, content: '', CK-KZ: 體香此經非三品目紫度炎光內視中方曰常欲閉目而卧安身微氣使如卧狀令傍人不覺也乃內視遠聽四方令我耳目注萬里之外久行之亦自見萬里之外事精心爲之乃見百里之外事也又耳中亦恒聞金玉之音絲竹之聲此妙法也四方者總其言耳當先起一方而內注視聽初爲之實}
