  - {type: variant, offset: 3217, length: 0, content: '', CK-KZ: 玉晨君常以正月四日二月八日三月十五日四月八日五月九日六月六日七月七日八月八日九月九日十月五日十一月三日十二月十二日登玉霄琳房四眄天下有志節遠遊之心者子至其日平旦日出時北向再拜亦可於靜中也自陳本懷所願畢因咽液三十六過長史寫東海靑童君常以丁卯日登方諸東華臺四留田王子以此日常可向日再拜日出行之可因此以服日精又掾寫右紫虛元君所出右此三事并上學隱朝之法其經并不顯世故南眞出之亦是令長史遵用也右三條有長史掾共書同在一紙上常以二月二日三月三日八月八日九月九日十月十日夜於寢室存思洞中訣事而獨處不眠者吉也其夕衞經玉童玉女將太極典禁眞人來於空中而察}
