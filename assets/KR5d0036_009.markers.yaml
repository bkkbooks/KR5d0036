  - {type: variant, offset: 3229, length: 2, content: 又掾, WYG: 太虛真人南嶽赤君内法曰以月五日夜半時存日象在心中日從口入也使照一心之内與日共光相合㑹畢當覺心暖霞暉映驗良久乃祝曰大明育精内鍊丹心光暉合映神真來尋畢咽液九過到十五日二十五日二十九日復作如上使人開明聰察百闗鮮徹面有玉光體有金澤行之十五年太一遣寶車來迎上登太霄行之務欲數不必此數日作也右一條出太上消魔經中此經亦未出世右一條長史}
