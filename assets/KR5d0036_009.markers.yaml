  - {type: variant, offset: 3210, length: 0, content: '', CK-KZ: 㪷於釡中煑之令一沸出適寒温以浴形卽萬淹消除也旣以除淹又辟濕痺瘡癢之疾且竹虛素而內白桃卽卻邪而折穢故用此二物以消形中之滓濁也天人下遊旣反未曾不用此水以自蕩也至於世間符水祝漱外舍之近術皆莫比於此方也若浴者益佳但不用此水以沐耳鍊尸之素漿正宜以浴耳眞奇秘也下眞品目有九化十變疑此目是例言也紫微王夫人所敕用右一條長史寫受洞訣施行太丹隱書存三元洞房者常月月朝太素三元君以正月九日二月八日三月七日四月六日五月五日六月四日七月三日八月二日九月一日十月十日十一月十一日十二月十二日夜於寢靜之室北向六再拜訖稽首跪曰謹啓太上大道高虛玉晨太素紫宫八靈三元君中央黃老無英白元太帝五老高眞上仙太極皇精三皇君大洞三景弟}
