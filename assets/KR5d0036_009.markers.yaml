  - {type: variant, offset: 151, length: 2, content: 木瓜, CK-KZ: 指摩兩目權上以手旋耳行三十過唯令數無時節也畢輒以手逆乘額上三九過從眉中始上行入髮際中口傍咽液多少無數也如此常行目自淸明一年可夜書亦可於人中密爲之勿語其狀眉後小穴中爲上元六合之府主化生眼暉和瑩精光長珠徹童保鍊目神是眞人坐起之上道一名曰眞人常居內經眞諺曰子欲夜書}
