  - {type: variant, offset: 179, length: 7, content: 當小小疾患迎來, CK-KZ: 也以手乘額上內存赤子日月雙明上元歡喜三九始眉數畢乃止此謂手朝三元固腦堅髮之道也頭四面以兩手乘之順髮就結唯令多也於是頭血流散風濕不凝都畢以手按目四眥二九過覺令見光分明是檢眼神之道久爲之得見百靈凡修行此道及卷中諸雜事並甚有節度悉以別撰}
