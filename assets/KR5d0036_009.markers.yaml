  - {type: variant, offset: 2157, length: 264, content: 耶此二人郗家之福鬼外書亦無此二人不知是何親郗雄與閻屈女不相當負石之役于今未了喜擊犯門宗心常殺絕此二人是郗家之禍鬼郗厶枿除此名不可識與殷武姬被考以燒殺朱奢李賤以致災也其無後亦求代逮又與高豐相扇甚助馬頭之訟石公未便可得佳恐不止耳亦何趣欺其婦耶省來勤勤試為掩正之亦無此諸人右保命答許長史小君說言郗鑒今在三官為劉季姜所訟爭三德事周馬頭在水官訟其婿引理甚苦郗朗伊香之二人今為牙女子奇求此范帥昨受江羅辭郗相今為大曹吏所逮其婦形嬰桃受事未了方索代人於此家此自是旁聽小君之言語耳不令書之為自疏識以示耳此二十二字是楊君自記與長史高齡反化晚而祭酒弱, CK-KZ: 妙}
