  - {type: variant, offset: 3866, length: 278, content: 之心鑽求匪懈徒復遭遇真文耽玄精微慕尚者眾得升騰者稀經非不妙靈豈無感愚愚相隨安知修真之本營神養性鎮守之法世人積小以來形中傷犯者多帝一不治百神驚散考試萬端所謂荒城之內荊棘生焉無妙術以自導修道以求仙貪榮慕貴多垂成而敗皆由喪真犯氣愚瞽罔昧豈識此機耶致奪年滅笄萬事不成以此求生去生遠矣虛自苦耳太上有玄機之道煥落七神枕中之要此道微乎妙哉初不傳于下挺愚俗之人有此道者帝一治于玄宮萬神守備與天同心案訣謹而修之登山越海萬試不干修仙升度所欲從心斯豈虛言耶卿父子玄機邈世理妙接真故可榮神之仙才而為眾真所稱非吾獨所稱舉故當與卿同編仙錄無復理外之嫌亦已諮啟卿故令知乃心受用金龍玉魚此, CK-KZ: ''}
