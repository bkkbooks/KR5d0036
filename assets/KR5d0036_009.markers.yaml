  - {type: variant, offset: 25, length: 0, content: '', CK-KZ: 寫本不知此因楊諮何眞若非東卿則紫微南眞也太上眞人撰所施行秘要長史寫本有題如此此猶是眾眞授說經中所可修用還童反白諸要事令長史施行之耳非成事一卷經也太素丹景經曰一面之上常欲得兩手摩拭之使熱高下隨形皆使極匝令人面有光澤皺班不生行之五年色如少女所謂山川通氣常盈不没先當摩切兩掌令熱然後}
