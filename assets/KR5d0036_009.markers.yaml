  - {type: variant, offset: 3179, length: 2, content: 作福, CK-KZ: 言太極綠經曰理髮欲向王地旣櫛髮之始而微祝曰泥丸玄華保精長存右爲隱月左爲日根六合淸鍊百神受恩祝畢咽液三過能常行之髮不落而日生常數易櫛櫛之取多而不使痛亦可令侍者櫛取多也於是血液不滯髮根常堅右一條安九華所告令施用此二條皆駐白止落之事亦是令答示長史也紫微夫人喻曰披華葢之側延}
