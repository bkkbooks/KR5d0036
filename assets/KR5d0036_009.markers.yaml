  - {type: punctuation, offset: 3224, content: (, id: KR5d0036_tls_009-bkkpn651}
  - {type: variant, offset: 3224, length: 0, content: '', CK-KZ: 情三元柔魄天皇授經所向諧合飛仙上淸常與玉眞俱會紫庭畢此太洞祕訣以傳於始涉津流者矣右此三事亦是洞房太丹家事眞經亦未顯世今世中經乃粗有其事皆增損不同右三條有長史寫以上符本朱畫明堂內經開心辟妄符王君撰用開日旦向王朱書再拜服之祝曰五神開心徹聽絶音三魂攝精盡守丹心使我勿妄五藏遠尋拜畢祝祝畢乃服服畢咽液五過叩齒五通勿令人見兩妄字謂皆應作忘若不用開日以月旦月十五日二十七日一月三服一年便驗祕術也右符及此三條有長史掾寫兩本掾朱書東卿司命曰先師王君昔見授太上明堂玄眞上經淸齋休粮存日月在口中晝存日夜存月令大如環日赤色有紫光九芒月黃色有白光十芒存咽服光芒之液常密行之無數若不修存之時令日月還住面明堂中日居左月居右令二景與目童合炁相通也此道以攝運生精理和魂神六丁奉侍天兵衞護此上眞道也太上玄眞經先盟而後行行之然後可聞玉佩金璫之道耳季偉昔長齋三年始誠竭單思乃能得之於是神光映身然後受書耳此玄眞之道要而不煩吾常寶祕藏之囊肘故以相示有愼密者也明堂玄眞自有經經亦少耳大都口訣正如此而行之偉昔亦不得經但按此而行始乃得經耳爾欲得可就偉取玉佩隱書非偉所見耳夜行及冥卧心中恐者存日月還入明堂中須臾百邪自滅山居恆爾此爲佳右此是說玄眞經存之法其大經在茅傳中}
