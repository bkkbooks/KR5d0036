  - {type: variant, offset: 4362, length: 1, content: 期, CK-KZ: 道昔受之於太微天帝君一名赤丹金精石景水母玉胞之經右英云珠圓會暉韜綠凝日霞煥明赤童秉靈玄炎散光飈象鬱淸此日之勢也神之威也此說按紫文曰日魂事義旨不正可顧右二條厶書扶晨始暉生紫雲映玄阿煥洞圓光蔚晃朗濯耀羅眇眇靈景元森灑空淸華九天館玉賔金房煙霄歌右大洞眞經中篇今鈔數行今洞經亦有此數句外國呼日爲濯耀羅方諸眞人呼日爲圓羅曜夢見此濯耀羅者日之應也紫雲中人者胎宫神也玄眞之道矣日德廕澤長生之象紫雲罔晨魂魄安也身康神甯從此始矣辭四通已呈意氣安和此楊君自與長史書語耳右英疏大洞眞經言以釋夢濯耀羅之義也如別此亦自語也長史夢事不顯右四條楊書}
