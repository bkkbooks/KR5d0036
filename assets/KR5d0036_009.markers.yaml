  - {type: variant, offset: 316, length: 300, content: 住此今自無他耳右易遷一夕再來四更中獨來道此先初來又與保命俱此似在縣下所授今掾還山使黃民歸家也易遷即掾母七後得入易遷宮因呼為號前所呼亦皆是也斧學道如穿井井愈深而去土愈難運出自當披其心正其行乃得見泉源耳有人說中候言如此可令知之李中候名遵即撰茅三君傳者人學道譬如萬里行比造所在寒暑善惡草木水土無不經見也亦試在其中也頃數聞人道此始乃悟之耳彼君念想殊多渠謂應作詎字能成遠志不平昔時常多所恨始悟人難作而善不可失云學道者除禍責此審爾當勤右易遷夫人所道山嶽氣擾則強禽號于林川瀆結滯則龍虯慘于澤此自然象也故豪盛微覺將類獸告其駭浪玄數纖兆而號啕徵乎治亂矣斯蓋山川之盈縮非人事之吉凶若墳附丘山誠與汧岫等波苟趣舍理乖則吹萬之, CK-KZ: ''}
