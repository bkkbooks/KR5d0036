  - {type: variant, offset: 3706, length: 0, content: '', CK-KZ: 千二百里上高九千丈有長明太山夜月高邱各周迴四百里小小山川如此間耳但草木多茂蔚而華實多蒨粲饒不死草甘泉水所在有之飲食者不死靑君宫在東華山上方二百里中盡天仙上眞宫室也金玉瓊瑤雜爲棟宇又有玄寒山山上別爲外宫宫室周二百里中方諸東西面又各有小方諸去大方諸三千里小方諸亦方面各三百里周迴一千二百里亦各別有靑君宫室又特多中仙人及靈鳥靈獸輩大方諸對會稽之東南小看去會稽岸七萬里東北看則有湯谷建木鄉又去方諸六萬里方諸是乙地湯谷是甲地則自寅至辰十萬里方五隅七言之邪角十四萬里故去會稽七萬里也大方諸之西小方諸上多有奉佛道者有浮圖以金玉鏤之或有高百丈者數十曾謂應作層}
