  - {type: variant, offset: 3705, length: 0, content: '', CK-KZ: 右此二法不審是何眞所受漢孝明皇帝夢見神人身長丈六項生圓光飛在殿前欣然悅之遍問朝廷通人傅毅對曰臣聞天竺國有得道者號曰佛傳聞能飛行身有白光殆其神乎帝乃悟卽遣使者張騫羽林郎秦景博士王遵等十四人之大月氏國採寫佛經四十二章秘蘭臺石室第十四卽時起洛陽城西門外道北立佛寺又於南宫淸涼臺作佛形像及鬼子母圖帝感非常先造夀陵亦於殿上作佛象是時國豐民安遠夷慕化願爲臣妾佛像來中國始自明帝時耳此說粗與外書同而長安中似久已有佛裴君卽是其事且佛法乃與天竺罽賔而月氏無有與此爲異今旣欲說小方諸奉佛故先宜叙此也按張騫非前漢者或姓名同耳傅毅字仲武見漢書秦景王遵等不顯此寺名白馬寺明帝乃葬顯節陵此云夀陵者漢諸帝在位時皆預造夀陵猶今世人作夀冢非陵名也外書記亦云遣侍中張堪或云郎中張愔並往天竺寫致經象并沙門來至又恐今此說未必是眞受猶可楊君疏舊語耳但眞經誥中自亟有論及佛事也方諸正四方故謂之方諸一面長一千三百里四面合}
