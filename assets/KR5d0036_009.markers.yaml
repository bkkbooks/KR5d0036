  - {type: variant, offset: 3219, length: 0, content: '', CK-KZ: 是其夜常燒香精苦有如所待者也坐卧存思或讀書念眞在意爲之唯不可以其夕施他事非求道之方耳若兼愼於其日益善匪唯守夜矣受洞訣之始常當修此好以爲意也數遇惡夢者一曰魄妖二曰心試三曰尸賊厭消之方也若夢覺以手躡人中二七過琢齒二七遍微祝曰大洞眞玄張鍊三魂第一魂速守七魄第二魂速守泥丸第三魂受心節度速啓太上三元君向遇不祥之夢是七魄遊尸來協萬邪之源急召桃康護命上告帝君五老九眞皆守體門黃閣神師紫戸將軍把鉞搖鈴消滅惡津反凶成吉生死無緣畢若又卧必獲吉應而造爲惡夢之氣則受閉於三關之下也三年之後唯神感旨應乃有夢也夢皆如見將來之明審也略無復惡占不祥之想矣長史作惡字皆酉下心其義與西下心亦}
