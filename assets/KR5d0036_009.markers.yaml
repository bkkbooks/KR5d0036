  - {type: variant, offset: 1349, length: 1049, content: 甚至密相示保命答許長史庾道季身處陽官貴勢不能順天用法憒憒慢信心形不同自少及長善功無一積惡不改其罪目已定今臨命方欲修德以自濟免徒費千金之用不亦晚乎保命答許長史庾和字道季亮第二子也幼有才辭文義升平中為丹陽尹表除諸侯六十餘事太和初為領軍如此行跡不似為惡恐是聞戒修善故得申遂郗回父無辜戮人數百口取其財寶殃考深重惋謂應作怨字主恆訟訴天曹早已申對回法應滅門但其修德既重一身免脫子孫豈得全耶回當保其天年但仙道之事去之遠矣太元真人答許長史郗回父鑒清儉有志行不應殺掠如此或是初過江時擺併所致不爾則在京時殺賊有濫也鑒年七十餘乃終即得為酆宮職右從陸納來四條有甲手寫平凝夷質淵通妙靈神造重絕棲真攝生太玄植簡太素刊名金庭內曜玉華外瑩朱軒四駕嘯命眾精騁龍玄州飛雲浮冥必能上友逸臺之公下監御于太清矣八月十七日夜紫微王夫人授令因許長史示郗希遐遠曜冥響凝玄蕭浪上韻耽夢遁真仰飛霄霧俯散靈根飛步四覺內觀七緣者則必有丹書秀簡帝房之錄玄聲八振棲身五嶽于是灌胎朝元吐納六液從容三道誨此景福上可以策軒空洞下可以反華變黑矣若形羈榮羅鼓輪華園乘波適物鳴簪風塵外有謀道之名內有百憂來臻者適足勞天年以騁思終歸骸於三官耳齋之不專徒悟而無益可謂意不盡言乎蓋行真炁當吐三納四乘七吞九今吸之不足躡之失序神漏溯源精亡胎擾雖休糧日挹而莫知道與年喪矣欲階此渡也其未接乎夫索長生者多津尋靈途者千百何必用冰爐以盛火趣償責于三官耶右中君言因許長史示郗紫微夫人云郗若得道乃當為太清監也若能聞要道而勤者當至此格若不專篤而守迷行外舍道法者則都失也紫微前語與太元殊乖而如此所云當是迷不能勤乎要道司命顯其終迹故也情不餘念者道乃來耳郗回猶未足以論至道耶小君郗綜婦丁淑英者有救窮之陰德又遇趙阜之厄而不言內慈自中玄感皇人故令福逮于回使好仙也綜墓在東平淑英今為朱陵嬪數遊三上司命亦令聽政焉此二人當是回之曾祖也外書不顯郗瞿與薛春華至垂心于門宗初不以生人為事然訟者多但不能咸制之耳每見諫考訴者甚勤至也時節宜祠之耶此二人郗家之福鬼外書亦無此二人不知是何親郗雄與閻屈女不相當負石之役于今未了喜擊犯門宗心常殺絕此二人是郗家之禍鬼郗厶枿除此名不可識與殷武姬被考以燒殺朱奢李賤以致災也其無後亦求代逮又與高豐相扇甚助馬頭之訟石公未便可得佳恐不止耳亦何趣欺其婦耶省來勤勤試為掩正之亦無此諸人右保命答許長史小君說言郗鑒今在三官為劉季姜所訟爭三德事周馬頭在水官訟其婿引理甚苦郗朗伊香之二人今為牙女子奇求此范帥昨受江羅辭郗相今為大曹吏所逮其婦形嬰桃受事未了方索代人於此家此自是旁聽小君之言語耳不令書之為自疏識以示, WYG: ''}
