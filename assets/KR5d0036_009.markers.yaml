  - {type: variant, offset: 3200, length: 0, content: '', CK-KZ: 勿反顧忤眞炁致邪應也入靜戸先前使人通達上聞臨食上勿道死事洗澡時常存六丁令人所向如願理髮欲向王地旣櫛髮之初而微呪曰泥丸玄華保精長存右爲隱月左爲日根六合淸鍊百神受恩祝畢咽液三過此一條猶是安妃所說無異但不知何者前後耳按以日月推此則是後也右四條南嶽夫人喻正一平經曰閇氣拜靜使百鬼畏憚功曹使者龍虎君可見與語謂能精心久行之耳泰淸家有正一平炁今此悉載拜靜眾事必應是泰淸經恐脫炁字也又曰燒香時勿反顧反顧則忤眞炁使致邪應也又曰入靜戸先前右足著前後進左足令與右足齊畢乃趍行如故使人陳啓通達上聞又曰臨食上勿道死事勿露食物來眾邪炁又曰數澡洗每至甲子當沐不爾當以幾月旦使人通靈浴不患數患人不能耳蕩鍊尸臭而眞炁來入右玄師所敕使施用右六條與前所說大同}
