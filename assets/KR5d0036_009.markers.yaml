  - {type: variant, offset: 1, length: 0, content: '', WYG: 九梁陶𢎞景撰協昌期第一經曰行事時北向執隱書而為之者謂始學眞妙未渉微逺不解星位之首向不識𤣥斗之指建故當北向執書以漸求之耳若既解書意識星轉之隨時自宜隨斗所指按而存歩如此則無有常向不為皆向北也夫一切北向自為始學者耳恐此將可以意通觸𩔖不足復問邪此答長史諮飛步經中北向執書意也太上眞人步五星之道以致五星降室閉氣上綱當先呼五星星夫人名字畢乃越綱蹈星謂始上綱便頓住呼名字呼名字畢乃越綱蹈星耳若每至星上得復重心呼所至星處之名字益其佳也若其煩重難常但可按舊而行耳昔鬱沙公北里子長陵老人皆按此法而得升天不以煩難為辭也所謂治生者矣商販之汲汲豈憚險難哉所期唯錢貨而已耳若使求道者常如賈販之用心亦有何不得仙耶但惜初學者皆言專心盡懃至而後漸懈縱有亦似車之將故而百節緩落又似負重之牛造逺足蹇夫學者之所患而為得者之所笑皆如此輩事耳茍能心研内鏡者是為感發乎神將有靈人發子之蒙攜辰景之輿矣此答諮歩五星法也經圖唯言隨綱往還又有一法云越綱蹈星今即是訣此事也奬戒之言實為切至五星圖布常向南也以太白位在西嵗星位在東按而施之所以爾者五星隱伏縱横無常不如北斗列象恒在故一以定位於五方不得隨星之所在也此答諮施安五星圖也經中無㫖訣所以宜問三}
