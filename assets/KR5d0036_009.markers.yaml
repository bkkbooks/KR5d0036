  - {type: variant, offset: 142, length: 2, content: 易遷, CK-KZ: 經下眞品目太上天關三經曰常欲以手按目近鼻之兩眥閉炁爲之炁通轍止吐而復始恒行之眼能洞觀此經下眞品目云天關三圖疑闕圖字右四條玄師所敕用玄師卽南眞夫人此四經並未出世淸靈眞人說寶神經長史寫本亦題如此此指是前一事之目耳其後並眾眞雜說標題有前後之異猶是眞誥之例今人皆別呼實神經寶神經豈得下教耶此唯是一片鈔耳耶夫注心道眞玄想靈人冥冥者亦具監其意也若外難未披假詠兼存實復未能迴西榆之年還發玄童矣苟躭玄篤也志之懃也縱令牙彫面皺頂生素華者我道能變之爲嬰在須臾之間耳但問志之何如爾老少之學無所在也吾往卽其人也說此諸事皆是}
