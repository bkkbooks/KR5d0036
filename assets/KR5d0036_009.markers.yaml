  - {type: variant, offset: 3304, length: 378, content: 讖密以相示右此及讖有掾寫在掾自記修事後共紙尋真綜回文令難解耳今拘連相取又別疏出之其授之時維當道其辭楊君後自更錯義皆是說晉代之事並有明徵也相欺豈妙道要吾知之天秘能有術金之萬尋師疾逆除惡子自之制夷遂平世天命乘驅寶奇龍者篡可悲真間世復思宜神熙逆歷有數在茲基無不無兵隆誰定帝紜室來之皇慎地先卒兒必虧金紛異五亂德天火數失期座當變見遠凶匠制規三由匠足不慮憂危撥保封寸莫其測源劉知向有明施者三五瑞天之代隆換迭相運推精氣神妙二參儀慎凡傳人賢精氣神妙參二儀慎傳凡人賢者施封天制地無不宜子能寶秘天知之吾道要妙豈相期自有奇神先兵規火寸三五天瑞之隆代迭換運相推明匠保德慎無思驅惡除逆疾尋思萬金之術龍之熙隆數卒三失由兒莫測其源劉向知有凶撥亂皇復基乘天命世遂平夷制逆者誰必定期匠不足慮憂遠危五世之間真可悲篡歷有數帝座虧當見變異紛紛來金室在茲枕麝香一具於頸間辟水注之來絕惡夢矣常存三關佳, CK-KZ: ''}
