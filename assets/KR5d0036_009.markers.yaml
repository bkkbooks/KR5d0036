  - {type: variant, offset: 3185, length: 0, content: '', CK-KZ: 紫靑絳三色氣出目前此是內按三素雲以灌合童子也陰祝曰眼童三雲兩目眞君英明注精開通淸神太玄雲儀靈驕翩翩保利雙闕啓徹九門百節應響朝液泥丸身升玉宮列爲上眞凡四十八字祝畢咽液五十過畢乃開目以爲常坐起可行之不必夜也要以生炁時一年許耳目便精明久爲之徹視千里羅映神靈聽於絶響者也此亦眞仙之高道不但明目開耳而已夫欲學道者皆當不欲令人知見所聞每事盡爾太上宮中歌曰手把八雲氣英明守}
