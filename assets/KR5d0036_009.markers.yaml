  - {type: variant, offset: 1896, length: 239, content: 其未接乎夫索長生者多津尋靈途者千百何必用冰爐以盛火趣償責于三官耶右中君言因許長史示郗紫微夫人云郗若得道乃當為太清監也若能聞要道而勤者當至此格若不專篤而守迷行外舍道法者則都失也紫微前語與太元殊乖而如此所云當是迷不能勤乎要道司命顯其終迹故也情不餘念者道乃來耳郗回猶未足以論至道耶小君郗綜婦丁淑英者有救窮之陰德又遇趙阜之厄而不言內慈自中玄感皇人故令福逮于回使好仙也綜墓在東平淑英今為朱陵嬪數遊三上司命亦令聽政焉此二人當是回之曾祖也外書不顯郗瞿與薛春華至垂心于門宗初不以生人為事然訟者多, CK-KZ: ''}
