  - {type: variant, offset: 3707, length: 2, content: 朱書, CK-KZ: 樓也其上人盡孝順而不死是食不死草所致也皆服五星精讀夏歸藏經用之以飛行按夏曰連山殷曰歸藏與此不同依如三弟子雖奉佛道不作比邱形服世人謂在眞菩薩家耳大方諸之東小方諸上多奇靈寶物有白玉酒金漿汧靑君畜積天寶之器物盡在於此亦多有仙人食不死草飲此酒漿身作金玉色澤常多吹九靈簫以自娛樂能吹簫者聞四十里簫有三十孔竹長二三尺九簫同唱百獸抃舞鳳凰數十來至和簫聲大方諸宫靑君常治處也其上人皆天眞高仙太極公卿諸司命所在也有服日月芒法雖已得道爲眞猶故服之霍山赤城亦爲司命之府唯}
