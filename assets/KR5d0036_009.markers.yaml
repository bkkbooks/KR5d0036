  - {type: 'tls:seg', offset: 3180, content: '', id: KR5d0036_tls_009-46a.1}
  - {type: variant, offset: 3182, length: 0, content: '', CK-KZ: 天眞入山澗之谷塡天山之源則虛靈可見萬鬼滅身所謂仰和天眞俯按山源也華葢一名華庭也天眞是兩眉之間眉之角也山源是鼻下人中之本側在鼻下小入谷中也華庭在兩眉之下是徹視之津梁天眞是引靈之上房旦中暮恒咽液三九過急以手三九陰按之以爲常令致靈徹視杜遏萬邪之道也一日三過行耳紫微夫人言人有卒病垂死}
