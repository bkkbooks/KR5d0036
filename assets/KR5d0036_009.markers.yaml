  - {type: variant, offset: 3183, length: 0, content: '', CK-KZ: 世中凡醫唯知針人中不知針山源谷中此太謬也本注從此注起是楊接長史書也按而祝曰開通天庭使我長生徹視萬里魂魄返嬰滅鬼卻魔來致千靈上升太上與日合并得補眞人列象玄名楚莊公時此卽春秋時楚莊王也市長宋來子恒洒掃一市久時有一乞食公入市經日乞恒歌曰天庭發雙華山源彰陰邪淸晨按天馬來詣太眞家眞人無那隱又以滅百魔恆歌此乞食一市人無解歌者獨來子忽悟疑是仙人然故未解其歌耳乃遂師此乞食公棄官追逐積十三年此公遂授以中仙之道來子今在中嶽乞食公者西嶽眞人馮延壽也周宣王時史官也手爲天馬鼻下爲山源六月二十七日夜喻書此楊接書訖此雲林王夫人曰仙眞之道以耳目爲主淫色則目闇廣憂則耳閇此二病從中來而外奔也非復有他矣今令人聰明益易耳但不爲之者行之難欲得上通徹映旁觀鬼神當洗心絶念放棄流淫所謂嚴其始矣夜卧先急閉目東向以手大指後掌各左右按拭目就耳門使兩掌俱交會於項中三九過存目中}
