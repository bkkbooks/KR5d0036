  - {type: variant, offset: 2422, length: 585, content: 氣不交靈助無主是以群邪纏玄急行其禍奚不宗生生乎於我助之有緣其婦言亦急家事當須了之非他得豫今六天之橫縱而太平之微薄靈不足以助順適足以招群奸所以神光披越而邪乘正任矣高齡之無德久矣鬼訟之紛錯積矣許長史黃氏枿作掾字將欲理之耶若翻然奉張諱道者我當與其一符使服之如此必愈而害兮此豁字也矣不然往詣水官所謂嗚呼哀哉張諱即天師名也楊不欲顯疏也邪氣入體鬼填胸次其將迴惑于邪正必不能奉正一於平氣耶如此吾治疾之方殆不可得正一平氣即天師祭酒之化也彼往其子亦去何一身之永逝乎八月十九日夜保命君密語許長史冢訟尤甚恐亦未已齡曾鑿敗古人碑銘之文以自顯焉陰賊于鬼神弊謂應作蔽字善以自摽訴者誠多事以此為首先八月二十四日夜保命告欲取謝奉補期門郎而今已有兼人北帝故權停之耳近差王允之兼行得代奉若服朮酒可未便恭命也高耆亦可服朮其家蒙訟亦為紛紛朮遏鬼炁故必無他耳范中候言此謝奉字弘道會稽人仕至吳郡丹陽尹吏部尚書王允之敦同堂弟王舒子有智幹為河南中郎將江州遷衛將軍會稽封番禺侯年四十亡諡中侯高耆即謂齡也期門即酆都中官而記中不見此職惟有修門耳從平凝來凡十四條有掾寫夫觀物適任內順明靈託性命於高真委形氣于神攝者亦克疆以永遐迴秋齡以保真今德匠既凝神杖信澄心密靜圓順廣敬固天祐焉然胤嗣不多或時彫落將猶靈關失緯潛機未鎮耳當今五氣滋曜常朗文昌之房三星結華每煥璇衡之內是以玄潤胎萌遂其流根矣我案九合內志文曰竹者為北機上精受氣于玄軒之宿, CK-KZ: ''}
  - {type: variant, offset: 2422, length: 585, content: 氣不交靈助無主是以群邪纏玄急行其禍奚不宗生生乎於我助之有緣其婦言亦急家事當須了之非他得豫今六天之橫縱而太平之微薄靈不足以助順適足以招群奸所以神光披越而邪乘正任矣高齡之無德久矣鬼訟之紛錯積矣許長史黃氏枿作掾字將欲理之耶若翻然奉張諱道者我當與其一符使服之如此必愈而害兮此豁字也矣不然往詣水官所謂嗚呼哀哉張諱即天師名也楊不欲顯疏也邪氣入體鬼填胸次其將迴惑于邪正必不能奉正一於平氣耶如此吾治疾之方殆不可得正一平氣即天師祭酒之化也彼往其子亦去何一身之永逝乎八月十九日夜保命君密語許長史冢訟尤甚恐亦未已齡曾鑿敗古人碑銘之文以自顯焉陰賊于鬼神弊謂應作蔽字善以自摽訴者誠多事以此為首先八月二十四日夜保命告欲取謝奉補期門郎而今已有兼人北帝故權停之耳近差王允之兼行得代奉若服朮酒可未便恭命也高耆亦可服朮其家蒙訟亦為紛紛朮遏鬼炁故必無他耳范中候言此謝奉字弘道會稽人仕至吳郡丹陽尹吏部尚書王允之敦同堂弟王舒子有智幹為河南中郎將江州遷衛將軍會稽封番禺侯年四十亡諡中侯高耆即謂齡也期門即酆都中官而記中不見此職惟有修門耳從平凝來凡十四條有掾寫夫觀物適任內順明靈託性命於高真委形氣于神攝者亦克疆以永遐迴秋齡以保真今德匠既凝神杖信澄心密靜圓順廣敬固天祐焉然胤嗣不多或時彫落將猶靈關失緯潛機未鎮耳當今五氣滋曜常朗文昌之房三星結華每煥璇衡之內是以玄潤胎萌遂其流根矣我案九合內志文曰竹者為北機上精受氣于玄軒之宿, CK-KZ-jye: ''}
