  - {type: variant, offset: 62, length: 1, content: 曰, CK-KZ: 久道成則同與天地共寓在太無中矣若洞虛體無則與太無共寄寓在寂寂中矣能洞寂者則視之不見聽之不聞死生之根易解久長之年易尋尋之可得解之可久夫可久於其道者養生也常可與久遊者納氣也氣全則生存然後能養至養至則合眞然後能久登生氣之二域望養全之寂寂視萬物玄黃盡假寄耳豈可不懃之哉氣全則辟鬼邪養全則辟百害入軍不逢甲兵山行不觸虎兕}
