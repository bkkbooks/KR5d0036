  - {type: variant, offset: 2989, length: 287, content: 朱衣正昆崙叔期知是神人因拜叩頭就請要訣因以一卷書與之是胎精中記拜受此書入山誦之後合神丹而升天此皆前事之徵者汝當識此言三關事與黃庭同並有說而無法君曰當存五神于體五神者謂兩手兩足頭是也頭想恆青兩手恆赤兩足恆白者則去仙近矣昔徐季道學道在鵠鳴山中亦時時出民間忽見一人著皮褲練褶拄桃枝杖逢季道季道不覺之數數非一季道乃悟而拜謝之因語季道曰欲學道者當巾天青詠大歷𧾷冉雙白徊二赤此五神之事也其語隱也大歷三皇文是也此即太素五神事也別有經法君曰欲使心正常以日出三丈錯手著兩肩上以日當心心中間暖則心正矣常能行之佳昔有姜伯真者學在猛山中行道採藥奄值仙人仙人使平倚日中其影偏仙人曰子知仙道之貴而篤志學, WYG: ''}
