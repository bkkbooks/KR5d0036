  - {type: variant, offset: 2519, length: 2, content: 當慎, WYG: 可與乆遊者納氣也氣全則生存然後能養至養至則合真然後能乆登生氣之二域望養全之寂寂視萬物𤣥黄盡假寄耳豈可不懃之哉氣全則辟鬼邪養全則辟百害入軍不逢甲兵山行不觸虎兕}
