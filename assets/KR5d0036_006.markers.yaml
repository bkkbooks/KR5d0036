  - {type: variant, offset: 758, length: 261, content: 稟十訣君曰仙道有天關三圖七星移度君曰仙道有九丹變化胎精中記君曰仙道有九赤班符封山墜海君曰仙道有金液神丹太極隱芝君曰仙道有五行秘符呼魂召魄君曰仙道有曲素決辭以招六天之鬼在世君曰仙道有黃水月華服之化而為月君曰仙道有徊水玉精服之化而為日君曰仙道有環剛樹子服之化而為雲君曰仙道有水陽青映服之化而為石君曰仙道有赤樹白子服之化而為玉君曰仙道有絳樹青實服之化為黃金君曰仙道有琅玕華丹服之化為飛龍右此十七條在靈書紫文中並琅玕丹之所變化也君曰仙道有九轉神丹服之化為白鵠右在茅司命傳中君曰仙道有天皇象符以合元炁亦在紫文中君曰仙道有白羽紫蓋以遊, WYG: 百比肩於}
