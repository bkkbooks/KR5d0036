  - {type: variant, offset: 11, length: 0, content: '', CK-KZ: 掾書兩本雖曰朮敘其實多原大略極論似乎不自書意也紫微才豐情綺動言富逸牽引始末恒超理外其後所譬深明黃赤之致矣夫晨齊浩元洞冥幽始八炁靡渾靈關未理者則獨坦觀於空漠任天適以虛峙於是淳音微唱和風合起二明鑒暉霄翳無待也擁萌肇於未剖塞萬源於機上含生反眞觸類藏初爰可矧萬歲以爲天願嬰札而}
