  - {type: variant, offset: 27, length: 0, content: '', CK-KZ: 亦苦不爲道亦苦惟人自生至老自老至病護身至死其苦無量心惱積罪生死不絕其苦難說況多不終其天年之老哉爲道亦苦者淸淨存其眞守玄思其靈尋師轗軻履試數百勤心不墮用志堅審亦苦之至也視諸侯之位如過客視金玉之寶如磚石視紈綺如弊帛者始可謂能問道耳方諸靑童君曰人之爲道能拔愛欲之根者譬如掇懸珠一一掇之會有盡時稍去外惡會有盡時盡則得道矣又近喻牛負重行泥中疲極不敢左右顧趣欲離泥以蘇息道士視情慾甚於彼泥中直心念道可免眾苦亦得道矣謹案上相都無降受事唯有此二告及歌詩一首恐未必是楊君親所瞻奉受記也西城王君告曰夫人離三惡道得爲人難也旣得爲人去女爲男難也旣得爲男六情四體完具難也六情旣具得生中國難也旣處中國值有道父母國君難也旣得值有道之君生學道之}
