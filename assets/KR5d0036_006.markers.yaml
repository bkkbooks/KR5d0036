  - {type: variant, offset: 3887, length: 1147, content: 疾也雖還精胎息僅而補之內虛已徹猶非本真莫若知而不為為而不散此仙之要道生之本業也君曰欲得延年當洗面精心日出二丈正面向之口吐死炁鼻噏日精須鼻得嚏便止是為炁通亦以補精復胎長生之方也君曰食慎勿使多多則生病飽慎便臥臥則心蕩心蕩多失性食多生病生病則藥不行欲學道者慎此未服食時也君曰式規之法使人目明久而徹視常以甲子之旬取東流清水合真丹以洗目日向清明平旦二七過常行之佳此事一出二十四神中彼謂之拂童而用庚午日中時也君曰欲為道者目想日月耳響師聲口恆吐死氣取生炁體象五星行恆如跚空心存思長生慎笑節語常思其形要道也君曰七五之法常當存之五者在身七者在經君曰世有下土惡強之鬼多作婦女以惑試人若有此者便閉炁思天關之中衡輔之星具身神正顏色定志意熟視其規中珠子濁不明者則鬼試也知鬼試則思七星在面前亦可在頭上以卻之若規中方明者仙道人也悟者便拜之不悟為試不過若遇邪而謂真人亦是不過之例也子慎之焉邪正相亂此最試之難者君曰飲食不可卒斷但當漸減之耳十日令減一升則半年便斷矣斷穀自有方世多有者不復重說之世人之食桃檔以補身不知桃皮之勝也桃皮別自有方君曰斷穀入山當煮食白石昔白石子者以石為糧故世號曰白石生此至人也今為東府左仙卿煮白石自有方也白石之方白石生所造也又善太素傳所謂白石有精是為白石生也此方在世君曰太素傳者道書也學此應奉太上老君上清皇人此皓然虛映景中之道非仙之尊也老子所謂谷神是也君曰王屋山仙之別天所謂陽臺是也諸始得道者皆詣陽臺陽臺是清虛之宮也欲入山者此山難尚也下生鮑濟之水水中有石精得而服之可長生此山在河內泌水縣即濟水所出之源也君曰大洞者神州是也神州別有三山三山有七宮七宮有七變朝化為金日中化為銀暮化為銅夜化為光或化為山或化為水或化為石謂之七變七變有七經七經有二十一玉童隨此書故曰大洞真經讀之萬過便仙此仙道之至經也君曰閬野者閬風之府是也崑崙上有九府是為九宮太極為太宮也諸仙人俱是九宮之官遼謂應作僚字耳至於真人乃九宮之公卿大夫仙官有上下各有次秩仙有左右府而有左右公左右卿左右大夫左右御史也明大洞為仙卿服金丹為大夫服眾芝為御史若得太極隱芝服之便為左右仙公及真人矣君曰有尸解乃過者乃有數種並是仙之數也尸解之仙不得御華蓋乘飛龍登太極遊九宮也此謂自然得尸解為地下主者之類耳非云託化遁變之例也君曰陽丹九轉世人皆有此術不復說之此謂房中之事耳陽丹或應作陰丹君曰在人間學生唯當服藥子不斷穀則大洞未可得聞斷穀之法世自有方君曰吾欲說仙之妙論道之變化子必秘之慎識吾言也當謂後二條事君曰昔有郭崇子者殷時人也彭真人之弟子嘗兄弟四人俱行為惡人所擊傷其左臂三弟大怒欲取治之崇子曰無用笑而各去此人後仕宦而崇子譽致之數數非一此人乃往謝之而猶譽不止其人曰我惡人也不可以受君子之施乃自殺後崇子得道太極真人以為有殺人之過不得為真人此蓋為善之過尚招其弊況為惡乎今時事亦多有類此者, WYG: 頼}
