  - {type: variant, offset: 2456, length: 1, content: 為, WYG: 此意欲識之此一條楊君自記}
  - {type: variant, offset: 2458, length: 1, content: 一, WYG: 論長史事數遊心山澤託景仙真者靈氣將愍子之逺樂山神將欣子之向化是故百疾不能干百邪不得犯屢燒香左右者令}
  - {type: punctuation, offset: 2460, content: ，, id: KR5d0036_tls_006-bkkpn513}
  - {type: 'tls:seg', offset: 2460, content: '', id: KR5d0036_tls_006-32a.27}
  - {type: variant, offset: 2460, length: 0, content: '', WYG: 魂魄正而恒聞芳風之氣乆乆乃覺之耳覺之則入道入道則得仙得仙則成真從前卷有待歌詩十篇接戒來至此凡八紙並更手界紙書後截半行書字即是楊書靜覩天地行此前}
  - {type: page-break, offset: 2460, content: '', id: KR5d0036_WYG_006-11a, image: WYG1059/WYG1059-0368c.png}
  - {type: variant, offset: 2461, length: 0, content: '', WYG: 並有楊續書後人更寫别續之耳所以前脱三十四字楊所書今未知何事静覩天地念飛仙静覩山川念飛仙静覩萬物念覆載慈心常執心如此得道也人生者如幻化耳寄寓天地間少許時耳若攝氣營神苦辛注真將得乆道道成則}
  - {type: variant, offset: 2462, length: 13, content: 姓名耳君曰晉初有真人郭聲子, WYG: 與天地共寓}
