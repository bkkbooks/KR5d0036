  - {type: variant, offset: 79, length: 0, content: '', CK-KZ: 氣非呼吸之氣人隨俗要求華名譬若燒香眾人皆聞其芳然不知薰以自燔燔盡則氣滅名立則身絕是故高人哂而遠之遂爲淸淨生之爲物譬日月天地此四象正與生生爲對失生則四象亦滅非四象之滅生滅之也若使常生則四象常存非四象之常存我能常生故也常生亦能生於無景何四象之足計哉災遘禍生形壞氣亡起何等}
