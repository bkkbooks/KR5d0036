  - {type: variant, offset: 5274, length: 1, content: 卷, CK-KZ: 條楊書後被割不盡穆惶恐言逢遇玄運得聞宗告每事將順啓悟胸心仁廕纏綿仰感罔極至於始終之分天然定理樂生惡亡人情常感哭泣之哀奔臨之制内以敘情外以順禮賢庶所守莫之虧也穆内雖修道外故俗徒未能披褐山栖帶索獨往不得不敘順情禮允帖内外一旦違之旣恩情未忍亦懼傷之者至矣夫人之言宛而附情弘道長教可謂遠矣輒當奉遵告敕使哀不至傷哭不過慟栖道任適不敢}
  - {type: variant, offset: 5274, length: 1, content: 卷, CK-KZ-jye: 條楊書後被割不盡穆惶恐言逢遇玄運得聞宗告每事將順啓悟胸心仁廕纏綿仰感罔極至於始終之分天然定理樂生惡亡人情常感哭泣之哀奔臨之制内以敘情外以順禮賢庶所守莫之虧也穆内雖修道外故俗徒未能披褐山栖帶索獨往不得不敘順情禮允帖内外一旦違之旣恩情未忍亦懼傷之者至矣夫人之言宛而附情弘道長教可謂遠矣輒當奉遵告敕使哀不至傷哭不過慟栖道任適不敢}
  - {type: variant, offset: 5274, length: 0, content: '', HFL: 條楊書後被割不盡穆惶恐言逢遇玄運得聞宗告每事將順啓悟胷心仁廕纏綿仰感罔極至於始終之分天然定理樂生惡亡人情常感哭泣之哀奔臨之制内以叙情外以順禮賢庶所守莫之虧也穆内雖修道外故俗徒未能披褐山栖帶索獨徃不得不叙順情禮允帖内外一旦違之既恩情未忍亦懼傷之者至矣夫人之言宛而附情弘道長教可謂遠矣輒當奉遵告敕使哀不至傷哭不過慟栖道任適不敢有違謹白此是答右英書本今闕所授事非謂前中君所告趣死之音者而亦應相關涉也右一條掾爲書眞誥}
