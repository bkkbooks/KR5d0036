  - {type: 'tls:seg', offset: 80, content: '', id: KR5d0036_tls_006-2a.12}
  - {type: variant, offset: 80, length: 3, content: 惟裴君, CK-KZ: 耶似由多言而不守一多端而期苟免耳是以玄巢頽枝以墜落百勝喪於一敗矣惜乎通仙之才安可爲堅子致弊也竪子致弊蓋爲膏肓之患不除借取晉景公之夢不爾則是別有小兒事也南嶽夫人所言鴻鷺對南旅以遐扇揚翮在於十百之野彼鳥自謂足矣然鷃鳩歎其眇邈大鵬哂鴻舉之指謂應作咫字尺耳苟安其安而是非自足故三鳥不相與議焉何譏之乎紫微言右八條並楊書古之至人獨秉靈一之符玄覽委順之化明坦途而合變捫冥樞以齊物故自然之表則存之而不論域領之内則論之而不議矣昔玄風泯絕埃氣彌氛弘猶淪喪澆僞滋起馳驟之徒替眞於崖分之外躁兢之羣饕利於形名之肆擅智生流蕩之患希求致矜伐之累乖常適於所適離至當於非當矣名身孰親道家良鍼謂應作箴字履淹者守一之至戒良可歎息六月八日夜保命告許長史知以無涯傷性心以欲惡蕩眞豈若守根淨沖栖研三神所以彌貫萬物而玄同鏡寂泯然與泥丸爲一而内外均福也可示虎牙南嶽夫人言促催進散不可令河上有事散似是朮散河上水官也保命言不修道德及學道無成則肇功之徒不相逮也自頃未見有日進之人矣學志故自}
