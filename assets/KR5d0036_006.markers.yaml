  - {type: variant, offset: 12, length: 4, content: 史掾各寫, CK-KZ: 和耳何事體造靈神之冥鄉心研殊方之假外哉自形無得眞之具器無任眞之用者誠宜步天元之妙攝推萬精以極妙尋九緯以挺生覩晨景之逈照仰觀煙氣則靈雲纏虛俯眄六律則八風扇威太無發洞冥之嘯圓曜有映空之暉於是紫霞靄秀波激岳頽浮煙籠象淸景遁飛五行殺害四節交擲金土相親水火結隙林卉停偃百川開塞洪電縱橫而呴沸雷震東西而折裂天屯見矣化爲陽九之災地否閡矣乃爲百六之會亢悔載窮於乾極覩羣龍玃示流血乎坤野爾乃吉凶互衝眾示災咎履坦道者將幽人貞吉居肥遯者亦無往不利冒嶮巇也行必輿尸涉於東北則喪朋而悔至苟大川之不利明坎井之沉零矣此皆人失其眞物乖我和遊竟萬端神鬼用謀容使天地無常以百姓爲心於是太上眞人愍萬流之鼓動開冥津以悟賢遂爾導達百變攝生理具居福德者常全處危害者彫折御六氣者定夀服靈芝者神逸奇方上術演於淸虛之奧金簡玉札撰於委羽之臺窈窕神唱眞暉合離歌其章則控晨太微用其道則揚輪九陔軒蓋於流霞之陣眷眄於文昌之台或爐轉丹砂之幽精粉鍊金碧之紫漿琅玕鬱勃以流華八瓊雲煥而飛揚絳液迴波龍胎隱鳴虎沫鳳腦雲琅玉霜太極月醴三環靈剛若以刀圭奏矣神羽翼張乃披空同之上文煒燁元始之室瓊音琅書發乎三玄之宮寶紱紆三元之贈蘂珮發丹林之房上帝獻紫軿之重躍太眞錫流金之火鈴神童啓轅九鳳齊鳴天籟駭虛晨鍾零鏗竦身抑旄八景浮空龍輿虎旂遊扇八方上造常陽之絶杪下寢倒景之蘭堂月妃參駟日華照容靈姬抱衾香煙溢窗顧眄而圓羅邁矣何九萬之足稱哉然後知高仙之道蓋上尋靈之涂微妙服御之致合神吉凶之用頓顯也自非無英公子黃老玉書大洞眞經三十九章豁落七元太上隱玄者莫有羣偶於此術矣復有體神精思寶鍊明堂朝適六靈使五藏生華守閉元關内存九眞三氣運液而灌溉丹田亦其次也夫丹誠而蔬禴者亦奚用東鄰之太牢哉乃可加以五雲水桂朮根黃精南燭陽草東石空靑松柏脂實巨勝茯苓並養生之具將可以長年矣吾又俱察草木之勝負有速益於已者並未及朮勢之多驗乎旦頃以來殺氣蔽天惡煙弭景邪魔橫起百疾雜臻或風寒關結或流腫種痾不期而禍凑意外而病生者比日而來集也夫朮氣則式遏鬼津吐煙則鎭折邪節强内攝魂益血生腦逐惡致眞守精衞命餐其餌則靈柔四敷榮輸輕盈服其丸散則百病瘳除五藏含液所以長遠視久而更明也古人名之爲山精之赤山薑之精太上導仙銘曰子欲長生當服山精子欲輕翔當服山薑此之謂也我非謂諸物皆當減朮爲益也且朮氣之用是今時所要末世多疾宜當服御耳夫道雖内足猶畏外事之禍形有外充者亦或中崩之弊張單偏致殆可鑒乎朮亦可以長生永夀二可以卻萬魔之枉疾我見山林隱逸得服此道千年八百比肩於五岳矣人多書煩不能服}
