  - {type: variant, offset: 151, length: 194, content: 故非道無以成真非真無以成道道不成其素安可見乎是以為大歸也見而謂之妙成而謂之道用而謂之性性與道之體體好至道道使之然也此說人體自然與道合所以天命謂性率性謂道修道謂教今以道教使性成真則同於道矣君曰太上者道之子孫審道之本洞道之根是以為上清真人為老君之師此即謂太上高聖玉晨大道君也為太極左真人中央黃老君之師君曰老君者太上之弟子也年七歲而知長生之要是以為太極真人君曰太極有四真人老君處其左佩神虎之符帶, WYG: 錫}
