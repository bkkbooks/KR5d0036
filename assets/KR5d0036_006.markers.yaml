  - {type: variant, offset: 2454, length: 0, content: '', WYG: 法今撰取在第三卷中右一條有掾書兩本一黄牋一碧牋方諸青童見告曰人為道亦苦不為道亦苦惟人自生至老自老至病䕶身至死其苦無量心惱積罪生死不絶其苦難説況多不終其天年之老哉為道亦苦者清浄存其真守𤣥思其靈尋師轗軻履試數百勤心不堕用志堅審亦苦之至也視諸侯之位如過客視金玉之寳如礫石視紈綺如弊帛者始可謂能問道耳方諸青童君曰人之為道能㧞愛欲之根者譬如掇懸珠一一掇之㑹有盡時稍去外惡㑹有盡時盡則得道矣又近喻牛負重行泥中疲極不敢左右顧欲離泥以蘇息道士視情慾甚於彼泥中直心念道可免衆苦亦得道矣謹案上相都無降授事唯有此二告及歌詩一首恐未必是楊君親所瞻奉受記也西城王君告曰夫人離三惡道得為人難也既得為人去女為男難也既得為男六情四體完具難也六情既具得生中國難也既處中國值有道父母國君難也既得值有道之君生學道之家有慈仁善心難也善心既發信道徳長生者難也既信道徳長生值太平壬辰之運為難也可不朂哉三惡道者生不得作人得作鳥獸蟲畜之三惡也太上問道人曰人命在幾日間或對曰在數日之間太上曰子未能為道或對曰人命在飯食之間太上曰子去矣未謂為道或對曰在呼吸之間太上曰善哉可謂為道者矣吾昔聞此言今以告子子善學道庶可免此呼吸弟子雖去吾教謂應作校字皆猶差懸也千萬里心存吾戒必得道矣研玉經寳書必得仙也處吾左側者意在邪行終不得道也人之為道讀道經行道事者譬若食遍口皆甜六腑皆美而有餘味能行如此者得道矣上宰亦無降楊事有此及服日月芒事耳太虚真人南岳赤君告曰人有衆惡而不自悔頓止其心罪來歸已如川歸海日成深廣耳有惡知非悔過從善罪滅善積亦得道也夫人遇我以禍者當以福往是故福徳之氣恒生於此害氣重殃還在於彼此學道之行也又告曰惡人害賢猶仰天而唾唾不洿天還洿已刑凡刑字皆應作形逆風揚塵塵不洿彼還灌其身道不可毁禍必滅己太虚真人曰飯凡人百不如飯一善人飯善人千不如飯一學道者寒栖山林者益當以為意赤君亦無復别授事紫元夫人告曰天下有五難貧窮惠施難也豪富學道難也制命不死難也得見洞經難也生值壬辰後聖世難也我昔問太上何縁得識宿命太上答曰道徳無形知之無益要當守志行道譬如磨鏡垢去明存即自見形斷六情守空淨亦見道之真亦知宿命矣又曰念道行道信道遂得信根其福無量也紫㣲夫人吿曰為道者譬彼持火入冥室中其冥即滅而明獨存學道存正愚癡即滅而正常存也財色之於己也譬彼小兒貪刀刃之其甜不足以美口亦即有截舌之患𤣥清夫人告曰夫人係於妻子室宅之患甚於牢獄桎梏牢獄桎梏㑹有原赦而妻子情慾雖有虎口之禍有此一異手寫本無此十九字恐是脱漏已猶甘心投焉其罪無赦情累於人也猶執炬火逆風行也愚者不釋炬火必燒手貪慾恚怒愚癡之毒又闕此十五字於辭有不應爾貪嗔癡所謂三毒處人身中不早以道除斯禍者必有危殆愚癡者火燒手之謂也為道者猶木在水尋流而行亦不左觸岸亦不右觸岸不為人所取不為鬼神所遮又不腐敗吾保其入海矣人為道不為慾所惑不為衆邪所誑精進不疑吾保其得道矣南極夫人曰人從愛生憂憂生則有畏無愛即無憂無憂則無畏昔有一人夜誦經甚悲悲至意感忽有懐歸之哀太上真人忽作凡人徑往問之子嘗彈琴耶答曰在家時嘗彈之真人曰絃緩何如答曰不鳴不悲又問絃急何如答曰聲絶而傷悲又問緩急得中如何答曰衆音和合八音妙奏矣真人曰學道亦然執心調適亦如彈琴道可得矣愛慾之大者莫大於色其罪無外其事無赦賴其有一若復有二普天之民莫能為道者也夫學道者行隂徳莫大於施惠觧救志莫大於守身奉道其福甚大其生甚固矣有人惡我者我不納惡惡自歸己將禍而歸身中猶景謂應作影字響之隨形聲矣右衆靈教戒所言按此三男真二女真並髙真之尊貴者降集甚希恐此是諸降者叙説其事猶如秋分日瑶臺四君吟耳非必親受楊君也三見易遷再云可待要乃起東山屋舎且可籬䕶之耳問其故未見答問衆靈云我或爾耶}
