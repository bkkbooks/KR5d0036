  - {type: variant, offset: 28, length: 1, content: 舊, CK-KZ: 有慈仁善心難也善心旣發信道德長生者難也旣信道德長生值太平壬辰之運爲難也可不勗哉三惡道者生不得作人得作鳥獸虫畜之三惡也太上問道人曰人命在幾日間或對曰在數日之間太上曰子未能爲道或對曰人命在飯食之間太上曰子去矣未謂爲道或對曰在呼吸之間太上曰善哉可謂爲道者矣吾昔聞此言今以告子子善學道庶可免此呼吸弟子雖去吾教謂應作校字皆猶差懸也千萬里心存吾戒必得道矣研玉經寶}
