年而太極老君詣之與之木鑽使穿一石盤厚五尺許云穿此盤便當得道其人乃晝夜穿之積四十七年鑽盡石穿遂得神丹乃升太清為南嶽真人此有志之士也子其識之若有此試慎勿言不能也君曰昔有黃觀子者亦少好道家奉佛道朝朝朝拜叩頭求乞長生如此積四十九年後遂服食入焦山太極真人百四十事試之皆過遂服金丹而詠大洞真經今補仙官為太極左仙卿有至志者也非佛所能致是其中寸定矣此說與傅含真奉佛事亦同君曰昔毛伯道劉道恭謝稚堅張兆期皆後漢時人也學道在王屋山中積四十餘年共合神丹毛伯道先服之而死道恭服之又死謝稚堅張兆期見之如此不敢服之並捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百歲今猶在山中游行五嶽此人知神丹之得道而不悟試在其中故但陸仙耳無復登天冀也謝稚堅有三處出一云與葛玄相隨一云在鹿跡洞中一即是此未詳為是一人當同姓名耳君曰晉初有真人郭聲子在洛市中作卜師時劉石張臧四姓並欲學道常自歎云不遇明師明師出而己不覺皆為試不過皆無所得也常當慎此有異不覺便為試不過也人有學道之心天網疏而不失皆並試人汝深思此意慎之也君曰昔閭成子少好長生好學道四十餘年後入荊山中積七十餘歲為荊山山神所試成子謂是真人拜而求道而為大蛇所噬殆至于死賴悟之速而存太上想七星以卻之因而得免後復為邪鬼所惑失其左目遂不得道而絕山中子當慎此之試恆存於師也猶是成子用志不專頗有邪心故也君曰黃子陽者魏人也少知長生之妙學道在博落山中九十餘年但食桃皮飲石中黃水後逢司馬季主季主以導仙八方與之遂以度世此六國時魏非漢後魏世也君曰有劉奉林者是周時人學道在嵩高山積四百年三合神丹為邪物所敗乃行徙入委羽之山能閉炁三日不息於今千餘年矣猶未升仙猶是試多不過道數未足故也此人但服黃蓮以得不死耳不能有所役使也君曰昔高丘子殷人也亦好道入六景山積五百二十餘歲但讀黃素道經服餌術後合鴻丹以得陸仙遊行五嶽二百餘年後得金液以升太清也今為中嶽真人此說與劍經序亦略同君曰為道當令三關恆調是根精固骨之道也三關者口為心關足為地關手為人關謂之三關三關調則五藏安五藏安則舉身無病昔趙叔期學道在王屋山中時時出民間聞有能卜者在市閭中叔期往見之因語叔期曰欲入天門調三關存朱衣正昆崙叔期知是神人因拜叩頭就請要訣因以一卷書與之是胎精中記拜受此書入山誦之後合神丹而升天此皆前事之徵者汝當識此言三關事與黃庭同並有說而無法君曰當存五神于體五神者謂兩手兩足頭是也頭想恆青兩手恆赤兩足恆白者則去仙近矣昔徐季道學道在鵠鳴山中亦時時出民間忽見一人著皮褲練褶拄桃枝杖逢季道季道不覺之數數非一季道乃悟而拜謝之因語季道曰欲學道者當巾天青詠大歷𧾷冉雙白徊二赤此五神之事也其語隱也大歷三皇文是也此即太素五神事也別有經法君曰欲使心正常以日出三丈錯手著兩肩上以日當心心中間暖則心正矣常能行之佳昔有姜伯真者學在猛山中行道採藥奄值仙人仙人使平倚日中其影偏仙人曰子知仙道之貴而篤志學之而不知心不正之為失因教之如此後遂得道定錄目許先生云姜伯真之徒不知即此姜不君曰常以夜半時去枕平臥握固放體氣調而微者身神具矣如有不具便速起燒香平坐閉目握固兩膝上心存體神使兩目中有白炁如雞子大在目前則復故也五日一行之此即二十四神中事也君曰食草木之藥不知房中之法及行炁導引服藥無益也終不得道若至志感靈所存必至者亦不須草藥之益也若但知行房中導引行炁不知神丹之法亦不得仙也若得金汋神丹不須其他術也立便仙矣若得大洞真經者復不須金丹之道也讀之萬過畢便仙也房中之術導引行氣世自有經不復一二說之此謂徒服藥存修而交接之事不絕亦不得長生非言都不為者若都不為止服藥皆能得仙經曰得道者皆隱谷蟲之法而見三尸之術夫穀蟲死則三尸枯三尸枯自然落矣殺穀蟲自有別方得者秘之此即蘇傳中初神丸方也其餘雜法皆不及此也君曰人生有骨錄必有篤志道使之然若如青光先生谷希子南岳松子長里先生墨羽之徒皆為太極真人所友或為太上天帝所念者興雲駕龍以迎之故不學道而仙自來也過此以下皆須篤志也案此諸人學道皆有事跡並經辛勤而云不學自得其義未了墨羽應是墨翟亦或是木羽也君曰然則學道者有九患皆人之大病若審患病則仙不遠也患人有志無時有時無友有友無志有志不遇其師遇師不覺覺師不勤勤不守道或志不固固不能久皆人之九患也人少而好道守固一心水火不能懼其心榮華不能惑其志修真抱素久則遇師不患無也如此則不須友而成亦不須感而動也此學仙之廣要言也汝當思此君曰夫喜怒損志哀戚損性榮華惑德陰陽竭精皆學道之大忌仙法之所疾也雖還精胎息僅而補之內虛已徹猶非本真莫若知而不為為而不散此仙之要道生之本業也君曰欲得延年當洗面精心日出二丈正面向之口吐死炁鼻噏日精須鼻得嚏便止是為炁通亦以補精復胎長生之方也君曰食慎勿使多多則生病飽慎便臥臥則心蕩心蕩多失性食多生病生病則藥不行欲學道者慎此未服食時也君曰式規之法使人目明久而徹視常以甲子之旬取東流清水合真丹以洗目日向清明平旦二七過常行之佳此事一出二十四神中彼謂之拂童而用庚午日中時也君曰欲為道者目想日月耳響師聲口恆吐死氣取生炁體象五星行恆如跚空心存思長生慎笑節語常思其形要道也君曰七五之法常當存之五者在身七者在經君曰世有下土惡強之鬼多作婦女以惑試人若有此者便閉炁思天關之中衡輔之星具身神正顏色定志意熟視其規中珠子濁不明者則鬼試也知鬼試則思七星在面前亦可在頭上以卻之若規中方明者仙道人也悟者便拜之不悟為試不過若遇邪而謂真人亦是不過之例也子慎之焉邪正相亂此最試之難者君曰飲食不可卒斷但當漸減之耳十日令減一升則半年便斷矣斷穀自有方世多有者不復重說之世人之食桃檔以補身不知桃皮之勝也桃皮別自有方君曰斷穀入山當煮食白石昔白石子者以石為糧故世號曰白石生此至人也今為東府左仙卿煮白石自有方也白石之方白石生所造也又善太素傳所謂白石有精是為白石生也此方在世君曰太素傳者道書也學此應奉太上老君上清皇人此皓然虛映景中之道非仙之尊也老子所謂谷神是也君曰王屋山仙之別天所謂陽臺是也諸始得道者皆詣陽臺陽臺是清虛之宮也欲入山者此山難尚也下生鮑濟之水水中有石精得而服之可長生此山在河內泌水縣即濟水所出之源也君曰大洞者神州是也神州別有三山三山有七宮七宮有七變朝化為金日中化為銀暮化為銅夜化為光或化為山或化為水或化為石謂之七變七變有七經七經有二十一玉童隨此書故曰大洞真經讀之萬過便仙此仙道之至經也君曰閬野者閬風之府是也崑崙上有九府是為九宮太極為太宮也諸仙人俱是九宮之官遼謂應作僚字耳至於真人乃九宮之公卿大夫仙官有上下各有次秩仙有左右府而有左右公左右卿左右大夫左右御史也明大洞為仙卿服金丹為大夫服眾芝為御史若得太極隱芝服之便為左右仙公及真人矣君曰有尸解乃過者乃有數種並是仙之數也尸解之仙不得御華蓋乘飛龍登太極遊九宮也此謂自然得尸解為地下主者之類耳非云託化遁變之例也君曰陽丹九轉世人皆有此術不復說之此謂房中之事耳陽丹或應作陰丹君曰在人間學生唯當服藥子不斷穀則大洞未可得聞斷穀之法世自有方君曰吾欲說仙之妙論道之變化子必秘之慎識吾言也當謂後二條事君曰昔有郭崇子者殷時人也彭真人之弟子嘗兄弟四人俱行為惡人所擊傷其左臂三弟大怒欲取治之崇子曰無用笑而各去此人後仕宦而崇子譽致之數數非一此人乃往謝之而猶譽不止其人曰我惡人也不可以受君子之施乃自殺後崇子得道太極真人以為有殺人之過不得為真人此蓋為善之過尚招其弊況為惡乎今時事亦多有類此者故以為戒范零子少好仙道如此積年後遇司馬季主季主將入常山中積七年入石室東北角有石片聶此作之反音即是大甕也或可是石牖季主出行則語之曰慎勿開此如此數數非一零子忽發視下見其家父母大小近而不遠乃悲思季主來還乃遣之歸後復取之復使守一銅櫃又使勿發零子復發之如前見其家季主遣之遂不得道此事乃入不可思議之境然每當依此觸類慎之積功滿千雖有過故得仙功滿三百而過不足相補者子仙功滿二百者孫仙子無過又無功德藉先人功德便得仙所謂先人餘慶其無志多過者可得富貴仙不可冀, krp: ''}
