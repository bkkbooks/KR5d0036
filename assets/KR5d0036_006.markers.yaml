  - {type: variant, offset: 745, length: 2, content: 篇在, WYG: 章豁落七元太上𨼆𤣥者莫有羣偶於此術矣復有體神精思寳錬明堂朝適六靈使五藏生華守元關内存九真三氣運液而灌溉丹田亦其次也夫丹誠而禴者亦奚用東隣之太牢哉乃可加以五雲水桂术根黄精南燭陽草東石空青松柏脂實巨勝茯苓並養生之具將可以長年矣吾又俱察草术之勝負有速益於己者並未及术勢之多驗乎且頃以來殺氣蔽天惡煙弭景邪魔横起百疾雜臻或風寒關結或流腫種痾不期而禍湊意外而病生者比目而來集也夫术氣則式遏鬼津吐煙則鎮折邪節強内攝魂益血生腦逐惡致真守精衛命飡其餌則靈柔四敷榮輸輕盈服其丸散則百病瘳除五藏含液所以長逺視乆而更明也古人名之為山精之赤山薑之精太上導仙銘曰子欲長生當服山精子欲輕翔當服山薑此之謂也我非謂諸物皆當減术為益也且术氣之用是今時所要末}
