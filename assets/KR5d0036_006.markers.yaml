  - {type: variant, offset: 1945, length: 506, content: 遂以得道猶是精感道應使之然也非此術之妙也君曰真人隱其道妙而露其醜形或衣敗身悴狀如癡人人欲學道作此試人卒不可識也不識則為試不過汝恆當慎此也昔漢初有四五小兒路上畫地戲一兒歌曰著青裙入天門揖金母拜木公到復是隱言也時人莫知之唯張子房知之乃往拜之此乃東王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖王母君曰昔有傅先生者其少好道入焦山石室中積七年而太極老君詣之與之木鑽使穿一石盤厚五尺許云穿此盤便當得道其人乃晝夜穿之積四十七年鑽盡石穿遂得神丹乃升太清為南嶽真人此有志之士也子其識之若有此試慎勿言不能也君曰昔有黃觀子者亦少好道家奉佛道朝朝朝拜叩頭求乞長生如此積四十九年後遂服食入焦山太極真人百四十事試之皆過遂服金丹而詠大洞真經今補仙官為太極左仙卿有至志者也非佛所能致是其中寸定矣此說與傅含真奉佛事亦同君曰昔毛伯道劉道恭謝稚堅張兆期皆後漢時人也學道在王屋山中積四十餘年共合神丹毛伯道先服之而死道恭服之又死謝稚堅張兆期見之如此不敢服之並捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百歲今猶在山中游行五嶽此人知神丹之得道而不悟試在其中故但陸仙耳無復登天冀也謝稚堅有三處出一云與葛玄相隨一云在鹿跡洞中一, WYG: 似}
