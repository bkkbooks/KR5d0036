  - {type: variant, offset: 1021, length: 2, content: 君曰, WYG: 矣人多書煩不能復一二記示之耳今撰服术數方以悟宻尚若必信用庶無横暴之災既及太平則四炁含融天緯荐生災煙消滅五毒匿形二辰恒察萬物自成於是時任子所運而御亦無復天傾也今所言术欲令有心取服遏此災痾耳又頃者末學互相擾競多用混成及黄書赤界之法此誠有生和合二象匹對之真要也若以道交接觧脱羅推㑹六合行諸節氣却災消患結精寳貽上使腦神不虧下令三田充溢進退得度而禍除經緯相應而常康敵人執轡而不失六軍長驅而全反者乃有其益亦非}
