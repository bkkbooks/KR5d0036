  - {type: variant, offset: 91, length: 0, content: '', CK-KZ: 亦云如此在官無事夷眞内鍊紛錯不穢其聰明爭兢不交於胸心者此道士之在官也秀玄栖摽者雖山河崩潰而不眄志道存眞者雖寒熱飢渴猶不護此一往之至也精散八虛魂遊萬涂或因風以投間或挾魍以結痾將一切撥之而勿耳矣昔之道非今道也靈覺苟殊百隟其如予何章聞之亦足以檢撲矣右九條並楊書夫眞者都無情慾之感男女之想也若丹白存於胸中則眞感不應靈女上尊不降矣縱}
