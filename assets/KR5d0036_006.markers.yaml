  - {type: variant, offset: 33, length: 0, content: '', CK-KZ: 事有此及服日月芒事耳太虛眞人南岳赤君告曰人有眾惡而不自悔頓止其心罪來歸已如川歸海日成深廣耳有惡知非悔過從善罪滅善積亦得道也夫人遇我以禍者當以福往是故福德之氣恒生於此害氣重殃還在於彼此學道之行也又告曰惡人害賢猶仰天而唾唾不洿天還洿己刑凡刑字皆應作形逆風揚塵塵不洿彼還灌其身道不可毁禍必滅己太虛眞人曰飯凡人百不如飯一善人飯善人千不如飯一學道者寒栖山林者益當以爲意赤君亦無復别授事紫元夫人告曰天下有五難貧窮惠施難也豪富學道難也制命不死難也得見洞經難也生值壬辰後聖世難也我昔問太上何緣得識宿命太上答曰道德無形知之無益要當守志行道譬如磨鏡垢去明存卽自見形斷六情守空淨亦見道之眞亦知宿命矣又曰念道行道信道遂得信根其福無量也紫微夫人告曰爲道者譬彼持火入冥室中其冥卽滅而明獨存學道存正愚癡卽滅而正常存也財色之於己也譬彼小兒貪刀刃之蜜其甜不足以美口亦卽有截舌之患玄淸夫人告曰夫人係於妻子寶宅之患甚於牢獄桎梏牢獄桎梏會有原赦而妻子情慾雖有虎口之禍有此一異手寫本無此十九字恐是脫漏已猶甘心投焉其罪無赦情累於人也猶執炬火逆風行也愚者不釋炬火必燒手貪慾恚怒愚癡之毒又闕此十五字於辭有不應爾貪嗔癡所謂三毒處人身中不早以道除斯禍者必有危殆愚癡者火燒手之謂也爲道者猶木在水尋流而行亦不左觸岸亦不右觸岸不爲人所取不爲鬼神所遮又不腐敗吾保其入海矣人爲道不爲穢慾所惑不爲眾邪所誑精進不疑吾保其得道矣南極夫人曰人從愛生憂憂生則有畏無愛卽無憂無憂則無畏昔有一人夜誦經甚悲悲至意感忽有懷歸之哀太上眞人忽作凡人徑往問之子嘗彈琴耶答曰在家}
