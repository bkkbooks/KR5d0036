  - {type: 'tls:seg', offset: 2538, content: '', id: KR5d0036_tls_006-33a.14}
  - {type: variant, offset: 2538, length: 0, content: '', WYG: 常如憶朝食未有不得之者也惜氣常如惜面目未有不全者也然面目亦有毁壊者猶氣亦有喪失要人之所惜常在於面目慮有犯次及四肢耳若使惜氣常為一身之先急吾少見其枯悴矣案此所云氣葢是房中精氣之氣非呼吸之氣人隨俗要求華名譬若燒香衆人皆聞其芳然不知薫以自燔燔盡則氣滅名立則身絶是故髙人哂而逺之遂為清浄生之為物譬日月}
  - {type: page-break, offset: 2538, content: '', id: KR5d0036_WYG_006-12a, image: WYG1059/WYG1059-0369a.png}
  - {type: variant, offset: 2539, length: 2, content: 網疏, WYG: 地此四象正與生生為對失生則四象亦滅非四象之滅生滅之也若使常生則四象常存非四象之常存我能常生故也常生亦能生於無景何四象之足計哉災遘禍生形壊氣亡起何等事耶似由多言}
  - {type: page-break, offset: 2539, content: '', id: KR5d0036_WYG_006-12b, image: WYG1059/WYG1059-0369b.png}
  - {type: variant, offset: 2543, length: 4, content: 失皆並試, WYG: 守一多端而期茍免耳是以𤣥巢頽枝以墜落百勝喪於一敗矣惜乎通仙之才安可為竪子致弊也竪子致弊葢為膏肓之患不除借取晉景公之夢不爾則是别有小兒事也南嶽夫}
