  - {type: variant, offset: 17, length: 3, content: 本題目, CK-KZ: 二記示之耳今撰服朮數方以悟密尙若必信用庶無橫暴之災旣及太平則四炁含融天緯荐生災煙消滅五毒匿形二辰恒察萬物自成於是時任子所運而御亦無復夭傾也今所言朮欲令有心取服遏此災痾耳又頃者末學互相擾競多用混成及黃書赤界之法此誠有生和合二象匹對之眞要也若以道交接解脫網羅推會六合行諸節氣卻灾消患結精寶胎上使腦神不虧下令三田充溢進退得度而禍除經緯相應而常康敵人執轡而不失六軍長驅而全反者乃有其益亦非仙家之盛事也嗚呼危哉此雖相生之術俱度之法然有似騁冰車而涉乎炎州泛火舟以浪於溺津矣自非眞正亦失者萬萬或違戾天文譖害嫉妬靈根鬱塞否泰用隔犯誓愆明得罪三官或搆怨連禍王師傷敗或坑降殺服流血膏野或馬力以竭而求之不已若遂深入北塞而不御者亦必絕命於匈奴之刀劍乎將身死於外而家誅於内也可不愼哉可不愼哉我見諸}
