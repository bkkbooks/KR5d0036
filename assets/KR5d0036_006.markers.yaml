  - {type: variant, offset: 172, length: 5080, content: 乎是以為大歸也見而謂之妙成而謂之道用而謂之性性與道之體體好至道道使之然也此說人體自然與道合所以天命謂性率性謂道修道謂教今以道教使性成真則同於道矣君曰太上者道之子孫審道之本洞道之根是以為上清真人為老君之師此即謂太上高聖玉晨大道君也為太極左真人中央黃老君之師君曰老君者太上之弟子也年七歲而知長生之要是以為太極真人君曰太極有四真人老君處其左佩神虎之符帶流金之鈴執紫毛之節巾金精之巾行則扶華晨蓋乘三素之雲此二條事出九真中經即是論中央黃老君也黃老為太虛真人南嶽赤君之師裴既師赤君所以崇其本始而陳其德位也君曰道有八素真經太上之隱書也在世君曰道有九真中經老君之秘言也在世君曰道有太清上經變化七十四方君曰道有除六天之文三天正法在世君曰道有黃氣陽精藏天隱月君曰道有三元布經道真之圖君曰道有黃素神方四十四訣君曰道有黃書赤界長生之要長史書本杜家剪除此一行君曰道有赤丹金精石景水母君曰道有青要紫書金根眾文君曰道有玉清真訣三九素語君曰道有石精金光藏景錄形在世君曰道有丹景道精隱地八術君曰道有白簡素籙得道之名君曰道有紫度炎光夜照神燭君曰此皆道之經也黃書杜家枿易此字為經方世多有者然亦是祕道之事矣天師取其名而布其化事旨大略猶同但每增廣其法耳此所云黃書赤界三一經洧子所說黃赤內真者非今世中天師所演也君曰仙道有飛步七元天綱之經在世君曰仙道有七變神法七轉之經君曰仙道有大洞真經三十九篇在世君曰仙道有大丹隱書八稟十訣君曰仙道有天關三圖七星移度君曰仙道有九丹變化胎精中記君曰仙道有九赤班符封山墜海君曰仙道有金液神丹太極隱芝君曰仙道有五行秘符呼魂召魄君曰仙道有曲素決辭以招六天之鬼在世君曰仙道有黃水月華服之化而為月君曰仙道有徊水玉精服之化而為日君曰仙道有環剛樹子服之化而為雲君曰仙道有水陽青映服之化而為石君曰仙道有赤樹白子服之化而為玉君曰仙道有絳樹青實服之化為黃金君曰仙道有琅玕華丹服之化為飛龍右此十七條在靈書紫文中並琅玕丹之所變化也君曰仙道有九轉神丹服之化為白鵠右在茅司命傳中君曰仙道有天皇象符以合元炁亦在紫文中君曰仙道有白羽紫蓋以遊五岳君曰仙道有三皇內文以召天地神靈右世中雖有而非真本君曰仙道有玉佩金鐺以登太極君曰仙道有神虎之符以威六天君曰仙道有流金之鈴以攝鬼神君曰仙道有素奏丹符以召六甲君曰仙道有金真玉光以映天下君曰仙道有八景之輿以遊行上清君曰仙道有飛行之羽以超虛躡空君曰仙道有紫繡毛帔丹青飛裙君曰仙道有白羽黑翮以翔八方君曰仙道有翠羽華衣金鈴青帶君曰仙道有曲晨飛蓋御之體自飛在劍經中君曰仙道有三十七種色之節以給仙人君曰仙道之妙皆有方也能盡此道便為九宮真人不但登仙而已然道之多方各備則可知矣此蓋能為盡一條之道便得九宮真人若各各備具則為太極真人矣君曰今子既至心學道當以道授子耳然學者皆有師我之所師南岳松子松子為太虛真人左仙公谷希子為右仙公昔太上以德教老子以得道松子以道授於我以得仙我之得道于松子今子欲學道彼必試子試而不過是我之恥也今既語子以得道之方又悟汝以試觀之法于此試而不過者亦子之愚也夫欲試之人皆意之所不悟情之所不及者而為之子慎之哉君曰仙道十二試皆過而授此經此十二事大試也皆太極真人臨見之可不慎哉君曰昔中山劉偉道學仙在嶓冢山積十二年仙人試之以石重十萬斤一白髮懸之使偉道臥其下偉道顏無變色心安體悅臥在其下積十二年仙人數試之無所不至已皆悟之遂賜其神丹而白日昇天此應是漢時人君曰昔青烏公者身受明師之教審仙妙之理至於入華陰山中學道積四百七十一歲十二試之有三不過後服金汋而升太極太極道君以為試三不過但仙人而已不得為真人況俗意哉青烏公似是彭祖弟子也君曰大洞之道至精至妙是無英守素真人之經其讀之者無不乘雲駕龍昔中央黃老君隱秘此經世不知之也子若知之秘而勿傳又昔周君兄弟三人並少而好道在於常山中積九十七年精思無所不感忽然見老公頭首皓白三人知是大神乃叩頭流血涕淚交連悲喜自搏就之請道公乃出素書七卷以與誦之兄弟三人俱精讀之奄有一白鹿在山邊二弟放書觀之周君讀之不廢二弟還周君多其弟七過其二弟內意或云仙人化作白鹿呼周視之周君不應周君誦之萬過二弟誦得九千七百三十三過周君翻然飛仙二弟取書誦之石室忽有石爆成火燒去書二人遂不得仙今猶在常山中陸行五嶽也子慎之哉君曰昔在莊伯微漢時人也少時好長生道常以日入時正西北向閉目握固想見崑崙積二十一年後服食入中山學道猶存此法當復十許年後閉目乃奄見崑崙存之不止遂見仙人授以金汋之方遂以得道猶是精感道應使之然也非此術之妙也君曰真人隱其道妙而露其醜形或衣敗身悴狀如癡人人欲學道作此試人卒不可識也不識則為試不過汝恆當慎此也昔漢初有四五小兒路上畫地戲一兒歌曰著青裙入天門揖金母拜木公到復是隱言也時人莫知之唯張子房知之乃往拜之此乃東王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖王母君曰昔有傅先生者其少好道入焦山石室中積七年而太極老君詣之與之木鑽使穿一石盤厚五尺許云穿此盤便當得道其人乃晝夜穿之積四十七年鑽盡石穿遂得神丹乃升太清為南嶽真人此有志之士也子其識之若有此試慎勿言不能也君曰昔有黃觀子者亦少好道家奉佛道朝朝朝拜叩頭求乞長生如此積四十九年後遂服食入焦山太極真人百四十事試之皆過遂服金丹而詠大洞真經今補仙官為太極左仙卿有至志者也非佛所能致是其中寸定矣此說與傅含真奉佛事亦同君曰昔毛伯道劉道恭謝稚堅張兆期皆後漢時人也學道在王屋山中積四十餘年共合神丹毛伯道先服之而死道恭服之又死謝稚堅張兆期見之如此不敢服之並捐山而歸去後見伯道道恭在山上二人悲愕遂就請道與之茯苓持行方服之皆數百歲今猶在山中游行五嶽此人知神丹之得道而不悟試在其中故但陸仙耳無復登天冀也謝稚堅有三處出一云與葛玄相隨一云在鹿跡洞中一即是此未詳為是一人當同姓名耳君曰晉初有真人郭聲子在洛市中作卜師時劉石張臧四姓並欲學道常自歎云不遇明師明師出而己不覺皆為試不過皆無所得也常當慎此有異不覺便為試不過也人有學道之心天網疏而不失皆並試人汝深思此意慎之也君曰昔閭成子少好長生好學道四十餘年後入荊山中積七十餘歲為荊山山神所試成子謂是真人拜而求道而為大蛇所噬殆至于死賴悟之速而存太上想七星以卻之因而得免後復為邪鬼所惑失其左目遂不得道而絕山中子當慎此之試恆存於師也猶是成子用志不專頗有邪心故也君曰黃子陽者魏人也少知長生之妙學道在博落山中九十餘年但食桃皮飲石中黃水後逢司馬季主季主以導仙八方與之遂以度世此六國時魏非漢後魏世也君曰有劉奉林者是周時人學道在嵩高山積四百年三合神丹為邪物所敗乃行徙入委羽之山能閉炁三日不息於今千餘年矣猶未升仙猶是試多不過道數未足故也此人但服黃蓮以得不死耳不能有所役使也君曰昔高丘子殷人也亦好道入六景山積五百二十餘歲但讀黃素道經服餌術後合鴻丹以得陸仙遊行五嶽二百餘年後得金液以升太清也今為中嶽真人此說與劍經序亦略同君曰為道當令三關恆調是根精固骨之道也三關者口為心關足為地關手為人關謂之三關三關調則五藏安五藏安則舉身無病昔趙叔期學道在王屋山中時時出民間聞有能卜者在市閭中叔期往見之因語叔期曰欲入天門調三關存朱衣正昆崙叔期知是神人因拜叩頭就請要訣因以一卷書與之是胎精中記拜受此書入山誦之後合神丹而升天此皆前事之徵者汝當識此言三關事與黃庭同並有說而無法君曰當存五神于體五神者謂兩手兩足頭是也頭想恆青兩手恆赤兩足恆白者則去仙近矣昔徐季道學道在鵠鳴山中亦時時出民間忽見一人著皮褲練褶拄桃枝杖逢季道季道不覺之數數非一季道乃悟而拜謝之因語季道曰欲學道者當巾天青詠大歷𧾷冉雙白徊二赤此五神之事也其語隱也大歷三皇文是也此即太素五神事也別有經法君曰欲使心正常以日出三丈錯手著兩肩上以日當心心中間暖則心正矣常能行之佳昔有姜伯真者學在猛山中行道採藥奄值仙人仙人使平倚日中其影偏仙人曰子知仙道之貴而篤志學之而不知心不正之為失因教之如此後遂得道定錄目許先生云姜伯真之徒不知即此姜不君曰常以夜半時去枕平臥握固放體氣調而微者身神具矣如有不具便速起燒香平坐閉目握固兩膝上心存體神使兩目中有白炁如雞子大在目前則復故也五日一行之此即二十四神中事也君曰食草木之藥不知房中之法及行炁導引服藥無益也終不得道若至志感靈所存必至者亦不須草藥之益也若但知行房中導引行炁不知神丹之法亦不得仙也若得金汋神丹不須其他術也立便仙矣若得大洞真經者復不須金丹之道也讀之萬過畢便仙也房中之術導引行氣世自有經不復一二說之此謂徒服藥存修而交接之事不絕亦不得長生非言都不為者若都不為止服藥皆能得仙經曰得道者皆隱谷蟲之法而見三尸之術夫穀蟲死則三尸枯三尸枯自然落矣殺穀蟲自有別方得者秘之此即蘇傳中初神丸方也其餘雜法皆不及此也君曰人生有骨錄必有篤志道使之然若如青光先生谷希子南岳松子長里先生墨羽之徒皆為太極真人所友或為太上天帝所念者興雲駕龍以迎之故不學道而仙自來也過此以下皆須篤志也案此諸人學道皆有事跡並經辛勤而云不學自得其義未了墨羽應是墨翟亦或是木羽也君曰然則學道者有九患皆人之大病若審患病則仙不遠也患人有志無時有時無友有友無志有志不遇其師遇師不覺覺師不勤勤不守道或志不固固不能久皆人之九患也人少而好道守固一心水火不能懼其心榮華不能惑其志修真抱素久則遇師不患無也如此則不須友而成亦不須感而動也此學仙之廣要言也汝當思此君曰夫喜怒損志哀戚損性榮華惑德陰陽竭精皆學道之大忌仙法之所疾也雖還精胎息僅而補之內虛已徹猶非本真莫若知而不為為而不散此仙之要道生之本業也君曰欲得延年當洗面精心日出二丈正面向之口吐死炁鼻噏日精須鼻得嚏便止是為炁通亦以補精復胎長生之方也君曰食慎勿使多多則生病飽慎便臥臥則心蕩心蕩多失性食多生病生病則藥不行欲學道者慎此未服食時也君曰式規之法使人目明久而徹視常以甲子之旬取東流清水合真丹以洗目日向清明平旦二七過常行之佳此事一出二十四神中彼謂之拂童而用庚午日中時也君曰欲為道者目想日月耳響師聲口恆吐死氣取生炁體象五星行恆如跚空