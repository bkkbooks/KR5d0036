  - {type: variant, offset: 34, length: 0, content: '', CK-KZ: 嘗彈之眞人曰絃緩何如答曰不鳴不悲又問絃急何如答曰聲絕而傷悲又問緩急得中如何答曰眾音和合八音妙奏矣眞人曰學道亦然執心調適亦如彈琴道可得矣愛慾之大者莫大於色其罪無外其事無赦賴其有一若復有二普天之民莫能爲道者也夫學道者行陰德莫大於施惠解救志莫大於守身奉道其福甚大其生甚固矣有人惡我者我不納惡惡自歸已將禍而歸身中猶景謂應作影字響之隨形聲矣右眾靈教戒所言按此三男眞二女眞並高眞之尊貴者降集甚希恐此是諸降者敘}
