  - {type: variant, offset: 6948, length: 0, content: '', HFL: 一於洞山神峯不獨句曲一山而已此所謂玄帝也此後并中君答前所諮問四條事復以闕上紙也說顓頊與五符語正同五符唯無理鼎一事耳鮑靚靚及妹并是其七世祖李湛張慮本杜陵北郷人也在渭橋爲客舍積行隂德好道希生故令福逮於靚等使易世變練改氏更生合爲兄弟耳根冑雖異德蔭者同故當同生氏族也今並}
  - {type: variant, offset: 6948, length: 0, content: '', WYG: 一於洞山神峯不獨句曲一山而已此所謂𤣥帝也此後並中君答前所諮問四條事復以闕上紙也説顓頊與五符語正同五符唯無埋鼎一事耳鮑靚靚及妺並是其七世祖李湛張慮本杜陵北鄉人也在渭橋為客舍積行陰德好道希生故今福逮於靚等使易世變練改氏更生合為兄弟耳根冑雖異德蔭者同故當同生氏族也今並}
