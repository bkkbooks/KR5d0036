  - {type: variant, offset: 235, length: 1984, content: 山是也此蓋呼秣陵之金陵非地篸之金陵矣小澤即謂今赤山湖也從江水直對望山東西左右正自如此也此山洞虛內觀內有靈府洞庭四開穴岫長連古人謂為金壇之虛臺天后之便闕清虛之東窗林屋之隔遝眾洞相通陰路所適七途九源四方交達真洞仙館也此論洞天中諸所通達天後者林屋洞中之真君位在太湖苞山下龍威丈人所入得靈寶五符處也清虛是王屋洞天名言華陽與此並相貫通也山形似已故以句曲為名焉今登中茅玄嶺前後望諸峰壟盤紆曲轉以大茅為首東行北轉又折西行北轉又折東北行至大橫反覆南北狀如左書已字之形金陵者兵水不能加災癘所不犯河圖中要元篇第四十四卷云句金之壇其間有陵兵病不往洪波不登正此之福地也爾心悟焉是汝之幸復識此悟從誰所感發耶此河圖者舜禹所受及洛書之屬今猶有四十餘卷存此語亦是示長史言相感悟乃從楊君宣說吾之所啟發矣句曲山其間有金陵之地地方三十七八頃是金陵之地胏也土良而井水甜美居其地必得度世見太平河圖內元經曰乃地胏土良水清句曲之山金壇之陵可以度世上升曲城又河書中篇曰句金之山其間有陵兵病不往洪波不登此之謂也後所稱河圖即是前要元篇語雖山壇字異其理猶同此蓋指論金陵地篸一片地能如此耳其餘處未必有所免辟耳金陵古名之為伏龍之地河圖逆察故書記運會之時方來之定名耳至於金陵之號已二百餘年矣尋金陵之號起自楚時至秦皇過江厭氣乃改為秣陵漢來縣舊治小丹陽今猶呼為故治也晉太康三年割淮水之南屬之義熙九年移治闕場元熙元年徙還今處此是江東之金陵耳傳所言二百餘年者是吳孫權使人採金屯居伏龍山因名金陵自然響會所以歎河圖之逆兆也句曲山秦時名為句金之壇以洞天內有金壇百丈因以致名也外又有積金山亦因積金為壇號矣周時名其源澤為曲水之穴按山形曲折後人合為句曲之山漢有三茅君來治其上時父老又轉名茅君之山三君往曾各乘一白鵠各集山之三處時人互有見者是以發於歌謠乃復因鵠集之處分句曲之山為大茅君中茅君小茅君三山焉總而言之盡是句曲之一山耳無異名也三茅山隱褷相屬皆句曲山一名耳時人因事而諭今故有枝條數十作別名舊不爾也今以在南最高者為大茅山中央有三峰連岑鼎立以近後最高者為中茅山近北一岑孤峰上有聚石者為小茅山大茅中茅間名長阿東出通延陵句曲阿西出通句容湖就以為連石積金山馬嶺相帶狀如埭形其中茅小茅間名小阿東西出亦如此有一小馬嶺相連自小茅山後去便有雷平燕口方嵎大橫良常諸山靡璟相屬垂至破罡瀆自大茅南複有韭山竹吳山方山從此疊障達於吳興諸山至于羅浮窮於南海也山生黃金漢靈帝時詔敕郡縣採句曲之金以充武庫逮孫權時又遣宿衛人採金常輸官兵帥百家遂屯居伏龍之地因改為金陵之墟名也河圖已得之於昔可謂絕妙今大茅山南猶有數深坑大坎相傳呼之為金井當是孫權時所鑿掘也今此山近東諸處碎石往往皆有金砂云兵帥仍屯居伏龍今則無復有唯小近西有述墟昔乃名術冫虛今是良民述墟前十數里大茅有吳墟村以號而言乃欲相似而復不關金陵長史宅西北近長隱小岡下乃時有故破瓦器焦赤土甚多疑是人居處既經耕墾基域不複存而了無井亦恐如長史井堙沒耳又小茅大橫不見採金處大茅金井若是復不應頓如此遠居二三疑昧金陵之土似北邙及北谷關土堅實而宜禾穀掘其間作井正似長安鳳門外井水味是清源幽瀾洞泉遠沽耳水色白都不學道居其土飲其水亦令人壽考也是金津潤液之所溉耶子其秘之吾有傳紀具載其事行當相示定錄君受作密令示許侯北邙山在洛陽北數里北谷關即孟津關也土色黃黑而肥腴鳳門即長安北門也今所擬金陵地並無土種植及住止鑿井者乃是無知察亦為真靈愛護不使輕得居焉吾有傳紀者即是三茅傳也按長史甲子年書云未見傳記則蒨此書時或在癸亥年中也傳中亦稱良土甘美居之度世故因此而顯言也地處少少耳隱略十餘頃許高而平者六七頃也既知其要睹其形勢便朗朗也故不曲示耳保命君告按傳中云金陵之地方三十七八頃恐是其大垠所至至於實錄正當十餘頃耳高平者是可住處也會登其地依說觀望自可領略粗知其處若為仙真度世及種民者無患不自然得至苟其非分徒攜手築室必當諸方不立趣使移去耳悠悠凡猥勿承此強欲居之金陵之左右汧谷溪源陵之左有山也右有源汧名柳谷陵之西有源汧名陽谷名山內經福地志曰伏龍之地在柳谷之西金壇之右可以高棲正金陵之福地也按今呼為柳谷汧者其源出小茅後田公泉而西南流至述墟首入大汧陽谷汧者今無復其名而長隱山岡後有小汧西流南折亦會述墟首又父老云陽谷汧源乃出中茅前大茅後數川注合為一汧出山直西行北轉亦會大汧論兩汧相交之內即是此地大略東西不得極正故兼以左右為言但今之所云二穀不知即是昔號不雖有耆相承傳譯漸失兼汧源回異不必可指的為據也上古名此山為崗山孔子福地記云崗山之間有伏龍之鄉可以避水辟病長生本所以名為崗者亦金壇之質也是以百代百易非復本名良可歎也按今小茅東北一長大山名大橫山云本名鬱崗山山即在今所謂伏龍之東世又呼伏龍地為死蛇崗亦粗有仿佛又見其長而高益呼為長隱隱音于覲切其言可隱障也此崗山雖多細石亦可居耳近東南取長史宅至雷平間甚有可住處義興蔣員芻等今並立田舍於崗下近去長史宅四五里越桐柏之金庭吳句曲之金陵養真之福境成, HFL: ''}
