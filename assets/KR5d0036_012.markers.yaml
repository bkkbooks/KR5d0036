  - {type: variant, offset: 6961, length: 0, content: '', HFL: 從赤須先生受鍊魂法又遇桐柏眞人授之以黄水雲漿法得道今在洞中馥少時被公府辟召懸辟書著桑樹乃去其用懷高邁如此後漢及高士傳並云陳留圉人少爲書生桓帝時舉直言不就性質直不同時黨爲閹人所疾陷於黨錮之限避難乃翦鬚髮變形逃林慮山中爲人治作後還家杜門不出不與人相見黨禁未解而亡赤須子出列僊傳桐柏即右弼王餘數人不能一二道之例皆取平貞正直體隱神清即侍郎之才不限男女也前云有七人今唯說二女一男右保命君所道此當是接中候告後乃言之童初府上帥用劉文饒文饒者弘農劉寬也少好道曾舉漢方正稍遷南陽太守視民如子怒不形顔口無疾言行隂德拯寒困萬民悦而附之如父母焉後爲司徒太尉上賜酒伏地睡詔問故乃答曰臣任重責大恒憂心如醉旦使奴至巿買菜奴盜用錢飲酒晏乃還卧於閣内又不得菜既醒乃罵之爲死狗罵畢即束帶來人恐奴從後自殺所以慮之不覺忽然睡耳願見哀恕寬用心仁愛觸類如此矣年七十三一旦遇青谷先生降之於寢室授其杖解法將去入太華山行九息服氣及授以鑪火丹方修之道成今在洞中作童初府帥上侯主始學道者後漢書云劉寬字文饒弘農華隂人父名崎順帝時爲司徒寬爲人謹厚常行有人失牛乃就寬車中認之寬無言解駕牛與之步歸頃有誌者得牛而送還慚懼寬乃謝遣之桓帝延熹八年爲南陽太守恒用蒲鞭靈帝嘉平五年爲太尉嘗於御坐被酒睡伏帝問太尉醉邪寬仰答臣不敢醉但任重責大憂心如醉耳嘗有客來詣寬寬遣奴市酒迂久大醉而還客罵爲畜産寬須臾遣人視奴疑恐自殺語左右曰此是人而罵爲畜産爲辱孰甚故吾懼其死耳後封逮郷侯六百户中平二年亡年六十六贈車騎將軍時進謚曰昭討侯子松嗣按此說復爲同異故詳載之青谷先生無别顯出凡此諸引教仙人恐皆是}
