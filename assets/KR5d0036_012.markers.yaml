  - {type: variant, offset: 2220, length: 371, content: 之靈墟也五倍堯水東海傾人盡病死武安兵其如予何由我帶近洞臺之幽門恃此而仿佯耳右弼王王真人蒨令密示許侯此即桐柏帝晨所說言吳越之境唯此兩金最為福地者也武安者秦將白起擊趙于長平一日坑殺四十萬人古來兵傷莫復酷此故別引之為喻斯蓋所謂兵病不往洪波不登矣既帶近洞天神真限衛故能令三災不干右前來至此五條楊書大天之內有地中之洞天三十六所其第八是句曲山之洞周回一百五十里名曰金壇華陽之天傳中所載至第十天並及酆都五岳八海神仙遠方夷狄之洞既非此限並不獲疏出洞墟四郭上下皆石也上平處在土下正當十三四里而出上地耳此當是至太山頂為言也東西四十五里南北三十五里正方平其內虛空之處一百七十丈下處一百丈下芃猶有原阜壟偃上蓋正平也向雲高處一百七十丈下處一百丈則是中央高四邊漸下今云上蓋正平是言其質平無凹凸處耳非直去如板也亦可是登隴阜之上則於天為下耳其內有陰暉夜光日精之根照此空內明並, HFL: ''}
