  - {type: variant, offset: 43, length: 2, content: 乙丑, CK-KZ: 瓊刃前則此別當有義况也右一條楊書定錄官寮有左右理中監準今長史司馬職又有北河司命主水官考此職常領九宮禁保侯禁保侯職主領應爲種民者今洞宮自二君以下便次此三職爲大矣左理中監準大府長史昔用韓崇以居之崇字長季吳郡毗陵人也少好道林屋仙人王瑋玄會授之以流珠丹一法崇奉而修之大有驗瑋玄語之子行此道亦可以出身仕宦無妨仙舉也崇遂仕稍至宛陵令行仁以爲政用道以撫民虎狼深避蝗不集界遷汝南太守拔書佐袁安安後位至司徒時人通以崇有識物之鑒也陰皇后葬京師近郡二千石妻當會園陵而崇獨居淸素妻忿崇哭泣詔問其故太常馮奚答曰汝南太守韓崇淸苦遠尙味道忘形身享重官而妻自紡績政化仁簡視民如傷深達奇博有君子之鑒斯則昏夕之夜光陛下之子產也妻不通寒儉之節哭怨無衣將足以顯崇明德耳上奇之加崇俸祿秩中二千石後孝明皇帝巡狩汝南上治崇府崇使妻出住孤獨老嫗家上聞歎曰韓崇所謂百鍊不銷也賜縑五十匹崇在郡積十四}
