  - {type: variant, offset: 25, length: 0, content: '', CK-KZ: 矣此書時先生誡事未授所以論及子阿功蔭也鮑亦通神而敦尙房中之事故云撓滯後用陰君太玄陰生符爲太淸尸解之法當是主者之最高品矣緣運事乃如此相關今人之善惡豈曰徒然問葛玄玄善於變幻而拙於用身今正得不死而已非僊人也初在長山近入蓋竹亦能乘虎使鬼無所不至但幾於未得受職耳亦恒與謝稚堅黃子陽郭聲子相隨葛玄字孝先是抱朴從祖卽鄭思遠之師也少入山得仙時人咸莫測所在傳言東海中仙人寄書呼爲仙公故抱朴亦同然之長史所以有問今答如此便是地仙耳靈寶所云太極左仙公於斯妄乎左慈今在小括山常行來數在此下尋更受職也慈顏色甚少正得鑪火九華之益左慈字元放李仲甫弟子卽葛玄之師也魏武父子招集諸方士慈亦同在中建安末渡江尋山仍得入洞又乞丹砂合九華丹九華丹是太淸中經法小括卽小括蒼山在永嘉橋谿之北凡此諸人術解甚多而仙弟猶下者並是不聞三品高業故也許先生所以興歎句曲有五門有心立志淸齋三月登尋此門皆可卽得得可入但人自不能齋尋之耳來問欲知宮室所作闊狹多少男女主領人數當更相示來疏亦復泰盡邪勤自當見亦何事爾亦何事爾又當先承啓司命司命令答道宮室之委曲者吾乃敢言之耳此自是司命之別宮吾人亦不得爲洞臺之正主也按後所論諸官僚人物當是已爲啓司命乃具得受說之耳右定錄後書答長史所問訖此後玄帝來凡五條並楊書東卿司命監太山之眾眞總括吳越之}
  - {type: page-break, offset: 25, content: '', id: KR5d0036_CK-KZ_03p057a, image: JY237/CK-KZ_JY237_03p057a.png}
