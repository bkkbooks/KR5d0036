  - {type: variant, offset: 774, length: 441, content: 舊治小丹陽今猶呼為故治也晉太康三年割淮水之南屬之義熙九年移治闕場元熙元年徙還今處此是江東之金陵耳傳所言二百餘年者是吳孫權使人採金屯居伏龍山因名金陵自然響會所以歎河圖之逆兆也句曲山秦時名為句金之壇以洞天內有金壇百丈因以致名也外又有積金山亦因積金為壇號矣周時名其源澤為曲水之穴按山形曲折後人合為句曲之山漢有三茅君來治其上時父老又轉名茅君之山三君往曾各乘一白鵠各集山之三處時人互有見者是以發於歌謠乃復因鵠集之處分句曲之山為大茅君中茅君小茅君三山焉總而言之盡是句曲之一山耳無異名也三茅山隱褷相屬皆句曲山一名耳時人因事而諭今故有枝條數十作別名舊不爾也今以在南最高者為大茅山中央有三峰連岑鼎立以近後最高者為中茅山近北一岑孤峰上有聚石者為小茅山大茅中茅間名長阿東出通延陵句曲阿西出通句容湖就以為連石積金山馬嶺相帶狀如埭形其中茅小茅間名小阿東西出亦如此有一小馬嶺相連自小茅山後去便有雷平燕口方嵎大橫良常諸山靡璟相屬垂至破罡瀆自大茅南複有韭山竹吳山方山從此疊障達於吳興諸山至于羅浮窮於南海也山生黃金漢, CK-KZ: 令}
