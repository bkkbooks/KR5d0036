  - {type: variant, offset: 636, length: 3, content: 升曲城, CK-KZ: 有韓冢崔巍高大從來相呼爲韓冢疑如桃君或卽是此虛壙而世呼爲孫策將韓當冢也云王瑋玄是楚莊王時侍郎受術於玉君若是春秋時楚莊王者疑侍郎之官不似古職而漢楚王}
