  - {type: variant, offset: 2932, length: 220, content: 也人卒行出入者都不覺是洞天之中故自謂是外之道路也日月之光既自不異草木水澤又與外無別飛鳥交橫風雲蓊鬱亦不知所以疑之矣所謂洞天神宮靈妙無方不可得而議不可得而罔也世人採藥往往誤入諸洞中皆如此不便疑異之而未聞得入華陽中如左元放之徒是所不論然得入者雖出亦恐不肯復說之耳句曲洞天東通林屋北通岱宗西通峨嵋南通羅浮皆大道也其間有小徑雜路阡陌抄會非一處也漢建安之中左元放聞傳者云江東有此神山故度江尋之遂齋戒三月乃登山乃得其門入洞虛造陰宮三君亦授以神芝三種元放, HFL: ''}
