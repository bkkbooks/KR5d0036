  - {type: variant, offset: 1614, length: 676, content: 居焉吾有傳紀者即是三茅傳也按長史甲子年書云未見傳記則蒨此書時或在癸亥年中也傳中亦稱良土甘美居之度世故因此而顯言也地處少少耳隱略十餘頃許高而平者六七頃也既知其要睹其形勢便朗朗也故不曲示耳保命君告按傳中云金陵之地方三十七八頃恐是其大垠所至至於實錄正當十餘頃耳高平者是可住處也會登其地依說觀望自可領略粗知其處若為仙真度世及種民者無患不自然得至苟其非分徒攜手築室必當諸方不立趣使移去耳悠悠凡猥勿承此強欲居之金陵之左右汧谷溪源陵之左有山也右有源汧名柳谷陵之西有源汧名陽谷名山內經福地志曰伏龍之地在柳谷之西金壇之右可以高棲正金陵之福地也按今呼為柳谷汧者其源出小茅後田公泉而西南流至述墟首入大汧陽谷汧者今無復其名而長隱山岡後有小汧西流南折亦會述墟首又父老云陽谷汧源乃出中茅前大茅後數川注合為一汧出山直西行北轉亦會大汧論兩汧相交之內即是此地大略東西不得極正故兼以左右為言但今之所云二穀不知即是昔號不雖有耆相承傳譯漸失兼汧源回異不必可指的為據也上古名此山為崗山孔子福地記云崗山之間有伏龍之鄉可以避水辟病長生本所以名為崗者亦金壇之質也是以百代百易非復本名良可歎也按今小茅東北一長大山名大橫山云本名鬱崗山山即在今所謂伏龍之東世又呼伏龍地為死蛇崗亦粗有仿佛又見其長而高益呼為長隱隱音于覲切其言可隱障也此崗山雖多細石亦可居耳近東南取長史宅至雷平間甚有可住處義興蔣員芻等今並立田舍於崗下近去長史宅四五里越桐柏之金庭吳句曲之金陵養真之福境成神之靈墟也五倍堯水東海傾人盡病死武安兵其如予何由我帶近洞臺之幽門恃此而仿佯耳右弼王王真人蒨令密示許侯此即桐柏帝晨所說言吳越之境唯此兩金最為福地, CK-KZ: 道}
