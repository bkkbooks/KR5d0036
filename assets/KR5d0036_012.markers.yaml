  - {type: variant, offset: 0, length: 3, content: 卷十一, CK-KZ: ''}
  - {type: variant, offset: 0, length: 2, content: 卷十, CK-KZ-jye: 昔累得書見意深照旨趣先書以年行西呉衰頽待老中夜慨歎莫與酬諮夫誠感有在亦得之無晚也次書告有年之志疇昔之好恒願眞人稟受要訣仰接容景親奉徽音夫勤未上徹精未廣釐眞要之騁未可豫及也後漢書云吾發自玄授金闕素名跨邁世迹超登淸虛何玄標之渺邈奇洞之淵遠哉欲克己洗心沐浴芳流若能斯者今其時矣末書云厠聞要旨當修五靈自謂西造閬圃東遊玄洲不爲邈絶求矜而誘之引而致之是爲言貫于心良可啓矣恭佼音效五靈亦復至耳然道浮外迹未關內眞是以雲車靈轅相適猶遐昔曾軫華僑依此而言則知華僑先亦䝉眞降矣蓋應會敖世事有出嘿涂不必靜苟有分無志申公所病遇至不爲覆水始惋是以古唁有云逢時不邁山客抃粲者矣夫學道者固不宜恃其質分必當保任於淸全矣於焉騁逸松期回輪紫淸靈觀四響玄音合唱玉振雲奏不謀而和可謂祕道藏珍眞暉之上挺也子建志有年今因以反子昔旨耳此}
