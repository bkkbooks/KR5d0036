  - {type: variant, offset: 7843, length: 2, content: 無本, CK-KZ: 協辰夫人主教領之也夫人漢司空黃瓊女黃景華也韓終授其岷山丹服得仙黃瓊江夏人字世英漢順帝時司空司徒太尉年七十九亡父名香章和帝時爲尙書令救活千餘人瓊子琬司徒太尉爲李權所殺夫人亦不知}
