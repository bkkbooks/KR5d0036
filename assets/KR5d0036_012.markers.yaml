  - {type: variant, offset: 1221, length: 154, content: 縣採句曲之金以充武庫逮孫權時又遣宿衛人採金常輸官兵帥百家遂屯居伏龍之地因改為金陵之墟名也河圖已得之於昔可謂絕妙今大茅山南猶有數深坑大坎相傳呼之為金井當是孫權時所鑿掘也今此山近東諸處碎石往往皆有金砂云兵帥仍屯居伏龍今則無復有唯小近西有述墟昔乃名術冫虛今是良民述墟前十數里大茅有吳墟村以號而言乃欲相似而復不關金陵, CK-KZ: 舉方士遷洛陽市}
