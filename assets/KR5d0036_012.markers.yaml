  - {type: variant, offset: 3462, length: 358, content: 尋檢其處亦可見石蓋亦殊自不小也茅山北垂洞口一山名良常山本亦句曲相連都一名耳始皇三十七年十月癸丑始皇出游十一月行至雲夢祠虞舜于九疑浮江下觀藉柯度梅渚過丹陽至錢塘臨浙江水波惡乃至西百二十里從峽中度上會稽祭夏禹望于南海而立石刻頌秦德于會稽山李斯請書而還過諸山川遂登句曲北垂山埋白璧一雙於是會群官饗從駕始皇歎曰巡狩之樂莫過於山海自今已往良為常也爾乃群臣並稱壽喚曰良為常矣又鳴大鼓擊大鍾萬聲齊唱洞駭山澤贊樂吉兆大小咸善乃改句曲北垂曰良常之山也良常之意從此而名檢外書始皇三十七年正月出游雲夢丹陽浙江上會稽祭夏禹望南海刻石紀功還過吳渡江來並北海至琅颻至平原得病七月丙寅崩于沙丘九月葬驪山如此之時皆未有瀆即是從延陵步道上取句容江來路仍過停饗設耳非必故詣句曲所以止住山北邊下處遂不進前嶺且於時亦未驗此山之靈奇祀璧之意者為通是望山設所以, CK-KZ: ''}
