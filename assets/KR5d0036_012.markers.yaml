  - {type: variant, offset: 18, length: 0, content: '', CK-KZ: 一山而已此所謂玄帝也此後並中君答前所諮問四條事復以闕上紙也說顓頊與五符語正同五符唯無埋鼎一事耳鮑靚靚及妹並是其七世祖李湛張慮本杜陵北鄕人也在渭橋爲客舍積行陰德好道希生故令福逮於靚等使易世變練改氏更生合爲兄弟耳根冑雖異德蔭者同故當同生氏族也今並作地下主者在洞宮中靚所受學本自薄淺質又撓滯故不得多也欲知}
