  - {type: variant, offset: 6962, length: 0, content: '', HFL: 教限不爾則不應得輒然華陽中事當更示爾正月二十三日東宫上人來看洞中時或有龜山賔共集高會眞仙之日寧可暫登伏龍之郷以禮拜於靈岫邪可示許侯令知之此亦應是中君仍前十二月一日言也東宫上人即青童君龜山賔即西王母上卷}
