  - {type: variant, offset: 2618, length: 313, content: 日月皆各有此名亦小小不同蓋猶是大天日月分精照之既雲晝夜便有出沒亦當與今日月同其明晦今大天崖畔了不得窮此小天邊際殆可捫睹日月出入則應有限當是忽然起滅不由孔穴但未知其形若大小耳句曲之洞宮有五門南兩便門東西便門北大便門凡合五便門也今山南大洞即是南面之西便門東門似在柏枝隴中北良常洞即是北大便門而東西並不顯中君告云東便門在中茅東小茅阿口從此入至洞天最近而外口甚小又以石塞之事具在後則西便門亦當如此正應在今所呼作石墳處也柏枝乃有兩三洞口恐真門外亦不開此三門精齋尋之自可見爾今南便門外雖大開而內已被塞當緣穢績多故也北大洞猶有鬼神去來而真仙人出入都不由五門皆紵爾無間設此門者為示是山洞體制或外人應入故耳虛空之內皆有石階曲出以承門口令得往來上, HFL: ''}
