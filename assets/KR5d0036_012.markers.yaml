  - {type: 'tls:seg', offset: 6950, content: '', id: KR5d0036_tls_012-23a.25}
  - {type: variant, offset: 6950, length: 0, content: '', HFL: 其事如此亦如子七世祖父許肇字子阿者有賑死之仁拯飢之德故今雲蔭流後隂功垂澤是以今得有好尚仙眞之心者亦有由而然也物皆有因會非徒爾而得之者矣此書時先生誡事未授所以論及子阿功蔭也鮑亦通神而敦尚房中之事故云撓滯後用隂君太玄隂生符爲太清尸解之法當是主者之最高品矣縁運事乃如此相關今人之善惡豈曰徒然問葛玄玄善於變幻而拙於用身今正得不死而已非僊人也初在長山近入蓋竹亦能乘虎使鬼無所不至但幾於未得受職耳亦恒與謝稚堅黄子陽郭聲子相隨葛玄字孝先是抱朴從祖即鄭思遠之師也少入山得仙時人咸莫測所在傳言東海中仙人寄書呼爲仙公故抱朴亦同然之長史所以有問今答如此便是地仙耳靈寳所云太極左仙公於斯妄乎左慈今在小括山常行來數在此下尋更受職也慈顔色甚少正得鑪火九華之益左慈字元放李仲甫弟子即葛玄之師也魏武父子招集}
  - {type: page-break, offset: 6950, content: '', id: KR5d0036_HFL_012-003b, image: hfl/0639/0639-049.png}
  - {type: variant, offset: 6950, length: 0, content: '', WYG: 其事如此亦如子七世祖父許肇字子阿者有賑死之仁拯饑之德故令雲蔭流後陰功垂澤是以今得有好尚仙眞之心者亦有由而然也物皆有因會非徒爾而得之者矣此書時先生誡事未授所以論及子阿功蔭也鮑亦通神而敦尚房中之事故云撓滯後用陰君太𤣥陰生符為太清尸解之法當是主者之最高品矣緣運事乃如此相關今人之善惡豈曰徒然問葛𤣥𤣥善於變幻而拙於用身今正得不死而已非僊人也初在長山近入蓋竹亦能乘虎使鬼無所不至但幾於未得受職耳亦恒與謝稚堅黄子陽郭聲子相隨葛𤣥字孝先是抱朴從祖即鄭思逺之師也少入山得仙時人咸莫測所在傳言東海中仙人寄書呼為仙公故抱朴亦同然之長史所以有問今答如此便是地仙耳靈寶所云太極左仙公於斯妄乎左慈今在小括山常行來數在此下尋更受職也慈顔色甚少正得鑪火九華之益左慈字元放李仲甫弟子即葛𤣥之師也魏武父子招集}
  - {type: page-break, offset: 6950, content: '', id: KR5d0036_WYG_012-3b, image: WYG1059/WYG1059-0427b.png}
