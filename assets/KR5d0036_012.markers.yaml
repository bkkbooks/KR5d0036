  - {type: variant, offset: 3830, length: 2504, content: 玉璧也夫號從主人名由地表小君以漢成帝時蒨紫書云治於良常北洞蓋內因此成稱也又檢始皇崩不發喪令車載鮑魚以亂此應夏月中如外書所說相似今依傳言乃是三十六年十月建亥之月為秦正月為出游是至雲夢耳不爾則是三十八年秋崩也未作秦歷不能得定癸丑是何月中比別更詳正之王莽地皇三年七月戊申此七月二十四日也遣使者章邕齎黃金百鎰銅鍾五枚贈之於句曲三仙君王莽制金為貨名鎰形如錢無孔重一兩直錢一千百鎰則百兩也光武建武七年三月丁巳此三月二十四日也遣使者吳倫齎金五十斤獻之于三君今並埋在小茅山上獨高處坎上有聚石入地三四尺也此則今小茅山積石上最高處是也此二事不顯真蒨中漢明帝永平二年詔敕郡縣修守丹陽句曲真人之廟按三君初得道乘白鵠在山頭時諸村邑人互見兼祈禱靈驗因共立廟於山東號曰白鵠廟每饗祀之時或聞言語或見白鵠在帳中或聞伎樂聲於是競各供侍此廟今猶在山東平阿村中有女子姓尹為祝逮山西諸村各各造廟大茅西為吳墟廟中茅後山上為述墟廟並歲事鼓舞同乎血祀蓋已為西明所司非複真仙僚屬矣中茅山玄嶺獨高處司命君埋西胡玉門丹砂六千斤於此山深二丈許坎上四面有小盤石鎮其上其山左右當泉水下流水皆小赤色飲之益人此山下左右亦有小平處可堪靜舍左元放時就司命乞丹砂得十二斤耳今此嶺前後甚多大石而山上左右無正流水東南近下有一長澗西南近下亦有小水度嶺南隱居住處近山上有湧泉冬夏無窮而水色不甚覺赤耳平處可住東西唯當近澗左右為好左氏乞丹砂當是入洞時所請以合爐火九華丹右楊書大茅山中茅山相連長阿中有連石古時名為積金山此山中甚多金物其處宜人住可索有水處為屋室靜舍乃佳此數處亦任意耳快可合丹以修上道中茅之前大茅之後下麓長澗東西亦出山外對館此即隱居今所住東面一橫壟也此壟純絕石石形甚瑰奇多穿穴側傍盤紆下深乃有無底處屢投脆物在中間玲玲之響久之此云多金物亦當是久來真仙所投也西南有大石壁聳而坼開內有洞入數丈漸峽小不復容人乃飆飆有風外數步便有一湧泉冬夏清流即下解所資近外澗口又有一湧泉水勢乃駛上者冬溫而夏冷今正對邏前小近下復有一穴湧泉特奇大水大旱未嘗增減色小白而甘美柔弱灌注無窮但恨在山西自不得東流耳亦別開決作東流用之又渡此嶺東南有一石穴水東流極好其處隱障甚可合丹即後所云菌山之前也正患去徑路近車聲人響殆欲相聞今若斷此路不復聽車聲人行便是第一處方當思為其宜茅山住止惟有隱居今所住及南洞口長史宅處乃極好所恨迥曠且此一山通無虺蝮毒螫時有青蛇都不犯物虎亦甚少自古來未聞害人山居不問道俗皆少溫病山德寬容不到險阻但恨無青林冬夏常鬱如東間諸山耳自隱居住來乾養成秀于形望大好山出好術並雜藥絕宜松柏而本無人植不容自生今亦分布歲種之耳茅山天市壇四面皆有寶金白玉各八九千斤去壇左右二丈許入地九尺耳昔東海青童君曾乘獨飆飛輪之車通按行有洞天之山曾來於此山上矣其山左右有泉水皆金玉之津氣可索其有小安處為靜舍乃佳若飲此水甚便益人精可合丹天市之壇石正當洞天之中央玄窗之上也此石是安息國天市山石也所以名之為天市盤石也玄帝時召四海神使運此盤石於洞天之上耳非但句曲而已仙人市壇之下洞宮之中央窗上也句曲山腹內虛空謂之洞臺仙府也玄帝時召四海神使運安息國天市山寶玉璞石以填洞天之中央玄窗之上也東海青童君曾乘獨飆飛輪之車通按行有洞臺之山皆埋寶金白玉各八九千斤於市石左右四面以鎮陰宮之嶺諸有洞天皆爾不但句曲而已邑人呼天市盤石為仙人市壇是其欲少有仿佛而不了了也青童飆輪之跡今故分明句曲之山諸記說今悉分明唯天市壇石未知的何所在以論跡而言隱量正應大茅左右而踐行不見其異處或恐為土木蕪沒所不論耳按保命趙承每登壇長嘯風雲立至此則不應在小處長見雲氣出入恆先起大茅北陰此或當高而陰故也夫真人常御九龍左驂名飆右服名惣既履山頂故指乘其右驂今大茅嶺上向東行有路傍山平治狀如人功足通軌轍相傳皆呼此為飆輪跡乃無埋沒石壇既未顯金寶亦難測所埋又疑洞天中央玄窗之上不應乃近南門複恐在中茅間邑人耆老亦不復知仙人市壇處自隱居來此山七八年尚未得窮歷踐行而況悠悠之徒令其究竟之耶所以來得遍履者患於無良侶可同登陟之艱獨行又覺踽踽是以遂爾淹稽常所恥恨比日方負杖孤游庶當委曲所聞所見耳中茅山東有小穴穴口纔如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口餘小穿如盃大使山靈守衛之此盤石亦時開發耳謂之陰宮之阿門子勤齋戒尋之得從此入易於良常洞口其中多沙路曲僻經水處不大便易又道路遠不如小阿穴口直下三四里便徑至陰宮東玄掖門入此穴口二百步便朗然如晝日此即洞天東門也隱量乃可知處自未敢輕索入耳前傳云洞宮出土上計十三四里許今此云三四里便至掖門者是近山下已薄而門勢又未平計入門複應向下數里乃得至宮耳入口便明者此為內光出照不必關外日者也大茅山亦有小穴在南面相似如一謂之南便門亦以石填穴口但精齋向心於司命又常以二日登山延迎請祝自然得見吾也誠之至矣陰宮何足不觀乎左慈復何人耶此即南面之東便門應在柏枝緌石穴中此緌小穴甚多難卒分別必須精感得開乃可議入雲二日者謂十二月二日依傳說年有兩日恐三月十八日喧嘩雜鬧非專請之宜故也左慈以成仙人質見易於俗所以三月清齋便得入洞長史雖挺分高邈而形識猶昧豈可相比此語是欲相獎勵耳長史後答亦作此意仰酬之也三月十八日十二月二日東卿司命君是其日上要總真王君太虛真人東海青童合會于句曲之山游看洞室好道者欲求神仙宜預齋戒待此日登山請乞篤志心誠者三君自即見之抽引令前授以要道以入洞門辟兵水之災見太平聖君按中君書云常以二日登山延迎請祝即請十二月二日不見道三月十八日者屢有正月中耳今臘月二日多寒雪遠近略無來者唯三月十八日輒公私雲集車有數百乘人將四五千道俗男女狀如都市之眾看人唯共登山作靈寶唱贊事訖便散豈複有深誠密契願睹神真者乎縱時有至誠一兩人複患此喧穢終不能得專心自達如此抽引乞恩無因得果矣唯隱居所住中岩禁斷清年得無游雜既去洞隔嶺人自不知至於此也良常山西南垂有可住處是司命往時別宅處也亦可合丹司命初過江立宅於此以自蕩滌質對神鬼今按垂之為言如是邊際此正應在長史宅後大橫之西今父老相傳言如是邊際此正應在長史宅後大橫之西今父老相傳乃言大茅之西北平地棠梨樹間名下薄處言是司命君故宅耕墾至肥良多見磚瓦故物似經住止處亦驗烈不可穢犯君此審是則宜言中茅之西不應遠舉良常大都真人語自不正的遇所引處便言耳昔時山下遠近諸處長林榛摐遮天, CK-KZ: ''}
