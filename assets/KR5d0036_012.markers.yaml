  - {type: variant, offset: 6951, length: 0, content: '', HFL: 方士慈亦同在中建安末渡江尋山仍得入洞又乞丹砂合九華丹九華丹是太清中經法小括即小括蒼山在永嘉橋谿之北凡此諸人術解甚多而仙弟猶下者并是不聞三品高業故也許先生所以興歎句曲}
