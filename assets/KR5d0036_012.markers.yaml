  - {type: variant, offset: 6952, length: 0, content: '', HFL: 五門有心立志清齋三月登尋此門皆可即得得可入但人自不能齋尋之耳來問欲知宫室所作闊狹多少男女主領人數當更相示來疏亦復泰盡邪勤自當見亦何事爾亦何事爾又當先呈啓司命司命令答道宫室之委曲者吾乃敢言之耳此自是司命之别宫吾人亦不得爲洞臺之正主也按後所論諸官僚人物當是已爲啓司命乃具得受說之耳右定録後書答長史所問訖此從玄帝來凡五條並楊書東卿司命監太山之衆眞緫括吴越之萬神可謂道淵德高折衝羣靈者也賈玄道李叔升言城生傅道流徃並受東卿君之要也玄道河東人周威王之末年生叔升涿郡人漢元帝時生道流北地人漢靈帝殿中將軍也城生吴人後漢劉聖公時爲武當郡尉也受學至勤并得眞道今在太山支子小陽山中此所謂地眞者也諸來作試者非一津而徃矣或亦因人犯者此最難了也於斯之際可不愼乎此四人隸司命主察試學道者所以長史有書與賈賈即呈司命司命亦答之並以在上卷此諸人名位小不顯外書周威王即應是六國時威烈王也于時雖未立河東郡而即地已有其名矣漢官無正殿中將軍或應中郎將也此紫陽眞人六月二十日受右一條有掾寫七月十五日夜茅中君受書與許卿即長史也後當爲上清左卿玄感凝會精期遠範標神映挺雙理自分必能鵬飛辰阿雲扇靈元高振玉宇携轡秀眞可謂邈乎其竒落絶之視也於是洞隂之宫内臺下觀風無羽琅之鼓草無瓊金之流嚮雖渟光正明動回五象固乞屈之夾觀小天之浮景耳何足絓卿司之至念紆蘭眞以盼汜邪然鑒無不應圓想必通所以興詠事外迹亦並帀苟誠之所企吾無隱也想善建重離之明以期於必詣之會皓清明朗賢亦俱學而得耳不令我等有蹙頞下風矣弘之而已此是受前書後一月日復受此猶論答欲見洞宫事所以有後說也善建重離之明如似指魏傳青録文而長史名字不相應既已稱俯玄仰白在瓊刃前則此别當有義況也右一條楊書定録官寮有左右理中監準今長史司馬職又有北河司命主水官考此職常領九宫禁保侯禁保侯職主領應爲種民者今洞宫自二君以下便次此三職爲大矣左理中監準大府長史昔用韓崇以居之崇字長季吴郡毗陵人也少好道林屋仙人王瑋玄會授之以流珠丹一法崇奉而修之大有驗瑋玄語之子行此道亦可以岀身仕宦無妨仙舉也崇遂仕稍至宛陵令行仁以爲政用道以撫民虎狼深避蝗不集界遷汝南太守拔書佐袁安安後位至司徒時人通以崇有識物之鑒也隂皇后葬京師近郡二千石妻當會園陵而崇獨居清素妻忿崇哭泣詔問其故太常馮奚答曰汝南太守韓崇清苦遠尚味道忘形身享重官而妻自紡績政化仁簡視民如傷深達竒博有君子之鑒斯則昏夕之夜光陛下之子産也妻不通寒儉之節哭怨無衣將足以顯崇明德耳上竒之加崇俸禄秩中二千石後孝明皇帝巡狩汝南上治崇府崇使妻出住孤獨老嫗家上聞歎曰韓崇所謂百鍊不銷也賜縑五十匹崇在郡積十四年政化洽著舉天下最年七十四瑋玄乃授以隱解法得去入大霍山受瑋玄遁化泥丸紫户術以度世今在洞中爲左理中監漢書所載事迹亦略同而置辭小異耳袁安字邵平初爲縣功曹被舉歷仕遂至三公和帝時卒即袁紹高祖也晋世又有馮奚亦爲大常名位同耳韓既隱解必是託尸今晋陵上有韓冢崔巍高大從來相呼爲韓冢疑如桃君或即是此虚壙而世呼爲孫策將韓當冢也云王瑋玄是楚莊王時侍郎受術於玉君若是春秋時楚莊王者疑侍郎之官不似古職而漢楚王又無莊謚右理中監準職如司馬今有劉翊字子翔者居之翊本潁川人少好道德而家世大富常周窮困爲事好行隂德宻惠陳留張季札當弔師喪車敗牛困翊於汝南界逢之與語不示名字即推車牛與乘之恤死救窮非一人矣後都長安翊舉計掾到都帝嘉其心拜郎中遷陳留太守出長安五百里中斂死恤窮損己分人行達陽平遂遇馬皇先生告翊曰子仁感天地隂德神鬼太上將嘉子之用情矣使我來携汝以長生之道吾仙官也爾乃能隨我去不翊於是叩頭自搏少好長生幸遇神仙乞願侍給馬皇先生因將翊入桐柏山中授以隱地八術服五星之華法今度名東華來在洞中爲定録右理中監漢書云翊字子相潁隂人家世豐富常能周施而不以爲惠曾行於汝南界中有陳留張季札遠赴師喪遇寒冰車敗頓滯道路翊見而謂曰君愼終赴義行宜速達即下車與之不告姓名策馬而去季札意其子相也後故到潁隂還所假乘翊閉門辭行不與相見常守志卧疾不屈聘命河南種䄶臨郡引爲功曹後黄巾賊起翊救給乏絶資其食者數百人郷族死亡則爲殯斂鰥寡則助其妻娶獻帝遷都西京舉上計掾爾時道路寇阻翊夜行晝伏乃到長安上嘉其忠勤拜議郎遷陳留太守翊又散珍寳唯餘車馬自載東歸出關數百里見士大夫病亡道次仍又以馬易棺脫衣斂之又逢故知饑困於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視没不救非志士也遂俱餓死此說大同小異故備載之論翊字子翔於字例相得而翊義亦是相相作息亮切音二者未詳孰正馬皇出列仙傳黄帝時馬師也定録府有典柄執法郎是淳于斟字叔顯主試有道者斟會稽上虞人漢桓帝時作徐州縣令靈帝時大將軍辟掾少好道明術數服食胡麻黄精餌後入吴烏目山中隱居遇仙人慧車子授以虹景丹經修行得道今在洞中爲典柄執法郎易參同契云桓帝時上虞淳于叔通受術於青州徐從事仰觀乾象以處灾異數有效驗以知術故郡舉方士遷洛陽巿長如此亦爲小異吴無烏目山婁及吴興並有天目山或即是也慧車子無别顯出十二月一日夜定録君所道此即同是丑年所受云北河司命頃闕無人昔以桃俊兼之耳俊似錢唐人少爲郡幹佐未負笈到太學受業明經術灾異晩爲交阯太守漢末棄世入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也幼平教俊服九精鍊氣輔星在心之術俊修之道成今在洞中兼北河司命主水官之考罰此位雖隸定録其實受事於東華宫中節度桃俊字翁仲者也漢書無此事今冢在錢唐臨平墳壇歷然苗裔猶存郷近時聞鼙角之響故人不敢侵毁之皆知呼爲桃司命冢錢唐杜徵士事京産先與隱居共有詩詠以贊述斯德别在集中幼平亦無所顯出張激子當爲太極仙侯激子者河内張奉者也字公先少時名激子耳此人亦少發名字太傳袁隗歎其高操妻以女女服飾奢麗奉不顧眥無異路人婦改服乃後成室家也後棄世入剡山遇山圖公子山圖公子周哀王時大夫仙人者也授激子九雲水强梁鍊桂法激子修此得道今在東華宫行爲太極所署也或領九宫尚書與北河侯對職治水考北河司命或爲禁保侯亦併共業故也北河司命亦治在}
