  - {type: variant, offset: 6335, length: 1486, content: 日無處不可隱密即今斫伐耕稼四通九達山中亦皆顯露時移事異不復可准乃言未久如此正複五六十年來漸劇耳良常東南又有可住處其間當有累石如灶形灶間或有寄生樹樹如曲蓋形此處至好但恨淺耳雖爾自足此處今亦存但無複有寄生曲樹耳亦帶北洞流水其左右並近大路所以言淺即今凋迥無複可往也洞口西北有一地地小危不安要自足立外靜舍也今此中以去多荒蕪漸近村埭並不足復居昔時言去縣小近往來為易又近洞口所以屢及之耳外靜舍當以俟游賓從憩止非自往修行之所益知是欲相近之意也顧居士所撰本此中向近所泬精舍地一篇今視掾書者不以相次乃別出在長史所營宅前耳此後長史答書道西北地危仍次菌山不酬金鄉至室語明知本別蒨之也句曲之山有名菌山此山至佳亦有金乃可往採入土不過一二尺耳吾昔臨去時曾埋金於此欲服金者可往取但當不中以營私累耳今人不復識呼菌山者尋此山形當如菌孤立亦或是困蒼之囷形如囷也按大茅後長阿積金東凹地有一山子獨秀如博山爐且又近積金山恐此或當是即今多石及樹木但金之所在指一兩處亦難可尋索唯啟乞垂賜所不論耳意欲營轉煉之事亦指此山前臨長澗東流水至幽隱有形勢若基構有期當更宣述耳大茅山有玄帝時銅古鼎字鼎可容四五斛許偃刻甚精好在山獨高處入土八尺許上有盤石掩鼎上玄帝時命東海神使埋藏于此此亦當是移安息石時所埋也今最高處乃多石每吉日遠近道士咸登上燒香禮拜無複草木累石為小壇昔經有小瓦屋為風所倒尋古來帝王並重鼎器者以其兩鉉法日月三足法三才能烹飪熟成萬物兼自能輕重神變隱顯故也中君後答云鑄羽山之銅以作之諸有洞天之山皆爾大茅山下亦有泉水其下可立靜舍近水口處乃佳當小危不安耳今近南大洞口有好流水而多石小出下便平比世有來居之者唯宋初有女道士徐漂女為廣州刺史陸徽所供養在洞口前住積年亡女弟子姓宋為人高潔物莫能干年老而亡仍葬山南宋女弟子姓潘又襲住於今尚在元徽中有數男人複來其前而居至齊初乃敕句容人王文清仍此立館號為崇元開置堂宇廂廊殊為方副常有七八道士皆資俸力自二十許年遠近男女互來依約周流數里廨舍十餘坊而學上道者甚寡不過修靈寶齋及章符而已近有一女人來洞口住勤於灑掃自稱洞吏頗作巫師占卜多雜浮假此例亦處處有之大茅東西亦有澗水有晉末得道者任敦住處合藥灶寔猶存今有薛彪數人居之又有朱法永近小山上快矚眺而乏水良常山對穴口東視小山之嶺其上有埋銅數千斤以盤石填其上漢時其山下有屈氏家大富財有巨億埋銅器于此于今在也亦有錢錢在西北小山上向也今此山具存無知其錢銅處縱有仿佛亦不識尋視此山明地高下巉澗不似經墟村住處恐歲代久遠勢跡乖異故也曾得往年三月一日八月八日二書此乙丑所受則長史往年書是甲子年中按答云直置書於述墟朱家靜中則非因華僑楊君送之也三月一日書云今當墾赤石田日為往來之階亦竟不就事也復云豈可遐棄坐觀存沒哉此道自決求真之精誠也心不在我不可責人使必成之也赤石田今中茅西十許里有大塘食澗水久廢不修隱居今更築治為田十餘頃長史昔意欲避形跡因作田之階得數處望靈山而遇旱塘壞竟不果所以此書譏之耳都不齋而有書云齋戒也此亦有答明辭奏不可輕妄動靜必皆聞徹矣八月八日書云謹操身詣大茅之端乞特見採錄使目接溫顏耳聆玉音此語為求道之甚急也得近書具至心可勤道獎志也司命君自在東宮又書不應總合德有輕重之故也司命常住大霍之赤城此間唯有府曹耳具位有高卑故不宜共作辭啟二君雖同居華陽而官府各異不得同紙凡書奏不如口啟於此可具鑒其儀格耳吾等已自相知之厚薄書疏亦甚為班班欲停之如何此是長史輕脫置書于他家靜中而去恐方將人到又致漏泄真靈慎密故有此語欲戒試其心事耳長史後答此言亦殆為巧便此書疏慎示俗人脫有見者掘壞靈山爾之罪大也恐俗人貪狡之徒知此金寶處堪能鑿掘則事由宣泄此罪真為不輕非但爾時教戒亦傳貽無窮將來諸子咸共秘, CK-KZ: ''}
