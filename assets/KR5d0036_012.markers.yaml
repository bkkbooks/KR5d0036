  - {type: variant, offset: 29, length: 0, content: '', CK-KZ: 要也玄道河東人周威王之末年生叔升涿郡人漢元帝時生道流北地人漢靈帝殿中將軍也城生吳人後漢劉聖公時爲武當郡尉也受學至勤並得眞道今在太山支子小陽山中此所謂地眞}
