  - {type: variant, offset: 6961, length: 0, content: '', WYG: 從赤須先生受鍊魂法又遇桐柏眞人授之以黄水雲漿法得道今在洞中馥少時被公府辟召懸辟書著桑𣗳乃去其用懷髙邁如此後漢及高士傳並云陳留圉人少為書生桓帝時舉直言不就性質直不同時黨為閹人所疾陷於黨錮之禍避難乃翦鬚髮變形逃林慮山中為人冶作後還家杜門不出不與人相見黨禁未解而亡赤須子出列僊傳桐柏即古弼王餘數人不能一二道之例皆取平貞正直體𨼆神清即侍郎之才不限男女也前云有七人今唯說二女一男右保命君所道此當是接中告後乃言之童初府上帥用劉文饒文饒者𢎞農劉寛也少好道曾舉漢方正稍遷南陽太守視民如子怒不形顔口無疾言行陰德拯寒困萬民悦而附之如父母焉後為司徒太尉上賜酒伏地睡詔問故乃答曰臣任重責大恒憂心如醉旦使奴至市買菜奴盜用錢飲酒晏乃還卧於閣内又不得菜既醒乃罵之為死狗罵畢即束帶來入恐奴從後自殺所以慮之不覺忽然睡耳願見哀恕寛用心仁愛觸𩔖如此矣年七十三一旦遇青谷先生降之於寢室授其杖解法將去入太華山行九息服氣及授以鑪火丹方修之道成今在洞中作童初府帥上矦主始學道者後漢書云劉寛字文饒𢎞農華陰人父名﨑順帝時為司徒寛為人謹厚常行有人失牛乃就寛車中認之寛無言解駕牛與之步歸頃有認者得牛而送還慚懼寛乃謝遣之桓帝延熹八年為南陽太守恒用蒲鞭靈帝嘉平五年為太尉嘗於御坐被酒睡伏帝問太尉醉邪寛仰答臣不敢醉但任重責大憂心如醉耳嘗有客來詣寛寛遣奴市酒迂久大醉而還客罵為畜産寛須㬰遣人視奴疑恐自殺語左右曰此是人而罵為畜産為辱孰甚故吾懼其死耳後封逯鄉矦六百户中平二年亡年六十六贈車騎將軍特進諡曰昭烈矦子松嗣按此說復為同異故詳載之青谷先生無别顯出凡此諸引敎仙人恐皆是}
