  - {type: variant, offset: 7265, length: 272, content: 盤石填其上漢時其山下有屈氏家大富財有巨億埋銅器于此于今在也亦有錢錢在西北小山上向也今此山具存無知其錢銅處縱有仿佛亦不識尋視此山明地高下巉澗不似經墟村住處恐歲代久遠勢跡乖異故也曾得往年三月一日八月八日二書此乙丑所受則長史往年書是甲子年中按答云直置書於述墟朱家靜中則非因華僑楊君送之也三月一日書云今當墾赤石田日為往來之階亦竟不就事也復云豈可遐棄坐觀存沒哉此道自決求真之精誠也心不在我不可責人使必成之也赤石田今中茅西十許里有大塘食澗水久廢不修隱居今更築治為田十餘頃長史昔意欲避形跡因作田之階得數處望靈山而遇旱塘壞竟不果所以此書譏之耳都不齋而有書云齋戒, HFL: 他惠}
