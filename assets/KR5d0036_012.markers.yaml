  - {type: variant, offset: 6964, length: 1, content: 泉, HFL: 此告今登伏龍以望山禮拜便異乎陟嶺非必以近易爲言恐當宜然也昔有一人好道而不知求道之方唯朝夕拜跪向一枯樹輒云乞長生如此二十八年不倦枯木一旦忽然生華華又有汁甜如蜜有人教令食之遂取此華及汁並食之食訖即仙矣如是用心精誠之至也枯木尚能生紫華濯甘津況三秀之靈阿五芝所播植而不能數恭山岫洗拔滓穢者良可悲也世人所以儳此一字非眞每不得如意者亦如子所不得如意耳豈異邪昔有劉少翁曾數入太華山中拜禮向山如此二十年遂忽一旦得見西嶽丈人授其仙道禁山符有西嶽君西嶽公不知是此丈人邪昔有一人數旦旦詣河邊拜河}
  - {type: page-break, offset: 6964, content: '', id: KR5d0036_HFL_012-013a, image: hfl/0639/0639-068.png}
