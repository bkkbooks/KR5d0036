  - {type: variant, offset: 101, length: 117, content: 為句容里過江一百五十里訪索即得凡此後紫書大字者並茅三君傳所記也傳既以寶秘見之者稀今謹抄取說山事共相証顯按山形宛曲東西回故曰句曲從山嶺分界西及北屬句容東及南屬延陵句容既立為縣故其里不復存昔時應在述墟左右耳今山去石頭江水步道一百五六十里江, HFL: 顓頊顓頊父居弱}
