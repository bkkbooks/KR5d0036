無烏目山婁及吴興並有天目山或即是也慧車子無别顯出十二月一日夜定録君所道此即同是丑年所受云北河司命頃闕無人昔以桃俊兼之耳俊似錢唐人少爲郡幹佐未負笈到太學受業明經術灾異晩爲交阯太守漢末棄世入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也幼平教俊服九精鍊氣輔星在心之術俊修之道成今在洞中兼北河司命主水官之考罰此位雖隸定録其實受事於東華宫中節度桃俊字翁仲者也漢書無此事今冢在錢唐臨平墳壇歷然苗裔猶存郷近時聞鼙角之響故人不敢侵毁之皆知呼爲桃司命冢錢唐杜徵士事京産先與隱居共有詩詠以贊述斯德别在集中幼平亦無所顯出張激子當爲太極仙侯激子者河内張奉者也字公先少時名激子耳此人亦少發名字太傳袁隗歎其高操妻以女女服飾奢麗奉不顧眥無異路人婦改服乃後成室家也後棄世入剡山遇山圖公子山圖公子周哀王時大夫仙人者也授激子九雲水强梁鍊桂法激子修此得道今在東華宫行爲太極所署也或領九宫尚書與北河侯對職治水考北河司命或爲禁保侯亦併共業故也北河司命亦治在}
