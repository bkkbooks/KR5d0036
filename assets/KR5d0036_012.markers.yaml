  - {type: variant, offset: 640, length: 1, content: 河, CK-KZ: 無莊謚右理中監準職如司馬今有劉翊字子翔者居之翊本潁川人少好道德而家世大富常周窮困爲事好行陰德密惠陳留張季札當弔師喪車敗牛困翊於汝南界逢之與語不示名字卽推車牛與乘之恤死救窮非一人矣後都長安翊舉計掾到都帝嘉其心拜郎中遷陳留太守出長安五百里中斂死恤窮損己分人行達陽平遂遇馬皇先生告翊曰子仁感天地陰德神鬼太上將嘉子之用情矣使我來攜汝以長生之道吾仙官也爾乃能隨我去不翊於是叩頭自搏少好長生幸遇神仙乞願侍給馬皇先生因將翊入桐柏山中授以隱地八術服五星之華法今度名東華來在洞中爲定錄右理中監漢}
