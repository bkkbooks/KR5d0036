  - {type: variant, offset: 7841, length: 0, content: '', CK-KZ: 今眺望林嶺豈無羡想之懷昔自謂勝之今翻在後蓋以勸激長史之辭也右南嶽夫人言張姜子西州人張濟妹也濟後漢末西涼州人爲董卓將後攻穰城被射死卽張繡從叔也其妹不顯外書不知出適末李惠姑齊人夏侯玄婦也玄魏末人與李豐俱爲晉文王所誅不知婦亡在玄之}
  - {type: variant, offset: 7841, length: 0, content: '', CK-KZ-jye: 今眺望林嶺豈無羡想之懷昔自謂勝之今翻在後蓋以勸激長史之辭也右南嶽夫人言張姜子西州人張濟妹也濟後漢末西涼州人爲董卓將後攻穰城被射死卽張繡從叔也其妹不顯外書不知出適末李惠姑齊人夏侯玄婦也玄魏末人與李豐俱爲晉文王所誅不知婦亡在玄之}
  - {type: variant, offset: 7841, length: 0, content: '', YP-C: 今眺望林嶺豈無羡想之懷昔自謂勝之今翻在後蓋以勸激長史之辭也右南嶽夫人言張姜子西州人張濟妹也濟後漢末西涼州人爲董卓將後攻穰城被射死卽張繡從叔也其妹不顯外書不知出適末李惠姑齊人夏侯玄婦也玄魏末人與李豐俱爲晉文王所誅不知婦亡在玄之}
  - {type: variant, offset: 7842, length: 0, content: '', CK-KZ: 後李豐乃是馮翊人非齊人不知此是李誰之女施淑女山陽人施績女也施績吳興人孫皓時爲驃騎將軍守西陵今云山陽恐女或出適取夫家郡不爾則乖鄭天生鄧芝母也鄧芝字伯苗南陽新野人在蜀爲劉禪車騎將軍後行見蝯抱子行引弓射殺因感念而亡母不知鄭誰之女此數女子昔世有仁行令問並得在洞中洞中有易遷館含眞臺皆宮名也計今在易遷館東厢中此館中都有八十三人又有協辰夫人者九宮之女也太上往遣來教此等法皆以保命授}
