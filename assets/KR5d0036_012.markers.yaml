  - {type: variant, offset: 6967, length: 1, content: 下, HFL: 白璧十雙教授水行不溺法此人見在中嶽得道河侯河伯故當是兩神邪左慈初來亦勤心數拜禮靈山五年許乃得深進内外東西宫耳前云三月便得進與此大殊恐以深進爲異也學道當如山世遠去人事如清虚眞人步深幽當如周紫陽何有不得道邪世遠傳未出其捨家尋學事在讖書即尹公度弟子已得爲太和山眞人清虚王君紫陽周君各自有傳建志當令勤研神令虚所爲所作當令宻青童戒南眞亦云學道唯須勤宻勤即晝夜而勿怠宻則非我而不知今中君復說此實爲至諭}
