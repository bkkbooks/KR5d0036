  - {type: variant, offset: 6959, length: 1, content: 茅, HFL: 旱收葬洛陽城旁客死骸骨萬餘人爲立義冢祭祀之應時大雨豐收所行多是此輩太上處以暢有隂行令爰支從南宫受化得仙今在洞中爰支亦少好道服伏苓三十年從遇石長生教之以化遁化遁上尸解也暢即周嘉從弟也性仁慈和篤某帝時爲河南尹永初二年夏旱久禱無應因收葬萬餘人應時大雨位至光禄勳明晨侍郎張桃枝者漢司隸校尉朱㝢季陵母也沛人㝢徃與陳蕃俱誅㝢母行隂德久聞在易遷始得爲侍郎耳朱㝢沛人桓靈時八俊後同黨人之例李膺杜宻俱下獄死非陳蕃同時明晨侍郎夏馥字子治陳留人也少好道服术餌和雲母後入吴}
