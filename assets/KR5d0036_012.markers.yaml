  - {type: variant, offset: 2984, length: 0, content: '', CK-KZ: 求道之方唯朝夕拜跪向一枯樹輙云乞長生如此二十八年不倦枯木一旦忽然生華華又有汁甜如蜜有人教令食之遂取此華及汁並食之食訖卽仙矣如是用心精誠之至也枯木尙能生紫華濯甘津況三秀之靈阿五芝}
