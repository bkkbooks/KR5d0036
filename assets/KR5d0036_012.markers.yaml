  - {type: variant, offset: 14, length: 86, content: 膏腴句曲之地胏也履之者萬萬知之者無一保命君受作此言按此應在乙丑年六月已前甲子歲中事始論此山受福之端也其地肥良故曰膏腴水至則浮故曰地篸歷世遊踐莫有知其處者句曲山源曲而有所容故, HFL: 女生高陽德}
