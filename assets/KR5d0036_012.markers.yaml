  - {type: variant, offset: 7662, length: 203, content: 府各異不得同紙凡書奏不如口啟於此可具鑒其儀格耳吾等已自相知之厚薄書疏亦甚為班班欲停之如何此是長史輕脫置書于他家靜中而去恐方將人到又致漏泄真靈慎密故有此語欲戒試其心事耳長史後答此言亦殆為巧便此書疏慎示俗人脫有見者掘壞靈山爾之罪大也恐俗人貪狡之徒知此金寶處堪能鑿掘則事由宣泄此罪真為不輕非但爾時教戒亦傳貽無窮將來諸子咸共秘之右定錄中君答長史前書說句曲山事訖此長史前書無本出今唯有後答亦隨條奉酬次第如左右從前良常, HFL: 寮}
