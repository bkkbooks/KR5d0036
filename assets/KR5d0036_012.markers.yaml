  - {type: variant, offset: 669, length: 2, content: 圖即, CK-KZ: 南种䄶臨郡引爲功曹後黃巾賊起翊救給乏絶資其食者數百人鄕族死亡則爲殯斂鰥寡則助其妻娶獻帝遷都西京舉上計掾爾時道路寇阻翊夜行晝伏乃到長安上嘉其忠勤拜議郎遷陳留太守翊又散珍寶唯餘車馬自載東歸出關數百里見士大夫病亡道次仍以馬易棺脫衣斂之又逢故知飢困於路不忍委去因殺所駕牛以救其乏眾人止之翊曰視沒不救非志士也遂俱餓死此說大同小異故備載之論翊字子翔於字例相得而翊義亦}
