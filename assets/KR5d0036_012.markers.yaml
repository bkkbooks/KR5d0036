  - {type: variant, offset: 2947, length: 0, content: '', CK-KZ: 與張激子對局魏書云張範字公儀河內修武人祖歆漢司徒父延太尉袁隗欲以女妻範範辭不受性恬靜樂道徵命不就後爲議郎參丞相魏武軍事甚見敬重好賑救窮乏家無餘財以建安十七年卒弟承字公先亦知名以方正拜議郎諫議大夫趙郡太守後隨魏武西征至長安病亡此說名字翻覆大異承與奉乃相類而非袁壻若是範又其字不同詳按事迹恐多是兄也魏書王修傳又云修往來南陽多止張奉舍奉舉家病修營拯之按張範兄弟乃嘗避地往揚州投袁術又非劉表不應在南陽二三爲疑也山圖公子出列仙傳中候夫人所道尋洞中事皆二君所說如此兩條獨是中候夫人者當本是東華中職寮}
