  - {type: variant, offset: 6969, length: 7, content: 立靜舍近水口處, HFL: 謂一言以蔽之右定録君所道使䟽此一條又有楊書夫望林者豈不想易遷之若人羡彼子之濯景邪可謂瞻之在前忽焉在後長史妻既已在易遷爲長史今眺望林嶺豈無羡想之懷昔自謂勝之今翻在後蓋以勸激長史之辭也右南嶽夫人言張姜子西州人張濟妹也濟後漢末西凉州人爲董卓將後攻穰城被射死即張繡從叔也其妹不顯外書不知出適末李惠姑齊人夏侯玄婦也玄魏末人與李豐俱爲晋文王所誅不知婦亡在玄之前後李豐}
