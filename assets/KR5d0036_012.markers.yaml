  - {type: variant, offset: 3, length: 1, content: 稽, CK-KZ-jye: 書似是裴君言且楊書此亦不與後玄帝相連恐非中君答也又長史此四書本今並不存矣玄帝者昔軒轅子昌意娶蜀山之女生高陽德號顓頊顓頊父居弱水之鄕頊身陶七河之津是爲玄帝也仗萬靈以信順監眾}
