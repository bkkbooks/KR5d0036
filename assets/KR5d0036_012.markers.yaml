  - {type: variant, offset: 30, length: 0, content: '', CK-KZ: 也諸來作試者非一津而往矣或亦因人犯者此最難了也於斯之際可不愼乎此四人隸司命主察試學道者所以長史有書與賈賈卽呈司命司命亦答之並以在上卷此諸人名位小不顯外書周威王卽應是六國時威烈王也于時雖未立河東郡而卽地已有其名矣漢官}
