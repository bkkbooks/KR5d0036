  - {type: variant, offset: 7878, length: 225, content: 餘歲時述虛此乃應是墟字而由來皆作虛字即今之山西村名也閑耆宿有見語茅山上故昔有仙人乃有市處早已徙去後見包公問動靜此君見答今故在此山非為徙去此山洞庭之西門通太湖苞山中所以仙人在中住也唯說中仙君一人字不言有兄弟三人不分別長少不道司命君尊遠別治東宮未見傳記乃知高卑有差降班次有等級耳輒敬承誨命於此而改此長史又更答書云今有所起草存故得撰錄而前紙斷失亦非起端語也包公是鮑靚句容人悉呼作包也答書時已是蒙示傳記是乙丑年初矣告小阿口直下三四里便徑至陰宮東玄掖門入此穴口, HFL: ''}
