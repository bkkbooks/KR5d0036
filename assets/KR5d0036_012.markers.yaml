  - {type: variant, offset: 3277, length: 309, content: 宮耳三種芝恐是下品者也良常北垂洞宮口直山領南行二百步有秦始皇埋藏白璧兩雙入地七尺上有小磐石在嶺上以覆坎處李斯刻書璧其文曰始皇聖德章平山河巡狩蒼川勒銘素璧若掘即可得始皇所履山川皆祀以玉璧不但句曲而已從此後墨書皆定錄真君蒨以告長史掾寫本前紙所失恐非起端語尋埋璧時在三茅得道之前而後乃具見如此明真人無所隔蔽矣按傳所稱即是登山時但云一雙為異或應二字雙璧之書亦如禹山所刻作篆跡也今尋檢其處亦可見石蓋亦殊自不小也茅山北垂洞口一山名良常山本亦句曲相連都一名耳始皇三十七年十月癸丑始皇出游十一月行至雲夢祠虞舜于九疑浮江下觀藉柯度梅渚過丹陽至錢塘臨浙江水波惡乃至西百二十里從峽中度上會稽祭夏禹望于南海而立石刻頌秦德于會稽山李斯請書而還過, HFL: ''}
