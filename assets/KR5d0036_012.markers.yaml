  - {type: variant, offset: 120, length: 512, content: 書大字者並茅三君傳所記也傳既以寶秘見之者稀今謹抄取說山事共相証顯按山形宛曲東西回故曰句曲從山嶺分界西及北屬句容東及南屬延陵句容既立為縣故其里不復存昔時應在述墟左右耳今山去石頭江水步道一百五六十里江水之東金陵之左右間小澤澤東有句曲之山是也此蓋呼秣陵之金陵非地篸之金陵矣小澤即謂今赤山湖也從江水直對望山東西左右正自如此也此山洞虛內觀內有靈府洞庭四開穴岫長連古人謂為金壇之虛臺天后之便闕清虛之東窗林屋之隔遝眾洞相通陰路所適七途九源四方交達真洞仙館也此論洞天中諸所通達天後者林屋洞中之真君位在太湖苞山下龍威丈人所入得靈寶五符處也清虛是王屋洞天名言華陽與此並相貫通也山形似已故以句曲為名焉今登中茅玄嶺前後望諸峰壟盤紆曲轉以大茅為首東行北轉又折西行北轉又折東北行至大橫反覆南北狀如左書已字之形金陵者兵水不能加災癘所不犯河圖中要元篇第四十四卷云句金之壇其間有陵兵病不往洪波不登正此之福地也爾心悟焉是汝之幸復識此悟從誰所感發耶此河圖者舜禹所受及洛書之屬今猶有四十餘卷存此語亦是示長史言相感悟乃從楊君宣說吾之所啟發矣句曲山其間有金陵之地地方三十七八頃是金陵之地胏也土良而井水甜美居其地必得度世見太平河圖內元經曰乃地胏土良水清句曲之山金壇之陵可, CK-KZ: 戸術}
