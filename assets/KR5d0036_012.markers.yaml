  - {type: variant, offset: 6952, length: 0, content: '', WYG: 五門有心立志清齋三月登尋此門皆可即得得可入但人自不能齋尋之耳來問欲知宫室所作闊狹多少男女主領人數當更相示來疏亦復泰盡邪勤自當見亦何事爾亦何事爾又當先呈啓司命司命令答道宫室之委曲者吾乃敢言之耳此自是司命之别宫吾人亦不得為洞臺之正主也按後所論諸官僚人物當是已為啓司命乃具得受說之耳右定録後書答長史所問訖此後𤣥帝來凡五條並楊書東卿司命監太山之衆眞總括呉越之萬神可謂道淵德高折衝羣靈者也賈𤣥道李叔升言城生傅道流往並受東卿君之要也𤣥道河東人周威王之末年生叔升涿郡人漢元帝時生道流北地人漢靈帝殿中將軍也城生呉人後漢劉聖公時為武當郡尉也受學至勤並得眞道今在太山支子小陽山中此所謂地眞者也諸來作試者非一津而往矣或亦因人犯者此最難了也於斯之際可不愼乎此四人𨽻司命主察試學道者所以長史有書與賈賈即呈司命司命亦答之並以在上卷此諸人名位小不顯外書周威王即應是六國時威烈王也于時雖未立河東郡而即地已有其名矣漢官無正殿中將軍或應中郎將也此紫陽眞人六月二十日受右一條有掾寫七月十五日夜茅中君受書與許卿即長史也後當為上清左卿𤣥感凝㑹精期逺範標神映挺雙理自分必能鵬飛辰阿雲扇靈元高振玉宇攜轡秀眞可謂邈乎其竒落絶之視也於是洞陰之宫内臺下觀風無羽琅之鼓草無瓊金之流嚮雖渟光正明動囘五象固乞屈之夾觀小天之浮景耳何足絓卿司之至念紆蘭眞以盼汜邪然鑒無不應圓想必通所以興詠事外迹亦並帀苟誠之所企吾無𨼆也想善建重離之明以期於必詣之㑹皓清明朗賢亦俱學而得耳不令我等有蹙頞下風矣𢎞之而已此是受前書後一月日復受此猶論答欲見洞宫事所以有後說也善建重離之明如似指魏傅青録文而長史名字不相應既已稱俯𤣥仰白在瓊刃前則此别當有義況也右一條楊書定録官寮有左右理中監準今長史司馬職又有北河司命主水官考此職常領九宫禁保侯禁保侯職主領應為種民者今洞宫自二君以下便次此三職為大矣左理中監凖大府長史昔用韓崇以居之崇字長季呉郡毗陵人也少好道林屋仙人王瑋𤣥曾授之以流珠丹一法崇奉而修之大有驗瑋𤣥語之子行此道亦可以出身仕宦無妨仙舉也崇遂仕稍至宛陵令行仁以為政用道以撫民虎狼深避蝗不集界遷汝南太守拔書佐𡊮安安後位至司徒時人通以崇有識物之鑒也陰皇后葬京師近郡二千石妻當㑹園陵而崇獨居清素妻忿崇哭泣詔問其故太常馮奚答曰汝南太守韓崇清苦逺尚味道忘形身享重官而妻自紡績政化仁簡視民如傷深達竒博有君子之鑒斯則昏夕之夜光陛下之子産也妻不通寒儉之節哭怨無衣將足以顯崇明德耳上竒之加崇俸祿秩中二千石後孝明皇帝巡狩汝南上治崇府崇使妻出住孤獨老嫗家上聞歎曰韓崇所謂百鍊不銷也賜縑五十匹崇在郡積十四年政化洽著舉天下最年七十四瑋𤣥乃授以𨼆解法得去入大霍山受瑋𤣥遁化泥丸紫戸術以度世今在洞中為左理中監漢書所載事迹亦略同而置辭小異耳𡊮安字邵公初為縣功曹被舉歴仕遂至三公和帝時卒即𡊮紹高祖也晉世又有馮奚亦為太常名位同耳韓既𨼆解必是記尸今晉陵上有韓冢崔巍高大從來相呼為韓冢疑如桃君或即是此虚壙而世呼為孫策將韓當冢也云王瑋𤣥是楚莊王時侍郎受術於玉君若是春秋時楚莊王者疑侍郎之官不似古職而漢楚王又無莊諡右理中監凖職如司馬今有劉翊字子翔者居之翊本潁川人少好道德而家世大富常周窮困為事好行陰德宻惠陳留張季札當弔師喪車敗牛困翊於汝南界逢之與語不示名字即推車牛與乘之恤死救窮非一人矣後都長安翊舉計掾到都帝嘉其心拜郎中遷陳留太守出長安五百里中斂死恤窮損已分人行達陽平遂遇馬皇先生吿翊曰子仁感天地陰德神鬼太上將嘉子之用情矣使我來攜汝以長生之道吾仙官也爾乃能隨我去不翊於是叩頭自搏少好長生幸遇神仙乞願侍給馬皇先生因將翊入桐柏山中授以𨼆地八術服五星之華法今度名東華來在洞中為定録右理中監漢書云翊字子相潁陰人家世豐富常能周施而不以為惠曾行於汝南界中有陳留張季札逺赴師喪遇寒氷車敗頓滯道路翊見而謂曰君愼終赴義行宜達即下車與之不告姓名策馬而去季札意其子相也後故到潁陰還所假乗翊閉門辭行不與相見常守志卧病不屈聘命河南种䄶臨郡引為功曹後黄巾賊起翊救給乏絶資其食者數百人鄉族死亡則為殯斂鰥寡則助其妻娶獻帝遷都西京舉上計掾爾時道路冦阻翊夜行晝伏乃到長安上嘉其忠勤拜議郎遷陳留太守翊又散珍寶唯餘車馬自載東歸出關數百里見士大夫病卒道次仍又以馬易棺脱衣斂之又逢故知飢困於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視没不救非志士也遂俱餓死此說大同小異故備載之論翊字子翔於字例相得而翊義亦是相相作息亮切音二者未詳孰正馬皇出列仙傳黄帝時馬師也定録府有典柄執法郎是淳于斟字叔顯主試有道者斟會稽上虞人漢桓帝時作徐州縣令靈帝時大將軍辟掾少好道明術數服食胡麻黄精餌後入呉烏目山中𨼆居遇仙人慧車子授以虹景丹經修行得道今在洞中為典柄執法郎易參同契云桓帝時上虞淳于叔通受術於青州徐從事仰觀乾象以處災異數有效驗以知術故郡舉方正遷洛陽市長如此亦為小異呉無烏目山婁及呉興並有天目山或即是也慧車子無别顯出十二月一日夜定録君所道此即同是丑年所受云北河司命頃闕無人昔以桃俊兼之耳俊似錢唐人少為郡幹佐嘗負笈到太學受業明經術災異晚為交阯太守漢末棄世入增城山中學道遇東郭幼平幼平秦時人久𨼆增城得道者也幼平敎俊服九精鍊氣輔星在心之術俊修之道成今在洞中兼北河司命主水官之考罰此位雖𨽻定録其實受事於東華宫中節度桃俊字翁仲者也漢書無此事今冢在錢唐臨平墳壇歴然苗裔猶存鄉近時聞鼙角之響故人不敢侵毁之皆知呼為桃司命冢錢唐杜徵士事京産先與𨼆居共有詩詠以賛述斯德别在集中幼平亦無所顯出張激子當為太極仙矦激子者河内張奉者也字公先少時名激子耳此人亦少發名字太傅𡊮隗艱其高操妻以女女服飾奢麗奉不顧眥無異路人婦改服乃後成室家也後棄世入剡山遇山圖公子山圖公子周哀王時大夫仙人者也授激子九雲水强梁鍊桂法激子修此得道今在東華宫行為太極所署也或領九宫尚書與北河矦對職治水考北河司命或為禁保矦亦併共業故也北河司命亦治在}
