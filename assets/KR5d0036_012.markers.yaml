  - {type: variant, offset: 1218, length: 2, content: 詔敕, CK-KZ: 大將軍辟掾少好道明術數服食胡麻黃精餌後入吳烏目山中隱居遇仙人號慧車子授以虹景丹經修行得道今在洞中爲典柄執法郎易參同契云桓帝時上虞淳于叔通受術於靑州徐從事仰觀乾象以處災異數有效驗以知術故}
