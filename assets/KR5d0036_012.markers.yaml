  - {type: variant, offset: 2948, length: 0, content: '', CK-KZ: 也我聞易遷中人竇氏言云河北司命禁保侯似有所擬想當審爾竇氏卽瓊英也似有所擬者當是長史故中君受云北河司命方驗也恐受業高後定不復爲此職然主領種民事亦相符保命府多女官司三官官屬有七人四女三男明晨侍郎七人如今世上御史中丞之職並隸東華方諸宮保命君總關之耳明晨侍郎周爰支者漢河南尹周暢伯持之女也暢汝南安成人好行陰德功在不覺曾作河南尹遭大旱收葬洛陽城旁客死骸骨萬餘人爲立義冢祭祀之應時大雨豐收所行多是此輩太上處以暢有陰行令爰支從南宮受化得仙今在洞中爰支亦少好道服伏苓三十年後遇石長生教之以化遁化遁上尸解也暢卽周嘉從弟也性仁慈和篤某帝時爲河南尹永初二年夏旱久禱無應因收葬萬餘人應時大雨位至光祿勳明晨侍郎張桃枝者漢司隸校尉朱寓季陵母也沛人寓往與陳蕃俱誅寓母行陰德久聞在易遷始得爲侍郎耳朱寓沛人桓靈時八俊後同黨人之例李膺杜密俱下獄死非陳蕃同時明晨侍郎夏馥字子治陳留人也少好道服术餌和雲母後入吳山從赤須先生受鍊魂法又遇桐柏眞人授之以黃水雲漿法得道今在洞中馥少時被公府辟召懸辟書著桑樹乃去其用懷高邁如此後漢及高士傳並云陳留圉人少爲書生桓帝時舉直言不就性質直不同時黨爲閹人所疾限於黨錮之限避難乃翦鬚髮變形逃林慮山中爲人治作後還家杜門不出不與人相見黨禁未解而亡赤須子出列仙傳桐柏卽右弼王餘數人不能一二道之例皆取平貞正直體隱神淸卽侍郎之才不限男女也前云有七人今唯說二女一男右保命君所道此當是接中候告後乃言之童初府上帥用劉文饒文饒者弘農劉寬也少好道曾舉漢方正稍遷南陽太守視民如子怒不形顏口無疾言行陰德拯寒困萬民悅而附之如父母焉後爲司徒太尉上賜酒伏地睡詔問故乃答曰臣任重責大恒憂心如醉旦使奴至市買菜奴盜用錢飲酒晏乃還卧於閣內又不得菜旣醒乃罵之爲死狗罵畢卽束帶來人恐奴從後}
