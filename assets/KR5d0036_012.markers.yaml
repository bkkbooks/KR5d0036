  - {type: variant, offset: 3587, length: 1537, content: 山川遂登句曲北垂山埋白璧一雙於是會群官饗從駕始皇歎曰巡狩之樂莫過於山海自今已往良為常也爾乃群臣並稱壽喚曰良為常矣又鳴大鼓擊大鍾萬聲齊唱洞駭山澤贊樂吉兆大小咸善乃改句曲北垂曰良常之山也良常之意從此而名檢外書始皇三十七年正月出游雲夢丹陽浙江上會稽祭夏禹望南海刻石紀功還過吳渡江來並北海至琅颻至平原得病七月丙寅崩于沙丘九月葬驪山如此之時皆未有瀆即是從延陵步道上取句容江來路仍過停饗設耳非必故詣句曲所以止住山北邊下處遂不進前嶺且於時亦未驗此山之靈奇祀璧之意者為通是望山設所以中君云所履山川皆祀以玉璧也夫號從主人名由地表小君以漢成帝時蒨紫書云治於良常北洞蓋內因此成稱也又檢始皇崩不發喪令車載鮑魚以亂此應夏月中如外書所說相似今依傳言乃是三十六年十月建亥之月為秦正月為出游是至雲夢耳不爾則是三十八年秋崩也未作秦歷不能得定癸丑是何月中比別更詳正之王莽地皇三年七月戊申此七月二十四日也遣使者章邕齎黃金百鎰銅鍾五枚贈之於句曲三仙君王莽制金為貨名鎰形如錢無孔重一兩直錢一千百鎰則百兩也光武建武七年三月丁巳此三月二十四日也遣使者吳倫齎金五十斤獻之于三君今並埋在小茅山上獨高處坎上有聚石入地三四尺也此則今小茅山積石上最高處是也此二事不顯真蒨中漢明帝永平二年詔敕郡縣修守丹陽句曲真人之廟按三君初得道乘白鵠在山頭時諸村邑人互見兼祈禱靈驗因共立廟於山東號曰白鵠廟每饗祀之時或聞言語或見白鵠在帳中或聞伎樂聲於是競各供侍此廟今猶在山東平阿村中有女子姓尹為祝逮山西諸村各各造廟大茅西為吳墟廟中茅後山上為述墟廟並歲事鼓舞同乎血祀蓋已為西明所司非複真仙僚屬矣中茅山玄嶺獨高處司命君埋西胡玉門丹砂六千斤於此山深二丈許坎上四面有小盤石鎮其上其山左右當泉水下流水皆小赤色飲之益人此山下左右亦有小平處可堪靜舍左元放時就司命乞丹砂得十二斤耳今此嶺前後甚多大石而山上左右無正流水東南近下有一長澗西南近下亦有小水度嶺南隱居住處近山上有湧泉冬夏無窮而水色不甚覺赤耳平處可住東西唯當近澗左右為好左氏乞丹砂當是入洞時所請以合爐火九華丹右楊書大茅山中茅山相連長阿中有連石古時名為積金山此山中甚多金物其處宜人住可索有水處為屋室靜舍乃佳此數處亦任意耳快可合丹以修上道中茅之前大茅之後下麓長澗東西亦出山外對館此即隱居今所住東面一橫壟也此壟純絕石石形甚瑰奇多穿穴側傍盤紆下深乃有無底處屢投脆物在中間玲玲之響久之此云多金物亦當是久來真仙所投也西南有大石壁聳而坼開內有洞入數丈漸峽小不復容人乃飆飆有風外數步便有一湧泉冬夏清流即下解所資近外澗口又有一湧泉水勢乃駛上者冬溫而夏冷今正對邏前小近下復有一穴湧泉特奇大水大旱未嘗增減色小白而甘美柔弱灌注無窮但恨在山西自不得東流耳亦別開決作東流用之又渡此嶺東南有一石穴水東流極好其處隱障甚可合丹即後所云菌山之前也正患去徑路近車聲人響殆欲相聞今若斷此路不復聽車聲人行便是第一處方當思為其宜茅山住止惟有隱居今所住及南洞口長史宅處乃極好所恨迥曠且此一山通無虺蝮毒螫時有青蛇都不犯物虎亦甚少自古來未聞害人山居不問道俗皆少溫病山德寬容不到險阻但恨無青林冬夏常鬱如東間諸山耳自隱居住來乾養成秀于形望大好山出好術並雜藥絕宜松柏而本無人植不容自生今亦分布歲種之耳茅山天市壇四面皆有寶金白玉各八九千斤去壇左右二丈許入地九尺耳昔東海青童君曾乘獨飆飛輪之車通按行有洞天之山曾來於此山上矣其山左右有泉水皆金玉之津氣可索其有小安處為靜舍乃佳若飲此水甚便益人精可合丹天市之壇石正當洞天之中央玄窗之上也此石是安息國天市山石也所以名之為天市盤石也玄帝時召四海神使運此盤石於洞天之上耳非但句曲而已仙人市壇之下洞宮之中央窗上也句曲山腹內虛空謂之洞臺仙府也玄帝時召四海神使運安息國天市山寶玉璞石以填洞天之中央玄窗之上也東海青童君曾乘獨飆飛輪之車通按行, HFL: ''}
