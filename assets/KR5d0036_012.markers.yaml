  - {type: variant, offset: 5130, length: 1719, content: 埋寶金白玉各八九千斤於市石左右四面以鎮陰宮之嶺諸有洞天皆爾不但句曲而已邑人呼天市盤石為仙人市壇是其欲少有仿佛而不了了也青童飆輪之跡今故分明句曲之山諸記說今悉分明唯天市壇石未知的何所在以論跡而言隱量正應大茅左右而踐行不見其異處或恐為土木蕪沒所不論耳按保命趙承每登壇長嘯風雲立至此則不應在小處長見雲氣出入恆先起大茅北陰此或當高而陰故也夫真人常御九龍左驂名飆右服名惣既履山頂故指乘其右驂今大茅嶺上向東行有路傍山平治狀如人功足通軌轍相傳皆呼此為飆輪跡乃無埋沒石壇既未顯金寶亦難測所埋又疑洞天中央玄窗之上不應乃近南門複恐在中茅間邑人耆老亦不復知仙人市壇處自隱居來此山七八年尚未得窮歷踐行而況悠悠之徒令其究竟之耶所以來得遍履者患於無良侶可同登陟之艱獨行又覺踽踽是以遂爾淹稽常所恥恨比日方負杖孤游庶當委曲所聞所見耳中茅山東有小穴穴口纔如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口餘小穿如盃大使山靈守衛之此盤石亦時開發耳謂之陰宮之阿門子勤齋戒尋之得從此入易於良常洞口其中多沙路曲僻經水處不大便易又道路遠不如小阿穴口直下三四里便徑至陰宮東玄掖門入此穴口二百步便朗然如晝日此即洞天東門也隱量乃可知處自未敢輕索入耳前傳云洞宮出土上計十三四里許今此云三四里便至掖門者是近山下已薄而門勢又未平計入門複應向下數里乃得至宮耳入口便明者此為內光出照不必關外日者也大茅山亦有小穴在南面相似如一謂之南便門亦以石填穴口但精齋向心於司命又常以二日登山延迎請祝自然得見吾也誠之至矣陰宮何足不觀乎左慈復何人耶此即南面之東便門應在柏枝緌石穴中此緌小穴甚多難卒分別必須精感得開乃可議入雲二日者謂十二月二日依傳說年有兩日恐三月十八日喧嘩雜鬧非專請之宜故也左慈以成仙人質見易於俗所以三月清齋便得入洞長史雖挺分高邈而形識猶昧豈可相比此語是欲相獎勵耳長史後答亦作此意仰酬之也三月十八日十二月二日東卿司命君是其日上要總真王君太虛真人東海青童合會于句曲之山游看洞室好道者欲求神仙宜預齋戒待此日登山請乞篤志心誠者三君自即見之抽引令前授以要道以入洞門辟兵水之災見太平聖君按中君書云常以二日登山延迎請祝即請十二月二日不見道三月十八日者屢有正月中耳今臘月二日多寒雪遠近略無來者唯三月十八日輒公私雲集車有數百乘人將四五千道俗男女狀如都市之眾看人唯共登山作靈寶唱贊事訖便散豈複有深誠密契願睹神真者乎縱時有至誠一兩人複患此喧穢終不能得專心自達如此抽引乞恩無因得果矣唯隱居所住中岩禁斷清年得無游雜既去洞隔嶺人自不知至於此也良常山西南垂有可住處是司命往時別宅處也亦可合丹司命初過江立宅於此以自蕩滌質對神鬼今按垂之為言如是邊際此正應在長史宅後大橫之西今父老相傳言如是邊際此正應在長史宅後大橫之西今父老相傳乃言大茅之西北平地棠梨樹間名下薄處言是司命君故宅耕墾至肥良多見磚瓦故物似經住止處亦驗烈不可穢犯君此審是則宜言中茅之西不應遠舉良常大都真人語自不正的遇所引處便言耳昔時山下遠近諸處長林榛摐遮天蔽日無處不可隱密即今斫伐耕稼四通九達山中亦皆顯露時移事異不復可准乃言未久如此正複五六十年來漸劇耳良常東南又有可住處其間當有累石如灶形灶間或有寄生樹樹如曲蓋形此處至好但恨淺耳雖爾自足此處今亦存但無複有寄生曲樹耳亦帶北洞流水其左右並近大路所以言淺即今凋迥無複可往也洞口西北有一地地小危不安要自足立外靜舍也今此中以去多荒蕪漸近村埭並不足復居昔時言去縣小近往來為易又近洞口所以屢及之耳外靜舍當以俟游賓從憩止非自往修行之所益知是欲相近之意也顧居士所撰本此中向近所泬精舍地一篇今視掾書者不以相次乃別出在長史所營宅前耳此後長史答書道西北地危仍次菌山不酬金鄉至室語明知本別蒨之也句曲之山有名菌山此山至佳亦有金乃可往採入土不過一二尺耳吾昔臨去時曾埋金於此欲服金者可往取但當不中以營私累耳今人不復識呼菌山者尋此山形當如菌孤立亦或是困蒼之囷形如囷也按大茅後長阿積金東凹地有一山子獨秀如博山爐且又近積金山恐此或當是即今多石及樹木但金之所在指一兩處亦難可尋索唯啟乞垂賜所不論耳意欲營轉煉之事亦指此山前臨長澗東流水至幽隱有形勢若基構有期當更宣述耳大茅山有玄帝時銅古鼎字鼎可容四五斛許偃刻甚精好在山獨高處入土八尺許上有盤石掩鼎上玄帝時命東海神使埋藏于此此亦當是, HFL: ''}
