  - {type: variant, offset: 36, length: 1, content: 作, CK-KZ: 書與許卿卽長史也後當爲上淸左卿玄感凝會精期遠範標神映挺雙理自分必能鵬飛辰阿雲扇靈元高振玉宇携轡秀眞可謂邈乎其奇落絶之視也於是洞陰之宫內臺下觀風無羽琅之鼓草無瓊金之流嚮雖渟光正明動回五象固乞屈之夾觀小天之浮景耳何足絓卿司之至念紆蘭眞以盼汜邪然鑒無不應圓想必通所以興詠事外迹亦並帀苟誠之所企吾無隱也想善建重離之明以期於必詣之會皓淸明朗賢亦俱學而得耳不令我等有蹙頞下風矣弘之而已}
  - {type: page-break, offset: 36, content: '', id: KR5d0036_CK-KZ_03p058a, image: JY237/CK-KZ_JY237_03p058a.png}
