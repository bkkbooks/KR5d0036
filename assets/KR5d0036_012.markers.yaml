  - {type: variant, offset: 8104, length: 1243, content: 百步便朗然如晝日不審此洞天之別光為引太陽之光以映穴中耶此洞天中官府曠大云宮室數百間屋官屬正二仙君兄弟復有他仙官男女凡有幾許人為直是石室亦有金堂玉房耶宮室與洞庭苞山相連不包公及妹朱氏昔在世曾得入此宮不二人為未得登舉作地下主者耶治在何處愚昧冒啟懼有干忤包公及妹事前中君書無有當複是別受今更重問並洞中事定錄又答有後也市山之盤石市名之存由于此也今之孜孜志慕于道無心金玉尊靈所置唯助令彌密耳豈有掘犯理耶此故為未之照察也山左右泉水金玉津液其地亦可立靜舍合丹輒當以為意此上答天市泉水可住事而竟無所立也不審玄帝是何世耶後生蒙蒙多所不及願告顓臾水王故號玄帝外書亦爾長史脫致疑問耳此條複有答在後告中茅山東有小穴陰宮之阿門入道差易後當以漸齋修而尋求之靈宗垂念便以為造金門而登玉房也但存遲速之間不敢悒遲有如此教示而不速求游闢一何可恨所以眾靈每勤勤引勸告大茅山亦有小穴在南面相似如一謂之南便門欣見啟悟喜稟德音精誠注向沐浴自新既聞吉日至時密造區區之誠靈實鑒照此道南面之東門與小阿東門相似者告左慈復何人也此見獎勖之言恩念下逮益令欣慕傳上亦載此事告良常西南垂有可住處是司命君往時別宅亦可合丹穆自見傳記鄙心竊志欲尋司命君往昔之舊宇高棲之所託患未能審知耳今輒當隱量求處臨時告悟傳上亦載此事基陸湮沒難可必審故更乞告示也告良常東南又有可住處累石如灶寄生樹如曲蓋為誌往當尋其所告洞口西北有一地地小危不安可立外靜舍愚意本自欲立內外靜舍輒當疇量在宜亦不聞立此外靜事而今有一累石壇歷然相傳乃言掾於此壇化遁也每往拜視輒感嘆纏心告菌山至佳司命臨去埋金於此欲服金者可取且竊有合金液意今未敢議此若山居積年修學日進後而事可得密者臨時啟質中君書云吾昔臨去埋金不道司命長史此答誤耳告大茅山有玄帝時銅鼎在山獨高處入土八尺許此帝王之所器疏示後生益增稟厲承下亦可以立靜舍感備告悟告昔屈氏埋銅及錢此通非所擬向也聞此遠事世代變易能不悲歎昔初拜八月八日書已操身至述虛此猶是前村徐泛家尋家信見報云得應言未可登山便承此而歸直致此書於朱家靜中耳愚心鄙近亦以肉人穢濁精誠不懇無能上達不悟已暢高聽得蒙省察辭與事違悚息而已長史玄挺動靜聞徹屑辭所向便已關奏蒙報或是得楊君所傳者徐泛家今猶存後所云徐偶即應是汛後所以知井宅處亦云其祖曾為長史門生也昔占赤石田利近山下為往來之階此乃丹誠尋遇天旱佃不收塘壞穆尋見用出此事力未展非為息懷今方居山下故當修懇以此去洞口遠故不欲安耳此田既在大茅中茅之西去大山近瞻仰禮拜乃佳而言去洞口遠當是道去北洞口遠耳此田雖食澗水旱時微少塘又難立不知後當遂墾之不今塘尚決補築當用數百夫則可溉田十許頃隱居館中門人亦於此隨水播植常願修複此塘以追遠跡兼為百姓之惠也告書疏班班欲停之如何凡書疏之興所以運達意旨既蒙眷逮親奉覲對司命君二仙靈顏則天啟其願沐浴聖恩豈復煩書疏耶所謂得魚而忘筌也此蓋不欲停之辭故引以回見于理極好不審左公今何在又有葛孝先亦言得道今在何處肉人喁喁為欲知之葛既鄉人所以及問此條亦有答在後右長史答書訖此並是自起本多黵治用白箋次第如此歲乙丑此一行本題紙背, HFL: ''}
