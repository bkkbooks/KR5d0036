  - {type: variant, offset: 7, length: 0, content: '', WYG: 二昔累得書見意深照旨趣先書以年行西昃衰頽待老中夜慨歎莫與酬諮夫誠感有在亦得之無晚也次書吿有年之志疇昔之好恒願眞人禀受要訣仰接容景親奉徽音夫勤未上徹精未廣眞要之騁未可豫及也後漢書云吾發自𤣥授金闕素名跨邁世迹超登清虚何𤣥標之𣺌邈竒洞之淵逺哉欲克己洗心沐浴芳流若能斯者今其時矣末書云厠聞要旨當修五靈自謂西造閬圃東遊𤣥洲不為邈絶求矜而誘之引而致之是為言貫于心良可啓矣恭佼五靈亦復至耳然道浮外迹未關内眞是以雲車靈轅相適猶遐昔曾軫華僑依此而言則知華僑先亦䝉眞降矣蓋應㑹敖世事有出嘿涂不必靜苟有分無志申公所病遇至不為覆水始惋是以古諺有云逢時不邁山客抃粲者矣夫學道者固不宜恃其質分必當保任於清全矣於焉騁逸松期囘輪紫清靈觀四響𤣥音合唱玉振雲奏不謀而和可謂祕道藏珍眞暉之上挺也子建志有年今因以反子昔旨耳此}
