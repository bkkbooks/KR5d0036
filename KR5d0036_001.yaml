body:
  text: 敘誥者告也書有湯誥洛誥諸篇孔安國云誥以大義告乎天下者是也經有緯緯者相經緯也其事皆足以輔翼乎經故言緯也真誥之作其緯於經者乎其目自運象至於翼真檢者凡七蓋有象乎緯能通乎緯必知誥矣陶君之意亦謂卦六十四道之玄也道德五千言玄之道也其餘賾玄之奧鉤玄之微能與易老貫者各形乎言各見乎事雖然事與言非玄矣其書所載往往出乎緯之所以輔經者豫少耽黃老説搜索道家者流幾千家殫精日月無能深鑿其鍵嘗接江西道士吳靜極言玄事靜曰誤矣餘驚拜曰願學道靜曰讀易乎讀易足矣後乃以易悟所得者易也陶君固甚知道凡有啓於後學者其或自此始歟太乙宮高士玉京外臣易如剛告豫以茅山刊真誥欲敘其略昔者沈約遺陶君書深言先生粳比流俗超然獨覽名書絳簡至理精微唯欲下風問道未知厥路若有屬於誥者矣然陶君銘茅山曲林館乃云祈生翊命各謂知道參差經術跌宕辭藻是數語者全為誥設此翁一銘猶足為山中無窮清風況書乎嘉定十六年十一月冬至日朝散大夫行祕書郎高似孫敘
