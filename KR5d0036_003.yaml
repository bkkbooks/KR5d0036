body:
  text: 卷二運題象第二清虛真人授書曰黃赤之道混氣之法是張陵受教施化為種子之一術耳非真人之事也吾數見行此而絶種未見種此而得生矣百萬之中莫不盡被考罰者矣千萬之中誤有一人得之得之遂至於不死耳張陵承此以教世人耳陵之變舉亦不行此矣爾慎言濁生之下道壞真霄之正氣也思懷淫欲存心巴觀而以兼行上道者適足明三官考罰耳所謂抱玉赴火以金棺葬狗也色觀謂之黃赤上道謂之隱書人之難曉乃至於此紫微夫人授書曰夫黃書赤界雖長生之祕要實得生之下術也非上宮天真流軿晏景之夫所得言也此道在長養分生而已非上道也有懷於淫氣兼以行乎隱書者適足握水官之筆鳴三官之鼓耳玄挺亦不可得恃解謝亦不可得賴也要而言之貞則靈降專則神使矣夫真人之偶景者所貴存乎匹偶相愛在於二景雖名之為夫婦不行夫婦之跡也是用虛名以示視聽耳苟有黃赤存於胸中真人亦不可得見靈人亦不可得接徒劬勞於執事亦有勞於三官矣雞鳴時南嶽夫人授書曰雞既鳴矣論好之緣篤也紫陽真人授書曰太虛遠逸高卑同接體賢之義著之於冥運耳慎心係於黃赤之疑也茅中君授書曰玄標觸景俯和塵藹玉振愆房清風逸邁可不勖之也言畢諸真人去真妃少留在後曰又煩明君為一辭也而授書曰忘懷蘭素暉心齊契方當數親虔清宇德與流景合宜歡會理髮領秀伏度明君高尚靈映縱滯忘鄙耳言畢持手而下床未至戶之間忽失所在六月二十六日夜降八真人紫微左夫人一紫清上宮九華真妃二上真司命南嶽夫人三紫陽真人四清靈真人五茅中君六茅小君七又有一人甚少整頓建芙蓉冠朱衣帶劍未曾見也意疑是桐柏山真人王子喬多論金庭山中事言多有不可解者恭敬紫微上真九華妃也皆禮揖稱下官此條重出而小異者前所書是楊君自記九華降事隱之不出從此後是更疏說長史事以示長史故此一片兩本也上真云昨與叔申詣清虛宮校為仙真得失之事耳近頓除落四十七人都復上三人耳並復視爾輩之名簡如今佳耳許某乃得在伯札中許某即長史名也楊君疏呈故不載名耳吾初不悟其如此益好也其洗心勤邁宗注理盡心殫意竭如履水火若久如此者真人亦不得逃矣仙道亦不得隱矣但當杜絶其淫色之念吾等亦即可得見可疏示之此南嶽夫人言此即是前二十四日所道明日當指王屋山事也中君曰伯舉在於下官耳大老子將復可念江東未見有如此而勤道者然勿恃伯而忘道也虛妄者德之病華衒者身之災滯者失之首恥者體之籥遣此四難然後始可以問道耳於是靈軫鳴轅日有仿佛也有淫愆之心勿以行上真之道也昨見清虛宮正落除此輩人名而方又被考罰以度付三官推之可不慎乎右南嶽夫人言許長史慎臨尸弔喪年內耳示許仙侯如此小君言言畢大笑心既忘得亦不同鄙恥不除生籍不書許長史雖已暫除當復曾除而復除之此清靈言東卿司命甚知許長史之慈肅小有天王昨問此人今何在修何道東卿答曰是我鄉里士也鄉里者謂句容與茅山同境耳非言本咸陽人也內明真正外混世業乃良才也今修上真道也此語乃稱人意略有伯形也此南嶽夫人言右從六月二十四日來凡二十四條並有楊書蕭邈真才內鏡外和曾參出田丹心同丹素系三遷來庇方頭此四句是離合作思玄字即長史之字也録名太極金書東州蹇裳七度耽凝洞樓內纍既消魂魄亦柔守之不倦積之勿休五難既遣封伯作侯七度飛步事也洞樓洞房事也右紫微王夫人所喻令示許長史右一條有長史寫紫微夫人喻曰披華蓋之側云云此事出在第三卷中六月二十七日夜喻書此右一條有楊書積精所感萬物盡應妙誠未匝則形華不盡形華不盡則洞房之中難即分明也吾昔受此法常向西北存之耳西北存如小為易見可明示如此西北為天地之爽內照之玄門也六月二十七日紫陽所喻此二十七日衆真復降其事亦應甚多並不出右一條有長史寫二君各有六僮裴君從者持青髦之節一僮帶繡囊周君從者持黃髦之節無囊右二條是甲手書六月二十九日九華真妃授書曰景應雙粲雲會玄落龍秀五空採瓊閬臺長歌靈幕煥啓玉扉眇矣遺事與世長辭霞軫絳波電赴紫棲共攜清響之外同遊雲岫廣崖豈不善乎豈不樂哉日者霞之實霞者日之精君唯聞服日實之法未見知餐霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉妾有磨鏡之石決牖之術即能徹洞萬靈眇察絶響可乎面者神之庭髮者腦之華心悲則面燋腦減則髮素所以精氣內喪丹津損竭也妾有童面之經還白之法可乎精者體之神明者身之寶勞多則精散營竟則明消所以老隨氣落耄已及之妾有益精之道延明之經可乎此四道乃上清內書立驗之真章也方欲獻示以補助君之明照耳授畢取以見與某口答唯唯乞請之也六月二十九日夜桐柏真人同來降復諭授令某書曰夫八朗四極靈峰遼遐奇言吐穎瓊音餐振晨飛陵清玄氣赴霄體邁玉虛心遺艱鋒沈滯於眇羅之外凝和于寂波之表若此人者必能旋騰玄漢周灑真庭矣三元可得而見絳名可得而立耳如其心併愆浪目擊色袂動與罔罟共啓靜興爭競之分者此乃適仙路邈求生日闊也子其慎之某書畢取視乃以見與此前是桐柏辭也既同一夕安妃授竟桐柏次蒨故云復授耳卒看如似猶是安妃故顯注之六月三十日夜九華真妃與紫微王夫人南嶽夫人同降真妃坐良久乃命侍女發檢囊之中出二卷書以見付令寫之題如左上清玉霞紫映內觀隱書上清還晨歸童日暉中玄經右二卷名目此題本應是三元八會之書楊君既究識真字今作隸字顯出之耳七月一日夜紫微王夫人南嶽夫人九華真妃紫微桐柏清虛三真人茅二君同降良久某乃自陳於衆靈求安身之術欲知貴賤之分年命之會多少定限於是真妃乃笑良久見授書此曰明君夷質虛閒祕構玉朗蘭淵高流清響金宮可謂能珍寶藏奇幽真內煥摽拂靈篇乘數順生素德神園丹録玉清興煙拔景冥鼓遐聲也必三事大夫侍晨帝躬高佐四輔承制聖君理生斷死賞罰鬼神攝命千靈封山召雲主察陰陽之和氣而加為吳越鬼神之君也妾將挺命凝觀憑華而生靈飛九天虛音飆房因運四覺玄梯同象紫名太上清文八景神映西暉德明內隸乃受書乘氣得為真妃之任矣又當助君總括三霍綜御萬神對命北帝制敕酆山又應相與攜袂靈房乘煙七元嘉會希林內攄因緣也是故君姓於楊我得為安妾自發玄下造君自受書於西宮從北策景乘軿東轅握旄秉鉞專制東蕃三官奉曶河山啓源天丁獻武四甲衛輪當此之時實明君之至貴真仙之盛觀也三官中常有諺謠云楊安大君董真命神正我等之謂耳蓋聖皇之方駕於今有二十八年也復二十二年明君將乘龍駕雲白日升天先詣上清西宮北朝玉皇三元然後乃得東軫執事矣此自是君玉朗紫微金音虛領為太極所旌乃玄德上挺不復用勤學劬勞陟足山川矣若為精勖之者當小神清瑩鮮耳亦不甚今日不勞之舉也世俗縈網貴賤之間涉塵途之役在得失之津信非真人所得經營乃自坦乎艱泰之用任乎遇否之頃耳見明君之逸誠欣然也睹明君之否誠戚顏也此二感發于顏色之上也復未足以致遠悲抱長戚矣至于內冥偶景併首玄好輕輪塵藹參形世室妾豈以愆纍浮卑少時之滯而虧辱於當真之定質耶夫陰陽有對否泰反用二象既羅得失錯綜此皆往來之徑陌耳今人居風塵之休盛者乃多罪之下鬼趣死之考質也夫處無用於囂途乃得真之挺朴任凡庸以內觀乃靈仙之根始也蓋富貴淫麗是破骨之斧鋸有似載罪之舟車耳榮華矜世爭競徼時適足以誨愆要辱為伐命之兵非佳事也是故古之高人覽罪咎之難豫知富貴之不可享矣遂肥遁長林棲景名山咀嚼和氣漱濯清川欲遠此惡跡自求多福超豁糸互聘保全至素者也君亦奚足汲汲于人間之貴賤投身于榮辱之肆哉且方交兵日會三災向臻神風驅除臭氣參天明金生穢於泥瀆寶玉投糞以招塵褰衣振血濁精虧真玄通遠逸是其時也君若其不耐風火之煙欲抱真形於幽林者且可尋解劍之道作告終之術乎自盡出默之會隱顯之跡臨時分處有任於明君矣冥數上感有命而交靈書玉臺真契合景是以言單於辭心訖于筆妾豈獨嘆於一人乎蓋示名分之判例也書訖取以與某復曰君省此當少愈不右從六月二十九日來凡十四條並楊君自記書東卿大君昨四更初來見降侍從七人入戶一人執紫旄節一人執華幡一名十絶靈幡一人帶緑章囊三人捧牙箱一人握流金鈴乃年少於二弟二弟昨並倚立東卿命坐乃坐耳良久言語委曲先昨神女來降意本疑是王母女昨又來定是也南真說云是阿母第十三女王媚蘭字申林治滄浪山受書為雲林夫人此兩事並是七月五日夜略記後更復委曲重數在後如此則右英夫人始以七月三日四日頻夕降也右二條有楊自記乙丑歲晉興寧三年七月四日夜司命東卿君來降侍從七人入戶其一人執紫旄之節其一人執華幡一人執十絶靈幡一人帶緑章囊其三人捧白牙箱箱中似書也其一人握流金鈴侍人並朱衣司命君形甚少於二弟著青錦繡裙紫毛帔巾芙蓉冠二弟並同來倚立命坐乃坐耳言語良久七月六日夜司命君又降良久喻書曰若必範玄秉象清淨罕時遂拔群幽藻戢翼高棲感味上契淵渟嶽峙蕭寥玉篇玩寶神生遺放俗戀調彈清靈澄景虛中五道發明色絶化浪欲與淡並空同冥衢無視無聽爾乃遠齊妙真重起玄覺明德內圓靈摽外足矣終能策雲皞以赴霄書司命之丹録耳若精散萬念為生不固氣隨塵波心不真合適足勞身神於林殂謂應作棨字實有誤於來學也其道微而易尋其道艱而難得乎亦令示許長史此二條又有長史寫許長史欲山居宗道者貴無邪棲真者安恬愈至寂非弘順之主惔然非教授之匠故當因煩以領耳意云爾不代謝奚必四時氣如呼吸千齡如寄趙子可憂不信而末疑其心亦已醯矣司命君與南嶽夫人言為道者常淵淡以獨處每棲神以遊間安飲啄以自足無旗謂應作祈字眄於籠樊哀樂所以長去夭閼何由而臻者乎稟志各有所宅資性咸有其韻豈可履逐物之邪蹤矯我之正業乎何不肆天摽之極縱適求真之內娛從幽淨以熙心綏所託以棲意處東山以晦跡握玄筌於妙領保隨珠以含照遣五難於胸次耶此三條亦似是東卿言七月十五日夜紫微王夫人授書曰勤精者味玄之靈摽也凝安者拘真之寢衾矣子勤澡丹心競赴高嶺可謂務道之柄勤甚至也然道柔真虛守淡交物安靜任棲神乃啓煥耳要而言之躁疾非盡理矣違之者亦取勞乎與許玉斧七月十五日夜清靈真人授詩企望人飛若感若成威不內接驕女遠屏三四縱橫以入帝庭歷紀建號得為太齡亦必秀映四司元卿翻然縱羽遂登上清此離合掾大名嵒字也與許玉斧此夕又有中君授書與許卿答欲知洞天中之事今載在第四卷中鳳巢高木素衣衫然此八字是作長史小名穆字也履順思真凝心虛玄仍取此思字玄字即成長史字也五公石腴彼體所便急宜服之可以少顏三八令明次行玄真解駕偃息可誦洞篇瓊刃應數此瓊刃字即是掾小名玉斧也與外傳青録義同故云應數精心高棲隱默沉閒正氣不虧朮散除疾是爾所宜次服掞飯兼穀勿違益髓除患肌膚充肥然後登山詠洞講微寅獸白齒此四字即是云虎牙也亦能見機遂得不死過度壬辰偃息盛木玩執周書此八字即是作楊字也太極植簡金名西華學服可否自應靈符理異契同神洞相求定録中候告道藥事是定録言也此並離合譬喻四人姓名各詮所宜修行版御事尋辭意皆相貫次不知云何得兩人共說寓言必可用不用是無情焉得駕迹尋此空中靈微音良有旨當用慎勿輕事事應神機保爾見太平右右英吟此茅定録言良針也可記之仙才不用心煩曲故能得也保命言八月中彼人必東秀暫看燒香必也保命臨去言右從乙丑歲來凡十五條並有楊書欽想風流託心靡景愧以愆昧鄙彰思自榮勵沐浴陶冶濟否之階幸垂眷逮耳許玄惶恐再拜長史大名謐字思玄今此直云玄其意未允詣賈先生此是長史聞楊宣周紫陽說賈玄道等主知試校事故有此書賈即以呈司命司命後所答云賈生近以此書來者也周君說事在第四卷中也右一條是長史自書本也太元真人以此書見與因授令書如左若夫能眇邈於當世則所重唯身也罕營外難者則無死地矣是以古之學者握玄筌以藏領匿穎鏡于紛務凝神乎山巖之庭頤真於逸谷之津於是散髮高岫經緯我生暉暉景曜採吸五靈遊躡九道登元濯形投思絶空人事無營閉存三氣研諸妙精故能回日薄之年反為童嬰耳苟事纍沙會交軒塞路但所守之不能勖也何試校之能停耶物物相要觸類興患天人之眄豈時漏哉所司賞於修業所試在於不日新矣賈生近以此書來託向亹可謂有情然無逝我梁有似逆詐耳七月十六日此一條又有掾書省所咨有心哉子望對山嶺增懷遠想欣然稟向常見此意夫為道者精則可矣有情不勤則無所能為也勤而不專亦不能有成也要當令吝心消豁穢此後人枿作穢字不可復識疾開散此亦似東卿告長史爾何以不數看東山鬱望三秀徘徊蓽宇目擊林水平彼人往殆無所復益耳凡云三秀者皆謂三茅山之峰山頂為秀故呼三秀也右南嶽夫人與弟子言夫言者性命之全敗也信者得失之關楗也張良三期可謂篤道而明心矣右南嶽夫人與弟子言性甚寬仁而所聞急而應物速者更違旨耳火棗事未宜問也論火棗事在後右九華真妃言右從太元來凡五條並楊書轡景落滄浪騰躍清海津絳煙亂太陽羽蓋傾九天雲輿浮空洞倏忽風波間來尋冥中友相攜侍帝晨王子協明德齊首招玉賢下眄八阿宮上寢希林顛漱此紫瓊腴方知穢途辛佳人將安在勤之乃得親七月十八日夕雲林右英王夫人授詩此詩與長史兼及掾事高興希林虛遐遊無員方蕭條象數外有無自冥同亹德韻和飄飄步太空盤桓任波浪振鈴散風中內映七道觀可以得兼忘何必反覆酬待此世文通玄心自宜悟默耳必高蹤七月二十六日夕紫微夫人喻作令與許長史絳闕扉廣霄披丹登景房紫旗振雲霞羽晨撫八風停蓋濯碧溪採秀月支峰咀嚼三靈華吐吸九神芒椿數無絶紀協日積童蒙攜袂明真館仰期無上皇北鈞唱羽人玉玄粲賢衆云河波浪宇得失為我鍾引領囂庭內開心擬穢衝習適榮辱域罕躡希林宮一靜安足苦試去視滄浪右右英夫人所喻右從轡景來三篇並有長史寫弱喪水岡燋漾篤靈未盡倚伏異因雲梯未抗雖有懷於進趣猶未淵於至理矣君才實天工以清瀾凝浪於高韻志棲神乎太玄期紫庭而步空矣有心洞於飛滯柔翰蔚乎冥契也動合規矩等圓殊方靜和真味吐納興音可謂縱誕德挺良為欽然矣然穢思不豁鄙固淫念不漸靈池未澄將未得相與論內外之期泛二景之交耳夫失機者貴在能改相釋有情今無妨矣雖暫弭群聽故克和也前塗謂應作攸字邈此比非一漏緒多端當恆戰密苟情有愆散得隨事失悟言微矣將何以遏之將何以遣之右七月二十六日夜雲林右英王夫人喻書見與勿答右一條有長史寫世珍芬馥交道宗玄霄會振衣尋冥疇回軒風塵際良德映靈暉穎根粲華蔚密言多儻福沖淨尚真貴咸恆當象順攜手同衾帶何為人事間日焉生患害七月二十八日夕右英王夫人授書此詩以與許長史後十二月長史答書云咸恆之喻即是酬此詩也咸恆義出周易右一篇有長史寫清響散空神風灑林身超冥衢志詠靈音仁侯其人也欲以裴真人本末示郗者可矣其必克諧不善誘之心亦內彰也裴亦何人哉郗即灊也小名方回裴真人本末即是清靈傳也有謝過及七經之士故令示之八月七日夕右英王夫人授書令與許長史右一條楊書又有長史寫守真一篤者一年使頭不白禿髮更生夫內接兒孫以家業自羈外綜王事朋友之交耳目廣用聲氣雜役此亦道不專也行事亦無益矣夫真才例多隱逸棲身林嶺之中遠人間而抱淡則必犬嬰顏而玄鬢也玉醴金漿交梨火棗此則騰飛之藥不比於金丹也仁侯體未真正穢念盈懷恐此物輩不肯來也苟真誠未一道亦無私也亦不當試問火棗交梨之樹已生君心中也心中猶有荊棘相雜是以二樹不見不審可剪荊棘出此樹單生其實幾好也雖云問也其欲希之近也當為君問主領者三年更相問以即日始丑年此二字長史後益上八月七日夜雲林右英王夫人口授答許長史凝心虛形內觀洞房抱玄念神專守真一者則頭髮不白禿者更軫軫字亦應是琴未有以百思纏胸寒熱破神營此官務當此風塵口言吉凶之會身扉凡作扉字者皆是排音非扉扇之扉也得失之門衆憂若是萬慮若此雖有真心固為不篤抱道不行握寶不用而自然望頭不白者亦希聞也玉醴金漿交生神梨方丈火棗玄光靈芝我當與山中許道士不以與人間許長史也八月七日夜紫微王夫人授答許長史右六條有掾寫擬駕東岑人停景招隱靜仁德乘波來俱會三秀嶺靈芝信可食使爾無終永吸真獻金漿不待百丈井八月十六日夕清靈真人授右一篇有長史寫虛和可守雄蕭蕭可守雌夫蕭蕭者單景獨往也君絳宮中渠謂應作詎字能仰飛空同上上雲玄之涯不道易聞而患不真書易得而患不行若專如此大天之中盡真仙比肩也我亦無咎於不能為者心不定而欲書將欲沽之哉意不往而求真似欲衒之也願告八月十七日夜右英王夫人授書此與許長史似答心求守雌之真一也肇祖植德華條翁隊即謂七世祖許肇也隊字應作墜頓足懸車無早晚也但心堅注真微密靈機則可矣至于高逸長嶺寢冥林澤縱時事之難鄙遺九親而味神實美舉也心苟不專愆念填胸雖躡閬山以遊步造圓壟以朝冥然亦必敗也若必空空我自當相告有可動之時也今且未可議耶八月十七日夜保命仙君小茅口授與許長史含仁守慈發拔幽憂單心慈誘棲神靈鏡者許長史其人也所恨在于應物速招真急耳夫浩挺虛映乃可守雌已求故當能守之守之蓋易恐亦宜無不可耶八月十八日夜紫微王夫人授示許長史右四條有楊書穆奉被音告頻煩備至仰御恩潤光華彌煥披覽欣慶感荷罔極穆沉滯流俗豈忘拔跡輒已誓之中心思為階漸考室東山棲景林壑此志必也此舉決也方當憑庇靈宗咨稟神規若此之心揆亦鑒之真一之雌其道玄遠妙出祕領穆愆穢未蕩俗纍未拔胸心滓濁精誠膚淺未敢預聞南真哀矜去春使經師授以方諸洞房步綱之道八素九真以漸修行不敢紵謂應作怠字懈九真至須幽靜人事雜錯患在未專耳昔人學道尋師索友彌積年載經歷山嶽無所不至契闊險試備嘗勞苦然後授以要訣穆德薄罪厚端坐愆室橫為衆真所見採録鑒戒繼至啓悟非一古人有言非知之難其行之難夫人垂恩所賜自可徐徐須此須字長史自移東山然後親授道之來也不計遲速恩之隆也何限早晚命使願告敢不上答謹白此長史答前右英論雌一事者掾為書之既被更寫故此本得存焉
